body:
  text: 大唐開元禮卷五唐蕭嵩等撰吉禮冬至祀圜丘有司攝事齋戒陳設省牲器奠玉幣進熟齋戒前祀七日平明太尉誓百官于尚書省曰某月某日祀昊天上帝于圜丘各揚其職不供其事國有常刑凡預祀之官散齋四日致齋三日散齋皆於正寢致齋二日於本司一日于祀所其無本司者則二日于郊社署散齋理事如舊唯不吊喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯祀事行其餘悉斷其祀官已齋而闕者通攝行事諸祀官致齋之日給酒食及明衣各習禮於齋所光祿卿監取明水火太官令取水于隂鑒取火于陽燧火以供爨水以實尊也前祀二日太尉告髙祖神堯皇帝廟如常儀告以配神作主之意前祀一日諸衛令其屬未後一刻各以其方器服守衛壝門每門二人每隅一人與太樂工人俱清齋一宿陳設前祀三日守宫設祀官公卿以下次于東壝之外道南北向西上設陳饌幔于內壝東門西門之外道北南向南門北門之外道西東向壇上及東方南方午陛之東饌陳于東門外西方及南方午陛之西饌陳于西門外北方之饌陳于北門之外前祀二日太樂令設宫懸之樂于壇南中壝之內東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于編懸之間各依辰位樹雷鼓于北懸之內道之左右植建鼓于四隅置柷敔于懸內柷在左敔在右設歌鐘歌磬于壇上近南北向磬簴在西鐘簴在東其匏竹者立于壇下重行北向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以北為上南方北方以西為上右校掃除壇之內外郊社令積柴於燎壇方一丈髙一丈二尺開上南出户方六尺前祀一日奉禮設祀官公卿位于內壝東門之外道南分獻之官于公卿之南執事者位于其後每等異位俱重行西向北上設望燎位當柴壇之北南向設御史位于壇下一位于東南西向一位于西南東向設奉禮位于樂懸東北贊者二人在南差退俱西向又設奉禮贊者位于燎壇東北西向皆北上設協律郎位于壇上南陛之西東向設太樂令位于北懸之間當壇北向又設祀官公卿以下門外位皆于東壝之外道南每等異位重行北面西上設牲榜于東壝之外當門西向蒼牲一居前又蒼牲一青牲一赤牲一在北皆少退南上黃牲一白牲二玄牲二上卷作白牲一玄牲一在南皆少退北上設廩犧令位于牲西南祝史陪其後俱北向設諸太祝位于牲東各當牲後祝史陪其後俱西向設太常卿省牲位于牲前近北又設御史位于太常卿之西俱南向設酒尊之位上帝太尊二著尊二犧尊二山罍二在壇上東南隅北向象尊二壺尊二山罍四在壇下南陛之東北向俱西上設配帝著尊二犧尊二象尊二山罍二在壇上於上帝酒尊之東北向西上五方帝日月各太尊二在第一等內官每陛間各象尊二在第二等中官每陛間各壺尊二在第三等外官每道間各概尊二于壇下衆星每道間各散尊二于內壝之外凡尊各設于神座之左而右向尊皆加勺羃五帝日月以上之尊皆有坫以置爵內官以下尊皆藉以席設爵于尊下設洗于午陛東南北向罍水在洗東篚在洗西南肆設分獻罍洗篚羃各于其方陛道之左俱內向篚實以中爵執尊罍篚羃者各于尊罍篚羃之後各設玉幣之篚於壇上下尊坫之所晡後一刻太史令郊社令各常服帥其屬升設昊天上帝神坐于壇上北方南面席以藁秸設髙祖神堯皇帝神座於東方西向席以莞設五方帝日月神坐于壇第一等青帝于東陛之北赤帝于南陛之東黃帝于南陛之西白帝于西陛之南黑帝于北陛之西大明于東陛之南夜明于西陛之北席皆以藁秸又設五星十二辰河漢及內官五十五座于第二等十有二陛之間各依方面凡座皆內向其內官有北辰坐于東陛之北曜魄寶于北陛之西北斗于南陛之東天乙太乙皆在北斗之東五帝內座于曜魄寶之東並差在行位前又設二十八宿及中官一百五十九座于第三等其二十八宿及帝座七公日星帝席太角攝提太微太子明堂軒轅三台五車諸王月星織女建星天紀等一十七座並差在行位前又設外官一百五座于內壝之內又設衆星三百六十座于內壝之外各依方次十有二道之間席皆以莞設神位各於座首昊天上帝及配帝五座日月之坐設訖却收至祀日未明五刻郊社令太史令各服其服升壇重設之其內官中官外官衆星等設定不收也省牲器省牲之日午後十刻去壇二百步所諸衛之屬禁斷行人晡後二刻郊社令丞帥府史三人及齋郎以尊坫罍洗篚羃入設于位凡升陛者各由其陛晡後三刻謁者贊引引祀官公卿已下俱就東壝門外位諸太祝令與廩犧令以牲就榜位謁者引司空贊引引御史入詣壇東陛升行掃除于上降行樂懸於下訖出還本位初司空將升又謁者引太常卿贊引引御史入詣壇東陛升視滌濯凡導引者每曲一逡巡于視濯執尊者皆舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西向舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官謁者引光祿卿詣厨省鼎鑊申視濯溉謁者贊引各引祀官御史詣厨省饌具訖俱還齋所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各帥其屬入實尊罍玉幣凡六尊之次太尊為上實以泛齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝著尊為上實以泛齊犧尊次之實以醴齊象尊次之實以盎齊山罍為下實以清酒五帝日月俱以太尊實以泛齊其內官之象尊實以醴齊中官之犧尊實以盎齊外官之象尊實以醍齊皆加明水酒皆加玄酒各實于上尊禮神之玉昊天上帝以蒼璧青帝以青圭赤帝以赤璋黃帝以黃琮白帝以騶以虞黑帝以玄璜日月以圭璧昊天上帝及配帝之幣蒼五方上帝日月與內官以下之幣皆從方包凡幣皆長一丈八尺太祝以玉幣置于篚太官令帥進饌者實諸籩豆簋簠等皆設於饌幔內未明二刻奉禮帥贊者先入就位贊引引御史博士諸太祝及令史祝史與執尊罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執尊罍篚羃者各就位贊引引御史諸太祝詣壇東陛升行掃除於上令史祝史行掃除于下訖引就位未明一刻謁者贊引各引祀官公卿已下俱就門外位太樂令帥工人二舞次入就位文舞入陳于懸內武舞立于懸南道西其升壇者皆脫屨于下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行掃除于上降行樂懸于下引復位謁者贊引各引祀官公卿以下入就位立定奉禮曰再拜衆官在位者皆再拜其者先拜不拜謁者進太尉之左白有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則跪奠訖俯伏而後興鼓柷奏豫和之樂乃以圜鐘為宫黃鐘為角太簇為徴姑洗為羽作文舞之舞樂舞六成圜鐘三奏黃鐘太簇姑洗各一奏偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官在位者皆再拜正座配座太祝跪取玉及幣於篚各立于尊所諸太祝俱取玉及幣亦各立於尊所謁者引太尉詣壇升自南陛北向立正座太祝加玉于幣東向授太尉受玉幣凡授物者搢笏跪奠訖執笏俯伏興登歌作肅和之樂以大吕之均謁者引太尉進北面跪奠于昊天上帝神座俯伏興謁者引太尉少退北向再拜訖謁者引太尉立于西方東向配座太祝以幣北向授太尉太尉受幣謁者引太尉進東向跪奠於髙祖神堯皇帝神座俯伏興謁者引太尉少退東向再拜訖登歌止謁者引太尉自南陛還本位初太尉將奠配帝之幣諸太祝及諸星坐獻官各奉玉幣進跪奠于神座訖興還尊所初衆官拜訖夜明以上祝史各奉毛血之豆立於門外登歌止祝史奉毛血入各由其陛升諸太祝迎取於壇上俱進奠於神坐前諸太祝與祝史退立於尊所進熟太尉既升奠玊幣太官令出帥饌者奉饌各陳於內壝門外謁者引司徒出詣饌所司徒奉昊天上帝之爼諸太祝既奠毛血太官令引饌入爼初入門奏雍和之樂自後酌獻皆奏雍和之樂以黃鐘之均自後壇下之樂皆奏黃鐘饌各至其陛樂止祝史俱進跪徹毛血之豆降自東陛以出上帝之饌升自午陛配帝之饌升自卯陛青帝之饌升自寅陛赤帝之饌升自已陛黃帝之饌升自未陛白帝之饌升自酉陛黑帝之饌升自子陛大明之饌升自長陛夜明之饌升自戍陛其內官中官諸饌各隨便而升諸太祝迎引饌於壇上各設於神座前籩豆蓋羃先徹乃升簋簠既奠却其蓋於下也設訖謁者引司徒太官令帥進饌者俱降自東陛以出司徒復位諸太祝各還尊所又進設外官衆星之饌相次而畢初壇上設饌訖謁者引太尉詣罍洗盥手洗拭匏爵訖謁者引太尉升自南陛詣昊天上帝太尊所執尊者舉羃太尉酌泛齊訖樂作謁者引太尉進昊天上帝神座前北向跪奠爵俯伏興謁者引太尉少退北向立樂止太祝持版進于神座之右東向跪讀祝文曰維某年歲次月朔日子嗣天子臣某謹遣太尉封某臣名敢昭告于昊天上帝大明南至長晷初升萬物權輿六氣資始謹遵彛典慎修禮物敬以玉帛犧齊粢盛庶品備兹禋燎祗薦潔誠髙祖神堯皇帝配神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進跪奠版于神座興還尊所太尉再拜訖樂止謁者引太尉詣配帝著尊所取爵于坫執尊者舉羃太尉酌泛齊訖樂作謁者引太尉進髙祖神堯皇帝神座前東向跪奠爵俯伏興謁者引太尉少退東向立樂止太祝持版進于神坐之左北向跪讀祝文曰維某年歲月朔日子孝曾孫開元神武皇帝臣某謹遣太尉封某臣名敢昭告于髙祖神堯皇帝履長伊始肅事郊禋用致燔祀于昊天上帝伏惟慶流長發德冠思文對越昭升永言配命謹以制幣犧齊粢盛庶品式陳明薦侑神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進跪奠版于神座興還尊所太尉拜訖樂止謁者引太尉進昊天上帝神座前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒啐酒奠爵俯伏興太祝各帥齋郎進俎太祝減神坐前胙肉皆取前腳第二骨也加于俎以胙肉共置一俎上太祝持俎西向授太尉太尉受以授齋郎太尉跪取爵遂飲卒爵太祝進受虛爵復于坫太尉俯伏興再拜謁者引太尉降復位文舞退鼓柷作舒和之樂退訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止初太尉將復位謁者引太常卿詣罍洗盥手拭匏爵訖謁者引太常卿自東陛升壇詣昊天上帝著尊所執尊者舉羃太常卿酌醴齊訖武舞作謁者引太常卿進昊天上帝神坐前北向跪奠爵興謁者引太常卿少退北向再拜訖謁者引太常卿詣配帝犧尊所取爵于坫執尊者舉羃太常卿酌醴齊訖謁者引太常卿進髙祖神堯皇帝神坐前東向跪奠爵興謁者引太常卿少退東向再拜訖謁者五人引五方上帝之太祝各詣酒尊所酌醴齊進奠於神座前訖還尊所謁者引太常卿進昊天上帝神座前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太常卿之右西向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受虛爵復於坫太常卿興再拜訖謁者引太常卿降復位初太常卿獻將畢謁者先引光祿卿詣罍洗盥手洗拭匏爵升酌盎齊獻正座配座終獻如亞獻之儀訖謁者引光祿卿降復位初太常卿將升獻謁者七人分引五方帝及大明夜明等獻官詣罍洗盥洗拭匏爵訖各由其陛升俱酌泛齊訖各進跪奠於神坐前興各引降還本位初第一等獻官將升謁者五人次引獻官各詣罍洗盥手洗訖引各由其陛升壇詣第二等內官酒樽所俱酌醍齊各進跪奠於內官首座興餘座皆祝史齋郎助奠相次而畢謁者各引獻官還本位初第二等獻官將升謁者四人次引俱詣罍洗盥洗各由其陛升壇詣第三等中官酒尊所俱酌盎齊以獻贊引四人次引獻官詣罍洗盥洗詣外官酒尊所俱酌醍齊以獻其贊引四人次引獻官詣罍洗詣衆星酒尊所俱酌泛齊以獻其祝史齋郎酌酒助奠皆如內官之儀訖謁者贊引各引獻官還本位諸獻俱畢武舞止上下諸祝各進跪徹豆興還尊所徹者籩豆各一少移故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜樂作一成止謁者進太尉之左白請就望燎位謁者引太尉就望燎位南向立於衆官將拜上下諸祝各執篚進神坐前取玉幣祝版日月已上齋郎以爼載牲體稷黍飯及爵酒各由其陛降壇南行折而東又南行經柴壇西過壇東行自南陛登柴壇以玉帛祝版饌物置於柴上戶內諸太祝獻官以內官已下之幣皆從燎奉禮曰可燎東西面各六人以炬燎火半柴謁者引前白禮畢謁者引太尉出又謁者贊引祀官以次出贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜訖贊引引出工人二舞以次出凡有司攝事祝版應御署者進御署訖皇帝北面再拜侍臣奉版授郊社令受遂奉以出大唐開元禮卷五
