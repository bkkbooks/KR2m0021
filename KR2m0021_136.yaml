body:
  text: 大唐開元禮卷一百三十六唐蕭嵩等撰凶禮東宫舉哀為諸王妃主舉哀為良娣舉哀為良媛等舉哀為外祖父母舉哀并成服除服為妃父母舉哀并成服除服為師傅保舉哀為宗戚舉哀為宫臣舉哀臨喪臨諸王妃主喪臨外祖父母喪臨妃父母喪臨師傅保喪臨宗戚喪臨宫臣喪遣弔使弔諸王妃主喪使弔外祖父母喪使弔妃父母喪使弔師傅保喪使弔宗戚喪使弔宫臣喪使弔上臺貴臣喪賻贈致奠致奠外祖父母喪致奠妃父母喪致奠師傅保喪致奠宫貴臣喪舉哀為諸王妃主舉哀皇太子為諸王妃主舉哀本司散下其禮所司隨職供辦齋師先於宜秋門外道東設皇太子次南向周以行幃設素下床褥席守宫於重明門外設宫臣七品以上便次其日舉哀前三刻左庶子版奏請中嚴舉哀前二刻諸衛率列仗如常掌儀於次前設宫臣五品以上哭位文東武西重行北面相對為首又設一品以下七品以上位於帷宫門外亦如之又於次前設奉慰位宫臣七品以上應陪慰者並赴集便次改服素服前一刻通事舍人引一品以下俱就門外位文武侍衛之官並詣閣奉迎如常式左庶子版奏外辦皇太子服素服升腰輿出閣從幃宫後門入降就哭位即座坐侍衛如常儀左庶子跪奏請為某王若某公某主王太妃王妃舉哀俯伏興皇太子哭通事舍人引宫臣五品以上入各就班位立定舍人贊拜宫臣在位者皆再拜舍人贊哭宫臣在位者皆哭十五舉聲舍人贊止宫臣在位者皆止舍人引宫臣行首一人進詣奉慰位跪奉慰俯伏興引退還本位舍人贊拜宫臣在位者皆再拜舍人引宫臣等出其六品以下位於門外者典謁贊拜贊哭止引退皆如門內之儀左庶子跪奏請哭止俯伏興還本位皇太子止升腰輿還侍衛至閣如常其日晡哭則日晡前二刻奏嚴一刻奏辦皇太子仍初服出即位次哭如初其宫臣等非近侍者其日晡臨不集皇太子於師保傅奉慰再拜則左庶子奏興受答再拜乃坐哭自後本服周者三朝哭而止本服大功者其日晡哭而止本服小功以下一舉哀而止其有皇子皇孫應陪舉哀者皇子則位於皇太子之下絶位皇孫則位於東間之南北面與皇太子俱哭於引宫臣以下退已乃贊止引退其應拜慰者引進跪奉慰如常禮自下皆然為良娣舉哀右與為諸王妃主舉哀禮同其異者於內外殿三朝哭而止為良媛等舉哀右與良娣禮同一舉哀而止為外祖父母舉哀并成服母舉哀并成服禮同為妃父本司散下其禮所司隨職供辦齋師先於東宫别殿北壁下設素下牀席為皇太子舉哀成服位南向有司先製皇太子小功五月之服其為妃父母則製緦麻三月之服所司先於重明門外之左右量設宫臣以下次其日舉哀前三刻左庶子版奏請中嚴舉哀前二刻諸衛屯門列仗如常掌儀於舉哀殿前設宫臣五品以上哭位文東武西重行北面相對為首又設一品以下九品以上哭位於舉哀殿門外亦如之又於階下當舉哀位北向設奉慰位宫臣應陪臨者並赴集便次改服素服齋師以篋奉衰服升立於殿東間北面立典謁引一品以下九品以上俱就門外位文武侍衛之官詣閣奉迎舉哀前一刻左庶子版奏外辦至時皇太子服素服升輿出升别殿降輿即哭位侍衛如常儀左庶子跪奏請為故某官若某郡君舉哀俯伏興皇太子哭十五舉聲左庶子跪奏請哭止成服俯伏興皇太子止哭齋師以篋奉服進跪授興仍贊變服焉于變服則權設步障已而去之成服已左庶子又跪奏請哭俯伏興皇太子哭通事舍人引宫臣五品以上入就殿前位舍人贊拜宫臣在位者皆再拜舍人贊哭宫臣在位者皆哭十五舉聲舍人贊止宫臣在位者皆止舍人引宫臣行首一人進詣奉慰位跪奉慰俯伏興舍人引退還本位舍人贊拜在位者皆再拜舍人引五品以上退出其六品以下位於門外者典謁贊拜贊哭贊止引退如門內之儀左庶子跪奏請哭止俯伏興還本位皇太子止升腰輿還侍衛從至閣如初其日晡哭則晡前二刻奏嚴一刻奏辦皇太子服衰服出即位次哭如初宫官不集自後朝晡凡三日而止為外祖父母除服為妃父母除服禮同皇太子除外祖父母喪服之制本司散下其禮所司隨職供辦守宫先於重明門外之左右設宫臣次如初於除服前之夕有司於别殿設下牀席焉其日平明而除服外祖父母則五月妃父母則三月並先於下旬之吉也其從朝制公除則外祖父母五日妃父母三日而除之於除服前三刻左庶子版奏請中嚴諸衛率屯門列仗如常掌儀於别殿前設宫臣位如初又設奉慰位如初又設一品以下九品以上位於别殿門外如初宫官文武應陪臨者並赴集便次各改服素服掌儀引就門外位齋師以篋奉素服吉履升殿東間北面立腰輿詣寢庭侍衛之官詣閣奉迎如常式除服前一刻左庶子版奏外辦皇太子仍衰服御輿出升堂降輿即位其近侍之官從升侍衛夾引如常儀左庶子跪奏請哭俯伏興皇太子哭十五舉聲左庶子跪奏請哭止除服俯伏興皇太子止齋師奉衣履進跪受興仍贊變服焉於變服權設步障已而去之也變服已左庶子跪奏請哭俯伏興還本位皇太子哭通事舍人引宫臣五品以上入各即班位舍人贊拜宫臣在位者皆再拜舍人贊哭宫臣在位者皆哭十五舉聲舍人贊止宫臣在位者皆止舍人引宫臣文武行首一人進詣奉慰位跪奉慰俯伏興引退還本位舍人贊拜宫臣在位者皆再拜舍人引宫臣等出其六品以下位於門外者典謁贊拜贊哭贊止引退如門內之儀左庶子跪奏請哭止還俯伏興皇太子止御輿降還近侍詣閣侍衛從至閣如常儀皇太子於師傅保奉慰再拜則左庶子奏興受答再拜乃坐哭皇太子為外祖父母除服則皇子等位於太子之下差退即位次哭變服素服又哭引退如皇太子之儀其皇孫等服素服侍者引即庭拜引升位於東間之南北面與皇太子俱哭於皇太子變服已重哭則引進皇太子前跪奉慰俯伏興再拜復位哭於宫官等退贊哭止引復階下位拜退為師傅保舉哀右與為諸王舉哀禮同其異者一舉哀而止為宗戚舉哀右與為妃主舉哀禮同其異者一舉哀而止為宫臣舉哀右與為諸王舉哀禮同其異者一舉哀而止舉哀通三品以上餘隨恩賜之深淺臨喪臨諸王妃主喪皇太子臨諸王妃主之喪本司散下其禮所司隨職供辦守宫先于重明門外之左設三師等次又于主人第大門外之右設皇太子便次南向又于大門外之左右隨便設諸陪從之官次其所臨者五屬之親先入列於主人之第其執事預于寢北設障幰為主人五屬婦女拜哭次其日出宫前四刻左庶子版奏請中嚴出宫前三刻捶一鼓為一嚴三嚴時莭前一日左庶子奏裁二衛率等備列常行仗衛鹵簿于所出宫門外內如常儀出宫前二刻又捶二鼓為再嚴奉禮於重明門外之左右設宫官從者位文東武西重行相對皆以北為上齋師於主人第大門外次內設皇太子座南向又於主人堂上中間近北設素下牀席為皇太子哭位南向掌儀於主人庭中設從官之位文東武西北面重行相對為首又於皇太子座前階下設奉慰位主人執事於堂下設五屬之親位於東階之東重行西面北上以服精粗為序而尊者差前又設五屬婦女位於堂北幔下主女位於東廂西向南上妻妾位於西廂東面南上衆婦人位於北廂南面諸婦在西諸親在東相對為首俱以服精粗為序而尊者差前五屬內外並陪臨於此所其陪從宫官以下皆常服赴集其位有司整列皇太子四望車及副車仗衛之屬應列鹵簿者於外內如常儀出宫前一刻又捶三鼓為三嚴諸侍衛之官俱詣閣奉迎左庶子版奏外辦皇太子服常服升輿以出扇蓋及侍從如常儀皇太子降輿升車中允進跪奏稱中允臣某言請車發俯伏興退復位凡中允奏請皆進跪奏稱某官臣某言訖俯伏興車動中允與贊者夾引以出至侍臣上馬所中允奏稱請車權停令侍臣上馬左庶子承令退稱令曰諾中允退稱侍臣上馬贊者承傳文武侍臣皆上馬畢中允奏稱請車發退復位皇太子車動鼓吹不作三師乘車訓導三少乘車訓從宫官文武應陪者皆乘馬以從如常至主人門外次前左庶子進跪奏請降車俯伏興還侍立皇太子降車升輿入次前其車輿以下鹵簿仗衛之屬列於次前之左右皇太子變服素服其陪從之官各就次變服素服侍臣武官不變服相者引主人內外五屬之親各衰服就堂下次位掌儀一人立於堂下東階東南贊者二人立於其南差退俱西面皇太子變服訖升輿出侍衛左右如初主人免絰去杖相者引出門外望見輿止哭再拜迎引主人先入門右西面立不哭其未殯則通拜迎拜送於大門內相者贊衆主人以下皆止哭皇太子至堂左庶子跪奏請降輿升俯伏興於所陪之喪非尊者則仍輿升堂皇太子降輿升自東階即哭位應拜者則奉引拜靈乃哭侍臣夾引列於户內外及階下之左右其仗衛鹵簿止列於門外內之左右並如常儀司儀引主人進中庭北面掌儀稱拜主人以下應拜者皆再拜令引主人升司儀引主人升立於户內之東西面左庶子跪奏請哭俯伏興皇太子哭掌儀稱哭贊者承傳唱可哭凡掌儀有詞贊者皆承傳主人以下及在位者皆哭通事舍人引諸從官應陪位者即班位立定掌儀稱拜從官在位者皆再拜掌儀稱哭從官在位者皆哭十五舉聲掌儀稱止從官在位者皆止通事舍人引從官行首一人進詣奉慰位跪奉慰俯伏興引退還本位掌儀稱拜從官在位者皆再拜訖舍人引從官出左庶子跪奏請哭止撫慰主人俯伏興皇太子止興就主人前執手訖主人再拜皇太子復位哭又盡一哀凡所臨非本服五屬之親則一哀而止左庶子跪奏請哭止俯伏興皇太子止掌儀稱止主人以下在位者皆止司儀引主人降立於庭中之東北面掌儀稱拜主人以下在位者皆再拜左庶子奏請還皇太子降升輿出侍衛如初司儀引主人先出俟於大門外奉拜皇太子至次降輿即位常服司儀引主人哭以還廬次皇太子停大次未發前三刻左庶子版奏請嚴有司依式預奏三嚴每嚴捶鼓如初二衛率等整列仗衛鹵簿還塗如來儀奉禮設宫官陪從者位於皇太子次前道左文武皆重行向道陪從之官各於次變服訖謁者各引就班位三嚴已左庶子又奏外辦皇太子升輿出升車還宫左庶子奏請及宫官陪從不鳴鼓吹皆如來儀到重明門外宫官文武皆下馬三師三少各還皇太子至殿前回車南向左庶子跪奏請降車俯伏興皇太子降車乘輿入侍臣從至閣庶子奏請解嚴將士各還其所宫官皆退臨外祖父母喪臨妃父母喪臨師傅保喪臨宗戚喪臨宫臣喪右與臨諸王妃主喪禮同其臨諸妃主以下內喪則並於前寢次其尊親應就喪殯寢者則臨殯寢可凡所臨諸王妃主以下喪若未殯若已殯或啓引或臨練皆以本服親疏及恩賜淺深而為疏數之異其親臨之儀及主人迎待之式其禮如初其所臨者若鄰宫闕率爾往還則容不備常行仗衛與嚴鼓皆稟當時旨而為儀注其宫臣陪從文武之官亦準臨時備略備之言警衛備也略之言不偹皇太子每過太廟則左庶子奏式過乃復常遣使弔遣使弔諸王妃主喪本司散下其禮所司隨職供辦守宫先於主人第大門外之右設使者次南面其日使者至掌次者引之次內外衰服司儀引主人以下俱立哭於東階下婦人立哭於殯所如常儀使者素服出次司儀引使者立於大門外之西東面史二人以案奉令書隨立於使者之南差退俱東面司儀入告主人去杖免絰司儀引主人出門止哭迎於大門外見賓先入立於門右北面立司儀引使者以下入內外止哭使者入門而左立於階間南面持案者立於使者西南東面司儀引主人進當使者前北面史以案進詣使者前使者取弔書持案者退復位使者稱有令弔主人哭拜稽顙內外皆哭司儀引主人進受弔書退立於東階下西面哭司儀引使者以下出就門外位主人以弔書授左右司儀引主人出內外止哭拜送於大門外使者還主人杖哭而入取弔書於階下升奠於柩東使人若須私弔則通名引弔如常禮引出遣使弔外祖父母喪遣使弔妃父母喪遣使弔師傅保喪遣使弔宗戚喪遣使弔宫臣喪遣使弔上臺貴臣喪右禮與弔諸王妃主喪同賻贈其所弔宫臣喪葬若有賻贈之禮與弔使俱行則有司預備物數其日使者至主人第大門外便次物陳於使者幕南東西為列使者以下入即庭中位物隨入陳於使者位南亦東西為列於使者出主人有司受而以東其特行也亦準弔禮致奠遣使致奠外祖父母喪本司散下其禮所司隨職供辦守宫於主人大門外量設便次使者至掌次者引之次內外衰服司儀引主人以下俱就東階下位婦人就堂上位皆立哭使者公服出次謁者絳公服引立於門西東面執事者陳牢饌於使者東南當門北向西上司儀入告主人去杖司儀引主人出內門止哭迎於大門外見賓先入立於門右北面謁者引使者入內外止哭使者升自東階立於柩東少北南面執事者以牢饌入升設於柩東西向南上司儀引主人升自西階立於階上當使者北面執事者酌酒西向奠於席退復位使者曰某封若某郡君將歸幽宅令使某奠主人降詣階間北面哭拜稽顙內外俱哭謁者引使者及從者出復門外位初主人拜稽顙訖司儀引主人退哭於東階下使者出司儀引主人出內門止哭拜送於大門外使者還主人杖哭而入遣使致奠妃父母喪遣使致奠師傅保喪遣使致奠宫貴臣喪右與致奠外祖父母喪同大唐開元禮卷一百三十六
