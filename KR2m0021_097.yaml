body:
  text: 大唐開元禮卷九十七唐蕭嵩等撰嘉禮皇帝元正冬至受羣臣朝賀并會皇帝千秋節受羣臣朝賀并會皇帝元正冬至受羣臣朝賀并會前一日尚舍奉御設御幄於太極殿北壁下南向鋪御坐如常守宫設羣官各使等次於東西朝堂太樂令展宫懸于殿庭設麾于殿上西階之西東向一位於樂懸東南西向鼓吹令分置十二案於建鼓之外乘黃令陳車輅尚輦奉御陳輿輦尚舍奉御又設解劍席於懸西北橫街之南並如常儀設文官三品以上位於橫街之南道東褒聖侯于三品之下介公酅公位于道西武官三品以上於介公酅公之西少南俱每等異位重行北面相對為首設文官四品五品位於懸東六品以下於橫街之南每等異位重行西面北上設諸州朝集使位都督刺史及三品以上東方南方於文官三品之東重行北面西上西方北方於武官三品之西重行北面東上四品以下皆分方位于文武官當品以下諸州使人分方立於朝集使之下亦如之設諸親位于四品五品之南皇親在東異姓親在西設諸方客位三等以上東方南方于東方朝集使之東每國異位重行北面西上西方北方于西方朝集使之西每國異位重行北面東上四等以下分方位於朝集使六品之下每等重行異位設典儀位于懸之東北贊者二人在南少退俱西面奉禮設門外位文官于東朝堂每等異位重行西面褒聖侯于三品之下介公酅公于西朝堂之前武官于介公之南少退每等異位重行東面諸親位于文武官四品五品之南皇帝宗親在東異姓親在西設諸州朝集使位東方南方于宗親之南每等異位重行西面西方北方于異姓親之南每等異位重行東面諸州使人分方位于朝集使之下亦如之諸方客位東方南方于東方朝集使之南每國異位重行西面北上西方北方于西方朝集使之南東面北上其日依時刻將士填街諸衛勒所部列黃麾大仗屯門及陳于殿庭如常儀群官諸親客使集朝堂皆就次各服其服侍中版奏請中嚴近仗就次陳於閣外太樂令帥工人入就位協律郎入就舉麾位諸侍衛之官各服其器服符寶郎奉寶俱詣閣奉迎典儀帥贊者先入就位吏部兵部主客户部贊羣官客使俱出次通事舍人各引就朝堂前位乂通事舍人引四品以下及諸親客使等應先直者入就位侍中版奏外辦皇帝服衮冕冬至則服通天冠絳紗袍御輿出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應協律郎俯伏舉麾鼓柷奏太和之樂鼓吹振作皇帝出自西房即御坐南向坐符寶郎奉寶置于御坐如常協律郎偃麾戛敔樂止通事舍人引王公以下及諸客使等以次入就位皇太子若來朝皇太子朝出訖典謁引王公以下入公初入門舒和之樂作公至位樂止羣官客使等立定典儀曰再拜贊者承傳羣官客使等皆再拜訖通事舍人引上公一人詣西陛公初行樂作至解劍席樂止公就席脫舄跪解劍置於席俯伏興通事舍人引升階進當御坐前北面跪賀稱某官臣某言元正首祚景福惟新伏惟開元神武皇帝陛下與天同休冬至云天正長至伏惟陛下如日之升俯伏興通事舍人引降陛詣席後上公跪著劍俯伏興納舄樂作復橫街南位樂止羣官客使等俱再拜侍中前承詔降詣羣官東北西面稱有制羣官客使等皆再拜宣制曰履新之慶與公等同之冬至云履長之慶與公等同之宣制訖羣官客使等皆再拜訖舞蹈三稱萬嵗訖又再拜侍中還侍位初羣官將朝中書侍郎以諸州鎮表為一案候於右延明門外給事中以祥瑞案俟于左延明門外俱令史絳公服對舉案侍郎給事中俱就侍臣班於班初入户部以諸州貢物陳於太極門東東西廂禮部以諸蕃貢物量可執者蕃客手執入就內位其重大者陳于朝堂前初上公將入門中書侍郎降引表案入詣西階下東面立給事中降引祥瑞案入詣東階下西面立上公將升賀中書令黃門侍郎降各立階下初上公升階中書令黃門侍郎各取所奏之文以次升上公賀訖中書令前跪奏諸方表訖黃門侍郎又進跪奏祥瑞訖俱降置所奏之文于案各還侍位侍郎與給事中引案退至東西階前案遂出侍郎給事中還侍位初侍中宣制訖朝集使及蕃客皆再拜訖户部尚書進詣階間北面跪奏其尚書奏仍待黃門侍郎奏祥瑞訖稱户部尚書臣某言諸州貢物請付所司俯伏興侍中前承制退稱制曰可尚書退復位禮部尚書以次進詣階間北面跪奏稱禮部尚書臣某言諸蕃貢物請付所司俯伏興侍中前承制退稱制曰可尚書退復位侍中還侍位太府帥其屬受諸州及諸蕃貢物出歸仁納義門執物者隨之典儀曰再拜通事舍人以次引北面位者出公初行樂作出門樂止侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞𬎼賔之鐘左五鐘皆應奏太和之樂鼓吹振作皇帝降坐御輿入自東房侍衛警蹕如來儀侍臣從至閣樂止通事舍人引東西面位者以次出蕃客先出其冬至朝則不改奏祥瑞貢物又無諸方表會朝訖太樂令設登歌於殿上引二舞入立於懸南尚舍奉御鋪羣官升殿者坐文官三品以上於御座東南西向褒聖侯於三品之下介公􅀈公於御坐西南東向武官三品以上於介公􅀈公之後朝集使都督刺史及三品以上東方於文官三品之後西方北方於武官三品之後蕃客三等以上東方南方於東方朝集使之後西方北方於西方朝集使之後俱重行每等異位以北為上設不升殿者坐各於其位又設羣臣解劔席於懸之西北橫街之南並如常儀尚食奉御設夀樽於殿上東序之端西向設坫於樽南加爵一太官令設升殿者酒樽於東廂近北設殿庭羣官酒樽各於其坐之南皆有坫羃俱障以帷施設訖吏部兵部户部主客贊羣官客使俱出次通事舍人各引就朝堂前位典儀帥贊者先入就位通事舍人各引非升殿者次入就位侍中版奏外辦皇帝改服通天冠絳紗袍冬至則不改服御輿以出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應奏太和之樂鼓吹振作皇帝出自西房即御坐南向坐符寶郎奉寶置於御坐如常樂止典儀一人升就東階上西面立通事舍人引公王以下及諸客使以次入就位公初入門樂作至位樂止羣官客使立定若期會别日設位贊拜陳列如朝禮其日二舞與工人俱入就位侍中進當御坐前北面跪奏稱侍中臣某言請延諸公王等升俯伏興又侍中稱制曰可侍中詣東階上西面稱制延公王等升殿上典儀承傳階下贊者又承傳羣官客使皆再拜侍中還侍位羣官拜訖通事舍人引應升殿者詣東西階公初行樂作至解劔席樂止公王以下各脫舄跪解劔置于席上俯伏興通事舍人接引上公一人升階少東西面立以下各位于坐後立定光祿卿進詣階間跪奏稱臣某言請賜羣臣上夀俯伏興侍中稱制曰可光祿卿進詣酒樽所西向立通事舍人引上公詣酒樽所北面立尚食奉御酌酒一爵授上公上公搢笏受爵通事舍人引上公退北面跪稱某官臣某等稽首言元正首祚冬至云元正長至臣等不勝大慶謹上千萬嵗夀俯伏興再拜羣官客使等上下俱再拜立于席後侍中前承制退稱敬舉公等之觴群官客使等上下又再拜殿中監取爵奉進近臣遞進皇帝舉酒休和之樂作羣臣客使等上下皆舞蹈三稱萬嵗皇帝舉酒訖殿中監進受虛爵以授尚食奉御奉御受爵復於坫樂止初殿中監受虛爵殿上典儀唱再拜階下贊者承傳羣官客使等上下皆再拜通事舍人引上公就坐後立殿上典儀唱就坐階下贊者承傳羣官客使等上下皆就坐俯伏坐太樂令引歌者及琴瑟至階脫履於下升就位坐其笙管者進詣階間北面立尚食奉御進酒至階殿上典儀唱酒至興階下贊者承傳羣官客使等上下皆俯伏起立於席後殿中監到階省酒尚食奉御奉酒進皇帝舉酒太官令又行羣官酒酒至殿上典儀唱再拜階下贊者承傳羣官客使等皆再拜搢笏受觶殿上典儀唱就坐階下贊者承傳羣官客使等上下皆就坐俯伏坐飲皇帝初舉酒登歌作昭和之樂三終尚食奉御進受虛觶復于坫登歌訖降復位觴行三周尚食奉御進御食食升階殿上典儀唱食至興階下贊者承傳羣官客使等上下皆執笏俯伏興起立坐後殿中監到階省案尚食奉御品嘗食訖以次進置御前太官令又行羣官案御若不食羣官案先上訖不須興設食訖殿上典儀唱就坐階下贊者承傳羣官客使等上下皆就坐俯伏坐皇帝乃飯休和之樂作羣官客使上下俱飯御食畢樂止仍行酒遂設庶羞太樂令引二舞以次入作若賜酒侍中承詔詣東階西向稱賜酒殿上典儀承傳階下贊者又承傳羣官客使等上下皆執笏俯伏起再拜搢笏立受觶就席俯伏坐飲訖俯伏起立授虛爵執笏又再拜就坐酒行十二遍會畢殿上典儀唱可起階下贊者承傳羣官客使等上下皆俯伏起立席後通事舍人引降階俱詣席後跪著劔俯伏興納舄樂作復橫街南位樂止位于殿庭者仍立于席後立定典儀曰再拜贊者承傳羣官客使等在位皆再拜位于殿庭者拜于席後若有敕賜物侍中前承制降詣羣官東北西面稱有制羣官客使等皆再拜侍中宣制訖羣臣客使等又再拜通事舍人引羣官客使等以次出公初行樂作出門樂止侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞𬎼賔之鐘左五鐘皆應奏太和之樂鼓吹振作皇帝降坐御輦入自東房侍衛警蹕如來儀侍臣從至閣樂止通事舍人引東西面者以次出蕃客先出皇帝若服翼善冠袴褶則京官著袴褶朝集使著公服升坐者脫履如式若設九部樂則去樂懸無警蹕太樂令設九部伎位于左右延明門外羣官初唱萬嵗太樂令即引九部伎聲作而入各就位以次作如式皇帝千秋節御樓受羣臣朝賀前三日所司供偹如式前一日尚舍鋪御坐及內外張設並如尋常御樓之儀尚舍光祿供辦如式尚食預置夀樽于樓上御坐之東義置夀樽于樓前之東南皆有盞斚其日平曉陳列仗衛如常儀百官常服咸就橫街南依東西班序立侍中版奏外辦皇帝御座候卷簾通事舍人分引羣官詣橫街北夀樽之西俱北面中書門下及供奉官如常式立定典儀贊再拜橫街南北百官俱再拜訖尚食奉御酌夀酒以授殿中監殿中監以授侍中侍中執酒正立殿中監受侍中之酒侍中執笏稍前跪奏稱千秋令節臣等不勝大慶謹上千萬嵗夀奏訖興再拜羣官上下皆再拜所司酌夀樽之酒以進皇帝受酒承制宣云得卿等夀酒與卿等內外同慶皇帝舉酒羣官上下又再拜三呼萬嵗舞蹈又再拜訖詣坐所太官令酌酒以進侍中執酒以出羣官等俱出謝酒訖就位太常卿引樂如常儀其橫街南羣官應有常食者引就坐如式餘退其羣官所獻甘露醇酎上食等所由並其日平曉于樓之便門奉進會畢樓上褰簾羣官各出就位立定典儀贊再拜羣官等俱再拜若臨時别有進止隨事贊相垂簾羣官退大唐開元禮卷九十七
