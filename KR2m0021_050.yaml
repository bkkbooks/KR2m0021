body:
  text: 大唐開元禮卷五十唐蕭嵩等撰吉禮有司享先代帝王前享五日諸享官各散齊三日於正寢致齊二日於其廟所無廟者祭於壇其壇制准州社壇散齊理事如舊唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊唯享事得行其餘悉斷其祭官已齊而闕者通攝行事其祭官以當州長官充以次通取諸享官致齊之日給酒食及明衣各習禮於齊所前一日所管縣官清掃內外整拂神坐無廟者享日未明縣官帥其屬入詣壇東陛升設神坐于壇上近北南向席以莞已後陳設行事皆依准在廟之位設配坐於神坐東南西向席以莞又為瘞坎于廟後壬地方深取足容物贊禮者設初獻位於東階東南亞獻終獻位於初獻之南少退俱西面北上設掌事者位于終獻東南重行西向以北為上設贊唱者位於終獻西南西向北上設望瘞位於廟堂東北西向又設贊唱者位於瘞坎東北南向東上設享官以下位於南門之外道東重行西向以北為上無廟者即設享官以下位於壇東壝門之外道南重行北向西上祭器之數每坐樽六籩十豆十簋二簠二鈃三俎三縣官帥其屬升設尊於廟堂上前楹間室户之外北向正坐之樽在西配坐之樽在東樽皆加勺羃有坫以置爵正坐爵一配坐爵四設幣篚於樽所設洗於東階東南北向東西當東霤南北以堂深罍水在洗東篚在洗西南肆實爵三巾二在篚加勺羃執尊罍洗篚者各位於尊罍洗篚之後享日未明烹牲於厨夙興掌饌者實祭器牲體牛羊豕皆載右胖前腳三節節一段皆載之後腳三節節一段去上節載下二節又取正脊脡脊橫脊正脅代脅短脅各二骨以並餘皆不設簋實稷黍簠實稻梁籩十實石鹽乾魚棗栗榛菱芡鹿脯白餅黑餅豆十實韭葅醘醢菁葅鹿醢芹葅兔醢笋俎魚醢脾析葅豚胉若土無者各以其類充之諸享官以下各服祭服三品毳冕四品絺冕五品𤣥冕六品以下爵辨縣官帥其屬入實樽罍及幣每坐之尊一實醴齊一實盎齊一實清酒其𤣥酒各實於上尊幣用帛長一丈八尺色用白祝版各置於坫贊唱者先就位祝與執尊罍篚者入立於庭重行北面以西為上立定贊唱者曰再拜祝以下俱再拜執尊者升自東階壇則升自東陛以後准此立於尊所執尊罍篚者各就位升自東階行掃除於上降行掃除於下訖各引就位質明贊禮者引享官以下俱就門外位少頃贊禮者引享官以下以次入就位立定贊唱者曰再拜在位者皆再拜贊禮者進初獻之左白有司謹具請行事退復位祝跪取幣於篚各立於尊所凡取物者皆俯伏跪取而後興奠物則跪奠訖俯伏而後興掌饌者帥執饌者奉饌陳於南門之外壇則奉饌陳於東壝門外贊禮者引初獻升自東階壇則升自南陛已後初獻升降皆准此進當神坐前北面立祝以幣東向進初獻受幣祝還尊所贊禮者引初獻入跪奠於神坐興出户北向再拜贊禮者引初獻入當配坐西壁下東面立祝以幣北向進初獻受幣祝還樽所贊禮者引初獻進東面跪奠於配坐興退復位東面再拜贊禮者引初獻降復位掌饌者引饌入升自東階壇則升自南陛祝迎引於階上各設於神坐前掌饌者帥執饌者各復本位祝還尊所贊禮者引初獻詣罍洗盥手洗爵升自東階詣酒尊所執尊者舉羃初獻酌醴齊贊禮者引初獻入詣神坐前北向跪奠爵興出户北向立祝持版進於神坐之右東面跪讀祝文訖興初獻再拜祝進跪奠版於神坐興還尊所贊禮者引初獻詣配坐酒尊所取爵於坫執尊者舉羃初獻酌醴齊贊禮者引初獻入東面跪奠於配坐前興退立於西壁下東面立祝持版入立於配坐之左北面跪讀祝文訖興初獻再拜祝進跪奠版於配坐興還尊所贊禮者引初獻出户北向立各以爵酌清酒合置一爵一祝持爵進初獻之右西向立初獻再拜受爵跪祭酒啐酒奠爵興祝各帥執饌者以俎跪减神坐前三牲胙肉各取前腳第二骨共置一俎上以授初獻初獻受以授掌饌者初獻跪取爵遂飲卒爵祝受爵復於坫初獻興再拜贊禮者引初獻降復位於初獻飲福贊禮者引亞獻詣罍洗盥手洗爵升自東階詣酒尊所執尊者舉羃亞獻酌盎齊贊禮者引亞獻入詣神坐前北向跪奠爵興出户北向再拜贊禮者引亞獻詣配坐酒尊所取爵於坫執尊者舉羃亞獻酌盎齊贊禮者引亞獻入詣配坐前東面跪奠爵興退於西壁下東面再拜出户北向立祝各以爵酌清酒合置一爵一祝持爵進于亞獻之右西面立亞獻再拜受爵跪祭酒遂飲卒爵祝受爵復於坫亞獻興再拜贊禮者引亞獻降復位初亞獻獻將畢贊禮者引終獻盥洗升獻飲福如亞獻之儀訖贊禮者引終獻降復位祝各進神坐前跪徹豆興還樽所徹者籩豆各一少移于故處贊唱者曰再拜非飲福受胙者皆再拜再拜訖贊唱者又曰再拜獻官已下皆再拜贊禮者進初獻之左白請就望瘞位贊禮者引初獻就望瘞位西向立贊唱者轉立於望瘞東北位初獻官拜訖祝各進神坐前跪取幣興降自西階壇則降自南陛詣瘞坎北南面以幣置於坎贊唱曰可瘞坎東西面各二人置土半坎贊禮者進初獻之左白禮畢遂引初獻以下出贊唱者還本位祝與執尊罍者俱復執事位立定贊唱者曰再拜祝以下皆再拜以出祝版焚於齊所帝嚳祭文維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具官姓名敢昭告于帝髙辛氏惟帝能序三辰功施萬物式遵祠典敬以犧齊粢盛庶品祗薦于帝髙辛氏尚饗帝堯祝文維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具官姓名敢昭告于帝陶唐氏惟帝則天行化光被四表式遵祠典敬以制幣犧齊粢盛庶品祗薦于帝陶唐氏尚饗配坐祝文維某年嵗次月朔日子嗣開元皇帝遣官姓名敢昭告于唐司徒惟公敬敷五教𢎞贊彞倫率由舊章配享於帝陶唐氏敬以制幣犧齊粢盛庶品明薦于唐司徒公尚饗帝舜祝文維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具官姓名敢昭告于帝有虞氏惟帝道光七政績宣五典式遵故實敬以制幣犧齊粢盛庶品祗薦于帝有虞氏尚饗配坐祝文維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具官姓名敢昭告于臯陶氏伏惟爰定五刑載敷九德率由舊典配享于帝有虞氏敬以制幣犧齊粢盛庶品明薦于臯陶氏尚饗夏王禹祝文惟某年嵗次月朔日子嗣開元神武皇帝諱謹遣具官姓名敢昭告于夏王禹惟王克平九土功施萬代式遵故實敬以制幣犧齊粢盛庶品祗薦于夏王禹尚饗配坐祝文維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具官姓名敢昭告于伯益氏惟公贊敷下土克蕃庶物率由舊章配享于夏王禹祗以犧齊粢盛庶品明薦于伯益氏尚饗殷王湯祝文維某年月朔日子嗣開元神武皇帝諱謹遣具官姓名敢昭告于殷王湯惟王革命黜暴功濟天下式遵祠典敬以制幣犧齊粢盛庶品祇薦于殷王湯尚饗配坐祝文維某年嵗次月朔日子嗣開元神武皇帝謹遣具官姓名敢昭告于伊尹氏惟公弼諧政道功格天地率由故實配享於殷王湯敬以制幣犧齊粢盛庶品明薦于伊尹氏尚饗周文王祝文維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具官姓名敢昭告于周文王維王受命作周經緯天地式遵祠典敬以制幣犧齊粢盛庶品祗薦于周文王尚饗配坐祝文維某年嵗次月朔日子嗣開元神武皇帝遣具官姓名敢昭告于齊太公惟公純德孔明翼成周室率由舊典配享于周文王敬以制幣犧齊粢盛庶品明薦于齊太公尚饗周武王祝文維某年嵗次月朔日子嗣開元神武皇帝謹遣具官姓名敢昭告于周武王惟王應天順人克定禍亂式遵祠典敬以制幣犧齊粢盛庶品祗薦于周武王尚饗配坐祝文維某年嵗次月朔日子嗣開元神武皇帝遣具官姓名敢昭告于周文公召康公惟公道克十亂功著分陜率由舊典配享於周武王敬以制幣犧齊粢盛庶品明薦于周文公召康公尚饗漢髙帝祝文維某年嵗次月朔日子嗣開元神武皇帝諱謹遣具官姓名敢昭告于漢髙帝惟帝神武應期載安區夏式遵祠典敬以制幣犧齊粢盛庶品祗薦于漢髙帝尚饗配坐祝文維某年嵗次月朔日子嗣開元神武皇帝遣具官姓名敢昭告于蕭相國惟公翼成漢業厥功惟茂率由舊章配享于漢髙祖敬以制幣犧齊粢盛庶品明薦于蕭相國尚饗大唐開元禮卷五十
