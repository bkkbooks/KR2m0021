body:
  text: 大唐開元禮卷一百二十一唐蕭嵩等撰嘉禮六品以下嫡子冠將冠筮於正寢之堂若有廟者於廟門外如五品以上之儀主人謂將冠者之父兄公服立堂上楹間近東西向掌事者立於楹間近東西面北上布筮席於主人之西西面筮者開韇出策兼執之東面受命於主人主人曰為嫡子某某日加冠庶幾從之筮者曰諾進就筮席西面以韇擊策遂述曰假爾太筮有常某為嫡子某日加冠庶幾從之乃釋韇坐筮訖興降席東面稱占曰從筮者退若不吉則筮逺日如初儀贊禮者進主人之左告禮畢掌事者徹筮席前三日筮賔如求日之儀筮賔筮其可使冠子者前二日主人戒賔及贊冠者主人至賔大門外掌次者引之次主人公服出次立於門外之西東面賔公服立於阼階下西面儐者公服立於賔之左北面受命出立於門東西面曰敢請事主人曰某之子某將冠請某子教之相稱各隨官爵儐者入告賔出立於門東西面再拜主人答拜主人曰某之子某將加冠願吾子教之賔曰某不敏恐不能供事以辱於吾子敢辭主人曰某猶願吾子教之賔曰吾子重有命某敢不從主人再拜賔答拜主人還賔拜送主人戒贊冠者亦如之亦通使子弟戒之前一日掌事者設次於大門外之右南向其日夙興贊者設洗於正寢阼階東南東西當東榮南北以堂深罍水在洗東加勺羃篚在洗西南肆實巾一爵一於篚加羃席於東房內西牖下無房者張帷為之陳服於席東領北上爵辨服青衣纁裳白紗中單青領褾襈裾革𢃄鈎䚢大帶練帶紕其垂內外以緇紉約用青組爵鞸白襪赤履庶人介幘絳公服方心革帶紉䚢假帶襪履進賢冠服絳紗單衣白紗中單皂領褾襈裾白裙襦赤裙衫革𢃄鈎䚢假帶曲領方心絳紗蔽膝八品九品去中單曲領蔽膝白襪黑舄八品以下黑履庶人黑介幘服白裙襦青領革襪履緇布冠服青衣素裳素鞸中單革帶與爵辨服同襪履與進賢冠服同庶人帶襪履與介幘服同去鞸緇纚櫛簮同箱在服南纚今用皂巾方六寸屬帶於前兩隅蒲筵四緇布純又在南側樽甒醴在服北加勺羃設篚在樽北實角觶角柶各一加羃陳饌於篚北柶以角為之狀如匕饌用特牲一俎二籩二豆牲體節折加離肺籩實脯棗豆實葅醢設洗於東房近北罍水在洗西篚在洗東北肆實以巾質明賔贊至於主人大門外掌次者引之次賔贊公服諸行事者各服其服無公服者常服執樽罍篚者皆就位爵辨𤣥纓角導庶人則黑介幘進賢冠一梁纓青緌角導庶人則黑介幘緇布冠青組纓冠辨各一箱各一人執之待於西階之西東面北上設主人之席於阼階上西面賔席於西階上東面冠者席於主人東北西面主人公服立於阼階下當東序西面諸親公服非公服者常服立於罍洗東南西面北上尊者停别室儐者公服立於門內道東北面將冠者雙童髻空頂幘導綵袴褶錦紳烏皮履立於房內南面主人之贊冠者公服立於房內户東西面賔及贊冠者出次立於門西贊冠者少退俱東面北上儐者進於主人之左北面受命出立於門東西面曰敢請事賔曰某子有嘉禮命某執事儐者入告主人迎賔於大門外之東西面再拜賔答拜凡賔主拜揖入出皆贊禮者相導主人揖贊冠者冠者報揖主人又揖賔賔報揖主人入賔及贊冠者次入及內門主人揖賔賔報揖主人與賔入贊冠者從之至內霤將曲揖賔報揖至階主人立於階東西面賔立於階西東面主人曰請吾子升賔曰某備將事敢辭主人曰固請吾子升賔曰某敢固辭主人曰終請吾子升賔曰某敢終辭主人升自阼階立於席東西向賔升自西階立於席西東面贊冠者及庭盥手洗升自西階入於東房立於主人贊冠者之南俱西面主人贊冠者引將冠者出立於房户外之西南面賔之贊冠者取纚櫛簮箱跪奠於冠者筵南端興席北少東西面立賔揖將冠者賔主俱即席坐將冠者進升席西面坐賔之贊冠者進筵前東面跪脫雙童髻置於簮櫛畢設纚興復位立賔主俱興賔降盥主人從降賔東面辭曰請吾子不降主人曰吾子降辱敢不從降賔至罍洗盥手訖詣西階賔主一揖一讓升主人立於席後西面賔立於西階上東面執緇布冠者升賔降一等受之右執頂左執前進將冠者筵前東向立祝曰令月吉日始加元服棄爾幼志順爾成德壽考維祺介爾景福乃跪冠興復西階上席後東面立賔之贊冠者進筵前東面跪結纓興復位冠者興賔揖冠者冠者適房賔主俱坐冠者著青衣素裳之服出房户西南面立賔主俱興賔揖冠者冠者進升於席西向坐賔之贊冠者跪脫緇布冠置於箱櫛畢設纚興復位賔降二等受進賢冠庶人則黑介幘右執頂左執前進冠者筵前東向立祝曰吉月令辰乃申爾服敬爾威儀淑慎爾德眉壽萬年永受胡福乃跪冠興復位賔之贊冠者跪設簮結纓興復位冠者興賔揖冠者冠者適房賔主俱坐冠者著絳紗服庶人則白裙襦服出自房户西南面立賔主俱興賔揖冠者進升席西向坐賔之贊冠者跪脫進賢冠庶人則脫黑介幘置於箱櫛畢設纚興復位賔降三等受爵辨庶人則黑介幘右執頂左執前進冠者筵前東向立祝曰以嵗之正以月之令咸加爾服兄弟具在以成厥德黃耉無疆受天之慶乃跪冠興復位賔之贊冠者跪設結簮纓興復位冠者興賔揖冠者冠者適房賔主俱坐主人贊冠者徹纚櫛簮箱及筵入於房又筵於室户西南向冠者著爵辨之服庶人則絳公服出房户西南面立賔主俱興主人贊冠者盥手洗觶於房酌醴加柶覆之面葉出房南面立賔揖冠者就筵西南面立賔進受醴於室户東面柶面柄進冠者筵前北面立祝曰甘醴維厚嘉薦令芳拜受祭之以定爾祥承天之休壽考不忘冠者筵西拜受觶賔復西階上東面答拜執饌者奉饌薦於冠者筵前冠者升筵坐左執觶右取脯擩於醢祭於籩豆之間贊冠者取肺一以授冠者奠觶於薦西興受㕁左手執本坐右絶末以祭上左手嚌之興以授贊冠者加於俎冠者坐帨手取觶以柶祭醴加柶於觶面葉興筵末跪啐醴建柶興降筵西南面跪奠觶再拜執觶興賔答拜賔主俱坐冠者升筵跪奠觶於薦東興進北面跪取脯降自西階入見母進奠脯於席前退再拜以出冠者母不在則使人受脯於西階下初冠者入見母賔主俱興賔降當西序東面立冠者既見母出立於西階之東南面賔少進字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於嘏永受保之曰伯某甫冠者曰某雖不敏夙夜祗奉賔出主人送於內門外主人西面請賔曰吾子辱執事請禮從者賔曰某既得將事敢辭主人曰敢固以請賔曰某辭不得命敢不從賔就次主人入初賔出冠者東面見諸親諸親拜之冠者答拜冠者西面拜賔之贊冠者贊冠者答拜訖見諸尊於别室賔主既釋服改席訖賔興衆賔俱出次立於門西東面主人出門東西面主人揖賔賔報揖主人先入賔及衆賔從之至階一讓升各就坐後立定俱升坐㑹訖賔主俱興賔立於西階上東面主人立於東階上西面衆賔降立於西階下東面掌事者以幣篚升授主人於序端賔北面再拜主人進立於楹間南面賔進立於主人之右俱南面賔受篚退復東面位主人還阼階上北面再拜送賔贊降自西階從者迓受幣賔出主人送賔於大門外之東西面再拜賔退主人入孤子則諸父諸兄戒賔冠之日主人髻而迎賔拜揖讓如冠主冠於阼醴之及禮賔拜送皆於上儀明日見祖禰於正寢冠者公服庶人則常服質明設几筵正寢贊禮者引入至庭北面再拜訖引出有廟者見於廟五品以上孫九品以上子冠假用出身品服其三品以上大功以上親五品以上周以上親冠同八品九品服大唐開元禮卷一百二十一
