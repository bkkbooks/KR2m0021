body:
  text: 大唐開元禮卷四十一唐蕭嵩等撰吉禮皇帝禘享於太廟齊戒陳設省牲器鑾駕出宫晨祼饋食祭七祀功臣配享鑾駕還宫齊戒宗廟五年一禘以孟夏將享有司卜日如别儀前享七日平明太尉誓百官於尚書省曰某月某日禘享於太廟各揚其職不供其事國有常刑皇帝散齊四日於别殿致齊三日於太極殿前致齊一日尚舍奉御設御幄於太極殿西序及室內東向尚舍直長張幃於前楹下致齊之日質明諸衛勒所部屯門列仗晝漏上水一刻侍中版奏請中嚴諸衛之屬各督其隊入陳於殿庭如常儀通事舍人引文武五品以上袴褶陪位如式諸侍衛之官各服其器服諸侍臣並結珮俱詣閣奉迎侍中版奏外辦上水三刻皇帝服通天冠絳紗袍結珮乘輿出自西房曲直華蓋警蹕侍衛如常儀皇帝即御座東向坐侍臣夾侍如常一刻頃侍中前跪奏稱侍中臣某言請降就齊室俯伏興復侍位皇帝降座入室文武侍臣各還省直衛者如常通事舍人引陪位者以次出凡預享之官散齊四日致齊三日散齊皆於正寢致齊二日於本司一日於齊所其無本司者皆于享所近侍之官應從升者及從享羣官諸方客使各於本司及公館九廟子孫各於其第俱清齊一宿無本司者皆於正寢散齊理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊惟享事得行其餘悉斷其享官已齊而闕者通攝行事諸享官致齊之日給酒食及明衣各習禮於齊坊光祿卿監取明水火太官令取水於陰鑒取火於陽燧火以供爨水以實尊前享一日諸衛令其屬未後一刻各以其方器服守衛廟門每門二人每隅一人與太樂工人俱清齊一宿陳設前享三日上舍直長施大次於廟東門之外道北南向尚舍奉御鋪御座守宫設文武侍臣次於大次之後文官在左武官在右俱南向設諸享官次於齊坊之內九廟子孫於齊坊內近南西向北上文官九品以上於齊坊之內東方南方蕃客又於其南俱每等異位重行西向北上介公酅公於廟西門之外近南武官九品以上於介公酅公之南西方北方蕃客又於其南俱每等異位重行東向北上其褒聖侯于文官三品之下若有諸州使人分方位於文武官之後前享二日太樂令設宫懸之樂於廟庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鏄鐘於編懸之間各依辰位樹路鼓於北懸之內道之左右植建鼓於四隅置柷敔於懸內柷在左敔在右設歌鐘歌磬於廟堂之上前楹間北向磬簴在西鐘簴在東其匏竹者立於階間重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上右校清掃內外前享一日奉禮設御位於廟堂東階東南西向設享官公卿位於東門之內道南執事者位於其後每等異位俱重行西向以北為上設御史位於廟堂之下一位於東南西向一位於西南東向令史各陪其後設奉禮位於樂懸東北贊者二人在南差退俱西面設協律郎位於廟堂之上前楹之間近西東向設太樂令位於北懸之間北向設從享之官位九廟之子孫於享官公卿之南昭穆異位雖有貴者以齒文官九品以上位於子孫之南東方南方蕃客又於其南俱每等異位重行西面北上介公酅公位西門之內道南武官九品以上於介公酅公之南少西當文官西方北方藩客又於其南俱每等異位重行東面北上其褒聖侯位於文官三品之下若有諸州使人分方位于文武官之後設門外位享官公卿以下皆於東門之外道南每等異位重行北面西上子孫之位於享官公卿之東少南文官九品以上於子孫之東東方南方蕃客又於其東俱每等異位重行北面西上設介公酅公位於西門之外道南武官九品以上於介公酅公之西少南西方北方蕃客又於其西俱每等異位重行北面東上其褒聖侯位於文官三品之下若有諸州使人分方位於文武官之後設牲榜於東門之外當門西向以南為上設廩犧令位於牲榜西南史陪其後俱北向設諸太祝位於牲東各當牲後祝史各陪其後俱西向設太常卿省牲位於牲前近北又設御史位於太常卿之西俱南向設樽彛之位於廟堂之上下每座雞彛一鳥彛一犧樽二象樽二著樽二壺樽二山罍二在堂上皆於神座之左獻祖太祖髙祖髙宗樽彛在前楹間北向懿祖代祖太宗中宗睿宗樽彛在户外南向各有坫焉以置瓚爵其壺樽二太樽二山罍四皆在堂下階間北向西上設簋簠鈃登籩豆之位於堂上俱東側階之北每座四簋居前四簠次之次以六登次以六鈃籩豆為後每座異之皆以南為上屈陳而下設御洗於東陛東南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以圭瓉巾爵執樽罍篚羃各位於樽罍篚羃之後享日未明五刻太廟令服其服布昭穆之座於户外自西序以東獻祖太祖髙祖髙宗座皆在北廂南面懿祖代祖太宗中宗睿宗座皆南廂北面每座皆設黼扆莞席紛純藻席畫純次席黼純左右几省牲器省牲之日午後十刻廟所諸衛之屬禁斷行人太廟令整拂神幄座晡後二刻太廟令丞帥府史三人及齊郎以樽坫罍洗篚羃及籩豆簋簠鈃入設於位加以巾蓋諸器物皆濯而陳之其升堂者自東階晡後三刻諸太祝與廩犧令以牲就榜位謁者引太常卿贊引引御史詣東陛升遍視滌濯於上凡導引者每曲一逡巡於視濯執尊者皆舉羃告潔訖引降就省牲位南向立廪犧令少前曰請省牲退復位太常卿省牲廪犧令又前北面舉手曰腯還本位諸太祝巡牲一匝西面舉手曰充俱還本位諸太祝與廩犧令以次牽牲就厨授太官謁者引光祿卿詣厨省鼎鑊申視濯溉贊引引御史就厨省饌具太常卿以下每事訖各還齊所進饌者入徹籩豆簋鈃以出享日未明十五刻太官令帥宰人以鸞刀割牲祝史各取毛血每座共實一豆遂烹牲祝史洗肝於鬱鬯又取膟膋每坐共實一豆俱置於饌所膟膋腸間脂也鑾駕出宫前出宫三日本司宣攝內外各供其職守宫設從享羣官五品以上次於承天門外東西朝堂如常前二日太樂令設宫懸之樂於殿庭如常儀駕出懸而不作享日未明七刻捶一鼓為一嚴三嚴時節前一日侍中奏裁侍中奏開宫殿門及城門未明五刻捶二鼓為再嚴侍中版奏請中嚴奉禮設從享羣官五品以上位文官於東朝堂之前西向武官於西朝堂之前東向俱重行北上從享官五品以上俱集朝堂次各服其服其六品以下及介公酅公九廟子孫褒聖侯諸方客使等並駕發之前預赴享所俱就次各服其服所司陳大駕鹵簿如别儀未明二刻捶三鼓為三嚴諸衛之屬各督其隊與鈒戟以次入陳於殿庭謁者引從享羣官各就朝堂前位諸侍衛之官各服其器服侍中中書令以下俱詣西階奉迎侍中負璽如式乘黃令進玉輅於太極殿西階之前南向千牛將軍一人執長刀立於輅前北向黃門侍郎一人在宫臣之前贊者二人又在黃門侍郎之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝衮冕乘輿以出降自西階稱警蹕如常儀千牛將軍前執轡皇帝升路太僕卿立授綏侍中中書令以下夾侍如常黃門侍郎進當鑾駕前跪奏稱黃門侍郎臣某言請鑾駕發引俯伏興退復位黃門侍郎奏請皆進當鑾駕前跪奏稱某官臣某言訖俯伏興鑾駕動稱警蹕黃門侍郎與贊者夾引以出千牛將軍夾輅而趨駕出承天門至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黃麾內符寶郎奉六寶與殿中監後部從在黃鉞內侍中中書令以下夾侍於輅前贊者在供奉官人內侍臣上馬畢黃門侍郎奏稱請勒車右升侍中前承制退稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕鼓傳音如常不鳴鼓吹不得喧譁其從享之官在𤣥武隊後如常儀晨祼享日未明四刻諸享官各服其服太廟令良醖令各帥其屬入實樽罍雞彜及諸齊之上樽皆實以明水山罍之上樽實以𤣥酒鳥彝實以鬱鬯犧樽實以泛齊象樽實以醴齊著樽實以盎齊壺樽實以醍齊太樽實以沈齊山罍實以清酒也太官令帥進饌者實諸籩豆簋簠未眀三刻奉禮帥贊者先入就位贊引引御史博士太廟令太祝宫闈令及令史祝史與執樽罍篚羃者入自東門當階間重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽罍篚冪者各就位贊引引御史諸太祝詣東階各就位太廟令帥其屬陳瑞物於廟庭太階之西上瑞為前列次瑞次之下瑞為後列又陳伐國所得寶器上次先後亦如之皆北面西上俱藉以席所司皆各守之未明二刻陳腰輿於東階之東每室各二皆西向北上立定贊引引御史太廟令太祝宫闈令帥內外執事者以腰輿自東陛升詣獻祖室入開坎室太祝宫闈令奉出神主各置於輿出詣座前奉神主置於位訖引太廟令以下次奉出懿祖次奉出太祖次奉出代祖次奉出髙祖次奉出太宗次奉出髙宗次奉出中宗次奉出睿宗神主置於座如獻祖之儀皇祖妣以下神主皆宫闈令奉出俱並座處右訖引太廟令以下降復位駕將至謁者贊引各引享官通事舍人分别九廟子孫及從祀羣官諸方客使先至者俱就門外位駕至大次門外回輅南向將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅乘輿之大次繖扇華蓋侍衛如常儀太祝令以祝版進御署訖近臣奉出太廟令受各奠於坫謁者引文武五品以上從享之官皆就門外位太樂令帥工人二舞入就位文舞入陳於懸內武舞立於懸南道西其升堂者脫屨於下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引詣東陛升堂行掃除於上降行樂懸於下訖引復位初司空行樂懸謁者贊引各引享官及九廟子孫從享羣官諸方客使次入就位皇帝停大次半刻頃太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝出次華蓋侍衛如常儀侍中負璽陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至廟門外殿中監進鎮圭皇帝執鎮圭華蓋仗衛停於門外近侍者從入如常皇帝至版位西向立每立定太常卿與博士退立於左太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則奠訖而後興鼓柷奏永和之樂乃以黃鐘為宫大吕為角太蔟為徴應鐘為羽作文德之舞樂舞九成黃鍾三奏大吕太蔟應鍾各再奏偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太常卿引皇帝詣罍洗太和之樂作皇帝每行皆作太和之樂皇帝至罍洗樂止侍中跪取􅓢興沃水又侍中跪取盤承水皇帝搢鎮圭凡受物則搢鎮圭奠訖執圭俯伏興皇帝盥手黃門侍郎跪取巾於篚興進皇帝􅍤手訖黃門侍郎受巾跪奠於篚黃門侍郎又取瓚於篚興進皇帝受瓚侍中酌罍水又侍中奉盤皇帝洗拭瓚訖侍中奠盤􅓢黃門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝升自阼階樂止侍中中書令以下及左右侍衛量人從升以下皆如之太常卿引皇帝詣獻祖樽彛所執樽者舉羃侍中贊酌鬱鬯酒訖登歌作肅和之樂以圜鐘之均自後登歌皆歌圜鐘太常卿引皇帝詣獻祖神坐前北面跪以鬯祼地奠之俯伏興太常卿引皇帝少退北面再拜訖太常卿引皇帝詣懿祖樽彛所執樽者舉羃侍中取瓚於坫進皇帝受瓚侍中贊酌鬱鬯酒訖太常卿