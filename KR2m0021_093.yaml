body:
  text: 大唐開元禮卷九十三唐蕭嵩等撰嘉禮納后上卜日告圜丘告方澤臨軒命使納采問名納吉納徵告期告廟册后卜日將納后有司卜日如别儀告圜丘告方澤與加元服之儀同祝文臨時撰臨軒命使將行納采制命太尉為使者宗正卿為副使吏部承以戒之問名納吉納徵告期奉迎並同使前一日尚舍奉御設御幄於太極殿如常守宫設群官客使等諸應陪位者次於東西朝堂太樂令展宫懸於殿庭設舉麾位於殿上一位於懸下鼓吹令設十二案乘黃令陳車輅尚輦奉御陳輿輦皆如元日之儀典儀設文官一品以下五品以上位於懸東六品以下於橫街之南皆重行西面北上設武官一品以下五品以上位於懸西六品以下於橫街之南當文官皆重行東面北上設朝集使位各分方於文武官當品之下設諸親位於四品五品之下皇宗親在東異姓親在西設蕃客位各分方於朝集使六品之南諸州使人分方位於朝集使九品之後設典儀位於懸之東北贊者二人在南少退西向設使者受命位於橫街南道東副使又於其東少退俱北面奉禮設門外位於東西朝堂如元日之儀其日諸衛勒所部列黃麾仗如常儀群官依時刻集朝堂俱就次各服其服通事舍人引就朝堂前位侍中量時刻版奏請中嚴鈒㦸近仗入陳於殿庭太樂令帥工人入就位協律郎入就舉麾位諸侍衛之官各服其器服符寶郎奉寶俱詣閣奉迎典儀帥贊者先入就位通事舍人引群官入就位又引使者及副使立於太極門外道東西面黃門侍郎引主節執幡節中書侍郎引制書案立於左延明門內道北面西北上侍中版奏外辦皇帝服衮冕御輿以出曲直華蓋警蹕侍衛如常儀皇帝將出仗動皇帝出自西房即御坐南向坐符寶郎奉寶置於御坐如常通事舍人引使主副入就位立定典儀曰再拜贊者承傳羣官在位者皆再拜侍中前承制降詣使者東北西面稱有制使主副俱再拜侍中宣制曰納某官某氏女為皇后命公等持節行納采等禮宣訖使主副又再拜侍中還侍位黃門侍郎引主節立於使者東北西面主節以節授黃門侍郎黃門侍郎執節西面授使者使者受付主節立於使者後黃門侍郎退中書侍郎引制書案立於使者東北西面中書侍郎取制書持案者退自使後立於使者之左西面授使者使者受制書置於案持案者退立於使後中書侍郎退典儀曰再拜贊者承傳羣官在位者皆再拜舍人引使主副出持節者前導持案者次之侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝降御輿入自東房侍衛警蹕如來儀舍人引羣官在位者以次出初使主副乘輅備儀仗而行鼓吹備而不作從者乘車以從其制書以油絡網犢車載而行自後皆如之納采前一日守宫設使者次於后氏大門外道右南向其日大昕使主副至於后氏大門外掌次者延入次凡賔主及行事者皆公服主人受於廟無廟者受於正寢掌事者布神席於室户外之西莞筵紛純加藻席畫純南向右雕几使主副出次謁者引立於大門外之西東面北上持幡節者立於使者之北少退東面令史二人對舉制案立於使主副之南執雁者又在其南俱東面主人立於大門內西向儐者立於主人之左北面受命出立於門東西面曰敢請事使者曰某奉制納采儐者入告主人曰臣某之女若如人既蒙制訪臣某不敢辭儐者出告入引主人出迎使者於大門外之南北面主人再拜使者不答拜主人揖使先入至於階使者及宗正卿入幡節前導其持案及執雁者從入幡節立西階之西東面自後幡節皆如之使者由西階升立於兩楹間南面使副在使者西南持案及執雁者在使副西南俱東面主人升阼階詣使者前北面立持案者以案進使副前使副取制書持案者退復位使副奉制書進授使者退復位持節者脫節衣使者曰有制主人再拜宣制畢主人降詣階間北面再拜稽首訖升進北面受制書退以授左右仍北面立使副取雁以授使者退復位使者受雁主人再拜進受雁退以授左右仍北面立儐者引二人對舉答表案進立於主人後少西儐者取表以授主人主人受進授使者訖退復位再拜持節者加節衣謁者引使者及使副等降自西階以出制文凡六禮皆以版長一尺二寸博四寸厚八分后家答版亦如之皇帝曰咨具官封姓渾元資始肇經人倫爰及夫婦以奉天地宗廟社稷謀於公卿咸以為宜率由舊典今使使持節太尉封某宗正卿封某以禮納采答文皇帝嘉命訪婚陋族偹數采擇臣之女姑姊妹則云先臣某官之遺女未間教訓衣履若而人欽承舊章肅奉典訓某官封臣姓名稽首頓首再拜承制詔問名使者既出遂立於內門外之西東面並如納采位初使者降主人降立於內門內東廂西面儐者進受命出請事使者曰將加卜筮奉制問名儐者入告主人曰臣某之子若如人既蒙制訪臣某不敢辭儐者出告入引主人出迎使者於內門外之南北面揖使者先入就位至於階使者及使副入幡節前導持案及執雁者從入使者由西階升立於兩楹間南面使副在使者西南持案及執雁者在使副西南俱東面主人升阼階詣使者前北面立持案者以案進使副前使副取制書持案者退復位使副奉制書進授使者退復位持節者脫節衣使者曰有制主人再拜使者宣制畢主人降詣階間北面再拜稽首訖升進北面受制書退以授左右仍北面立使副取雁以授使者使者受雁主人再拜進受雁以授左右仍北面立儐者引二人對舉答表案於主人後少西儐者取表以授主人主人受進授使者訖退復位再拜持節者加節衣謁者引使者及使副等降自西階以出立於內門外之西使副在南少退俱東面初使者降主人降立於東階下西面儐者進受命出請事使者曰禮畢儐者入告主人曰某公奉制至於某室某有先人之禮請禮從者儐者出告使者曰某既得將事敢辭儐者入告主人曰先人之禮敢固以請儐者出告使者曰某辭不得命敢不從儐者入告遂引主人升立於序端掌事者徹几改設二筵東上各用莞筵紛純加藻席繢純設甒醴於東房西牖下加勺羃坫在樽北實觶二角柶二各一籩一豆實以脯醢在坫北又設洗於東階東南如常施設訖儐者引主人降迎使者於內門外之東西面揖使者先入使者入門而左使副從之主人入門而右至階主人曰請某位升使者曰某敢辭主人又曰固請某位升使者曰某敢固辭主人又曰終請某位升使者曰某終敢辭主人升自阼階使者升自西階使副從升俱北面主人阼階上北面再拜使者及副使西階上北面答再拜主人受几於序端掌事者內拂几三奉兩端西北面以進主人東南向外拂几三振袂內執之掌事者一人又執几以從主人主人進西北向使者序進迎受於筵前東南向以俟主人還東階上北面再拜送使者以几進北靣跪各設於坐差退於西階上北靣東上俱答再拜立於階西東面南上贊者二人俱升取觶降盥手洗觶升實醴加柶於觶覆之面葉出房南面主人受醴面柄進使者於筵前西北向立又贊者執觶以從使者西階上北面各一拜序進筵前東南面主人以次授醴使者受俱復西階位上主人退復東階上北面一拜送掌事者以次薦脯醢於筵前使者各進升筵皆坐左執觶右取脯擩於醢祭於籩豆之間各以柶祭醴三始扱一祭又扱再祭興各以柶兼諸觶上臘降筵於西階上俱北面坐啐醴建柶各奠觶遂拜執觶興主人答拜使者進升筵坐各奠觶於薦東降筵序立於西階上東面南上掌事者牽馬入陳於門內三分庭一在南北首西上又掌事者奉幣篚升自東階以授主人主人授於序端進西面位掌事者一人又奉幣篚立於主人之後使者西階上俱北面再拜主人進詣楹間面南立使者序進立於主人之西俱南面主人以幣篚授使者使者受退立於西階上東面執幣者又以幣篚授主人主人受以授使副使副受之退立於使者位北俱東面主人還東階上北面拜送使者降自西階從者迓受幣使者當庭實揖馬以出牽馬者從出使者出大門外之西東面立從者迓受馬主人出門東西面再拜送使者退主人入立於東階下西面儐者告於主人曰賔不顧矣主人反於寢使者奉答表詣闕進制文皇帝曰咨某官封姓兩儀配合承天統物正位於內必俟令族重章舊典今使使持節太尉封某宗正卿封某以禮問名答文皇帝嘉命使者某重宣中制問臣名族臣女夫婦所生先臣故某官之遺𤣥孫先臣故某官之遺曽孫先臣故某官之遺孫先臣故某官之外孫女年若干欽承舊章肅奉典制某官臣姓某稽首頓首再拜承制詔若女祖以上在則直云某官臣之孫女等語納吉前一日守宫設使者次於后氏大門外如初其日大昕使主副至於后氏大門外掌次者延入次掌事者設几筵如初使主副出次謁者引立於大門外之西東面北上持幡節者立於使者之北少退東面令史二人舉對制案立於使主副之南執雁者又在其南俱東面主人立大門內西面儐者進受命出請事使者曰加卜筮占曰從制使某也納吉儐者入告主人曰臣某之女若而人龜筮云吉臣預在焉臣某謹奉典制儐者出告入引主人出迎使者於大門外之南北面主人再拜使者不答拜主人揖使者先入至於階使者及使副入幡節前導持案及執雁者從入幡節立西階之西東面使者由西階升立於楹階南面使副在使者西南持案及執雁者在使副西南俱東面主人升阼階詣使者前北面立持案者以桉進使副前使副取制書持案者退復位使副奉制書進授使者退復位持節者脫節衣使者曰有制主人再拜使者宣制畢主人降詣階間北面再拜稽首訖升進北面受制書退以授左右仍北面立使副取鴈授使者退復位使者受鴈主人再拜進受鴈退授左右仍北面立儐者引二人對舉答表案進立於主人後少西儐者取表以授主人主人受以進授使者訖退復位再拜持節者加節衣謁者引使者及使副等降自西階以出立於內門外之西面使副在南少退俱東面初使者降主人降立於東階下西面儐者進受命出請事使者曰禮畢其儐使者如問名之儀制文皇帝曰咨某官姓人謀龜從僉曰貞吉敬順典禮今使使持節太尉封臣某宗正卿臣某以禮納吉答文皇帝嘉命使者某重宣中制太卜元吉臣陋族卑鄙憂懼不堪欽承舊章肅奉典制某官臣姓某稽首頓首再拜承制詔納徴前一日守宫設使者次如初其日大昕使主副至后氏大門外掌次者延入次執事者入布羃於內門之外𤣥纁束帛陳於幕上六馬陳於羃南北首西上執事者奉穀圭以匱俟於幕東西面掌事者設几筵如初使主副出次謁者引立於大門外西東面北上持幡節者立於使者之北少退東面令史二人對舉制案於使副之南東面主人立於大門內西面儐者進受命出請事使者曰某奉制納徴儐者入告主人曰奉制賜臣以重禮臣某祇奉典制儐者出告入引主人出迎使者於大門外之南北面主人再拜使者不答拜謁者引使者及使副入幡節前導持案者從入使者入門而左主人入門而右至於內門使主副立於門西東面北上主人立於門東西面儐者引主人揖使者先入門至於階使副從入由西階升立於楹間南面使副在使者西南持案者在使副西南俱東面主人由阼階詣使者前北面立於主人揖入門執事者坐啓匱取圭加於𤣥纁上及牽馬者從入三分庭一在南北首西上執圭者在馬西俱北面持案者以案進使副前使副取制書持案者退復位使副奉制書進授使者退復位持節者脫節衣使者曰有制主人再拜訖使者宣制畢主人降詣階間北面再拜稽首訖升進北面受制書退以授左右仍北面立儐者引二人對舉答表案進主人後少西儐者取表以授主人主人受以授