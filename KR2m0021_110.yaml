body:
  text: 大唐開元禮卷一百十唐蕭嵩等撰嘉禮皇太子加元服告太廟臨軒命賔贊冠㑹賔贊朝謁皇太子謁太廟羣臣上禮皇太子㑹宫臣宫臣上禮告太廟皇太子將冠先告太廟如常告之儀臨軒命賔贊所司預奏請司徒一人為賔卿一人為贊冠吏部承以戒之前一日尚舍奉御整飾御幄於太極殿衛尉設羣官朝集使諸蕃使次於左右朝堂太樂令展宫懸之樂於殿庭設舉麾位於殿上一位於懸下鼓吹令設十二案乘黃令陳車輅尚輦奉御陳輿輦典儀設文官一品以下五品以上位於橫街之北西面北上諸州使人五品以上合班六品以下位於橫街南諸州使人六品以下諸蕃官又在南皆西面北上設武官五品以上位於橫街北東面北上諸州使人五品以上合班諸親位於其南六品以下位於橫街南諸州使人六品以下及蕃客等又在其南皆東靣北上設典儀位於懸之東北贊者二人在南少退俱西向設賔受命位於橫街南道東北靣贊者位又於其後少東北面奉禮設門外文官一品以下位於順天門外道東每等異位重行西靣武官一品以下位於門西每等異位重行東面並以北為上其日諸衛勒所部列黃麾仗如常儀羣官依時刻集朝堂俱就次各服其服侍中量時版奏請中嚴協律郎太樂令帥工人入就位諸侍衛之官各服其器服奉迎典儀帥贊者先入就位通事舍人引先至羣官入立定又引賔贊入立於太極門外道東西靣黃門侍郎引主節持幡節中書侍郎引制書案立於樂懸東南西靣北上侍中版奏外辦皇帝服通天冠綘紗袍以出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鍾之鐘左五鐘皆應協律郎舉麾凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止鼓柷奏太和之樂皇帝乘輿出自西房即御坐南向坐符寶郎奉寶置於御坐樂止通事舍人引賔贊入就位賔贊初行入門舒和之樂作至位樂止立定典儀曰再拜侍中及舍人前承制侍中降至賓前稱有制公再拜侍中曰將加冠於某之首公其將事公少進北面再拜稽首辭曰臣不敏恐不能供事敢辭侍中升奏又承制降稱制㫖某公其將事無辭公再拜退復位侍中退舍人至卿前稱敕㫖卿再拜舍人曰將加冠於某之首卿宜贊冠卿再拜舍人退黃門侍郎引主節至賔所主節以節授黃門侍郎黃門侍郎執節立於賔東北西靣賓再拜受節付主節訖又再拜主節立於賔後黃門侍郎退中書侍郎引制書案至賔所取制書在賔東北西靣立賔再拜受制書執立又再拜持案人立於賔後中書侍郎退典儀曰再拜贊者承傳羣官在位者皆再拜舍人引賔贊出賔贊初行樂作出門樂止侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞蕤賔之鐘左五鐘皆應鼓柷奏太和之樂皇帝降坐侍衛警蹕如來儀入自東房樂止舍人引一品以下以次出初賔贊出門賔以制書置於案升車從輅而行威儀鐃吹詣東宫降輅入次賔贊具服其一品以下以次出蕃客各還館九品以上詣東宫朝堂次服其服就位如冠儀冠前一日衛尉設賓次於重明門外道西南向贊冠次又於其西南向並鋪床席又於重明門內道西設一次擬㑹賔贊設文武羣官九品以上及諸親并宫臣次如常儀奉禮設文武羣官九品以上諸親在五品之下及宫臣門外位如常儀典儀設殿庭位文武羣官共宫臣合班諸親在五品下文官在東西靣武官在西東面皆以北為上又設皇太子位於閣外道東西向設三師位於閣外道西三少位於三師之南少退俱東向典儀又設皇太子受制位於樂懸北北靣所司設軒懸之樂於殿庭又設舉麾位於殿上一位於懸下有司設皇太子羽儀車輿於殿庭如常式典設帥其屬鋪解劍席於懸之東北冠日平明宫臣皆朝服非宫臣者公服三師三少公服並集於重明門外次宗正卿公服乘犢車侍從詣左春坊權停左右二率各勒所部屯門列仗左庶子版奏請中嚴工人及諸行事之官各入就位奉禮設罍洗於東階東南罍在洗東篚在洗西南肆篚實巾加勺羃典設郎鋪皇太子冠席於殿上東壁下少近南西向設賓席於西階上東向設主人席於皇太子席西南西向設三師席於冠席北三少席於冠席南典設張帷帳於東序內設褥席於帷中又張帷幄於序外擬置饌物等內直郎陳服於帷內東領北上衮冕服𤣥衣纁裳九章白紗中單黼領襟襈裾革金鈎䚢大帶朱黼二章玉具劒火珠鏢首瑜玉雙佩珠組雙大綬四彩赤白縹紺純朱質長一丈八尺三百二十首廣九寸小綬長二尺六寸色同大綬而首半之間施二玉環白襪赤舄金飾象笏逺逰冠服綘紗袍白紗中單皂領褾襈裾白方心曲領假帶綘紗蔽膝白練裾襦白襪黑舄其革帶劒佩綬笏與冕服同緇布冠𤣥衣素裳素韠白紗中單青領褾襈裾履襪革𢃄大帶笏緇纚用皂羅巾方六寸屬帶於前兩隅犀簮二物同箱在服南櫛實於箱又在南莞筵四紛純繅席四繢純又在南良醖令實側樽甒醴加勺羃於序外帷內設罍在洗北篚在洗南東肆實巾一角觶角柶各一加羃太官令實饌豆九籩九於樽西俎三在豆北執在庭罍洗者綘公服立於罍洗之南北向執帷內尊罍洗籩豆爼等並綘公服立於尊罍豆爼之所冕白珠九旒犀導組纓青纊充耳逺逰三梁冠金附蟬九首施朱翠黑介幘犀導肆髮纓緌緇布冠青組纓屬於冠冠冕各一箱盛奉禮二人各執立於階之西東面北上主人贊冠者庶子為之升詣東序帷內少北户東西面立典謁引羣官以次入就位初賓贊入次左庶子版奏外辦通事舍人引三師等入就閣外道西位東靣立皇太子著空頂黑介幘雙童髻玉導寶飾彩衣紫褶緑袴褾領緑錦紳烏皮履乘輿以出洗馬迎於閣門外左庶子跪奏稱左庶子臣某言請殿下降輿俯伏興還侍位皇太子降輿洗馬引之道東位西向立左庶子又前跪奏稱左庶子臣某言請殿下再拜皇太子再拜三師三少答再拜洗馬引就階東南位三師訓導在前三少訓從於後千牛二人夾左右其餘仗衛列於師保之外通事舍人引宗正卿入見皇太子訖通事舍人引出迎賓洗馬引皇太子初行樂作至階東西面立偃麾樂止凡樂皆伶官帥舉麾工鼓柷而後作偃麾戛敔而後止宗正卿迎賔於門東西面賔立於門西東面宗正卿再拜賔不答拜賔入門樂作主人從入立於樂懸東北西面賔入贊冠者從入舍人引賔詣殿階間南面樂止贊冠者立於賔西南東面節在賔東少南西面制案在贊冠西南東面賔就案取制執洗馬引皇太子詣受制位北面立皇太子初行樂作至位樂止主節脫節衣賔稱有制皇太子再拜宣詔曰制皇太子某吉日元服率由舊章命太尉某就宫展禮訖皇太子又再拜少傅進詣賔前受制書退授皇太子皇太子受制書付庶子案退洗馬引皇太子師保等如式升東階量人從升初行樂作至階樂止入東序帷內近北南靣立師保等各就席位訖賔升西階宗正卿升東階各立席後初賔升舍人引贊冠者詣罍洗盥手升自東階詣序帷內於主人贊冠之南俱西靣贊冠者引皇太子出立於席東西靣賔之贊冠者取纚櫛二箱坐奠於皇太子筵南端興席北少東西靣立賔揖皇太子進升筵西向坐賔之贊冠者進筵前東面坐脫空頂黑介幘置於御箱櫛畢設纚興少北南面立賔降盥主人從降樂作賔升樂止主人從升執緇布冠者升賔降一等受之右執頂左執前進皇太子筵前東向立祝曰令月吉日始加元服棄厥幼志慎其成德夀考惟祺以介景福乃跪冠興復位東靣立賔之贊冠進簷前東靣跪結纓興復位皇太子興賔揖皇太子贊冠者引皇太子適東序帷內著𤣥衣素裳之服以出立於席東西靣賔揖皇太子皇太子進升筵西向坐賔之贊冠者進筵前東靣跪脫緇布冠置於黑介幘之箱櫛纚依舊不解興復位賔降二等受逺逰冠右執頂左執前進皇太子筵前東向立祝曰某月令辰乃申嘉服克敬威儀式昭厥德眉夀萬年永膺明福乃跪冠興復位賔之贊冠者跪設簮結纓興復位皇太子興賔揖皇太子贊冠者引皇太子適東序帷內著朝服以出立於席東西靣賔揖皇太子皇太子進升筵西向坐賔之贊冠者進筵前東南跪脫逺逰冠置於廂纚櫛依舊不解興復位賔降三等受冕右執頂左執前進皇太子筵前東向立祝曰以嵗之正以月之令咸加其服以成厥德萬夀無疆承天之慶乃跪冠興復位賔之贊冠者跪設簮結纓興復位皇太子興賔揖皇太子贊冠者引皇太子適東序著衮冕之服以出立於席東西靣贊冠者徹纚櫛二箱入於帷內又取筵入於帷內主人贊冠者又設醴皇太子席於室户西南向上莞下藻賔之贊冠者於東序外帷內盥手洗觶典膳郎酌醴加柶覆之靣柄授賔之贊冠者受靣葉立於序內南面賔揖皇太子贊冠者引皇太子就筵西南靣立賔進受醴加柶靣柄進皇太子筵前北向立祝曰甘醴惟厚嘉薦令芳拜受祭之以定厥祥承天之休夀考不忘皇太子筵西拜受觶賔復位東靣答拜贊冠者與進饌者奉饌設於皇太子筵前皇太子升筵左執觶右取脯擩於醢祭於籩豆之間贊冠者取韭葅遍擩於豆以授皇太子又祭於籩豆之間贊冠者取肺一以授皇太子皇太子奠觶於薦西興受肺郤左手執本坐繚右手絶末以祭上左手嚌之興以授贊冠者贊冠者加於爼皇太子坐􅍤手取觶以柶祭醴三始扱一祭又扱再祭加柶於觶葉興筵末坐啐醴建柶興降筵西南面坐奠觶再拜執觶興賔答拜皇太子升筵坐奠觶於薦東興降筵贊冠者引皇太子降自西階立於西階之東南靣賔初答拜訖降立於西階之西近南東靣賔之贊冠者隨降立於賔西南東靣皇太子立定賔少進字之曰儀禮既備令月吉日昭告厥字君子攸宜宜之於嘏永受保之奉敕字某皇太子再拜曰某雖不敏敢不祇奉又再拜洗馬引皇太子降初行樂作至阼階下位樂止三師在南北靣三少在北南靣立定皇太子西靣再拜三師等答再拜以出於三師拜訖典儀曰再拜贊者承傳羣官在位者皆再拜左庶子前稱禮畢皇太子乘輿以入侍臣從至閣如常儀初皇太子降通事舍人引賔贊及宗正出就㑹所㑹賔贊賔既出立於㑹所門外之西東靣北上宗正卿立於門東西靣立定一揖一讓而入宗正卿立於坐東西靣賔贊立於坐西東靣俱再拜就位俯伏坐遂行酒酒至賔主俱興再拜就席坐飲食至賔主俱興設食訖賔主俱坐食㑹訖賔主俱興賔贊立於西廂東靣南上宗正卿立於東廂西靣執事奉束帛之篚以授宗正卿又執事者奉束帛篚立於宗正卿之後牽馬者牽乘馬入陳於庭北首西上賓贊俱回北面西上再拜宗正卿以幣篚進西南向授賓執事者以幣授贊冠者宗正卿與執事者退復位賓贊降從者互受幣賓當庭實揖左右以馬出三馬出從者互受馬宗正卿出門東西面賓贊出門西東面北上宗正卿與賓贊俱揖而退賓贊就車輅詣順天門外復命朝謁朝前衛尉先於順天門外東朝堂之北設太子次又於後設三師三少及詹事等次皇太子冠訖諸衛率依常行鹵簿陳列威儀仗衛前後部鼓吹備列師傅以下及宫官皆服其服皇太子服逺逰冠絳紗袍乘輿以出儀衛侍從如常禮洗馬前道皇太子出重明門左庶子跪奏請降輿升輅又左庶子稱令曰諾左庶子俯伏興皇太子降輿升金輅三師乘輅車訓導在前三少亦乘輅車訓從在後威儀仗衛依鹵簿發引鳴鐃而行至長樂門鐃吹止皇太子至順天門外次回輅西向左庶子跪奏請降輅就次又左庶子稱令曰諾左庶子俯伏興皇太子降輅洗馬前導入次左庶子侍左右庶子侍右舍人引三師三少詹事就次皇太子停大次少頃舍人奏聞典儀先於皇帝所御殿前北向設皇太子位左庶子跪奏請入又左庶子稱令曰諾左庶子俯伏興皇太子出次