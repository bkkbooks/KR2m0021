body:
  text: 大唐開元禮卷三十九唐蕭嵩等撰吉禮皇帝祫享於太廟齋戒陳設省牲器鑾駕出宫晨祼饋食祭七祀功臣配享鑾駕還宫齋戒宗廟三年一祫以孟冬將享有司卜日如别儀前享七日平明太尉誓百官於尚書省曰某月某日祫享於太廟各揚其職不供其事國有常刑皇帝散齋四日於别殿致齋三日于太極殿前致齋一日尚舎奉御設御幄於太極殿西序及室内俱東向尚舎直長張帷于前楹下致齋之日質明諸衛勒所部屯門列仗晝漏上水一刻侍中版奏請中嚴諸衛之属各督其隊入陳於殿庭如常儀通事舎人引文武五品以上袴褶陪位如式諸侍衞之官各服其器服諸侍臣並結珮俱詣閤奉迎侍中版奏外辦上水三刻皇帝服通天冠絳紗袍結珮乗輿出自西房曲直華盖警蹕侍衞如常儀皇帝即御坐東向坐侍臣夾侍如常一刻頃侍中前跪奏稱侍中臣某言請降就齋室俯伏興還侍位皇帝降坐入室文武侍臣各還省直衛者如常通事舎人引陪位者以次出凡預享之官散齋四日致齋三日散齋皆于正寢致齋二日于本司一日于祀所其無本司者皆于祀所近侍之官應從升者及從享羣官諸方客使各於本司及公館清齋一宿九廟子孫各於其第清齋一宿無本司者皆于正寢散齋理事如舊惟不弔䘮問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟享事得行其餘悉㫁其享官已齋而闕者通攝行事諸享官致齋之日給酒食及明衣各習禮於齋所光禄卿監取明水火太官令取水于陰鑑取火于陽燧火以供㸑水以實尊前享一日諸衛令其屬未後一刻各以其方器服守衞廟門每門二人每隅一人與太樂工人俱清齋一宿陳設前享三日尚舎直長施大次於廟東門之外道北南向尚舎奉御舖御座守宫設文武侍臣次於大次之後文官在左武官在右俱南向設諸享官次於齋坊之内九廟子孫於齋坊内近南西向北上文官九品以上於齋坊之南東方南方蕃客又於其南俱每等異位重行西向北上介公酅公於廟西門之外近南武官九品以上於介公酅公之南西方北方藩客又於其南俱每等異位重行東向北上其褒聖侯於文官三品之下若有諸州使人分方位于文武官之後前享二日太樂令設宫懸之樂於廟庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鏄鐘於編懸之間各依辰位樹路鼓於北懸之内道之左右植建鼓於四隅置柷敔於懸内柷在左敔在右設歌鐘歌磬於廟堂之上前楹間北向磬簴在西鐘簴在東其匏竹者立於陛間重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上右校清掃内外前享一日奉禮設御位於廟堂東陛東南西向設享官公卿位於東門之内道南執事者位於其後每等異位俱重行西向以北為上設御史位於廟堂之下一位於東南西向一位於西南東向令史各陪其後設奉禮位於樂懸東北賛者二人在南差退俱西面設恊律郎位於廟堂上前楹之間近西東向設太樂令位於北懸之間北向設從享之官位九廟子孫於享官公卿之南昭穆異位雖有貴者以齒文官九品以上位於子孫之南東方南方蕃客又於其南俱每等異位重行西面北上介公酅公位於西門之内道南武官九品以上於介公酅公之南少西當文官西方北方蕃客又於其南俱毎等異位重行東面北上其褒聖侯于文官三品之下若有諸州使人分方位于文武官之後設牲牓於東門之外當門西向以南為上設廩犧令位於牲西南史陪其後俱北向設諸太祝位於牲東各當牲後祝史各陪其後俱西向設太常卿省牲位於牲前近北又設御史位於太常卿之西俱南向設尊彛之位於廟堂之上下每座斚彛一黄彛一犧尊二象尊二著尊二山罍二在堂上皆於神座之左獻祖太祖髙祖髙宗尊彛在前楹間北向懿祖代祖太宗中宗睿宗尊彛在戸外南向各有坫焉以置瓉爵其壺尊二太尊二山罍四皆在堂下階間北向西上設簋簠鈃籩豆之位於廟堂之上俱東側階之北每坐四簋居前四簠次之次以六豋次以六鈃籩豆為後每座異之皆以南為上屈陳而下設御洗於東陛東南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以珪瓉巾爵執尊罍篚羃者各位於尊罍篚羃之後享日未明五刻太廟令服其服布昭穆之坐於户外自西序以東皇八代祖獻祖宣皇帝皇六代祖太祖景皇帝皇髙祖髙祖神堯皇帝皇祖髙宗天皇大帝坐北廂南面皇七代祖懿祖光皇帝皇五代祖代祖元皇帝皇曾祖太宗文武聖皇帝皇伯孝中宗孝和皇帝皇考睿宗大聖真皇帝坐南廂北面每坐皆設黼扆莞席紛純藻席畫純次席黼純左右几省牲器省牲之日午後十刻廟所諸衞之屬禁㫁行人晡後二刻太廟令丞帥府史三人及齋郎以尊坫罍洗篚羃及籩豆簋簠鈃入設於位加以巾盖諸器物皆濯而陳之其升堂者自東階晡後三刻諸太祝與廩犧令以牲就牓位謁者引太常卿賛引引御史入詣東階升遍視滌濯於上凡導引者每曲一逡巡於視濯執尊者皆舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西面舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官謁者引光禄卿詣厨省鼎鑊申視濯溉賛引引御史就厨省饌具太常以下每事訖各還齋所進饌者入徹籩豆簋鈃以出享日未明十五刻太官令帥宰人以鸞刀割牲祝史各取毛血每坐共實一豆遂烹牲祝史洗肝於鬱鬯又取膟膋每坐共實一豆俱置於饌所鑾駕出宫前出宫三日本司宣攝内外各供其職守宫設從享羣官五品以上次於承天門外東西朝堂如常前三日太樂令設宫懸之樂於殿庭如常儀駕出懸而不作享日未明七刻搥一鼓為一嚴三嚴時節前一日侍中奏裁侍中奏開宫門及城門未明五刻搥二鼓為再嚴侍中版奏請中嚴奉禮郎設從享羣官五品以上位文官於東朝堂之前西向武官於西朝堂之前東向俱重行北上從享羣官五品以上俱集朝堂次各服其服其六品以下及介公酅公褒聖侯九廟子孫諸方客使等並駕發之前預赴享所俱就次各服其服所司陳大駕鹵簿如别儀未明二刻搥三皷為三嚴諸衛之屬各督其隊與鈒戟以次入陳於殿庭通事舎人引從享羣官各就朝堂前位諸衛侍之官各服其器服侍中中書令以下俱詣西階奉迎侍中負寳如式乗黄令進玉輅於太極殿西階之前南向千牛將軍一人執長刀立於輅前北向黄門侍郎一人在侍臣之前賛者二人在黄門之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝衮冕乗輿以出降自西階稱警蹕如常儀千牛將軍前執轡皇帝升輅太僕卿立授綏侍中中書令以下夾侍如常黄門侍郎進當鑾駕前跪奏稱黄門侍郎臣某言請鑾駕進發俯伏興退復位凡黄門侍郎奏請皆當鑾駕前跪奏具官臣某言訖俛㐲興鑾駕動又稱警蹕黄門侍郎與賛者夾引以出千牛將軍夾輅而趨駕出順天門至侍臣上馬所黄門侍郎奏稱請鑾駕權停勅侍臣上馬侍中前承制退稱制曰可黄門侍郎退稱侍臣上馬賛者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黄麾内符寳郎奉六寳與殿中監後部從在黄鉞内侍中中書令以下夾侍於路前賛者在供奉官人内侍臣上馬畢黄門侍郎奏稱請勅車右升侍中前承制退稱制曰可黄門侍郎退復位千牛將軍升訖黄門侍郎奏稱請鑾駕進發退復位鑾駕動稱警蹕鼓傳音如常不鳴鼓吹不得諠譁其從享之官在𤣥武隊後如常儀晨祼享日未明四刻諸享官各服其服太廟令良醖令各帥其屬入實尊罍斚彛及五齊之上尊皆實以明水山罍之上尊皆實以𤣥酒黄彛實以鬱鬯犧尊實以汎齊象尊實以醴齊著尊實以盎齊壺尊實以醍齊太尊實以沈齊山罍實以清酒太官令帥進饌者實諸籩豆簠簋未明三刻奉禮帥贊引者先入就位賛引引御史博士宫闈令太祝及令史祝史與執尊罍篚羃者入自東門當階間重行北面西上立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳御史以下皆再拜訖執尊罍篚羃者各就位賛者賛引引御史諸太祝詣東陛升堂行掃除於上令史祝史行掃除於下訖引就位立定太廟令帥其屬陳瑞物於廟庭泰階之西上瑞為前列次瑞次之下瑞為後列又陳伐國所得寳器上次先後亦如之皆北向西上俱藉以席所司各守之未明二刻陳腰輿於東階之東每室各二皆西向北上立定賛引引太廟令太祝宫闈令内外執事者以腰輿自東陛升堂詣獻祖室入開埳室太祝宫闈令奉出神主各置於輿出詣坐前奉神主置于座訖引太廟令以下次奉出懿祖次奉出太祖次奉出代祖次奉出髙祖次奉出太宗次奉出髙宗次奉出中宗次奉出睿宗神主於座如獻祖之儀皇祖妣以下神主俱宫闈令奉出並坐處右位訖引太廟令以下各復位駕將至謁者賛引各引享官通事舎人分引從享羣官九廟子孫諸方客使先至者皆就門外位駕至大次門外迴路南向將軍降立於路右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅乗輿之大次繖扇華盖侍衞如常儀太廟令以祝版御署訖近臣奉出太廟令受各奠於坫通事舎人引文武五品以上從享之官皆就門外位太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西其升堂者皆脫屨于下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引詣東陛升堂行掃除於上降行樂懸于下訖引復位初司空行樂懸謁者賛引各引享官通事舎人分引九廟子孫從享羣官諸方客使入就位皇帝停大次半刻頃太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝出次華盖侍衛如常儀侍中負寳陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至廟門外殿中監進鎮珪皇帝執鎮珪華盖仗衛停於門外近侍者從入如常皇帝至版位西向立每立定太常卿與博士退立于左太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位恊律郎跪俛伏舉麾凡取物者皆跪俛㐲而取以興奠物則奠訖俛伏而後興鼓柷奏永和之樂乃以黄鐘為宫大吕為角太蔟為徴應鐘為羽作文舞之舞樂舞九成黄鐘三奏大吕太蔟應鐘各再奏偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太常卿引皇帝詣罍洗太和之樂作皇帝每行皆作大和之樂皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤興承水皇帝搢鎮珪凡受物皆搢鎮珪奠訖執珪俛㐲興皇帝盥手黄門侍郎跪取巾於篚興進皇帝􅍤手黄門侍郎受巾跪奠於篚黄門侍郎又取瓉於篚興進皇帝受瓉侍中酌罍水又侍中奉盤皇帝洗瓉黄門侍郎又授巾皆如初皇帝拭瓉訖侍中奠盤􅓢黄門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝升自阼階樂止侍中中書令以下及左右侍衞量人從升以下皆如之太常卿引皇帝詣獻祖尊彛所執尊者舉羃侍中賛酌鬱鬯訖登歌作肅和之樂以圜鐘之均自後登歌皆歌圜鐘太常卿引皇帝進獻祖神座前北向跪以鬯祼地奠之俯伏興太常卿引皇帝少退北向再拜訖太常卿引皇帝詣懿祖尊彛所執尊者舉羃侍中取瓉於坫進皇帝受瓉侍中賛酌鬱酒訖太常卿引皇帝進懿祖神座前南向跪以鬯祼地奠之俛伏興太常卿引皇帝少退南向再拜訖太常卿引皇帝次祼太祖次祼代祖次祼髙祖次祼太宗次祼髙宗次祼中宗次祼睿宗