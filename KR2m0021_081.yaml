body:
  text: 大唐開元禮卷八十一唐蕭嵩等撰軍禮皇帝親征類於上帝纂嚴齋戒陳設鑾駕出宫薦玉帛進熟鑾駕還宫纂嚴纂嚴前一日本司承制宣攝內外諸司各隨職備辦尚舍奉御施御幄坐于太極殿北壁下南向如常守宫設羣官文武次于東西朝堂如常儀典儀設羣官位于殿庭文東武西每等異位重行北向相對為首乘黃令陳革輅及玉輅以下及車旗之屬如常未明一刻開諸宫門諸衛勒所部列黃麾仗于門及陳于殿庭如常儀其日平明留從之官悉集朝堂次侍臣服平巾幘袴褶其將帥等及從行之官亦平巾幘袴褶留守之官公服上水五刻侍中版奏請中嚴鈒戟近仗以次列于殿庭上水三刻通事舍人引羣官以次就位諸侍臣俱詣閣奉迎侍中版奏外辦皇帝服武辨之服御馬以出曲直華蓋侍衛警蹕如常即御坐南向坐典儀唱再拜羣官在位者皆再拜訖中書令承旨敕百寮訖通事舍人以次引羣官出侍臣跪奏禮畢俯伏興皇帝降坐御馬入自東房侍臣從至閣如常禮齋戒將告有司卜日如别儀前一日皇帝清齋于太極殿諸預告之官清齋于告所侍從之官應從升者及羣官客使等各于本司及公館諸軍將各于正寢俱清齋一宿若在營者齋于軍幕晡後一刻諸衛令其屬各以其方器服守衛壝門與太樂工人俱清齋一宿陳設前告三日尚舍直長施大次於外壝東門之內道北南向尚舍奉御鋪御坐守宫設文武侍臣次于大次之後文官在左武官在右俱南向又設告官及從駕羣官次各於常所設軍將次於外壝南門之外道東西向以北為上設陳饌幔於內壝東門之外道南北向前二日太樂令設宫懸之樂於壇南設登歌及舉麾位於壇上並如常儀右校掃除壇之內外郊社令積柴於燎壇方一丈髙一丈二尺開上南出户方四尺前一日奉禮設御位於壇之東南西向設望燎位於柴壇之北南向設告官及從駕羣官版位於內外如常儀設軍將位于懸南每等異位重行北靣以西為上設軍將門外位於南壇之外道東每等異位重行西向北上郊社令帥府史與齋郎以尊坫罍洗篚羃入設於位並如常儀執樽罍篚羃者各位於樽罍篚羃之後告日未明十五刻太官令帥宰人烹牲於厨牲二一正座一配座未明四刻太史令郊社令各服其服升設昊天上帝神坐於壇上北方南向席以藁秸設神坐於坐首鑾駕出宫皇帝武辨乘革輅備大駕及嚴鼓時刻奏請進發內外器服皆如常儀前後備六軍諸軍鼓嚴一準大駕薦玉帛其日未明二刻諸告官各服其服郊社令良醖令各帥其屬入實樽罍及玉天帝太樽二實以泛齊明水實于上樽山罍二一實玄酒為上一實清酒次之玉幣以蒼太祝以玉帛置於篚太官令帥進饌者實籩豆簠簋等皆設於饌幔內未明一刻奉禮帥贊者先入就位贊引引御史博士太祝以下及執事者入行掃除如常儀訖各就位駕將至謁者贊引各引告官以下及從告羣官客使先至者俱就門外位駕至大次門外廽輅南向千牛將軍降立輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次郊社令以祝版進署如常謁者贊引各引從駕羣官就門外位太樂令帥工人以次入就位其升壇者皆脫履于下降納如常謁者贊引各引告官及從告羣官客使諸將軍次入就位皇帝停大次半刻頃太常博士引太常卿立于大次門外當門北向侍中版奏外辦皇帝出次華蓋侍衛如常儀侍中負寶陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至內壝門外殿中監進鎮圭華蓋仗衛停于門近侍者從入如常皇帝至版位西向立每立定太常卿與博士退立于左太常卿前奏請再拜退復位皇帝再拜奉禮曰衆官再拜贊者承傳凡奉禮有詞贊者皆承傳衆官在位者皆再拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏舉麾凡取物皆跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏豫和之樂以圜鐘為角太蔟為徵姑洗為羽樂六成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止太常卿前奏請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太祝取玉幣于篚立于樽所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣壇升自南陛近侍者從升如常儀皇帝升壇北向立樂止太祝以玉授侍中奉玉東向進皇帝搢鎮圭凡授物則搢鎮圭奠訖執圭俯伏興受受玉幣登歌作肅和之樂以大吕之均太常卿引皇帝北面跪奠于昊天上帝神坐俯伏興太常卿引皇帝少退北向立再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止進熟皇帝既升奠玉帛太官令出帥進饌者奉饌陳於內壝東門之外謁者引司徒出詣饌所司徒奉天帝之俎初皇帝既至位樂止太官令引饌入俎初入門奏雍和之樂以黃鐘之均自後接神之樂皆奏黃鐘之均至陛樂止饌升自午陛太祝迎引于壇上各設於神坐前籩豆蓋羃徹之如式謁者引司徒以下降自東陛復位諸執事各還樽所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤興承水皇帝盥手黃門侍郎跪取巾於篚興皇帝帨手訖黃門侍郎受巾跪奠於篚黃門侍郎又取匏爵於篚興進皇帝受爵侍中酌罍水又侍中奉盤承水皇帝洗爵黃門侍郎又授巾如初皇帝拭爵訖侍中奠盤匜黃門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝詣壇升自南陛訖樂止謁者引司徒升自東陛立於樽所齋郎奉俎從升立於司徒之後太常卿引皇帝詣天帝酒樽所執樽者舉羃侍中贊酌泛齊訖壽和之樂作皇帝每酌獻兩飲福酒皆作壽和之樂太常卿引皇帝進天帝神坐前北面跪奠爵俯伏興太常卿引皇帝少退北向立樂止太祝持版進於神坐之右東面跪讀祝文祝文臨時撰訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版於神坐興還樽所皇帝拜訖樂止太常卿引皇帝進天帝神坐前北面立樂作太祝以爵酌上樽福酒合置一爵一太祝持爵以授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俯伏興諸祝各帥齋郎進俎太祝減神前胙肉如常太祝以俎授司徒奉俎西向進皇帝受以授左右皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止謁者引司徒降復位皇帝既降壇謁者引諸軍將詣壇東陛升立於天帝神坐前北向西上初軍將升太祝帥齋郎以爵酌罍福酒進立於軍將之西東面北上軍將俱再拜受爵跪祭酒啐酒奠爵興太祝各帥齋郎進俎減神前胙肉以次授軍將受以授齋郎軍將俱跪取爵遂飲卒爵太祝帥齋郎受爵復於坫軍將俱興再拜謁者引軍將降復位諸祝各進跪徹豆興還樽所徹者籩豆各一少移于故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福者不拜豫和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作皇帝就望燎位南向立樂止于羣官將拜太祝各執篚進神坐前取玉幣祝版齋郎以爼載牲體稷黍飯及酒爵各由陛登壇南行經懸內當柴壇南東行自南陛登柴壇以玉幣祝版饌物置于柴上户內訖奉禮曰可燎東西面各六人以炬火燎半柴太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出內壝門殿中監前受鎮圭華蓋侍衛如常儀皇帝入次樂止謁者引告官及從駕羣官客使等與諸軍將以次出贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引出工人二舞以次出其祝版燔于齋所鑾駕還宫如郊社之儀大唐開元禮卷八十一
