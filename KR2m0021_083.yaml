body:
  text: 大唐開元禮卷八十三唐蕭嵩等撰軍禮皇帝親征告于太廟齋戒陳設鑾駕出宫晨祼饋食鑾駕還宫凱旋獻俘解嚴齋戒將告有司卜日如别儀前一日皇帝清齋於太極殿凡預告之官清齋於廟所近侍之官應從升者及羣官客使等各于本司及公館清齋一日諸軍將亦各于正寢清齋一宿若在營者齋于軍幕諸衞令其屬晡後一刻各以其方器服守衞廟門與太樂工人俱清齋一宿陳設前告三日尚舍直長施大次于廟東門之外道北南向尚舍奉御鋪御坐守宫設文武侍臣次于大次之後文官在左武官在右俱南向設告官及從駕羣官次各如常儀設軍將次于南門之外道東西向以北為上前二日太樂令設宫懸之樂于廟庭設登歌及舉麾位于殿上並如常儀右校清掃内外前一日奉御設御坐于東陛東南西向告官及従駕羣官版位設于内外如常儀設軍将位于懸南每等異位重行北面以西為上設軍將門外位於南門之外道東每等異位重行西面北上設酒樽之位于堂上前楹間各于室户之左北向春夏毎室雞彛一鳥彛一犧尊二山罍二秋冬斚彛一黄彛一著樽二山罍二皆加勺羃俱西上各有坫焉以置瓉爵設罍洗篚羃於常所篚實以巾爵珪瓉執樽罍篚羃者各位于樽罍篚羃之後太廟令整拂神幄又帥府史齋郎以樽坫罍洗篚羃入設于位告日未明十五刻太官令帥宰人以鸞刀割牲於厨每室各櫝一鑾駕出宫如圜丘之儀皇帝服武弁乘革輅前後備六軍嚴鼔並准大駕晨祼其日未明三刻諸預告之官各服其服太廟令良醖令各帥其屬入實樽罍雞彛斚彛犧尊著尊之上尊皆實以明水山罍之上尊實以𤣥酒鳥彜黄彛實以鬰鬯犧尊著尊實以醴齊山罍實以清酒太官令帥進饌者實諸籩豆簠簋等未明二刻奉禮帥賛者先入就位未明一刻賛引引御史博士太廟令太祝宫闈令及令史當祝史執樽罍篚幕者陛間北面西上立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳太廟令以下皆再拜升自東階入開埳室奉出九室神主各置于坐如常儀訖引就位駕將至謁者賛引各引告官以下通事舍人分引從告羣官諸方客使先至者俱就門外位駕至大次門外廻輅南向千牛將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅乘輿之大次太廟令以祝版進署如常儀謁者賛引各引告官及從駕羣官俱就門外位協律郎太樂令帥工人次入就位其升堂者皆脱履于下降納如常謁者賛引各引告官通事舍人分引從告羣官客使諸軍將等次入就位皇帝停大次半刻頃太常博士引太常卿立大次當門北向侍中版奏外辦皇帝出次華盖侍衞如常儀太常博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至廟門外監中殿進鎮珪華盖仗衞停於門外近侍者從入如常皇帝至版位西向立每立定太常卿博士退立于左太常卿前奏稱請再拜退還位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼔柷奏永和之樂乃以黄鐘之均樂舞九成偃麾戛敔樂止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太常卿引皇帝詣罍洗太和之樂作皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤興承水皇帝搢鎮珪凡受物則搢鎮珪奠訖執珪俛伏興皇帝盥手黄門侍郎跪取巾于篚興進皇帝帨手訖黄門侍郎受巾跪奠于篚黄門侍郎又取瓉于篚進皇帝受瓉侍中酌罍水又侍中奏盤皇帝洗瓉黄門侍郎又授巾皆如前皇帝拭瓉訖侍中奠盤匜黄門侍郎受巾奠于篚皆如常太常卿引皇帝樂作皇帝升自阼階樂止侍中中書令以下及左右侍衛量人従升太常卿引皇帝詣獻祖尊彛所執樽者舉羃侍中賛酌鬰酒訖登歌作肅和之樂以圜鐘之均自後登歌皆歌圜鐘太常卿引皇帝入詣獻祖神坐前北向跪以鬯祼地奠之俛伏興太常卿引皇帝出户北向再拜訖太常卿引皇帝詣懿祖尊彜所執樽者舉羃侍中取瓉于坫進皇帝受瓉侍中賛酌鬰酒訖太常卿引皇帝入詣懿祖神坐前北向跪以鬯祼地奠之俛伏興太常卿引皇帝出户北向再拜訖太常卿引皇帝次祼太祖次祼代祖次祼髙祖次祼太宗次祼髙宗次祼中宗次祼睿宗並如上儀訖登歌止太常卿引皇帝樂作皇帝降自阼階至版位西向立樂止饋食皇帝既升祼太官令出帥進饌者奉饌陳于東門之外謁者引司徒出詣饌所遂奉獻祖之俎初皇帝既至位樂止太官令引饌入自正門俎初入門雍和之樂作以無射之均饌至泰階樂止諸太祝迎引于階上各于神坐前設訖謁者引司徒降復位諸太祝各還樽所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止皇帝盥手洗爵侍中黄門侍郎賛洗皆如晨祼之儀訖太常卿引皇帝樂作皇帝升自阼階訖樂止太常卿引皇帝詣獻祖樽彜所執樽者舉羃侍中賛酌醴齊訖夀和之樂作太常卿引皇帝入詣獻祖神坐前北向跪奠爵俛伏興太常卿引皇帝出户北向立樂止太祝持版進于室户外之右東向跪讀祝文祝文臨時撰告以親征意訖興皇帝再拜又再拜初讀祝文訖樂作太祝入奠版于神坐出還樽所皇帝拜訖樂止太常卿引皇帝次詣懿祖太祖代祖髙祖太宗髙宗中宗睿宗樽彜所酌獻跪讀祝文再拜皆如獻祖之儀惟不盥手訖太常卿引皇帝詣東序西向立樂作皇帝獻将畢謁者引司徒升自東階立于前楹之間北面諸太祝各以爵酌上樽福酒合置一爵一太祝持爵以授侍中侍中受爵北向進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興諸太祝各帥齋郎持俎進太祝減神前胙肉又以籩取黍稷飯皆如常還樽所以黍稷飯共置一籩以胙肉共置一俎上先以飯授司徒司徒進皇帝受以授左右又以俎授司徒司徒奉進皇帝受以授左右皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復于坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自阼階還版位西向立樂止謁者引司徒降復位皇帝既降謁者引諸軍将自東階進立于皇考睿宗大聖真皇帝室户前北向西上初軍将升諸太祝各帥齋郎以爵酌罍福酒進立于軍将之東西向北上軍将俱再拜受爵跪祭酒啐酒奠爵興諸太祝各帥齋郎受爵復于坫軍将興俱再拜謁者引軍将降復位登歌作諸祝各入室徹豆出還樽所徹者籩豆各一少移于故處奉禮曰賜胙賛者唱衆官再拜衆官在位者皆再拜已飲福者不拜樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出門樂止殿中監前受鎮圭華盖侍衛如常儀皇帝入次謁者賛引各引在位者以次出賛引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出工人以次出太廟令太祝宫闈令納神主如常儀其祝版燔于齋坊鑾駕還宫皇帝既還大次侍中版奏請解嚴将士不得輒離部位皇帝仍武弁乘革輅鼓吹振作奏請還宫如常儀凱旋獻俘凱旋告日陳俘馘于南門之外北面西上軍實陳于後其告奠之禮皆與告禮同解嚴未解嚴前一日本司各隨職供辦尚舍奉御鋪御幄坐于太極殿中楹之間南向如常守宫設文武百官次于東西朝堂奉禮于東西朝堂設文武百官版位如初典儀設位于殿庭文東武西皆重行北向相對為首設典儀位于東階東南賛者二人在南差退乘黄令陳革輅旌旗之屬于殿庭其日平明諸衞各勒所部屯門列仗百官服袴褶督將服戎服皆集朝堂次晝漏上水五刻侍中版奏請中嚴鈒㦸以次列于殿庭上水七刻典謁引羣官以次入就位上水十刻應迎奉之官詣西閣奉迎侍中版奏外辦皇帝服通天冠絳紗袍御輿以出曲直華盖警蹕如常儀皇帝出自西方即御座侍臣夾侍如常儀典儀稱再拜賛者承傳羣官皆再拜通事舍人以次引羣官出侍中跪奏禮畢俛伏興還侍位皇帝降坐御輿入自東房侍臣從至閤如常大唐開元禮卷八十三
