body:
  text: 大唐開元禮卷七十唐蕭嵩等撰吉禮諸州祈社稷諸州祈禱諸神諸州禜城門諸州祈社稷前二日本司掃除壇之內外又為瘞塪于壇北如常設上佐以下次于社壇西門之外道北隨地之宜前一日諸祈官皆于祭所清齊一日掌事者饌酒脯醢設上佐位于稷壇西北掌事以下位於西門之內道北俱重行東向以南為上設贊唱者位于上佐東北東向南上設望瘞位于埋塪北南向設上佐以下門外位于西門之外道南俱重行北向以東為上其日夙興本司帥其屬守社壇四門去壇九十步所禁斷行人掌事者入設神坐樽坫罍洗篚羃如常祭之儀每坐各籩一豆一篚實巾二爵二配坐皆爵一並置于坫質明上佐以下各服其服本司帥掌事者入實樽罍祝版各置于坫又以幣各置于篚設于饌所其幣各長一丈八尺贊禮者引上佐以下俱就門外位贊唱者先入就位祝與執樽罍篚者入當社壇北重行南向以東為上立定贊唱者曰冉拜祝以下皆冉拜執樽者各升自西階立于樽所執罍篚者各就位祝詣社壇升自西階行掃除又詣稷壇升行掃除訖諸祝出奉幣篚入就瘞塪北位贊禮者引上佐以下入就位立定贊唱者曰冉拜上佐以下皆冉拜贊禮者進上佐之左白請行事還本位贊唱者曰再拜上佐以下皆再拜初白請行事掌饌者率執饌者奉饌陳于西門之外祝以幣授上佐贊者引上佐升社壇北陛南向跪奠于社神前訖興少退冉拜訖復位又祝以幣授上佐上佐奉幣升稷壇跪奠如社壇之儀訖掌饌者引饌入社稷之饌升自北陛配坐之饌升自西陛諸祝迎引于壇上各設于神坐前訖掌饌者降自西陛復位諸祝各還樽所贊者引上佐詣罍洗盥手洗爵自社壇北陛升詣社神酒樽所執樽者舉羃上佐酌酒進詣社神坐前南向跪奠爵興少退南向立祝持版進于神坐之右西向跪讀祝文曰維某年歲次月朔日子刺史姓名謹遣具位姓名敢昭告于社神久闕時雨黎元惟懼惟神哀此蒼生敷降嘉液謹以制幣清酌脯醢明薦于神以后土氏勾龍配神作主尚饗興上佐冉拜祝進跪奠版于神坐興還樽所上佐拜訖贊禮引上佐詣配坐酒樽所取爵于坫執樽者舉羃上佐酌酒進詣后土氏神坐前西向跪奠爵興少退西向立祝持版進于神坐之左南靣跪讀祝文曰維某年歲次月朔日子刺史姓名謹遣具位姓名敢昭告于后土氏久闕時雨黎元惟懼惟神哀此蒼生敷降嘉液謹以制幣清酌脯醢明薦于后土氏尚饗祝興上佐冉拜祝進跪奠版于神坐興還樽所上佐拜訖贊禮者引上佐降自北陛詣罍洗盥手洗爵詣稷壇北陛升獻如社壇之儀稷神及后稷氏祝文並同贊禮者引上佐降復位諸祝各進神坐前跪徹豆興還樽所贊唱者曰冉拜上佐以下皆冉拜贊禮者進上佐之左白請就望瘞位贊者引上佐就望瘞位南向立祝以篚于神前取幣及血黍稷飯皆置于塪贊唱者曰可瘞塪東西各二人置土半塪贊者進上佐之左白禮畢遂引出諸執事者以次出祝與執樽罍篚者降復執事位贊唱者曰冉拜祝以下皆冉拜以次出其祝版燔于齊所得雨報祠以豕羊其祭器之數及飲福受胙瘞幣血皆與正祭同餘與祈禮同祝文曰維某年歲次月朔日子刺史姓名謹遣具位某官姓名敢昭告于社神往以久闕時雨式陳誠禱惟神監祐降兹嘉液品物沾洽蒼生咸賴謹以制幣犧齊粢盛庶品明薦于社神以后土氏勾龍配神作主尚饗維某年歲次月朔日子刺史姓名謹遣具位姓名敢昭告于后土氏往以久闕時雨式陳誠禱惟神監祐降兹嘉液品物沾洽蒼生咸賴謹以制幣犧齊粢盛庶品明薦于后土氏尚饗稷神及后稷氏祝文並同諸州祈禱諸神前一日本司設上佐以下次于祈所隨地之宜又為瘞塪于神坐之南方深取足容物諸祈官皆于祈所清齊一日掌事者饌酒脯醢每坐籩豆各一祈日質明去祭所七十步禁止行人上佐以下各服其服祝帥掌事者奉席入設神坐于北廂南向若更有諸坐則以西為上贊禮者帥執樽者設樽于神坐之左北向設洗于酒樽東南北向罍水在洗西南肆篚在樽左篚實巾爵執樽罍篚者各位于樽罍篚之後設上佐以下位于神坐東南重行西向以北為上設贊唱者位于上佐西南西向設望瘞位于瘞塪之南北向設上佐以下門外位于東門之外道南北向西上掌事者入實樽罍祝以祝版置于坫又以幣置于篚設于饌所其幣長一丈八尺贊禮者引上佐以下俱就門外位贊唱者先入就位祝與執樽罍篚者入當神坐前北靣重行北向西上立定贊唱者曰冉拜祝以下皆冉拜執樽罍篚者各就位祝進神坐前行掃除訖贊唱者曰冉拜上佐以下皆冉拜贊禮者進上佐之左白請行事退復位贊唱者曰冉拜上佐以下皆冉拜初白請行事掌饌者帥執饌者奉饌陳于西門之外祝以幣授上佐上佐奉幣跪奠于神坐前訖興少退冉拜訖復位掌饌者引饌入祝迎引于坐首各設于神坐前執饌者退復位祝還樽所贊禮者引上佐詣罍洗盥手洗爵訖詣酒樽所執樽者舉羃上佐酌酒贊禮者引上佐詣神坐前北向跪奠爵興少退北向立祝持版進于神坐之右東向跪讀祝文曰維某年歲次月朔日子刺史姓名謹遣具位姓名敢昭告于某神爰以農要久闕時雨惟神哀此蒼生敷降靈液謹以制幣清酌脯醢明薦于某神尚饗祝興上佐冉拜祝進跪奠版于神坐興還樽所若更有諸坐祈官酌獻皆如上儀唯不盥手其祝文與上同贊禮者引上佐還本位祝進神坐前跪徹豆興還樽所贊唱者曰冉拜上佐以下皆冉拜贊禮者進上佐之左白請就望瘞位上佐就望瘞位北向立祝以幣置于坎東西各二人置土半坎贊者進上佐之左白禮畢遂引上佐以下出訖祝與執樽罍篚者俱復執事位贊唱者曰冉拜祝以下皆冉拜以出其祝版燔于齊所若祈海瀆等幣沈之設奉幣位各向所祈之水沉之儀節一與瘞同若祈先代帝王其瘞正祭得雨報祠幣如正祭之禮牢饌飲福受胙若非嶽鎮海瀆及先代帝王唯飲福不受胙瘞幣血皆同祭社之禮其瘞塪之位仍依祈禮若海瀆等沉幣又并沉血其奉幣血位及沉之儀節皆凖祈沉之禮若報祠先代帝王其幣仍與祈同餘皆與祈禮同祝文曰維某年歲次月朔日子刺史姓名謹遣具位姓名敢昭告于某神往以久闕時雨式陳誠禱惟神鍳祐降兹嘉液品物霑洽蒼生咸賴謹以制幣犧齊粢盛庶品明薦于神尚饗諸州禜城門若霖雨不止禜祭城門設神坐皆內向設瓢齊之樽于神坐之左設罍洗及篚于酒樽之左俱內向設司功位于罍洗之左而右向執事者位于其後皆以近神為上贊禮者贊拜無幣不為瘞坎餘與祈諸神同祝文曰維某年歲次月朔日子刺史姓名謹遣具位姓名敢昭告于城門霖雨久淹害于百榖惟靈降福應時開霽謹以清酌嘉獻明告于城門尚饗若雨止報祠用特牲飲福餘與禜同祝文曰維某年歲次月朔日子刺史姓名謹遣具位姓名敢昭告于城門前以霖雨式陳誠禱惟靈降祉應時開霽謹以清酌牲齊粢盛庶品明薦于城門尚饗大唐開元禮卷七十
