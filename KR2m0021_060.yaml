body:
  text: 大唐開元禮卷六十唐蕭嵩等撰吉禮皇帝巡狩告於太廟齋戒陳設鑾駕出宫晨祼饋食鑾駕還宫齋戒將告有司卜日如别儀前一日皇帝清齋於太極殿凡預告之官清齋於廟所近侍之官應從升者及羣官客使等各於本司及公館清齋一宿諸衛令其屬晡後一刻各以其方器服守衛廟門與太樂工人俱清齋一宿陳設前告三日尚舍直長施大次於廟東門之外道北南向尚舍奉御鋪御坐守宫設文武侍臣之次於大次之後文官在左武官在右俱南向又設告官及從駕羣官次各於常所前二日太樂令設宫懸之樂於廟庭設登歌及舉麾位於殿上並如常儀右校清掃內外前一日奉禮設御位於廟東階東南西向設告官及從駕羣官版位於內外如常儀設酒樽之位於堂上前楹間各於室戶外之左北向每室春夏雞彛一鳥彛一犧樽二秋冬斚彜一黃彛一著樽二皆加勺冪俱西上各有所實圭盞瓚杓設罍洗篚羃於常所篚實以圭瓚巾爵執樽罍篚羃者各位於樽罍篚羃之後太廟令整拂神幄又帥府史齋郎以樽坫罍洗篚羃入設於位告日未明十五刻太官令帥宰人以鸞刀烹牲於厨每室各犢一鑾駕出宫如常儀晨祼其日未明三刻諸預告之官各服其服太官令良醖令各帥其屬入實樽罍雞彛斚彛犧尊之上實以明水鳥彛黃彜實以鬱鬯著尊實以醴齊太官令帥進饌者實諸籩豆簠簋等未明二刻奉禮帥贊者先入就位贊引引御史太祝以下入行掃除如常儀訖各引就位未明一刻贊引引太廟令太祝宫闈令入當階間北面西上立定奉禮曰再拜贊者承傳太廟令以下皆再拜升自東階入開塪室奉出獻祖以下九室神主各置於座如常儀訖各就位駕將至謁者贊引各引告官以下通事舍人分引從羣官客使先至者俱就門外位駕至大次門外回輅南向千牛將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次太廟令以祝版進署如常通事舍人各引從駕群官俱就門外位太樂令帥工人次入就位其升堂者皆脫履於下降納如常謁者贊引各引告官及從官客使次入就位皇帝停大次半刻頃太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝出次華蓋侍衛如常儀博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引廟門外殿中監進鎮圭華蓋仗衛停於門外近侍者從入如常皇帝至版位西面立太常卿前奉稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏興舉麾凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏永和之樂乃以黃鐘之均九成黃鐘三奏大吕太簇應鐘各再奏也偃麾戛敔樂止凡樂皆協律郎舉麾工鼓止柷而後作偃麾戛敔而後太常卿前奏請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太常卿引皇帝詣罍洗太和之樂作皇帝每行皆作太和之樂皇帝至罍洗樂止侍中跪取􅓢興沃水又侍中跪取盤興承水皇帝搢鎮圭凡受物則搢鎮圭奠訖執圭俯伏興皇帝盥手黃門侍郎跪取巾於篚興進皇帝帨手訖黃門侍郎受巾跪奠於篚黃門侍郎又取圭瓚於篚進皇帝受瓚侍中酌罍水又侍中奉盤皇帝洗瓚黃門侍郎又授巾皆如初皇帝拭瓚訖侍中奠盤􅓢黃門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝升自阼階樂止侍中中書令以下及左右侍衛量人從升太常卿引皇帝詣獻祖樽罍所執樽者舉羃侍中贊酌鬱酒訖登歌作肅和之樂以圜鐘之均自後登歌皆用圜鐘太常卿引皇帝入詣獻祖神座前北向跪以鬯祼地奠之俯伏興太常卿引皇帝出户北向再拜訖太常卿引皇帝詣懿祖樽彛所執樽者舉羃侍中取瓚於坫進皇帝受瓚侍中贊酌鬱酒訖太常卿引皇帝入詣懿祖神坐前北向跪以鬯祼地奠之俯伏興太常卿引皇帝出户北向再拜訖太常卿引皇帝次祼太祖次祼髙祖次祼太宗次祼髙宗次祼中宗次祼睿宗並如上儀訖登歌止太常卿引皇帝樂作皇帝降自阼階至版位樂止饋食皇帝既升祼太官令出帥進饌者奉饌陳於東門之外謁者引司徒詣饌所司徒奉獻祖之俎初皇帝既至位樂止大官令引饌入自正門俎初入門雍和之樂作以無射之均籩豆蓋羃徹之如式設訖謁者引司徒以下降復位諸祝各還樽所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止皇帝盥手洗爵侍中黃門侍郎贊洗皆如晨祼之儀訖太常卿引皇帝樂作皇帝升自阼階訖樂止太常卿引皇帝詣獻祖樽彜所執樽者舉羃侍中贊酌醴齊訖夀和之樂作皇帝酌獻飲福皆作夀和之樂太常卿引皇帝詣獻祖神坐前北靣跪奠爵俯伏興太常卿引皇帝出户北向立樂止太祝持版進於室户外之右東面跪讀祝文祝文臨時撰訖興皇帝再拜初讀祝文訖樂作太祝入跪奠版於神坐前興出還樽所皇帝拜訖樂止太常卿引皇帝詣懿祖樽彜所執樽者舉羃侍中取爵於坫進皇帝受爵侍中贊酌醴齊訖太常卿引皇帝以次獻皆如懿祖之儀惟不盥洗訖太常卿引皇帝詣東序西向立樂作皇帝獻將畢謁者引司徒升自東階立於前楹之間北面諸祝各以爵酌福酒合置一爵一太祝持爵以授侍中侍中受爵北向進皇帝再拜受爵跪祭酒啐酒奠爵俯伏興諸祝各帥齋郎持俎進太祝減神前胙肉又以籩取稷黍飯皆如常還樽所以黍稷飯共置一籩以胙肉共置一俎上先以飯授司徒司徒奉進皇帝受以授左右又以俎授司徒司徒奉進皇帝受以授左右皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫皇帝俯伏興再拜樂止太常卿引皇帝樂作皇帝降自阼階還版位西向立樂止謁者引司徒降復位登歌作諸祝各入室徹豆出還樽所徹者籩豆各一少移於故處登歌止奉禮曰賜胙贊者唱衆官再拜衆官皆再拜樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官皆再拜樂一成止太常卿前奏禮畢太常卿引皇帝出門樂止殿中監前受鎮圭華蓋侍衛如常儀皇帝入次謁者贊引各引在位者以次出贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人以次出太廟令太祝宫闈令納神主如常儀其祝版燔於齋坊鑾駕還宫如常儀大唐開元禮卷六十
