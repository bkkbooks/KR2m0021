body:
  text: 大唐開元禮卷九十唐蕭嵩等撰軍禮合朔伐鼓合朔諸州伐鼓大儺諸州縣儺合朔伐鼓二分二至即否其日合朔前三刻郊社令及門僕各服赤幘絳衣守四門令巡門監察鼓吹令平巾幘袴褶帥工人以方色麾旒分置四門屋下龍蛇鼓隨設于左東門者立于北孰南靣南門者立于東孰西靣西門者立于南孰北靣北門者立于西孰東靣門側堂曰孰麾杠各長一丈旒以方色各長八尺隊正一人著平巾幘袴褶執刀帥衛士五人執五兵立于鼓外矛處東㦸在南斧鉞在西矟在北郊社令立攢于社壇四隅以朱絲繩縈之太史官一人赤幘赤衣立于社壇北向日觀變黃麾次之龍鼓一靣次之在北弓一張矢四鍭次之諸工鼓靜立候日有變史官曰祥有變工人齊舉麾龍鼓齊發聲如雷史官稱止工人罷鼓其日廢務百官守本司日有變皇帝素服避正殿百官以下府史以上皆素服各于聽事之前重行每等異位向日立明復而止合朔諸州伐鼓其日見日有變則廢務所司置鼓于刺史聽事之前刺史州官及九品以上俱素服立于鼓後重行每等異位向日立刺史先擊鼓執事代之明復俱止大儺大儺之禮前一日所司奏聞選人年十二以上十六以下為侲子著假靣衣赤布袴褶二十四人為一隊六人作一行執事者十二人著赤幘褠衣執鞭工人二十二人其一人方相氏著假靣黃金四目䝉熊皮𤣥衣朱裳右執戈左執楯其一人為唱師著假面皮衣執捧鼓角各十合為一隊隊别鼓吹令一人太卜令一人各監所部巫師二人令已下皆服平巾幘袴褶以逐惡鬼于禁中有司預備每門雄雞及酒擬于宫城正門皇城諸門磔禳設祭太祝一人齊郎三人右校為瘞塪各于皇城中門外之右方深稱其事前一日之夕儺者赴集所具其器服依次陳布以待事其日未明諸衛依時勒所部屯門列仗近仗入陳于階下如常儀鼓吹令帥儺者各集于宫門外內侍詣皇帝所御殿前奏侲子備請逐疫訖出命寺伯六人分引儺者于長樂門永安門以入至左右上閣鼓譟以進方相氏執戈揚楯唱率唱侲子和曰甲作食􅓇胇胃食疫雄伯食魅騰簡食不祥覽諸食咎伯竒食夢強梁祖明共食磔死寄生委隨食觀錯斷食巨窮竒騰根共食蠱凡使一十二神追惡鬼凶赫汝軀拉汝幹節解汝肌肉抽汝肺腸汝不急去後者為糧周呼訖前後鼓譟而出諸隊各趨順天門以出分詣諸城門出郭而止儺者將出祝布神席當中門南向出訖宰手齊郎疈牲胸磔之神席之西藉以席北首齊郎酌酒太祝受奠之祝史持版于坐右跪讀祝文曰維某年歲次月朔日天子遣太祝臣姓名敢昭告于太隂之神𤣥冬已謝青陽馭節惟神屏除凶厲俾無後艱謹以清酌敬薦于太隂之神尚享訖興奠版於席乃舉牲并酒瘞於坎訖退其內寺伯導引出順天門外止諸州縣儺方相四人俱執戈楯唱率四人戈今以小㦸方相唱率俱以雜職充之侲子都督及上州六十人中下州四十人縣皆二十人其方相唱率縣皆二人取人年十五以下十三以上雜職八人四人執鼓四人執鞭前一日之夕所司帥領宿于州府門外其縣門亦如之未辨色所司白刺史請引儺者入其縣令則所司白縣令將辨色宦者二人出門各執青麾引儺者入無宦者外人引導于是儺者擊鼓俱譟呼鼓鞭擊戈揚楯而入唱率唱侲子和曰甲作食􅓇胇胃食疫雄伯食魅騰簡食不祥覽諸食咎伯竒食夢強梁祖明共食􅣭死寄生委隨食觀錯斷食巨窮竒騰根共食蠱凡使一十二神逐惡鬼凶赫汝軀拉汝幹節解汝肌肉抽汝肝腸汝不急去後者為糧宦者引之遍索諸室及門巷訖宦者引出中門所司接引出仍鼓譟而出出大門外分為四部各趣城四門出郭而止初儺者入祝五人各帥執事者以酒脯各詣州門及城四門其縣門亦准此儺者出便酌酒奠脯于門右禳祝而止乃舉酒脯埋于西南酒以爵脯以籩其祝文曰維某年歲次月朔日祝姓名敢昭告于太隂之神寒往暑來隂陽之恆度惟神無泆其道以屏􅓇厲謹以酒脯之奠敬薦于神尚饗大唐開元禮卷九十
