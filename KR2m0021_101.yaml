body:
  text: 大唐開元禮卷一百一唐蕭嵩等撰嘉禮皇帝於明堂讀孟秋令皇帝於明堂讀仲秋令皇帝於明堂讀季秋令皇帝於明堂讀孟秋令陳設禮部尚書先讀令三日奏讀月令承以宣告前三日尚舍直長施大次於白虎門外道北南向尚舍奉御設御坐守宫設文武侍臣次於大次之後文官在左武官在右俱南向設羣官次於壁水西門之外文官在南武官在北俱東上前一日尚舍奉御設御幄坐於總章左個近東西向守宫設三品以上及諸司掌官坐於堂上文官於御坐西南北向武官於御坐西北南向俱重行東上無長官者次官一人升判官不合設刑部郎中讀令坐於御坐西北南向有案設文官解劔席於申陛之左設武官解劔席於酉陛之右皆內向太樂令展宫懸於總章左個之庭設舉麾位於堂上申陛之北南向一位於樂懸西南北向典儀設三品以上及應升坐者位於懸西文左武右俱重行東向相對為首又設非升坐者位文官四品五品於懸南六品以下於其西絶位俱北向武官四品五品於懸北六品以下於其西當文官俱南向皆重行東上設典儀位於懸之東南贊者二人在西差退俱北向奉禮設門外位各於次前俱每等異位重行相向東上鑾駕出宫前出宫三日本司宣設內外各供其職守宫設從駕之官五品以上次於承天門外東西朝堂如常前二日太樂令設宫懸之樂於殿庭如常儀其日未明七刻捶一鼓為一嚴三嚴時節前一日侍中奏裁侍中奏開宫殿門及城門未明五刻捶二鼓為再嚴侍中版奏請中嚴奉禮設從駕羣官五品以上位文官於東朝堂之前西向武官於西朝堂之前東向俱重行北上從駕羣官五品以上俱集朝堂次各服其服其六品以下並駕發之前預赴明堂所俱就次各服其服所司陳小駕鹵簿未明二刻捶三鼓為三嚴諸衛之屬各督其隊與鈒㦸以次陳于殿庭謁者引從駕群官各就朝堂前位諸侍衛之官各服其器服侍中中書令以下俱詣西閣奉迎侍中負璽如式乘黃令進金輅於西閣外南向千牛將軍一人執長刀立于輅前北向黃門侍郎一人在侍臣之前贊者二人又在黃門之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝服通天冠白紗袍佩白玉御輿以出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應協律郎跪俯伏舉麾鼓柷奏太和之樂千牛將軍前執轡皇帝升輅太僕卿立授綏侍中中書令以下夾侍如常黃門侍郎進當鑾駕前跪奏稱黃門侍郎臣某言請鑾駕發引俯伏興退復位凡黃門侍郎奏請皆進當鑾駕前跪奏稱具官臣某言訖俯伏興鑾駕動又稱警蹕黃門侍郎與贊者夾引以出千牛將軍夾輅而趍駕至太極門偃麾戛敔樂止出太極門鼓柷奏采茨之樂出嘉德門戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止至承天門外侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸衛之官各督其屬左右翊駕在黃麾內符寶郎奉六寶與殿中監後部從侍中中書令以下夾侍于輅前贊者在供奉官人內侍臣上馬畢黃門侍郎奏稱請敕車右升侍中前承詔退稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕鼓傳音如常鼓吹振作而行其從駕之官在𤣥武隊後如常儀讀令其日依時刻諸衛勒所部屯門列仗及總章左個之庭如常先至羣官俱集次各服其服駕將至通事舍人各引先至羣官俱就門外位駕至大次門外回輅南向千牛將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅御輿之大次繖扇華蓋侍衛警蹕如常儀通事舍人引文武五品以上從駕之官皆就門外位太樂令帥工人就位協律郎入就舉麾位典儀帥贊者先入就位通事舍人引群官非升坐者入就位刑部郎中以月令置于案覆以帊令史二人俱絳公服對舉案立于武官五品西北郎中立于案後南面侍中版奏外辦皇帝御輿出次曲直華蓋侍衛警蹕如常儀入自白虎門皇帝初入門太樂令令撞𬎼賔之鐘左五鐘皆應鼓柷作太和之樂皇帝升自申陛入即御坐西向坐符實郎奉寶置于御坐侍臣夾侍如常儀戛敔樂止典儀一人升立于左個西南北面通事舍人引公王以下入就東面位公初入門舒和之樂作凡公行皆作舒和之樂至位樂止群官立定典儀曰再拜贊者承傳凡典儀有詞贊者皆承傳在位者皆再拜侍中前跪奏稱侍中臣某言請延公王等升俯伏興又侍中稱制曰可侍中詣左個西南北向稱制延公王等升堂上典儀承傳堂下贊者又承傳在位者皆再拜通事舍人以次引東面位者各詣其陛公初行樂作至解劔席樂止公王以下俱升席跪解劔俯伏興脫舄通事舍人各引升立於坐後刑部郎中引案進立於酉陛下侍中跪奏請讀月令俯伏興又侍中稱制曰可侍中退復位刑部郎中再拜就解劔席跪解劔俯伏興脫舄取令持案者仍立于下通事舍人引刑部郎中奉令升自酉陛詣席北南向跪置令於案俯伏興立於席後堂上典儀唱就坐公王以下及刑部郎中並就位俯伏坐刑部郎中讀令每句一絶使言聲可了讀令訖堂上典儀唱可起公王以下皆起通事舍人引王公以下及刑部郎中俱降刑部郎中以令置于案與群官俱跪佩劔俯伏興脫舄通事舍人各引還本位公初行樂作至位樂止立定典儀曰再拜在位者皆再拜通事舍人引東面位者出公初行樂作出門樂止侍中跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞黃鐘之鐘右五鐘皆應太和之樂作皇帝降坐御輿以出之便次警蹕侍衛如來儀出門樂止舍人引南北面位者以次出孟秋令孟秋之月日在翼昏建星中旦畢中其日庚辛其帝少皡其神蓐收其蟲毛其音商律中夷則其數九其味辛其臭腥其祀門凉風至白露降寒蟬鳴鷹乃祭鳥用始行戮食麻與犬其器廉以深是月也以立秋先立秋七日禮部奏曰某日立秋盛德在金皇帝乃齊立秋之日皇帝親帥百官迎秋於西郊還賞帥武人於朝乃命將帥選士厲兵簡練傑俊専任有功以征不義詰誅暴慢以明好惡順彼逺方是月也命有司修法制繕囹圄具桎梏禁止奸慎罪邪務搏執瞻傷察創視折審斷決獄訟必端平戮有罪嚴斷刑天地始肅不可以贏是月也農乃登穀皇帝嘗新先薦宗廟命百官始收斂完隄防謹壅塞以備水潦修宫室坯墻垣補城郭孟秋行冬令則隂氣大勝介蟲敗穀戎兵乃來行春令則其國乃旱陽氣復還五穀無實行夏令則國多火災寒熱不節人多瘧疾鑾駕還宫皇帝既還大次侍中版奏請解嚴將士不得輒離部伍皇帝停大次一刻頃捶一鼓為一嚴轉仗衛于還塗如來儀三刻頃捶二鼓為再嚴將士布隊仗侍中版奏請中嚴五刻頃捶三鼓為三嚴謁者贊引群官序立于次前文武侍臣詣大次奉迎乘黃令進金輅于大次門外南向千牛將軍立于輅右侍中版奏外辦太僕卿升執轡皇帝御輿出繖扇侍衛警蹕如常儀皇帝升輅太僕卿立授綏黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕如常儀黃門侍郎贊者夾引千牛將軍夾輅而趍至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬畢黃門侍郎奏稱請敕車右升侍中稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發退復位鼓傳音鑾駕動鼓吹振作而還文武羣官皆從如來儀駕至承天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立於輅右訖鑾駕動千牛將軍夾輅而趨駕入嘉德門太樂令令撞𬎼賓之鐘左五鐘皆應鼓柷奏采茨之樂至太極門戛敔樂止入太極門鼓柷奏太和之樂駕至橫街北當東上閣回輅南向侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅御輿以入繖扇侍衛警蹕如常儀侍臣從至閣戛敔樂止初文武羣官至東朝堂通事舍人承㫖敕羣官並還皇帝既入侍中版奏請解嚴叩鉦將士各還其所皇帝於明堂讀仲秋令陳設尚舍奉御設御幄坐於總章太廟設文官解劔席於申陛之左設武官解劔席於戌陛之右太樂令展宫懸於總章太廟之庭設舉麾位於堂上酉陛之北餘並如孟秋陳設之儀鑾駕出宫右並如孟秋出宫之儀讀令其日諸衛列仗於總章太廟之庭皇帝升自酉陛典儀一人升立於總章太廟西南侍中詣總章太廟西南稱詔刑部郎中升戌陛並如孟秋讀令之儀仲秋令仲秋之月日在角昏牽牛中旦觜中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中南吕其數九其味辛其臭腥其祀門盲風至鴻雁來𤣥鳥歸羣鳥養羞食麻與犬其器廉以深是月也養衰老授杖几行糜粥飲食乃命司服具飭衣裳文繡有恆制有小大度有短長衣服有量必修其故冠帶有常命有司申嚴百刑斬殺必當毋或枉橈柱橈不當反受其殃是月也乃命有司循行犧牲視全具案芻豢瞻肥瘠察物色必比類量大小視長短皆中度五者偹當上帝其饗皇帝以犬嘗麻先薦宗廟是月也可以築城郭建都邑穿竇窖修囷倉趣人收斂務畜菜多積聚乃勸種麥毋或失時其有失時行罪無疑是月也日夜分雷始收聲蟄蟲坯户殺氣浸盛陽氣日衰日夜分則同度量平權衡正鈞石角斗甬凡舉事毋逆大數必順其時慎因其類仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五穀復生行冬令則風災數起收雷先行草木早死鑾駕還宫右並如孟秋還宫之儀皇帝於明堂讀季秋令陳設尚舍奉御設御幄坐於總章右個設文官解劔席於酉陛之左設武官解劔席於亥陛之右太樂令展宫懸於總章右個之庭設舉麾位於堂上戌陛之北餘並如仲秋陳設之儀鑾駕出宫右並如孟秋出宫之儀讀令其日諸衛列仗於總章右個之庭皇帝升自戌陛典儀一人升立於總章右個西南侍中詣總章右個西南稱詔刑部郎中升自亥陛餘並如仲秋讀令之儀季秋令季秋之月日在房昏虛中旦栁中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中無射其數九其味辛其臭腥其祀門鴻雁來賓爵入大水為蛤菊有黃華豺乃祭獸戮禽食麻與犬其器廉以深是月也申嚴號令命百官貴賤無不務內以㑹天地之藏毋有宣出乃命有司農事備收舉五穀之要藏帝藉之收於神倉祗敬必飭霜始降百工休是月也大饗上帝於明堂草木黃落乃伐薪為炭蟄蟲咸俯在內皆墐其户乃趣决獄刑毋留有罪收祿秩之不當供養之不宜者是月也皇帝乃以犬嘗稻先薦宗廟季秋行夏令則其國大水冬藏殃敗人多鼽嚏行冬令則國多盜賊邊境不寧土地分裂行春令則暖風來至人氣解惰師興不居鑾駕還宫右並如仲秋還宫之儀大唐開元禮卷一百一
