body:
  text: 大唐開元禮卷一百七唐蕭嵩等撰嘉禮內册皇太子卜日告圜丘告方澤告太廟臨軒命使皇太子受册朝見謁太廟會羣臣羣臣上禮皇后受羣臣賀皇后會外命婦皇太子會羣臣皇太子會宫臣宫臣上禮卜日册皇太子有司卜日如别儀告圜丘告方澤告太廟右有司行事如常告之儀臨軒命使將行册禮所司奏請太尉為使司徒為副前一日尚舍奉御設御幄于太極殿北壁下南向鋪御坐如常守宫設群官次于東西朝堂太樂令展宫懸于殿庭設舉麾位于殿上西階之西東向一位于樂懸東南西向鼓吹令展十二案於建鼓之外乘黃令陳車輅尚輦奉御陳輿輦並如常儀典儀設羣官版位文官一品以下五品以上于懸東六品以下於橫街之南俱重行西面北上武官一品以下五品以上于懸西六品以下于橫街之南俱東面諸親于五品以上之南皇宗親在東異姓親在西蕃客各分方于六品以下之南皆以北為上並如常儀若有朝集使分方于文武官當品以下諸州使人分方于朝集使九品之後設典儀位于懸之東北贊者二人在南少退俱西向設册使主副受命位于大橫街南道東俱北面西上奉禮設門外位皆如元日之儀其日諸衛勒所部列黃麾大仗如常儀羣官等依時刻集朝堂俱就次各服朝服通事舍人各引就朝堂前位侍中量時刻版奏請中嚴鈒戟近仗各入陳於殿庭太樂令鼓吹令等帥工人入就位協律郎入就舉麾位典儀帥贊者先入就位諸侍衛之官各服其器服符寶郎奉寶俱詣閣奉迎通事舍人引羣官入就位又引册使入立于太極門外道東西面黃門侍郎帥主節奉節立于左延明門內道北中書侍郎帥令使奉册案及璽綬案立于節南俱西面每案各令史二人絳公服對舉仍覆以帕侍中版奏外辦皇帝服衮冕御輿以出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應協律郎跪俯伏舉麾凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止鼓柷奏太和之樂鼓吹振作皇帝出自西房即御坐南向坐符寶郎奉寶置于御坐如常樂止通事舍人引册使主副入就位太尉初入門舒和之樂作至位樂止立定典儀曰再拜贊者承傳羣官在位者皆再拜侍中前承制降詣使者東北西面稱有制册使俱再拜侍中宣制曰册某為皇太子命公等持節展禮宣制訖又俱再拜侍中還侍位黃門侍郎引主節立于使者東北西面主節以節授黃門侍郎黃門侍郎執節西面授太尉太尉受付主節主節立於使後黃門侍郎退中書侍郎引册案及璽綬案立于册使東北西面中書侍郎取册持案者退自使後立于太尉之左西面授太尉太尉受册置于案持案者退立于使後中書侍郎又取璽綬以授太尉太尉受置于案皆如受册之儀中書侍郎退典儀曰再拜贊者承傳羣官在位者皆再拜通事舍人引册使出持節者前導持案者從之太尉初行樂作出門樂止侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞㽔賔之鐘左五鐘皆應鼓柷奏太和之樂皇帝降坐侍衛警蹕如來儀入自東房樂止通事舍人引羣官在位者以次出蕃客先出皇太子受册前一日守宫設册使次于重明門外道西副使次又于其西俱南面並鋪床席又設宫臣文武官次于東宫朝堂如常所司陳設皇太子羽儀車輿及樂懸等並如元日受朝之儀掌筵設皇太子受册位于殿庭階間北面掌儀設宫官版位于殿庭文官五品以上于懸東六品以下於橫街之南皆西面北上武官五品以上于懸西六品以下於橫街之南當文官皆東面北上奉禮設朝堂前位如常其日諸衛率各勒所部屯門列仗如式宫官于册使未到之前量時刻赴集次改服朝服各就朝堂前位太尉司徒既受命出自朝堂乘輅備鹵簿鼓吹持節如式其册璽綬各以油絡網犢車載而行至東宫朝堂降輅謁者引就次持節者前導持案者從之掌次者延入次初册使將至通事舍人引各宫臣入就殿庭位左庶子版奏請中嚴宫臣入訖通事舍人引太尉司徒入立于左閣門外西面北上持幡節及册璽案者至閣外並以給使代之左庶子版奏外辦皇太子著雙童髻絳紗袍就受册位所司預奏請左庶子一人引導相禮典直承引太尉以下入太尉立于階間南面司徒立于太尉西南東面節在太尉東南西面册璽案在司徒西南東面掌書二人立于皇太子之左少前東面司徒就案取册進東面授太尉持節者脫節衣太尉稱有詔左庶子贊皇太子再拜皇太子再拜太尉宣册訖左庶子又贊皇太子再拜皇太子又再拜左庶子進詣太尉前受册退授皇太子皇太子受以授掌書司徒又次取璽綬進東面授太尉左庶子進太尉前受退授皇太子皇太子受以授掌書訖持節者加節衣左庶子贊皇太子退典直各引太尉以下出至閣外通事舍人承引以出其案及幡節等並轉付令史主節又通事舍人各引宫臣以次出太尉司徒乘輅詣朝堂至降車所降輅入至太極殿庭大橫街南御道東北面西上立中書令立於太尉東北西面太尉等再拜復命曰奉詔册皇太子禮畢又再拜中書令奏聞太尉等退鹵簿幡節等各還本司皇太子朝謁其日册訖皇太子著雙童髻絳紗袍詣皇帝所御殿如常內朝之式至閣司賔引入至殿前北面再拜司賔引退詣皇后所御殿前北面再拜司賔引出還宫如常謁太廟皇帝會羣臣羣臣上禮皇后受羣臣賀皇后會外命婦皇太子會羣臣皇太子會宫臣宫臣上禮右並如臨軒册命之儀大唐開元禮卷一百七
