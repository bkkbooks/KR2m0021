body:
  text: 大唐開元禮卷五十八唐蕭嵩等撰吉禮皇帝巡狩告於太社齊戒陳設鑾駕出宫薦玉帛進熟鑾駕還宫齊戒將告有司卜日如别儀前一日皇帝清齊於太極殿諸預告之官清齊於太社署近侍之官應從升者及羣官客使等各於本司及公館清齊一宿諸衛令其屬晡後一刻各以其方器服守衛社宫門與樂工人俱清齊一宿陳設前告三日尚舍直長設大次於社宫西門之外道北南向尚舍奉御鋪御坐守宫設文武侍臣及從駕羣官次各於常所前二日太樂令設宫懸之樂於壇北各設登歌及舉麾位各於壇上並如常儀右校清掃內外又為瘞坎二於樂懸之北如常前一日奉禮設御位於北門之內當社壇南向設告官及從駕羣官版位於內外如常儀郊社令帥府史二人及齊郎以樽坫洗篚羃入設皆如常儀執樽罍篚羃者各位於樽罍篚羃之後告日未明十五刻太官令帥宰人烹牲於厨牲用黑牛二齊郎以豆取牲血如常未明四刻太社令郊社令各服其服升設神坐席位如常鑾駕出宫皇帝服衮冕乘玊輅陳大駕鹵簿其嚴鼓時刻奏請進發內外器服皆如常儀薦玉帛其日未明三刻諸告官各服其服郊社令良醖令各帥其屬入實樽罍玉幣太尊實以醴齊配坐之象尊其實亦如之其明水各實于上尊玊俱以兩圭有邸太祝各以幣置於篚幣隨牲色各長一丈八尺太官令帥進饌者實諸籩豆簋簠等皆設於神厨未明二刻奉禮帥贊者先入就位贊引引御史太祝以下行掃除如常儀訖各引就位車駕將至謁者贊引各引告官以下及從升羣官客使先至者俱就門外位駕至大次門外回輅南向千牛將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次郊社令以祝版進署如常謁者贊引各引從駕羣官俱就門外位奉禮帥贊者先入就位贊引引御史及諸太祝與執樽罍篚羃者亦就位太樂令帥工人次入就位升堂者皆降脫履於下納如式通事舍人各引告官及從告羣官客使次入就位皇帝停大次半刻頃太常博士引太常卿立於大次門外北向侍中版奏外辦皇帝出次華蓋侍衛如常儀博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至社宫北門外殿中監進鎮圭華蓋仗衛停於門外近侍者從入如常皇帝至版位南向立每立定太常卿與博士退立於左太常卿前奏請再拜退復位皇帝再拜奉禮曰衆官再拜贊者承傳凡奉禮有詞贊者皆承傳衆官在位者皆再拜太常卿奏有司謹具請行事退復位協律郎跪俯伏興舉麾鼓祝奏順和之樂以函鐘之均樂八成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戞敔而後止太常卿前奏再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜諸祝俱取玉幣於篚各立於樽所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣太社壇升自北陛近侍者從升如常儀皇帝升壇南向立樂止太祝加幣玉以授侍中侍中奉玉幣西向進皇帝受玉幣登歌作肅和之樂以應鐘之均太常卿引皇帝進南面跪奠於太社神前俯伏興太常卿引皇帝少退南向再拜太常卿引皇帝立於東方西向又太祝以幣授侍中侍中奉幣南面進皇帝受幣太常卿引皇帝進西向跪奠於后土氏神坐俯伏興太常卿引皇帝少退西向再拜訖登歌止太常卿引皇帝降自北陛樂作太常卿引皇帝詣太稷壇升奠玉幣於太稷氏后稷氏升降皆如太社壇訖太常卿引皇帝降自北陛樂作皇帝還版位南向立樂止進熟皇帝既升奠玉幣太官令出帥進饌者奉饌陳於西門之外司徒奉太社之俎初皇帝既至位樂止太官令引太社太稷之饌入自正門后土后稷之饌入自左門俎初入門雍和之樂作饌至陛樂止太社太稷之饌升自北陛后土后稷之饌升自西陛諸祝迎引於壇上各設於神坐前訖謁者引司徒以下降復位諸祝各還樽所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取􅓢興沃水又侍中跪取盤興承水皇帝盥手黃門侍中跪取巾於篚興進皇帝帨手訖受巾跪奠於篚遂取爵於篚興進皇帝受爵侍中酌罍水又侍中奉盤以承水皇帝洗爵黃門侍郎又授巾如初皇帝拭爵訖侍中奠盤􅓢侍中受巾奠於篚太常卿引皇帝樂作皇帝詣太社壇升自北陛樂止近侍者從升如常謁者引司徒升自西陛立于樽所齊郎奉俎從升立於司徒之後太常卿引皇帝詣太社酒樽所執樽者舉羃侍中贊酌醴齊訖壽和之樂作皇帝每酌獻及飲福皆作夀和之樂太常卿引皇帝進太社神坐前南向跪奠爵俯伏興太常卿引皇帝少退南向立樂止太祝持版進於神坐之右西向跪讀祝文訖祝文臨時撰皇帝再拜初讀祝文訖樂作太祝進跪奠版於神坐興還樽所皇帝拜訖樂止太常卿引皇帝詣后土酒樽所執樽者舉羃侍中取爵於坫進皇帝受爵侍中贊酌醴齊訖樂作太常卿引皇帝進后土神坐前向西跪奠爵俯伏興太常卿引皇帝少退西向立樂止太祝持版進於神坐之左南向跪讀祝文訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版於神坐興還樽所皇帝拜訖樂止太常卿引皇帝詣太社神座前南向立樂作太祝以爵酌罍福酒合置一爵一太祝持爵以授侍中侍中受爵東向以進皇帝再拜受爵跪祭酒啐酒奠爵俯伏興諸祝帥齊郎進俎太祝減太社神前胙肉太祝以俎授司徒司徒奉俎東向進皇帝受以授左右皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫皇帝俯伏興再拜樂止太常卿引皇帝樂作皇帝降自北陛詣罍洗樂止謁者引司徒升自西陛立於樽所皇帝至罍洗盥手洗爵侍中黃門侍郎贊洗如常訖太常卿引皇帝樂作皇帝詣太稷壇升自北陛樂止皇帝酌獻太稷后稷皆如太社后土之儀訖太常卿引皇帝降自北陛樂作皇帝還版位南面立樂止謁者引司徒降復位登歌作諸祝各進徹豆還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜樂作太常卿前奏再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望瘞位太常卿引皇帝樂作皇帝至望瘞位南向立樂止於羣官將拜諸祝各執篚進神坐前取玊帛齊郎以俎載牲體稷黍飯爵酒各由其陛降壇南行當瘞坎西行諸祝以玊帛饌物置於塪訖奉禮曰可瘞塪東西面各四人置土半塪太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出門殿中監前受鎮圭華蓋侍衛如常儀皇帝如次樂止謁者贊引各引告官及從駕羣官以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人以次出其祝版燔於齊坊鑾駕還宫如常儀大唐開元禮卷五十八
