body:
  text: 大唐開元禮卷五十四唐蕭嵩等撰吉禮國子釋奠於孔宣父皇子束脩學生束脩國子釋奠於孔宣父將享司館預申享日本司請下其禮所司随職供辦凡預享之官散齋三日致齋二日散齋皆于正寢致齋二日于本司一日于享所其無本司者皆于享所散齋理事如舊惟不弔䘮問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟享事得行其餘悉㫁其享官已齋而闕者通攝行事館官及諸學生皆清齋于學館一宿諸享官致齋之日給酒食及明衣各習禮於齋所太官令取明水火取水于隂鍳取火于陽燧火以供爨水以實尊前享一日諸衛令其屬未後一刻各以其方器服守衛廟門及太樂工人俱清齋一宿陳設前享三日守衛設獻官以下次于齋坊前享二日太樂令設軒懸之樂於廟庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設三鏄鐘于編懸之間各依辰位樹路鼓於北懸之間道之左右植建鼓於三隅置柷敔於懸内柷在左敔在右設歌鐘歌磬於廟堂之上前楹間北向磬簴在西鐘簴在東其匏竹者立於堂下階間重行北向相對為首凡懸皆展而編之諸工人各位于懸後右校掃除内外又為瘞塪于院内堂之壬地方深取足容物南出陛前享一日奉禮設三獻位於東門之内道北執事位於道南每等異位俱西向北上設望瘞位於堂之東北當瘞塪之東西向設御史位於廟堂之下西南東向令陪其後設奉禮位于樂懸東北贊者二人在南差退俱西面又設奉禮贊者位于瘞塪東北南面東上設協律郎位於廟堂上前楹之間近西東向設太樂令位于北懸之間北向設館官位於懸東當執事西向設學官位於懸西當館官東向設學生位于學官館官之後俱重行北上若有觀者設位於南門之内道左右重行北面相對為首金吾監檢不得喧嘩雜亂設三獻門外位於東門之外道南執事位於其後每等異位俱北向西上館官學官位於三獻東南俱重行北向以西為上設酒樽之位於堂先聖犧尊二象尊二山罍二在前楹間北面先師犧尊二象尊二山罍二在先聖酒尊之東俱西向尊皆加勺羃有坫以置爵其先師之爵同置于一坫設洗於東階東南北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍篚羃者各位於樽罍篚羃之後設幣篚二於樽坫之所晡後二刻郊社令帥齋郎以樽坫罍洗篚羃入設於位升堂者自東階謁者引祭酒司業詣厨視濯溉凡導引者每曲一逡巡贊引引御史詣厨省饌具祭酒司業以下毎事訖各還齋所享日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆二取毛血置于饌所遂烹牲其牲用太牢二正坐及先師首坐俎皆升右胖十一軆左丘明以下析分餘體升之未明五刻郊社令帥其屬及廟司各服其服升設先聖神坐於廟室内西楹間東向設先師神坐於先聖東北南向其餘弟子冉伯牛仲弓宰我子貢冉有子路子㳺子夏閔子騫曾參髙柴宓子賤公西赤林放樊須有若孔忠琴牢梁鱣叔仲㑹冉孺曽㸃陳亢漆雕開商瞿司馬耕子張巫馬施秦非商澤鄭國公冶長澹䑓滅明原憲蘧伯玉公伯寮燕伋秦祖冉季左人郢公孫龍任不齊南宫縚秦商亷梁步叔乘施常顔之僕狄黑漆雕哆縣成顔路顔噲公祖句兹伯䖍榮旂顔髙秦冉申棖顔辛申黨公晳哀后處曹䘏奚容葴石作蜀壤駟赤漆雕徒父樂欬等坐及二十一賢左丘明公羊髙穀梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭𤣥服䖍賈逵何休王肅王弼杜預范甯等坐以次東陳皆南向西上若東陳不容則又于東壁屈陳而南西向席皆以莞設神位各於坐首饋享享日未明三刻諸享官服其祭服諸陪祭之官皆公服學生青衿服郊社令良醖令各帥其屬入實樽罍及幣犧尊實以醴齊象尊實以盎齊山罍實以清酒齊加明水酒加𤣥酒各實于上尊其幣以白長一丈八尺太官令帥其屬實諸籩豆簋簠等未明二刻奉禮帥贊者先入就位贊引引御史太祝及令史祝史與執樽罍篚羃者入自東門當階間重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有辭贊者皆承傳御史以下皆再拜訖執樽罍篚冪者各就位贊引引御史太祝詣東階升堂行掃除於上令史祝史行掃除於下訖引就位謁者引享官以下俱就門外位其學生並入就門内位未明一刻太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西其升堂者皆脱履於下降納如常謁者引司業入就位立定奉禮曰再拜司業再拜謁者引司業詣東階升堂行掃除於上降行樂懸於下訖引還本位初司業行掃除訖謁者贊引各引享官以下學官以上次入就位立定奉禮曰衆官再拜衆官及學生皆再拜其先拜者不拜謁者進祭酒之左白有司謹具請行事退復位協律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼔柷奏永和之樂以姑洗之均自後堂下之樂皆奏姑洗作文舞之舞樂舞三成偃麾戛敔樂止凡樂皆協律郎舉麾工鼔柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官在位者皆再拜太祝俱跪取幣於篚興各立於尊所謁者引祭酒升自東階進先聖神坐前西向立太祝以幣授祭酒受幣登歌作肅和之樂以南吕之均謁者引祭酒進西向跪奠於先聖神坐興少退西向再拜謁者引祭酒當先師首坐前北向立又太祝以幣西向授祭酒謁者引祭酒進北向跪奠於先師首坐前少退北向再拜登歌止謁者引祭酒降復位初羣官拜訖祝史各奉毛血之豆立東門外登歌止祝史奉毛血升自東階太祝迎取於階上進奠於先聖及先師首坐前太祝與祝史退立於樽所初祭酒既升奠幣太官令出帥進饌者奉饌陳於東門之外祭酒降復位太官令引饌入俎初入門雍和之樂作自後酌獻皆作雍和饌至階樂止祝史各進跪徹毛血之豆降自東階以出饌升太祝迎引於階上各設於神坐前籩豆蓋羃先徹乃升簋簠既奠却其盖于下設訖太官令以下降復位太祝還樽所謁者引祭酒詣罍洗盥手洗爵訖引升詣先聖酒樽所執樽者舉羃樂作引祭酒詣先聖神坐前跪奠爵俛伏興少退西向立樂止太祝持進於神坐之右北面跪讀祝文曰維某年歲次月朔日皇帝謹遣祭酒某封姓名敢昭告於先聖孔宣父惟夫子固天攸縱誕降生知經緯禮樂闡揚文教餘烈遺風千載是仰俾兹末學依仁游藝謹以制幣犧齊粢盛庶品祗奉舊章式陳明薦以先師顔子等配尚饗太祝興祭酒再拜初讀祝文訖樂作又太祝進跪奠版於神坐還樽所祭酒拜訖樂止謁者引祭酒詣先師酒樽所取爵於坫執樽者舉羃祭酒酌醴齊樂作謁者引祭酒進先師首坐前北向跪奠爵興少退北面立樂止祭酒既奠首坐爵餘坐皆齋郎助奠相次而下其亞獻終獻齋郎助奠亦如之太祝持版進於先師神坐之左西向跪讀祝文曰維某年歲次月朔日子嗣開元神武皇帝謹遣祭官某姓名敢昭告於先師顔子等七十二賢爰以仲春仲秋率遵故實敬修釋奠於先聖孔宣父惟子等或服膺聖教德冠四科或光闡儒風貽範千載謹以制幣犧齊粢盛庶品式陳明薦從祀配神尚饗太祝興祭酒再拜初讀祝文訖樂作太祝進奠版於神坐還樽所祭酒拜訖樂止謁者引祭酒詣東序西向立太祝各以爵酌罍福酒合置一爵一太祝持爵進祭酒之左北向立祭酒再拜受爵啐酒奠爵俛伏興太祝帥齋郎進俎跪減先聖及先師首坐前三牲胙肉皆取前脚第二節加於俎又以籩取稷黍飯興以胙肉各共置一俎又以飯共置一籩太祝先以飯籩授祭酒祭酒受以授齋郎又以俎授祭酒祭酒每受以授齋郎祭酒跪取爵遂飲卒爵太祝受爵復於坫祭酒俛伏興再拜謁者引祭酒降復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入皷柷作舒和之樂立定戛敔樂止初祭酒獻將畢謁者引司業詣罍洗盥手洗爵訖謁者引升自東階詣先師酒樽所執樽者舉羃司業酌盎齊訖武舞作謁者引司業進先聖神坐前西向跪奠爵興謁者引少退西向再拜訖謁者引司業詣先師酒樽所取爵于坫執樽者舉羃司業酌盎齊謁者引司業進先師首坐前北向跪奠爵興少退司業再拜謁者引司業詣東序西向立太祝各以爵酌罍福酒合置一爵一太祝持爵進司業之左司業再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫司業興再拜謁者引降復位初司業獻將畢謁者引博士詣罍洗盥手洗爵訖升酌盎齊終獻如亞獻之儀訖引降復位武舞止太祝等各進跪徹豆興還樽所奉禮曰賜胙贊者唱衆官再拜衆官在位者及學生皆再拜已飲福受胙者不拜奏永和之樂奉禮曰衆官再拜衆官在位者及學生皆再拜樂一成止謁者進祭酒之左白請就望瘞位謁者引祭酒就望瘞位西向立奉禮贊者就瘞塪東北位初在位者將拜諸太祝各執篚進神坐前跪取幣興降自西階詣瘞塪以幣置於塪訖奉禮曰可瘞塪東西廂各四人寘土半塪謁者進祭酒之左白禮畢遂引祭酒出謁者贊引各引享官以下以次出初白禮畢奉禮帥贊者還本位贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史太祝以下皆再拜贊引引出諸學生以次出其祝版燔於齋所皇子束脩束帛一篚五疋酒一壺五㪷脩一案五脡其日平明皇太子服學生之服其服青衿至學門外博士公服執事者引立於學堂東階下西面相者引皇太子立於門外東西向不自同于賔客陳束帛篚壺酒脯案於皇太子南當門北向重行西上將命者出立門西東面曰敢請事皇子少進曰某方受業於先生敢請見將命者入告博士曰某也不徳請皇子無辱若已封王則云請王無辱將命出告皇子曰某不敢為儀敢固請將命者入告博士曰請皇子就位某敢見將命者出告皇子曰某不敢以視賔客請終賜見將命者入告博士曰某辭不得命敢不從將命者出告執篚者以篚東面授皇子皇子執篚博士䧏俟於東階下西面相者引皇子執事者奉壺酒脯脩案以從皇子入門而左詣西階之南東面奉酒脯者立於皇子西南東面北上皇子跪奠篚再拜博士答拜皇子還避遂進跪取篚相者引皇子進博士前東面授幣奉壺酒脩案者從奠博士前博士受幣執事者取酒脩幣以東相者引皇子立於階間近南北面奉酒修者出皇子拜訖相者引皇子出學生束脩束帛一篚准令酒一壺二㪷脩一案五脡其日平明學生青衿服至學門博士公服立於學堂東階上西面贊者引學生立於門東西面不自同于賔客陳束帛篚壺脯案於學生西南當門北向重行西上將命者出立於門西東面曰敢請事學生少進曰某方受業於先生敢請見將命者入告博士曰某也不徳請子無辱將命者出告學生曰某不敢為儀敢固請將命者入告博士曰請子就位某敢見將命者出學生曰某不敢以視賓客請終賜見將命者入告博士曰某辭不得命敢不從將命者出告執篚者以篚東面授學生博士䧏俟於東階下西面贊禮者引學生執酒脯者從之學生入門而左立於西階之南東面執酒脯者立於學生之南東面北上學生跪奠篚再拜博士答拜學生還避遂進跪取篚贊禮者引學生進博士前東面授幣執酒脯者從奠博士前博士受幣贊者取酒脯幣以東執酒脯者出贊禮者引學生立當階間近南北面再拜贊禮者引出大唐開元禮卷五十四
