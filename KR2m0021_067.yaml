body:
  text: 大唐開元禮卷六十七唐蕭嵩等撰吉禮時旱就祈嶽鎮海瀆久雨禜國門時旱就祈嶽鎮海瀆將祈有司筮日如别儀前一日諸祈官皆於祈所清齊一宿所司清掃內外又為埋坎於壇南如常禮設祈官位於壇東南執事者位於祈官東南奉禮於執事西南贊者二人在南差退俱西向北上又設太祝奉幣帛位於瘞坎之南北向海瀆即設於奉幣位南北向又設祈官以下位於門外道東重行西面北上設樽罍篚各於常所執樽罍篚者各位於樽罍篚之後其日未明祈官以下各服其服所司帥其屬入設神座及樽罍如常儀太祝以幣置於篚幣各依方色長一丈八尺掌饌者實籩豆籩一實脯豆一實醢奉禮帥贊者先入就位贊引太祝及執樽罍篚羃者入當壇南重行北面以西為上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳太祝以下皆再拜執樽者各就位贊引引太祝升自東階行掃除於上訖降行掃除於下皆就位質明謁者引祈官贊引引執事者俱就門外位謁者引祈官贊引引執事者俱入就位立定奉禮曰再拜祈官以下皆再拜其先拜者不拜謁者進祈官之左白有司謹具請行事退復位奉禮曰再拜在位者皆再拜初白請行事掌饌者帥進饌者奉饌陳於門外祈官拜訖太祝跪取幣於篚以授祈官祈官奉幣置於神座祈官拜訖降復位掌饌者引饌入升自南階太祝迎引於壇上進設座前設訖掌饌者以下降復執事位謁者引祈官詣罍洗盥手洗爵升自南階詣酒樽所執樽者舉羃祈官酌酒謁者引祈官進北面跪奠於神座前俯伏興少退北向立太祝持版進於神座之右東面跪讀祝文曰維某年歲次月朔日子嗣天子某謹遣具官姓名敢昭告於某嶽鎮海瀆久闕時雨黎元惟懼惟神哀救蒼生敷降嘉液謹以制幣清酌酺醢明薦於神尚饗祝興祈官再拜太祝進跪奠版於神座興還樽所祈官再拜謁者引祈官降復位太祝進跪徹豆還樽所徹者籩豆各一少移於故處奉禮曰再拜在位者皆再拜謁者進祈官之左白請就望瘞位謁者引祈官就望瘞位西向立於在位者將拜太祝進神座前跪取幣置於塪東西面各二人置土半塪海瀆則以幣沉之奉禮曰再拜祈官以下皆再拜謁者進祈官之左白禮畢遂引祈官出贊引引執事者以次出太祝以下俱復執事位立定奉禮曰再拜太祝以下皆再拜以出奉禮贊者以次出其祝版燔於齊所得雨報祠用牲其沈瘞幣血及飲福受胙皆與正祭同餘與祈禮同祝文曰維某年歲次月朔日子嗣天子某謹遣具官姓名敢昭告於某嶽鎮海瀆各隨稱往以久闕時雨敢陳誠禱惟神昭祐降兹嘉液九土霑洽蒼生咸賴謹以制幣犧齊粢盛庶品明薦於神尚饗久雨禜國門將祭有司筮日如别儀前一日諸祭官清齊於祭所右校掃除祭所太官丞預饌酒醢脯尊以瓢尊其日質明郊社令帥其屬設神座皆內向設酒樽各於神座之左設罍洗及篚於酒樽之左俱內向篚實以巾爵執樽罍洗篚者各位於樽罍洗篚之後奉禮設獻官之位於罍洗之左右向執事者位於其後皆近神為上郊社丞與良醖令屬實樽罍獻官以下俱就位立定謁者贊引獻官以下皆再拜祝與執樽罍洗篚者各就位立定太官丞出詣饌所謁者進獻官之左白有司謹具請行事退復位太官丞引饌入太祝迎引設於神座前設訖太官丞以下還本位祝還樽所謁者引獻官詣罍洗盥手洗爵詣樽所執樽者舉羃獻官酌酒進神座前跪奠爵俯伏興少退向座立太祝持版進於神座之右東面跪讀祝文曰維某年歲次月朔日子嗣天子遣某官姓名昭告於國門霖雨淹久害於百榖惟靈降福應時開霽謹以清酌嘉薦明告于神尚饗祝興獻官再拜太祝進跪奠版于神座俯伏興還樽所獻官拜訖謁者引還本位祝進跪徹豆俯伏興還樽所徹者少移於故處祝與執樽罍篚者俱復執事位謁者贊拜獻官以下皆再拜謁者進獻官之左白禮畢遂引獻官以下出每祭皆如之其祝版燔於齊所若雨止報祠以少牢飲福餘與祈同祝文曰維某年歲次月朔日子嗣天子遣某官姓名昭告於國門前以霖雨式陳誠禱惟神降祉應時開霽謹以清酌少牢粢盛庶品明薦於神尚饗大唐開元禮卷六十七
