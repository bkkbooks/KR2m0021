body:
  text: 大唐開元禮卷十五唐蕭嵩等撰吉禮立夏祀赤帝於南郊有司攝事齋戒陳設省牲器奠玉帛進熟齋戒前祀七日平明太尉誓百官於尚書省曰某月某日祀赤帝於南郊各揚其職不供其事國有常刑凡預祀之官散齋四日致齋三日散齋各於正寢致齋二日於本司一日於祀所其無本司者皆於祀所散齋理事如舊唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯祀事得行其餘悉斷其祀官已齋而闕者通攝行事光禄卿監取明水火太官令取水於隂鑒取火於陽燧火以供爨水以實樽前祀一日諸衛令其屬未後一刻各以其方器仗守衛壝門與太樂工人俱清齋一宿陳設前祀三日諸衛設祀官公卿以下次於東壝之外道南北向西上設陳饌幔於内壝東門之外道南北向前祀二日太樂令設宫懸之樂於壇南内壝之内東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹雷鼓於北懸之内道之左右植建鼔於四隅置柷敔於懸内柷在左敔在右設歌鐘歌磬於壇上近南北向磬簴在西鐘簴在東其匏竹者立於壇下重行北向相對為首凡懸皆展而編之工人各位於懸後東方西方以北為上南方北方以西為上右校掃除壇之内外郊社令積柴於燎壇其壇於神壇之左内壝之外方一丈髙一丈二尺開上南出戸方六尺前祀一日奉禮郎設祀官公卿位於内壝東門之内道北執事位於道南毎等異位俱重行西向北上設望燎位當柴壇之北南向設御史位於壇上正位於東南隅西向副位於西南隅東向令史各陪其後於壇下設奉禮位於樂懸東北賛者二人在南差退俱西向又設奉禮賛者位於燎壇東北西向皆北上設協律郎位於壇上南陛之東西向設太樂令位於北懸之間當壇北向設祀官公卿已下門外位皆於東壝之外道南毎等異位重行北向西上設牲牓於東壝之外當門西向配帝牲牓少退南上設廩犧令位於牲西南史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常省牲位於牲前近北南向設赤帝酒樽於壇之上下太樽二著樽二犧樽二山罍二在壇上於東南隅北向象樽二壺樽二山罍二在壇下南陛之東北向俱西上設配帝著樽二犧樽二象樽二罍二在壇上於赤帝酒樽之東北向西上熒惑星三辰祝融氏俱象樽二各設於神坐之左皆右向七宿壺樽二設於神坐之右而左向赤帝配帝之樽置於坫星辰以下之樽俱藉以席皆加勺羃設爵於樽下設洗於壇南陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵設星辰以下罍洗篚羃各於其方陛道之左俱内向執樽罍篚幂者各於樽罍篚幂之後又設玉幣之篚於壇上下樽坫之所祀日未明五刻太史令郊社令升設赤帝赤熛怒神坐於壇北方南向席以藁秸設帝神農氏神坐於東方西向席以莞設熒惑星三辰之坐於壇之東北七宿之坐於壇之西北各於其壇下南向相對為首設祝融氏之坐於壇之東南西向席皆以莞設神位各於坐首省牲器省牲之日午後十刻去壇二百步所諸衛之屬禁斷行人晡後二刻諸行事之官各服其服郊社令帥府史二人及齋郎以樽坫罍洗篚羃入設於位晡後三刻諸太祝與廩犧令以牲就牓位謁者引太常卿賛引引御史詣壇東陛升視滌濯於上於視濯執樽者舉幂告潔訖引太常卿降復位謁者進太尉之左白請就門外位謁者賛引各引祀官以下就門外位謁者引太常卿就省牲位南向立廪犧令少前曰請省牲退復位太常卿省牲廪犧令又前北面舉手曰腯還本位諸太祝循牲一匝西面舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官令謁者引光禄卿詣厨省鼎鑊申視滌濯謁者賛引各引祀官御史就厨省饌具訖俱還齋所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令帥其屬入實樽罍玉幣凡六樽之次太樽為上實以汎齊著樽次之實以醴齊犠樽次之實以盎齊象樽次之實以醍齊壺樽次之實以沈齊山罍爲下實以清酒配帝著樽爲上實以汎齊犧樽次之實以醴齊象樽次之實以盎齊山罍爲下實以清酒其熒惑三星祝融氏之象樽俱實以醍齊七宿之壺樽實以沈齊𤣥酒各實於五齊之上樽禮神之玉以赤璋幣用赤色太官令帥進饌者實諸籩豆簠簋入設於内壝東門之外饌幔内未明二刻奉禮帥賛者先入就位賛引引御史博士諸太祝及令史與執樽罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜賛者承傳凡奉禮有辭賛者皆承傳御史以下皆再拜訖執樽罍篚羃者各就位賛引引御史諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖各引就位未明一刻太樂令帥工人二舞以次入就位文舞入陳於懸内武舞立於懸南道西謁者引司空入行掃除如常儀初司空入謁者引祀官賛引引執事者俱就門外位司空行掃除訖謁者贊引各引祀官次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位協律郎跪俛伏舉麾凡取物者皆跪俛伏而取興奠物既奠訖俛伏而後興鼓柷奏徴音乃以黄鐘之均文舞之舞樂舞六成偃麾戞敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止也奉禮曰衆官再拜衆官在位者皆再拜上下諸太祝俱取玉幣於篚各立於樽所謁者引太尉詣南陛升壇北向立太祝加玉於幣東向授太尉太尉受玉幣登歌作肅和之樂乃以大吕之均謁者引太尉進北面跪奠於赤帝赤熛怒神坐前興謁者引太尉少退北向再拜訖謁者引太尉立於西方東向又太祝奉幣北向授太尉太尉受幣謁者引太尉進東向跪奠於帝神農氏神坐興謁者引太尉少退東向再拜訖登歌止謁者引太尉降自南陛還本位初太尉奠配帝之幣星辰以下諸祝各以幣進奠於神坐還樽所初衆官拜訖祝史各奉毛血之豆立於門外於登歌止祝史奉毛血之豆入各由其陛升諸太祝迎取於壇上俱進奠於神坐前諸太祝與祝史退立於樽所進熟太尉既升奠玉幣太官令出帥進饌者奉饌陳於内壝門外謁者引司徒出詣饌所司徒奉赤帝之俎諸太祝既奠毛血太官令引饌入俎初入門雍和之樂作饌至階樂止祝史俱進徹毛血之豆降自東陛諸太祝迎引於壇上各設於神坐前籩豆盖羃先徹乃升簋簠既奠却其盖於下設訖謁者引司徒太官令帥進饌者俱降自東陛以出司徒復位諸太祝各還樽所又進設星辰以下之饌相次而畢謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉升自南陛詣赤帝酒樽所執樽者舉羃太尉酌汎齊訖樂作謁者引太尉進赤帝赤熛怒神坐前北向跪奠爵興謁者引太尉少退北向立樂止太祝持版進於神坐之右東面跪讀祝文曰維某年歳次月朔日子嗣天子臣某謹遣太尉封臣名敢昭告於赤帝赤熛怒朱明戒序長贏馭莭庶品蕃碩用遵恒典敬以玉帛犧齊粢盛庶品恭備禋祀肅昭養徳帝神農氏配神作主尚饗訖興太尉再拜訖樂止謁者引太尉詣配帝酒樽所取爵於坫執樽者舉羃太尉酌汎齊訖樂作謁者引太尉進帝神農氏神坐前東向跪奠爵興謁者引太尉少退東向立樂止太祝持版進於神坐之右北面跪讀祝文曰維某年嵗次月朔日子嗣天子開元神武皇帝臣某謹遣太尉封臣名敢昭告於帝神農氏惟時孟夏火徳方融用致明禋於赤帝赤熛怒惟帝表功協徳允斯作對謹以制幣犧齊粢盛庶品式陳明薦作主配神尚饗訖興太尉再拜初讀祝文訖樂作太祝進跪奠版於神坐興還樽所太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒啐酒奠爵興太祝各帥齋郎進俎太祝減神前胙肉加於俎以胙肉共置一俎上太祝持俎東向授太尉太尉受以授齋郎太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼔柷作舒和之樂立定戞敔樂止初太尉獻將畢謁者引太常卿詣罍洗盥手洗匏爵訖謁者引太常卿自東陛升壇詣赤帝著樽所執樽者舉羃太常卿酌醴齊訖武舞作謁者引太常卿進赤帝赤熛怒神坐前北面跪奠爵興謁者引太常卿少退北面再拜訖謁者引太常卿詣配帝犧樽所取爵於坫執樽者舉幂太常卿酌醴齊訖謁者引太常卿進帝神農氏神坐前東向跪奠爵興謁者引太常卿少退東向再拜訖謁者引太常卿進赤帝赤熛怒神坐前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太常卿之右西向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太常卿再拜謁者引太常卿降復位初太常卿獻將畢謁者引光禄卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光禄卿降復位初太常卿將升獻賛引三人各引獻官以次詣罍洗盥手洗爵一獻熒惑三辰一獻祝融氏一獻七宿各詣酒樽所俱酌酒進奠於坐首餘坐皆祝史助奠相次而畢賛引各引獻官還本位武舞六成樂止舞獻俱畢上下諸祝各進徹豆還樽所徹者籩豆各一少移於故處奉禮曰賜胙賛者唱衆官再拜衆官皆再拜已飲福受胙者不拜樂作奉禮曰衆官再拜衆官在位者皆再拜樂作一成止謁者進太尉之左白請就望燎位謁者引太尉就望燎位南向立於衆官將拜上下諸祝各執篚進神坐前取玉帛祝版齋郎以俎載牲體黍稷飯及爵酒各由其陛降壇南行經懸内當柴壇南東行自南陸登柴壇以玉幣祝版饌物置於柴上户内諸祝又以星辰以下之禮幣皆從燎奉禮曰可燎東西面各六人以炬燎火半柴謁者進太尉之左白禮畢謁者引太尉出謁者賛引各引祀官以次出賛引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出工人二舞以次出大唐開元禮卷十五
