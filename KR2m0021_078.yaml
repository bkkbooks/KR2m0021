body:
  text: 大唐開元禮卷七十八唐蕭嵩等撰吉禮六品以下時祠王公以下拜掃寒食拜掃附六品以下時祠前享五日筮于正寢之堂若有廟者筮于廟門外如五品以上之儀主人公服立于堂上楹間近東西面掌事者立于楹間近西東面北上設筮席于主人之西西面筮者開韇出䇿兼執之東面受命于主人主人曰孝孫某來日丁亥春祠有廟者云祗享于廟下同尚饗筮者曰諾進就筮席西面以韇擊筮遂述曰假爾泰筮有常孝孫某來日丁亥春祠尚享乃釋韇坐筮訖興降席東面稱占從筮者退若不吉則筮逺日如初儀贊禮者進主人之左告禮畢掌事者徹筮席先享三日主人及亞獻終獻并執事者各散齊二日致齊一日亞獻終獻親賓為之子孫及凡預享事各清齊一宿散齊不弔喪問疾不作樂不行刑罰不預穢惡致齊惟享事得行其餘悉斷其已齊而闕者通攝行事前一日之夕清掃內外贊禮者設主人之位于東階東南西向亞獻終獻位於主人東南掌事者位于終獻東南俱重行西向北上設子孫之位于終獻西南西面設亞獻以下門外位于門外之東執事者在南差退俱西向設牲榜于南門之外當門北向以西為上掌牲位于牲西北東向諸祝位于牲後俱北向設亞獻省牲位于牲前近東西向祭器之數每坐尊二簋一簠一登一鉶一爼一籩二豆二掌事者以尊入設于楹下近東北向西上皆加勺羃首坐爵一餘皆爵四置于尊下設祭器于東序西向每坐簋在前簠次之登次之鉶次之籩次之豆次之爼在後每坐異之以南為上設洗於東階東南東西當東霤南北以堂深罍水在洗東加勺羃篚在洗西南肆實爵二巾二于篚加羃凡器物皆濯而陳之執尊罍洗篚者各位于尊罍洗篚之後掌牲者以牲就榜位亞獻省牲掌牲者前東面舉手曰腯還本位諸祝各循牲一匝北面舉手曰充俱還本位諸祝與掌牲者以次牽牲付厨贊禮者引終獻詣厨省鼎鑊視濯溉亞獻以下每事訖各還齊所執饌者入徹簋簠籩豆登鉶以出享日未明烹牲于厨夙興掌饌者實祭器牲體皆載右胖前腳三節節一假肩臂臑皆載之後腳三節節一假去下一節載上肫胳二節又取正脊脡脊橫脊短脅正脅代脅各二骨以並餘皆不設簋實稷簠實黍籩實脯棗豆實菹醢主人以下各服其服掌事者入實尊罍每室二尊一實𤣥酒為上一實醴齊次之祝版各置于尊所諸祝設神坐于正寢室內祖坐在西東向禰坐在祖坐東北南向皆有几訖各就位質明贊禮者引亞獻以下及子孫俱就位諸祝與執尊罍者入立于庭北面西上立定贊唱者曰再拜祝以下皆再拜各就位掌饌者奉饌陳于門外贊禮者引主人入就位又贊禮者引亞獻以下及子孫以次入就位立定贊唱者曰再拜主人以下皆再拜贊禮者進主人之左白請行事退復位掌饌者引饌入升自東階諸祝迎引于階上各設于神坐前籩居左豆居右簠簋登鉶居其間爼橫于其前執爐炭蕭稷膟膋者從其爼升置于堂户外之左其蕭稷各于爐炭下施設訖掌饌以下降出祝取蕭稷擩于脂燔于爐炭還樽所贊禮者引主人詣罍洗執罍者酌水執洗者跪取盤興承水主人盥手執篚者跪取巾于篚興進主人拭手執篚者受巾跪奠于篚遂取爵興以進主人受爵執罍者酌水主人洗爵執篚者又跪取巾于篚興進主人拭爵訖受巾跪奠于篚奉盤者跪奠盤興凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興贊禮者引主人自東階升堂詣祖酒尊所執尊者舉羃主人酌酒贊禮者引主人進詣祖神坐前西向跪奠爵興少退西向立祝持版進于神坐之右北面跪讀祝文曰維某年歲次月朔日子孝孫某官封某無封者單稱官無官者稱名而已敢昭告于祖考某諡封祖妣夫人某氏時惟仲春仲夏仲秋仲冬伏增逺感謹以剛鬛嘉薦普淖醴齊祗薦祠事尚饗考及子各依尊卑稱號其祝文並同訖興主人再拜祝進跪奠版于神坐興還尊所贊禮者引主人詣祖考酒尊所酌酒進祖考神坐前北向跪奠爵興少退北向立祝持版進于祖考神坐之左西向跪讀祝文餘皆如上儀惟不盥洗訖贊禮者引主人詣祖坐前近東西向立諸祝各以爵酌福酒合置一爵一祝持爵進主人之左北向立主人再拜受爵跪祭酒啐酒奠爵興諸祝各帥執饌者以爼入减神前胙肉共置一爼上又以籩遍取稷黍飯共置一籩祝先以飯籩進主人受以授左右祝又以爼次授主人受以授左右訖主人跪取爵遂飲卒爵祝進受爵復于尊所主人興冉拜贊禮者引主人降自西階還本位西向立初主人獻將畢贊禮者引亞獻詣罍洗盥手洗爵升自東階詣祖酒尊所執尊者舉羃亞獻酌酒贊禮者引亞獻進詣先祖神坐前西向跪奠爵興少退再拜贊禮者引亞獻酌酒北面獻爵餘如上儀訖贊禮者引亞獻詣祖神坐前近東西向立諸祝各以爵酌福酒合置一爵一祝持爵進亞獻之左北向立亞獻再拜受爵跪祭酒遂飲卒爵祝進受爵復于尊所亞獻興再拜贊禮者引亞獻降復位又贊禮者引終獻詣罍洗盥手升獻如亞獻之儀訖降復位諸祝皆進神坐前跪徹豆興還樽所徹者籩豆各一少移于故處贊唱者曰冉拜非飲福受胙者皆再拜贊唱者又曰冉拜主人以下皆再拜贊禮者進主人之左白禮畢遂引主人出贊禮者引亞獻以下及子孫以次出諸祝與執尊罍篚者俱復執事位立定贊唱者曰再拜諸祝以下皆再拜與執尊罍篚者出王公以下拜掃先期卜日如常儀前一日掌事者設次于塋南百步道東西向北上備芟翦草木之器贊禮者設主人以下位于塋門外之東西面以北為上其日主人到次改服公服無者常服贊禮者贊再拜主人以下俱再拜贊禮者引主人以下入奉行墳塋精靈感慕有泣無哭至于封樹內外環繞展省三周其有荆棘慮與荒草連接者皆隨即芟翦不令火田得及掃除訖贊禮者引主人以下復門外位贊禮者引之次遂還第若假滿或逺行辭墓若外官假滿或京官逺行辭墓泣而後行其寒食上墓如前拜掃儀惟不卜日古者宗子去在他國庶子無廟許望墓為壇以時祭今之上墓義或有慿然神道尚幽不可逼黷塋域宜于墓南山門之外設净席為位望祭以時饌如平生所嗜若一塋數墓每墓各設位席昭穆異列以西為上主人盥手奠爵三獻而止徹饌訖主人以下辭墓食餘饌者可于他處避不見墓孝子之情也大唐開元禮卷七十八
