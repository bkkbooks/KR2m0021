body:
  text: 大唐開元禮卷一百四十七唐蕭嵩等撰凶禮六品以下喪之二將葬陳車位陳器用進引舉柩柩在庭位祖奠柩出升車遣奠遣車器行序諸孝從柩序郭外親賔歸諸孝乘車宿止宿處哭位行次奠親賓致賵墓上進止塋次到墓陳明器下柩哭序入墓墓中置器序掩壙祭后土反哭虞祭將葬陳車位將啓之日納柩車於大門之內當門南向進靈車於柩車之右內外所乘之車陳於大門外丈夫之車門西婦人之車門東俱服重者在上以近門外北方為上女子子妻妾之車以木為之不漆飾無者以籧篨衣車以蒲纒轅轂若白土堊之以布為􅀈簾布如服布周大功之車以白土堊之或衣籧篨皆以布為􅀈簾其布如服掌事者預於宿所張吉凶帷幕凶帷在西吉帷在東俱南向設靈座於吉帷下如常式陳器用啓之夕發引前五刻陳布吉凶儀式魌頭志石大棺車八品以下設魌頭之車魌頭兩及明器以下陳於柩車之前引二披二鐸二畫翣二引者引柩車索也披者繫於柩車四周在傍執之以備傾覆鐸者以銅為之所以節挽者翣者以木為筐廣二尺髙二尺四寸其形方兩角髙衣以白布柄長五尺畫翣者內及四緣皆畫雲氣庶人無引披鐸翣也進引二刻頃掌事者徹啓奠以出初徹奠內外俱興立哭於位執紼者皆入掌事者徹帷持翣者升即以翣障柩執鐸者入夾西階立掌事者取重出倚於門外之東執旌者立於西階南北面諸執紼鐸旌翣者皆布深衣介幘陳布將訖進靈車於內門外南向祝以腰輿詣靈座前內喪則婦人執腰輿祝於輿右西向跪昭告曰孤子某母云哀子謹用吉辰奉歸先兆若新卜塋域宜曰奉遷幽兆靈車就引神道紆回惟以荒寥無任哽絶興立少頃腰輿出降自西階威儀從者如平生詣靈車後少頃輿退舉柩將舉柩執鐸者俱振鐸柩降就階間南向初柩動及進止執鐸者皆振鐸每振先搖之搖訖三振之其持翣者恆以翣障柩柩降階執旌者漸而南柩止則回北向立主人以下以次從柩而降主婦又次其後降柩在庭位柩在庭庭內先施席以置柩主人及諸子以下立哭於柩東西向南上祖父以下立哭於柩東北南向北上異姓之丈夫立哭於主人東南西面北上婦人以次後降妻妾女子子以下立哭於柩西東向南上祖母以下立哭於柩西北南向東上異姓之婦人立哭於主婦西南東面北上內外之際障以行帷帷用如服布祖奠庭位既定祝帥執饌者設祖奠於柩東如大斂之儀祝酌訖進奠南北面跪曰永遷之禮靈神不留謹奉柩車式遵祖道尚饗興少頃徹之柩出升車柩動旌先主人以下從哭於柩後婦人次哭於後柩出中門外到轜車設帷障於柩後執紼執披者如常遂升柩於車內外哭位如在庭之儀遣奠既升柩祝與執饌者設遣奠於柩東如祖奠之儀祝酌奠於饌前少頃徹之遣車既遣奠掌事者以遣蒲葦苞牲體下節二苞以繩束之盛以盤載以車列於旌前器行序徹遣奠靈車動從者如常先靈車後次魌頭車次志石車次大棺車志石與大棺若先設者不入陳布次次明器輿次下帳輿次米輿五穀米實以五筲各斗二升羃用疏布次酒脯醢輿酒實二壺各五斗羃用功布醢實於二甕各三斗羃用疏布次苞牲輿次食輿食輿盤碗具足次銘旌次鐸鐸分為左右也次柩車諸孝從柩車序主人及諸子縗服絰杖徒跣哭秃者袤巾加絰徒跣哭從諸丈夫婦人各以服之精粗為序從哭出門內外尊行者皆乘車馬哭不絶聲郭外親賔歸出郭親賔還權停車馬內外尊行者皆下柩車依服之親疏為序立哭如式相者引親賓以次就柩車之左向柩立哭盡哀卑者再拜而退婦人亦如之諸孝乘車親賓還內外乘車馬若墓逺及病不堪步者雖無親賓還主人及諸子亦乘堊車去塋三百步皆下宿止靈車到帷門外回南向進腰輿於靈車後威儀從者如常禮少頃輿入詣靈座前少頃降出遂進常食於靈座若食頃徹之每至停宿之所於室設靈座進食皆如初柩車到入凶帷停西廂南轅祝設几席於柩車東宿處哭位初至宿處內外皆就柩車所主人及諸子以下於柩車之東西面南上妻妾女子子婦人於柩車之西東面南上祖父以下於柩車東北南面西上異姓有服者於柩車東南西面北上祖母以下於柩車西北南向東上異族婦人又於柩車西南東向北上俱立哭行次奠凡停宿進酒脯之奠於柩東如朝奠之儀既設奠內外各還次迭哭不絶聲及夕內外就柩車所哭進夕奠如朝奠之儀訖迭哭如常厥明又就位哭進朝奠亦如之若食頃徹之吉凶威儀依式發引內外從哭如初儀親賓致賵賓有贈禮在主人設祖奠之時賓立於大門外西廂東西從者以篚奉𤣥纁立於賓西南俱東面牽馬者以馬陳於賓東南北首西上相者入告遂詣主人之左北面受命出到賓前西面曰敢請事賓曰某敢贈相者入告出曰孤某須矣賓之從者坐奠篚取幣興詣賓前西面以授賓退復位相者引賓入牽馬者先以馬入陳於柩南北首西上賓入由馬西當柩車南北面立內外權止哭賓曰某諡封若某位將歸幽宅敢贈辭畢而哭內外皆哭主人拜稽顙賓止哭相者引賓進柩東西面奠幣相者引賓又由柩前以西而出初賓出掌事者由主人右詣柩東西面舉幣以東東藏之也受馬者由前旋牽者後適其右受之牽者由前以西而出賓將出主人稽顙再拜送之墓上進止塋次前一日之夕掌事者豫於墓門道西張帷幕設靈如初到墓乘車者卑行望墳而下尊行及塋而下序哭盡哀靈車至帷門外回車南向祝以腰輿詣靈車後少頃入詣靈座前少頃以輿降出遂設酒脯之奠如初柩車至壙前回南向丈夫婦人之位如遣奠之儀陳明器掌事者陳明器於壙東南西向北上下柩哭序布席於柩車之後張帷下柩丈夫柩東婦人柩西以次進憑柩哭盡哀各退復位內外卑者再拜辭訣相者又引主人以下哭於羡道東西面北上妻及女子子以下婦人障以行帷哭於羡道西東面北上入墓施席於壙户內之西遂下柩於壙户內席上北首覆以夷衾墓中置器序持翣者入倚翣於壙內兩廂遂以下帳張於柩東南向米酒脯於下帳東北食盤設於下帳前苞牲置於四隅醯醢陳於食盤之南藉以版明器設於壙內之左右掩壙掌事者以𤣥纁授主人主人授祝祝奉以入奠於靈座主人拜稽顙施銘志石於壙門之內置設訖掩户設關鑰遂覆土三主人以下稽顙哭盡哀退俱就靈所哭掌儀者設后土祭於墓左如後儀祭后土預於墓左除地為祭所柩車到祝吉服鋪后土氏神席北方南向設酒樽於神座東南北向設洗於酒樽東南北向罍水在洗東篚在洗西南肆以巾爵實於篚既覆土告者吉服告者親賓充之相者引告者與祝及執樽罍篚者俱立於罍洗東南重行西面以北為上立定俱再拜祝與執樽罍篚者俱就樽罍篚之後相者進告者之左北面曰請行事掌饌者以饌入祝迎引設於神座前置設訖掌饌者出相者又引告者詣罍洗爵相者引告者詣酒樽所執樽者舉羃告者酌酒進跪奠於神座前俯伏興少退北向立祝持版進於神座之右東面跪讀祝文曰維年月朔日子某官姓名敢昭告於后土之神某官封諡窆茲幽宅神其保佑俾無後艱謹以犧齊粢盛庶品明薦於后土之神尚饗祝興告者再拜祝進跪奠版於靈座還尊所相者引告者退復位再拜相者引告者出祝以下俱復位再拜徹饌席以出反哭既掩墓內外就靈所哭徹酒脯之奠進靈車於帷外陳布儀式如來儀又進腰輿入詣靈座前少頃出詣靈車後少頃輿退靈車行內外從哭如初儀出墓門尊行乘車馬去墓百步卑者乘車馬以哭從靈車到第內外皆下車馬靈車入西階前回南向祝以腰輿詣靈車後少頃升入詣靈座前主人以下從升立於靈座東西面南上少頃腰輿降出內外俱升諸祖父以下哭於帷東北壁下南面西上妻及女子子以下婦人哭於靈西東面南上諸祖母以下哭於帷西北壁下南面東上外姻哭於南廂丈夫於帷東北面西上婦人於帷西北面東上有親賓弔者升堂西面向靈哭如常其弔於庭者稱痛當奈何餘如常儀哭盡一哀相者引主人以下降各還次沐浴以俟虞斬衰者沐而不櫛齊衰者俱櫛虞祭柩既入壙祝先歸修虞事牢饌則如殷奠器用烏漆具饌於堂東靈車將至掌事者預施靈座於寢堂室户內西東向於靈車之南北設帷東出户若室內窄則設靈座於堂掌事者設洗於西階西南北向東西當西榮南北以堂深罍水在洗西篚在洗東南肆篚實爵一巾一加羃設瓦甒二於靈座之左北墉下醴酒在東羃用絺加勺南柄既沐浴主人及諸子諸妻妾女子子內外詣靈所主人及諸子倚杖於室户外應拜者哭於靈東西如初內外皆哭祝與執樽罍篚者各就樽罍篚所立執饌者以饌入俱升自東階陳設如殷奠之儀訖掌饌者出相者引主人降自西階詣罍洗主人止哭執罍洗者酌水主人盥手執篚者取巾於篚興授主人拭手訖受巾奠於篚又取爵興以授主人執罍洗者又酌水主人洗廢爵爵無足者執篚者又授巾主人拭爵訖受巾奠於篚相者引主人升自西階詣酒樽所執樽者舉羃主人酌醴相者引主人進詣靈座前西面跪奠於饌前俯伏興少退西面立祝以祝版進立於神座之右北面內外皆止哭祝跪讀祝文曰維某年月朔日子哀子某孫稱哀孫此為母及祖母所稱父祖則稱孤子孤孫也敢昭告於考某官封諡妣則云妣夫人某氏孫為喪主則稱祖妣日月遄速奄及反虞叩地號天五情縻潰謹以潔牲剛鬛嘉薦普淖明齊溲酒哀薦祫事於考某官封諡尚饗祝興主人哭再拜內外應拜者皆哭再拜祝進跪奠版於靈座興出復位盡哀相者引主人以下出杖降自西階各就次妻妾女子子以下各還别室祝闔户與執樽罍者降出少頃祝與掌饌者入開户徹饌闔户以出掌事者埋重於門外道左間日再虞後日三虞禮皆與初虞同又間日為卒哭祭其虞祝辭再虞云哀薦虞事三虞云哀薦成事大唐開元禮卷一百四十七
