body:
  text: 大唐開元禮卷一百三十四唐蕭嵩等撰凶禮勅使弔其賵賻之禮大體皆同弔使行之附蕃國主後勅使弔諸王妃主䘮勅使弔外祖父母䘮勅使弔后父母䘮勅使弔貴臣䘮勅使弔宗戚䘮勅使弔蕃國主䘮賵賻㑹喪制遣百寮㑹王公以下䘮冊贈勅使冊贈諸王勒使冊贈外祖父母勅使冊贈后父母勅使冊贈貴臣勅使冊贈蕃國王㑹葬制遣百寮㑹王公以下葬致奠勅使奠諸王妃主䘮勅使奠外祖父母䘮勅使奠后父母䘮勅使奠貴臣䘮勅使奠蕃國王䘮勅使弔勅使弔諸王妃主䘮勅使弔諸王妃主喪本司散下其禮所司隨職供辦守宫先於主人第大門外之右設使者次南向其日使者至掌次者引之次内外衰服司儀引主人以下俱立哭於東階下婦人立哭於殯所如常儀使者素服出次司儀引立於大門之西東靣持節者立於使者之北少退史二人對舉弔書案立於使者之南差退俱東面城外者不持節司儀入告主人去杖免絰司儀引主人出門止哭迎於大門外見賓先入立於門右北面司儀引使者入持節者先進持案者次之内外止哭使者入門而左立於階間南面節在使者之東少南西向持案者立於使者西南東面司儀引主人進當使者前北面持節者脫節衣史以案進詣使者前使者取弔書持案者退復位使者稱有制弔主人哭拜稽顙内外皆哭司儀引主人進受弔書退立於東階下西面哭持節者加節衣司儀引使者持節者先退持案者次之出復門外位主人以弔書授左右司儀引主人出内門止哭拜送於大門外使者還主人杖哭而入取弔書於階下升奠於柩東若使須私弔則通名引入弔如常禮訖引出若朝廷致賻賓至主人迎受如弔書之儀唯賻物掌事者受以東東蔵之也其賻物簿受如受弔書儀勅使弔后父母喪勅使弔外祖父母喪勅使弔貴臣喪勅使弔宗戚喪勅使弔蕃國主喪右與弔諸王妃主喪禮同賵賻其賵賻之禮與弔使俱行則有司預備物數多少准令其日使者至主人大門外便次物輿陳於使者幕南東西為列馬陳於使者東南北首西上於使者以下入即庭中位物輿陳於使者位南亦東西為列馬從入陳於庭北首西上於使者出主人有司受而以東其特行也亦如弔禮㑹䘮制遣百寮㑹王公以下喪制遣百寮㑹王公以下喪之禮守宫先於主人第大門外隨便量設百官文武應㑹弔者便次其日司儀令先於主人第前寢庭北面重行設百官位以西為上百官應㑹弔者並赴集主人第大門外便次各服素服司儀以次引入就班位立定司儀贊可哭諸官在位者皆哭十五舉聲司儀贊可止在位者皆止司儀引諸官行首一人升詣主人前席位展慰非應致敬者則立慰訖引降出又司儀引諸在位者以次出不致敬者出應致敬者再拜引退冊贈勅使册贈諸王勅使册贈諸王之禮守宫於主人大門外之西設使者及使副次南向其日使人及副公服從朝堂受册載於犢車使人及副各備鹵簿皷樂備而不作至主人大門外降車掌次者引之次内外衰服司儀引主人以下就東階下位婦人升就堂上位皆立哭使者出次謁者絳公服引立於門西東面使副立於使者之南持節者立於使者之北少退史二人對舉册案立於使副西南俱東面城外者無鹵簿不持節司儀入告主人去杖免絰司儀引主人出門止哭迎使者於大門外見賓先入立於門右北面謁者引使者入持節者先導副使及持册案者次之内外止哭使者升立於柩東北廂南面持節者在使者之東少南西向使副立於節南持册案者立於副使東南俱西面司儀引主人升立於階下當使者北面持節者脫節衣史以册案進使副前使副取册案退復位使副以册進使者受稱有制主人降於階間南北面哭拜稽顙内外皆哭司儀引主人升復北面位内外止哭使者讀册訖主人降於階間北面哭拜稽顙内外皆哭司儀引主人升階使者前受册退跪奠於柩東興降立於東階下西面初使人受册訖持節者加節衣謁者引使者持節者先導使副及持案者次之出復門外位司儀引主人出内外止哭拜送於大門外使者還主人絰杖哭而入其使者應私弔則通名引入弔如常禮引出勅使册贈外祖父母勅使冊贈后父母勅使册贈貴臣勅使册贈蕃國主右與册贈諸王禮同若主人六品以下則拜及受制皆於堂下㑹𦵏遣百寮㑹王公以下𦵏右與百寮㑹喪禮同凡册贈使者之尊卑並准吉授若册贈妃主則内侍之屬為使其預行事者亦如之同准吉授凡册贈應諡者則文兼諡又致祭焉而致祭不必有贈諡凡贈官通以臘印而畫綬凡册贈之禮必因其啟𦵏之節而加焉其或既𦵏者則主人仍於靈寢受之其禮如初其或既除服乃追而册贈者主人受之於廟禮亦如之其異者主人不哭其服則公服若單衣介幘其於靈寢若廟並預設祭以告神其未立廟者則受之於正寢致奠勅使致奠諸王妃主喪守宫於主人大門外量設便次使者至掌次者引之次内外衰服司儀引主人以下俱就東階下位婦人就堂上位皆立哭使者公服出次謁者絳公服引立於門西東面執事者陳牢饌於使者東南當門北向西上司儀入告主人去杖司儀引主人出内門止哭迎於大門外見賓先入立於門右北面謁者引使入内外止哭使者升自東階立於柩東少北南面執事者以牢饌入升設於柩東西面南上司儀引主人升自西階立於階上當使者北面執事者北面酌酒西面奠於席退復位使者曰某封若某位將歸幽宅制使某奠主人降詣階間北面哭拜稽顙内外俱哭謁者引使者及從者降出復門外位初主人拜稽顙訖司儀引主人退哭於東階下使者出司儀引主人出内門止哭拜送於大門外使者還主人杖哭而入勅使致奠外祖父母喪勅使致奠后父母喪勅使致奠貴臣喪勅使致奠蕃國主喪右四條與致奠諸王妃主喪禮同大唐開元禮卷一百三十四
