body:
  text: 大唐開元禮卷一百二十九唐蕭嵩等撰嘉禮宣赦書羣臣詣闕上表羣臣奉參起居遣使詣蕃宣勞宣赦書其日質明本司承詔宣告內外隨職供辦守宫設文武羣官次於朝堂如常儀羣官依時刻皆集朝堂俱就次各服其服奉禮設文武羣官版位於順天門外東西當朝堂之南文東武西重行北面相對為首設中書令位於羣官之北南向刑部侍郎率其屬先陳金雞於西朝堂之東南向置鼓板於金雞之南遂擊每一鼓投一杖刑部侍郎録京師見囚集於羣官之南北面西上囚集訖鼓止通事舍人引羣官各就位中書令受詔訖遂以詔書置於案令史二人對舉案通事舍人引中書令持幡節者前導持案者次之詣門外位立持節者立於中書令之南少西令史舉案者立於中書令之西北俱東面立定持節者脫節衣持案者進詣中書令前中書令取詔書持案退復位中書令稱有詔書羣官皆再拜宣訖羣官又再拜舞蹈又再拜刑部釋囚刑部尚書前受詔書退復位持節者加節衣通事舍人引中書令幡節前導而入又通事舍人引羣官還次羣臣詣闕上表前一日守宫設文武羣官次於朝堂如常儀其日量時刻文武羣官集俱就次各服朝服奉禮設文武羣官位於東朝堂之前近南文東武西重行北面相對為首設中書令位於羣官之北南向設奉禮位於羣官東北贊者二人在南少退俱西向奉禮帥贊者先就位禮部令史二人絳公服對舉表案立於奉禮之北南面立定典謁引中書令出就南面位禮部郎中引表案詣中書令前郎中取表以授中書令中書令受表郎中舉案退復位奉禮曰再拜贊者承傳羣官在位者皆再拜通事舍人引中書令以表入奏出復南面位稱有詔羣官再拜宣詔訖又再拜謁者引為首一人進北面受表退復位舍人引中書令入謁者引羣官還次羣官奉參起居前一日守宫設文武羣官次於朝堂如常儀其日依時刻文武羣官九品以上俱集朝堂次奉禮設文武羣官位於東朝堂之前文左武右重行北面相對為首又設奉禮位於文武官東北贊者二人在南少退俱西向又設通事舍人位於文官為首者之北少東西向並如常奉禮帥贊者先就位舍人各引文武羣官俱就位立定舍人引為首者少進通起居訖退復位奉禮唱再拜贊者承傳羣官在位者皆再拜舍人入奏訖舍人承旨出復位西面稱敕旨羣官在位者皆再拜宣敕訖又再拜舍人及羣官俱退皇帝遣使詣蕃宣勞前一日執事者設使者次於大門外道東南向其日使者至執事者引就次使者以下俱公服蕃主朝服立於東階東南西面使者出次執事者引使者立於大門外之西東面使副立於使者西南持節者立於使者之北少退令史二人對舉詔書案立於使副西南俱東向執事者引蕃主迎使者於大門外之南北面再拜使者不答拜執事者引使者入持節者前導持案者次之入門而左使者詣階間南面立持節者立於使者之東少南西面使副立於使者西南持案者立於使副西南俱東面執事者引蕃主入立於使者之南北面持節者脫節衣持案者進使者前使副取詔書持案者退復位使副進授使者退復位使者稱有詔蕃主再拜使者宣詔訖蕃主又再拜執事者引蕃主進使者前北面受詔書退立於東階東南西面持節者加節衣執事者引使者持節者前導持案者次之出復門外位執事者引蕃主拜送於大門外使者還於次執事者引蕃主入大唐開元禮卷一百二十九
