body:
  text: 大唐開元禮卷九十一唐蕭嵩等撰嘉禮皇帝加元服上卜日告圜丘告方澤告宗廟臨軒行事謁見太后卜日皇帝將加元服有司卜日如别儀告圜丘前一日諸告官清齋於告所諸衛各帥其屬晡後一刻各以其方器服守衛壝門守宫設告官以下次各於常所設陳饌於內壝東門之外道北南向右校掃除壇之內外郊社令積柴於燎壇如常儀奉禮設版位於內外並如常儀郊社令率其屬以樽坫罍洗篚羃入設皆如常執樽罍篚羃者各位於樽罍篚羃之後太官令預饌酒脯醢告日未明四刻太史令郊社令各服其服升設神席如常未明二刻諸告官各服其服郊社令良醖令入實樽罍及玉帛太尊二一實以明水為上一實以泛齊次之山罍二一實以玄酒為上一實以清酒次之玉以四圭有邸幣以蒼未明一刻奉禮帥贊者先入就位贊引引御史太祝以下入行掃除如常儀質明謁者引告官以下俱就門外位奉禮帥贊者先入就位贊引引御史以下就位謁者引告官贊引引執事者以次入就位立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳告官以下皆再拜謁者進告官之左白有司謹具請行事退復位奉禮曰再拜在位者皆再拜初謁者白請行事太官令出帥進饌者奉饌陳於東門之外初太官令出太祝跪取玉幣於篚興立於樽所謁者引告官升自午陛北向立太祝以玉幣東向授告官受玉幣進北面跪奠於昊天上帝神坐俯伏興少退北向再拜謁者引降還本位太祝還樽所太官令引饌入升自午陛太祝迎引於壇上設於神坐前籩豆蓋羃徹之如式設訖太官令以下降自東陛復位太祝還樽所謁者引告官詣罍洗盥手洗爵訖升自南陛詣酒樽所執樽者舉羃告官酌泛齊謁者引告官詣神坐前北靣跪奠爵俯伏興少退北靣立太祝持版進于神坐之右東靣跪讀祝文祝文臨時撰訖興告官再拜太祝進跪奠版於神坐興還樽所告官再拜訖太祝以爵酌罍福酒一太祝持爵進告官之右西向立告官再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫告官俯伏興謁者引告官降復位太祝進跪徹豆俯伏興還樽所奉禮曰再拜在位者皆再拜告官不拜奉禮又曰再拜告官以下皆再拜謁者進告官之左白請就望瘞位南向立於衆官將拜太祝執篚進神坐取玉幣祝版降壇南行自柴壇南陛升以玉幣祝版置於柴上户內奉禮曰可燎東西靣各六人以炬燎火半柴謁者進告官之左白禮畢謁者引告官贊引引執事者以次出御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出告方澤前一日諸告官皆清齋於告所諸衛各帥其屬晡後一刻各以其方器服守衛壝門守宫設告官以下次各於常所設陳饌幔於內壝東門之外道北南向右校掃除壇之內外又為埋塪於壇南外壝之內方深取足容物北出陛奉禮設版位於內外並如常儀郊社令帥其屬以樽坫罍洗篚羃入設皆如常執樽罍篚羃者各位於樽罍篚羃之後太官令預饌酒脯醢告日未明四刻太史令郊社令各服其服升設神席如常未明二刻諸告官各服其服郊社令良醖令入實樽罍及玉設太尊二一實明水為上一實醴齊次之山罍二一實玄酒為上一實清酒次之玉以兩圭有邸幣以黃色未明一刻奉禮帥贊者先入就位贊引引御史太祝以下入行掃除如常儀質明謁者引告官以下俱就位如常贊引引御史以下入就位謁者引告官贊引引執事者次入就位立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳告官以下皆再拜謁者進告官之左白有司謹具請行事退復位奉禮曰再拜在位者皆再拜初謁者請行事太官令出帥進饌者奉饌陳於東門之外初太官令出太祝跪取玉幣於篚興立於樽所謁者引告官詣壇升自南陛北向立太祝以玉幣東向授告官謁者引告官進北靣跪奠於神坐俯伏興少退北靣再拜謁者引降復位太祝還樽所太官令引饌入升自南陛太祝迎引於壇上各設於神坐前籩豆蓋羃徹之如式設訖太官令以下降自東陛復位太祝還樽所謁者引告官詣罍洗盥手洗爵訖升自南陛詣酒樽所執樽者舉羃告官酌醴齊謁者引告官詣皇地祗神坐前北向跪奠爵俯伏興少退北向立太祝持版進于神坐右西向跪讀祝文祝文臨時撰訖興告官再拜太祝進跪奠版于神坐還樽所告官再拜訖太祝以爵酌罍福酒一太祝持爵進告官之右東向立告官再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫告官俯伏興再拜訖謁者引告官降復位太祝進跪徹豆俯伏興還樽所奉禮曰再拜在位者皆再拜告官不拜奉禮又曰再拜告官以下皆再拜謁者進告官之左白請就望瘞位謁者引告官就望瘞位西向立於告官將拜諸太祝各執篚進神坐前跪取玉帛興降就瘞坎以玉幣置於坎訖奉禮曰可瘞坎東西面各四人置土半坎謁者進告官之左白禮畢謁者引告官贊引引執事者以次出御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出其祝版燔於齋所告宗廟前一日諸告官清齋於廟所諸衛各帥其屬晡後一刻各以其方器服守衛廟門守宫設告官以下次各於常所右校清掃內外又為瘞塪於北門之內道西方深取足容物奉禮設版位于內外並如常儀又設望瘞位於堂之東北當瘞塪西向又設奉禮位於瘞塪東北南向贊者二人在西少退太廟令整拂神幄又率其屬以樽坫罍洗篚羃制幣之篚入設皆如常儀執樽罍篚羃者各位於樽罍篚羃之後太官令預饌酒脯醢告日未明三刻諸告官各服其服太官令良醖令帥屬入實樽罍及幣每室犧尊二一實明水為上一實醴齊次之山罍二一實玄酒為上一實清酒次之幣以白各長一丈八尺未明二刻奉禮帥贊者先入就位贊引引御史太祝以下入行掃除訖各就位未明一刻贊引引太廟令太祝以下宫闈令入當階間北面西向立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳太廟令以下皆再拜升自東陛入開塪室奉出太祖以下神主各置於座如常儀訖各就位質明謁者引告官以下俱就門外位立定又引入就位立定奉禮曰再拜告官以下皆再拜其先拜者不拜謁者進告官之左白有司謹具請行事退復位太官令出帥進饌者奉饌陳於東門之外初太官令出諸太祝俱取幣於篚各立於樽所謁者引告官升自東陛詣獻祖廟室户前北面立太祝以幣東向授告官受幣進入北面跪奠於神坐俯伏興出户北面立再拜謁者引告官以次進奠幣於懿祖以下皆如上儀訖謁者引還本位諸太祝各還樽所太官令引饌入自正門升自太階諸太祝迎引於階上各設於神坐前籩豆蓋羃徹之如式設訖太官令以下降復位諸太祝各還樽所謁者引告官詣罍洗盥手洗爵訖升自東陛詣獻祖酒樽所執樽者舉羃告官酌爵罍謁者引告官入詣獻祖神坐前北向奠爵俯伏興出户北向立太祝持版進於室户外之右東面跪讀祝文祝文臨時撰訖興告官再拜太祝進跪奠版於神坐俯伏興還樽所告官拜訖謁者引告官以次酌獻皆如獻祖之儀唯不盥洗遍獻訖謁者引告官詣東序西向立諸祝各以爵酌罍福酒合置一爵一太祝持爵進告官之左北向立告官再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫告官俯伏興再拜謁者引告官降復位諸太祝各入室跪徹豆俯伏興還樽所奉禮曰再拜在位者皆再拜告官不拜奉禮又曰再拜告官以下皆再拜謁者進告官之左白請就望瘞位奉禮贊者轉就瘞塪東北位謁者引告官就望瘞位西向立於告官將拜諸太祝各執篚進神坐前跪取幣興降自太階詣瘞塪諸太祝以制幣置於塪訖奉禮曰可瘞塪東西面各四人置土半塪謁者進告官之左白禮畢謁者引告官贊引引執事者以次出初白禮畢奉禮贊者還本位御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引其祝版燔於齋所太廟令太祝宫闈令納神主如常儀臨軒行事先一日尚舍奉御設御冠席於太極殿中楹之間南向莞筵紛純加藻席繢純加次席黼純守宫設羣官次於朝堂太樂令展宫懸於殿庭並如常儀設協律郎舉麾位於殿上西階之西東向一位於樂懸東南西向鼓吹令分置十二案於建鼓之外乘黃令陳車輅尚輦奉御陳輿輦如常儀典儀設文官一品以下五品以上位於懸東六品以下於橫街之南皆重行西面北上設武官一品以下五品以上位於懸西六品以下於橫街之南當文官皆重行東面北上設朝集使位分方於文武官當品之下設諸親位於四品五品之下皇宗親在東異姓親在西設蕃客位各分方於朝集使六品之南諸州使人分方於朝集使九品之後又設太師太尉位於橫街之南道東北向西上又設典儀位於懸之東北贊者二人在南少退俱西向奉禮設門外位於西朝堂皆如元日之儀其日諸衛勒所部屯門列黃麾仗如常羣官依時刻集朝堂俱就次各服其服通事舍人引就朝堂前位侍中版奏請中嚴太樂令鼓吹令帥工人入就位奉禮即設罍洗於阼階東南罍在洗東加勺羃篚在洗西南肆實巾加羃尚舍奉御設席於東房內近西又張帷於東序外殿中監陳衮服於東房內席上東領玄衣纁裳十二章八章在衣日月星辰山龍華蟲火宗彛四章在裳藻粉米黼黻白紗中單黼領青褾襈裾革𢃄玉鈎䚢大帶青帶朱裡紕其外上以朱下以緑鈎用組之朱黻三章山龍火鹿盧玉具劍火珠鏢首白玉雙珮玄組大雙綬六綵玄黃赤白縹緣純玄質長二丈四尺五寸首廣一尺小雙綬長二尺六寸色同大綬而首半之間施三玉環朱襪赤舄金飾繢纚用白羅巾方六寸屬帶於前兩幅玉簮及櫛三物同箱在服北尚舍奉御設莞筵一紛純加藻席繢純加次席黼純又在南尚食奉御實醴樽于東序外惟內坫在樽北實角觶柶各一加羃饌陳于樽西籩豆各十二俎三在籩豆之北設罍洗於樽東罍在洗西加勺羃篚在洗東北肆實巾加羃執樽罍籩豆及在庭罍篚者並絳公服立於其所衮冕垂白珠十有二旒以組為纓色如其綬黈纊充耳玉導置於箱太常博士一人立於西階下近西東面諸侍衛之官各服其器服俱詣閣奉迎典儀帥贊者先入就位通事舍人各引群官入就陪列位太常博士引太常卿升西階立於西房外當户北向侍中版奏外辦皇帝著空頂黑介幘雙童髻雙玉導絳紗袍以出侍衛警蹕如常儀皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應協律郎舉麾鼓柷奏太和之樂凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止皇帝出自西房太常博士引太常卿太常卿引皇帝每太常卿前導皆博士先引皇帝即御坐南向立樂止太常卿與博士退立於皇帝之左通事舍人引太師太尉入就位凡太師太尉進退皆舍人導引太師初入門舒和之樂作至位樂止典儀曰再拜贊者承傳群官在位者皆再拜太師升自西階太師初行樂作至階樂止太師升立於西階上東面太尉詣阼階下罍洗盥手升自東階詣東房內取纚櫛箱進跪奠於御坐西端太師詣御坐前跪奏稱請坐退復位皇帝坐太尉進當御坐前少左跪脫空頂幘置於櫛箱櫛畢設纚興少西東面立太師降盥初降樂作盥訖詣西階下樂止太師受冕左執頂右執前升自西階進當皇帝前少左樂作太師祝曰令月吉日始加元服壽考惟祺以介景福乃跪冠興復西階上位太尉進皇帝前少左跪設簮結纓興復位皇帝興太常卿引皇帝適東房殿中監進徹櫛纚箱以退皇帝著衮服太常卿引皇帝出即席南向坐樂止太尉詣序外帷內盥手洗觶酌醴加柶覆之面葉立于序內南面太師進受醴面柄進御坐前北面祝曰甘醴唯厚嘉薦令芳承天之休壽考不忘訖跪進觶興降立於西階下東面於將祝殿中監帥進饌者奉饌設於御坐前皇帝左執觶右取脯擩於醢祭於籩豆之間太尉取胏一以進皇帝皇帝奠觶於薦西受肺却左手執本右手絶末以祭上左手嚌之授太尉太尉加於俎降立於太師之南皇帝帨手侍中一人進帨巾取觶以柶祭醴啐醴建柶奠觶於薦東皇帝初受觶伏和之樂作奠觶訖樂止太師太尉俱復橫街南位太師初行樂作至位樂止典儀唱再拜贊者承傳在位者皆再拜太師太尉出初行樂作出門樂止侍中前跪奏禮畢皇帝興太樂令令撞𬎼賔之鐘左五鐘皆應太和之樂作太常卿引皇帝皇帝入自東房侍衛警蹕如來儀入訖樂止通事舍人引東西面位者以次出謁見太后其日冠訖著通天冠服詣太后所御殿如常朝見之式尚宫引就殿前北面再拜訖尚宫引出還宫如常大唐開元禮卷九十一
