body:
  text: 大唐開元禮卷三十三唐蕭嵩等撰吉禮皇帝仲春仲秋上戊祭大社齋戒陳設鑾駕出宫奠玉幣進熟鑾駕還宫齋戒皇帝散齋三日致齋二日如方丘之儀凡預祭之官散齋三日致齋二日散齋皆於正寢致齋一日於本司一日於祭所其無本司者皆於祭所近侍之官應從升者及從祭羣官諸方客使各於本司及公館俱清齋一宿無本司者各於正寢散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祭事得行其餘悉斷其祭官已齋而闕者通攝行事光祿卿監取明水火太官令取水于陰鑒取火于陽燧火以供爨水以實尊前祭一日諸衛令其屬未後一刻各以其方器服守衛社宫門與太樂工人俱清齋一宿陳設前祭三日尚舍直長施大次於社宫西門之外道北南向尚舍奉御設御座衛尉設文武侍臣次於大次之後文官在左武官在右俱南向設諸祭官次於齋坊之內三師於北門之外道西諸王於三師之北俱東向南上文官從一品已下九品已上於齋坊南門之外重行東向北上介公酅公於北門之外道東西向以南為上諸州使人東方南方於諸王西北東面西方北方於介公酅公東北西面俱重行南上武官三品以下九品以上於東門之外道北南向以西為上諸國之客於東門之外東方南方於武官東北南向西方北方於道南北向俱以西為上前祭二日太樂令設宫懸之樂於壇北東方西方磬簴起南鐘簴次之南方北方磬簴起東鐘簴次之設十二鎛鐘於編懸之間各依辰位樹靈鼓於南懸之內道之左右植建鼓於四隅置柷敔於懸內柷在左敔在右設歌鐘歌磬各於壇上近北南向皆磬簴在東鐘簴在西其匏竹者各於壇下重行南向相對為首凡懸皆展而編之諸工人各於懸後東方西方以南為上南方北方以東為上右校清掃內外又為瘞坎二於南門之內於稷壇西南方深取足容物北出陛前祭一日奉禮設御位北門之內當社壇之北南向將祭奉禮郎一人守之在位版東北五步所南向又設望瘞位西門之內當瘞坎南向祭官公卿位於西門之內道北執事位於其後少北每等異位俱重行東面以南為上設御史位於壇上正位於太社壇東北隅西向副位於太稷壇西北隅東向設奉禮位於樂懸西北贊者二人在北差退俱東面南上又設奉禮贊者位於瘞坎西北東向北上設協律郎位各於壇之上東北隅俱西向設太樂令位於南懸之間南向設從祭之官位三師位於北門之內道西諸王位於三師之西俱南面東上設介公酅公位於道東南面西上文官從一品以下九品以上位於執事之北每等異位重行東向武官三品以下九品以上位於東方值文官每等異位重行西向皆以南為上諸州使人位東方南方於北門之內道西於諸王西北重行南向以東為上西方北方於道東於介公酅公東北重行南向以西為上設諸蕃客位於北門之內東方南方於諸州使人之西每國異位俱重行南面以東為上西方北方於諸州使人之東每國異位俱重行南面以西為上設門外位祭官公卿以下皆於西門之外道南每等異位重行北向以東為上三師位於北門之外道西諸王於三師之北俱東向介公酅公位於道東西向皆以南為上文官從一品以下九品以上位於西門之外祭官之南每等異位重行北面以東為上武官三品以下九品以上位於東門之外道北每等異位重行南面以西為上諸州使人東方南方於諸王西北重行東面西方北方於介公酅公東北西面俱南上設諸國客位東方南方於武官東北每國異位俱重行南向西方北方於道南每國異位重行北向皆以西為上設酒樽之位太社太樽二著樽二山罍一在檀上西北隅南向設后土氏象樽二著樽二山罍一於太社酒樽之西俱南向東上各置於坫皆加勺羃爵皆置於尊下設太稷后稷酒樽於其壇上如太社后土之儀設御洗各於太社太稷壇之西北南向亞獻之洗又各於西北俱南向罍水在洗西篚在洗東北肆篚實以巾爵執樽罍篚羃者位於樽罍篚羃之後各設玉幣之篚於壇上樽坫之所晡後謁者引光祿卿詣厨省饌具訖還齋所祭日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血置饌所遂烹牲未明五刻太史令郊社令升設太社太稷神坐各於壇上近南北向設后土氏神坐於太社神坐之左后稷氏神坐於太稷神坐之左俱東向席皆以莞設神位各於坐首鑾駕出宫如方丘之儀奠玉帛祭日未明三刻諸祭官各服其服郊社令良醖令各帥其屬入實樽罍玉幣太樽為上實以醴齊著樽次之實以盎齊山罍為下實以清酒配坐之尊亦如之玄酒各實於五齊之上尊禮神之玉太社太稷俱以兩圭有邸幣皆以玄也太官令帥進饌者實諸籩豆簠簋皆設於神厨未明二刻奉禮帥贊者先入就位贊引引御史諸太祝及令史祝史與執樽罍篚羃者入自西門當太社壇北重行南面以東為上凡引導者每曲一逡巡立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽者各升自西陛立於樽所執罍洗篚羃者各就位贊引引御史諸太祝詣太社壇西陛升行掃除於上令史祝史行掃除於下降又詣太稷壇行掃除如太社之儀訖各引就位駕將至謁者贊引各引祭官通事舍人分引從祭羣官客使先至者俱就門外位駕至大次門外回輅南向將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次謁者引文武五品以上從祭之官皆就門外位太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸北道東謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇西陛升行掃除於上升太稷壇亦如之訖降行樂懸於下訖引就門外位皇帝停大次半刻頃謁者贊引各引祭官通事舍人分引從祭文武羣官介公酅公諸國客使先就位太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝服黼冕出次華蓋侍衛如常儀侍中負璽陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至社宫西門外殿中監進大圭尚衣奉御又以鎮圭授殿中監殿中監受進皇帝搢大圭執鎮圭華蓋仗衛停於門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常皇帝至版位南向立每立定太常卿與博士退立於左謁者贊引各引祭官以次就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則跪奠訖俯伏而後興鼓柷奏順和之樂乃以函鍾之均文舞八成偃麾戛敔樂止凡樂皆協律郎舉麾鼓柷而後作偃麾戛敔而後止太常前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜諸太祝俱取玉幣於篚各立於樽所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣太社壇升自北陛侍中中書令以下及左右侍衛量人從升以下皆如之皇帝升壇南向立樂止太祝加玉於幣以授侍中侍中奉玉幣西向進皇帝搢鎮圭受玉帛凡受物皆搢鎮圭奠訖執圭俯伏興登歌作肅和之樂乃以應鐘之均太常卿引皇帝進南向跪奠於太社神坐俯伏興太常卿引皇帝少退南向再拜訖太常卿引皇帝立於東方西向又太祝以幣授侍中侍中奉幣南向進皇帝受幣太常卿引皇帝西向進跪奠於后土氏神坐俯伏興太常卿引皇帝少退西向再拜訖登歌止太常卿引皇帝降自北陛樂作太常卿引皇帝詣太稷壇升自北陛南向立樂止太祝加玉於幣以授侍中侍中受玉帛西向進皇帝受玉帛登歌作太常卿引皇帝進南向跪奠於太稷神坐俯伏興太常卿引皇帝少退南向再拜訖太常卿引皇帝立於東方西向又太祝以幣授侍中侍中奉幣南向進皇帝受幣太常卿引皇帝進西向跪奠於后稷氏神坐俯伏興太常卿引皇帝少退西向再拜訖登歌止太常卿引皇帝降自北陛樂作皇帝還版位南向立樂止初羣官拜訖祝史各奉毛血之豆立於門外登歌止祝史奉毛血入各由其陛升諸太祝迎取於壇上俱進奠於神坐前諸太祝與祝史退立於尊所進熟皇帝既升奠玉帛太官令出帥進饌者奉饌陳於西門外謁者引司徒出詣饌所司徒奉太社之俎初皇帝既至位樂止太官令引饌入太社太稷之饌入自正門配坐之饌入自左闥爼初入門雍和之樂作以太蔟之均饌至陛樂止祝史各進徹毛血之豆降自西陛以出太社太稷之饌升自北陛配座之饌升自西陛諸太祝迎取於壇上各設於神坐前籩豆蓋羃先徹乃升簠簋既奠却其蓋於下設訖謁者引司徒以下降自西陛復位諸太祝還樽所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取􅓢興沃水又侍中跪取盤興承水皇帝盥手黃門侍郎跪取巾於篚興進皇帝帨手訖黃門侍郎受巾跪奠於篚黃門侍郎又取爵於篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黃門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤􅓢黃門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝詣太社壇升自北陛樂止謁者引司徒升自西陛立於樽所齋郎奉俎從升立司徒之後太常卿引皇帝詣太社酒樽所執樽者舉羃侍中贊酌醴齊夀和之樂作皇帝每酌獻及飲福皆作夀和之樂太常卿引皇帝進太社神前南向跪奠爵俯伏興太常卿引皇帝少退南向立樂止太祝持版進於神坐之右西面跪讀祝文曰維某年嵗次月朔日子嗣天子某敢昭告於太社惟神德兼博厚道著直方載生品物含𢎞庶類謹因仲春仲秋祗率常禮敬以玉帛一元大武柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊偹兹禋瘞用申報本以后土勾龍氏配神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神坐還樽所皇帝拜訖樂止太常卿引皇帝詣后土氏酒樽所執樽者舉羃侍中取爵於坫進皇帝受爵侍中贊酌醴齊樂作太常卿引皇帝進后土氏神坐前西向跪奠爵俯伏興太常卿引皇帝少退西向立樂止太祝持版進於神座之左南面跪讀祝文曰維某年嵗次月朔日子嗣開元神武皇帝某敢昭告於后土氏爰兹仲春仲秋揆日惟吉敬修恆事薦於太社惟神功著水土平易九州昭配之義實惟通典謹以制幣一元大武柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊旅於表位作主侑神尚饗訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神座還樽所皇帝拜訖樂止太常卿引皇帝進太社神坐前南向立樂作太祝各以爵酌上樽福酒合置一爵一太祝持爵授侍中侍中受爵東向進皇帝再拜受爵跪祭酒啐酒奠爵俯伏興太祝帥齋郎進俎太祝減太社神座前三牲胙肉置一爼上太祝以爼授司徒司徒持俎東向以次進皇帝每受以授左右皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫皇帝俯伏興再拜樂止太常卿引皇帝樂作皇帝降自北陛詣罍洗樂止謁者引司徒降壇西陛以從皇帝至罍洗盥手洗爵侍中黃門侍郎贊洗如常訖太常卿引皇帝樂作皇帝詣太稷壇升自北陛樂止謁者引三公與齋郎奉俎升自西陛立於樽所皇帝詣太稷酒樽所執樽者舉羃侍中贊酌醴齊樂作太常卿引皇帝進太稷神坐前南向跪奠爵俯伏興太常卿引皇帝少退南向立樂止太祝持版進於神座之右西面跪讀祝文曰維某年嵗次月朔日子嗣天子某敢昭告於太稷維神播生百榖首兹八政用而不匱功濟萌黎兹惟仲春仲秋敬以玉帛一元大武柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊式陳瘞祭備修常秩以后稷配神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神座還樽所皇帝拜訖樂止太常卿引皇帝詣后稷氏酒樽所執樽者舉羃侍中取爵於坫進皇帝受爵侍中贊酌醴齊樂作太常卿引皇帝進后稷氏神座前西向跪奠爵俯伏興太常卿引皇帝少退西向立樂止太祝持版進神座之左南面跪讀祝文曰維某年歲次月朔日子嗣開元神武皇帝某敢昭告於后稷氏爰以仲春仲秋式揀吉辰敬修恆禮薦於太稷惟神功叶稼穡闡修農政允茲從祀用率舊章謹以制幣一元大武柔毛剛鬛明粢薌萁嘉蔬薦醴齊陳於表位作主配神尚饗訖興皇帝再拜初讀祝文訖樂作太祝進奠服於神座還樽所皇帝拜訖樂止太常卿引皇帝進太稷神坐前南向立樂作皇帝飲福受胙如太社之儀訖樂止太常卿引皇帝樂作皇帝降自北陛還版位南向立樂止謁者引司徒降自西陛復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止皇帝獻后上氏將畢謁者引太尉詣罍洗盥手洗爵訖太尉自西陛升壇詣太社酒樽所執樽者舉羃太尉酌盎齊武舞作謁者引太尉進太社神座前南向跪奠爵興謁者引太尉少退南向再拜謁者引太尉詣后土氏酒樽所取爵於坫執樽者舉羃太尉酌盎齊謁少退南向再拜謁者引太尉詣后土氏酒樽所取爵於坫執樽者舉羃太尉酌盎齊謁者引太尉進后土氏神座前西向跪奠爵興謁者引太尉少退西向再拜訖謁者引太尉進太社神座前南向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右東向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降自西陛詣罍洗盥手洗爵詣太稷壇升獻如太社之儀訖引降復位初太尉獻后土將畢謁者引光祿卿詣罍洗盥手洗爵升酌盎齊終獻如亞獻之儀訖謁者引光祿卿降復位武舞六成樂止舞獻俱畢詣太祝各進徹豆還尊所徹者籩豆各一少移于故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜順和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望瘞位太常卿引皇帝樂作皇帝就望瘞位南向立樂止於羣官將拜諸太祝各執篚進神座前取玉幣齋郎以俎載牲醴黍稷飲爵酒各由其陛降壇南行當瘞坎西行諸太祝以玉幣饌物置於坎訖奉禮曰可瘞坎東西各四人置土半坎太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出門殿中監前受鎮圭以授尚衣奉御殿中監又前受大圭華蓋侍衛如常儀皇帝入次樂止謁者贊引各引祭官通事舍人分引從祭羣官諸方客使以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜訖贊引引出工人二舞以次出其祝版燔於齋坊鑾駕還宫如方丘之儀大唐開元禮卷三十三
