body:
  text: 大唐開元禮卷三十五唐蕭嵩等撰吉禮祭五嶽四鎮諸嶽鎮每年一祭各以五郊迎氣日祭之東嶽岱山祭於兖州界東鎮沂山祭於沂州界南嶽衡山祭於衡州界南鎮會稽山祭於越州界中嶽嵩山祭於河南府西嶽華山祭於華州界西鎮吳山祭於隴州界北嶽恆山祭於定州界北鎮醫無閭山祭於營州界前祭五日諸祭官各散齋三日致齋二日散齋皆正寢致齋祭所散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祭事得行其餘悉斷其祭官已齋而闕者通攝行事諸祭官致齋之日各給酒食及明衣各習禮於齋所前一日嶽令清掃內外又為瘞坎於壇壬地方深取足容物贊禮者設初獻位於壇東南亞獻終獻位於初獻之南少退俱西面北上掌事者位於終獻東南重行西面以北為上設贊唱者位於終獻西南西向北上設獻官等望瘞位於瘞坎之東北西向設祭官已下門外位於南門之外道東重行西面以北為上祭器之數尊六籩十豆十簋二簠二俎三嶽令帥其屬詣壇東陛升設尊於壇上東南隅北向西上尊皆加勺羃有坫以置爵設玉篚於尊坫之所設洗於南陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍洗篚者各位於樽罍洗篚之後祭日未明烹牲於厨其牲各隨方色齋郎以豆先取血毛置於饌所夙興掌撰者實祭器牲體牛羊豕皆載右胖前腳三節一節一段肩臂臑皆載之後腳三節一節一段去下節載上肫胳二節又取正脊脡脊橫脊正脅短脅代脅各二骨以並餘皆不設簋實稷黍簠實稻梁籩十實石鹽乾魚棗栗榛菱芡鹿脯白餅黑餅豆十實韭葅醯醢菁葅鹿醢芹葅兔醢笋葅魚醢脾析葅豚胉若土無者各以其類充之凡祭官各服其服三品毳冕四品繡冕五品玄冕六品以下爵辨若有二品以上各依令嶽令率其屬入詣壇東陛升設嶽神坐於壇上近北南向席以莞又實尊罍及玉凡尊一實醴齊一實盎齊一實清酒其玄酒實於上尊祭神之玉兩圭有邸祝版置於坫嶽令又以幣置於篚齋郎以豆取血皆設於饌所其幣長一丈八尺各隨牲色贊唱者先入就位祝與執尊罍篚者入當壇南重行北面以西為上立定贊唱者曰再拜祝以下俱再拜執尊者升自東陛立於尊所執罍篚者各就位祝詣壇東陛升行掃除於上降行掃除於下訖各就位質明贊禮者引祭官以下俱就門外位立定一刻頃贊禮者引祭官以下入就位立定贊唱者曰再拜在位者皆再拜贊禮者進初獻之左白有司謹具請行事退復位贊唱者曰再拜在位者皆再拜祝跪取玉幣於篚興立於尊所凡取物皆跪俯伏而取以興奠物則奠訖俯伏而後興掌饌者帥齋郎奉饌陳於東門之外贊禮者引初獻詣壇升自南陛進嶽神座前北向立祝以玉幣東向進初獻受玉幣祝還尊所贊禮者引初獻進北向跪奠於嶽神座前興少退北向再拜贊禮者引初獻降還本位掌饌者引饌入升自南陛祝迎引於壇上設於神座前掌饌者帥齋郎降自東陛復位祝還尊所贊禮者引初獻詣罍洗盥手洗爵升自南陛詣酒尊所執尊者舉羃初獻酌醴齊贊者引初獻進詣嶽神座前北向跪奠爵興少退北向立祝持版進於神座之右東面跪讀祝文曰維某年嵗次月朔日子嗣天子某謹遣某官某敢昭告於東嶽岱宗惟神贊養萬品作鎮一方式因春始南嶽云夏始中嶽云季夏西嶽云秋始北嶽云冬始謹以玉帛犧齊粢盛庶品明薦於東嶽岱宗尚饗訖興初獻再拜祝進奠版於神座還尊所祝以爵酌清酒進於初獻之右西向立初獻再拜受爵跪祭酒啐酒奠興祝帥齋郎以俎進減神座前胙肉前腳第二節共置一俎上以授初獻初獻受以授齋郎初獻跪取爵遂飲卒爵祝進受爵復於坫初獻興再拜贊禮者引初獻降復位於初獻飲福贊禮者引亞獻詣罍洗盥手洗爵升自東陛詣酒尊所執尊者舉羃亞獻酌盎齊贊禮者引亞獻詣神座前北向跪奠爵興少退北向再拜祝以爵酌清酒進於亞獻之右西向立亞獻再拜受爵跪祭酒遂飲卒爵祝史受爵復於坫亞獻興再拜贊禮者引亞獻降復位初亞獻將畢贊禮者引終獻盥洗升獻飲福如亞獻之儀訖贊禮者引終獻降復位祝進神座前徹豆還尊所徹者籩豆各一少移於故處贊唱者曰再拜獻官以下皆再拜已飲福受胙者不拜贊禮進初獻之左白請就望瘞位贊者引初獻就望瘞位西向立於獻官將拜嶽令進神座前跪取幣齋郎以俎載牲體黍稷飯詣瘞坎以饌物置於坎東西廂各二人置土半贊者進初獻之左白禮畢遂引初獻以下出祝與執尊罍篚羃者俱復執事位立定贊唱者曰再拜再拜訖遂出祝版燔於齋所大唐開元禮卷三十五
