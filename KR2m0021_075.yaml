body:
  text: 大唐開元禮卷七十五唐蕭嵩等撰吉禮三品以上時享其廟前享五日筮于廟門之外主人公服立于門東西靣掌事者各服其服立于門西東靣北上設筮席于闑西閾外筮者開韇出䇿兼執之東靣受命于主人曰孝曽孫某來日丁亥祗享于廟尚饗丁亥必亥則直舉一日以言之己亥辛亥茍有亥焉可也筮者曰諾進就筮席西向以韇擊筮遂述曰假爾太筮有常曽孫某來日丁亥祗享于廟尚饗乃釋韇坐筮訖興降席東靣稱占曰従筮者退若不吉即筮逺日如初儀賛禮者進主人之左告禮畢掌事者徹筮席先享三日主人及亞獻終獻并執事者各散齋二日于正寢致齋一日于廟所同官寮佐之長為亞獻其次為終獻無則以親賓為之子孫及凡入廟者各于其家清齋一宿凡散齋不弔䘮問疾不作樂不行刑罰不預穢惡致齋惟享事得行其餘悉斷其享官已齋而闕者通攝行事前一日之夕清掃内外掌廟者整拂神幄賛禮者設主人之位于東階東南西向亞獻終獻位於主人東南掌事者位於終獻東南俱重行西向北上設子孫之位于庭重行北向西上設贊唱者位于終獻西南西向又設亞獻以下門外位于東門之東執事者在南差退俱西向設牲牓于南門之外當門北向以西為上掌牲者位于牲西北東向諸祝位于牲後俱北向設亞獻省牲位于牲前近東西向設祭噐之數每室尊二簋二簠二登二鉶二俎二籩豆一品二品各十三品八掌事者以樽入設于前楹下各于室户之東北向西上皆加勺羃首坐爵一餘坐皆爵四置于坫設祭器于序東西向每坐簋在前簠次之登次之鉶次之籩次之豆次之爼在後每坐異之皆以南為上屈陳而下設洗于東階東南東西當東霤南北以堂深罍在洗東加勺羃篚在洗西南肆實爵三巾二于篚加羃凡器物皆濯而陳之執樽罍洗篚者各立于樽罍洗篚之後掌牲者以牲就牓位賛禮引亞獻入詣東階升堂徧視濯溉于視濯執尊者皆舉羃告潔訖引降就省牲位亞獻省牲掌牲者前東面舉手曰腯還本位諸祝循牲一匝北面舉手曰充俱還本位諸祝引掌牲者以次牽牲付厨贊禮者引終獻詣厨省鼎鑊視濯溉亞獻以下毎事訖各還齋所執饌者入徹簠簋籩豆俎鉶以出享日未明烹牲于厨夙興掌饌者實祭品牲體皆載右胖前脚三節節一叚肩臂臑皆載之後脚三節節一段去下一節載上肫胳二節又取正脊脡脊横脊短脅代脅正脅各二骨以並餘皆不設簋實黍稷簠實稻梁籩實石䀋乾脯棗栗之屬豆實醢醬韲葅之類主人以下各服其服掌事者入實樽罍毎室二尊一實𤣥酒為上一實醴齊次之祝版各置於坫諸祝與奄人入立於庭北面西上立定皆再拜訖升自東階以次出神主各置於坐夫人之主奄人奉出俱並而處右質明賛禮者引亞獻以下及子孫俱就門外位贊唱者先入就位諸祝與執樽罍者入立於庭北面西上立定贊唱者曰再拜祝以下皆再拜各就位掌饌者奉饌陳於門外贊禮者引主人入就位又贊禮者引亞獻以下及子孫以次入就位立定贊唱者曰再拜主人以下皆再拜贊禮者進主人之左白請行事退復位掌饌者引饌入升自東階諸祝迎引于神坐前籩居右豆居左簠簋登鉶居其間羊豕二俎横陳重于右腊爼特于其左執爐炭蕭稷膟膋者各従其俎升置于室户外之左其蕭稷各置于爐炭下施設訖掌饌以下降出諸祝各取蕭稷擩于脂燔于爐炭還樽所賛禮者引主人詣罍洗執罍者酌水執洗者跪取盤興承水主人盥手執篚者跪取巾于篚興進主人拭手執篚者受巾跪奠于篚遂取爵興以進主人受爵執罍者酌水主人洗爵執篚者又跪取巾于篚興進主人拭爵訖受巾跪奠于篚奉盤者跪奠盤興凡取物者跪俛伏而取以興奠物則奠訖俛伏而興賛禮者引主人自東階升堂詣某祖酒樽所執樽者舉羃主人酌酒賛禮者引主人進詣某祖神坐前北向跪奠爵興出戸北向立祝持版進于室户外之右東靣跪讀祝文曰維某年歳次月朔日子孝曾孫某官敢昭告于某祖考某謚祖妣某邑夫人某氏時惟仲春夏云仲夏秋云仲秋冬云仲冬伏増逺感謹以柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊敬薦祠享尚饗春言祠夏言礿秋言嘗冬言烝訖興主人冄拜祝進跪奠版于神坐興還樽所賛禮者引主人以次酌獻如上儀唯不盥洗訖賛禮者引主人詣東序西向立諸祝各以爵酌福酒合置一爵祝持爵進主人之左北向立主人冄拜受爵跪祭酒啐酒奠爵興諸祝各帥執饌者以爼入减神前胙肉各置一爼上又以籩遍取稷黍飯共置一籩祝先以飯籩進主人受以授左右祝又以爼授主人每受以授左右訖主人跪取爵遂飲卒爵祝進受爵復于坫主人興冄拜賛禮者引主人降自東階還本位西向立主人獻將畢賛禮者引亞獻詣罍洗盥手洗爵升自東階詣某祖酒樽所執樽者舉羃亞獻酌酒賛禮者引亞獻進詣某祖神坐前北靣跪奠爵興出户北向冄拜賛禮者引亞獻以次酌獻如上儀訖賛禮者引亞獻詣東序西向立諸祝各以爵酌福酒合置一爵一祝持爵進亞獻之左北向立亞獻冄拜受爵跪祭酒遂飲卒爵祝進受爵復于坫亞獻興冄拜賛禮者引亞獻降復位又賛禮者引終獻詣罍洗盥手升獻如亞獻之儀訖降復位諸祝皆進神坐前跪徹豆興還樽所徹者籩豆各一少移于故處賛唱者曰冄拜非飲福受胙者皆冄拜賛唱者又曰冄拜主人以下皆冄拜賛禮者進主人之左白禮畢遂引主人出賛禮者引亞獻以下出子孫以次出諸祝與執樽罍篚者俱復執事位立定賛禮者曰冄拜諸祝以下皆冄拜執樽罍篚者出諸祝與閹人匵神主納于塪室如常儀祝版燔于齋所褒聖侯祀孔宣父廟及王公以下皆此禮惟祝文别大唐開元禮卷七十五
