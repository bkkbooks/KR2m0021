body:
  text: 大唐開元禮卷一百三十一唐蕭嵩等撰凶禮賑撫諸州水旱蟲災賑撫蕃國水旱勞問諸王疾苦勞問外祖父疾苦勞問皇后父疾苦勞問諸妃主疾苦勞問外祖母疾苦勞問皇后母疾苦勞問大臣疾苦勞問都督刺史疾苦勞問蕃國主疾苦中宫勞問外祖父疾苦勞問諸王疾苦勞問外祖母疾苦勞問諸妃主疾苦勞問宗戚婦女疾苦東宫勞問諸王疾苦勞問外祖父疾苦勞問妃父疾苦勞問外祖母疾苦勞問諸妃主疾苦勞問妃母疾苦勞問師傅保疾苦勞問宗戚疾苦勞問上臺貴臣疾苦賑撫諸州水旱蟲災皇帝遣使賑撫諸州水旱蟲災本司散下其禮所司隨職供辦使者未到之前所在長官預勒所部僚佐等及正長老人本司先於㕔事大門外之右設使者便次南向又於大門外之右設使者位東向大門外之左設長官以下及所部位重行北向西上又於㕔事之庭少北設使者位南向又於使者位之南三丈所設長官位北向其所部寮屬則位於長官後文東武西每等異位重行北面相對為首正長老人則位於其南重行北面西上使者到所司迎引舍便次長官及所部嚴肅以待正長老人等並列於大門外之南重行北面西上至時使者以下各服公服所在長官及所部寮佐亦各服公服行參軍引長官以下出就門外位司功參軍引使者就門外位立持節者立於使者之北史二人對舉制案列於使者之南俱少退東向行參軍贊拜長官及所部在位者皆再拜行參軍引長官等以次先入立於門內之右重行西面司功參軍引使者入幡節前導持案者從之使者到庭中位立持節者於使者東南西面持制案者立於使者東南西面行參軍引長官以下俱入就庭中位立定持節者脫節衣持案者以案當使者前使者取制書持案者退復位使者稱有制行參軍贊再拜長官及諸在位者皆再拜使者宣制書訖行參軍又贊再拜長官及諸在位者皆再拜行參軍引長官進詣使者前受制書退復位訖司功參軍引使者出復門外位行參軍引長官及諸在位者各出就門外位如初行參軍贊拜長官及諸在位者皆再拜司功參軍引使者以下還便次長官退其正長老人等任散賑撫蕃國水旱右同賑撫諸州水旱禮其國王供待及出入即館饗食之類則如常存省之禮但略其燕好勞問諸王疾苦皇帝遣使勞問諸王疾苦本司散下其禮所司隨職供辦所司先于受勞問者第大門外之右設使者便次南向於庭中近北設使者位南向又於使者之南三丈所設主人位北向其府國僚屬並部列於庭中之左右國官在東府寮在西俱以北為上使者至受勞問者第大門外掌次者延入次使者及受勞問者皆公服贊禮者引使者出次立於門西東面史二人奉制書案立於使者之南差退贊禮者引受勞問者出立於門東西向受勞問者再拜贊禮者引受勞問者先入立於門內之右西向贊禮者引使者入就庭中位持制案者立於其右贊禮者引受勞問者就庭中位北向立持案者以案進使者前使者取制書持案者退復位使者稱有制受勞問者再拜贊禮者引受勞問者詣使者前受制書退復位再拜訖贊禮者引使者以下出又贊禮者引受勞問者隨出各即門外位受勞問者再拜訖贊禮者引使者以下退就次又贊禮者引受勞問者入若受勞問者疾未間不堪受制則子弟代受如上儀勞問外祖父疾苦勞問皇后父母疾苦右與勞問諸王禮同勞問外祖母疾苦皇帝遣使勞問外祖母疾苦本司散下其禮所司隨職供辦內給事一人為使者所司先於受勞問者第大門外之右設使者便次南向又於內寢庭少北設使者位南向又於使者位之南三丈所設受勞問者位北向使者至受勞問者大門外掌次者延入次使者公服攝迎者亦公服使者出次立於門西東面給使二人奉制書案立於使者之南差退贊禮者引攝迎者出立於門東西面攝迎者再拜訖贊禮者引攝迎者先入立於門內之右西面內典引引使者入就內寢庭位立持案者立於使者之右受勞問者服朝服女侍者引就庭中位立持案者以案進使者前使者取制書持案者退復位使者稱有制受勞問者再拜女侍者進詣使者前受制書退授受勞問者受勞問者又再拜內典引引使者以下出女侍者引受勞問者退贊禮者引攝迎者隨出各就門外位攝迎者再拜內典引引使者退即便次贊禮者引攝迎者入若受勞問者疾未間不堪受制則攝迎者於外堂之庭拜受制書如上禮其異者受制書詣閣授女侍者女侍者受奉入授受勞問者勞問大臣疾苦右遣使勞問與勞問諸王疾苦禮同勞問都督刺史疾苦右遣使勞問與勞問大臣疾苦禮同其異者諸引導之官以所使勞問州府有司充之其使于京師者則謁者引導勞問蕃國主疾苦右遣使勞問與勞問都督刺史疾苦禮同凡有勞問無正篇者皆臨時約准上禮而為儀注中宫勞問外祖父疾苦太皇太后皇太后皇后遣使勞問外祖父疾苦本司散下其禮所司隨職供辦內給事一人為使者所司先於受勞問者第大門外之右設使者次南向又於使者之位南三丈所設受勞問者位北向使者至受勞問者第大門外掌次者引入次使者及受勞問者皆公服內典引引使者出次立於門西東向給使二人奉令書案立於使者之南差退贊禮者引受勞問者出立於門東西向受勞問者再拜贊禮者引受勞問者先入立於門內之右西面內典引引使者入就庭中位立持案者立於其右贊禮者引受勞問者就庭中位立持案者以案進使者前使者取令書持案者退復位使者稱太皇太后若皇太后皇后有令受勞問者再拜贊禮者引受勞問者進詣使者前受令書退復位又再拜內典引引使者以下出贊禮者引受勞問者從出各即門外位受勞問者再拜訖內典引引使者以下退就次贊禮者引受勞問者入若受勞問者疾未間不堪受命則