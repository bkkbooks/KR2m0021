body:
  text: 大唐開元禮卷八十四唐蕭嵩等撰軍禮皇帝親征禡於所至之地親征及巡狩郊祀有司軷於國門親征及巡狩登所過山川平蕩冦賊宣露布遣使勞軍將皇帝親征禡於所至之地將祭有司卜日如别儀前祭一日皇帝清齊于行宫凡預祭之官清齊于祭所近侍之官與從祭羣官及諸軍將皆于軍幕清齊一宿諸衛令其屬各以其方器服守衛壝門亦清齊一宿尚舍直長施大次于外壝東門之內道北南向尚舍奉御鋪御坐守宫設文武侍臣次于大次之後文官在左武官在右俱南向設羣官次于東門之外道南北向西上設諸軍將次于南壝之外道東西向北上右校修除祭所又為瘞塪于神坐西北內壝之外方深取足容物前一日奉禮設御位於神坐東南西向設望瘞位于神座西南當瘞坎北向設祭官位於御位東南執事者位於其後俱重行西向北上設御史位一位於神座西南東向一位于神坐東南西向設奉禮位于祭官西南贊者二人在南差退俱西向北上又設奉禮贊者位于瘞塪西南設從祭羣官位于祭官之南俱重行西向北上設軍將位于南廂重行北靣西上設門外位祭官以下皆于東壝之外道南從祭羣官位于祭官之南俱重行北向西上軍將位于南壝之外道東重行西向北上兵部侍郎建二旗于南門之外去門三十步郊社令帥府史及齊郎以樽坫罍洗篚羃入設于位犧樽二象樽二山罍二皆於神坐東南俱北向西上尊皆加勺羃有坫以置爵又設御洗于酒樽東南諸將罍洗又于東南皆北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍篚羃者各于樽罍篚羃之後設幣篚于酒樽之所祭日未明十五刻太官令預備特牲之饌牲以犢未明四刻郊社令奉熊席入設黃帝軒轅氏神坐于壝內近北南向兵部侍郎置甲胄弓矢于坐側建稍于坐後未明二刻郊社令良醖令各帥其屬入實樽罍及幣犧尊實以醴齊象尊實以盎齊山罍實以清酒齊皆加明水酒加𤣥酒各實于上尊太官令帥進饌者先入就位贊者引御史太祝與執樽罍篚羃者入當神座前重行北向西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜執樽罍者各就位贊引引御史太祝行掃除訖引就位皇帝服武辨之服詣祭所諸將與從祭之官皆戎服陪從如常駕將至謁者引行事之官皆就東門外位駕至大次門外下馬之大次太祝令以祝版進御署如常謁者贊引各引從駕羣官及諸軍將俱就門外位謁者贊引各引祭官及從祭羣官諸軍將等次入就位皇帝停大次半刻頃太常博士引太常卿立于大次門外當門北向侍中版奏外辦皇帝入門仗衛停于門外近侍者從入如常皇帝至版位西向立每立定太常卿與博士退立于左太常卿前奏請再拜退復位皇帝再拜奉禮曰衆官再拜衆官皆再拜太常卿前奏有司謹具請行事退復位太祝跪取幣于篚興立于樽所凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興太常卿引皇帝進神坐前北向立太祝以幣授侍中侍中秦幣東向進皇帝受幣太常卿引皇帝進北靣跪奠于神坐俯伏興太常卿引皇帝少退北向再拜訖太常卿引皇帝還版位西向立于衆官拜訖太官令出帥進饌者奉饌陳于東門之外謁者引司徒出詣饌所司徒奉爼皇帝既復位太官令引饌入太祝迎引設于神坐前施設訖謁者引司徒以下還本位太祝還尊所太常卿引皇帝詣罍洗侍中黃門侍郎贊洗授巾爵並如常儀謁者引司徒進立于樽所齊郎奉爼立于司徒之後皇帝洗爵訖太常卿引皇帝詣樽所執樽者舉羃侍中贊酌醴齊訖太常卿引皇帝進帝軒轅氏神坐前北向跪奠爵俯伏興太常卿引皇帝少退北向立太祝持版進于神坐之右東靣跪讀祝文祝文臨時隨事撰訖興皇帝再拜太祝進奠版于神坐還樽所太祝以爵酌上樽福酒以授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俯伏興太祝帥齊郎進爼太祝以俎減神前胙肉如常太祝以爼授司徒司徒奉爼西向進皇帝受以授左右皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復于坫皇帝俯伏興再拜訖太常卿引皇帝還版位西向立謁者引司徒還本位謁者引上將詣罍洗盥手洗爵詣酒樽所執樽者舉羃上將酌盎齊訖引詣神坐前北向跪奠爵興少退北向再拜太祝以爵酌罍福酒進上將之右西向立上將再拜受爵跪祭酒遂飲卒爵太祝受爵還樽所上將興又再拜訖引還本位謁者又引次將詣罍洗盥手洗爵終獻如亞獻之儀訖引次將還本位太祝進徹豆還樽所徹者籩豆各一少移于故處太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太常卿前奏請就望瘞位太常卿引皇帝就望瘞位北向立奉禮贊者轉就瘞塪位于衆官將拜太祝執篚進神坐前取幣北行當瘞塪西行至瘞塪太祝以幣置于塪訖奉禮曰可瘞塪東西向各四人置土半塪太常卿前奏禮畢太常卿引皇帝還大次侍衛如式謁者贊引各引祭官及從祭羣官與諸軍將以次出奉禮贊者退復位御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出其祝版燔于祭所皇帝還行宫如來儀若備六軍及嚴鼓作止如類告之禮親征及巡狩郊祭有司軷於國門車駕出日右校預於國門外委土為軷軷謂為山象也又為瘞塪于神坐西北方深取足容物太祝布神坐于軷前南向太官令帥宰人刳羊郊社令之屬設尊罍篚羃于神坐之左俱右向置幣于尊所駕將至太祝立于罍洗東南西向祝史與執尊罍篚羃者俱就尊罍所立太祝再拜詣樽所取幣進跪奠于神坐興還本位進饌者薦脯醢于神坐前加羊于軷西首太祝詣罍洗盥手洗爵詣尊所酌酒進跪奠于神坐興少退北向立讀祝文訖祝文臨時撰太祝再拜還本位少頃太祝帥齊郎奉幣酌酒饌物宰人舉羊肆解之太祝并載埋于瘞置之執尊者徹罍篚席駕至權停太祝以爵酌酒授太僕卿太僕卿左執轡右受酒祭兩軹及軏前軹轂末軏軾前乃飲授爵轢軷而行親征及巡狩告所過山川前一日諸告官俱清齊于告所執事者預修除告所又為埋塪當神坐之南如常方深取足容物太官令備牢饌山鎮海瀆用太牢中山川用少牢小山川用特牲若行速即用酒脯告日郊社丞布神席於告所近北南向設酒尊于神坐之左而右向設洗于酒尊東南北向罍水在洗東篚在洗西南肆篚實以巾爵執尊罍篚羃者各立于尊罍篚羃之後奉禮設告官位於罍洗東南西向執事者位于其後北上設奉禮位于告官西南東向贊者二人在南少退所司實尊罍爼豆太祝實幣篚齊郎取豆血幣長一丈八尺隨牲色用奉禮帥贊者先入就位執尊罍篚羃者次入就位謁者引告官以下次入就位立定奉禮曰再拜贊者承傳告官以下皆再拜謁者進告官之左白有司謹具請行事退復位奉禮曰再拜告官以下皆再拜太祝以幣授告官告官受幣謁者引告官詣神坐前北面跪奠幣俯伏興少退再拜告官復位太官丞引饌入太祝迎引設于神坐前太官丞以下還本位謁者引告官詣罍洗盥手洗爵訖謁者引告官詣酒樽所執尊者舉羃告官酌酒訖跪進奠于神坐俯伏興少退北靣立太祝持版進于神坐之右東向跪讀祝文祝文臨時撰訖興告官再拜太祝進跪奠版于神坐俯伏興還樽所太祝以爵酌福酒進告官之右西向立告官再拜受爵跪祭酒啐酒奠爵俯伏興太祝帥齊郎進爼太祝减胙如常太祝以爼授告官告官受以授齊郎告官跪取爵遂飲卒爵太祝受爵還樽所告官俯伏興再拜訖引還本位太祝進跪徹豆俯伏興還樽所奉禮曰再拜在位者皆再拜告官則不拜奉禮又曰再拜告官以下皆再拜謁者進告官之左白請就望瘞位謁者引告官就望瘞位北向立于告官將拜太祝以篚進神前取幣齊郎取豆血並置諸塪塪東西各二人置土半塪謁者進告官之右白禮畢遂引各官以出太祝與執尊罍者俱復執事位立定奉禮曰再拜太祝以下皆再拜訖以次出其祝版則燔于告所平蕩冦賊宣露布其日守宫量設羣官次露布至兵部侍郎奉以奏聞仍承制集文武羣官客使于東朝堂羣官客使至俱就次各服其服奉禮設羣官版位于東朝堂之前近南文東武西重行北向相對為首又設客使之位如常儀設中書令位于羣官之北南靣量時刻吏部兵部贊羣官客使出次謁者贊引各引就位立定中書令受露布置于案令史二人絳公服對舉之典謁引中書令舉案者從之出就南靣位持案者立于中書令西南東靣立定持案者進中書令前中書令取露布持案者退復位中書令稱有制羣官客使皆再拜中書令宣露布訖羣官客使又再拜皆舞蹈訖又再拜謁者引兵部尚書進中書令前受露布退復位兵部侍郎前受之典謁引中書令入謁者引羣官客使各還次遣使勞軍將前一日執事者預設使者次于營南門之外道右南向使者至謁者引之次使者將到兵部預集大將以下于南門之外列左右廂俱重行北靣相對為首使者出次謁者引立于門西東靣持節者立于使者之北史二人持制書案立于使者西南俱東靣立定大將北靣再拜謁者引使者持節者前導入門而左持案者從之使者立于羃前南靣持節者立于使者之東少南西向持案者立于使者西南東靣又謁者引大將以下入立于使者之南依左右廂俱重行北靣相對為首立定持節者脫節衣持案者進使者前使者取制書持案者退復位使者稱有制大將以下俱再拜宣詔訖大將以下又再拜謁者引大將進使者前北靣受制書退復位持節者加節衣謁者引使者持節者前導以出持案者從之俱復門外位大將以制書授左右拜送使者于門外使者還大將入初使者出諸將以下以次出若賜衣物使者出次立于門外立定執事者以衣物立于案南俱東面北上使者入衣物隨入初大將受制書復位執事以衣物遍授之大將以下受訖又再拜大唐開元禮卷八十四
