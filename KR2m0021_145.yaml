body:
  text: 大唐開元禮卷一百四十五唐蕭嵩等撰凶禮四品五品喪之四改葬卜宅啓請開墳舉柩奠升柩車斂奠設靈筵進引告遷哭柩車位設遣奠轜車發宿止到墓虞祭改葬卜宅將改葬者吉服卜宅兆其餘如葬卜宅兆之儀預於隧所隨地之宜張白布帷幕南向開户啓請其日內外諸親應集者皆至墓所各就便次主人衆主人妻妾女子子俱緦麻服餘周親以下皆素服丈夫於墓東西向婦人於墓西東向皆北上婦人障以行帷俱立哭盡哀卑者再拜開墳祝立於羡道南北向內外皆止哭祝三聲噫嘻啓以開墳改葬之故其意敘改葬所由之事隨時為之內外又哭盡哀權就别所掌事者開墳訖內外又就位哭如初舉柩掌事者設席於幕下舉柩出置於席上內外俱從柩哭於幕所主人以下柩東西面主婦以下柩西東面俱南上丈夫周親以下於主人東北南面西上婦人周親以下於主婦西北南面東上外姻丈夫於主人東南北面西上婦人於主婦西南北面東上尊者坐國官於帷門外之東北面西上僚佐於帷門外之西北面東上皆舒席為位奠祝以功布拭棺改加新楮設洗於幕西南隅罍水在洗西加勺羃篚在洗東南肆實巾二爵一於篚加羃設席於柩東設啓奠於席上設醴酒之樽於奠南主人詣罍洗盥手洗爵進酌酒奠於席前興少退西面再拜內外卑者俱再拜少頃徹奠升柩車既奠進轜車於帷門外南向掌事者升柩於轜車遂詣施設所內外俱哭從掌事者預設牀於幕下有枕席周設帷柩車至帷門外丈夫於柩東婦人於柩西俱立哭掌事者舉柩入設於牀東若於墓所即斂初奠訖不進轜車設牀於柩東而加枕席遂舉尸而斂之舉尸出置於牀南首柩初入定內外就位哭如墓所之儀斂陳衣於幕東帷內明衣裳及上服各一稱西領南上冕具導簮纓在北內喪則花叉衾一衾以黃為表素為裏具饌於幕東兩甒醴酒柩初至幕下舉尸於牀主人衆主人稍退仍西向妻妾女子子稍退仍東向遂斂丈夫加冕婦人以花叉又覆以衾主人衆主人及妻妾女子子憑哭斂將訖掌事者以棺入設于西廂藉以席於棺入內外皆止哭置棺定乃哭舉者四人入舉牀男女從奉之舉尸斂于棺乃加蓋覆以衾設帷于棺東內外就位哭如初奠既斂祝執巾几席入設於柩東右几加以巾掌事者設罍洗於幕西南隅如初祝以饌升設於席前設施訖執饌者降出相者引主人盥洗酌酒進奠於席前興少退西面再拜內外卑者皆再拜訖主人以下各就位俱坐哭設靈筵既斂設靈筵於吉帷內幕下西廂東向施牀帷屏几服飾以時上膳羞及湯沐浴如平常進引前一日之夕掌事者進轜車於凶帷外當門南向其下帳明器及苞牲等俱陳於轜車前少西東向也其日進引前量時刻槌一鼓為一嚴陳靈車儀仗如常在陳車篇少頃捶二鼓為再嚴侍靈者俱詣靈所腰輿威儀入陳如常進靈車於帷外南向少頃捶三鼓為三嚴掌事者入徹饌以出內外皆興立哭於位執紼者入掌事者徹帷持翣者入以翣幛柩執披紼者各進執鐸者各入夾於柩前東西相向執纛者立於鐸南執銘旌者又立於纛南北面諸執披紼鐸旌纛者皆布深衣介幘告遷三嚴訖祝帥腰輿入詣靈座前西面告曰以今吉辰奉即宅兆少頃輿出詣靈車後少頃退若內喪女祝迎將舉柩執鐸者皆振鐸每振鐸先搖之搖訖三振之其持翣者恆以翣障柩柩動執鐸者夾左右每曲及進止皆振鐸內外俱從柩後柩出到轜車後執披紼者如常設帷障於柩後掌事者升柩哭柩車位丈夫俱立哭於轜車東重行西面婦人哭於轜車西重行東面俱南上外姻丈夫俱哭於轜車東南重行北面以西為上婦人哭於轜車西南重行北面以東為上國官哭於外姻之東北面西上僚佐哭於國官之西北面東上立定設遣奠設進奠之饌於轜車東置設訖相者引主人酌酒進奠於席前興少退西面哭再拜內外皆哭卑者再拜若食頃徹之以蒲葦苞牲體下節五苞載於輿以之墓轜車發既設奠吉凶儀仗依式進引靈車動鼓吹振作而行主人衆主人以下皆以次步從哭於柩車後妻妾女子子以下皆步從哭於丈夫之後障以行帷轜車去停所三百步親賓有還者弔哭如别儀辭訖進引尊者乘車馬從柩者更哭不絶聲宿止掌事者先於宿所張吉凶帷幕吉帷在左凶帷在右將至宿所尊者俱下車馬步哭靈車到帷門外回車南向祝師腰輿詣車後少頃輿入詣靈座前少頃輿出進常食於靈座若食頃徹之柩車至於凶帷內外哭於柩車所其位如初掌饌者進酒脯之奠於柩車東席上既設奠內外各還次更哭不絶聲及墓內外俱就位哭進夕奠如初訖內外各還次迭哭終夜及明嚴鼓內外又就位哭進朝奠於柩東進常食於靈座若食頃徹之迎靈發引尊者乘車馬哭從如上儀到墓到墓尊者俱下車馬靈車到帷門外回車南向祝帥腰輿詣車後少頃入詣靈前少頃輿退設酒脯之奠柩車至壙前回車南向外哭位如遣奠之儀掌事者布席張帷於柩車後下柩於席上主人以下妻妾女子子各前撫柩哭盡哀退復位周親以下又前撫柩盡哀退復位俱再拜辭掌事者下柩於壙柩既入壙親賓有還者弔如别儀國官之長奉玄纁束帛授主人主人受以授祝主人稽顙再拜祝奉以入奠於柩東持翣者入倚翣於壙內兩廂執事者以下帳明器苞牲酒米等物入置於壙內皆藉以版施銘旌志石於壙户內置訖掌事者掩壙户加關鑰覆土既覆土內外俱就靈所哭墓左祭后土如始葬之儀虞祭初下柩於墓掌事者具虞祭之饌設罍洗篚於靈幕西南如常內外既就靈所哭掌饌者進虞祭之饌於靈座相者引主人盥洗酌酒進奠於座前興少退西面立內外皆止哭祝持版進立於靈座之右北面跪讀祝文曰維年月朔日子孤子某敢昭告於考某官封諡妣郡縣鄉君某氏各隨其稱也改遷幽宅禮極虞祭攀號永逺無所逮及謹以潔牲柔毛剛鬛嘉薦普淖明齊溲酒祗薦虞事於考某官封諡尚饗主人哭再拜內外皆哭卑者再拜盡哀相者引主人以下出就别所釋衰服著素服而還掌饌者徹饌掌事者徹靈座大唐開元禮卷一百四十五
