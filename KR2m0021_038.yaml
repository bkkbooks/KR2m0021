body:
  text: 大唐開元禮卷三十八唐蕭嵩等撰吉禮時享於太廟有司攝事齋戒陳設省牲器晨祼饋食祭七祀齋戒凡一嵗五享於太廟四時孟月及臘將享有司卜日如别儀前享七日平明太尉誓百官於尚書省曰某月某日時享於太廟各揚其職不供其事國有常刑凡預享之官散齋四日致齋三日散齋皆於正寢致齋二日於本司一日於享所其無本司者皆於享所散齋理事如舊惟不弔䘮問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟享事得行其餘悉㫁其享官已齋而闕者通攝行事諸享官致齋之日官給酒食及明衣各習禮於齋坊所光禄卿監取明水火太官令取水於隂鑒取火於陽燧火以供㸑水以實尊前享一日諸衛令其屬未後一刻各以其方器服守衛廟門毎門二人毎隅一人與太樂工人俱清齋一宿陳設前享三日右校清掃内外守宫設享官公卿以下次於齋坊之内前享二日太樂令設宫懸之樂於廟庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹路鼓於北懸之内道之左右植建鼓於四隅置柷敔於懸内柷在左敔在右設歌鐘歌磬於廟堂之上前楹間北向磬簴在西鐘簴在東其匏竹者立於階間重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上前享一日奉禮設享官公卿位於東門之内道北執事位於道南每等異位俱重行西面以北為上設御史位於廟堂之下一位於東南西向一位於西南東向令史各於其後設奉禮位於樂懸東北賛者二人在南差退俱西面設恊律郎位於廟堂之上前楹間近西東向設太樂令位於北懸之間北向設門外位享官公卿以下皆於東門之外道南每等異位重行北面西上設牲牓於東門之外當門西向以南為上設廩犧令位於牲西南史陪其後俱北向設諸太祝位於牲東各當牲後祝史各陪其後俱西向設太常卿省牲位於牲前近北又設御史位於太常卿之西俱南向設尊彛之位於廟堂上前楹間各於室戸之左北向春夏每室雞彛一鳥彛一犧尊二象尊二山罍二秋冬每室斚彛一黄彛一著尊二壺尊二山罍二皆加勺羃凡宗廟羃皆以黼皆西上各有坫以置瓉爵設簋鈃登籩豆之位于廟堂之上俱東側階之北每坐四簋居前四簠次之次以六登次以六鈃籩豆為後每坐異之皆以南為上屈陳而下設洗於東階東南北向罍水在洗東篚在洗西南肆篚實以珪瓉巾爵執尊罍篚羃者位於尊罍篚羃之後省牲器省牲之日午後十刻廟所諸衛之屬禁斷行人太廟令整拂神座幄晡後二刻太廟令帥府史二人及齋郎以尊坫罍洗篚羃及籩豆鈃豋入設於位加以巾盖諸器物皆濯而陳之晡後三刻諸太祝與廩犧令以牲就牓位謁者引太常卿賛引引御史入詣東階升遍視滌濯於上凡導引者毎曲一逡巡於視滌濯執尊者皆舉羃訖引降就省牲位南向立廩犧令少前請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西面舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官謁者引光禄卿詣厨省鼎鑊申視濯溉賛引引御史就厨省饌太常卿已下每事訖各還齋所進饌者入徹籩豆簠簋鈃豋以出享日未明十五刻太官令帥宰人以鑾刀割牲祝史各取毛血洗肝於鬱鬯又取膟膋毎座共實一豆俱置於饌所膟膋腸間脂晨祼享日未明四刻諸享官各服其服太廟令良醖令各帥其属入實尊罍雞彛斚彛及犧尊象尊壺尊上尊皆實以明水山罍之上尊實以𤣥酒鳥彛黄彛實以鬱鬯犧尊實以醴齊象尊壺尊實以盎齊山罍實以清酒太官令帥進饌者實諸籩豆享日未明三刻奉禮帥賛者先入就位賛引引御史博士太廟令宫闈令諸太祝及令史祝史與執尊罍篚羃者入自東門當階間重行北面西上立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳御史以下皆再拜訖執尊罍篚羃者各就位賛引引御史諸太祝詣東陛升堂行掃除於上令史祝史行掃除於下訖引就位未眀二刻賛引引太廟令太祝宫闈令自東陛升堂詣獻祖室入開塪室太祝宫闈令奉出神主置於座訖引太廟令太祝以下次奉出懿祖次奉出太祖次奉出代祖次奉出髙祖次奉出太宗次奉出髙宗次奉出中宗次奉出睿宗神主置於座如獻祖之儀皇祖妣以下神主皆宫闈令奉出俱同坐並列而處右訖引太廟令以下降復位未明一刻謁者賛引各引享官俱就東門外位太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西其升堂者皆脫履於下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣東陛升堂行掃除於上降行樂懸於下訖引復位初司空行樂懸謁者賛引各引享官以下次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之左白稱有司謹具請行事退復位恊律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼓柷奏永和之樂乃以黄鐘之均作文舞之舞樂舞九成黄鐘三奏大吕太蔟應鐘各再奏偃麾戛敔樂止凡樂皆恊律郎舉麾工鼓柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官皆再拜謁者引太尉詣罍洗盥手洗瓉訖謁者引太尉升自東陛詣獻祖尊彛所執尊者舉羃太尉酌鬱酒訖登歌作肅和之樂以圜鐘之均自後登歌皆歌圜鐘謁者引太尉入詣獻祖神座前北向跪以鬯祼地奠訖興謁者引太尉出戸北向再拜訖謁者引太尉以次祼懿祖次祼太祖次祼代祖次祼髙祖次祼太宗次祼髙宗次祼中宗次祼睿宗並依上儀訖登歌止謁者引太尉降復位初衆官拜訖祝史各奉毛血及肝膋之豆立於東門外齋郎奉爐炭蕭稷黍各位於肝膋之後於登歌止祝史奉毛血肝膋與奉爐炭蕭稷黍者以次入自正門升自泰階諸太祝各迎毛血肝膋於陛上俱入奠於神座前祝史退立於尊所齋郎奉爐炭皆置於室戸外之左其蕭稷黍各置於爐炭下降自阼階以出諸太祝俱取肝膋出戸燔於爐炭還尊所饋食太尉既升祼太官令出帥進饌者奉饌陳於東門之外重行西向以南為上謁者引司徒出詣饌所司徒奉獻祖之俎初太尉既至位太官令引饌入自正門俎初入門雍和之樂作以無射之均自後接神之樂堂下皆奏無射饌至泰階樂止祝史俱進徹毛血之豆降自阼階以出饌升諸太祝迎引於陛上各設于神座前籩豆盖羃先徹乃升簠簋既奠却其盖於下設訖謁者引司徒以下降自阼階復位諸太祝各取蕭稷黍擩肝燔於爐炭還尊所謁者引太尉詣罍洗盥手洗爵訖謁者引太尉升自阼階詣獻祖尊彛所執尊者舉羃太尉酌醴齊訖光大之舞作謁者引太尉入詣獻祖神座前北向跪奠爵少東興謁者又引太尉取爵于坫酌醴齊訖謁者引入詣神座前北向跪奠爵少西興謁者引太尉出戸北向立樂止太祝持版進于室戸外之右東面跪讀祝文曰維某年嵗次月朔日子孝曾孫開元神武皇帝某謹遣太尉封臣名敢昭告於獻祖宣皇帝祖妣宣莊皇后張氏氣序流邁時惟孟春孟夏孟秋孟冬永懐罔極伏增逺感謹以一元大武柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊敬修時享以申追慕尚饗餘室祝文准此太祖以下稱臣訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座出還尊所太尉拜訖樂止謁者引太尉詣懿祖尊彛所取爵於坫執尊者舉羃太尉酌醴齊訖長發之舞作謁者引太尉入詣懿祖神座前北向跪奠爵少東興謁者又引太尉出取爵於坫酌醴齊訖謁者引入詣神座前北向跪奠爵少西興謁者引太尉出戸外向北立樂止太祝持版進於室户外之右東面跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座出還尊所太尉拜訖樂止謁者引太尉詣太祖尊彛所取爵於坫執尊者舉羃太尉酌醴齊訖大政之舞作謁者引太尉入詣太祖神座前北向跪奠爵少東興謁者又引太尉出取爵於坫酌醴齊訖謁者引入詣神座前北向跪奠爵少西興謁者引太尉出戸北向立樂止太祝持版進於室戸外之右東面跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座出還尊所太尉拜訖樂止謁者引太尉詣代祖尊彛所取爵於坫執尊者舉羃太尉酌醴齊訖大成之舞作謁者引太尉入詣代祖神座前北向跪奠爵少東興謁者又引太尉出取爵於坫酌醴齊訖謁者引入詣神座前北向跪奠爵少西興謁者引太尉出戸北向立樂止太祝持版進於室戸外之右東面跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太尉拜訖樂止謁者引太尉詣髙祖尊彛所取爵於坫執尊者舉羃太尉酌醴齊訖大明之舞作謁者引太尉入詣髙祖神座前北向跪奠爵少東興謁者又引太尉出取爵於坫酌醴齊訖謁者引入詣神座前北向跪奠爵少西興謁者引太尉出戸北向立樂終八節止太祝持版進於室戸外之右東面跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座出還尊所太尉拜訖曲終樂止謁者引太尉詣太宗尊彛所取爵於坫執尊者舉羃太尉酌醴齊訖崇徳之舞作謁者引太尉入詣太宗神座前北向跪奠爵少東興謁者又引太尉出取爵於坫酌醴齊訖謁者引入詣神座前北向跪奠爵少西興謁者引太尉出戸北面立樂終八節止太祝持版進於戸外之右東面跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座還尊所太尉拜訖曲終樂止謁者引太尉詣髙宗尊彛所取爵於坫執尊者舉羃太尉酌醴齊訖鈞天之舞作謁者引太尉入詣髙宗神座前北面跪奠爵少東興謁者又引太尉出取爵於坫酌醴齊訖謁者引入詣神座前北向跪奠爵少西興謁者引太尉北向立樂終八節止太祝持版進於戸外之右東向跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座還尊所太尉拜訖曲終樂止謁者引太尉詣中宗尊彛所取爵於坫執尊者舉羃太尉酌醴齊訖文和之舞作謁者引太尉入詣中宗神座前北向跪奠爵少東興謁者又引太尉出取爵於坫酌醴齊訖謁者引入詣神座前北向跪奠爵少西興謁者引太尉出户北向立樂終八節止太祝持版進於戸外之右東面跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座還尊所太尉拜訖曲終樂止謁者引太尉詣睿宗尊彛所取爵于坫執尊者舉羃太尉酌醴齊訖景雲之舞作謁者引太尉入詣睿宗神座前北面跪奠爵少東興謁者又引太尉出取爵于坫酌醴齊訖謁者引入詣神座前北面跪奠爵少西興謁者引太尉出戸北向立樂終八節止太祝持版進於戸外之右東向跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座出還尊所太尉拜訖曲終樂止謁者引太尉詣東序西向立諸太祝各以爵酌罍福酒合置一爵一太祝進太尉之左北向立太尉再拜受爵跪祭酒啐酒奠爵興諸祝史各帥齋郎進俎大祝減神前三牲胙肉皆取前脚第二骨加於俎又以籩取稷黍飯還尊所以胙肉共置一俎上以飯共置一籩以飯授太尉太尉以授齋郎又以三牲胙肉以次授太尉太尉受以授齋郎太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止太尉將復位謁者引太常卿詣罍洗盥手洗爵訖謁者引太常卿升自阼階詣獻祖尊彛所執尊者舉羃太常卿酌盎齊武舞作謁者引太常卿入詣獻祖座前北面跪奠爵少東興謁者引太常卿出戸北向再拜訖謁者又引太常卿取爵於坫酌盎齊訖謁者引入詣神座前北向跪奠爵少西訖興謁者引太常