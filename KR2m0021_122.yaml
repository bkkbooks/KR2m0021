body:
  text: 大唐開元禮卷一百二十二唐蕭嵩等撰嘉禮六品以下庶子冠將冠筮日賔如嫡子之儀前二日主人戒賔及贊冠者前一日掌事者設次於大門外之右南向其日夙興贊者設洗於正寢阼階東南東西當東榮南北以堂深罍水在洗東加勺羃篚在洗西南肆篚實巾一爵一加羃席於東房內西牖下無房者張帷為之陳服於席東領北上爵辨服青衣纁裳白紗中單青領褾襈裾革帶鈎䚢大𢃄練帶紕其垂內外以緇紉約用青組爵韠白襪赤履庶人黑介幘服絳䚢公服方心革帶紉假帶襪履進賢冠服絳紗單衣白紗中單皂領褾襈裾白裙襦赤裙衫革帶鈎䚢假𢃄曲領方心綘紗蔽膝八品九品去中單曲領蔽膝白襪黑舄八品以下黑履庶人黑介幘白裾襦青領革帶襪履緇布冠服青衣素裳素韠中單革帶緇𢃄與爵辨服同襪履與進賢冠服同庶人帶襪履與介幘服同去韠緇纚櫛簮同箱在服南纚今用皂巾方六寸屬帶於前兩隅蒲筵三緇布純又在南樽於房户外之西甒醴玄酒在西加勺羃設篚樽東置二爵於篚加羃饌特牲一俎二籩二豆在服北牲體節折加離肺籩實脯棗豆實葅醢之類質明賔贊至於主人大門外掌次者引之次賔贊公服諸行事者各服其服無公服者常服執樽罍篚者皆就位爵辨玄纓導庶人則介幘進賢冠一梁纓青緌導庶人則黑介幘緇布冠青組纓冠辨各箱各一人執之待於西階之西東面北上設主人之席於阼階上西面賔席於西階上東面冠者席於房户外之西南面房外謂尊東主人公服立於阼階下當東序西面諸親公服非公服者常服立於罍洗東南西面北上尊者停别室儐者公服立於門內道東北面將冠者雙童髻空頂幘導綵袴褶錦紳烏皮履立於房內户東南面主人贊冠者公服立於房內户東西面賔及贊冠者出次立於門西贊冠者少退俱東面北上儐者進於主人之左北面受命出立於門東西面曰敢請事賔曰某子有嘉禮命某執事儐者入告主人迎賔於大門外之東西面再拜賔答拜凡賔主拜揖入出皆贊禮者相導主人揖贊冠者贊冠者報揖主人又揖賔賔報揖主人入賔及贊冠者次入及內門主人揖賔賔報揖主人與賔入贊冠者從之至內霤將曲揖賔報揖至階主人立於階東西面賔立於階西東面主人曰請吾子升賔曰某備將事敢辭主人曰固請吾子升賔曰某敢固辭主人曰終請吾子升賔曰某敢終辭主人升自阼階立於席東西向賔升自西階立於席西東向贊冠者及庭盥於洗升自西階入於東房立於主人贊冠者之南俱西面賔之贊冠者取纚櫛簮箱跪奠於冠者筵東端興席東少北南面立賔揖將冠者賔主俱即席坐將冠者進升席南面坐賔之贊冠者進筵前北面跪脫雙童髻置於箱櫛畢設纚興復位賔主俱興賔降盥主人從降賔東面辭曰請吾子不降主人曰吾子降辱敢不從賔降至罍洗盥手訖詣西階賔主一揖一讓升主人立於席後西面賔立於西階上東面執緇布冠者升賔降一等受之右執頂左執前進將冠者筵前北向跪冠興復西階上席後東面立賔之贊冠者進筵前北面跪結纓興復位冠者興賔揖冠者冠者適房賔主俱坐冠者著青衣素裳之服出房立於户西南面賔主俱興賔揖冠者冠者進立於席後南面賔降盥主人從降辭對如初賔盥手跪取爵於篚興洗訖詣西階賔主一揖一讓升主人立於席後西面賔詣酒樽所酌酒進冠者筵前北向立祝曰旨酒既清嘉薦亶時始加元服兄弟具來孝友時格永乃保之冠者筵西拜受爵賔復西階上東面答拜執饌者薦籩豆於冠者筵前冠者升筵坐左執爵右取脯擩於醢祭於籩豆之間祭酒興筵末坐啐酒執爵興降筵西跪奠爵再拜執爵興賔答拜冠者升筵跪奠爵於薦東興立於筵西南面執饌者徹薦爵賔揖冠者冠者進升筵南向坐賔之贊冠者跪脫緇布冠置於箱櫛畢設纚興復位賔降二等受進賢冠庶人則黑介幘右執頂左執前進冠者筵前北向跪冠興復位賔之贊冠者坐設簮結纓復位冠者興賔揖冠者冠者適房賔主俱坐冠者著綘紗服庶人則白裙襦服出房立於户西南面賔詣酒樽所取爵酌酒進冠者筵前北向立祝曰旨酒既湑嘉薦伊脯乃申爾服禮儀有序祭此嘉爵承天之祜冠者筵西拜受爵賔復西階上東面答拜執饌者薦豆冠者升筵坐左執爵右祭脯醢祭酒興筵末坐啐酒執爵興降筵西跪奠爵於薦東興立於筵西南面執饌者徹薦爵賔揖冠者冠者進升席南面坐賔之贊冠者跪脫進賢冠庶人則脫黑介幘置於箱櫛畢設纚興復位賔降三等受爵辨庶人則黑介幘右執頂左執前進冠者筵前北向跪冠興復位賔之贊冠者坐設簮結纚興復位冠者興賔揖冠者冠者適房賔主俱坐主人贊冠者徹櫛箱入於房冠者著爵辨之服庶人則綘公服出房立於户西南面賔主俱興賔揖冠者冠者進立於席後南面賔詣樽所取爵酌酒進冠者筵前北向立祝曰旨酒令芳籩豆有楚咸加爾服肴升折俎承天之慶受福無疆冠者筵西拜受爵賔復位東面答拜執饌者薦籩豆設爼籩豆之南冠者升筵坐左執爵右祭脯醢贊冠者取肺一以授冠者冠者奠爵於薦西興受却左手執本坐右絶末以祭上左手嚌之興加於俎冠者坐帨手執爵祭酒興筵末坐啐酒興降筵西南面坐奠爵再拜執爵興賔答拜冠者升筵坐奠爵於薦東興降席北面跪取脯降自西階入見母進奠脯於席前退再拜以出冠者母不在則使人受脯於西階下初冠者入見母賔主俱興賔降當西序東面立主人降當東序西面立冠者既見母出立於西階之東南面賔少進字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於嘏永受保之曰孟某甫仲叔季唯其所當冠者曰某雖不敏夙夜祗奉賔出主人送於內門外主人西面請賔曰吾子辱執事請禮從者賔曰某既得將事敢辭主人曰敢固以請賔曰某辭不得命敢不從賔就次主人入初賔出冠者東面見諸親諸親拜之冠者答拜冠者西南面拜賔之贊冠者贊冠者答拜訖見諸尊於别室賔主既釋服改席訖賔與衆賔俱出次立於門西東面主人出門東西面主人揖賔賔報揖主人先入賔及衆賔從之至階一讓升各就坐後立定俱坐會訖賔主俱興賔立於西階上東向主人立於東階上西向衆賔降立於西階下東面掌事者以幣篚升授主人於序端賔北面再拜主人進立於楹間南面賔進立於主人之右俱南面賔受篚退復東面位主人還阼階上北面拜送賔降自西階從者迓受幣賔出主人送賔於大門外之東西面再拜賔退主人入孤子則諸父諸兄戒賔冠之日主人髻而迎賔拜揖讓如冠主冠醮禮賔拜送皆如上儀明日見祖禰於正寢冠者公服庶人則常服質明設几筵於正寢贊禮者引入至庭北面再拜訖引出有廟者見於廟五品以上孫九品以上子冠假用出身品服其三品以上大功以上親五品以上期以上親冠同八品九品服大唐開元禮卷一百二十二
