body:
  text: 大唐開元禮卷五十九唐蕭嵩等撰吉禮巡狩告於大社有司攝事將告有司卜日如别儀前二日守宫設告官以下次各於常所右校清掃內外又為瘞塪二如常前一日諸告官清齋於社所諸衛令其屬晡後一刻各以其方器服守衛社宫門奉禮設版位於內外並如常儀郊社令帥其屬以樽坫罍洗篚羃者位於樽罍洗篚冪之後太官令預饌酒脯醢告日未明四刻太史令郊社令各服其服設神位席如常未明三刻諸告官各服其服郊社令良醖令之屬入實樽罍及玊正坐太尊二一實明水為上一實醴齊次之配坐象樽二其實亦如之皆山罍二一實玄酒為上一實清酒次之玊兩圭有邸太祝各以幣置於篚設於饌所幣以黑長一丈八尺未明二刻奉禮帥贊者先入就位贊引引御史太祝以下入行掃除如常儀質明謁者引告官以下俱就門外位奉禮帥贊者先入就位贊引引執事者次入就位立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳告官以下皆再拜謁者進告官之左白有司謹具請行事退復位奉禮曰再拜在位者皆再拜初白請行事太官令出帥進饌者奉饌陳於西門之外初太官令出太祝跪取玉於篚興各立於樽所謁者引告官詣大社壇升自北陛南向立太祝以玊幣西向授告官受玊幣進南向跪奠於大社神坐俯伏興少退南向再拜謁者引告官降自北陛詣太稷壇升奠玉幣如大社之儀訖謁者引降還本位太祝各還樽所太官令引饌入太社太稷之饌入自正門配坐之饌入自左闥各由其陛升諸太祝迎引於壇上各設於神坐前籩豆蓋羃徹之如式設訖太官令以下降自西陛復位諸大祝各還樽所謁者引告官詣罍洗盥手洗爵訖詣大社壇升自北陛詣大社酒樽所執樽者舉羃告官酌醴齊謁者引告官進大社神坐前南向跪奠爵俯伏興少退南向立太祝持版進於神坐之右西向跪讀祝文祝文臨時撰訖興告官再拜太祝進跪奠版于神座俯伏興還樽所告官拜訖謁者引告官詣后土氏酒樽所取爵於坫執樽者舉羃告官酌醴齊訖謁者引告官進后土氏神坐前西向跪奠爵俯伏興少退西向立太祝持版進於神坐之左南向跪讀祝文訖興告官再拜太祝進跪奠版於神坐俯伏興還樽所告官拜訖謁者引告官詣太社神坐前南面立太祝各以爵酌罍福酒合置一爵一太祝持爵進告官之右東向立告官再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫告官俯伏興再拜訖謁者引告官降自北陛詣罍洗盥手洗爵謁者引告官詣太稷壇北陛升獻太稷后稷如太社之儀訖引告官降復位諸祝各進跪徹豆俯伏興還樽所奉禮曰再拜在位者皆再拜已飲福者不拜奉禮曰再拜告官以下皆再拜謁者進告官之左白請就望瘞位謁者引告官就望瘞位南向立於衆官將拜諸祝各以篚於神坐前取幣置諸坎奉禮曰可瘞左右各四人置土半坎謁者進告官之左白禮畢謁者引告官贊引引執事者以次出御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出其祝版燔於齋坊大唐開元禮卷五十九
