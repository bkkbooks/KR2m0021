body:
  text: 大唐開元禮卷十四唐蕭嵩等撰吉禮皇帝立夏祀赤帝於南郊齊戒陳設省牲器鑾駕出宫奠玉帛進熟鑾駕還宫齊戒前祀七日平明太尉誓百官於尚書省曰某月某日祀赤帝於南郊各揚其職不供其事國有常刑皇帝散齊四日致齊三日如圜丘之儀凡預祀之官散齊四日致齊三日散齊皆於正寢致齊二日於本司一日於祀所其無本司者皆於祀所近侍之官應從升者及從祀羣官諸方客使各於本司及公館清齊一宿凡散齊理事如舊唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊唯祀事得行其餘悉斷其祀官以下已齊而闕者通攝行事諸祀官致齊之日給酒食及明衣各習禮於齊所光祿卿監取明水火太官令取水於隂鍳取火於陽燧火以供爨水以實樽前祀一日諸衛令其屬未後一刻各以其方器守衛壝門與太樂工人俱清齊一宿陳設前祀三日尚舍直長施大次於外壝東門之內道北南向尚舍奉御鋪御坐衛尉設陳饌幔於內壝東門之外道南北向設文武侍臣次又設祝官及從祀羣官諸州使人蕃客等次如式前祀二日太樂令設宫懸之樂於壇南內壝之內設歌鐘歌磬於壇上各如圜丘之儀右校掃除壇之內外郊社令積柴於燎壇其壇於樂懸之南外壝之內方一丈髙一丈二尺開上南出户方六尺前祀一日奉禮郎設御㘴於壇之東南西向設望燎位於柴壇之北南向設祀官公卿位於內壝東門之外道南分獻之官於公卿之南執事者位於其後每等異位俱重行西向北上設御史位於壇下一位在東南西向一位在西南東向令史各陪其後設奉禮位於樂懸東北贊者二人在南差退俱西向設協律郎位於壇上南陛之西東向設太樂令位於北懸之間北向設從祀官文官九品已上於執事之南東方南方蕃客又於其南每等異位重行西向北上酅公介公位於內壝西門之外道南武官九品以上於酅公介公之後西方北方蕃客又於其南俱每等異位重行東面北上其褒聖侯於文官三品之下諸州使人分方次京官之下又設祀官及從祀羣官等門外位於東西壝門之外道南皆如設次之式設牲榜於東壝之外當門西向配帝牲榜少退南上設廩犧令位於牲西南史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北南向設赤帝酒樽於壇之上下太樽二著樽二犧樽二山罍二在壇下於東南隅北向象樽二壺樽二山罍二在壇下皆於南陛之東北向西上設配帝著樽二犧樽二象樽二山罍二在壇上於赤帝酒樽之東北向西上熒惑三辰祝融氏俱象樽二各設於神坐之左皆右向七宿壺樽二設於神坐之右而左向赤帝配帝樽藉以席樽置於坫星辰以下加勺羃設爵于樽下設御洗於壇南陛東南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設星辰以下罍洗篚幂各於其方階道之左俱內向執樽罍篚幂者各於其後又設玉幣之篚於壇之上下樽坫之所祀日未明五刻太史令郊社令升設赤帝赤熛怒神位於壇之上北方南向席以槀秸設帝神農氏神坐於東方西向席以莞設熒惑三辰之坐於壇之東北七宿之坐於壇之西北各於其壇下南向相對為首設祝融氏之坐於壇之東南西向席皆以莞設神位各於坐首省牲器省牲一日午後十刻去壇二百步所諸衛之屬禁斷行人晡後二刻郊社令帥府史二人及齊郎以樽坫罍洗篚羃入設於位晡後三刻諸太祝與廪犧令以牲就榜位謁者引太常卿贊引引御史詣壇東陛升視濯溉於上於視濯執樽者皆舉幂告潔訖引太常卿降復位謁者進太尉之左白請就門外位謁者贊引各引祀官以下就門外位謁者引太常卿就省牲位南向立廪犧令少前曰請省牲退復位太常卿省牲廪犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西面舉手曰充俱還本位諸太祝與廪犧令以次牽牲詣厨授太官令謁者引光祿卿詣厨省鼎鑊申視濯溉謁者贊引各引祀官御史就厨省饌具訖俱還齊所祀日未明十五刻太史令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲鑾駕出宫如圜丘之儀奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各率其屬入實樽罍及玉幣凡六樽之次太樽為上實以泛齊著樽次之實以醴齊犧樽次實以盎齊象樽次之實以醍齊壺樽次之實以沈齊山罍下實以清酒配帝著樽為上實以泛齊犧樽次之實以醴齊象樽次之實以盎齊山罍為下實以清酒其熒惑三辰祝融氏之象樽俱實以醍齊七宿之壺樽俱實以沈齊𤣥酒各實於五齊之上樽禮神之玉以赤璋其幣各以赤色太官令帥進饌者實諸籩豆簠簋入設於內壝東門之外饌幔內未明二刻奉禮帥贊者先入就位贊引引御史博士諸太祝及令史祝史與執樽罍篚羃者入自東壝門當壇南重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有辭贊者皆承傳御史以下皆再拜訖執樽罍篚羃者各就位贊引引御史博士諸太祝詣東陛升行掃除於上令史祝史行掃除於下訖各引就位駕將至謁者贊引各引祝官通事舍人分引從祀羣官諸方客使先至者就門外位駕至大次門外回輅南向千牛將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次通事舍人各引文武五品已上從祀之官皆就壝外位太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸南道西謁者引司空入行掃除訖出復位如常儀皇帝停大次半刻頃通事舍人贊引各引從祀羣官酅公介公諸方客使先入就位太常博士引太常卿立於大次門當門北向侍中版奏外辦皇帝服衮冕出次華蓋侍衛如常儀博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至內壝門外殿中監進大圭尚衣奉御又以鎮圭授殿中監殿中監受進皇帝搢大圭執鎮圭華蓋仗衛停於門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常儀皇帝至版位西向立每立定太常卿博士即退立於左謁者贊引各引祀官次入就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏徵音乃以黃鐘之均文武之舞樂舞六成偃麾戛敔樂止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜上下諸太祝俱取玉幣於篚各立於樽所太常卿引皇帝太和之樂作皇帝詣壇升自南陛侍中中書令以下侍衛量人從升壇皇帝升壇北向立樂止太祝加玉於幣以授侍中侍中奉玉帛東向進皇帝搢鎮圭受玉幣登歌作肅和之樂以大吕之均太常卿引皇帝進北面跪奠於赤帝赤熛怒神坐俯伏興太常卿引皇帝少退北面再拜訖太常卿引皇帝立於西方東向又太祝以幣授侍中侍中奉幣北向進皇帝受幣太常卿引皇帝進東向跪奠於帝神農氏神坐俯伏興太常卿引皇帝少退東向再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止皇帝初奠配帝之幣星辰以下諸祝各以幣進奠於神坐還樽所初羣官拜訖祝史各奉毛血之豆立於門外於登歌止祝史奉毛血之豆入各由其陛升諸太祝迎取於壇上俱進奠於神坐前諸太祝與祝史退立於樽所進熟皇帝既升奠玉帛太官令出帥進饌者奉饌陳於內壝門之外謁者引司徒出詣饌所司徒奉赤帝之俎初皇帝既至位樂止太官令引饌入俎初入門雍和之樂作以黃鐘之均饌至陛樂止祝史俱進跪徹毛血之豆降自東陛以出赤帝之饌升自南陛配帝之饌升自東陛諸太祝迎引於壇上各設於神坐前籩豆蓋羃先徹乃升簋簠既奠却其蓋於下設訖謁者引司徒太官令帥進饌者俱降自東陛以出司徒復位諸太祝各還樽所又進設星辰以下之饌相次而畢太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤興承水皇帝盥手黃門侍郎跪取巾於篚興進皇帝帨手訖黃門侍郎受巾跪奠於篚遂取匏樽於篚興進皇帝受爵侍中酌罍水又侍中奉盥水皇帝洗爵黃門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤匜黃門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝詣壇升自南陛樂止謁者引司徒升自東陛立於樽所齊郎奉俎從升立於司徒之後太常卿引皇帝詣赤帝酒樽所執樽者舉羃侍中贊酌泛齊訖夀和之樂作太常卿引皇帝進赤帝赤熛怒神坐前北向跪奠爵俯伏興太常卿引皇帝少退北向立樂止太祝持版進於神坐之右東向跪讀祝文曰維某年嵗次月朔日子嗣天子臣某敢昭告於赤帝赤熛怒朱明戒序長贏馭莭庶品蕃碩用遵恆典敬以玉帛犧齊粢盛庶品恭備禋祀肅昭養德帝神農氏配神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版於神坐前興還樽所皇帝拜訖樂止太常卿引皇帝詣配帝酒樽所執樽者舉羃侍中取爵於坫進皇帝受爵侍中贊酌泛齊訖樂作太常卿引皇帝進帝神農氏神坐前東向跪奠爵俯伏興太常卿引皇帝少退東向立樂止太祝持版立於神坐之左北面跪讀祝文曰維某年嵗次某月朔日子嗣開元神武皇帝臣諱敢昭告於帝神農氏時惟孟夏火德方融用致明禋於赤帝赤熛怒惟帝表功協德允斯作對謹以制幣犧齊粢盛庶品式陳明薦作主配神尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版於神坐興還樽所皇帝拜訖樂止太常卿引皇帝進赤帝神坐前北向立樂作太祝各以爵酌上樽福酒合置一爵一太祝持爵授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俯伏興太祝各帥齊郎進俎太祝减神前胙肉加於俎以胙肉共置一俎上太祝持俎以授司徒司徒奉俎西向進皇帝受以授左右謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中受爵以授太祝太祝受爵復於坫皇帝俯伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止皇帝獻將畢謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉自東陛升壇詣赤帝著樽所執樽者舉羃太尉酌醴齊武舞作謁者引太尉進赤帝神坐前北向跪奠爵興謁者引太尉少退北向再拜謁者引太尉詣配帝犧樽所取爵於坫執樽者舉羃太尉酌醴齊謁者引太尉進帝神農氏神坐前東向跪奠爵興謁者引太尉少退東向再拜謁者引太尉進赤帝神坐前北面立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光祿卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光祿卿復位初太尉將升獻贊引三人各引獻官以次詣罍洗盥手洗爵一獻熒惑三辰一獻祝融氏一獻七宿各詣酒樽所俱酌酒進跪奠於坐首祝史助奠相次而畢贊引各引獻官還本位武舞六成樂止舞獻俱畢上下諸祝各進跪徹豆興還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜豫和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作皇帝就望燎位南向立樂止於羣官將拜上下諸祝各執篚進神坐前跪取玉帛祝版齊郎以爼載牲體黍稷飯及酒爵興各自其陛降壇南行經懸內當柴壇南東行自南陛登柴壇以玉幣祝版饌物置於柴上户內諸祝又以星辰以下之禮幣皆從燎奉禮曰可燎東西面各六人以炬燎火半柴太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出內壝門殿中監前受鎮圭以授尚衣奉御殿中監前受大圭華蓋侍衛如常儀皇帝入次樂止謁者贊引引祀官通事舍人引從祀羣官諸方客使以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次皆出鑾駕還宫如圜丘之儀大唐開元禮卷十四
