body:
  text: 大唐開元禮卷一百三十唐蕭嵩等撰嘉禮皇帝遣使諸州宣撫皇帝遣使詣諸州宣制勞會皇帝遣使詣諸州宣赦書諸州上表皇帝遣使諸州宣撫前一日本司設使者次於州大門外道右南向又設應集之官次於大門外文官道東武官於使次西南俱南向相對為首其日使者將至刺史出城迎於一里外相去九十步許刺史於路左下馬使者下馬皆少進使者命刺史乘馬使者與刺史俱乘馬而行使者至鎮及縣其鎮將縣令出迎與刺史同若使者五品以上鎮將縣令六品以下則使者不下馬命鎮將縣令乘馬而已若臨邊者不出迎應集者至州門外各就次服朝服非朝服者公服應受制及應集官路逺不及期者則使至别定某日本司設使者位於廳事階間南向設刺史位於使位之南北向設應集之官位於刺史之後每等異位若有諸老則位於諸官之後俱重行北面以西為上又設刺史以下位於大門外之東每等異位重行西面以北為上使者至掌次者引就次若别日宣勞則使者停於館應集者至日乃集刺史入使者以下皆公服制書及版各置於案贊禮者引應集之官就門外位諸老應受版者齒位八十以上杖於位刺史朝服以出行參軍引立於東階東南西面使者出次贊禮者引使者持幡節者前導立於門西東面持幡節者立於使者之北少退使副立使者西南史對舉制書及版案立於使副西南俱東面北上若版多則量加案立定行參軍引刺史迎於大門外之南北面再拜引刺史先入立於內門外之西東面州官位於其後贊禮引使者入持幡節者前導入門而左使副以下從之使者詣階間就位南面立持幡節者於使者之東少南西面幡在南使副立於使者西南持案者立於使副之南少退俱東面行參軍引刺史贊禮者引應集之官以次入就位立定持節者脫節衣持案者進使副前使副取制書持案者退復位使副以制書進授使者退復位使者稱有制刺史等再拜宣制訖刺史等又再拜行參軍引刺史進詣使者前北面受制書退立於東階東南西面贊禮者次引應受制者等别受制如常儀凡同制書者皆同拜訖引立於刺史東南西面北上若有版受史以案詣使副前使副取版進使者皆如初贊者引為首一人少進使者稱有制為首者再拜宣制訖為首者又再拜贊者引為首者進詣使者前北面受版若有束帛賑恤依式宣付凡老者拜八十已上一坐再拜九十已上子弟拜受訖引立于刺史之後又引次受者亦如之訖持節者加節衣贊禮者引使者幡節前導以出使副以下從之俱復門外位諸老以版授子弟行參軍引刺史贊禮者引州府之官及諸老出復門外位立定刺史拜送贊禮者引使者還於次行參軍引刺史入贊禮者引州官及諸老還次若諸縣宣勞版授如在州之儀若使者於隨便宣制授賜物者縣令預集鄉望立於館門外之南重行北面西上使者至立於門西東面鄉望俱再拜使者入詣廳事前南面立鄉望隨入宣勞授受及拜送皆如上儀凡使至先問百年者有則宣制頒餼酒米牲物皆子弟代受之皇帝遣使詣諸州宣制勞會前一日本司設使者次於門外道右南向又設應集官次於大門外文官道東武官於使次西南俱南向相對為首其日質明應集之官到州門外各就次服朝服非朝服者公服本司設使者位於廳事階間南向設刺史位於使位之南北面設應集之官位於刺史之後每等異位重行北面以西為上又設刺史以下位於大門外之東每等異位俱重行西面以北為上使者至掌次者引就次以制書置於案使者以下皆公服贊禮者引應集之官俱就門外位刺史朝服以出行參軍引立於東階東南西面使者出次贊禮者引使者立於門西東面史二人對舉制書案立於使者西南俱東面立定行參軍引刺史迎於大門外之南北面再拜行參軍引刺史先入立於內門外之東西面州官立於其後贊禮者引使者入門而左持案者從之使者詣階間就位南向立持案者立於使者西南東面行參軍引刺史贊禮者引應集之官以次入就位立定持案者進使者前使者取制持案者退復位使者稱有制書刺史等再拜宣制訖又再拜行參軍引刺史進詣使者前北面受詔書退立於東階東南西面贊禮者次引應受制者等别受制如上儀凡同制書者皆同拜訖引立於刺史東南西面北上贊禮者引使者出持案者從之俱復門外位行參軍引刺史贊禮者引州官以次出俱復門外位立定刺史拜送贊禮者引使者還於次行參軍引刺史入贊禮者引州官各還次將會本司改設刺史以下位於廳事之庭如常禮又鋪使者席於廳上楹間東向刺史席於使者之東西面州官之席於刺史之後各依資品俱南上席於庭者文官在東武官在西皆北上設訖刺史以下各服公服若常服贊禮者引使者行參軍引刺史又贊禮者引預會之官俱就門外位立定贊唱者先入就位贊禮者引使者先入行參軍引刺史贊禮者引預會之官以次入就位立定贊唱者曰再拜在位者皆再拜贊禮者引使者行參軍引刺史又贊禮者引應升階者詣東西階以次升各立於席後其位於階下者又引就席後上下立定俱就席俯伏坐遂行酒酒至上下皆俯伏興立於席後俱再拜搢笏立受酒升席俯伏坐飲酒行三周進食食至上下皆俯伏興立於席後設食訖俱升席俯伏坐食訖仍行酒會畢俱興各以次引降復位立定贊唱者曰再拜在位者皆再拜以次引出若無臺使會位贊拜亦準此皇帝遣使詣諸州宣赦書鎮與州同其日本司設使者次於州大門外道右南向使者至掌次者引就次以赦書置於案應集之官至州門外服朝服非朝服者公服本司設使者位於廳事階間南向設刺史位於使位之南北面設應集之官位於刺史之後文官在東武官在西每等異位俱重行北面相對為首又設門外位文官於門東每等異位重行西面武官於門西每等異位重行東向俱以北為上本司録州見囚集於州門之外北面西上贊禮者引應集之官俱就門外位刺史朝服以出行參軍引立於東面西向使者出次贊禮者引立於門西武官之前少北東面史二人對舉案立於使者西南俱東面立定行參軍引刺史迎於大門外之南北面再拜行參軍引刺史先入立於內門之東西面州官立於其後贊禮者引使者入門而左持案者從之使者詣階間就位南面立持案者立於使西南東面行參軍引刺史贊禮者引應集文官以次入就位立定持案者進使者前使者取赦書持案者退復位使者稱有赦刺史以下皆再拜宣赦訖又再拜舞蹈又再拜本司釋囚行參軍引刺史進使者前北面受赦書退復位贊者引使者出持案者從之俱復門外位行參軍引刺史贊禮者引州官以次出復門外位刺史拜送贊禮者引使者還於次行參軍引刺史入又贊禮者引州官各還次諸州上表前一日本司設應集之官次於州大門外文官道東武官道西俱南向相對為首其日夙興本司設使者位於廳事階間南向設刺史位於使者位之南北向設應集之官位於刺史之後文在東武在西每等異位俱重行北面相對為首設贊唱者位於東階東南西向北上設應集之官門外位文官於門東西向武官於門西東向每等異位重行以北為上質明應集之官至州門外就次服朝服非朝服者公服贊禮者引應集之官俱就門外位贊唱者先入就位佐史對舉表案立於贊唱者之北西向表每一等為一案刺史朝服以出行參軍引就位贊禮者引應集之官以次入就位立定贊禮者引使者入門而右詣階間就位南向立贊禮者引表案詣使者前使者取表贊禮者引案退復位餘表案位於使者西北南向東上贊唱者曰再拜刺史以下皆再拜贊唱者引使者出舉表案者從之行參軍引刺史入贊禮者引州官以次出上表者若止一人則不須諸官陪位上表者立於廳事東階東南西面持表案者立於上表者東南俱西面使者入立於階間南向持表案者以案進上表者取表持案者退復位上表者詣使者前授表退北面再拜使者出上表者入大唐開元禮卷一百三十
