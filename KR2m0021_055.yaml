body:
  text: 大唐開元禮卷五十五唐蕭嵩等撰吉禮仲春仲秋釋奠於齊太公齊戒將享所司隨職供辦凡預享之官散齊三日致齊二日散齊皆於正寢致齊二日于本司一日于祭所其無本司者皆於祭所散齊理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊惟享事得行其餘悉斷其享官已齊而闕者通攝行事諸享官散齊之日給酒食及明衣各習禮於齊所太官令監取明水火取水于隂鍳取火於陽燧火以供爨水以實尊前享一日諸衛令其屬未後一刻各以其方器服守衛廟門及太樂工人俱清齊一宿陳設前享三日守宫設獻官以下次於齊坊前享二日太樂令設軒懸之樂於廟庭東方南方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設三鎛鐘於編懸之間各依辰位樹路鼓於北懸之間道之左右植建鼓於三隅置柷敔于懸內柷在左敔在右設歌鐘歌磬於廟堂之上前楹間北向磬簴在西鐘簴在東執匏竹者立於堂下階間重行北向相對為首凡懸皆展而編之諸工人各位於懸後右校掃除內外又為瘞塪院內堂之壬地方取足容物南出陛前享一日奉禮設三獻位於東門之內道北執事位於道南每等異位俱西面北上設望瘞位於堂之東北當埋坎之東西向設御史位於堂下西南東向令史陪其後設奉禮位於樂懸東北贊者二人在南差退俱西向又設奉禮贊者位於瘞坎東北南面東上設協律位於堂上前楹間近西東向設太樂令位於北懸之間北向設廟官位於學懸東西若有觀者位于南門內道之左右重行北面相對為首金吾監檢不得喧雜設三獻門外位執事者位於其後每等異位俱北向西上設廟官位于三獻東南俱重行北面西上設酒樽之位于堂上齊太公犧樽二象樽二山罍二在前楹間北向留侯犧尊二象尊二山罍二在太公酒樽之東俱西向尊皆加勺冪有坫以置爵其留侯之爵同置于一坫設洗於東階東南北向罍水在洗東篚在洗西南肆執樽罍篚羃者各位於樽罍篚冪之後設幣篚二各於樽坫之所晡後郊社令帥齊郎以樽坫罍洗篚羃設於位升堂者自東階謁者引三獻官等詣厨視濯溉凡導引者每曲一逡巡贊引引御史詣厨省饌具享日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆二取毛血置於饌所遂烹牲其牲用太牢一正坐及配坐俎皆升右胖十一體以下折分餘體升之未明五刻郊社令率其屬及廟司各服其服整拂神幄饋享享日未明三刻諸享官各服其祭服諸陪祭之官皆公服郊社令良醖令各帥其屬入實樽罍及幣犧尊實以醴齊象尊實以盎齊山罍實以清酒齊皆加明水酒皆加𤣥酒各實于上尊其幣以白各長一丈八尺太官令帥其屬實諸籩豆簠簋等未明二刻奉禮帥贊者先入就位贊引引御史太祝及令史與執樽罍篚羃者入自東門當階間重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽罍篚羃者各就位贊引引御史太祝詣東階升堂行掃除於上令史祝史行掃除於下訖引降就位謁者引享官以下俱就門外位未明一刻太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸南道西其升堂者皆脫履於下降納如常謁者引亞獻官入就位立定奉禮曰再拜亞獻官再拜訖謁者引亞獻官詣東階升堂行掃除於上降行樂懸於下訖引還本位初獻掃除訖謁者贊引引享官以下次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進初亞獻官之左白有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏永和之樂以姑洗之均自後堂下之樂皆奏姑洗作武舞之舞樂舞三成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官在位者皆再拜太祝俱跪取幣於篚興各立於樽所謁者引初獻官升自東階進太公神坐前北向立太祝以幣東向授初獻官初獻官受幣登歌作肅和之樂以南吕之均謁者引初獻官進北面跪奠於太公神坐興少退北向再拜謁者初引獻官當留侯首坐前東向立又太祝以幣北向授初獻官初獻官受幣謁者引初獻官進東向跪奠於留侯首坐興少退東向再拜登歌止謁者引初獻官降復位初衆官拜訖祝史各奉毛血之豆立於東門外登歌止祝史奉毛血升自東階太祝迎取於階上進奠於太公留侯首坐前太祝興祝史退立於樽所初獻官既升奠幣太官令出帥進饌者奉饌陳於東門之外初獻官降復位太官令引饌入俎初入門雍和之樂作自後酌獻皆作雍和饌至階樂止祝史各進跪徹毛血之豆降自東階以出饌升太祝迎引於階上各設於神坐前籩豆蓋羃先徹乃升簋簠既奠却其蓋於下設訖太官令以下降復位太祝還樽所謁者引初獻官詣罍洗盥手洗爵引升詣太公酒樽所執樽者舉冪初獻官酌醴齊樂作謁者引初獻官詣太公神坐前北向跪奠爵俯伏興少退北向立樂止太祝持版進於神坐之右東向跪讀祝文曰維某年歲次月朔日子嗣皇帝謹遣某官姓名敢昭告於齊太公帷公爰定六韜載成七德功業昭著生靈攸仰俾兹末學克奉舊章謹以制幣犧齊粢盛庶品式陳明薦以張留侯等配祀尚饗太祝興初獻官再拜初讀祝文訖樂作太祝進跪奠版於神坐興還樽所初獻官拜訖樂止謁者引初獻官詣留侯酒樽所取爵于坫執樽者舉羃初獻官酌醴齊樂作謁者引初獻官進留侯首坐前東向跪奠爵興少退東面立樂止初獻官既奠首坐爵餘坐皆齊郎助奠相次而畢其亞獻終獻齊郎助奠亦如之太祝持版進於留侯神坐之左北面跪讀祝文曰維某年歲次月朔日子嗣皇帝遣某官姓名敢昭告於留侯惟子宣揚武教光贊道鈐大濟生靈貽範千載謹以制幣犧齊粢盛庶品式陳明薦從祀配神尚饗太祝進跪興初獻官再拜初讀祝文訖樂作太祝奠版於神坐興還樽所初獻官拜訖樂止謁者引初獻官詣東序西向立太祝各以爵酌罍福酒合置一爵一太祝持爵進初獻官之左北向立初獻官再拜受爵祭酒啐酒奠爵俯伏興太祝帥齊郎奠爵俯伏興太祝帥齊郎進俎跪減太公及留侯首坐前三牲胙肉皆取前腳第二骨加於俎又以飯共置一籩太祝先以飯籩授初獻官受以授齊郎又以俎授初獻官每受以授齊郎初獻官跪取爵遂飲卒爵復於坫初獻官俯伏興再拜謁者引初獻官降復位文舞出鼓柷作舒和之樂立定戛敔樂止初初獻官獻將畢謁者引亞獻官詣罍洗盥手洗爵訖謁者引升自東階詣太公酒樽所執樽者舉羃亞獻官酌盎齊訖武舞作謁者引亞獻官詣太公神座前北面跪奠爵俯伏興少退北向再拜訖謁者引亞獻官詣留侯酒樽所取爵於坫執樽者舉羃亞獻官酌盎齊訖謁者引亞獻官進留侯首坐前東向跪奠爵興少退東向再拜謁者引亞獻官詣東序西向立太祝各以爵酌罍福酒合置一爵一太祝持爵進亞獻官之左亞獻官再拜受爵跪飲卒爵太祝進受爵復於坫亞獻官興再拜謁者引降復位亞獻官獻將畢謁者引終獻官詣罍洗盥手訖升酌盎齊終獻如亞獻之儀訖引降復位武舞止太祝等各進跪徹豆興還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜已飲福受胙者不拜奏永和之樂奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進初獻官之左白請就望瘞位謁者引初獻官就瘞位西向立奉禮帥贊者轉就瘞塪東北位初在位者將拜諸太祝各執篚進神坐前跪取幣興降自西階詣瘞塪以幣置於塪訖奉禮曰可瘞塪東西廂各四人置土半塪謁者進初獻官之左白禮畢遂引初獻官出謁者贊引各引享官以下以次出初白禮畢奉禮帥贊者還本位贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出樂工以下皆出其祝版燔於齊坊大唐開元禮卷五十五
