body:
  text: 大唐開元禮卷四十五唐蕭嵩等撰吉禮皇帝拜五陵皇后拜五陵太常卿行諸陵皇帝拜五陵將拜陵所司承制內外宣攝隨職供辦前發二日太尉告太廟如常儀將作預修理拜謁之所及寢宫務極潔敬不得喧雜尚舍直長去陵十里所設行宫奉御鋪御座齊室如常儀守宫設從駕百官及皇親諸親客使位及次如常儀尚舍又於謁拜陵所之道西量設小次又於寢宫前之西南設大次東向御座如常儀守宫量設侍臣次於御次西南又設羣官等應陪位者次於侍臣之西南隨地之宜皆東向以北為上文官在北武官在南朝集使於武官之南尚食預備太牢之饌珍羞庶品務極豐潔太常滌棧牲牢及粢盛光祿司農及掌祠人供辦如式拜謁前一日皇帝至行宫詣齊室仗衛如式陵令以玉册進御署訖近臣奉出陵令受訖奉禮設御位於陵東南隅西向其有山谷隱映則隨地設位望陵而拜又設位於寢宫之內寢殿東階之東南西向又設百官位於陵所行從官及皇親諸親客使等分方位於神道之左右相對為首又設百官位於寢宫所大次之前分方序立如常並隨地之宜拜謁日未明五刻諸衛量設黃麾大仗於陵寢陳布諸陵寢舊宿衛人各依本職掌不得移動未明三刻從行百官及皇親五等以上諸親三等已上并客使等應陪者俱就位侍中版奏請中嚴其布位及進嚴典儀相贊設之近仗就陳如常未明一刻侍中版奏外辦皇帝素服乘馬以出敕侍臣上馬曲直華蓋繖扇侍衛如常儀詣陵西南小次所控馬以入少頃侍中版奏外辦皇帝步出次博士引太常卿太常卿前導皇帝至位立太常卿前奏請再拜博士與太常卿退立於後皇帝再拜太常卿又前奏請再拜皇帝又再拜有泣無哭奉禮曰再拜贊者承傳陪位者皆再拜又再拜訖凡贊引進退皆通事舍人贊相以後准此少頃太常卿前奏請辭皇帝再拜又再拜奉禮曰奉辭贊者承傳陪位者再拜又再拜太常卿引皇帝還小次乘馬出次敕侍臣上馬儀仗侍衛詣寢宫皇帝從陵回詣大次乘馬以入其仗衛等各立以俟其行從百官及皇親諸親并客使等並依位序立於大次之前所司嚴潔具酒饌侍中版奏外辦皇帝步出大次博士引太常卿太常卿前導皇帝至寢宫南門仗衛停於門外其應從入之官臨時奏聽進止博士引太常卿太常卿前導皇帝入內門取東廊進至寢殿東階之東南西向立定太常卿前奏再拜訖引皇帝升東階當神座前北面再拜訖又當皇后神座前再拜訖入進省服玩拂拭床帳敕所司進太牢之饌加備珍羞陳設若有太子諸王公主陪葬柏城內者並於寢殿東廊下所司致祭功臣陪葬者於東廊下各奠饌布位量定獻官行事太常卿引皇帝出詣酒樽所酌酒進其樽坫陳於堂户外之東南如常儀皇帝入奠酒三爵訖當神座前北面立太祝二人對持玉册於室户外之右東向一太祝東向跪讀祝文訖皇帝再拜又再拜若更薦奠服玩即躬自執陳訖太常卿引皇帝出户當神座前北面立太常卿奏請辭皇帝再拜又再拜訖太常卿引皇帝出中門太常卿前奏請權停其從官及行事官並出大門外奉候其守宫使內侍官引內官帥寢宫內人謁見皇帝出侍衛如常儀還大次少頃若猶宿即乘馬還行宫若更向前陵即於大次便進發皆近侍預奏取進止與仗衛計㑹皇后拜五陵所司預設大次於寢宫之東隨地之宜東向鋪御座如常又設先朝妃嬪次於大次之南守宫設大長公主長公主及諸親婦人命婦等次於妃嬪之南皆東向及拜謁之處皆障以行帷前一日內謁者設中宫御座於寢宫東大次前近東東向又設先朝妃嬪以下位於御位西南各於其次之東皆重行東面以北為上又設司贊位於妃嬪東北東面掌贊二人在南差退皇帝發行宫後皇后乘四望車如常行之式之大次改服假髻白練單衣服內典引各引妃嬪以下就位立訖內侍版奏外辦司言引尚宫尚宫引皇后每尚宫前導皆司言先引出就位尚服負琮寶以從如式立定尚儀前奏再拜退復位皇后再拜司贊曰再拜掌贊承傳諸陪位者皆再拜少頃尚儀又前奏請再拜辭皇后再拜司贊曰再拜掌贊承傳諸陪位者皆再拜尚宫引皇后還大次謁寢宫如常儀皇后初還大次內典引各引陪位者退皇后拜陵訖於寢宫東大次改服鈿叉禮衣若服常服臨時聽進止乘輿詣寢宫尚服負琮寶以從侍衛如常先朝妃嬪大長公主長公主陪從如常式至寢宫北門降輿入大次皇帝既入寢宫尚宫引皇后侍從如常詣寢殿前西階之西東面立其妃嬪公主等陪從位於皇后之西南皆東面北上又設司贊位於妃嬪東北東面掌贊二人在南差退在位者立定尚儀前奏再拜皇后再拜司贊曰再拜掌贊承傳妃嬪以下皆再拜訖尚宫引皇后升自西階入室妃嬪公主等仍立於階下詣先帝神座前北面再拜訖尚宫又引皇后詣先帝皇后神座前北面再拜訖尚宫引皇后進省先后服玩訖引退西廂東面立進食訖皇帝出尚宫引皇后從出降自西階復階下位尚儀奏再拜辭皇后再拜訖司贊曰再拜掌贊承傳諸陪位妃嬪等皆再拜尚宫引皇后之大次更衣妃嬪以下皆更衣皇帝過皇后出寢宫北門乘四望車還行宫侍從如來儀太常卿行諸陵所司預擇吉日行日之朝車府令具軺車駕一馬清道青衣團扇曲蓋繖扇俱詣太常寺門布列以俟守宫預於陵南百步道東設次西向北上右校令具翦除利器以備灑掃太常卿公服乘車奉禮以下公服陪從到次降車停便座奉禮設卿位於兆門外之左西向陵官在卿位東南執事官又於其南俱西面北上設奉禮位於陵官之西西面贊者二人在南少退謁者引太常卿次出就位贊引引諸官以次就位立定奉禮曰再拜贊者承傳在位者俱再拜謁者引太常卿贊引引諸官以次入奉行畢謁者引復位奉禮曰再拜贊者承傳在位者皆再拜謁者引太常卿贊引引諸官各就便座少頃乘車發引次詣諸陵奉行如上儀若應須灑掃及芟剃修理皆即隨事處分大唐開元禮卷四十五
