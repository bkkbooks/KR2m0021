body:
  text: 大唐開元禮卷五十三唐蕭嵩等撰吉禮皇太子釋奠於孔宣父皇太子散齊三日於别殿致齊二日於正殿前致齊一日典設郎設皇太子幄坐於正殿東序及室內俱西向又張帷於前楹下殿若無室張帷為之致齊之日質明諸衛率各勒所部屯門列仗如常晝漏上水一刻左庶子版奏請中嚴近仗就陳于閣外通事舍人引宫臣文武七品以上袴褶陪位如式諸侍衛之官各服其器服諸侍臣並結珮俱詣閣奉迎左庶子版奏外辦上水三刻皇太子服通天冠綘紗袍結珮以出侍衛如常皇太子即位西向坐侍臣夾侍如常一頃刻左庶子前跪奏稱左庶子臣某言請降就齊室俯伏興還侍位皇太子降坐入室文武侍臣各還本司直衛者如常典謁引陪位以次出凡預享之官散齊三日致齊二日散齊皆于正寢致齊一日于本司一日于享所其無本司者皆于享所近侍之官應從升者及從享羣官監官學生等各于本司及學官俱清齊一宿散齊理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊唯享事得行其餘悉斷其享官已齊而闕者通攝行事諸享官致齊之日給酒食及明衣各習禮于齊所太官令取明水火取水于隂鍳取火于陽燧火以供爨水以實尊前享一日諸衛令其屬未後一刻各以其方器服守衛廟門及太樂工人俱清齊一宿陳設前享三日典設郎設皇太子便次于廟東西向又設便次於學堂之後隨地之宜守宫設文武侍臣次各于便次之後文左武右設諸享官次于齊坊之內從享之官于廟東門之外隨地之宜前享二日太樂令設軒懸之樂于廟庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設三鎛鐘於編懸之間各依辰位樹路鼓于北懸之間道之左右植建鼓于三隅置柷敔于懸內柷在左敔在右設歌鐘歌磬於廟堂之上前楹間北向磬簴在西鐘簴在東其匏竹者立於堂下階間重行北向相對為首凡懸皆展而編之諸工人各位於懸後右校掃除內外為瘞塪於院內堂之壬地方深取足容物南出陛前享一日奉禮設皇太子位於東陛東南西向又設望瘞位于廟堂東北當埋坎西向設亞獻終獻位于皇太子東南執事者於其後俱重行西向北上設御史位於廟堂之下西南東向令史陪其後設奉禮位於樂懸東北贊者二人在南差退俱西面又設奉禮贊者位於埋塪東北南面東上設協律郎位于廟楹近西之間東向設太樂令位於北懸之間北向從享群官七品以上位於樂懸之東當執事西向監官學官位於樂懸之西當宫官東向設學生位於宫官監官學官之後俱重行北上設門外位亞獻終獻位于東門之外道南執事位於其後每等異位俱北向西上監官學官位於獻官東南從享宫官位於學官之東俱重行北面以西為上設酒樽位于廟堂之上先聖犧樽二象樽二山罍二在前楹間北向先師犧樽二象樽二山罍二在先聖酒樽之東俱西向尊皆加勺羃有坫以置爵其先師之爵同置于一坫設洗於東階東南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆執樽罍篚羃者各于樽罍篚冪之後設幣篚二各於樽坫之所典設郎設皇太子坐於學堂之上東壁下西向監司設講榻於北壁下南向又設執讀者坐於前楹間當講榻北向守宫設太傅少傅坐於皇太子西北面皆東上若有令䴦事以下坐則設坐于皇太子西南北向東上侍講者坐於執讀西北執如意者一人立于侍講之西三館學官非侍講者坐於侍講之西北面東上若有上臺三品以上觀講者設坐於侍講之北南面東上設論義坐於講榻之前近南北面設脫履席於西階之南東向掌儀設版位宫官七品以上於東階東南西向北上執經侍講等於西階西南監官及學官非侍講者于侍講之後若有上臺三品以上觀講者位於執經之北少退重行皆東面北上學生分位於宫官學官之後皆重行北上設掌儀位於宫官西北贊者二人在南皆西向晡後郊社令帥齊郎以樽坫罍洗篚羃入設於位升堂者自東階謁者引司業詣厨視濯溉凡導引者每曲一逡巡贊引引御史詣厨省饌具司業以下每事訖各還齊所享日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆二取毛血置于饌所遂烹牲其牲用太牢二正坐及先師首坐俎皆升右胖十一體左丘明以下折分餘體升之未明五刻郊社令帥其屬及廟司各服其服升設先聖神坐於堂上西楹間東向設先師神坐於先聖神坐東北南向西上若前堂不容則又于室外之東屋陳而北東向南上席皆以莞設神坐各于坐首出宫前出宫二日本司宣攝內外各供其職守宫設從享宫官次於東宫朝堂如常其日未明所司依鹵簿陳設於重明門外奉禮設從享宫官位於東宫廟堂如常文武宫臣七品以上依時刻俱集於次各服公服諸衛率各勒所部陳設如式左庶子版奏請中嚴典謁引宫官各就位諸侍衛之官各服其器服左庶子負璽如式俱詣閣奉迎僕進軺車於西閣外南向若須乘輦則聼臨時進止內率一人執刀立於車前北向中允一人在侍臣之前贊者二人在中允前左庶子版奏外辦僕奮衣而升正立執轡皇太子著具服逺逰冠乘輿以出左右侍衛如常儀內率執轡皇太子升車僕立授綏左庶子以下夾侍如常儀中允進當車前奏稱請發引俯伏興退復位凡中允奏請皆當車前跪奏稱具官某言訖俯伏興車動中允與贊者夾引以出內率夾車而趨出重明門至侍臣上馬所中允奏稱請車權停令侍臣上馬左庶子前承令退稱令曰諾中允退稱侍臣上馬贊者承傳文武侍臣皆上馬庶子以下夾侍於車前贊者在供奉官人內侍臣上馬畢中允奏稱請令車右升左庶子前承令退稱令曰諾中允退復位內率升訖中允奏請發引退復位皇太子車動太傅乘車訓導少傅乘車訓從出延喜門不鳴鼓吹從享宫臣乘馬陪從如常儀饋享享日未明三刻諸享官各服祭服諸陪祭之官皆公服學生青襟服郊社令良醖令各帥其屬入實樽罍及幣犧尊實以醴齊象樽實以盎齊山罍實以清酒齊皆加明水酒加𤣥酒各實于上尊其幣以白各長一丈八尺太官令帥其屬實諸籩豆簠簋俎等未明二刻奉禮帥贊者先入就位贊引引御史太祝及令史祝史與執樽罍篚羃者入自東門當階間重行北面西上立定奉禮曰再拜贊者承傳凡贊禮有詞贊者皆承傳御史以下皆再拜訖執樽罍篚羃者各就位贊引引御史太祝詣東階升堂行掃除於上令史祝史行掃除於下訖降還齊所奉禮以下次還齊所皇太子將至謁者贊引各引享官及從享學官俱就門外位學生皆就門內位皇太子至孔子廟門外回車南向內內率降立於車左右庶子進當車前跪奏稱左庶子臣某言請降車還侍位皇太子降車乘輿之便次侍衛如常儀郊社令以祝版進皇太子署訖近臣奉出郊社令受各奠於坫未明一刻謁者贊引引從享宫官就門外位奉禮帥贊者先入就位贊引引御史以下入就位太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸南道西其升堂者皆脫履于下降納如常謁者引祭酒入就位立定奉禮曰再拜祭酒再拜訖謁者引祭酒詣東階升堂行掃除於上降行樂懸於下訖引還本位初祭酒行樂懸謁者贊引各引祭官及陪祭之官次入就位皇太子停便次半刻頃率更令立於便次門外當門東向左庶子版奏外辦皇太子出便次侍衛如常儀率更令引皇太子至廟東門中允進笏皇太子執笏近侍者從入如常儀皇太子至版位西向立每立定率更令退立于左率更令前啓再拜退復位皇太子再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜率更令前啓有司謹具請行事退復位協律郎跪俯伏舉麾鼓柷奏永和之樂以姑洗之均自後堂下接神之樂皆奏姑洗文舞之舞樂舞三成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戞敔而止率更令前啓再拜退復位皇太子再拜奉禮曰衆官再拜衆官在位者及學生皆再拜太祝各跪取幣於篚立於樽所率更令引皇太子永和之樂作皇太子每行皆樂作永和之皇太子自東階升左庶子以下及左右侍衛量人從升以下皆如之皇太子升堂進先聖神坐前西向立樂止太祝以幣授左庶子左庶子奉幣北向進皇太子搢笏受幣每受物搢笏奠訖執笏俯伏興登歌作肅和之樂以南吕之均率更令引皇太子少退西向再拜訖率更令引皇太子進先師首坐前北向立又太祝以幣授左庶子左庶子奉幣西向進皇太子受幣率更令引皇太子進北向跪奠於先師坐首俯伏興率更令引皇太子少退北向再拜登歌止率更令引皇太子樂作皇太子降自東階還版位西向立樂止初羣官拜訖祝史各奉毛血之豆立東門外于登歌止祝史奉毛血升自東階太祝迎取於階上進奠於先聖及先師首坐前太祝與祝史退立於樽所初皇太子既升奠幣太官令出帥進饌者奉饌陳於東門之外初皇太子既至位樂止太官令引饌入俎初入門奏雍和之樂自後酌獻皆奏雍和饌至階樂止祝史各進跪徹毛血之豆降自東階以出饌升太祝迎引於階上各設於神坐前籩豆蓋羃先徹乃升簋簠既奠却其蓋于下設訖太官令以下降復位太祝還樽所率更令引皇太子詣罍洗樂作皇太子至罍洗樂止左庶子跪取􅓢興沃水又左庶子跪取盤承水皇太子盥手中允跪取巾於篚興進皇太子盥手訖中允受巾跪奠於篚遂取爵於篚興進皇太子受爵左庶子酌罍水又左庶子奉盤皇太子洗爵中允又授巾如初皇太子拭爵訖左庶子奠盤􅓢中允受巾奠於篚皆如常率更令引太子樂作至先聖酒樽所執樽者舉羃左庶子贊酌酒齊訖樂作率更令引皇太子進先聖神坐前西向跪奠爵俯伏興率更令引皇太子少退西向立樂止太祝持版進於神坐之右北面跪讀祝文曰維某年歲次月朔日子皇太子敢昭告於先聖孔宣父惟夫子固夭攸縱誕降生知經緯禮樂闡揚文教餘烈遺風千載是仰俾兹末學依仁遊藝謹以制幣犧齊粢盛庶品祗奉舊章式陳明薦以先師顔子等配尚饗訖興皇太子再拜初讀祝文訖樂作太祝進跪奠版于神坐興還樽所皇太子拜訖樂止率更令引至先師酒樽所執樽者舉羃左庶子取爵於坫進皇太子受爵左庶子贊酌醴齊樂作率更令引進先師首坐前北向跪奠爵俯伏興皇太子少退北向立樂止皇太子既奠首坐爵餘坐皆齊郎助奠相次而畢其亞獻終獻齊郎助奠亦如之太祝持版進於先師神坐之左西面跪讀祝文曰維某年歲次月朔日子皇太子某敢昭告於先師顔子等七十二賢爰以仲春仲秋率遵故典敬修釋奠於先聖孔宣父惟子等或服膺聖教德冠四科或先闡儒風貽範千載謹以制幣犧齊粢盛庶品式陳明獻從祀配神尚饗訖興皇太子再拜初讀祝文訖樂作太祝進跪奠版於神坐興還樽所皇太子拜訖樂止率更令引皇太子詣東序西向立樂作太祝各以爵酌上樽福酒合置一爵一太祝持爵授左庶子奉爵北向進皇太子再拜受爵跪祭酒啐酒奠爵興太祝各帥齊郎進俎太祝跪減先聖及先師首坐前三牲胙肉皆取前腳第二骨加於俎又以籩取稷黍飯興以胙肉各共置一俎上又以飯共置一籩太祝授左庶子左庶子奉飯北向進皇太子受以授左右太祝以俎授左庶子左庶子以次奉進皇太子每受以授左右訖皇太子跪取爵遂飲卒爵左庶子進受爵以授太祝復於坫皇太子俯伏興再拜樂止率更令引皇太子樂作皇太子降自東階還版位西向立樂止文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戞敔樂止初皇太子將復位謁者引國子祭酒詣罍洗盥手洗爵訖謁者引祭酒升自東階詣先聖酒樽所執樽者舉羃祭酒酌盎齊訖武舞作謁者引祭酒進先聖神坐前西向跪奠爵興謁者引祭酒少退西向再拜謁者引祭酒詣先師酒樽所取爵於坫執樽者舉羃祭酒酌盎齊謁者引祭酒進先師首坐前北向跪奠爵興謁者引祭酒少退北向再拜訖謁者引祭酒詣東序西向立太祝各以爵酌罍福酒合置一爵一太祝持爵進祭酒之左北向立祭酒再拜受爵跪祭酒遂飲卒爵太祝進受爵復于坫祭酒興再拜謁者引祭酒降復位初祭酒獻將畢謁者引司業詣罍洗盥洗訖升酌盎齊終獻如亞獻之儀訖謁者引司業降復位武舞止太祝等各進跪徹豆興還樽所徹者籩豆各一少移于故處奉禮曰賜胙贊者唱衆官再拜衆官在位者及學生皆再拜已飲福者不拜永和之樂作率更令前啓再拜退復位皇太子再拜奉禮曰衆官再拜衆官在位者及學生皆再拜樂一成止率更令前啓請就望瘞位率更令引皇太子就瘞位西向立奉禮率贊者轉就瘞塪東北位初在位者將拜太祝各執篚進神坐前跪以篚取幣降自西階詣瘞塪以幣置於坎訖奉禮曰可瘞塪東西廂各四人置土半塪率更令前啓禮畢率更令引皇太子還便次樂作皇太子出門樂止中允進受笏侍衛如常儀謁者贊引各引亞獻以下以次出初白禮畢奉禮帥贊者還本位贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜訖贊引引出學生以次出其祝版燔於齊坊講學皇太子既入便次改服常服執經侍講執讀執如意及三館學官並公服學生青襟服餘皆常服掌儀帥贊者先入就位謁者各引羣官及學生等次入就位左庶子版奏外辦皇太子乘輿出便次若須乘馬臨時聽進止侍衛如常儀至學堂後降輿升自北階即座坐左右侍衛量人從升太傅少傅亦就座坐掌儀曰再拜贊者承傳群官及學生等在位者皆再拜執經不拜左庶子跪奏請令執經等升俯伏興又左庶子稱令曰諾左庶子退降詣西階下立於執經等之前北面宣令曰執經以下並升坐應坐者並再拜執經不拜通事舍人引執經以下升各就座坐其升坐者脫履如式訖執讀讀所講經執經釋義訖執如意者以如意授侍講侍講興受進詣論議坐北面問所疑執經者為通之訖興退以如意授執者退還本坐執如意者以如意次授諸侍講者皆如上儀總訖左庶子跪奏禮畢羣官皆起通事舍人各引就堂下位皇太子降坐降自北階入學堂後便次羣官以次出執經以下改服常服學生仍青襟服還宫皇太子既入便次左庶子版奏請解嚴將士不得輒離本位皇太子改服公服停次一刻頃捶一鼓為一嚴有司轉仗衛於還塗如來儀二刻頃又捶二鼓為再嚴左庶子版奏請中嚴國子祭酒以下學生以上並出就學外道左奉辭三刻頃又捶三鼓為三嚴僕進軺車于學門外如常左庶子版奏外辦皇太子乘輿出便次至學門外降輿乘車侍衛如常左庶子奏請及車右升降侍臣上馬文武陪從皆如來儀車動鼓吹振作如式至國子祭酒以下奉辭處車權停國子祭酒以下皆再拜通事舍人承令宣勞及拜皆如常車至城隅鼓吹止過廟鼓吹作至延喜門鼓吹止入延喜門鼓吹作至重明門宫官文武俱下馬皇太子乘車入太傅少傅還皇太子至殿前回車南向左庶子跪奏請降車乘輿入侍臣從至閣左庶子版奏請解嚴將士還本所大唐開元禮卷五十三
