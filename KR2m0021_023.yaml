body:
  text: 大唐開元禮卷二十三唐蕭嵩等撰吉禮臘日蠟百神於南郊有司攝事齊戒陳設奠玉帛進熟齊戒凡預祀之官散齊三日致齊二日散齊皆於正寢致齊一日於本司一日於祀所其無本司者皆於祀所凡散齊理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊惟祀事得行其餘悉斷其祀官已齊而闕者通攝行事光祿卿監取明水火太官令取水於隂鑒取火於陽燧其火以供爨水以注之酒尊前蠟一日諸衛令其屬未後一刻各以其方器服守衛壝門與太樂工人俱清齊一宿陳設前蠟三日衛尉設祀官公卿以下次於東壝之外道南北西向上陳設饌幔於內壝東門西門之外道東西向東方南方之饌陳於東門外西南方及西方之饌陳於西門外北方之饌陳於北門外前蠟二日太樂令設宫懸之樂於壇南內壝之外東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於北懸之間各依辰位樹雷鼓於北懸之內道之左右植建鼓於西隅置柷敔於懸內柷在左敔在右設歌鐘歌磬於壇上近南北向磬簴在西鐘簴在東其匏竹者立於壇下重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上右校掃除壇之內外郊社令積柴於燎壇其壇於神壇之左內壝之外方八尺高一丈開上南出戶方三尺右校又為瘞坎於壇之壬地內壝之外方深取足容物南出陛前蠟二日奉禮設祀官公卿位於內壝東門之外道南西向分獻之官於公卿之南執事者陪其後每等異位俱重行西面以北為上設望燎位當柴壇之北南向設御史位於壇上一位於東南隅西向一位於西南隅東向令史各陪其後於壇下設奉禮位於樂懸東北贊者二人在南差退俱西向又設奉禮贊者位於燎壇東北西面北上設協律郎位於壇上北陛之西東向設太樂令位于北懸之間當壇北向設祀官公卿以下門外位皆於東壝之外道南每等異位重行北面以西為上設日月酒樽之位大明太樽二著樽二山罍一在壇上東南隅北向夜明太樽二著樽二山罍一在壇上於西南隅北向神農氏伊耆氏各著樽二於其壇上五星五官后稷各象樽二七宿田畯龍麟朱鳥騶虞𤣥武等各壺樽二鱗羽裸毛介等散樽二俱設於神座之左而右向五方嶽鎮海瀆俱山樽二山川林澤俱蜃樽二丘陵墳衍原隰井泉水墉坊郵表畷於菟猫等俱散樽二各設於神座之右而左向伊耆氏以上之尊置於坫星以下尊俱藉以席皆加勺羃設爵於尊下設洗於壇南北向罍水在洗東篚在洗西南肆篚實以巾爵設方獻罍洗篚羃各於其方陛道之左右俱內向執樽罍篚羃者各於樽罍篚羃之後各設玉幣之篚於壇之上下樽坫之所晡後謁者引光祿卿詣厨視濯溉又謁者引諸祀官詣厨省饌具訖俱還齊所蠟日未明十五刻大官令帥宰人以鸞刀割牲祝以豆取毛血置於饌所遂烹牲日青牲一月白牲一其餘方各少牢一未明五刻太史令郊社令升設日月神座於壇上大明於北方少東夜明於大明之西俱南向席皆以藁秸神農氏伊耆氏神座各於其壇上俱內向設后稷氏神座於壇東西向設五官田畯之坐各於其方設五星十二次二十八宿五嶽四鎮四海四瀆五方山川林澤丘陵墳衍原隰井泉神座各於其方之壇其五方神獸鱗羽裸毛介水墉坊郵表畷於菟猫等之座各於其方壇之後俱內向相對為首自神農伊耆以下凡一百八十七座其席皆以莞設神位各於坐首奠玉帛蠟日未明三刻諸祀官各服其服郊社令良醖令各率其屬入實樽罍玉幣凡尊之次太尊為上實以醴齊著尊次之實以盎齊神農伊耆之著尊實以盎齊五星三辰五官后稷之象尊實以醍齊七宿田畯之壺尊俱實以沈齊五方嶽鎮海瀆之山尊實以醍齊山川林澤之蜃尊實以沈齊丘陵以下之散尊實以清酒𤣥酒各實於諸㘴上尊禮神之玉大明夜明俱以圭璧大明之幣以青夜明之幣以白神農氏之幣以赤伊耆氏之幣以𤣥五星以下之幣各從其方色太官令帥進饌者實諸邊豆簠簋各設於內壝之外饌幔內未明二刻奉禮率贊者先入就位贊引引御史博士諸太祝及令史祝史與執樽罍篚羃者入自東門當壇南重行北面西上凡引導者每曲一逡巡立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽者升自東陛立於樽所壇下執樽罍篚羃者各就位贊引引御史博士諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖引就位未明一刻太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸南道西謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行掃除於上降行樂懸於下訖引還本位初司空入謁者引祀官贊引引執事者俱就壝外位司空行掃除訖謁者贊引各引祀官次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆俯伏而取以興奠物則奠訖俯伏而後興鼓柷樂作無射夷則奏永和蕤賔姑洗太簇奏順和黃鍾奏豫和凡六均均一成俱以文舞之舞偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戞敔而後止奉禮曰衆官再拜在位衆官皆再拜上下諸太祝俱取玉幣於篚各立於樽所謁者引太尉詣南陛升壇北向立太祝加玉於幣東向授太尉太尉受玉幣登歌作肅和之樂乃以大吕之均謁者引太尉進北面跪奠於大明神坐興謁者引大尉少退北向再拜謁者引太尉詣夜明神坐前北向立太祝奉玉幣東向授太尉太尉受玉幣謁者引太尉跪奠玉幣於夜明神坐興謁者引太尉少退北向再拜訖登歌止謁者引太尉降自南陛還本位初壇上奠玉帛訖伊耆氏以下諸太祝各奉其幣進奠於神坐還樽所初衆官拜訖祝史各奉毛血入各由南陛升諸太祝迎取於壇上俱進奠於神坐前諸太祝與祝史退立於樽所進熟太尉既升奠玉幣太官令出帥進饌者奉饌各陳於內壝門外謁者引司徒出詣饌所司徒奉大明之俎諸太祝既奠毛血太官令引饌入俎初入門雍和之樂作以黃鍾之均自後酌獻皆奏雍和之樂饌至陛樂止祝史俱升徹毛血之豆降自東陛以出饌升諸太祝迎引於壇上各設於神坐前籩豆蓋羃先徹乃升簠簋既奠却其蓋於下設訖謁者引司徒太官令帥進饌者降自東陛以出諸太祝各還樽所又進設神農氏以下之饌相次而畢初壇上設饌訖謁者引太尉升自南陛詣大明酒樽所執樽者舉羃太尉酌醴齊訖樂作謁者引太尉進大明神坐前北向跪奠爵興謁者引太尉少退北向立樂止太祝持版進神坐之左西向跪讀祝文曰維某年歲次月朔日子嗣天子臣某謹遣具位臣姓名敢昭告於大明惟神晷耀千里精烜萬物覺寤黎蒸化成品彚今璇璣齊運玉燭和平六府孔修百禮斯洽謹以玉帛犧齊粢盛庶品致其燔燎尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版於神坐還樽所太尉拜訖樂止謁者引太尉詣夜明酒樽所取匏爵於坫執樽者舉羃太尉酌醴齊訖樂作謁者引太尉進詣夜明神坐前北向跪奠爵興謁者引太尉少退北向立樂止太祝持版進神坐之右東面跪讀祝文曰維某年歲次月朔日子嗣天子臣某謹遣具位臣姓名敢昭告於夜明惟神貞此光華恆茲盈减表斯寒暑節以運行對時育物登成是賴豐年之報式備恆禮謹以制幣犧齊粢盛庶品致其燔燎尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版於神坐前還樽所太尉再拜訖樂止謁者引太尉少東當兩坐間北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒啐酒奠爵興太祝各帥齊郎進俎太祝减神前胙肉於俎以胙肉共置一俎上太祝持俎西向授太尉太尉受以授齊郎太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止初太尉獻將畢謁者引太常卿詣罍洗盥手洗匏爵謁者引太常卿自東陛升壇詣大明酒樽所執樽者舉羃太常卿酌盎齊武舞作謁者引太常卿進大明神坐前北向跪奠爵興謁者引太常卿少退再拜謁者引太常卿詣夜明酒樽所取匏爵於坫執樽者舉幂太常卿酌盎齊謁者引太常卿進詣夜明神坐前北向跪奠爵興謁者引太常卿少退再拜謁者引太常卿少東當兩坐間北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太常卿之右西向立太常卿再拜跪祭酒遂飲卒爵太祝進受爵復於坫太常卿興再拜謁者引太常卿降復位初太常卿獻將畢謁者引光祿卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖初亞獻升壇謁者二人引獻官詣罍洗盥手洗爵酌酒一獻帝伊耆氏一獻神農氏奠爵神坐前向神立太祝持版進神坐之右跪讀祝文訖興獻官再拜訖謁者引降本位初伊耆氏獻官將升謁者五人各引獻官以次詣罍洗盥手洗爵詣酒樽所酌酒一獻歲星一獻熒惑一獻鎮星一獻太白一獻辰星各奠於神坐少退向神立於獻官奠訖三辰七宿皆祝史助奠相次俱畢太祝各持版進於神坐之右跪讀祝文訖興凡讀祝文每一畨獻酒從東方祝文為始讀訖次南方次西方次北方餘神亦同獻官再拜訖諸太祝各進奠版於神坐還樽所謁者遂引五星等獻官各詣罍洗盥手洗爵各詣酒樽所酌酒一獻東嶽一獻南嶽一獻中嶽一獻西嶽一獻北嶽俱奠於神坐少退向神立嶽鎮海瀆山川林澤丘陵墳衍原隰井泉皆祝史助奠相次俱畢太祝持版進神坐之右跪讀祝文訖興獻官再拜訖太祝奠版於神坐還樽所謁者各引獻官還本位初嶽鎮奠酒贊引五人各引獻官詣罍洗盥洗各詣酒樽所酌酒一獻勾芒氏一獻祝融氏一獻后土氏一獻蓐收氏一獻𤣥冥氏后稷田畯等各祝史助奠訖祝史持版進神坐之右跪讀祝文訖興餘與東方同惟無后稷獻官再拜訖祝史奠版於神坐贊引遂引五官獻官等詣罍洗盥洗詣酒樽所酌酒分獻五靈其鱗羽螺毛介猫於菟坊水墉昆蟲等皆齊郎助奠相次俱畢祝史持版跪讀祝文訖興獻官拜訖奠版各引還本位武舞六成樂止舞獻俱畢上下諸祝各進徹豆還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜樂作一成止謁者進太尉之左白請就望燎位謁者引太尉就望燎位南向立於衆官將拜上下諸祝各執篚進神坐前取玉帛祝版齊郎以俎載牲醴稷黍飯爵酒各由其陛降壇經懸內當柴壇南東行自南陛登壇以玉幣祝版饌物置於柴上户內諸祝以星辰七宿以上之禮幣皆從燎神農氏伊耆氏嶽鎮以下之祝俱詣瘞坎以玉幣饌物置於坎訖奉禮曰可燎東西面各六人以炬燎初唱可燎瘞坎東西廂各四人置土火半柴謁者進太尉之左白禮畢遂引太尉出又贊引各引祀官以次出贊引引御史以下各復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出其神農氏以下祝版燔於齊所大明夜明祝版御署伊耆以下獻官署帝伊耆氏祝文曰維某年歲次月朔日子嗣開元神武皇帝某謹遣具位臣姓名敢昭告於帝伊耆氏惟帝體仁尚義崇本念功爰創嘉祀息農饗物今九土攸宜百榖豐稔備茲八蠟大旅四方謹以制幣犧齊粢盛庶品明薦於帝尚饗帝神農氏祝文曰維某年歲次月朔日子嗣開元神武皇帝某謹遣具位臣姓名敢昭告於帝神農氏惟帝肇興播植粒此黎元今時和歲稔神功是賴謹以制幣犧齊粢盛庶品明薦於帝尚饗東方嵗星祝文曰維某年歲次月朔日子嗣天子某謹遣具位臣姓名敢昭告於東方歲星七宿惟神列位垂象叶贊穹蒼昭晰羣生阜蕃庶類今時和歲稔恆禮是率謹陳嘉薦庶神饗之南方中央西方北方並准此東方嶽鎮海瀆祝文曰維某年歲次月朔日子嗣天子某謹遣具位臣姓名敢昭告於東方嶽鎮海瀆惟神宣導坤儀興降雲雨亭育庶品實賴滋液年榖順成用通大蠟謹薦嘉祀溥被一方山林川澤丘陵墳衍原隰井泉庶神咸饗南方西方北方並准此勾芒氏祝文曰維某年歲次月朔日子嗣開元神武皇帝某謹遣具位臣姓名敢昭告於勾芒氏惟神贊陽出滯發生品物萌者畢達仁德以宣用陳明薦神其臨饗后稷氏祝文曰維某年歲次月朔日子嗣開元神武皇帝某謹遣具位臣姓名敢昭告於后稷氏惟神誕降嘉種播茲百榖蒸庶以粒乂此萬邦爰及田畯實勸農穡謹薦明祀庶神饗之祝融氏祝文曰維某年歲次月朔日子嗣開元神武皇帝某謹遣具位臣姓名敢昭告於祝融氏惟神典司火正淳曜昭明式贊南訛厥功以致豐年之薦庶神臨饗后土氏祝文曰維某年歲次月朔日子嗣開元神武皇帝某謹遣具位臣姓名敢昭告於后土氏惟神式贊黃道典司土正居中執信是興稼穡年穀既登庶饗嘉薦蓐收氏祝文曰維某年歲次月朔日子嗣開元神武皇帝某謹遣具位臣姓名敢昭告於蓐收氏惟神典司金正式贊西成執矩懷莊尚義趨力豐年之報饗兹嘉祀𤣥冥氏祝文曰維某年歲次月朔日子嗣開元神武皇帝某謹遣具位臣姓名敢昭告於𤣥冥氏惟神典司水正贊序幽都厥務安寧積藏斯至豐年之祀庶饗明薦蒼龍祝文曰維某年歲次月朔日子嗣天子某謹遣具位臣姓名敢昭告於蒼龍之神惟神體備幽明質兼小大實為鱗長贊時造物歲稔年豐實資弭患式陳嘉薦百靈是屬爰集東方鱗羽裸毛介衆族猫於菟坊水墉昆蟲諸神庶幾咸饗其朱鳥騶虞𤣥武祝文首尾並與此同麟祝文發首亦皆同此朱鳥之神惟神肇自火精冠茲羽族輔時宣化效仁蹈禮年和歲稔有賴厥功麟之神惟神體信為質惟和是歸作長毛宗表靈玉牒年穀豐稔實資宣助式陳嘉薦庶神臨饗騶虞之神惟神體信至仁稟靈金宿贊育生類實參利物爰茲報功用率恆祀𤣥武之神惟神誕禀辰精長茲介族先知稱貴誠行攸底伊此豐年有慿宜慶大唐開元禮卷二十三
