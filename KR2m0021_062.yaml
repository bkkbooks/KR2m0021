body:
  text: 大唐開元禮卷六十二唐蕭嵩等撰吉禮皇帝巡狩鑾駕出宫燔柴告至鑾駕還宫望秩山川肆覲東后考制度鑾駕出宫將巡狩所司承制先頒告於東方諸州曰皇帝二月東巡狩各修平乃守考乃職事敢不敬戒國有大刑駕將發告圜丘宗廟社稷皆如上儀皇帝出宫備大駕鹵簿皆如常儀軷於國門祭所過山川如親征之禮所經州縣刺史縣令先待於境通事舍人承制問百年古先帝王名臣烈士皆州縣致祭燔柴告至將告將作預於太山下修圜壇四出陛若見有封禪祀天壇即不須别築前告三日尚舍直長施大次於外壝東門之內道北南向尚舍奉御鋪御坐守宫設文武侍臣次於大次之後文官在左武官在右俱南向又設告官次於東壝之外道南從官文官九品以上於告官之東東方諸州刺史縣令應朝者於文官之東東方南方蕃客又於其東俱重行每等異位北向西上酅公介公於西壝之外道南武官九品以上於介公之西西方北方蕃客又於其西俱重行每等異位北向東上其褒聖侯於文官三品之下若有諸州使人分方於武官之後設陳饌幔於內壝東門之外道南北向前二日太樂令設宫懸之樂於壇南設登歌之樂於壇上並如常儀右校掃除壇之內外郊社令積柴於燎壇其壇於樂懸之南外壝之內方一丈髙一丈二尺開上南出户方六尺前一日皇帝清齋於行宫預告之官皆於告所清齋一日近侍之官應從升者及從告羣官諸方客使皆於其所俱清齋一宿諸衛令其屬晡後一刻各以其方器服守衛壝門與太樂工人俱清齋一宿奉禮設御位於壇之東南西向設告官司徒位於內壝東門之內道南執事者位於其後俱西面北上設御史位於壇下一位於東南西向一位於西南東向令史各陪其後設奉禮位於樂懸東北贊者二人在南差退俱西向設協律郎位於壇上南陛之西東向設太樂令位於北懸之間望燎壇之北設從祀之官位文官九品以上於執事之南東方諸州刺史縣令又於其南東方蕃客又於其南俱每等異位重行西面北上酅公介公於內壝西門之內道南武官九品以上於酅公介公之後當文官西方北方蕃客於武官之南俱每等異位重行東面北上其褒聖侯位於文官三品之下若有諸州使人分位於文武官之後設告官以下門外位於東西壝門之外道南皆如設次之式郊社令率府史一人及齋郎以樽坫罍洗篚羃入設於位並如常儀執樽罍篚冪者各位於樽罍篚羃之後告日未明十五刻太官令帥宰人令烹牲於厨蒼牲一騂牲一未明四刻太史令郊社令各服其服升設昊天上帝神坐於壇上北方南向席以藳秸設髙祖神堯皇帝神坐於東方西向席以莞設神坐各於座首未明三刻諸告官各服其服郊社令良醖令各帥其屬入實樽罍及玉天帝太尊二配帝著尊二俱以泛齊其明水各實於上尊玉以蒼璧幣長一丈八尺太祝以玉帛置於篚太官令帥進饌者奉饌實諸籩豆簠簋等皆設饌幔內未明二刻奉禮率贊者先入就位贊引引御史太祝以下行掃除如常儀訖各就位皇帝服衮冕乘輅發行宫奏請進發內外器服皆如常儀駕將至謁者贊引各引告官通事舍人引從告羣官東方刺史縣令諸方客使俱就門外位駕至大次門外回輅南向千牛將軍立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次郊社令以祝版進署如常協律郎與太樂令帥工人次入就位其升堂者皆脫履於下降納如常謁者贊引各引告官通事舍人引從告群官刺史縣令及諸方客使次入就位皇帝停大次半刻頃太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝出次華蓋侍衛如常儀侍中負璽陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士前引至內壝門外殿中監進鎮圭華蓋仗衛停於門外侍者從入如常皇帝至版位西向立每立定太常卿與博士退立於左太常卿前奏稱請再拜退復位皇帝再拜贊者承傳凡奉禮有詞贊者皆承傳衆官在位者皆再拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏豫和之樂乃以圜鐘為宫黃鐘為角太蔟為徴姑洗為羽樂舞六成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止太樂卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太祝取玊於篚立於樽所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣壇升自南陛近侍者從升如常儀皇帝升壇北向立樂止太祝以玉授侍中侍中奉玊東向進皇帝搢鎮圭凡受物則搢鎮圭奠訖執圭俯伏興受玉登歌作肅和之樂以大吕之均太常卿引皇帝北向跪奠於昊天上帝神坐俯伏興太常卿引皇帝少退北向再拜訖太常卿又引皇帝立於東方西向配座太祝以幣授侍中侍中奉幣北向進皇帝受幣太常卿引皇帝進東面跪奠於髙祖神堯皇帝神坐俯伏興太常卿引皇帝少退東向再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止初皇帝既升奠玉太官令出帥進饌者奉饌陳於內壝東門之外謁者引司徒出詣饌所司徒奉天帝之俎初皇帝既至位樂止太官令引饌入俎初入門奏雍和之樂以黃鐘之均自後接神之樂皆奏黃鐘饌至陛樂止天帝之饌升自南陛配帝之饌升自東陛諸太祝迎引於壇上各設於神坐前籩豆蓋羃徹之如式設訖謁者引司徒以下降自東陛復位諸太祝各還樽所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取􅓢興沃水又侍中跪取盤興承水皇帝盥手黃門侍郎跪取巾於篚興進皇帝帨手訖受巾跪奠於篚遂取匏爵於篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黃門侍郎授巾皆如初皇帝拭爵訖侍中奠盤􅓢黃門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝詣壇升自南陛樂止謁者引司徒升自東陛立於樽所齋郎奉俎從升立於司徒之後太常卿引皇帝詣天帝酒樽所執樽者舉冪侍中贊酌泛齊訖夀和之樂作皇帝每酌獻飲福皆作夀和之樂太常卿引皇帝進天帝神坐前北面跪奠爵俯伏興太常卿引皇帝少退北向立樂止太祝持版進於神坐之右東面跪讀祝文祝文臨時撰訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神坐還樽所皇帝拜訖樂止太常卿引皇帝詣配帝酒樽所執樽者舉冪侍中取爵於坫皇帝受爵侍中贊酌泛齊訖樂作太常卿引皇帝進髙祖神堯皇帝神坐前東向跪奠爵俯伏興太常卿引皇帝少退東向立樂止太祝持版進於神坐之右北面跪讀祝文訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神坐還樽所皇帝拜訖樂止太常卿引皇帝進天帝神坐前北向立樂作太祝各以爵酌罍福酒合置一爵一太祝持爵授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俯伏興諸太祝各帥齋郎進俎太祝減神前胙肉皆取前腳第二骨興以胙肉共置一俎上授司徒司徒奉俎西向進皇帝受以授左右皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫皇帝俯伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛西向立樂止謁者引司徒降復位太祝各進徹豆還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜豫和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝就望燎位南向立樂止羣官將拜諸太祝各以篚進神坐前取玉幣祝版齋郎以俎載牲體黍稷飯各由其陛降壇南行經柴壇西過壇東行自南陛登紫壇以玉幣饌物等置於柴上户內奉禮曰可燎東西面各六人以炬燎火半柴太常卿前奏禮畢太常卿引皇帝還次樂作皇帝出內壝門殿中監前受鎮圭華蓋侍衛如常儀皇帝入次樂止謁者贊引各引告官通事舍人引從告羣官諸方客使以次出贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引工人以次出鑾駕還行宫皇帝既還大次侍中版奏請解嚴將士不得輒離部伍皇帝改服通天冠綘紗袍乘輅奏請還宫如常儀望秩於山川柴之明日望秩祀於嶽鎮海瀆山林川澤丘陵墳衍原隰將祭所司預為壇於祭所其神皆以尊卑為序重行南向前三日守宫設祭官以下次於東壝之外道南北向以西為上設陳饌幔於內壝東門之外道北南向前二日太樂令設宫懸之樂於壇南設登歌於壇上如常儀右校掃除壇之內外又為瘞坎於壇北之壬地外壝之內方深取足容物前一日諸祭官清齋於祭所諸衛令其屬晡後一刻各以其方器服守衛壝門與太樂工人俱清齋一宿奉禮設祭官位於內壝東門之內道北執事位於道南俱西向北上設御史位於壇下一位於東南西向一位於西南東向令史各陪其後設奉禮位於樂懸東北贊者二人在南差退俱西向設協律郎位於壇上南陛之西東向設太樂令位於北懸之間設望瘞位於瘞塪之東西向設祭官以下門外位於外壝東門之外道南每等異位北向西上設酒樽之位嶽鎮海瀆各山樽二山林川澤俱蜃樽二丘陵墳衍原隰俱散樽二各於壇上南陛之東北向西上其嶽壇上加山罍二置於山樽東北向皆加勺羃設玊篚於樽坫之所設洗於壇南陛東南如常儀執樽罍篚羃者各立於樽罍篚羃之後郊社令帥齋郎以樽坫罍洗篚羃入設於位祭日未明十五刻太官令帥宰人以鸞刀割牲齋郎以豆取毛血置於饌所遂烹牲未明二刻太史令郊社令各服其服入設神坐各於壇上北方南向席皆以莞設神位各於座首未明一刻祭官以下各服其服郊社令良醖令入實樽罍及玉山樽實以醍齊蜃樽實以沈齊散樽及山罍皆實以清酒齊加明水酒加玄酒各實於上尊祭主之玉以兩圭有邸太祝以幣置於篚太官令帥進饌者實籩豆簠簋等奉禮帥贊者先入就位贊引引御史太祝與執樽罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽罍篚羃者各就位贊引引御史詣壇東陛升行掃除於上令史祝史行掃除於下訖引就位質明謁者引獻官贊引引執事者俱就東門外位太樂令帥工人次入就位謁者贊引各引獻官以下入就位立定奉禮曰再拜在位者皆再拜謁者進獻官之左白有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏順和之樂以蕤賔之均自後堂下之樂皆奏姑洗樂舞三成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戞敔而後止奉禮曰再拜獻官以下皆再拜太祝取玉於篚立於樽所謁者引獻官詣嶽壇升自南陛北向太祝以玉幣東面授獻官登歌作肅和之樂以函鐘之均謁者引獻官進北面跪奠於嶽神坐俯伏興謁者引退北向再拜訖登歌止謁者引獻官降自南陛還本位初獻官升陛奠玉幣太官令出帥進饌者奉饌陳於東門外於登歌止太官令引饌入俎初入門雍和之樂作饌至陛樂止饌升南陛太祝迎引於壇上設於嶽神坐前籩豆蓋羃徹之如式設訖太官令以下降自東陛以出太祝還樽所其鎮海以下之饌皆祝史迎於壇上設於神坐前相次而畢訖謁者引獻官詣罍洗盥手洗爵謁者引升自南陛詣酒樽所執樽者舉羃獻官酌醴齊訖樂作謁者引詣嶽神坐前北面跪奠爵興謁者引獻官少退北靣立樂止初獻官進奠爵太祝各以爵酌酒助奠鎮海以下還樽所太祝持版進於神坐之右東面跪讀祝文祝文臨時撰訖興獻官再拜初讀祝文訖樂作太祝進奠版於神坐還樽所獻官拜訖樂止太祝酌罍福酒進獻官之右西向立獻官再拜受爵跪祭酒啐酒奠爵興太祝帥齋郎進俎太祝減神前三牲胙肉皆取前腳第二骨加於俎西向授獻官受以授齋郎獻官跪取爵遂飲卒爵太祝受爵復於坫獻官興再拜謁者引獻官降復位諸祝各進徹豆如常訖還樽所奉禮曰賜胙贊者唱再拜在位者皆再拜獻官不拜順和之樂作奉禮又曰再拜獻官以下皆再拜樂作一成止謁者進獻官之左白請就望瘞位贊者引獻官就望瘞位西向立於衆官將拜諸太祝各執篚進神坐跪取玉幣齋郎以俎載毛血等各由其陛降壇詣瘞坎以物置於坎訖奉禮曰可瘞塪東西各四人置土半坎謁者進獻官之左白禮畢遂引出贊引引執事者以次出又贊引引御史太祝以下俱復執事位奉禮曰再拜御史以下皆再拜訖出贊引引工人以次出其祝版燔於齋所肆覲東后望秩之明日肆覲東后於告至之前刺史縣令皆先奉見如常將作預於行宫之南為壝宫方三百步面一門為壇於壝內三分壝二在南壇方九尺六丈髙九尺出陛四南面兩陛餘三面各一陛前二日太樂令設宫懸之樂於壇南如殿庭之儀前一日尚舍鋪御坐於壇上近北南向又設解劍席於南陛之西守宫於門外量設百官次文東武西以北為上東方刺史縣令次於文官之南蕃客次於武官之南所司陳輦輅於壇南如常典儀設羣官版位文官一品以下九品以上位於壇東南每等異位重行西向以北為上武官一品以下九品以上位於壇西南當文官每等異位重行東面以北為上東方刺史縣令於壇南三分庭一在南每等異位重行北面以西為上若有蕃客則位於刺史之西每國異位重行北面以東為上設典儀位於南陛之東贊者二人在南差退俱西面北上奉禮設門外位文官一品以下九品以上位於門東每等異位重行西面武官一品以下九品以上位於門西每等異位重行東面俱以北為上設東方刺史縣令位於文官之南每等異位重行西面以北為上蕃客位於武官之南每等異位重行東面以北為上其日未明三刻諸衛各以其方器服量設牙旗於壝外四面未明一刻諸衛各勒所部列黃麾大仗及鈒戟陳於壝內如殿庭之儀羣官及刺史以下各集就次服其朝服蕃客集次各服其國服侍中版奏請中嚴近伏陳於行宫門外侍衛之官各服其器服符寶郎奉寶俱詣行宫門外奉迎典儀帥贊者先入就位吏部兵部主客戶部贊羣官客使俱出次通事舍人各引就門外位刺史縣令俱執贄通事舍人引就門外位贄各以其土所有錦綺繒布葛越之屬俱五兩為一束而執之仍飾以黃帊其餘常土貢之物並盛以篚其屬執之列於縣令位後通事舍人引文官武官一品以下九品以上先入就位侍中版奏外辦皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應協律郎舉麾工鼓柷奏太和之樂凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止皇帝服衮冕乘輿以出曲直華蓋警蹕侍衛如常儀皇帝入自北壝門由北陛升壇即御坐南向坐符寶郎奉寶置於御坐樂止腰輿退羽儀華蓋仍侍於御側通事舍人引東方刺史入就位鴻臚引蕃客次入就位初刺史入壝門懸下舉麾舒和之樂作至位立定樂止典儀曰再拜贊者承傳執贄者跪奠贄興在位者皆再拜訖跪取贄興凡拜奠贄皆興侍中前承制降詣刺史東北西面立稱有制蕃客則舍人承旨詣前宣敕刺史以下皆再拜宣制訖又再拜户部引諸州貢物兩行各入於刺史位前東西陳之龜為前列金次之丹漆絲纊四海九州之美物重行陳於後訖陳物者各退立於東西廂文武前側立通事舍人引刺史為首者一人執贄詣解劍席跪解劍脫舄執贄興舍人接引升壇詣御坐前北面跪奏稱具官臣姓名等敢獻壤奠遂奠贄俯伏興又舍人跪舉以東授所司舍人引刺史降詣解劒席跪佩劍納舄興通事舍人引復北面位初為首者奠贄通事舍人引在庭者以次奠贄於位前訖俯伏興引退復位訖刺史以下俱再拜户部尚書進詣陛間北面跪奏稱户部尚書臣某言諸州貢物請付所司俯伏興侍郎前承詔退稱制曰可尚書退復位所司受贄其執貢物人各進執物所司引退俱出東門初刺史將朝中書侍郎以諸州鎮表文别於一案俟於西門外給事中以祥瑞案俟於東門外俱令史絳公服對舉案侍郎給事中俱就侍臣班初刺史將入門中書侍郎降引表案入詣西階下東面立給事中降引祥瑞案入詣東階下西面立刺史將升奠中書令黃門侍郎俱降立於階下刺史執贄升階中書令黃門侍郎各取所奏之文以次升初度支尚書奏退復位訖中書令前跪奏諸方表訖黃門侍郎又前跪奏祥瑞各還侍位侍郎與給事中引案退典儀曰再拜贊者承傳文武羣官刺史以下諸州客使俱再拜訖通事舍人以次引北面位者出就門外位侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞𬎼賔之鐘左右鐘皆應太和之樂作皇帝乘輿降自北陛警蹕侍衛如來儀入行宫樂止通事舍人引東西面位者以次出設會如正會之儀考制度朝覲之明日左右丞相以考制度事奏聞命太常卿採詩陳之以觀百姓之風俗命市納賈以觀百姓之好惡命典禮者考時月定日同律禮樂制度衣服正之山川神祇有不舉者為不敬宗廟有不順者為不孝不孝不敬者則長官黜以爵革制度衣服者為叛叛者長官有討有功德於百姓者加爵賞五月南巡狩至於南嶽如東巡狩之禮八月西巡狩至於西嶽如南巡狩之禮十有一月北巡狩至於北嶽如西巡狩之禮歸格於祖禰用特如别禮若登封告禪如别儀大唐開元禮卷六十二
