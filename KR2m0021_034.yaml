body:
  text: 大唐開元禮卷三十四唐蕭嵩等撰吉禮仲春仲秋上戊祭太社有司攝事蜡禮同齋戒陳設薦玉帛進熟齋戒前祭五日諸預祭之官散齋三日致齋二日散齋皆於正寢致齋一日於本司一日於祭所其無本司者皆於祭所散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祭事得行其餘悉斷其祭官已齋而闕者通攝行事諸祭官致齋之日給酒食及眀衣各習禮於齋所光禄卿監取明水火太官令取水于隂鑒取火于陽燧火以供爨水以實尊前祭一日諸衛令其屬未後一刻各以其方器服守衛社宫門每門二人每隅一人與太樂工人俱清齋一宿陳設前祭三日守宫設祭官公卿以下次於齋坊之内前祭二日太樂令設大懸之樂於壇北東方西方磬簴起南鐘􅒶次之南方北方磬簴起東鐘􅒶次之設十二鎛鐘於編懸之間各依辰位樹靈鼔於南懸之内道之左右植建鼔於四隅置柷敔於懸内祝在左敔在右設歌鐘歌磬各於壇上近北南向皆磬簴在東鐘簴在西其匏竹者各立於壇下重行南向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以南為上南方北方以西為上右校清掃内外又為埋坎於樂懸之北方深取足容物北出陛前祭一日奉禮設祭官公卿位於西門之内道北執事位於其後少北每等異位俱重行東面南上設御史位於太社壇東北西向一位於太社壇西北東向令史各陪其後設奉禮位於樂懸西北賛者二人在北差退俱東面設協律郎位各於壇上之東北隅俱西面設太樂令位於南懸之間設祭官公卿以下門外位道南每等異位重行北向以東為上設酒樽之位太社太尊二著樽二山罍一在壇上西北隅南向后土氏象樽二著樽二山罍一在太社酒樽之西俱南向東上尊皆加勺羃有坫以置酒設太稷后稷酒樽於其壇上如太社后土之儀設洗於太社壇北陛西北南向罍水在洗西篚在洗東北肆篚實以巾爵又設洗於稷壇西北亦如之執樽罍篚羃者各位於樽罍篚羃之後各設玉帛之篚扵樽坫之所晡後郊社令帥齋郎以樽坫洗篚羃入設於位升壇者各自西陛謁者引光禄卿詣厨視濯溉凡導引者每曲一逡廵賛引引御史詣厨省饌具司宰以下每事訖還齋所祭日未明十五刻太官令率宰人以鸞刀割牲齋郎以豆取毛血置於饌所遂烹牲三牲用黝色未明五刻大史令郊社令各服其服升設太社太稷神座各於壇上近南北向設后土氏神座於太社神座之左后稷氏神座於太稷神座之左俱東向席以莞設神位各於座首奠玉帛祭日未明三刻諸祭官各服其服郊社令良醖令各帥其屬入實樽罍玉幣太尊為上實以醴齊著樽次之實以盎齊山罍為下實以清酒配坐之尊亦如之齊加明水酒加𤣥酒各實於上尊祭神之玉太社太稷俱以雨珪有邸帛以𤣥太官令帥進饌者實諸籩豆簠簋皆設於神厨未明二刻奉禮帥賛者先入就位賛引引御史諸太祝與執樽罍篚羃者入自西門當太社壇北重行南面東上立定奉禮曰再拜賛者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽罍篚羃者各就位賛引引御史諸太祝詣太社壇西陛升行掃除於上令史祝史行掃除於下降又詣太稷壇行掃除如太社之儀訖引就位未明一刻謁者賛引各引祭官俱就門外位太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸北道東其升壇者皆脱履於下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇西陛升行掃除於上升稷壇亦如之降行樂懸於下訖引復位謁者賛引各引祭官次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位恊律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼔柷奏順和之樂以函鍾之均自後壇下之樂皆奏太蔟作文舞之舞樂舞八成偃麾戛敔樂止凡樂皆協律郎舉麾工鼔柷而後作偃麾戛敔而後止也奉禮曰衆官再拜衆官在位者皆再拜諸太祝取玉幣於篚各立於樽所謁者引太尉詣太社壇升自北陛南向立太祝以玉幣西向授太尉太尉受玉幣登歌作肅和之樂以應鐘之均謁者引太尉進南向跪奠於太祖神座俛伏興謁者引太尉少退南向再拜訖太祝以幣授太尉太尉受幣東向跪奠於后土氏神座前謁者引太尉少退東向再拜訖登歌止謁者引太尉降自北陛詣太稷壇升奠玉幣如太社后土之儀謁者引太尉降還本位初衆官拜訖祝史各奉毛血之豆立於門外於登歌止祝史奉毛血入各由其陛升諸太祝迎取於壇上俱進奠於神座前諸太祝與祝史退立於樽所進熟太尉既升奠玉帛太官令出帥進饌者奉饌陳於西門神座還樽所太尉拜訖樂止謁者引太尉詣后土氏酒樽所取爵於坫執樽者舉羃太尉酌醴齊樂作謁者引太尉進后土氏神座前西向跪奠爵興謁者引太尉少退西向立樂止太祝持版進於神座之左南面跪讀祝文曰維某年嵗次月朔日子嗣開元神武皇帝某謹遣太尉封名敢昭告於后土氏爰兹仲春仲秋厥日惟戊敬修恒事薦於太社惟神功著水土平易九州昭配之義實惟通典謹以犧齊粢盛庶品式陳明薦作主侑神尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版於神座還樽所太尉拜訖樂止謁者引太尉進太社神座前南向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右東向立太尉再拜受爵跪祭酒啐酒奠爵興太祝帥齋郎進俎太祝減太社前三牲胙肉皆取前脚第二骨各置一俎上太祝持俎以次授太尉太尉每受以授齋郎太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉再拜謁者引太尉降自北陛詣罍洗盥手洗爵謁者引太尉詣太稷壇升自北陛詣太稷酒樽所執樽者舉羃大尉酌醴齊訖樂作謁者引太尉進太稷神坐前南向跪奠爵興謁者引太尉少退南向立樂止太祝持版進於神座之右西向跪讀祝文曰維某年嵗次月朔日子嗣天子某謹遣太尉封名敢昭告於太稷惟神播生百穀首茲八政用而不匱功濟萌黎敬以玉帛犧齊粢盛庶品祗奉舊章備修瘞禮以后稷契配神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版於神座還樽所太尉拜訖樂止謁者引太尉詣后稷氏酒樽所取爵於坫執樽者舉羃太尉酌醴齊訖樂作謁者引太尉進后稷氏神座前西向跪奠爵興謁者引太尉少退西向立樂止太祝持版進於神座之左南面跪讀祝文曰維某年嵗次月朔日子嗣天子某謹遣太尉封名敢昭告於后稷氏爰以仲春仲秋式揀吉辰敬修恒禮薦於太稷惟神功叶稼穡闡修農政允茲從祀用率舊章謹以犧齊粢盛庶品式陳明薦作主配神尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版於神座還樽所太尉拜訖樂止謁者引太尉進太稷神座前南向立飲福受胙如太社之儀訖謁者引太尉降還本位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止太尉將復位謁者引太常卿詣罍洗盥手洗爵訖謁者引太常卿自西陛升壇詣太社酒樽所執樽者舉羃太常卿酌盎齊武舞作謁者引太常卿進太社神座前南向跪奠爵興謁者引太常卿少退南向再拜訖謁者引太常卿詣后土氏酒樽所取爵於坫執樽者舉羃太常卿酌盎齊訖謁者引太常卿進后土氏神座前西向跪奠爵興謁者引太常卿少退西向再拜訖謁者引太常卿進太社神座近北南向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太常卿之右東向立太常卿再拜受爵祭酒遂飲卒爵太祝進受爵復於坫太常卿興再拜謁者引太常卿降自西陛詣罍洗盥手洗爵詣太禝壇升獻如太社之儀訖謁者引太常卿降復位初太常卿獻后土將畢謁者引光禄卿盥洗升酌盎齊終獻如亞獻之儀訖謁者引光禄卿降復位武舞止諸太祝各進徹豆還樽所徹者籩豆各一少移於故處奉禮曰賜胙賛者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜順和之樂作奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之右白請就望瘞位謁者引太尉就望瘞位南向立於衆官將拜太祝執篚進神座前取玉幣齋郎以俎載牲體稷黍飯酒爵各由其陛降壇南行當瘞埳西行諸太祝以玉幣饌物置於埳訖奉禮曰可瘞埳東西各以四人寘土半埳謁者進太尉之左白禮畢遂引太尉出謁者贊引各引祭官以次出賛引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出工人二舞以次出其祝版燔於齋坊季冬蜡太社皆如春秋時祭之儀太社祝文曰維某年嵗次月朔日子嗣天子某謹遣太尉封名敢昭告於太社惟神降祐百榖時登謹以玉幣犧齊粢盛庶品敬薦於太社以后土勾龍氏配神作主尚饗后土氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝某謹遣太尉封名敢昭告於后土氏今時和年登敬薦蜡祀於太社惟神功恊水土作主配神謹以犧齊粢盛庶品薦於后土氏尚饗太稷祝文曰維某年嵗次月朔日子嗣天子某謹遣大尉封名敢昭告於太稷惟神主兹百榖粒此黎元謹率恒禮敬以玉幣犧齊粢盛庶品明薦於太稷以后稷弃配神作主尚饗后稷氏祝文曰維某年嵗次月朔日子嗣開元神武皇帝某謹遣太尉封名敢昭告於后稷氏今時和年登敬薦蜡祀於太稷惟神功恊稼穡作主配神謹以犧齊粢盛庶品敬薦於后稷氏尚饗大唐開元禮卷三十四
