body:
  text: 大唐開元禮卷九十二唐蕭嵩等撰嘉禮皇帝加元服下謁太廟㑹羣臣羣臣上禮謁太廟將謁太廟有司卜日如别儀前一日皇帝清齊於太極殿太尉以下清齊於廟所近侍之官應從入廟者各於本司清齊一宿諸衛令其屬晡後一刻各以其方器服守衛廟門與太樂工人俱清齊一宿前三日尚舍直長設大次於太廟南門之外道西東向尚舍奉御鋪御坐守宫設文武侍臣次於大次之後文官在左武官在右俱東向設太尉以下次於齊坊之內設三師次於侍臣次之東西向前二日太樂令設宫懸之樂於廟庭東方西方磬􅒶起北鐘􅒶次之南方北方磬􅒶起西鐘􅒶次之設十二鎛鐘於編懸之間各依辰位樹路鼓於北懸之內道之左右植建鼓於四隅置柷敔於懸內柷在左敔在右設歌鐘歌磬於廟堂之上前楹之間北向磬􅒶在西鐘􅒶在東其匏竹者立於階間重行北向相對為首凡懸皆展而編之諸工人各於懸後東方西方以北為上南方北方以西為上右校清掃內外前一日奉禮設御位於樂懸之南道西北向設太尉以下及御史等位於內外並如常儀設酒樽之位於廟堂上前楹間各於室户之左北向每室雞彛一鳥彛一犧樽二山罍二皆加勺羃皆西上各有坫焉以置瓉爵設洗於東階東南北向罍水在洗東篚在洗西南肆篚實以圭瓉巾爵也執樽罍篚羃者各位於樽罍篚羃之後太廟令整拂神幄又帥府史齊郎以樽坫罍洗篚羃入設於位其日未明十五刻太官令帥宰人以鸞刀割牲於厨謁日未明三刻太尉以下各服其服太官令良醖令各帥其屬實樽罍雞彛犧樽之上樽皆實以明水山罍之上樽實以𤣥酒鳥彛實以鬱鬯犧樽實以醴齊山罍實以清酒太官令帥進饌者實諸籩豆簠簋等未明二刻奉禮帥贊者先入就位贊引引御史以下入行掃除如常儀訖各就位未明一刻贊引引太廟令太祝宫闈令入自東門當階間重行北面以西為上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳太廟令以下皆再拜升自東階入開塪室奉出獻祖以下神主各置於坐如常儀訖各就位質明謁者引太尉以下俱就門外位太樂令帥工人次就位其升堂者皆脫屨于階下降納如常謁者引太尉以下贊引引執事者次入就位立定奉禮曰再拜太尉以下皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位協律郎跪俯伏舉麾興凡取物者皆跪俯伏而取以興奠物則奠訖跪俯伏而興鼓柷奏永和之樂乃以黃鐘為宫大吕為角太蔟為徵應鐘為羽樂九成黃鐘三奏大吕太蔟應鐘各再奏偃麾戛敔樂止凡樂皆協律舉麾工鼓柷而後作偃麾戛敔而後止奉禮曰再拜衆官在位者皆再拜謁者引太尉詣罍洗太尉盥手洗瓉升自阼階詣獻祖尊彛所執樽者舉羃太尉酌鬱鬯訖登歌作肅和之樂乃以圜鐘之均自後登歌皆歌圜鐘詣者引太尉入詣獻祖坐前北向跪以鬯祼地奠之俯伏興謁者引出户北向再拜訖謁者引太尉詣懿祖樽彛所執樽者舉羃太尉取瓉於坫醴鬱鬯謁者引太尉入詣懿祖神坐前北面跪以鬯祼地奠之如常儀俯伏興謁者引太尉出户北向再拜謁者引太尉次祼太祖次祼代祖次祼髙祖次祼太宗次祼髙宗次祼中宗次祼睿宗皆如上儀訖登歌止謁者引太尉降復位初太尉既升祼太官令帥進饌者奉饌陳於東門之外謁者引司徒出詣饌所司徒奉獻祖之俎初太尉既至位太官令引饌入自正門爼初入門雍和之樂作自後酌獻皆作雍和以無射之均自後接神之樂堂下皆奏無射饌至階樂止饌升諸太祝迎引於階上各設於神坐前籩豆蓋羃徹之如式設訖謁者引司徒以下降復位諸祝各還樽所謁者引太尉詣罍洗盥手洗爵訖升自阼階詣獻祖酒樽所執樽者舉羃太尉酌醴齊訖樂作謁者引太尉入詣獻祖神坐前北面跪奠爵俯伏興出户北向立樂止太祝持版進於室户外之右東向跪讀祝文曰維某年歲次月朔日子孝曽孫皇帝某太祖以下稱臣某謹遣太尉封臣名敢昭告於獻祖宣皇帝祖妣某氏敬遵恆典禮加元服以今吉辰祗見謹以一元大武明粢薌合薌萁嘉蔬嘉薦醴齊尚饗訖興太尉再拜初讀祝文訖樂作太祝進跪奠版於神坐俯伏興還樽所太尉拜訖樂止謁者引太尉以次獻皆如獻祖之儀唯不盥洗遍獻訖謁者引太尉詣東序西向立諸祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之左北向太尉再拜受爵跪祭酒啐酒奠爵興諸祝各帥齊郎進俎减神前胙肉加於俎上又以籩取稷黍飯興以胙肉共置一爼以飯共置一籩先以飯授太尉太尉受以授齊郎又以胙肉授太尉太尉受以授齊郎太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉興再拜訖謁者引太尉降復位贊引引御史太祝及執樽罍篚羃者俱就執事位重行西面立以俟皇帝既謁廟出門太祝等升復位訖登歌作雍和之樂諸祝各進入室徹豆還樽所徹者籩豆各一少移於故處登歌止奉禮曰賜胙贊者唱再拜在位者皆再拜太尉不拜樂作奉禮又曰再拜在位者皆再拜樂一成止謁者進太尉之左白禮畢遂引太尉出贊引引執事者以次出贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人以次出其祝版燔於齊坊太尉令太祝宫闈令納神主如常儀親謁前出宫三日本司宣攝內外各共其職前一日守宫設羣臣五品以上次於東西朝堂如常謁日晝漏上水三刻鑾駕出宫發引前七刻捶一鼓為一嚴三嚴時節前一日左相奏裁發引前五刻捶二鼓為再嚴侍中版奏請中嚴奉禮設羣官五品以上位於東西朝堂如常文武官五品以上俱集朝堂就次各服其服所司依圖陳小駕鹵簿發引前二刻捶三鼓為三嚴諸衛之屬各督其隊與鈒㦸以次入陳於殿庭謁者引文武羣官各就位諸侍衛之官各服其器服侍中中書令以下俱詣閣奉迎侍中奉寶如式乘黃令進金輅於西閣外南向千牛將軍一人執長刀立於輅前北向黃門侍郎一人在侍臣之前贊者二人又在黃門侍郎之前侍中版奏外辦太僕令奮衣而升正立執轡皇帝服衮乘輿以出警蹕侍衛如常儀千牛將軍前執轡皇帝升輅太僕卿立授綏侍中中書令以下夾侍如常黃門侍郎進當鑾駕前跪奏稱黃門侍郎臣某言請鑾駕引發俯伏興退復位凡黃門侍郎奏請皆進鑾駕前跪奏稱具官臣某言訖俯伏興鑾駕動又稱警蹕黃門侍郎與贊者夾引以出千牛將軍夾路而趨駕出承天門至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黃麾內符寶郎奉六寶與殿中監後從侍中中書令以下夾侍於路前贊者在供奉官人內侍臣上馬畢黃門侍郎奏稱請敕車右升侍中前承制退稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕鼓傳音如常不鳴鼓吹不得喧譁駕過通事舍人引文武羣官不從者退就次以俟謁廟駕至大次回輅東向千牛將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降路乘輿之大次繖扇華蓋侍衛如常儀通事舍人引三師各就便坐各服其服出立於大次門外太常博士引太常卿立於大次門外當門西向侍中版奏外辦皇帝出次華蓋侍衛如常儀侍中負寶陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引也至廟門外殿中監進鎮圭皇帝執鎮圭華蓋仗衛停於門外三師迎侍者從入如常皇帝初入太和之樂作至版位北向立樂止太常卿與博士退立於左太常卿前奏稱請再拜皇帝再拜少頃太常卿又奏稱請再拜皇帝又再拜訖太常博士引太常卿太常卿引皇帝出還大次初行樂作出門樂止皇帝出門殿中監前受鎮圭華蓋侍衛如常儀皇帝還大次侍中版奏請解嚴將士不得輒離部伍皇帝停大次一刻頃捶一鼓為一嚴轉仗衛於還塗如來儀三刻頃捶二鼓為再嚴將士布隊仗侍中版奏請中嚴皇帝改著通天冠絳紗袍五刻頃捶三鼓為三嚴文武侍臣詣大次奉迎乘黃令進金輅於大次門外東向千牛將軍立於輅右侍中版奏外辦太僕卿升執轡皇帝乘輿出次警蹕侍衛如常儀皇帝升輅太僕卿立授綏黃門侍郎奏稱請鑾駕發引俯伏興退復位鑾駕動警蹕如常儀黃門侍郎贊引夾引千牛將軍夾輅而趨至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬畢黃門侍郎奏稱請敕車右升侍中承前制退稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引俯伏興退復位鼓傳音鑾駕動鼓吹振作而還文武群官導從如來儀駕將至通事舍人引文武群官進就位以近駕為上駕至侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立於輅右侍臣下馬訖鑾駕動千牛將軍夾輅而趨駕至橫街北當東上閣回路南向侍中進當鑾駕前跪奏稱侍中臣某言請降路俯伏興還侍位皇帝降輅乘輿以入侍臣從至閣初皇帝入承天門舍人承㫖敕羣官還皇帝既入閣侍中版奏請解嚴叩鉦將士各還本所㑹羣臣皇帝見廟之明日㑹羣臣如元㑹之儀其上壽詞云具官臣某言伏惟皇帝陛下吉辰元服禮偹樂和臣等不勝大慶謹上千萬嵗壽羣臣上禮前一日守宫量設次於東朝堂如常儀其日應上禮之官依時刻各集於次服朝服奉禮先設上禮之官位於東朝堂之前近南文東武西重行北面相對為首又設中書舍人位於吏部官之北南向設奉禮位於文官東北贊者二人在南差退俱西向通事舍人引應上禮之官就位立定令史二人對舉表案禮部郎中引就中書舍人前取表授舍人訖引案退奉禮唱再拜贊者承傳在位者皆再拜中書舍人奉表入進通事舍人引在位者退大唐開元禮卷九十二
