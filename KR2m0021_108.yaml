body:
  text: 大唐開元禮卷一百八唐蕭嵩等撰嘉禮臨軒册命諸王大臣朝堂册命諸大臣册內命婦二品以上臨軒册命諸王大臣將册命前一日尚舍奉御設御幄於太極殿北壁南向守宫設羣官次于朝堂太樂令展宫懸於殿庭又設舉麾位於上下並如常儀其日典儀設羣官版位文官一品以下五品以上於懸東六品以下于大橫街之南俱西面武官一品以下五品以上於懸西六品以下于大橫街之南俱東面皆以北為上並如常儀設受册者位于大橫街之南道東重行北面西上設典儀位于懸之東北贊者二人在南少退俱西向奉禮設門外位文官於東朝堂西面武官于西朝堂東面俱每等異位重行北上臨軒册命其日依時刻諸衛勒所部屯門列仗及陳於殿庭如常儀受册者服朝服從第備鹵簿與羣官俱集朝堂次羣官各服其服贊引引羣官俱出次典謁引就朝堂前位侍中版奏請中嚴鈒戟近仗入陳於殿庭太樂令帥工人入就位協律郎入就舉麾位諸侍衛之官各服其器服符寶郎奉寶俱詣閣奉迎典儀帥贊者先入就位通事舍人引羣官入就位又引受册者入立於太極門外道東西向中書侍郎以册置于案令史二人俱絳公服對舉案立於左延明門內道北西面侍郎立於案後侍中版奏外辦皇帝服通天冠絳紗袍乘輿出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應協律郎跪俯伏舉麾鼓柷奏太和之樂凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止皇帝出自西房即御坐南向坐符寶郎奉寶置于御坐如常儀樂止通事舍人引受册者以次入就位立定典儀曰再拜贊者承傳羣官在位者皆再拜中書令降立於受册者東北西面中書侍郎引册案進立於中書令之南少退俱西面通事舍人引為首者一人少前北面中書侍郎取册進授中書令退復位中書令稱有制受册者再拜中書令讀册訖受册者又再拜通事舍人引受册者進受册訖典謁引退復位又通事舍人引次受册者前受册如上儀遍册訖中書令以下還侍位持案者以案退典儀曰皆拜贊者承傳羣官在位者皆再拜通事舍人引受册者以次出侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞㽔賔之鐘左五鐘皆應鼓柷奏太和之樂皇帝降坐御輿入自東房侍衛警蹕如來儀侍臣從至閣樂止通事舍人引羣官在位者以次出若册三師三公親王則皇帝服衮冕之服鼓吹令設十二案乘黃令陳車輅尚輦奉御陳輿輦諸衛設黃麾半仗受册者初入門舒和之樂作至位樂止册畢引出初行樂作出門樂止餘同上儀三師三公親王開府儀同三司太子三師驃騎大將軍左右丞相京兆牧河南牧右並臨軒册命朝堂册命諸臣前一日守宫設受册者次于東朝堂其日平明受册者朝服升輅發第備鹵簿詣朝堂至降車所降輅謁者絳公服引就次奉禮設受册者版位于東朝堂前近南北向又設舍人宣册位于其北南向將册舍人引受册者就版位立舍人公服預以册書置于案令史二人絳公服對舉案又舍人引中書舍人持節者前導持案者次之出詣宣册位立持節者立于舍人之東少南西面持案者立于舍人西南東面持節者脫節衣持案者進舍人前舍人取册持案者退復位舍人稱有制受册者再拜宣册訖又再拜又舍人引受册者進舍人前北面受册退復位持節者加節衣典謁引舍人幡節前導而入謁者引受册者退受册者升輅還第如來儀太子少師太子少傅太子太保特進輔國大將軍光祿大夫鎮國大將軍侍中中書令諸衛大將軍六尚書太子詹事太常卿都督及上州刺史在京者右並朝堂册命册內命婦二品以上前一日守宫設使者及册案便次於肅章門及永安門外皆道右東向司設設受册者位于其寢庭近南當階間北向其日典儀設册使位于肅章門外之西東向北上舉册案者位在南差退俱東向內謁者監預置案于肅章門外近限使者公服發朝堂乘輅偹鹵簿鼓吹持節如式其册以油絡網犢車載而行至永安門外降輅謁者引入其册下置於案即隨使而入掌次者俱引入次受册者花叉翟衣司言引就受册位侍從如常謁者引册使入就位持節者立於使者之北少退持册案者立於使副西南俱東面持節者脫節衣持册案者以案進使副前使副取册於案持案者退復位使副以册進授使者退復位內給事進使者前西面受册進立於肅章門外跪置册於案俯伏興退司言詣閣跪取册興進立於受册者之北南面稱有制受册者再拜宣册訖受册者又再拜受册者進受册以退初册入閣少頃謁者引使者出就永安門外次更衣乘馬各還其第鹵簿幡節等俱還本司大唐開元禮卷一百八
