body:
  text: 大唐開元禮卷一百十三唐蕭嵩等撰嘉禮皇太子元正冬至受宫臣朝賀皇太子與師傅保相見皇太子受朝集使叅辭皇太子正至受宫臣朝賀前二日本司宣攝内外各供其職前一日典設郎設皇太子幄坐於正殿東序西向衛尉設宫臣次於重明門外伶官帥展軒懸之樂於殿庭以姑洗之均設麾於殿上西階之西又設為首者解劔席於懸西横街之南並如常儀典儀設宫臣版位於懸南文東武西俱重行北靣相對為首設典儀位於東階東南贊者二人在南差退俱西向北上設宫臣門外位文官道東武官道西重行相向以北為上受朝其日未明三刻開諸宫殿門諸衛率各勒所部屯門列仗如常宫臣依時刻集重明門外皆就次各服其器服左庻子奏請中嚴近仗就陳於門外伶官帥工人入就位又伶官一人升就位諸侍衛之官各服其器服俱詣閣奉迎典儀帥賛者先入就位通事舎人引宫臣俱就門外位又舎人引六品以下先入就位左庻子版奏外辦皇太子服逺遊冠綘紗袍以出左右侍衛如常儀皇太子將出仗動伶官帥跪俛伏舉麾鼔柷奏永和之樂皇太子升自阼階即坐西向坐偃麾戛敔樂止凡樂皆伶官帥舉麾工鼓柷而後作偃麾戛敔而後止通事舎人引宫臣五品以上次入就位宫臣初入門奏舒和之樂至位樂止宫臣立定典儀曰再拜賛者承傳宫臣在位者皆再拜訖通事舎人引為首者一人詣西階為首者初行樂作至解劔席後樂止為首者就席跪解劍置於席俛伏興通事舎人引升階進當皇太子坐前東靣跪賀稱元正首祚景福惟新伏惟皇太子殿下與時同休冬至云天正長至伏惟殿下與時同休俛伏興通事舍人引降詣席後為首者跪著劍俛伏興樂作復懸南位樂止宫臣俱再拜左庶子前承令降詣諸宫臣西北東面稱令㫖宫臣俱再拜宣令訖宫臣又再拜左庶子還侍位典儀曰再拜賛者承傳宫臣在位者皆再拜通事舍人以次引出還次為首者初行樂作出門樂止左庶子跪奏稱左庶子臣某言禮畢俛伏興還侍位皇太子興樂作皇太子降坐以入侍衛如来儀侍臣従至閤樂止㑹伶官設登歌於殿上以南吕之均典設郎鋪設宫臣牀座於皇太子幄坐西南重行北向武官於皇太子幄坐西北重行南向俱以東為上設不升殿者坐席於西廊下設解劍席於懸西横街之南俱以北為上典膳郎設夀樽於殿上西序之端東向有坫加爵一於樽下又設升殿者酒尊於西廊下近北設廊下者酒尊各於其坐之南皆有坫羃障以帷施設訖通事舎人引宫臣出次俱就門外位左庶子奏外辦皇太子逺遊冠絳紗袍以出侍衞如常皇太子將出仗動樂作皇太子升自阼階即坐西向坐樂止典儀一人升就東階上西靣立通事舎人引文武宫臣以次入就位宫臣以次入就位宫臣初入門樂作為首者至位樂止宫臣立定若朝㑹别日設㑹賛拜如朝禮左庻子前承令降命宫官升坐在位者皆再拜通事舎人引應升殿者詣西階為首者初行樂作至解劍席樂止宫臣各脫舄履跪解劍置於席上俛伏興通事舍人引升階宫臣為首者一人升立於階西東向以下各就坐後立其位於廊下者又通事舎人引就坐後上下立定典膳郎進詣階間北靣跪奏稱典膳郎臣某言請賜宫臣上夀俛伏興左庻子稱令曰諾典膳郎退升詣酒尊所東南立通事舎人引為首者詣尊所北靣立典膳郎酌酒一爵授為首者搢笏受爵通事舎人引為首者詣皇太子坐前東靣授左庻子左庶子受爵進置皇太子前為首者執笏通事舎人引為首者退東靣跪稱某官臣某等稽首言元正首祚冬至云天正長至臣等不勝大慶謹上千萬嵗夀俛伏興再拜宫臣上下皆再拜立於席後左庻子前承令少退宣令訖宫臣上下又再拜左庻子取爵奉進皇太子舉酒奏休和之樂宫臣上下皆舞蹈三稱萬嵗皇太子舉酒訖左庻子進受虚爵以授典膳郎典膳郎受爵復於坫樂止初左庶子受虛爵殿上典儀唱再拜階下賛者承傳宫臣上下皆再拜通事舍人引為首者就坐後立殿上典儀唱就坐階下賛者承傳宫臣上下俱就坐俛伏坐伶官帥引歌者及琴瑟至階下脫履於下升就位坐又引笙歌進詣階間北靣立典膳郎進酒至階殿上典儀唱酒至興階下賛者承傳宫臣上下皆俛伏起立席後左庻子到階省酒典膳郎奉酒進皇太子舉酒食官令又行宫臣酒酒至殿上典儀唱再拜階下賛者承傳宫臣上下皆再拜搢笏受觶殿上典儀唱就坐階下賛者承傳宫臣上下皆就坐俛伏坐飲皇太子初舉酒登歌作昭和之樂三終典膳郎進受虚觶復於坫登歌訖降復位觴行三周典膳郎進食升階殿上典儀唱食至興階下賛者承傳宫臣上下皆執笏俛伏起立席後典膳品嘗食訖以次進置皇太子前食官令又行宫臣案設食訖殿上典儀唱就坐階下賛者承傳宫臣上下皆就坐俛伏坐皇太子乃飯奏休和之樂宫臣上下俱飯食畢樂止仍行酒遂設庶羞伶官帥引諸伎以次入作若賜酒左庻子前承令詣東階上西靣稱賜酒殿上典儀承傳階下賛者又承傳宫臣上下皆執笏俛伏起再拜搢笏立受觶就坐俛伏坐飲訖俛伏起立授虚觶執笏又再拜就坐俛伏坐酒行九遍㑹畢殿上典儀唱可起階下賛者承傳宫臣上下皆俛伏起立席後通事舍人引宫臣降詣解劍席後跪著劍俛伏興納舄履樂作復懸南位樂止㑹於東西廊下者仍立於席後立定典儀曰再拜賛者承傳宫臣在位者皆再拜廊下者拜於席後諸伎俱作通事舎人引宫臣以次出為首者初行樂作出門樂止左庻子前跪奏稱左庻子臣某言禮畢俛伏興還侍位皇太子興奏休和之樂皇太子降坐以入侍衛如來儀侍臣從至門樂止皇太子與師傅保相見前一日衛尉設師傅保次於宫門外道西南向伶官帥展懸軒於殿庭以姑洗之均其日質明諸衛率各勒所部屯門列仗典謁設師傅保位於西階之西東向三少位於傅保之南少退東向北上太師太保太傅及三少至宫門通事舍人引就次左庻子奏請中嚴伶官帥工人入就位又通事舎人引師傅保及三少立於正殿門西差退俱東向左庻子奏外辦諸侍衛之官各服其器服俱詣閤奉迎皇太子著從省服以出左右侍衛如常儀休和之樂作至東階下西靣立樂止通事舎人引師傅保及三少入就位樂作止如常師傅保立定皇太子再拜師傅保答再拜若三少特見則三少先拜通事舎人引師傅保出樂作止如常師傅保出門左庻子前跪奏稱左庻子臣某言禮畢皇太子入左右侍衛及樂奏如來儀皇太子受朝集使叅辭前一日典設郎設皇太子幄坐於東宫正殿東序西向又設宫臣次及朝集使次於重明門外其日質明所司設宫臣朝集使位於殿庭諸衞帥各勒所部屯門列仗東宫文武官依時刻集朝堂就次服袴褶朝集使並就次服公服左庻子量時刻版奏請中嚴近仗就陳於閤外侍衛之官各服其器服就閤奉迎通事舎人各分引羣官及朝集使就門外位左庻子版奏外辦皇太子常服即坐西向坐通事舎人引宫臣次入就位掌儀曰再拜賛者承傳在位者皆再拜又通事舎人分引朝集使横行北向立定掌儀曰再拜朝集使皆再拜通事舎人承令詣朝集使前稱有令朝集使皆再拜宣令訖又再拜舎人引宫臣以次出其辭禮亦如之大唐開元禮卷一百十三
