body:
  text: 大唐開元禮卷八十六唐蕭嵩等撰軍禮皇帝射於射宫皇帝觀射於射宫皇帝射於射宫前一日太樂令設宫懸之樂鼓吹令設十二案於射殿之庭以當月之調登歌各以其合東懸在東階東西面西懸在西階西東面南北二懸各登歌廣開中央廣開中央羣射位張熊侯去殿九十步設乏於侯西十步北十步乏侯邊避矢物以革為之髙廣七尺先有垜為之則不須更設設五楅庭前少西楅長七尺博三寸厚一寸半龍首蛇身所以委矢布侍射者位於西階前東西北上布司馬位於侍射位之南東面布獲者位於乏東東面布侍射射位於殿階下當御前少西橫布南靣侍射者弓矢俟於西門外陳賞物於東階下少東置罰豐於西階下少西豐者所以承罰爵形似豆大而卑設罰尊於西階西南北以堂深設篚於尊西南肆實爵加羃其日質明御服武辨出樂作警蹕及文武侍衛皆如常儀文武官俱公服典樂作及會並如元會之儀酒三遍侍中奏稱有司既具請射又侍中前承制退稱制曰可王公以下皆降文官立於東階下西面北上武官立西階下於射位之後東面北上持鈒戟隊羣立於兩邊千牛備身二人橫奉御弓及矢立於東階上西面執弓者在北設坫於執弓者之前又置御決拾笥于其上決今之射沓拾今之射垾獲者持旌自乏南行當侯東行至侯負侯北靣立負侯謂背侯向內立令衆射者見侯與旌垜有志于中侍射者出西門外取弓矢兩手奉弓搢乘矢于帶搢插乘矢四矢入立于殿下射位西東靣司馬奉弓自西階升當西楹前南靣揮弓命獲者去侯獲者以旌去侯西行十步北行至乏止司馬降自西階復位千牛郎將一人奉決拾以笥千牛將軍奉弓又千牛郎將奉矢進立于御榻東少南西面郎將跪奠笥於御榻前少東遂拂以巾取決興贊設決訖千牛郎將又跪取拾興贊設拾訖以笥退奠于坫上復位千牛將軍北靣張弓以袂順左右隈上再下一弓左右隈謂弓上靣下靣以衣袂摩拭上靣再下靣一度西靣左執弣右執簫以進御訖退立于御榻東少後千牛郎將以巾拂矢進十一供御皇帝欲射協律郎舉麾先奏鼓吹兩奏樂騶虞五節御乃射第一矢與第六節相應第二矢與第七節相應以至九節協律郎偃麾樂止千牛將軍以矢行奏中曰獲下日留上日揚左日左方右日右方留謂矢短不及侯揚謂矢過侯左右謂矢偏不正御射訖千牛將軍于御坐東西靣受弓退付千牛于東階上千牛郎將以笥受決拾退奠于坫上復位侍射者進升射席北靣立左旋東靣張弓南靣挾矢協律郎舉麾乃作樂不作鼓吹奉樂貍首三節然後發矢若侍射者多則齊發第一發與第四節相應第二發與第五節相應以至七節協律郎偃麾樂止弓右旋東面弛弓北靣立乃退復西階下位其射人多少臨時聽進止若九品以上俱蒙賜射則六品以下後日引射所司監之司馬升自西階楹前南靣揮弓命取矢司馬降復位取矢者以御矢付千牛郎將於東階下侍射者矢加于楅北括侍射者釋弓于庭前北靣東上所司奏請賞侍射中者罰不中者侍中稱制曰可所司立楅之東西靣監唱取矢取矢者各唱中者姓名中者立于東階下西靣北上不中者立于西階下東靣北上俱再拜所司於東階下以陳賞物受訖退復西面位酌者於罰尊西東面酌進北面跪奠於豐上退立於豐南少西不中者進豐南北靣跪取豐上爵立飲卒爵跪奠豐下退復東靣位酌者北靣跪取虛爵酌奠如初不中者以次進飲皆如初飲訖典謁引王公以下及侍射者皆庭前北靣相對為首再拜訖引出持鈒戟隊復位御入奏樂警蹕如常儀所司以弓矢出中門外付侍射者引出若御射無侍射之人則不設楅不陳賞物不設罰尊若御燕逰小射則常服不陳樂懸不行會禮王公以下事訖出無北靣再拜之儀皇帝觀射于射宫前一日太樂令設宫懸之樂及登歌如親射之儀張麋侯去殿九十步設之于侯西十步設第一楅于庭前少西設第二楅于第一楅南二步以次五楅楅所以承矢楅皆龍首蛇身長七尺博三寸厚一寸半陳賞物于東階下少東置罰豐于西階下少西設罰尊于西階南北以堂深設篚于尊西肆實爵加羃布王公以下釋弓矢席位于中門外左右俱北上布三品以上會席會于殿上如常儀布四品五品會席位于西階南在樂懸內東廂者西面北上西廂者東靣北上若殿上人少四品五品亦升之布六品以下會席位于東西樂懸南俱北上若四品五品升殿則在懸內布王公以下將射位于東西階前俱北上布左右司射位于王公將射位前右者西靣右者東靣俱北上布司馬位于右司射之南東面布三品以上及左供奉官射席于御座東楹間少前又布三品以下及右供奉官射席于御座西楹間少前席各橫布各容六人布四品以下射席于殿階下如殿上之儀布獲者位於乏東東面取矢者在獲者之南俱東面獲者謂看矢踈密者置左右司射各三人司馬二人其日質明王公以下俱公服持弓矢分為左右引入至中門外位御服武辨服出樂作警蹕如常儀凡射先行會禮酒三遍所司奏請賜王公以下射侍中前承詔退稱制曰可王公以下將射者皆降庭前北靣相對為首再拜訖典謁引出復中門外位跪取弓矢興兩手奉弓搢乘矢搢插乘矢四矢典謁引入復將射位左右司射及司馬及獲者皆就位執罰尊者立于尊南執篚者立于篚南皆北靣酌者立于尊東西靣獲者持旌自乏南行十步當侯東行至侯負侯北靣立負侯謂背侯內向立令衆射者見侯與旌垜有志於中左右司射各一人先導射皆搢乘矢於帶以兩手奉弓左者從東階右者從西階至階左者西靣右者東靣相顧立定俱升進各當席前北面俱進升射席立定左廂者右旋西面張弓右廂者左旋東面張弓俱南面挾一箇挾謂置矢于弓司馬執弓自西階升當右射之前左旋南靣揮弓命獲者去侯獲者持旌去侯西行十步當乏北行至乏止乃射左司射一發右司射一發更迭射訖左司射右旋西面弛弓右司射左旋東面弛弓俱北面立定俱少退各從東西階降于階下相向立定乃退復位左右司射各于王公位前北靣次比王公從首六人引從東西階升如司射之儀至射席相對為首北靣立左者右旋西靣張弓右者左旋東靣張弓俱南靣挾一個所司奏請以射樂樂王公以下若兩畨射則每畨惟射取中侯未須作樂相應侍中前承制退稱制曰可通事舍人承傳西向告太常卿太常卿於西懸內東面命樂正曰奏樂門若一言奏七節節門踈數如一司射自西階升當御前少西東向誓曰無射獲無獵獲不得射侯邊獲者又不得獵過獲者之旁射者俱逡巡司射退降復位司射又自西階升誓曰不鼓不釋不與鼓節相應雖中不釋算射者又逡巡司射退降復位協律郎舉麾作狸首之樂奏樂至第三節訖左右俱一發使與第四節相應左右又一發使與第五節相應以至第七節射訖協律郎偃麾樂止左廂射者左旋西向弛弓右廂射者右旋東靣弛弓俱北靣立少退從東西階降立于階下相向北上立定乃退左右司射各以次取六人俱升射如初與樂節相應如初射訖退降如初四品以下射于殿下即射席升降及射與樂相應如殿上儀射訖者三品以下及近侍之官釋弓于下升復會位四品以下皆復會位坐其未射者皆立繼射如初射總訖司馬自西階升殿揮弓命取矢取矢者上中下矢各一人持其不中者矢亦使人持至庭前其第一矢跪加第一楅北括其下以次加楅訖其取矢者各立楅南北靣王公已下各降執弓庭前北靣立所司奏請賞射中者罰不中者侍中前承制退稱制曰可所司立楅之西東靣監唱取矢者各唱中者姓名中者立東階下西靣北上依射中踈密為序其不中者謂四矢俱不中侯者立于西階下東靣北上依品為序東西俱再拜所司東階下以次付賞物受訖者退復西靣位若賜多且置于位待御入持出中門外付之酌者于罰尊西東靣酌進北靣跪奠豐上立于豐南少西不中者豐南北靣橫奠弓跪取爵立飲卒爵跪奠爵豐下取弓退復東靣位酌者繼酌奠于豐不中者以次飲皆如初若更射則取矢者以矢就東西靣位付射者付訖左右司射各從首取王公以下六人升射如初始作樂與樂相應如上儀其賞罰皆如初訖典謁者引中者及不中者及不射者皆庭前北靣各依品相對再拜訖出復中門外位持鈒戟者復位御入樂作稱警蹕如常儀所司持矢出中門外付射者訖引出若御不親觀射則不設樂懸王公以下各執弓矢入庭前北靣拜訖通事舍人宣敕賜王公以下食王公等皆再拜典謁引王公以下就東西廊下食訖舍人又宣敕賜王公以下射王公以下在位者皆再拜左右司射引王公以下射皆如御前之儀射訖王公以下皆北靣相對立通事舍人宣敕云射中者依算賜物不中者罰酒王公等皆再拜其受賞及罰皆如御前之儀北靣再拜取矢訖引出大唐開元禮卷八十六
