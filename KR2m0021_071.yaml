body:
  text: 大唐開元禮卷七十一唐蕭嵩等撰吉禮諸縣祭社稷諸里祭社稷諸縣祭社稷前三日縣令散齋于别寢二日致齋于㕔事一日亞獻以下與祭之官散齋二日各于正寢致齋一日皆于壇所丞為亞獻主簿及尉通為終獻若縣令以下有故以次差攝縣官不足以州佐及比縣官充散齋理事如舊唯不弔䘮問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祭事得行其餘悉斷諸從祭之官各清齋于公館一宿從祭之官于縣令未出之前預赴于祭所前二日本司預修除壇之内外其壇方二丈五尺高三尺四出陛三等為瘞塪二于壇北方深取足容物南出陛設縣令次于社壇西門之外道北南向設祭官以下次于縣令次西北俱南向以東為上前一日晡後本司帥其屬守社壇四門去壝七十歩所禁止行人本司設縣令位于北門之内道西南向若縣令有故攝祭初獻位于亞獻之前東向設亞獻終獻位于稷壇西北設掌事者位于西門之内道北俱每等異位東向南上設贊唱者位于終獻東北東向南上設從祭之官位于掌事之北俱重行東向以南為上設望瘞位于埳北南向東上設門外位祭官以下於西門之外道南縣官於祭官之南俱重行北向以東為上祭器之數每坐樽二籩八豆八簠二簋二俎三羊豕及腊各一俎掌事者以樽坫升自西陛各設于壇上西北隅配坐之樽在西俱南向東上皆加勺羃社稷皆爵一配坐皆爵四各置于坫設洗于社稷北陛之西去壇三歩所南向罍水在洗西加勺羃篚在洗東北肆實爵六巾二于篚加羃執樽罍洗篚者各于樽罍洗篚之後祭日未明烹牲于厨祝以豆二取牲血夙興掌饌者實祭器牲體羊豕皆載右胖前脚三節臂膊臑節一叚皆載之後脚三節一叚去下一節載上肫胳二節又取正脊脡脊横脊短脅正脅代脅各二骨以並餘皆不設簠實黍稷簋實稻粱籩實石塩乾魚棗栗榛菱芡鹿脯豆實虀葅醯醢菁爼鹿醢芹爼兎醢笋爼魚醢其土無者各以類充本司帥掌事者以席入自西門詣壇西陛升設社稷神坐各于壇上近南北向又設后土氏神坐于社神之左后稷氏神坐于稷神之左俱東向席皆以莞質明諸祭官及從祭之官各服其服祭官服祭服從祭之官應公服者公服非公服者常服本司帥掌事者入實樽罍每坐二尊一實𤣥酒為上一實醴齊次之祝版各置于坫祝以幣各置于篚與血豆俱設于樽所社稷之幣皆用黒各長一丈八尺賛唱者先入就位諸祝與執樽罍者入自西門當社稷北重行南向以東為上立定賛唱者曰冄拜祝以下皆冄拜執樽者各升自西陛立于樽所執罍篚者各就位諸祝詣社壇升自西陛行埽除訖降詣稷壇升行埽除如社壇之儀降行埽除于下訖出還齋所賛唱者次還齋所縣令將至賛禮者引祭官及從祭之官與掌事俱就門外位縣令至賛禮者引之次賛唱者先入就位縣令停于次少頃服祭服出次賛禮者引縣令入自西門就位南向立賛禮者立于縣令之東少退南向賛禮者引祭官以下及從祭之官以次入就位凡導引者每曲一逡廵立定賛唱者曰冄拜縣令以下皆冄拜賛禮者少進縣令之左西靣白請行事退復位賛唱者曰冄拜縣令以下皆冄拜初賛禮白請行事本司帥執饌者奉饌陳于西門之外祝以幣授縣令賛者引縣令自北陛升社壇南向跪奠于社神前訖興少退冄拜祝又以幣授縣令縣令升稷壇如社壇之儀訖賛者引縣令降復位本司引饌入社稷之饌升自北陛配坐之饌升自西陛諸祝迎引于壇上各設于神坐前籩豆盖羃先徹乃升簋簠既奠却其盖于下籩在左豆在右簠簋居其中羊豕二俎横而重于右腊俎特于左本司與執饌者降自西陛復位諸祝各還樽所賛禮者引縣令詣罍洗執罍者酌水執洗者跪取盤興承水縣令盥手執篚者跪取巾于篚興進縣令帨手訖執篚者受巾跪奠于篚遂取爵興進縣令受爵執罍者酌水縣令洗爵執篚者又跪取巾于篚興進縣令拭爵訖受巾奠于篚奉盤者跪奠盤興賛禮者引縣令自社壇北陛升詣社神酒樽所執樽者舉羃縣令酌醴齊賛禮者引縣令詣社神坐前南向跪奠爵興少退南向立祝持版進于神坐之右西靣跪讀祝文曰維某年歳次月朔日子具位姓名敢昭告于社神惟神徳兼博厚道著直方載生品物含飬庶類謹因仲春仲秋祗率常禮敬以制幣犧齊粢盛庶品備兹明薦用申報本以后土氏勾龍配神作主尚饗祝興縣令冄拜祝進跪奠版于神坐興還樽所縣令冄拜訖賛禮者引縣令詣配坐酒樽所縣令取爵于坫執樽者舉羃縣令酌醴齊賛禮者引詣后土氏神坐前西靣跪奠爵興少退西向立祝持版進于神坐之左南向跪讀祝文曰維某年歳次月朔日子具位姓名敢昭告于后土氏爰兹仲春仲秋厥日惟戊敬修恒禮薦于社神惟神功著水土平易九州昭配之儀實通祀典謹以犧齊粢盛庶品式陳明薦作主侑神尚饗祝興縣令冄拜祝進跪奠版于神坐興還樽所縣令拜訖賛禮者引縣令進當社神坐前南向立祝各以爵酌福酒合置一爵一祝持爵進于縣令之右東向立縣令冄拜受爵跪祭酒啐酒奠爵興祝帥執饌者以俎進跪减社神前胙肉各取前脚二骨共置一俎上興祝持俎東向進縣令受以授左右縣令跪取爵遂飲卒爵祝進受爵復于坫縣令興冄拜賛禮者引縣令降自北陛詣罍洗盥手洗爵自稷壇北陛升詣稷神酒樽所執樽者舉羃縣令酌醴齊賛禮者引縣令詣稷神坐前南向跪奠爵興少退南向立祝持版進于神坐之右西向跪讀祝文曰維某年歳次月朔日子具位姓名敢昭告于稷神惟神播生百榖首兹八政用而不匱功濟氓黎敬以制幣犧齊粢盛庶品祗奉舊章備兹瘞禮以后稷氏配神作主尚饗祝興縣令冄拜祝進跪奠版于神坐興還樽所縣令拜訖賛禮者引縣令詣配坐酒樽所縣令取爵于坫執樽者舉羃縣令酌醴齊賛禮者引縣令詣后稷氏神坐前西向跪奠爵興少退西向立祝持版進于神坐之左南靣跪讀祝文曰維某年歳次月朔日子具位姓名敢昭告于后稷氏爰以仲春仲秋敬修恒禮薦于稷神惟神功叶稼穡闡修農政允兹從祀敬率舊章謹以犧齊粢盛庶品式陳明薦作主配神尚饗祝興縣令冄拜祝進跪奠版于神坐興還樽所縣令拜訖賛禮者引縣令詣稷神坐前南向立飲福受胙如社壇之儀訖賛禮者引縣令降自北陛還本位初縣令獻將畢賛禮者引亞獻詣社壇西陛升詣社神酒樽所執樽者舉羃亞獻酌醴齊賛禮者引亞獻詣社神坐前南向跪奠爵興少退南向冄拜賛禮者引亞獻詣后土氏酒樽所取爵于坫執樽者舉羃亞獻酌醴齊賛禮者引亞獻詣后土氏神坐前西向跪奠爵興少退西向冄拜賛禮者引亞獻詣當社神坐前南向立祝各以爵酌福酒合置一爵祝持爵進于亞獻之右東向立亞獻冄拜受爵跪祭酒遂飲卒爵祝進受爵復于坫亞獻興冄拜賛禮者引亞獻降自西陛詣罍洗盥手洗爵詣稷壇升獻飲福如社壇之儀訖降復位初亞獻將畢賛禮者引終獻詣罍洗盥洗升酌終獻如亞獻之儀訖降復位諸祝各進神坐前跪徹豆興還樽所徹者籩豆各一少移于故處賛唱者曰賜胙冄拜非飲福受胙者皆冄拜賛唱者又曰冄拜縣令以下皆冄拜賛禮者少進縣今之左西面白請就望瘞位賛禮者引縣令就望瘞位南向立柷于神前取幣及血寘于埳贊禮者曰可瘞埳東西面各二人寘土半坎贊禮者少進縣令之左白禮畢遂引縣令出還次贊禮者引祭官以下以次出諸祝及執樽罍篚者降復位贊唱者曰再拜祝以下皆再拜以次出其祝版燔于齋所諸里祭社稷前一日社正及諸社人與祭者各清齋一宿于家之正寢正寢者謂家之前堂待賔之所應設饌之家預修理神樹之下又為瘞塪于神樹之北方深取足容物掌事者設社正位于稷坐西北十歩所東靣諸社人位于其後東靣南上設祝奉血豆位于瘞塪之北南向祭器之數酒樽二並勺一以巾覆之俎一籩二豆二爵二簠二簋二無禮器量以餘器兖之祭日未明烹牲于厨惟以特豕祝以豆取牲血置于饌所夙興掌饌者實祭器牲體載右胖前脚三節節一叚肩臂臑皆載之後脚三節節一叚去下節載上肫胳二節又取正脊横脊短脅正脅代脅各二骨以並分載之二俎餘皆不設其樽一實𤣥酒為上一實清酒次之籩實棗栗豆實葅醢簠實黍稷簋實稻粱掌事者以席入社神之席設于神樹下稷神之席設于神樹西俱北向質明社正以下各常服掌事者以盥水器入設于神樹北十歩所加勺一巾二爵于其下盛以箱又以酒樽入設于神樹北近西社神之樽在東稷神之樽在西俱東上南向置爵二及祝版于尊下執樽者立于樽後掌事者實樽酒訖祝及執樽者其祝以社人有學識者充入當社神北南向以東為上皆冄拜訖執酒樽者各就樽後立其執盥者就器後立賛禮者引社正以下俱就位立定賛禮者賛冄拜社正以下皆冄拜祝詣樽所賛禮者賛冄拜社正以下皆冄拜掌事者以饌入各設于神坐前葅醢居前左右廂黍稷在其間俎居其外訖掌事者出賛禮者引社正詣盥器所執盥器者酌水社正洗手取巾拭手訖洗爵訖賛禮者引社正詣社神酒樽所酌酒訖賛禮者引社正詣社神坐前跪奠爵于饌右興少退南向立祝持版進社神坐東西向跪讀祝文曰維某年歳次月朔日子某坊村即云某村以下准此社正姓名合社若干人敢昭告于社神惟神載育黎元長兹庶物爰以仲春仲秋日惟吉戊謹率恒禮敬以特牲清酌粢盛庶品祗薦于社神尚饗祝興社正以下及社人等俱冄拜賛禮者引社正詣稷神酒樽所取爵酌酒訖賛禮者引社正詣稷神饌前南向跪奠酒于饌右興少退南向立祝持版進于稷神饌西東向跪讀祝文曰維某年歳次月朔日子某坊社正姓名合社若干人等敢昭告于稷神惟神主茲百榖粒此羣黎今當仲春吉戊秋云仲秋謹率恒禮敬以特牲清酌粢盛庶品祗薦于稷神尚饗祝興社正以下及社人俱冄拜賛禮者引社正立于社神坐前南向祝以爵酌社神及稷神福酒合置一爵進社正之右社正冄拜受酒訖跪祭酒遂飲卒爵祝受爵還樽所社正興丹拜賛禮者引社正還本位立定賛禮者賛冄拜社正及社人俱冄拜訖祝以血寘于塪塪東西各一人寘土半坎賛禮者少前白禮畢引社人等出祝與執樽者復社神位冄拜訖出其餘饌社人等俱于此餕如常㑹之儀其祝版燔于祭所大唐開元禮巻七十一
