body:
  text: 大唐開元禮卷二十五唐蕭嵩等撰吉禮春分祀日於東郊有司攝事齋戒陳設奠玉帛進熟齋戒前祀五日諸預祀之官散齋三日致齋二日散齋皆扵正寢致齋一日于本司一日于祀所其無本司者並于祀所凡散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祀事得行其餘悉斷其祀官已齋而闕者通攝行事光祿卿監取明水火太官令取水于隂鍳取火于陽燧火以供爨水以實樽前祀一日諸衛令其屬未後一刻各以其方器服守衛壝門與太樂工人俱清齋一宿陳設前祀三日衛尉設祀官公卿以下次于東壝之外道南北向西上陳饌幔于内壝東門之外道南北向太樂令設宫懸之樂于壇南内壝之内東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于編懸之閒各依神位樹雷鼓于北懸之内道之左右植建鼓于四隅置柷敔于懸内柷在左敔在右設歌鐘歌磬于壇上近南北向磬簴在西鐘簴在東其匏竹者立于壇下重行北向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以北為上南方北方以西為上右校掃除壇之内外郊社令積柴于燎壇其壇于神壇之左内壝之外方八尺髙一丈開上南出户方三尺前祀一日奉禮設祀官公卿位于内壝東門之内道北執事位于道南每等異位俱重行西面以北為上設望燎位當柴壇之北南向設御史位于壇上正位于東南隅西向副位于西南隅東向令史各陪其後于壇下設奉禮位于樂懸東北賛者二人在南差退俱西向又設奉禮賛者位于燎壇東北西向北上設恊律郎位于壇上南陛之西東向設太樂令位扵北懸之間當壇北向設祀官公卿以下門外位于東壝之外道南每等異位重行北面西上設酒樽之位太樽二著樽二山罍一在壇上于東南隅北向尊皆置于坫加勺羃設爵于尊下設洗于壇南陛東北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍篚羃者各于樽罍篚羃之後設玉幣之篚于壇上樽坫之所晡後謁者引光禄卿詣厨視溉濯又謁者引諸祀官詣厨省饌具訖俱還齋所祀日未明十刻太官令帥宰人以鸞刀割牲祝史以豆取毛血置于饌所遂烹牲青牲一未明五刻太史令郊社令升設大明神坐于壇上北方南向席以藁秸設神位于坐首奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各帥其屬入實樽罍玉幣凢尊之次太尊為上實以醴齊著尊次之實以盎齊罍尊實以清酒其𤣥酒各實于上尊罍尊無𤣥酒禮神之玉以圭璧其幣以青太官令帥進饌者實諸籩豆簠簋入設于内壝東門之外饌幔内未明二刻奉禮帥賛者先入就位賛引引御史博士太祝及令史祝史與執樽罍篚羃者入自東門當壇南重行北面西上凢𨗳引者每曲一逡巡立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳御史以下皆再拜訖執樽者升自東陛立于樽所壇下執樽罍篚冪者各就位賛引引御史太祝詣壇東陛升行掃除于上令史祝史行掃除于下訖引降就位未明一刻太樂令帥工人二舞次入就位文舞入陳于懸内武舞立于懸南道西謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行掃除于上降行樂懸于下訖還本位初司空入謁者引祀官賛引引執事者俱就壝外位司空行掃除訖謁者賛引各引祀官以次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位恊律郎跪俯伏舉麾凢取物皆跪俛伏而取以興奠物則奠訖俛伏而興後鼓柷奏豫和之樂乃以圜鐘之均文舞之舞樂舞六成偃麾戛敔樂止凡樂皆協律郎舉麾工鼔柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官在位者皆再拜太祝取玉幣于篚立于樽所謁者引太尉詣壇升自南陛北向立太祝加玉於幣東向授太尉太尉受玉幣登歌作肅和之樂乃以大呂之均謁者引太尉進北面跪奠于大明神坐俛伏興謁者引太尉少退北向再拜訖登歌止謁者引太尉降自南陛還本位衆官拜訖祝史奉毛血之豆立扵門外扵登歌止祝史奉毛血入升自南陛太祝迎取扵壇上進奠于神坐太祝與祝史退立于樽所進熟太尉既升奠玉帛太官令出帥饌者奉饌陳于内壝門外謁者引司徒出詣饌所司徒奉俎太祝既奠毛血太官令引饌入俎初入門雍和之樂作自後酌獻皆奏雍和之樂饌至陛樂止祝史進徹毛血之豆降自東陛以出饌升南陛太祝迎引于壇上設于神坐前籩豆盖羃先徹乃升簠簋既奠却其盖于下設訖謁者引司徒以下降自東陛復位太祝還樽所謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉升自南陛詣酒樽所執樽者舉羃太尉酌醴齊訖樂作謁者引太尉進大明神坐前北向跪奠爵興謁者引太尉少退北向立樂止太祝持版進于神坐之右東面跪讀祝文曰維某年嵗次月朔日子嗣天子臣某謹遣太尉封臣名敢昭告于大明惟神宣布太陽照臨下土動植咸頼幽隠無遺時惟仲春敬遵常禮謹以玉帛犧齊粢盛庶品祗祀于神尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版于神坐還樽所太尉拜訖樂止太祝以爵酌罍福酒進太尉之右西向立太尉再拜受爵跪祭酒啐酒奠爵興太祝帥齋郎進俎太祝減神前胙肉加于俎太祝持俎授太尉太尉受以授齋郎太尉取爵遂飲卒爵太祝進受爵復于坫太尉興再拜謁者引太尉降復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止初太尉獻将畢謁者引太常卿詣罍洗盥手洗匏爵訖謁者引太常卿自東陛升壇詣著樽所執尊者舉羃太常卿酌盎齊武舞作謁者引太常卿進大明神坐前北向跪奠爵興謁者引太常卿少退北向再拜訖太祝以爵酌罍福酒進太常卿之右西向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復扵坫太常卿興再拜謁者引太常卿降復位初太常卿獻将畢謁者引光祿卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光祿卿降復位武舞六成樂止舞獻俱畢太祝進徹豆還樽所徹者籩豆各一少移于故處奉禮曰賜胙賛者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜豫和之樂作奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之左白請就望燎位謁者引太尉就望燎位南向立于衆官将拜太祝執篚進神坐前跪取玉幣祝版齋郎以俎載牲醴稷黍飯及爵酒降自南陛經懸南行當柴壇南東行自陛南登柴壇以玉幣祝版饌物置于柴上户内訖奉禮曰可燎東西面各四人以炬燎火半柴謁者進太尉之左白禮畢謁者引太尉出又謁者賛引各引祀官以次出賛引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出工人二舞以次出大唐開元禮卷二十五
