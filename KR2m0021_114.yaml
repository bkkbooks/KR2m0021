body:
  text: 大唐開元禮卷一百十四唐蕭嵩等撰嘉禮親王冠前三日本司率其屬筮日筮賔於廳事前二日主人至賔第掌次者引之次主人公服出立於大門外之西東靣賔公服立於阼階下西靣儐者公服進於賔之左北靣受命出立於門東西靣曰敢請事主人曰皇子某王將加冠請某教之儐者入告賔出立於門左西靣再拜主人答拜主人曰皇子某王將加冠願某公教之賔曰某不敏恐不能供事敢辭主人曰某猶願某人教之賔曰王重有命某敢不從主人再拜賔答拜主人還賔拜送主人命使者戒贊冠者使者至贊冠者大門外掌次者引之次使者公服出立於門西東面儐者出請事入告贊冠者出門左西面再拜使者答拜使者少進曰王子某王將加冠某王使某請某位教之贊冠者曰某不敏恐不能供事敢辭使者曰某王使某敢固以請贊冠者曰王重有命某敢不從使者再拜贊冠者答拜使者退贊冠者拜送前一日掌次者設次於大門外之右南向其日夙興掌事者設洗於阼階東南東靣當東霤南北以堂深罍水在洗東加勺羃篚在洗西南肆篚實巾一爵一加羃席於東房西墉下陳衣於席東領北上衮冕服青衣纁裳九章五章在衣山龍華蟲火宗彞四章在裳藻粉米黼黻白紗中單黼領青縹襈裾革帶鈎䚢大帶青帶紕其外上以朱下以緑紉約用組朱黻二章山火劍飾以珠玉山玄玉雙珮纁朱雙綬四綵赤黃縹紺純朱質纒文織長一丈八尺二百四十首廣九寸小雙綬長二尺六寸色同大綬而首半之間施二玉環朱襪赤舄逺遊冠服絳紗單衣白紗中單皂領褾襈裾白裙襦赤裙衫假帶曲領方心綘紗蔽膝白襪黑舄其革帶劍佩與衮服同緇布冠服青衣素裳白紗中單青領褾襈裾素鞸其革帶大帶劍佩綬與冕服同襪舄與逺遊冠服同緇纚其纚用皂巾方六寸屬於前兩隅犀簮櫛實於箱在服南莞筵三紛純加藻席三緇純在南樽於房户外之西兩甒玄酒在西加勺羃設坫於樽東置二爵加羃豆十籩十在服北俎三在籩豆之北凡牲體節析加雜肺俎實羊豕及臘籩實脯棗之類豆實葅醢之屬設洗於東房近北罍水在洗西篚在洗東北肆實以巾質明賓贊至於主人大門外掌次者引之次儐贊俱公服諸行事者各服其服執樽罍篚者皆就位冕青珠九旒青纊充耳犀簮導組纓色如其綬逺遊冠三梁金附蟬黑介幘纓青緌犀導緇布冠青組纓冠冕各一箱各一人執之待於西階之東西北上設主人之席於阼階上西面賓席於西階上東面皇子席於房户之西南面房外尊東俱下莞上藻主人公服立於阼階當東序西南諸親公服非公服者常服立罍洗東南西面北上尊老者隔别室儐者公服立於門內道東北面皇子雙童髻空頂幘雙玉導金寶飾綵袴褶錦紳烏皮履立於房內南面主人贊冠者公服立於房內户東西面賓及贊冠者出次立於門西贊冠者少退俱東面北上儐者進於主人之左北面受命出立於門東西靣曰敢請事賓曰皇子某王將加冠某謹應命儐者入告主人迎賓於大門外之東西面再拜賓答拜凡賓主拜揖入出皆贊禮者相導之主人揖贊冠者贊冠者報揖主人又揖賔賔報揖主人入賔入贊冠者次入及內門主人揖賔賔入贊冠者從之至內霤將曲揖賔報揖至階主人立於階東西靣賔立於階西東靣主人曰請公升賔曰某備將事敢辭主人曰固請公升賔曰某敢固辭主人曰終請公升賔曰某敢終辭主人升自阼階立於席東西靣賔升自西階立於席西東向贊冠者及庭盥於洗升自阼階入於東房立於主人贊冠者之南俱西靣主人贊冠者引皇子出立於房户外之西南靣賔之贊冠者取纚櫛簮箱跪奠於皇子筵東端興席東少北南靣立賔揖皇子賔主俱即坐皇子進升席南面坐賔之贊冠者進筵前北面跪脫雙童髻置于箱櫛畢設纚興復位立賔主俱興賔降盥主人從降賔東面辭曰願王不降主人曰公降辱敢不從賔降至罍洗盥手訖詣西階賔主一揖一讓升主人立于席後西面賔立于西階上東執緇布冠者升賔降一等受之右執頂左執前詣皇子筵前北面跪冠興復西階上席後東面立賔之贊冠者進筵前北面跪頍結纓興復位皇子興賔揖皇子適房賔主俱坐皇子著青衣素裳之服出房户西南靣立賔主俱興賔揖皇子進立於席後南靣賔降盥主人從降辭對如初賔盥手跪取爵於篚興洗訖詣西階賔主一揖一讓升主人立於席後西靣賔詣酒尊所酌酒進皇子筵前北靣立祝曰旨酒既清嘉薦亶時始加元服兄弟俱來孝友時格永乃保之皇子筵西拜受爵賔復西階上東靣答拜執饌者薦豆籩於皇子筵前皇子升筵坐左執爵右取脯擩於醢祭於籩豆之間祭酒興筵末坐啐酒執爵興降筵西跪奠爵再拜執爵興賔答拜冠者升筵跪奠爵於薦東興立筵西南靣執饌者徹薦爵賔揖皇子皇子進升筵南靣坐賔之贊冠者跪脫緇布冠置於箱櫛畢設纚興復位賔降二等受逺逰冠右執頂左執前詣皇子筵前北靣跪冠興復位賔之贊冠者坐設簮結纓興復位皇子興賔揖皇子皇子適房賔主俱坐皇子著朝服出房户西南靣立賔主俱興賔揖皇子進立席後南靣賔詣酒尊所取爵酌酒進皇子筵前北靣立祝曰旨酒既湑嘉薦伊脯乃申其服禮儀有序祭此嘉爵承天之祜皇子筵西拜受爵賔復西階上東靣答拜執饌者進籩豆皇子升筵坐左執爵右祭脯醢祭酒興筵末坐啐酒執爵興降筵西跪奠爵再拜執爵興賔答拜皇子升筵坐奠爵於薦東興立於筵西南面執饌者徹薦爵賔揖皇子進升席南靣坐賔之贊冠者跪脫進賢冠置於箱櫛畢設纚興復位賔降三等受冕右執頂左執前詣皇子筵前北靣跪冠興復位賔之贊冠者坐設簮結纓興復位皇子興賔揖皇子適房賔主俱坐主人贊冠者徹櫛箱入於房皇子著衮冕之服出房户西南立賔主俱興賔揖皇子皇子進立於席後南靣賔詣酒尊所取爵酌酒進皇子筵前北靣立祝曰旨酒令芳籩豆有楚咸嘉其服肴升折俎承天之慶受福無疆皇子筵西拜受爵賔復位東面答拜執饌者薦籩豆設俎於籩豆之南皇子升筵左執爵右祭脯醢贊冠者取脯一以授皇子奠爵於薦西興受却左手執本坐右絶末以祭上左手嚌之興加於俎皇子坐帨手執爵祭酒興筵末坐啐酒興降筵西南靣坐奠爵再拜執爵興賔答拜皇子升坐奠爵於薦東興贊冠者引皇子降立於西階之東南靣初皇子降賔降自西階直西序東靣主人降自東階直東序西靣立賔少進字之曰禮儀既備令月吉日昭告爾字爰字孔嘉君子攸宜宜之於嘏永受保之曰孟某甫仲叔季唯其所當皇子曰某雖不敏夙夜袛奉賔出主人送於內門之外主人西靣請賔曰公辱執事請禮從者賔曰某既得將事敢辭主人曰敢固以請賔曰某辭不得命敢不從賔就次主人入初賔出皇子東靣見諸親諸親拜之皇子答拜皇子入見內外諸尊於賔所賔主既釋服改設席訖賔贊俱出次立於門西東靣主人出門東西靣主人揖賔賔報揖主人先入賔贊從之至階一揖一讓升各就坐後立定俱坐會訖賔主俱興賔立於西階上贊冠者在北少退俱東靣主人立於東階上西靣掌事者奉束帛之篚升授主人於序端主人執篚少進西靣立又掌事者奉幣篚升立於主人之後於幣篚升牽馬者牽兩馬入陳於門內三分庭一在南北首西上賔還西階北靣贊冠者立於賔左少退俱北靣再拜主人進立於楹間南面贊進立於主人之右俱南靣東上主人授幣賔受之退復東靣位於主人授幣掌事者又以幣篚授贊者退復位主人還阼階上北靣拜送賔贊降自西階從者迓受幣賔當庭實東面揖出牽馬者從出從者迓受馬於門外賔降主人降送賔於大門外西靣再拜賔退主人入皇子詣闕至次著朝服通事舍人引皇子入詣皇帝所御之殿至闕閣近臣入奏皇帝即坐南向坐近臣出引皇子入立於階間北靣再拜近臣引出皇子至皇后殿閣外近臣附奏皇后即御坐南向坐司言至閣引皇子入立於階間北靣再拜司言引出閣皇子出還第如來儀大唐開元禮卷一百十四
