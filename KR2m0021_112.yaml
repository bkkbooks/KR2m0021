body:
  text: 大唐開元禮卷一百十二唐蕭嵩等撰嘉禮皇太子元正冬至受羣臣賀並㑹前二日本司宣攝內外各供其職前一日典設設皇太子幄坐於正殿東序西向守宫設羣官等次於東宫朝堂伶官帥展軒懸於殿庭以姑洗之均又設三鎛鐘姑洗夷則大吕各依其位設登歌以南吕之均又設麾於殿上並如常儀典設郎鋪羣官牀坐於殿上文官三品以上於皇太子西南重行北向武官三品以上於皇太子西北重行南向俱以東為上朝集使三品以上及都督刺史各分於文武官之下設不升殿者坐席於殿庭東西廂文官四品五品於懸東六品以下於橫街之南每等異位俱重行西向北上武官四品五品於懸西六品以下於橫街之南當文官每等異位俱重行東向北上朝集使非升殿者分方各於文武官當品之下諸州使人分方各於集朝使之下亦如之諸親於四品五品之下宗親在東異姓親在西掌儀仍各設版位奉禮設門外位於東宫朝堂之前文官在東武官在西俱每等異位重行相向北上諸親位於文武四品五品之下宗親在東異姓親在西設諸州朝集使位東方南方於宗親之南每等異位重行西靣西方北方於異姓親之南每等異位重行東靣俱以北為上典膳郎設尊於西廊下近北設不升殿者酒尊各於其坐之南皆有坫羃俱障以帷其日質明諸衛率各勒所部屯門列仗文武羣官依時刻集朝堂次各服公服左庶子量時刻版奏請中嚴近仗就陳於閣外諸侍衛之官各服其器服俱詣閣奉迎伶官帥工人二舞入就位又伶官率一人升就舉麾位掌設贊者入就位吏部兵部户部贊羣官俱出次通事舍人各引就門外位又舍人引羣官等非升殿者先入就位左庶子版奏外辦皇太子著從省服未冠則雙童髻以出侍衛如常伶官帥舉麾奏永和之樂皇太子即坐西向坐偃麾樂止凡樂皆伶官帥舉麾鼓柷而後作偃麾戛敔而後止掌儀一人升就西階上東面立贊者二人立於階下通事舍人引羣官以次入就位公初入門舒和之樂作左庶子前跪奏稱左庶子臣某言請殿下為公至興俯伏興還侍位皇太子降立於坐後若有三公諸伯叔則降立於東階下西靣公至階則升立於坐後皇太子升降伶官帥舉麾樂作止如式公至階樂止公以下升坐者俱脫履於階下所司預設脫履席通事舍人接引羣官升就位立定掌儀唱再拜贊者承傳羣官上下皆再拜訖通事舍人引羣官為首一人進皇太子前東靣立賀稱元正首祚景福惟新伏惟皇太子殿下與時同休冬至賀云天正長至仗惟殿下與時同休賀訖退復位皇太子答再拜左庶子前承令進宣令訖羣官上下皆再拜左庶子前跪奏稱左庶子臣某言請坐俯伏興還侍位皇太子坐掌儀唱就坐贊者承傳羣官上下皆就坐俯伏坐伶官帥引歌者及琴瑟至階脫履於下升就位坐其笙管者詣階間北靣立典膳郎進酒至階掌儀唱酒至興贊者承傳羣官上下皆俯伏興立席後左庶子到階省酒典膳郎奉酒進皇太子舉酒食官令又行羣官酒酒至掌儀唱再拜贊者承傳羣官上下皆再拜若皇太子遣停拜則止羣官皆搢笏受觶掌儀唱就位贊者承傳上下皆就位俯伏興坐飲皇太子初舉酒登歌作昭和之樂典膳郎進受虛觶復於坫登歌訖降復位觴行三周典膳郎進食食升階左庶子到階省案掌儀唱食至興贊者承傳羣官上下俯伏興立坐後典膳郎品嘗食訖以次進置皇太子前食官令又行羣官案皇太子若不食及宫臣案先下訖不須興設食訖掌儀唱就坐贊者承傳羣官上下皆就坐俯伏坐皇太子乃飯奏休和之樂羣官上下俱飯皇太子食畢樂止仍行酒遂設庶羞伶官帥二舞以次入作酒行九遍㑹畢掌儀唱可起贊者承傳羣官上下皆俯伏起立席後左庶子前跪奏稱左庶子臣某言請殿下降坐俯伏興還侍位皇太子降立於坐後掌儀唱再拜贊者承傳羣官上下皆再拜皇太子答再拜通事舍人引羣官降納履以出公初降樂作若有三公諸伯叔皇太子升降伶官帥舉麾樂作止如式公出門樂止左庶子前跪奏稱左庶子臣某言請殿下升坐俯伏興還侍位樂作皇太子升坐樂止羣官出畢非升殿者仍立於殿庭左庶子前跪奏稱左庶子臣某言禮畢俯伏興還侍位皇太子興樂作皇太子降坐以入侍衛如來儀侍臣從至閣樂止又通事舍人引侍殿庭者以次出皇太子若服袴褶羣官及宫臣皆袴褶朝集使公服升坐者脫履如式若設四部樂則去樂懸無警蹕伶官帥四部伎立於左右嘉善門外羣官初坐伶官帥四部伎聲作而入各就坐以次作如式大唐開元禮卷一百十二
