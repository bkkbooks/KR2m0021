門厲行尚饗獻官惟獻司命餘坐齋郎助奠餘如上儀鑾駕還宫皇帝既還大次侍中版奏請解嚴將士不得輒離部位皇帝停大次一刻頃捶一鼓為一嚴轉仗衛於還途如來儀三刻頃捶二鼓為再嚴將士布隊仗侍中版奏請中嚴皇帝服通天冠絳紗袍諸享官服朝服五刻頃捶三鼓為三嚴通事舍人各引羣官客使序立於大次前近南文武侍臣詣大次奉迎乘黃令進金輅於大次門外南向千牛將軍立於輅右侍中版奏外辦太僕卿升執轡皇帝乘輿出次繖扇侍衛警蹕如常儀皇帝升輅太僕卿立授綏黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕如常儀黃門侍郎贊者夾引千牛將軍夾輅而趨至侍臣上馬所黃門侍郎奏稱請鑾駕權停敇侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬畢黃門侍郎奏稱請敕車右升侍中稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引退復位鼓傳音鑾駕動鼓吹振作而還文武等羣官皆從如來儀諸方客使還館駕至承天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立於輅右訖鑾駕動千牛將軍夾輅而趨駕入嘉德門太樂令令撞㽔賔之鐘在五鐘皆應鼓柷奏采茨之樂至太極門戛敔樂止入太極門鼓柷奏太和之樂駕至橫街北當上閣門回輅南向侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅乘輿以入繖扇侍衛警蹕如常儀侍臣從至閣戞敔樂止初文武羣官至東朝堂通事舍人承旨敕羣官並還皇帝既入侍中版奏請解嚴叩鉦將士各還其所大唐開元禮卷三十七
