body:
  text: 大唐開元禮卷三十七唐蕭嵩等撰吉禮皇帝時享於太廟齋戒陳設省牲器鑾駕出宫晨祼餽食祭七祀鑾駕還宫齋戒凡一嵗五享於太廟謂四孟月及臘將享有司卜日如别儀前享七日平明太尉誓百官於尚書省曰某月某日享於太廟不供其事國有常刑皇帝散齋四日於别殿致齋三日於太極殿前致齋一日尚舍奉御設御幄於太極殿西序及室內俱東向尚舍直長張幃於前楹下致齋之日質明諸衛勒所部屯門列仗晝漏上水一刻侍中版奏請中嚴諸衛之屬各督其隊入陳於殿庭如常儀通事舍人引文武五品以上袴褶陪位如式諸衛侍之官各服其服諸侍臣並結珮俱詣閣奉迎侍中版奏外辦上水三刻皇帝服通天冠絳紗袍結珮乘輿出自西房曲直華蓋警蹕侍衛如常儀皇帝即御座東向坐侍臣夾侍如常一刻頃侍中前跪奏稱侍中臣某言請降就齋室俯伏興還侍位皇帝降坐入室文武侍臣各還省直衛者如常通事舍人引陪位者以次出凡預享之官散齋四日致齋三日散齋皆於正寢致齋二日於本司一日於享所其無本司者皆於享所近侍之官應從升者及從享羣官諸方客使各於本司及公館九廟子孫各於其第清齋一宿無本司者各於正寢散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟享事得行其餘悉斷其官已齋而闕者通攝行事諸享官致齋之日給酒食及明衣各習禮於齋所光祿卿監取明水火太官令取水於陰鑒取火於陽燧火以供㸑水以實尊前享一日諸衛令其屬未後一刻各以其方器服守衛廟門每門二人每隅一人及太樂令工人俱清齋一宿陳設前享三日尚舍直長施大次於廟東門之外道北南向尚舍奉御鋪御坐守宫設文武侍臣次於大次之後文官在左武官在右俱南向設諸享官次於齋坊之內九廟子孫於齋坊內近南西向北上文官九品以上於齋坊之南東方南方朝集使又於其南東方南方蕃客又於其南俱每等異位重行西向北上酅公介公於廟西門之外近南武官九品以上於介公酅公之南西方北方朝集使於武官之南西方北方蕃客又於其南俱每等異位重行東向北上其褒聖侯於文官三品以下諸州使人分方各於朝集使之後前享二日太樂令設宫懸之樂於廟庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹路鼓於北懸之內道之左右植建鼓於四隅置柷敔於懸內柷在左敔在右設歌鐘歌磬於廟堂之上前楹間北向磬簴在西鐘簴在東其匏竹者立在陛間重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上右校清掃內外前享一日奉禮設御位於廟東陛東南西向設享官公卿位於東門之內道南執事者位於其後每等異位俱重行西面以北為上設御史位於廟堂之下一位於東南西向一位於西南東向令史各陪其後設奉禮位於樂懸東北贊者二人在南差退俱西向設協律郎位於廟堂之上前楹之間近西東向設太樂令位於北懸之間北向設從享之官位九廟子孫於享官公卿之南昭穆異位雖有貴者以齒文官九品以上位於子孫之南東方南方朝集使於文官之南東方南方蕃客又於其南俱每等異位重行西面北上介公酅公位於西門之內道南武官九品以上於介公酅公之南少西當文官西方北方朝集使於武官之南西方北方蕃客又於其南俱每等異位重行東面北上其褒聖侯於文官三品之下諸州使人分方各位於朝集使後設門外位享官公卿以下皆於東門之外道南每等異位重行北面西上子孫之位於享官公卿之東少南文官九品以上於子孫之東東方南方朝集使於文官之東東方南方蕃客又於其東俱每等異位重行北面西上設介公酅公位於西門之外道南武官九品以上於介公酅公之西少南西方北方朝集使於武官之西西方北方蕃客又於其西俱每等異位重行北面東上其褒聖侯於文官三品之下諸州使人分方位於朝集使之後設牲榜於東門之外當門西向以南為上設廪犧令位於牲西南祝史陪其後俱北向設諸太祝位於牲東各當牲後祝史各陪其後俱西面設太常卿省牲位於牲前近北又設御史位於太常卿之西俱南向設尊彛之位於廟堂上前楹間各於室户之左北向春夏每室雞彛一鳥彛一犧尊二象尊二山罍二秋冬每室斚彛一黃彛一著尊二壺尊二山罍二皆加勺羃凡宗廟羃皆以黼皆西上各有坫焉以置瓉爵設簋簠鈃籩豆之位於廟堂之上俱東側階之北每座四簋居前四簠次之次以六登次以六鈃籩豆為後每坐異之皆以南為上屈陳而下設御洗於東陛東南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以圭瓉巾爵執尊罍篚羃者各位於尊罍篚羃之後省牲器省牲之日午後十刻廟所諸衛之屬禁斷行人太廟令整拂神坐幄晡後二刻太廟令帥府史二人及齋郎以尊坫罍洗篚羃及籩豆簋鈃入設於位加以巾蓋諸器物皆濯而陳之其升堂者自東階晡後三刻諸太祝與廩犧令以牲就榜位謁者引太常卿贊引引御史入詣東階升遍視滌濯於上凡導引者每曲一逡巡於視滌濯執尊者皆舉羃告潔訖引降就省牲位南向立廪犧令少前曰請省牲退復位太常卿省牲廪犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西向舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官謁者引光祿卿詣厨省鼎鑊申視濯溉贊引引御史就厨省饌具太常卿以下每事訖各還齋次進饌者入徹籩豆簋鈃以出享日未明十五刻太官令帥宰人以鸞刀割牲祝史各取毛血每坐共實一豆遂烹牲祝史洗肝於鬱鬯又取膟膋每坐共實一豆俱置於饌所鑾駕出宫前出宫三日本司宣攝內外各供其職守宫設從享羣官五品以上次於承天門東西朝堂如常儀前二日太樂令設宫懸之樂於殿庭如常儀駕出懸而不作享日未明七刻捶一鼓為一嚴三嚴時節前一日侍中奏裁侍中奏開宫殿門及城門未明五刻捶二鼓為再嚴侍中版奏請中嚴奉禮設從享羣官五品以上位文官於東朝堂之前西向武官於西朝堂之前東向俱重行北上從享羣官五品以上俱集朝堂次各服其服其六品以下及介公酅公褒聖侯朝集使九廟之子孫諸方客使等並駕發之前預赴享所俱就次各服其服所司陳大駕鹵簿如别儀未明二刻捶三鼓為三嚴諸衛之屬各督其隊與鈒戟以次入陳於殿庭通事舍人引從享羣官各就朝堂前位諸侍衛之官各服其服侍中中書令以下俱詣西階奉迎侍中負寶如式乘黃令進至輅於太極殿西階之前南向千牛將軍一人執長刀立於輅前北向黃門侍郎一人在侍臣之前贊者二人又在黃門之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝衮冕乘輿以出降自西階稱警蹕如常儀千牛將軍前執轡皇帝升輅太僕卿立授綏侍中中書令以下夾侍如常黃門侍郎進當鑾駕前跪奏稱黃門侍郎臣某言請鑾駕進發俯伏興退復位凡黃門侍郎奏請皆進當鑾駕前跪奏稱具官臣某言訖俯伏興鑾駕動又稱警蹕黃門侍郎與贊者夾引以出千牛將軍夾路而趨駕出承天門至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翌駕在黃麾內符寶郎奉六寶與殿中監後部從在黃鉞內侍中中書令以下夾侍於輅前贊者在供奉官內侍臣上馬畢黃門侍郎奏稱請敕車右升侍中前承制制退稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕進發退復位鑾駕動稱警蹕鼓傳音如常不鳴鼓吹不得喧譁其從享之官在玄武隊後如常儀晨祼享日未明四刻諸享官各服其服太廟令良醖令各帥其屬入實尊罍雞彛斚彛及犧尊著尊壺尊之上尊皆實以明水山罍之上尊實以玄酒烏彜黃彜實以鬱鬯犧尊著尊實以醴齊象尊壺尊實以盎齊山罍實以清酒太官令帥饌者實諸籩豆簋簠未明三刻奉禮帥贊者引御史博士太廟令太祝宫闈令及令史祝史與執尊罍篚羃者入自東門當階間重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有司贊者皆承傳御史以下皆再拜訖執尊罍篚羃者各就位贊引引御史諸太祝詣東陛升堂行掃除於上令史祝史行掃除於下訖引就位未明一刻贊引引太廟令太祝宫闈令詣東陛升堂詣獻祖室入開塪室太祝宫闈令奉出神主置於坐訖引太廟令以下次奉出懿祖次奉出太祖次奉出代祖次奉出髙祖次奉出太宗次奉出髙宗次奉出中宗次奉出睿宗神主置於坐如獻祖之儀皇祖妣以下神主皆宫闈令奉出俱並而處右訖引太廟令以下降還本位駕將至謁者贊引引享官通事舍人分别九廟子孫從享羣官諸方客使先至者俱就門外位駕至大次門外回輅南向將畢降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅乘輿之大次繖扇華蓋侍衛如常儀太廟令以祝版奏御署訖近臣奉出太廟令受各奠於坫通事舍人引文武五品以上從享之官皆就門外位太樂令帥工人二舞入就位文舞入陳於懸內武舞立於懸南道西其升堂者皆脫屨於下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣東陛升堂行掃除於上降行樂懸於下訖引復位初司空行樂懸通事舍人謁者贊引各引享官及九廟子孫從享羣官諸方客使次入就位皇帝停大次半刻頃太常博士引太常卿立于大次門外當門北向侍中版奏外辦皇帝出次華蓋侍衛如常儀侍中負寶陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至廟門外殿中監進鎮圭皇帝執鎮圭華蓋仗衛停於門外近侍者從入如常皇帝至版位西向立每立定太常卿與博士退立于左太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律即跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏永和之樂乃以黃鐘為宫大吕為角太蔟為徴應鐘為羽作文舞之舞樂舞九成黃鐘三奏大吕太蔟應鐘各再奏偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戞敔而後止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太常卿引皇帝至罍洗所太和之樂作皇帝每行皆作太和之樂皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤興承水皇帝搢鎮圭凡受物則搢圭奠訖則執圭俯伏興皇帝盥手黃門侍郎跪取巾於篚興進皇帝􅍤手訖黃門侍郎受巾奠於篚黃門侍郎又取瓉於篚興進皇帝受瓉侍中酌罍水又侍中奉盤皇帝洗瓉黃門侍郎又授巾皆如初皇帝拭瓉訖侍中奠盤匜黃門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝升自阼階樂止侍中中書令以下及左右侍衛量人從升以下皆如之太常卿引皇帝詣獻祖尊彛所執尊者舉羃侍中贊酌鬱酒訖登歌作肅和之樂以圜鐘之均自後登歌皆歌圜鐘太常卿引皇帝入詣獻祖神坐前北向跪以鬯祼地奠之俯伏興太常卿引皇帝出户北向再拜訖太常卿引皇帝次祼懿祖次祼太祖次祼代祖次祼髙祖次祼太宗次祼髙宗次祼中宗次祼睿宗並如上儀訖登歌止太常卿引皇帝樂作皇帝降自阼階還版位西向立樂止初羣官拜訖祝史各奉毛血及肝膋之豆立於東門外齋郎奉爐炭蕭稷黍各立於肝膋之後於登歌止祝史奉毛血肝膋與奉爐炭蕭稷黍者以次入自正門升自泰階諸太祝各迎取毛血肝膋於階上俱入奠於神坐前