  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0021_WYG_087-1a, image: WYG0646/WYG0646-0522a.png}
body:
  text: 大唐開元禮卷八十七唐蕭嵩等撰軍禮制遣大將出征有司宜乎太社將告有司卜日如别儀前一日告官致齋於社所守宫設告官以下次各於常所設諸將次於社宫北門之外道西東向以南為上右校清除内外又為瘞塪二於南門之内壇西南如常奉禮設告官以下版位如常儀設諸將位於北門之内當太社壇每等異位重行南靣以東為上設諸將門外位於北門之外道西每等異位重行東向以南為上郊社令帥其屬以尊罍洗篚羃玉幣之篚入設皆如常式執尊罍篚羃者各於尊罍篚羃之後告日未明十刻太官令預具牢饌質明告官以下各服其服太史令郊社令率其屬奉神席位升設如常郊社令良醖令之屬入實尊罍玉幣太尊實以醴齊配坐之象尊其實亦如之凡尊皆三其𤣥酒各實于上尊禮神之玉太社太稷俱以兩珪有邸幣皆以𤣥一丈八尺奉禮帥賛者先入就位賛者引御史太祝以下入行掃除如常儀訖引就位賛引引告官以下俱就門外位謁者引告官賛引引執事者入就位立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳告官以下皆再拜其先拜者不拜太官出帥進饌者奉饌陳于西門外初告官入謁者引諸將俱就門外位告官入訖謁者引諸將入就位立定奉禮曰再拜大將以下皆再拜謁者進告官之左白有司謹具請行事還本位諸祝俱取玉幣于篚各立于尊所謁者引告官詣太社壇升自北陛南靣立太祝取玉幣西向授告官受玉幣進南靣跪奠于太社神坐俛伏興少退南靣再拜訖謁者引告官立于東方西靣太祝以幣南向授告官告官受幣進西向跪奠于后土氏神坐俛伏興少退西向再拜訖謁者引告官降自北陛詣太稷壇升奠幣如太社壇之儀訖謁者引還本位諸祝各還尊所太官令引饌入太社稷之饌入自正門配坐之饌入自左闥至陛各由其陛升諸祝迎引于壇上各設于神坐前籩豆盖羃徹之如式施設訖太官令以下降復位諸祝各還尊所謁者引告官詣罍洗盥手洗爵訖謁者引告官詣太社壇升自北陛詣太社酒尊所執尊者舉羃告官酌醴齊訖謁者引告官遂進太社神坐前跪奠俛伏興少退南靣立太祝持版進于神坐之右西靣讀祝文祝文臨時撰訖興告官再拜太祝進跪奠版于神坐俛伏興還樽所告官拜訖謁者引告官詣后土氏酒樽所取爵于坫執樽者舉羃告官酌醴齊訖謁者引告官進后土氏神坐前西靣跪奠爵俛伏興少退西向立太祝持版進于神坐之左南靣跪讀祝文訖興告官再拜太祝進跪奠版于神坐俛伏興還樽所告官拜訖謁者引告官進太社神坐前南向立諸祝各以爵酌酒合置一爵一太祝持爵進告官之右東向立告官再拜受爵跪祭酒啐酒奠爵俛伏興太祝帥齋郎持爼進减神前胙肉共置一爼太祝持爼進西向以授告官告官受以授齋郎告官跪取爵遂飲卒爵太祝進受爵復于坫告官俛伏興再拜訖謁者引告官降自北陛詣罍洗盥手洗爵訖謁者引告官詣太稷壇北陛升獻如太社壇之儀訖引告官降復位初告官詣太稷壇謁者引諸將詣太社壇升自西陛進立于太社神坐前南靣東上初諸將升諸祝帥齋郎以爵酌福酒進諸將之東西靣立諸將皆再拜受爵跪祭酒啐酒奠爵俛伏興諸祝帥齋郎進爼减神前胙肉以次授諸將受以授齋郎諸將俱跪取爵遂飲卒爵太祝帥齋郎受爵復于坫諸將俛伏興再拜訖謁者引諸將各降詣太稷壇飲福受胙如太社壇之儀訖引還本位奉禮曰再拜諸將以下皆再拜謁者引出初諸將出諸祝各進跪徹豆俛伏興還樽所徹者籩豆各一少移于故處奉禮曰賜胙賛者唱再拜在位者皆再拜已飲福受胙者不拜奉禮曰再拜告官以下皆再拜謁者進告官之左白請就望瘞位謁者引告官就望瘞位南向立初告官將拜諸祝各執篚進神坐前跪取玉幣齋郎又以爼載牲體稷黍飯爵酒興各由其陛降壇詣瘞塪以玉帛饌物置于塪訖奉禮曰可瘞埳東西各四人寘土半埳謁者進告官之左白禮畢謁者引告官賛引執事者以次出賛引引御史以下皆再拜賛引引出若凱旋惟陳俘馘及軍實于北門之外南靣東上其告禮如上儀其祝版燔于齋所大唐開元禮卷八十七
