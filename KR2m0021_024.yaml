body:
  text: 大唐開元禮卷二十四唐蕭嵩等撰吉禮皇帝春分朝日於東郊齋戒陳設鑾駕出宫奠玉帛進熟齋戒前祀五日皇帝散齋三日致齋二日凡預祀之官散齋三日致齋二日散齊皆於正寢致齋一日於本司一日於祀所其無本司者皆於祀所近侍之官應從升者及從祀羣官諸方客使各於本司及公館清齋一宿無本司者各於正寢凡散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祀事得行其餘悉斷其祀官已齋而闕者通攝行事光祿卿監取明水火太官令取水於隂鑒取火於陽燧火以供爨水以注玄酒之尊前祀一日諸衛令其屬未後一刻各以其方器服守衛壝門與太樂工人俱清齋一宿陳設前祀三日尚舍直長施大次於外壝東門之內道北南向尚舍奉御鋪御坐衛尉設陳饌幔於內壝東門之外道南北向設文武侍臣次又設祀官及從祀羣官諸州使人蕃客等次太樂令設宫懸之樂於壇南內壝之外設歌鐘歌磬右校掃除壇之內外郊社令積柴於燎壇其壇在神壇之左內壝之外方八尺髙一丈開上南出户方三尺前祀一日奉禮設御位及燎壇位祀官從祀羣官諸州使人蕃客等位於內壝之內皆如圜丘之儀設酒樽之位太樽二著樽二山罍一在壇上於東南隅北向尊皆置於坫俱藉以席加勺羃設爵於尊下設御洗於壇南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍篚羃者各於樽罍篚羃之後設玉幣之篚於壇上樽坫之所晡後謁者引光祿卿詣厨視濯溉又謁者引諸祀官詣厨省饌具訖俱還齋所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血置於饌所遂烹牲青牲一未明五刻太史令郊社令升設大明神坐於壇上北方南向席以藳秸設神坐於坐首鑾駕出宫如圜丘之儀奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各帥其屬入實樽罍玉幣凡尊之次太尊為上實以醴齊著尊次之實以盎齊罍尊實以清酒其玄酒各實於上尊罍尊無玄酒禮神之玉以圭邸其幣以青太官令帥進饌者實諸籩豆簠簋入設於內壝東門之外饌幔內未明二刻奉禮帥贊者先入就位贊引引御史太祝及令史與執樽罍篚羃者入自東門當壇南重行北面西上凡引導者每曲一逡巡立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽者升自東陛立於樽所壇下執樽罍篚羃者各就位贊引引御史太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖就位駕將至謁者贊引各引祀官及從祀羣官諸國客使先至者俱就門外位駕至大次門外回輅南向將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次通事舍人引文武五品以上從祀之官皆就門外位太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸南道西謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行掃除於上降行樂懸於下訖引出就位皇帝停大次半刻頃通事舍人分引從祀文武羣官介公酅公諸國客使先入就位太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝服玄冕出次華蓋侍衛如常儀侍中負寶陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至內壝門外殿中監進大圭尚衣奉御又以鎮圭授殿中監殿中監受進皇帝搢大圭執鎮圭華蓋仗衛停於門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常皇帝至版位西向立每立定太常卿與博士退立於左謁者贊引各引祀官次入就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏舉麾凡取物皆跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏豫和之樂乃以圜鍾之均文舞之舞樂舞六成偃麾戞敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止也太常卿前奏稱再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太祝取玉幣於篚立於樽所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣壇升自南陛侍中中書令以下及左右侍衛量人從升以下皆如之皇帝升壇北向立樂止太祝加玉於幣以授侍中侍中奉玉幣東向進皇帝搢鎮圭受玉幣每受物搢鎮圭奠訖執圭俯伏興登歌作肅和之樂乃以大呂之均太常卿引皇帝進北面跪奠於大明神坐俯伏興太常卿引皇帝少退北向再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止初羣官拜訖祝史奉毛血之豆立於門外於登歌止祝史奉毛血入升自南陛太祝迎取於壇上進奠於神坐前太祝與祝史退立於樽所進熟皇帝既拜奠玉幣太官令出帥進饌者奉饌陳於內壝門外謁者引司徒出詣饌所司徒奉俎初皇帝既至位樂止太官令引饌入俎初入門雍和之樂作以黃鍾之均饌至陛樂止祝史進徹毛血之豆降自東陛以出饌升南陛太祝迎引於壇上設於神坐前籩豆蓋羃先徹乃升簠簋既奠却其蓋於下設訖謁者引司徒以下降自東陛復位太祝還樽所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤興承水皇帝盥手黃門侍郎跪取巾於篚興進皇帝帨手訖黃門侍郎受巾奠於篚黃門侍郎又取匏爵於篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黃門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤匜黃門侍郎受巾奠於篚皆如初太常卿引皇帝樂作皇帝詣壇升自南陛樂止謁者引司徒升自東陛立於樽所齋郎奉俎從升立於司徒之後太常卿引皇帝詣酒樽所執樽者舉羃侍中贊酌醴齊訖夀和之樂作皇帝每酌獻及飲福皆作夀和之樂太常卿引皇帝進大明神坐前北向跪奠爵俯伏興太常卿引皇帝少退北向立樂止太祝持版進於神坐之右東面跪讀祝文曰維某年歲次月朔日子嗣天子臣某敢昭告於大明惟神宣布太陽照臨下土動植咸賴幽隱無遺時惟仲春敬遵常禮謹以玉帛犧齊粢盛庶品祗祀於神尚饗訖興皇帝再拜初讀祝文訖樂作太常卿進奠版於神坐還樽所皇帝拜訖樂止太祝以爵酌上樽福酒授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俯伏興太祝帥齋郎進俎太祝減神前胙肉加於俎太祝持爼以授司徒司徒奉爼西向進皇帝受以授左右謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫皇帝俯伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止皇帝獻將畢謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉自東陛升壇詣著樽所執樽者舉羃太尉酌盎齊武舞作謁者引太尉進大明神坐前北向跪奠爵興謁者引太尉少退北向再拜訖太祝以爵酌罍福酒進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光祿卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光祿卿降復位武舞六成樂止舞獻俱畢太祝進徹豆還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜豫和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作皇帝就望燎位南向立樂止於羣官將拜太祝執篚進神坐前跪取玉帛祝版齋郎以爼載牲醴稷黍飯及爵酒興降自南陛南行經懸內當柴壇南東行自陛南登柴壇以玉幣祝版饌物置於柴上戶內訖奉禮曰可燎東西面各四人以炬燎火半柴太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出內壝門殿巾監前受鎮圭以授尚衣奉御殿中監又前受大圭華蓋侍衛如常儀皇帝入次樂止謁者贊引各引祀官及從祀羣官諸國客使以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出大唐開元禮卷二十四
