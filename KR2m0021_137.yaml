body:
  text: 大唐開元禮卷一百三十七唐蕭嵩等撰凶禮東宫妃聞喪聞父母祖父母喪聞外祖父母喪為諸王妃主舉哀為良娣以下舉哀為宗戚舉哀奔喪奔父母祖父母喪臨喪臨外祖父母喪臨良娣以下喪除喪除父母祖父母喪除外祖父母喪聞喪聞父母祖父母喪皇太子妃為父母祖父母舉哀其日赴喪者至本司散下其禮所司隨職供辦訖舉哀前三刻司則版啓請中嚴掌筵先於别殿東壁下設薦為妃舉哀位西向為祖父母則北壁下南向别殿前設幔幔下北面設良娣以下位西上前二刻女侍臨者集列於閣外便次司則一人升立於殿上東楹之南女史二人立於階下並西面前一刻司則版啓外辦至時妃出升殿侍衛如常典版啓赴聞司則傳啓稱某官若某夫人某日月辰薨妃啼若哭父母啼祖父母哭盡一哀問故又哭盡哀女侍者以司閨下女史充之引良娣以下入各就位司則稱拜女史承傳凡司則有詞女史皆承傳良娣以下在位者皆再拜司則稱哭良娣以下在位者皆哭舉十五聲司則稱止良娣以下皆止司則稱拜良娣以下在位者皆再拜司則稱下女侍者引良娣以下退司則跪啓請哭止妃止從臨者皆止妃退舍别次侍從者侍衛如常於閣哭臨如常禮其日晡臨前二刻啓嚴良娣以下赴集一刻啓辦至時引各復位司則跪奏請哭妃哭臨如初良娣以下皆哭十五舉聲司則稱止皆止但無拜其他如前儀妃為父母之喪舉哀其妃女亦素服引升位於户內之東北面與妃俱哭於良娣以下之退也贊止引退自後奔赴如别禮其有疾故未及奔則自後朝晡赴集啓引即位哭臨如初以至成服右若曽祖髙祖父母薨舉哀與為祖父母同成服三日成服本司散下其禮所司隨職供辦掌筵先於妃舉哀别殿東壁設素下牀席為妃成服位西向為祖父母則北壁南面所司先製妃齊衰周之服又製良娣以下服亦如之其日成服前三刻司則版啓中嚴女侍臨者升列於别殿上哭不絶聲前二刻司則於别殿前幔下整設良娣以下喪位如初又於殿上妃位前設席為奉慰位良娣以下仍初服集列於閣外次女侍者各以篋奉其衰服進授仍贊變服焉司則一人升立於殿上東楹之南女史二人立於階下並西面掌嚴以篋奉衰服升東間北面立成服前一刻司則版啓妃外辦妃仍初服即位侍衛如初司則跪啓請哭妃哭從臨者皆哭十五舉聲司則跪奏請止哭成服妃止掌嚴以篋奉衰服進跪授興乃贊變服焉於變服則權設步障已而去之變服已司則又跪啓請哭妃女侍者引良娣以下入即位司則稱拜良娣以下在位者皆再拜司則稱哭良娣以下在位者皆哭十五舉聲司則稱止良娣以下在位者皆止女侍者引良娣行首一人升詣妃前席位跪奉慰興侍者引降還本位司則稱拜良娣以下在位者皆再拜女侍者引良娣以下退司則跪啓哭止妃止從臨者皆止妃退舍别室如常禮侍從者侍衛如初其日晡臨晡前二刻啓嚴良娣以下赴集一刻啓辦引即位哭臨如初其有妃女應成服者則製小功五月之服引升即位如初與妃俱成服哭臨先拜慰如良娣之儀于良娣之退贊止引退自後朝晡哭臨以至卒哭若公除則加别禮其為曽祖髙祖父母則與良娣以下俱成齊衰三月之服如常禮聞外祖父母喪右與聞祖父母喪禮同其異者於别宫次其日晡臨後三朝哭臨而止為外祖父母成服右與為祖父母成服禮同其異者與良娣以下俱成小功五月之服為諸王妃主舉哀右與為祖父母舉哀禮同本服大功者其日晡臨而止小功以下一舉哀而止為良娣以下舉哀右與為諸王妃主舉哀禮同其良媛以下則一舉哀而止為宗戚舉哀右與為諸王妃主舉哀禮同其日內外應奉慰者赴集啓引即上下位次哭臨撫慰及拜哭奉慰如常禮自後皆然其日官等應奉慰者赴集宫官門奉慰如常禮自後皆然奔喪奔父母祖父母喪本司散下其禮所司隨職供辦守宫先設行宫便次於主人大門內之右南向又於便殿之後及左右廂量設良娣以下及陪從者便次如式喪寢前設障幔為良娣以下拜哭次主人五屬之親於妃未至之前列於主人第其日出宫前四刻司則版奏請中嚴出宫前三刻諸率等備列常行仗衛鹵簿於所出宫門外內如常儀出宫前二刻導客舍人於主人第喪寢尸西若殯西設薦席為妃哭位東向其奔祖父母喪則户內西南廂北面導客舍人又於喪寢庭幔下北面重行設良娣以下拜哭位次北面西上其良娣以下陪從者各服素服集列以俟陪從如常已成服則服衰服內廏尉進堊車其仗衛鹵簿並以次整列於所出宫門外內如常儀出宫前一刻司閨以下應陪從者並以次進迎如常小輿進於內庭至時司則入殿啓外辦妃仍舉哀之服升輿出已成服則服衰服三面周以白布帷至閣外妃降輿升堊車內廏尉執御典內以下前導夾引與司閨以下乘車陪從如常儀以下應從者乘車以次序從如常仗衛夾引妃哭從臨者隨哭不絶聲於妃未到之前司儀贊主人內外五服之親並出就前堂哭其位如殯堂之儀導客舍人一人升立於喪寢東楹之南內給使二人立于階下並西面妃至主人第降車所司則啓請降入妃降車仍哭入自闈門三面周以行帷從臨者仍哭從不絶聲司閨以下哭從如初侍者夾扶主人降詣東階之南仍立哭其奔祖父母喪則主人仍立哭以侍衆主人並立于主人之後西面北上立哭以服精粗為序妃至喪寢庭主人哭止再拜仍立哭女侍者扶引妃哭升自西階進尸西跪憑尸撫心哭從臨者仍哭於妃之升也導客舍人引良娣以下從奔者各權舍於便次其仗衛鹵簿屯於外內如常主人以下應升者升各即位哭妃哭盡一哀仍扶引即位哭臨從者仍哭若已殯則先進靈前跪慿靈哭盡哀啓引退西面拜仍即位哭導客舍人引良娣以下入即班位導客舍人稱拜給使承傳唱可拜凡舍人有詞給使皆承傳良娣以下在位者皆再拜導客舍人稱哭良娣以下在位者皆哭十五舉聲導客舍人稱止良娣以下在位者皆止若已成服則引行首升慰皆如常禮導客舍人稱拜良娣以下在位者皆再拜訖導客舍人引良娣以下退還便次司則跪啓妃哭止妃止從臨者皆止妃退降即便次典內版啓解嚴將士仍不得輒離部列其成服已則宫官等應奉慰者並赴奉慰如常禮自後妃依時哭臨如常禮其為父若祖父喪則自後啓引哭于後寢次其未成服而奔則至成服日即與主人俱成服其奔父母之喪則成服而還宫其有别敕令還宫則隨㫖期其未即還宫也其良娣以下及鹵簿仗衛應還者先還留者與妃依時哭臨及成服則如妃之禮于妃還宫日之朝也諸應奉迎之官及仗衛鹵簿等並赴主人第奉迎如式于妃還宫車發前三刻司則版啓請中嚴諸率等整列仗衛鹵簿於還塗如來儀至時司則版啓外辦妃哭拜訖主人以下各列本次拜哭如初其尊及長則不降拜司閨扶引妃降出侍從如初妃至中門啓哭止升車從臨者皆止三面周以行帷良娣以下乘車序從如初妃至閣外司則跪啓請降入妃降車升輿入典內以下部從至閣如初典內版啓請解嚴諸列鹵簿者各還其所自後赴葬及練祥則出入如初禮皇太子妃於祖父母若父母之葬不赴葬則於啓日之朝也與良娣以下服衰服啓引各即上下位次哭臨拜慰如初若父在若祖父在為母若祖母之喪十一月而小祥則與良娣以下於位次行變除之禮易以練總除腰絰哭臨受慰如常禮其禀㫖行公除之禮則十三日而除其行除禮如别條臨喪臨外祖父母喪右與奔祖父母喪禮同其異者乘常行之車其仗衛羽儀之屬則如平常而位於喪寢中之西北壁下南面即位乃哭其主人內外五屬之親並哭於喪寢前後庭應升者如太子臨外祖父母喪主人以下待之禮皇太子妃每出臨若須嚴鼓並須准所臨逺近及仗衛備略備如常略不備也禀㫖在於當時臨良娣以下喪妃臨良娣以下之喪本司散下其禮所司隨職供辦降臨前二刻司則版啓請中嚴掌嚴先於喪寢中間北廂設素下牀席為妃哭位南向腰輿進於內庭降臨前一刻司則版啓外辦妃素服升輿出常侍從者侍衛如常至喪所降輿升喪寢即位坐哭侍從者侍衛如常妃之將至也女侍者啓引亡者之子降東階之南西面再拜已成服則去杖又女侍者啓引亡者之女出北户降寢北面再拜引並升復位哭如初司則跪啓請哭妃哭從臨者皆哭十五舉聲跪啓止撫慰妃止女侍者引亡者之子詣前跪哭妃撫慰之子興再拜引退復位又引亡者之女如上禮司則跪啓興還妃升輿引降還侍衛如初於妃之降也啓引亡者之子降拜引升復位哭女侍者啓引亡者之女降拜引升復位哭並如初除喪除父母祖父母喪妃除父母祖父母喪服之制本司散下其禮所司隨職供辦所司先製妃及良娣以下素服導客舍人先於别殿閣外整設良娣以下便次如初又于别殿前整障幔為良娣以下拜哭次以十三月而除服于除服前之夕晡臨已有司除其故位次而設新下牀席焉其日平明後而除服前三刻司則版啓中嚴女侍臨者升於别殿上哭臨如初除服前三刻司則于别殿前幔下整設良娣以下位次又于殿上妃位前設席為跪奉慰位良娣以下仍衰服集列於閣外便次女侍者以篋奉其素服進授仍贊變除焉司則一人升立於堂上東楹之南女史二人立於堂下並西面掌嚴以篋奉素服升東間北面立前一刻司則版啓外辦妃仍服衰服引出升即位次常侍從者侍衛如初妃哭從臨者皆哭十五舉聲司則跪啓哭止從禮制除服妃止掌嚴者以篋奉素服進跪授興仍贊變除焉於變服則權設步障已而去之其侍臨者亦從變除變除已司則又稱拜女史承傳唱可拜凡司則有詞女史皆承傳良娣以下在位者皆再拜司則稱哭良娣以下在位者皆哭十五舉聲司則稱止女侍者引良娣行首一人升進跪前席位跪奉慰興女侍者引降還本位司則稱拜良娣以下在位者皆再拜女侍者引良娣以下各出還宫寢如常禮司則跪啓請哭止還妃哭止從臨者皆止妃降還內寢侍衛如初除外祖父母喪服右與除祖父母喪服禮同其異者行公除之禮則五日而除大唐開元禮卷一百三十七
