body:
  text: 大唐開元禮卷二十七唐蕭嵩等撰吉禮秋分祀月於西郊有司攝事齋戒陳設奠玉帛進熟齋戒前祀五日諸預祀之官散齋三日致齋二日散齋皆于正寢致齋一日于本司一日于祀所其無本司者並于祀所凡散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祀事得行其餘皆斷其祀官已齋而闕者通攝行事諸祀官致齋之日給酒食及明衣各習禮扵齋所光祿卿監取明水火太官令取水于隂鑒取火于陽燧火以供爨水以實尊前祀一日諸衛令其屬未後一刻各以其方器服守衛壝門每門二人每隅一人與太樂工人俱清齋一宿陳設前祀三日守宫設祀官公卿以下次於東壝之外道南北向以西為上設陳饌幔于内壝東門之外道南北向前祀二日太樂令設宫懸之樂于壇南内壝之内東方西方磬􅙇起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于編懸之間各依辰位樹雷鼓于北懸之内道之左右植建鼓于西隅置柷敔于懸内柷在左敔在右設歌鐘歌磬于壇上近南北向磬簴在西鐘簴在東其匏竹者立于壇下重行北向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以北為上右校埽除壇之内外郊社令積柴于燎壇其壇于神壇之左外壝之内方八尺髙一丈開上南出户方三尺前祀一日奉禮設祀官公卿位于内壝東門之内道北執事位于道南每等異位俱重行西向北上設御史位于壇外一位于東南西向一位于西南東向令史各陪其後設奉禮位于樂懸東北賛者二人在南差退俱西向設恊律郎位于壇外南陛之西東向設太樂令位于北懸之間設祀官公卿以下門外位皆于東壝之外道南每等異位重行北面西上設酒樽之位太樽二著樽二山罍一在壇上東南隅北向樽皆置于坫加勺羃設爵于樽下設洗于壇南陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍篚羃者各于樽罍篚冪之後設玉幣之篚于壇上樽坫之所晡後謁者引光祿卿詣厨視濯溉賛引引御史詣厨省饌具光祿卿以下每事訖各還齋所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血置于饌所遂烹牲白牲一未明五刻太史令郊社令各服其服升設夜明神坐于壇上北方南向席以藁秸設神坐于坐首奠玉帛祀日未後三刻諸祀官各服其服郊社令良醖令各帥其屬入實樽罍及玉幣凡尊之次太尊為上實以醴齊著尊次之實以盎齊山罍為下實以清酒齊皆加明水酒加𤣥酒各實于上尊祀神之玉以珪璧其幣以白長一丈八尺太官令帥進饌者實諸籩豆簋簠等皆設于饌幔内未後四刻奉禮帥賛者先入就位賛引引御史博士太祝及令史祝史與執樽罍篚羃者入自東門當壇南重行北面西上凡引導者每曲一逡廵立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳御史以下皆再拜訖執樽者升自東陛立於樽所壇下執樽罍篚羃者各就位賛引引御史太祝詣壇東陛升行埽除於上太史祝史行埽除於下訖引降就位未後五刻太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西其升壇者皆脱履於下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行埽除於上降行樂懸於下訖引復位初司空入謁者引祀官賛引引執事者俱就壝外位司空行埽除訖謁者賛引各引祀官以次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之右贊有司謹具請行事退復位協律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼓柷奏豫和之樂乃以圜鐘之均自後壇下之樂皆奏圜鐘文舞之樂樂舞六成偃麾戛敔樂止凡樂皆協律郎舉麾工鼔柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官在位者皆再拜太祝取玉幣於篚立於樽所謁者引太尉詣壇升自南陛北向立太祝以玉幣東向授太尉太尉受玉幣登歌作肅和之樂乃以大吕之均謁者引太尉進北面跪奠于夜明神坐俛伏興謁者引太尉少退北向再拜訖登歌止謁者引太尉降自南陛還本位初衆官拜訖祝史奉毛血之豆立于門外于登歌止祝史奉毛血入升自南陛太祝迎取于壇上進奠于神坐前太祝與祝史退立于樽所進熟太尉既升奠玉帛太官令出帥進饌者奉饌陳于内壝門外謁者引司徒出詣饌所司徒奉俎太祝既奠毛血太官令引饌入俎初入門雍和之樂作以黄鐘之均饌至陛樂止祝史進徹毛血之豆降自東陛以出饌升南陛太祝迎引于壇上設于神座前籩豆盖羃先徹乃升簋簠既奠却其盖于下設訖謁者引司徒以下降自東陛復位太祝還樽所謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉升自南陛詣酒樽所執樽者舉冪太尉酌醴齊訖樂作謁者引太尉進夜明神坐前北向跪奠爵興謁者引太尉少退北向立樂止太祝持版進于神坐之右東面跪讀祝文曰維某年嵗次月朔日子嗣天子臣某謹遣太尉臣封臣名敢昭告于夜明惟神昭著懸象煇燿隂精班歴授時仰觀取則爰兹秋仲用率恒禮謹以玉帛犧齊粢盛庶品祗祀于神尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版于神坐還樽所太尉拜訖樂止太祝以爵酌罍福酒進太尉之右西向立太尉再拜受爵跪祭酒啐酒奠爵興太祝帥齋郎進爼太祝减神前胙肉取前脚第二骨加于俎太祝持俎西向授太尉太尉受以授齋郎太尉跪取爵遂飲卒爵太祝進受爵復于坫太尉興再拜謁者引太尉降復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止初太尉將復位謁者引太常卿詣罍洗盥手洗匏爵訖謁者引太常卿東陛升壇詣著樽所執樽者舉羃太常卿酌盎齊武舞作謁者引太常卿進夜明神坐前北向跪奠爵興謁者引太常卿少退北向再拜訖太祝以爵酌罍福酒進太常卿之右西向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復于坫太常卿興再拜謁者引太常卿降復位初太常卿獻将畢謁者引光禄卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光禄卿降復位武舞止太祝進徹豆還樽所徹者籩豆各一少移于故處奉禮曰賜胙賛者唱衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之左白請就望燎位謁者引太尉就望燎位南向立于衆官將拜太祝執篚進取玉幣祝版齋郎以俎載牲體稷黍飯爵酒降自南陛經懸内南行當柴壇南東行自南陛登柴壇以玉帛祝版饌物置于柴上户内訖奉禮曰可燎東西兩面各四人以炬燎火半柴謁者進太尉之左白禮畢謁者引太尉出又謁者賛引各引祀官以次出賛引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出工人二舞以次出大唐開元禮卷二十七
