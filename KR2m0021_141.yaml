body:
  text: 大唐開元禮卷一百四十一唐蕭嵩等撰凶禮三品以上喪之四改𦵏卜宅啟請開墳舉柩奠升柩車斂奠設靈筵進引告遷哭柩車位設遣奠轜車發宿止到墓虞祭卜宅將改葬者吉服卜宅兆其餘如葬卜宅兆之儀預於𡑞所隨地之宜張白布帷幕南向開户啟請其日請内外親應集者皆至墓所各就便次主人衆主人妻妾女子子俱緦服餘期親以下皆素服丈夫於墓東西向婦人於墓西東向皆北上婦人障以行帷俱立哭盡哀卑者再拜開墳祝立於羡道南北向内外皆哭止祝三聲噫嘻啟以開墳改葬之故其意叙改葬所由之事隨時爲之内外又哭盡哀權就别所掌事者開墳訖内外又就位哭如初舉柩掌事者設席於幕下舉柩出置於席上内外從柩哭於幕所主人以下柩東西面主婦以下柩西東面俱南上丈夫期親以下於主人東北南面西上婦人期親以下於主婦西北南面東上外姻丈夫於主人東南北面西上婦人於主婦西南北面東上尊者坐國官於帷門外之東北靣西上僚佐於帷門外之西北靣東上皆舒席為位奠祝以布拭棺改加新楮設洗於幕西南隅罍水在洗西加勺羃篚在洗東南肆實巾二爵一於篚加羃設席於柩東設啟奠於席上設醴酒之樽於饌南主人詣罍洗盥手洗爵進爵酒於席上興少退西面再拜内外卑者俱再拜少頃徹奠升柩車既奠進轜車於帷門外南向掌事者升柩於轜車遂詣施設所内外俱哭從掌事者預設床於幕下有枕席周設帷柩車至帷門外丈夫於柩東婦人於柩西俱立哭掌事者舉柩降柩置於輴入設於牀東若于墓所即斂初奠訖不進轜車設牀于柩東而加枕席遂舉尸以斂之舉尸出置於牀南首柩初入定内外就位哭如墓前之儀斂陳衣於幕東帷内明衣裳及上服各一稱西領南上冕具導簪纓在北内喪則花釵衾一衾以黄為表素為裏具饌於東兩甒醴酒柩初至幕下舉尸於床主人衆主人稍退仍西向妻妾女子子稍退仍東向遂斂丈夫加冕婦人以花釵又覆以衾主人衆主人妻妾女子子憑哭斂將訖掌事者以棺入設於西廂藉以席於棺入内外皆止哭置棺定乃哭舉者四人入舉牀男女従奉舉尸斂於棺乃加葢覆以衾設帷於棺東内外就位哭如初奠既斂祝執中几席入設於柩東右几加以巾掌事者設罍洗於幕西南隅如初祝以饌升設於席前施設訖執饌者降出相者引主人盥手酌酒進奠於席前興少退西面再拜内外卑者皆再拜訖主人以下各退就位俱坐哭設靈筵既斂設靈於吉帷内幕下西廂東向施床帷屏几服飾以時上膳羞及湯沐皆如平常進引前一日之夕掌事者進轜車於凶帷外當門南向其下帳明器及苞牲等輿陳於轜車前少西東向其日進引前量時刻搥一皷為一嚴陳靈車儀仗如常在陳車篇少頃搥二皷為再嚴侍靈者俱詣靈所腰輿威儀入陳如常進靈車於帷外南向少頃搥三皷為三嚴掌事者入徹饌以出内外皆興立哭於位執披紼者入掌事者徹帷持翣者入以翣障柩執披紼者各進執鐸者各入夾於柩前東西相向執纛者立於鐸南執銘旌者又立於纛南北向諸執披紼繹旌纛者皆布深衣介幘告遷三嚴訖祝帥腰輿入詣靈座前西面告曰以今吉辰用即宅兆少頃輿出詣靈車後少頃退若内喪女祝迎執紼者引輴旌先纛次鐸次而引輴初動執鐸者皆振鐸毎振鐸必先搖之搖訖三振之其持翣者恒以翣障柩於輴車進執鐸者夾左右每曲及進止皆振鐸内外俱從柩後柩出到轜車後執紼者觧紼屬於轜車設帷障於輴車後掌事者升柩哭柩車位丈夫俱立哭於轜車東重行西面婦人哭於轜車西重行東面俱南上外姻丈夫哭於轜車東南重行北面以西為上婦人哭於轜車西南重行北面以東為上國官哭於外姻之東北面西上僚佐哭於國官之西北面南上立哭設遣奠設遣奠之饌於轜車東置設訖相者引主人酌酒進奠於席上興少退西面哭皆拜内外皆哭卑者再拜若食頃徹之以蒲葦包牲體下節七苞載於輿以之墓轜車發既徹奠吉凶儀仗依式進引靈車動鼓吹振作而行主人衆子以下皆以次步從哭於柩車後妻妾女子子以下皆步從哭於丈夫之後障以行帷轜車去停所三百步親賓有還者弔哭如别儀辭訖進引尊者乘車馬從柩更哭不絶聲宿止掌事者預於宿所張吉凶帷幕吉帷在左凶帷在右將至宿所尊者俱下車馬步哭靈車到帷門外迴南向祝帥腰輿詣車後少頃輿入詣靈座前少頃輿出進常食於靈座若食頃徹之柩車至于凶帷内外哭于柩車所其位如初掌饌者進酒脯之奠于柩車東席上既設奠内外各還次更哭不絶聲及墓内外俱就位哭進夕奠如初訖内外各還次迭哭終夜及明嚴皷内外又就位哭進朝奠於柩東進常食於靈座食頃徹之迎靈發引尊者乘車馬哭從如上儀到墓到墓尊者俱下車馬靈車到帷門外迴南向祝帥腰輿詣車後少頃輿入詣靈前少頃輿退設酒脯之奠柩車至壙前廽南向内外哭位如遣奠之儀掌事者布席張帷於柩車後下柩於輴主人以下妻妾女子子各前撫柩哭盡哀退復位期親以下又前撫哭盡哀退復位俱再拜辭執紼者屬紼於輴掌事者下柩於壙輴出既窆親賓先還者弔哭如别儀國官之長奉𤣥纁束帛授主人主人受以授祝主人稽顙再拜祝奉以入奠於柩東持翣者入倚翣於壙内兩廂執事者以下帳明器苞牲酒米等物入置於壙内皆藉以版施銘旌誌石於壙户内置設訖掌事者掩壙户加闗鑰覆土既覆土内外俱就靈所哭墓左祭后土如始𦵏之儀虞祭初下柩於墓掌事者具虞祭之饌設罍洗篚於靈墓西南如常内外既就靈所哭掌饌者進虞祭之饌於靈座相者引主人盥洗酌酒進奠於座前興少退西面立内外皆止哭祝持版進立於靈座之右北面跪讀祝文曰維年月朔日辰孝子某敢昭告於考某官封諡妣云夫人某氏改遷幽宅禮畢終虞夙夜匪寜啼號罔極謹以潔牲柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊祗薦虞事於考某官封諡尚饗主人哭再拜内外皆哭卑者再拜盡哀相者引主人以下出就别所釋衰服著素服而還掌饌者徹饌掌事者徹靈座大唐開元禮卷一百四十一
