body:
  text: 大唐開元禮卷八十九唐蕭嵩等撰軍禮祀馬祖享先牧祭馬社祭馬步仲春祀馬祖將祀有司卜日如别儀前祀三日諸預祀之官散齋二日致齋一日散齋于正寢致齋于祀所散齋理事如舊惟不弔喪問疾不作樂不行刑罰不判署刑殺文書不預穢惡致齋惟祀事得行其餘悉斷其祀官已齋而闕者通攝行事前二日守宫設祀官次于東壝之外道南北向以西為上設陳饌幔于內壝之外郊社令積柴于燎壇方五尺髙五尺南出户太官令具特牲之饌其日未明二刻太史郊社令升設馬祖神坐于壇上近北南向席以莞設神位於坐首奉禮設獻官位于壇東南西向執事位于獻官東南俱西向北上設奉禮位于獻官西南贊者二人在南差退又設奉禮贊者位于燎壇東北俱西向北上設望燎當柴壇之北南向設祀官以下門外位于東壝之外道南每等異位重行北向以西為上郊社令設酒樽于壇上東南隅北向設洗于壇東南北向罍水在洗東篚在洗西南肆篚實巾爵執樽罍篚羃者各位于樽罍篚羃之後設幣篚于樽坫之所未明一刻太祝獻官以下各服其服郊社與良醖之屬入實樽罍及幣質明謁者引獻官以下俱就門外位奉禮帥贊者先入就位贊引引太祝與執樽罍篚羃者入當壇南重行北靣以西為上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳太祝以下皆再拜太祝與執樽者升自東階立于樽所執罍洗篚羃者各就位謁者引獻官以下入就位立定奉禮曰再拜在位者皆再拜謁者進獻官之左白有司謹具請行事退復位太官令出詣饌所太祝跪取幣于篚興立于樽所謁者引獻官詣神坐前北向立太祝奉幣東向授獻官受幣進北靣跪奠于神坐俯伏興少退北向再拜謁者引獻官還本位太官令引饌入升自南陛太祝迎引于壇上設于神坐前設訖太官令以下降復位太祝還樽所謁者引獻官詣罍洗盥手洗爵訖謁者引獻官升自南陛詣酒樽所執樽者舉羃獻官酌醴齊謁者引獻官進神坐前北向跪奠爵俯伏興少退北向立太祝持版進于神坐之右東靣跪讀祝文曰維某年歲次月朔日天子謹遣具官臣姓名告于馬祖天駟之神爰以春季遊牝于牧祗薦制幣犧齊粢盛庶品明薦于馬祖天駟之神尚享訖興獻官再拜太祝進跪奠版于神坐俯伏興還樽所太祝以爵酌福酒進獻官之右西向立獻官再拜受爵跪祭酒遂飲卒爵太祝進受爵復于坫獻官俯伏興太祝帥齋郎進爼太祝減神前胙肉興以授獻官受以授齋郎謁者引獻官降自南陛還本位太祝進跪徹豆俯伏興還樽所徹者籩豆各一少移于故處奉禮曰再拜在位者皆再拜已飲福受胙者不拜奉禮又曰再拜在位者俱再拜謁者進獻官之左白請就望瘞位謁者引獻官就望瘞位南向立奉禮又帥贊者退立于燎壇東北位太祝進神坐前取制幣祝版爵酒又以爼載牲體稷黍飯興降自南陛南行當柴壇東南行自南陛登柴壇以幣酒祝版饌置柴上訖奉禮曰可燎東西面各二人以炬燎火起以炬投壇上火半柴謁者進獻官之左白禮畢遂引獻官以下出奉禮帥贊者還本位贊引引太祝以下俱復執事位立定奉禮曰再拜太祝以下皆再拜贊引引出仲夏享先牧將享有司筮日如别儀前享三日預享之官散齋二日于正寢致齋一日于享所右校掃除壇之內外又為瘞坎于壇之壬地方深取足容物衛尉設享官次于東壝之外道南北向以西為上太官令具特牲之饌其日未明二刻太史令郊社令設升先牧神坐于壇上近北南向席以莞設神位于坐首奉禮設獻官位于壇東南西向執事位于獻官東南俱西向北上設奉禮位于獻官西南贊者二人在南差退俱西向北上又設奉禮贊者位于瘞塪西南東靣南上設望燎位于壇之西南北向設享官以下門外位于東壝之外道南每等異位重行北向以西為上郊社令設酒樽于壇上東南隅北向設洗于壇東南北向罍水在洗東篚在洗西南肆篚實巾爵執樽罍篚羃者各位于樽罍篚羃之後設幣篚于尊坫之所未明一刻享官以下各服其服郊社令太官令與良醖之屬入實樽罍及幣質明謁者引獻官以下俱就門外位奉禮帥贊者先入就位贊引引太祝與執樽罍篚羃者入當壇南重行北靣以西為上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳太祝以下俱再拜祝與執事者升自東陛立于樽所執樽罍篚羃者各就位謁者引獻官以下入就位立定奉禮曰再拜在位者皆再拜謁者進獻官之左白有司謹具請行事退復位太官令出詣饌所太祝跪取幣于篚興立于尊所謁者引獻官詣神坐前北向立太祝奉幣東向授獻官受幣進北靣跪奠於神坐俯伏興少退北向再拜謁者引獻官還本位太官令引饌入升自南陛太祝迎引於壇上設於神坐前設訖太官令以下降復位祝還樽所謁者引獻官詣罍洗盥手洗爵訖謁者引獻官升自南陛詣酒樽所執樽者舉羃獻官酌酒謁者引獻官進先牧神坐前北向跪奠爵俯伏興少退北向立太祝持版進神坐之右東向跪讀祝文曰維某年歲次月朔日子嗣開元神武皇帝遺具官臣姓名敢昭告於先牧之神惟神肇開牧養厥利無窮式因頒馬爰以制幣犧齊粢盛庶品明薦於先牧之神尚享訖興獻官再拜太祝進跪奠版於神坐俯伏興還樽所太祝以爵酌福酒進獻官之右西向立獻官再拜受爵跪祭酒遂飲卒爵祝進受爵復於坫獻官俯伏興太祝帥齋郎進俎太祝減神前胙肉以授獻官獻官受以授齋郎謁者引獻官降自南陛還本位太祝進跪徹豆俯伏興還樽所徹者籩豆各一少移於故處奉禮曰再拜在位者皆再拜已飲福受胙者不拜奉禮曰再拜在位者俱再拜謁者進獻官之左白請就望瘞位謁者引獻官就望瘞位北向立奉禮帥贊者又就瘞塪西南位太祝進神坐前跪取幣爵酒又以俎載牲體稷黍飯興降自南陛北行當瘞塪西行至塪以幣酒饌置於坎訖奉禮曰可瘞東西面各二人置土半塪謁者進獻官之左白禮畢遂引獻官以下出奉禮帥贊者還本位贊引引太祝俱復執事位立定奉禮曰再拜太祝以下皆再拜贊引引出其祝版焚於齋坊仲秋祭馬社薦享之儀並與先牧同其祝文曰維某年歲次月朔日子嗣開元神武皇帝遣具官姓名敢昭告於馬社之神惟神肇教人乘用賴於今式因肆僕爰以制幣犧齊粢盛庶品明薦於馬社之神尚饗仲冬祭馬步薦享之儀並與先牧同其祝文曰維某年歲次月朔日開元神武皇帝謹遣具官姓名敢昭告於馬步之神惟神為國所重在於間牧神其屏兹凶慝使無有害載因獻校爰以制幣犧齊粢盛庶品明薦於馬步之神尚饗大唐開元禮卷八十九
