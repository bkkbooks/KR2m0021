body:
  text: 大唐開元禮卷四十七唐蕭嵩等撰吉禮孟春吉亥享先農於藉田有司攝事齋戒陳設享饋齋戒凡預享之官散齋三日致齋二日散齋皆於正寢致齋一日於本司一日於享所其無本司皆於享所散齋理事如舊唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯享事得行其餘悉斷其享官已齋而闕者通攝行事光禄卿監取明水火太官令取水於隂鑒取火於陽燧火以供爨水以實尊前享一日諸衛令其屬未後一刻各以其方器服守衛壝門每門二人每隅一人與太樂工人俱清齋一宿陳設前享三日右校掃除壇之内外又為瘞埳於壇之壬地外壝之内方深取足容物南出陛前享二日衛尉設享官公卿以下次於外壝東門之外道南北向以西為上設饌幔於内壝東門之外道南北向大樂令設宫懸之樂於壇南内壝之内東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹路鼔於北懸之内道之左右植建鼔于四隅置柷敔於懸内柷在左敔在右設歌鐘歌磬於壇上近南北向磬簴在西鐘簴在東其匏竹者立於壇下重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以南為上南方北方以西為上前享一日奉禮設享官公卿位於内壝東門之内道北執事位於道南每等異位重行西面以北為上設望瘞位於壇之西南當瘞埳北向設御史位於壇之下一人位於東南西向一人位於西南東向令史各陪其後設奉禮位於樂懸東北贊者二人在南差退俱西向北上又設奉禮贊者位於瘞埳西南東面南上設協律郎位於壇上南陛之西東向設太樂令位於北懸之間當壇北向設享官公卿以下門外位皆於東壝之外道南毎等異位重行北面以西為上設酒樽之位於壇上神農氏犧尊二象尊二山罍二在東南隅北向后稷氏犠尊二象尊二山罍二在神農氏酒尊之東俱北向西上尊俱置於坫皆加勺羃設爵于尊下設洗於壇上南陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵執尊罍篚羃者各位於尊罍篚羃之後各設幣篚於壇上尊坫之所晡後謁者引光禄卿詣厨視濯溉又謁者引諸享官詣厨省饌具訖還齋所享日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血置於饌所遂烹牲未明五刻太史令郊社令升設神農氏神坐於壇上北方南向設后稷氏神坐於東方西向席俱以莞設神位各於坐首饋享享日未明三刻諸享官各服其服郊社令良醖令各帥其屬入實樽罍及幣犧尊實以醴齊象尊實以盎齊其𤣥酒各實于兩齊之上尊山罍實以清酒禮神之幣皆以青太官令帥諸進饌者實諸籩豆簋簠入陳於東門之外饌幔内未明二刻奉禮帥贊者先入就位贊引引御史諸太祝及令史祝史與執尊罍篚羃者入自東門當壇南重行北面西上凡導引者毎曲一逡巡立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽者升自東陛立於尊所壇下執樽罍篚羃者各就位贊引引御史諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖引降就位未明一刻太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行掃除於上降行樂懸於下訖引還本位初司空入謁者引享官贊引引執事者俱就壝外位司空行掃除訖謁者贊引各引享官以次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事還本位協律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼔柷以角音奏永和之樂以姑洗之均作文舞之舞樂舞三成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官皆再拜諸太祝俱取幣於篚各立於尊所謁者引太尉詣壇升自南陛北向立太祝以幣東向授太尉受幣登歌作肅和之樂乃以南吕之均謁者引太尉進北面跪奠於神農氏神坐興謁者引太尉少退北向再拜謁者引太尉立于西方東向又太祝奉幣北向授太尉受幣謁者引太尉進東面跪奠於后稷氏神坐興謁者引太尉少退東向再拜訖登歌止謁者引太尉降自南陛還本位初群官拜訖祝史奉毛血立于門外登歌止祝史奉毛血升自南陛配坐升自東陛太祝迎取于壇上進奠于神坐前太祝興祝史退立于尊所太尉既升奠幣太官令出帥進饌者奉饌陳于内壝東門之外謁者引司徒出詣饌所司徒奉神農之俎太官令引饌入俎初入門雍和之樂作自後酌獻皆作雍和饌至陛樂止祝史跪徹毛血之豆降自東陛以出神農氏之饌升自南陛配坐饌升自東陛諸太祝迎引於壇上各設於神坐前籩豆盖羃先徹乃升簋簠既奠却其盖于下設訖謁者引司徒以下降復位諸太祝各還尊所謁者引太尉升自南陛詣神農氏酒尊所執尊者舉羃太尉酌醴齊訖樂作謁者引太尉進神農氏神坐前北向跪奠爵興謁者引太尉少退北向立樂止太祝持版進於神坐之右東面跪讀祝文曰維某年歳次月朔日子嗣皇帝臣某謹遣太尉封臣名敢昭告于神農氏獻春伊始東作方興率由典則恭事千畆謹以制幣犧齊粢盛庶品肅偹恒祀陳其明薦以后稷配神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進跪奠版於神坐興還尊所太尉拜訖樂止謁者引太尉詣后稷氏酒樽所取爵于坫執尊者舉羃太尉酌醴齊訖樂作謁者引太尉進后稷氏神坐前東向立樂止太祝持版進於神坐之左北面跪讀祝文曰維某年歳次月朔日子嗣開元神武皇帝某謹遣太尉封臣名敢昭告于后稷氏土膏覛起爰循耕籍式陳明薦于帝神農氏惟神功叶稼穡實允昭配謹薦制幣犧齊粢盛庶品作主侑神尚饗訖興太尉再拜初讀祝文訖樂作太祝進跪奠版于神坐興還尊所太尉拜訖樂止謁者引太尉進神農氏神坐前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒啐酒奠爵興太祝帥齋郎奉俎太祝減神農前三牲胙肉加於俎又以籩取稷黍飯興以胙肉共置一俎上又以飯共置一籩太祝先以飯籩授太尉太尉受以授齋郎又以俎授太尉太尉毎受以授齋郎太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位文舞出鼔柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止初太尉獻將畢謁者引太常卿詣罍洗盥手洗爵訖謁者引太常卿自東陛升壇詣神農氏象尊所執尊者舉羃太常卿酌盎齊訖武舞作謁者引太常卿進神農氏神坐前北向跪奠爵興謁者引太常卿少退北向再拜謁者引太常卿進神農氏神坐前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太常之右西向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太常卿興再拜謁者引太常卿降復位初太常卿獻將畢謁者引光禄卿詣罍洗盥洗訖升酌盎齊終獻如亞獻之儀訖謁者引光禄卿降復位武舞六成舞獻俱畢諸太祝各進跪徹豆還尊所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之左白請就望瘞位謁者引太尉就望瘞位北向立於衆官將拜訖諸太祝各持篚進神坐前跪取幣齋郎以俎載牲體稷黍飯爵酒興各由其陛䧏壇詣瘞埳以幣饌物置於埳訖奉禮曰可瘞埳東西廂各四人寘土半埳謁者引太尉出又謁者贊引各引享官以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出其祝版燔於齋坊大唐開元禮卷四十七
