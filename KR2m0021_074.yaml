body:
  text: 大唐開元禮卷七十四唐蕭嵩等撰吉禮諸太子廟時享齋戒陳設晨祼饋食齋戒將享有司卜日如别儀凡與享之官散齋二日致齋一日散齋皆于正寢致齋于享所散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟享事得行其餘悉斷其享官以下已齋而闕者通攝行事諸享官致齋之日給酒食及明衣各習禮于齋所前享一日諸衛令其屬未後一刻各以其方器服守衛廟門每門一人與太樂工人俱清齋一宿陳設前享二日右校清掃內外守宫設享官以下次于齋坊之內前享二日太樂令設軒懸之樂于廟庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設三鎛鐘于編懸之間各依辰位樹路鼓于北懸之間植建鼓于三隅置柷敔于懸內柷在左敔在右設歌鐘歌磬于廟堂之上前楹間北向磬簴在西鐘簴在東其匏竹者立于堂下階間重行北向相對為首凡懸皆展而編之諸工人各位于懸後前享一日奉禮設享官以下位于東門之內道北執事位于道南每等異位俱重行西向以北為上設奉禮位于樂懸東北贊者一人在南差退俱西向設協律郎位于廟堂之上前楹間近西東向設太樂令位于樂懸之間北向設門外位享官以下于東門外道南每等異位北向西上前享一日晡前三刻廟令帥府史齋即以樽坫罍洗篚羃入設于位其籩豆鉶登陳于廟堂之東加以巾蓋籩豆各十登四爼二玉瓉一簠簋各二蕭蒿坫盤各一罍洗各一設器物者皆濯而陳之晡後三刻贊引引博士詣省視濯溉還樽所享日未明十五刻太官令帥宰人以鸞刀割牲取膟膋共實一豆置于饌所膟膋腸間脂晨祼享日未明四刻諸享官各服其服廟令良醖令各率其屬入實樽罍犧尊實以醴齊象尊實以盎齊山罍實以清酒其三尊之上尊實以玄酒爵七勺二篚一并設洗于堂下其器烏漆為太官令帥進饌者實諸籩豆簠簋未明三刻奉禮帥贊者先入就位贊引引博士宫闈令及執樽罍篚羃者入自東門當階重行北靣西上立定奉禮曰冉拜訖贊引引博士升堂上各就位宫闈令開塪室出神主置于坐位訖還執事位未明二刻謁者引享官俱就門外位太樂令引工人入訖贊引引亞獻先入就位冉拜訖行掃除復位謁者引享官入就位立定奉禮曰冉拜享官等冉拜訖謁者進初獻之左白有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏肅和之樂三成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止奉禮曰衆官冉拜衆官在位者皆冉拜謁者引初獻詣罍洗盥手洗爵訖謁者引初獻升自東階詣取爵酌以授齋郎奠爵俯伏興冉拜訖贊引引復位贊引引亞獻詣罍洗盥手洗爵升堂詣樽所酌酒入奠于神坐前興退戶外冉拜訖少退立齋郎酌福酒兩爵合置一爵亞獻冉拜跪受爵啐酒飲卒爵以爵授齋郎俯伏興冉拜訖引復位次引終獻如亞獻之儀引復位訖奉禮曰賜胙贊者曰冉拜飲福酒者不拜奏肅和之樂一成止贊者曰冉拜在位者皆冉拜訖贊引進初獻之左白禮畢贊引各引享官以次出贊引引博士以下俱就執事位奉禮曰冉拜博士以下皆冉拜引出宫闈令納神主如常儀其祝版燔于齋坊大唐開元禮卷七十四
