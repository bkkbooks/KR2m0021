body:
  text: 大唐開元禮卷一百三唐蕭嵩等撰嘉禮皇帝於明堂及太極殿讀五時令陳設鑾駕出宫讀令鑾駕還宫陳設禮部尚書先讀令三日奏讀月令承以宣告前三日尚舍直長施大次于青龍門外道北南向仲春于青陽太廟季春于青陽右個孟夏於朱雀門外道東西向仲夏於明堂太廟季夏於明堂右個孟秋於白虎門外道北南向仲秋於總章太廟季秋於總章右個孟冬於𤣥武門外道西東向仲冬於𤣥堂太廟季冬於𤣥堂右個尚舍奉御設御坐守宫設文武臣次於大次之後文官在左武官在右俱南向夏俱西向秋俱北向冬俱東向設羣官次於壁水東門之外夏南門之外秋西門之外冬北門之外文官在北夏在東秋在南冬在西武官在南夏在西秋在北冬在東俱西上夏北上秋東上冬南上前一日尚舍奉御設御幄坐於青陽左個仲春於青陽太廟季春於青陽右個孟夏於明堂左個仲夏於明堂太廟季夏於明堂右個季夏土王之日讀土令於太廟太室孟秋於總章左個仲秋於總章太廟季秋於總章右個孟冬於𤣥堂左個仲冬於𤣥堂太廟季冬於𤣥堂右個近西東向夏近北南向秋近西東向冬近南北向守宫設三品以上及諸司長官坐於堂上文官於御坐東北南向夏東南西向秋西南北向冬西北東向武官於御座東南北向夏西南東向秋西北南向冬東北西向俱重行西上夏北上秋東上冬南上無長官者次官一人升判官不合設刑部郎中讀令坐於御坐東南北向夏西南東向秋西北南向冬東北西向有案設文官解劔席於丑陛之左仲春於寅陛之左季春於卯陛之左孟夏於辰陛之左仲夏於巳陛之左季夏於午陛之左孟秋於未陛之左仲秋於申陛之左季秋於酉陛之左孟冬於戌陛之左仲冬於亥陛之左季冬於子陛之左設武官解劔席於卯陛之右仲春於辰陛之右季春於巳陛之右仲夏於未陛之右季夏於申陛之右孟秋於酉陛之右仲秋於亥陛之右孟冬於子陛之右仲冬於丑陛之右季冬於寅陛之右皆內向太樂令展宫懸於青陽左個之庭仲春於青陽太廟之庭季春於青陽右個之庭孟夏於明堂左個之庭仲夏於明堂太廟之庭季夏於明堂右個之庭季夏土王之日讀土令於太廟太室孟秋於總章左個之庭仲秋於總章太廟之庭季秋於總章右個之庭孟冬於𤣥堂左個之庭仲冬於𤣥堂太廟之庭季冬於𤣥堂右個之庭設舉麾位於堂上寅陛之南北向仲春於堂上卯陛之南季春於堂上辰陛之南孟夏於堂上巳陛之西東向仲夏於堂上未陛之西孟秋於堂上申陛之北南向仲秋於堂上酉陛之北季秋于堂上戌陛之北孟冬于堂上亥陛之東西向仲冬于堂上子陛之東季冬于堂上丑陛之東一位于樂懸東北南向夏于樂懸東南西向秋于樂懸西南北向冬于樂懸西北東向典儀設三品以上及應升坐者位于懸東夏于懸南秋于懸西冬于懸北文左武右俱重行西向夏北向秋東向冬南向相對為首設非升坐者位文官四品五品于懸北夏于懸東秋于懸南冬于懸西六品以下于其東夏于其南秋于其西冬于其北絶位俱南向夏俱西向秋俱北向冬俱東向武官四品五品于懸南夏于懸西秋于懸北冬于懸東六品以下于其東夏于其南秋于其西冬于其北當文官俱北向夏東向秋南向冬西向皆重行西上夏北上秋東上冬南上設典儀位于懸之西北夏于懸之東北秋于懸之東南冬于懸之西南贊者二人在東差退俱南向夏俱西向秋俱北向冬俱東向奉禮設門外位各于次前俱每等異位重行相向西上夏北上秋東上冬南上鑾駕出宫前出宫三日本司宣攝內外各供其職守官設從駕之官五品以上次於承天門外東西朝堂如常前二日太樂令設宫懸之樂於殿庭如常儀其日未明七刻捶一鼓為一嚴三嚴時節前一日侍中奏裁侍中奏開宫殿門及城門未明五刻捶二鼓為再嚴侍中版奏請中嚴奉禮設從駕群官五品以上位文官於東朝堂之前西向武官於西朝堂之前東向俱重行北上從駕群官五品以上俱集朝堂次各服其服其六品以下並駕發之前預赴明堂所俱就次各服其服所司陳小駕鹵簿未明二刻捶三鼓為三嚴諸衛之屬各督其隊與鈒㦸以次入陳于殿庭謁者引從駕群官各就朝堂前位諸侍衛之官各服其器服侍中中書令以下俱詣西閣奉迎侍中負寶如式乘黃令進金輅于西閣外南向千牛將軍一人執長刀立于路前北向黃門侍郎一人在侍臣之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝服通天冠青紗袍夏絳紗季夏土王之日黃紗秋白紗冬黑紗佩蒼玉夏佩赤玉季夏土王之日佩黃玉秋佩白玉冬佩𤣥玉御輿以出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞㽔賔之鐘右五鐘皆應協律郎跪俯伏舉麾鼓柷奏太和之樂千牛將軍前執轡皇帝升輅太僕卿立授綏侍中中書令以次侍如常儀黃門侍郎進當鑾駕前跪奏稱黃門侍郎臣某言請鑾駕發引俯伏興退復位凡黃門侍郎奏請皆進當鑾駕前跪奏稱某官臣某言訖俯伏興鑾駕動又稱警蹕黃門侍郎與贊者夾引以出千牛將軍夾輅而趨駕至太極門偃麾戛敔樂止出太極門鼓柷奏采茨之樂出嘉德門戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止至承天門外侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承詔退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黃麾內符寶郎奉六寶與殿中監後部從侍中中書令以下夾侍于輅前贊者在供奉官人內侍臣上馬畢黃門侍郎奏稱請敕車右升侍中前承詔退稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕鼓傳音如常鼓吹振作而行其從駕之官在𤣥武隊後如常儀讀令其日依時刻諸衛勒所部屯門列仗及青陽左個之庭如常先至羣官俱集次各服其服駕將至典謁各引先置羣官俱就門外位駕至大次門外回輅南向千牛將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降路俯伏興還侍位皇帝降輅御輿之大次繖扇華蓋侍衛警蹕如常儀典謁引文武五品以上從駕之官皆就門外位太樂令帥工人入就位協律郎入就舉麾位典儀帥贊者先入就位典謁引羣官非升坐者入就位刑部郎中以月令置于案覆以帕令史二人俱絳公服對舉案立于武官五品東南郎中立于案後北面侍中版奏外辦皇帝御輿出次曲直華蓋侍衛警蹕如常儀入自青龍門夏入自朱雀門秋入自白虎門冬入自𤣥武門皇帝初入門太樂令令撞㽔賔之鐘左五鐘皆應鼓柷奏太和之樂皇帝升自寅陛夏升自巳陛秋升自申陛冬升自亥陛入即御坐東向坐夏南向坐秋西向坐冬北向坐符寶郎奉寶置於御坐侍臣夾侍如常儀戞敔樂止典儀一人升立於左個東北南向夏東南西向秋西南北向冬西北東向典謁引公王以下入就西面位夏北面位秋東面位冬南面位公初入門舒和之樂作凡公行皆作舒和之樂公至位樂止羣官立定典儀曰再拜贊者承傳凡典儀有詞贊者皆承傳在位者皆再拜侍中前跪奏稱臣某言請延王公等升俯伏興又侍中稱制曰可侍中詣左個東北南面稱夏東南西面稱秋西南北面稱冬西北東面稱制延公王等升堂上典儀承傳堂下贊者又承傳在位者皆再拜典謁以次引西面位者夏典謁引北面位者秋引東面位者冬引南面位者各詣其陛公初行樂作至解劍席樂止公王以下俱升席跪解劍俯伏興脫舄通事舍人各引升立于坐後刑部郎中引案進立于卯陛下侍中跪奏請讀月令俯伏興又侍中稱制曰可侍中退復位刑部郎中再拜就解劔席跪解劔俯伏興脫舄取令持案者仍立於下通事舍人引刑部郎中奉令升自卯陛夏升自午陛秋升自酉陛冬升自子陛詣席南北靣跪夏席西東向跪秋席北南向跪冬席東西向跪置令於案俯伏興立於席後堂上典儀唱就坐公王以下及刑部郎中並就位俯伏興坐刑部郎中讀令每句一絶使言聲可了讀令訖堂上典儀唱可起公王以下皆起通事舍人引公王以下及刑部郎中俱降刑部郎中以令置于案與羣官俱跪佩劔俯伏興納舄典謁各引還本位公初行樂作至位樂止立定典儀曰再拜在位者皆再拜典謁引西面夏北面秋東面冬南面位者出公初行樂作出門樂止侍中跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞黃鐘之鐘右五鐘皆應太和之樂作皇帝降坐御輿以出之便次警蹕侍衛如來儀出門樂止典謁引南北面夏引東西面秋引南北面冬引東西面位者以次出春令孟春之月日在營室昏參中旦尾中其日甲乙其帝太皥其神勾芒其蟲鱗其音角律中太蔟其數八其味酸其臭羶其祀户東風解凍蟄蟲始振魚上負氷獺祭魚鴻雁來食麥與羊其器疏以達是月也以立春先七日禮部奏曰某日立春盛德在木皇帝乃齊立春之日皇帝親帥百官迎春于東郊還賞百官于朝命有司布德和令行慶施惠下及黎元慶賜遂行毋有不當乃命太師守典奉法司天日月星辰之行宿離不貸無失經紀以初為常是月也皇帝乃以元日祈穀于上帝乃擇元辰皇帝親載耒耜帥百官躬耕帝籍反乃執爵于太寢命曰勞酒是月也天氣下降地氣上騰天地和同草木萌動命布農事修封疆善相丘陵阪險原隰土地所宜五穀所植以教道人是月也修祭典禁止伐木毋覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵毋聚大衆毋置城郭掩骼埋胔是月也不可以稱兵稱兵必有天殃兵戎不起不可從我始毋變天之道毋絶地之理毋亂人之紀孟春行夏令則雨水不時草木早落國時有恐行秋令則黎元大疫猋風暴雨總至藜莠蓬蒿並興行冬令則水潦為敗霜雪大摯首種不入仲春之月日在奎昏弧中旦建星中律中夾鐘始雨水桃始華倉庚鳴鷹化為鳩是月也安萌芽養幼少存諸孤擇元日命人社命有司省囹圄去桎梏毋肆掠止獄訟是月也日夜分雷乃發聲始電蟄蟲咸動啓户始出先雷三日奮鐸以令人曰雷將發聲有不戒其容止者生子不備必有凶災日夜分則同度量鈞衡石角斗甬正權概是月也毋作大事以妨農事毋竭川澤毋漉陂池毋焚山林獻羔開氷先薦宗廟上丁釋奠于先聖先師仲春行秋令則其國大水寒氣總至冦戎來征行冬令則陽氣不勝麥乃不熟人多相掠行夏令則國乃大旱暖氣早來蟲螟為害季春之月日在胃昏七星中旦牽牛中律中姑洗桐始華田鼠化為鴽虹始見萍始生薦鮪于宗廟是月也生氣方盛陽氣發泄勾者畢出萌者盡達不可以內布德行惠發倉廩賜貧窮賑乏絶開府庫出幣帛賙天下勉牧守聘名士禮賢者是月也時雨將降下水上騰命有司循行國邑周視原野修利隄防導達溝瀆開通道路毋有障塞田獵罝罘羅網畢翳餧獸之藥毋出國門是月也命虞人毋伐桑柘鳴鳩拂其羽戴勝降于桑后妃齊戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功供郊廟之服無有敢惰是月也命工師令百工審五庫之量金鐡皮革筋角齒羽箭幹脂膠丹漆毋或不良毋悖于時毋或作淫巧以蕩上心季春行冬令則寒氣時發草木皆肅國有大恐行夏令則人多疾疫時雨不降山林不收行秋令則天多沈隂淫雨早降兵革並起夏令孟夏之月日在畢昏翼中旦婺女中其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中仲吕其數七其味苦其臭焦其祀竈螻蟈鳴蚯蚓出王瓜生苦菜秀食菽與雞其器髙以粗是月也以立夏先七日禮部奏曰某日立夏盛德在火皇帝乃齊立夏之日皇帝親帥百官迎夏于南郊還反行賞命有司贊傑俊遂賢良舉長大行爵出祿必當其位是月也繼長增高毋有壞隳毋起土功毋發大衆毋伐大樹命有司巡行縣鄙命農勉作毋休于都無或失時是月也驅獸無害五穀毋大田獵是月也命太常修鞀鞸鼓均琴瑟管簫執干戚戈羽調竽笙篪簧飾鐘磬柷敔命有司為人祈祀山川百源大雩上帝用盛樂以祈穀實農乃登麥皇帝乃以彘嘗麥先薦宗廟是月也聚蓄百藥靡草死麥秋至斷薄刑決小罪出輕繫蠶事畢內命婦獻繭於后孟夏行秋令則苦雨數來五穀不滋四鄙入保行冬令則草木早枮後乃大水敗其城廓行春令則蝗蟲為災暴風來格秀草不實仲夏之月日在東井昏亢中旦危中律中㽔賔小暑至螳螂生鵙始鳴反舌無聲飬壯佼農乃登黍皇帝乃以雛嘗黍羞以含桃先薦宗廟令人毋艾藍以染毋燒灰毋暴布門閭毋閉挺重囚是月也日長至隂陽爭死生分君子齊戒處必掩身無躁止聲色無或進薄滋味毋致和節嗜欲定心氣百官靜事無刑以定晏隂之所成鹿角解蟬始鳴半夏生木槿榮是月也毋用火南方可以居髙明可以逺眺望可以升山陵可以處臺榭仲夏行冬令則電凍傷穀道路不通暴兵來至行春令則五穀晚熟百螣時起其國乃飢行秋令則草木零落果實早成人殃於疫季夏之月日在栁昏火中旦奎中律中林鍾溫風至蟋蟀居壁鷹乃學習腐草為螢命漁師伐蛟取鼉登龜取黿命澤人納材葦是月也命太常合秩芻以養犧牲以供皇天上帝名山大川四方之神以祀宗廟社稷之靈以為人祈福是月也染工染采黼黻文章必以法故無或差貸黑黃蒼赤莫不質良毋敢詐僞以給郊廟祭祀之服以為旗章以别貴賤等級之度是月也樹木方盛乃命虞人入山行木毋有斬伐不可以興土功不可以合牧守不可以起兵動衆無舉大事以搖養氣舉大事則有天殃是月也土潤溽暑大雨時行燒剃行水利以殺草如以熱湯可以糞田疇可以美土疆季夏行春令則穀實鮮落國多風咳人乃遷徙行秋令則丘隰水潦禾稼不熟孕多女災行冬令則風寒不時鷹隼早摯四鄙入保土令季夏土王之日讀土令並如孟夏讀令之儀中央土其日戊巳其帝黃帝其神后土其蟲倮其音宫律中黃鐘之宫其數五其味甘其臭香其祀中霤食稷與牛其器圜以閎秋令孟秋之月日在翼昏建星中旦畢中其日庚辛其帝少皥其神蓐收其蟲毛其音商律中夷則其數九其味辛其臭腥其祀門凉風至白露降寒蟬鳴鷹乃祭鳥用始行戮食麻與犬其器廉以深是月也以立秋先七日禮部奏曰某日立秋盛德在金皇帝乃齊立秋之日皇帝親帥百官迎秋於西郊還賞軍帥武人於朝乃命將帥選士厲兵簡練傑俊専任有功以征不義詰誅暴慢以明好惡順彼逺方是月也命有司修法制繕囹圄具桎梧禁止奸慎罪邪務摶執瞻傷察創視折審斷決獄訟必端平戮有罪嚴斷刑天地始肅不可以贏是月也農乃登穀皇帝嘗新先薦宗廟命百官始收斂完隄防謹壅塞以偹水潦修宫室坯墻垣補城郭孟秋行冬令則隂氣大勝介蟲敗穀戎兵乃來行春令則其國乃旱陽和復還五穀無實行夏令則國多火災寒熱不節人多瘧疾仲秋之月日在角昏牽牛中旦觜觽中律中南吕肓風至鴻鴈來𤣥鳥歸群鳥飬羞是月也養衰老授几杖行糜粥飲食乃命司服具飭衣裳文繡有恆制有大小度有短長衣服有量必循其故冠帶有常命有司申嚴百刑斬殺必當毋或枉撓枉撓不當反受其殃是月也乃命有司循行犧牲視全具案芻豢瞻肥瘠察物色必比類量大小視長短皆中度五者備當上帝其饗皇帝以犬嘗麻先薦宗廟是月也可以築城郭建都邑穿竇窖修囷倉趣人取斂務畜菜多積聚乃勸種麥毋或失時其有失時行罪無疑是月也日夜分雷始收聲蟄蟲坯户殺氣浸盛陽氣日衰日夜分同度量平權衡正均石角斗甬凡舉事毋逆大數必順其時慎因其類仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五穀復生行冬令則風災數起收雷先行草木早死季秋之月日在房昏虛中旦栁中律中無射鴻鴈來賔雀入大水為蛤菊有黃花豺乃祭獸戮禽是月也申嚴號令命百官貴賤無不務內以㑹天地之藏毋有宣出乃命有司農事備收舉五穀之要藏帝藉之收于神倉祗敬必飭霜始降則百工休是月也大饗上帝于明堂草木黃落乃伐薪為炭蟄蟲咸俯在內皆墐其户乃趣決獄刑毋留有罪收祿秩之不當供養之不宜者是月也皇帝乃以犬嘗稻先薦寢廟季秋行夏令則其國大水冬藏殃敗人多鼽嚏行冬令則國多盜賊邊境不寧土地分裂行春令則暖風來至人氣解惰師興不居冬令孟冬之月日在尾昏危中旦七星中其日壬癸其帝顓項其神𤣥冥其蟲介其音羽律中應鍾其數六其味鹹其臭朽其祀行水始氷地始凍雉入大水為蜃虹藏不見食黍與彘其器閎以奄是月也以立冬先七日禮部奏曰某日立冬盛德在水皇帝乃齊立冬之日皇帝親帥百官迎冬於北郊還賞死事恤孤寡是月也察阿黨則罪無有掩蔽天氣上騰地氣下降天地不通閉塞而成冬命百官謹蓋藏命有司循行積聚毋有不斂坯城郭戒門閭修鍵閉慎管籥固封疆備邊境完要塞謹關梁塞蹊徑飭喪紀辨衣裳審棺槨之薄厚度貴賤之等級是月也命工師效功陳祭器案度程毋或作為淫巧以蕩上心物勒工名以考其誠功有不當必行其罪以窮其情是月也乃命虞司收水泉池澤之賦毋或敢侵削衆庶其有若此者行罪無赦孟冬行春令則凍閉不密地氣上泄人多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則霜雪不時小兵時起土地侵削仲冬之月日在斗昏東壁中旦軫中律中黃鐘氷益壯地始坼鶡旦不鳴飭死事命有司土事毋作毋發室屋及起大衆以固而閉地氣沮泄是謂發天地之房諸蟄則死人必疾疫是月也命內侍申宫令審門閭謹房室必重閉省婦事毋得淫雖有貴戚近習無有不禁乃命良醖秫稻必齊麴蘖必時湛熾必潔水泉必香陶器必良火齊必得兼用六物毋有差貸是月也日短至隂陽爭諸生蕩君子齊戒處必掩身身欲寧去聲色禁嗜欲安形性事欲靜以待隂陽之所定藝始生荔挺出蚯蚓結麋角解水泉動日短至則伐木取竹箭是月也可以罷官之無事去器之無用者塗闕庭門閭築囹圄以助天地之閉藏是月也皇帝親講武以習五戎仲冬行夏令則其國乃旱氛霧冥冥雷乃發聲行秋令則天時雨汁瓜瓠不成國有大兵行春令則蝗蟲為敗水泉咸竭人多疹癘季冬之月日在婺女昏婁中旦氐中律中大吕鴈北鄉鵲始巢雉雊雞乳命有司大儺征鳥厲疾是月也命漁師始漁皇帝乃嘗魚先薦宗廟氷方盛水澤腹堅命取氷命衆庶出五種計耦事修耒耜具田器命太常大合吹習衆樂命司農收秩薪柴以供郊廟及百祀之薪燎是月也日窮于次月窮于紀星回于天數將幾終嵗且更始專而農人毋有所使皇帝乃與有司共飭國典論時令以待來嵗之宜季冬行秋令則白露早降介蟲為妖四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降氷凍消釋鑾駕還宫皇帝既還大次侍中版奏請解嚴將士不得輒離部伍皇帝停大次一刻頃捶一鼓為一嚴轉仗衛于還塗如來儀三刻頃捶二鼓為再嚴將士布隊仗侍中版奏請中嚴五刻頃捶三鼓為三嚴謁者贊引各引羣官序立於次前文武侍臣詣大次奉迎乘黃令進金輅於大次門外南向夏北向秋東向冬南向千牛將軍立於輅右侍中版奏外辦太僕卿升執轡皇帝御輿出次繖扇侍衛警蹕如常儀皇帝升輅太僕卿立授綏黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕如常儀黃門侍郎贊者夾引千牛將軍夾輅而趨至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承詔退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬畢黃門侍郎奏稱請敕車右升侍中稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引退復位鼓傳音鑾駕動鼓吹振作而還文武群官皆從如來儀駕至順天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立于輅右訖鑾駕動千牛將軍夾路而趨駕入嘉德門太樂令令撞㽔賔之鐘左五鐘皆應鼓柷奏采茨之樂至太極門戛敔樂止入太極門鼓柷奏太和之樂駕至橫街北當東上閣回輅南向侍中進鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅御輿以入繖扇侍衛警蹕如常儀侍臣從至閣戛敔樂止初文武羣官至朝堂通事舍人承㫖敕羣官並還皇帝既入侍中版奏請解嚴叩鉦將士各還其所太極殿讀令五時令禮部尚書先讀令三日奏讀五時令承以宣告前一日尚舍奉御設御幄坐於太極殿北廂南向尚舍直長設一品以下五品以上及諸司長官坐於殿上文東武西重行相向北上無長官者次官一人升判官不合設刑部郎中讀令坐於御坐西南東向有案去御坐二丈設解劔席於東西階下如常太樂令展宫懸于殿庭設舉麾位于殿上西階之西東向一位於樂懸東南西向並如常朔朝之儀設文武官三品以上及應升殿者位於南橫街之南道東設武官位於道西俱每等異位重行北向相對為首設非升殿者位於殿庭文東武西如常設典儀位於北橫街之南贊者二人在南差退俱西向奉禮設門外位文官於東朝堂近南西面武官於西朝堂近南東面每等異位俱重行北上其日依時刻諸衛勒所部屯門列仗及陳於殿庭如常文武官依時刻集朝堂俱就便次各服其服侍中量時版奏請中嚴鈒㦸近仗入陳於殿庭太樂令帥工人入就位協律郎入就舉麾位諸侍衛之官各服其器服符寶郎奉寶俱詣閣奉迎典儀帥贊者入就位典謁引群官各就門外位刑部郎中以時令置于案覆以帕令史二人俱絳公服對舉案立於右延明門內道北郎中立於案後東靣典謁引非升殿者入就位侍中版奏外辦皇帝服通天冠絳紗袍御輿出自西房曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應協律郎跪俯伏舉麾鼓柷奏太和之樂皇帝出自西房即御坐坐南向符寶郎奉寶置於御坐如常儀偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止典儀一人升就東階上西向立侍臣夾侍如常儀典謁引公王以下入就北面位公初入門舒和之樂作凡公行皆作舒和之樂公至位樂止群官立定典儀曰再拜贊者承傳凡典儀有詞贊者皆承傳在位者皆再拜侍中前跪奏稱侍中臣某言請延公王等升俯伏興又侍中稱制曰可侍中詣東階上西面稱詔延公王等升殿上典儀承傳階下贊者又承傳在位者皆再拜典謁以次引北面位者詣東西階公初行樂作至解劔席樂止公王以下俱升席跪解劔俯伏興脫舄通事舍人以次引升殿立於坐後刑部郎中引案進立於西階下侍中跪奏請讀時令俯伏興又侍中稱制曰可侍中退復位刑部郎中再拜就解劔席跪解劔俯伏興脫舄取令持案者仍立于階下通事舍人引刑部郎中奉令升自西階詣席西東向跪置令於案俯伏興立于席後殿上典儀唱就坐公王以下及刑部郎中並就坐俯伏興坐刑部郎中讀令每句一絶使言聲可了讀令訖殿上典儀唱可起公王以下皆起通事舍人引公王以下及刑部郎中俱降刑部郎中以令置於案與羣官俱跪佩劔俯伏興納舄典謁各引還本位典儀曰再拜在位者皆再拜典謁引北面位者出持令案者自右延明門而出侍中跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞㽔賔之鐘右五鐘皆應太和之樂作皇帝降坐御輿入自東房警蹕侍衛如來儀侍臣從至閣樂止典謁引東西面位者以次出讀夏令與讀春令同讀秋令與讀冬令同設刑部郎中讀令坐於御坐東南西向令案立于左延明門內道北郎中立於案後西面升降自東階餘與讀春令同皇帝若御翼善冠則羣官皆袴褶服陳解劔席若不設樂懸去警蹕大唐開元禮卷一百三
