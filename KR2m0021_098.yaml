body:
  text: 大唐開元禮卷九十八唐蕭嵩等撰嘉禮皇后正至受羣臣朝賀皇后正至受外命婦朝賀并㑹皇后正至受羣臣朝賀前一日尚寢率其屬設御幄坐如外命婦朝賀之儀守宫設羣官次於宫城門外如常儀其日未明一刻諸衛各勒所部屯門列仗及陳布于肅章門外奉禮設文武群官諸親蕃客等位于宫城門外如朝堂之式典儀設文武羣官位于肅章門外文東武西俱重行北面相對為首諸親位于文武五品之下朝集使蕃客等分方位次如常設典儀贊者位于羣官東北差退西向北上又設內給事位于羣官之北南向若與外命婦同時朝則典儀于肅章門外設羣官版位文武羣官依時刻俱集于門外俱就次各服其服若上臺同日朝賀則上臺禮畢羣官仍朝服典謁引從納義門西各行就版位尚儀奏請中嚴六尚以下各服其服俱詣內閣奉迎典儀帥贊者先入就位典謁引文武羣官入就位尚儀奏外辦皇后首飾禕衣以出即御坐南向坐侍衛警蹕及設琮璽於御坐並如常儀內謁者監引內給事出就南面典儀曰再拜贊者承傳文武羣官等俱再拜典謁引為首者一人進內給事前北跪賀稱元正首祚景福惟新伏惟殿下與時同休冬至云天正長至伏惟殿下如日之升賀訖俯伏興典謁引退復位羣官等皆再拜內謁者監引內給事入依式奏聞內給事承令出內謁者監引內給事復南面位稱令㫖羣官等皆再拜內給事宣令云履新冬至云履長大慶與公等同之羣官等又再拜內謁者監引內給事入典謁引羣官等出尚儀前奏禮畢皇后降座以入侍衛警蹕如常儀皇后正至受外命婦朝賀并㑹前二日本司宣攝內外各供其職前一日守宫設外命婦次如常儀尚寢帥其屬設御幄于皇后正殿北壁南向又設命婦為首者脫舄席于西階前近西東向如式司樂展宫懸之樂於殿庭設麾于殿上西階之西東向內僕進重翟以下于肅章門之外道東西向北上司贊設外命婦版位于殿庭大長公主以下在東太夫人以下在西諸親婦女位于外命婦之下宗親在東異姓親在西俱重行北面相對為首內謁者設外命婦等位於肅章門外大長公主以下於道東太夫人以下於道西俱重行相向北上命婦有夫從夫之爵無夫從子設司贊位于東階東南西向掌贊二人位于司贊之南差退俱西向受朝日依時刻諸衛勒所部屯門列仗及陳布於肅章門外如常儀外命婦等依時刻集到宫門外至下車所道西東向以車為次北上車次定外命婦等皆降車內典引引之次各服其服尚儀奏請中嚴宫官侍衛者皆朝服司寶奉琮寶依式俱詣內閣奏迎司樂帥女工人入就位典樂并就舉麾位司贊帥掌贊先入就位內典引引外命婦俱詣肅章門外位尚儀奏外辦皇后首飾禕衣以出警蹕侍衛如常儀皇后出自西房典樂舉麾奏正和之樂即御座南向坐司寶奉琮寶置於御坐如常偃麾樂止凡樂皆典樂舉麾工鼓柷而後作偃麾戛敔而後止司賔承引外命婦以次入就位為首者初入門舒和之樂作至位樂止命婦等立定司贊曰再拜掌贊承傳外命婦等皆再拜司賔引為首者一人詣西階為首者初行樂作至階樂止為首者脫舄升進當御坐前北面跪賀稱妾姓等言元正首祚景福惟新伏惟殿下與時同休冬至云天正長至伏惟殿下如日之升賀訖起司賔引為首者自西階降納舄樂作復位立定樂止司贊曰再拜掌贊承傳命婦等皆再拜司言前承令降自西階詣命婦西北東面稱令㫖外命婦等皆再拜宣令云履新之慶冬至云履長之慶夫人等同之司贊曰再拜掌贊承傳外命婦等皆再拜司賔以次引出尚儀前奏禮畢還侍位皇后降坐樂作入自東房侍衛警蹕如來儀樂止女工人退㑹朝訖尚寢率其屬鋪外命婦等之座於殿上大長公主以下於御座東南重行西向太夫人以下於御座西南重行東向設不升殿者坐席於東西廊下皆北上又量設脫屨席於東西階下尚食設夀樽於殿上東序之端西向有坫加爵一於樽下設升殿者酒樽於東西廊下近北設廊下者酒樽各於其座之南皆有坫羃俱障以帷設訖司樂帥諸樂人就位內典引引外命婦俱詣肅章門外位尚儀奏外辦皇后首飾褘衣出警蹕侍衛如常儀皇后出自西房典樂舉麾正和之樂作即御座南向坐司寶奉琮寶置於御座如常儀偃麾樂止凡樂皆典樂舉麾工鼓柷而後作偃麾戛敔而後止司賓承引外命婦以次入就位為首者初入門樂作至至位樂止外命婦立定若期㑹别日贊者如朝禮司言前承令降詣命婦西北東向稱令㫖夫人等升席坐司贊曰再拜掌贊承傳外命婦等皆拜訖司賓引外命婦應升殿者詣東西階樂作為首者至階樂止俱就席脫舄於階下升司賓引為首一人升階近東西面立以下各就席後立典賓引不升殿者詣東西廊下席後立上下立定司賓引為首者詣酒尊所北面立尚食酌酒一爵以授為首司賓引為首者至御坐前北向授尚食尚食受爵進置御坐前司賔引為首者跪奏稱妾姓等言元正首祚冬至賀云天正長至妾等不勝大慶謹上千萬嵗夀興再拜外命婦等皆再拜訖司言前承令宣令云令㫖夫人等同納景福外命婦等又再拜尚食取爵奉進皇后舉酒樂作外命婦等皆三稱萬嵗皇后舉酒訖尚食受虛爵復于坫樂止司贊曰再拜掌贊承傳外命婦等皆再拜司賔引為首者就席後立司贊曰就坐掌贊承傳外命婦等俱就坐尚食進酒至階司贊曰酒至興掌贊承傳外命婦等俱興立席後尚儀至階省酒尚食奉酒進皇后舉酒作樂如常又行外命婦酒酒至司贊曰再拜掌贊承傳外命婦等俱再拜受觶司贊曰就坐掌贊承傳外命婦等俱就坐飲皇后舉酒訖尚食受虛觶復于坫樂止觴行三周尚食進御食食升階司贊曰食至興掌贊承傳外命婦等皆起立席後尚儀至階省案尚食品嘗訖以次進置御前又行命婦案御若不食外命婦案先上訖不須興設食訖司贊曰就坐掌贊承傳外命婦等皆就席坐皇后乃飯樂作外命婦等俱飯御食畢樂止仍行酒設庶羞諸伎以次作若賜酒司言前承令詣東階上西向稱賜酒階下掌贊承傳外命婦等皆起再拜立受觶坐飲訖起立授虛觶又再拜就席坐酒行十二遍會畢司贊曰可起掌贊承傳命婦等皆起立席後司賔引降各納舄樂作俱引復階下位樂止其廊下者仍立于席後立定司贊曰再拜掌贊承傳外命婦等在位者皆再拜若有束帛則尚功帥其屬以束帛預立于東西廂司言前承令降自西階詣命婦西北東面稱令㫖外命婦等皆再拜宣令訖外命婦等又再拜尚功帥其屬以次授束帛外命婦等又再拜司賔引外命婦等以次出樂作出門樂止內典引承引次出尚儀前奏禮畢還侍位皇后降座樂作入自東房警蹕侍衛如來儀樂止大唐開元禮卷九十八
