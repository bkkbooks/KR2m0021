body:
  text: 大唐開元禮卷一百四十唐蕭嵩等撰凶禮三品以上喪之三卒哭祭小祥祭大祥祭禫祭祔廟卒哭祭前一日之夕掌事者改廬翦屏柱楣塗廬不塗見面塗廬襄不塗廬外翦蒲為席不縁以木為枕牢饌如虞其日夙興祝入燭先升自阼階入於室祝整拂几筵啟匵出神主置於座以出掌事者設洗於西階西南北向東西當西霤南北以堂深罍水在洗西篚在洗東南肆篚實以爵一巾一加羃設瓦甒二於靈座之左北墉下醴酒在東羃用絺加勺南柄其日夙興掌事者具饌於堂東祝與執樽罍篚者先入立於樽罍篚之後内外衰服俱升主人及諸子倚杖於室户外俱立於靈座東西面南上妻妾女子子立於靈座西東面南上内外各就位坐哭應拜者立掌饌者以饌入設於靈座前相者引主人降自西階詣罍洗主人止哭盥手洗爵相者引主人升西階入詣酒樽所主人酌醴相者引主人進跪奠於靈座前俛伏興少退西面立應拜者陪於後祝持祝版入立於靈座之南北面内外止哭祝跪讀祝文曰維年月朔日子某敢昭告於考某官封諡妣則曰妣某氏夫人日月不居奄及卒哭追慕永往攀號無逮謹以潔牲柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊哀薦成事於考某官封諡尚饗主人以下哭再拜内外應拜者皆再拜哭祝興進跪奠版於靈座前還樽所祝讀版訖興跪進版與主人哭拜同時相者引主人退復位哭盡哀内外各還次祝闔户與執樽罍者降出少頃祝與掌饌者入開户徹饌祝匵主闔户以降自卒哭之後朝一哭夕一哭蔬食飲水周而小祥小祥祭主人有司預製栗主并趺匵等如喪主之禮前一日之夕毁廬為堊室設蒲席周喪堊室者除之設地席陳練冠於次主人及諸子俱沐浴櫛爪翦牢饌及器如卒哭之禮其日夙興祝入燭先升自阼階入於室祝者於靈座之西更設喪主座東向祝奉喪主置於座訖祝出迎栗主入置於舊靈座祝開匵奉出栗主置於座訖設几於右乃出掌事者設罍洗篚於西階西南如初篚實爵一巾一加羃設瓦甒二於靈座之右北墉下醴酒在東幂用絺加勺南柄具饌於堂東祝與執樽罍篚者先入立於樽罍篚之後内外衰服主人倚杖於階東俱升就位應拜者立哭盡哀相者引降主人杖就次主婦以下各就次主人及諸子除首絰著練冠妻妾女子子除腰絰周服皆除之丈夫素服吉冠屨婦人素服吉屨相者引主人及諸子倚杖如初内外升就位哭掌饌者以饌升自東階入設於靈座前設訖掌饌者降自西階以出相者引主人降自西階詣罍洗主人止哭盥手洗爵相者引主人升自西階詣酒樽酌醴進跪奠於靈座前俛伏興少退西面立祝持版進立於靈座之右北靣内外皆止哭祝跪讀祝文曰維年月朔日子哀子父殁稱孤子某敢昭告於考某官封諡妣云夫人某氏嵗月逼迫奄及小祥攀慕永逺重増屠裂謹以潔牲柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊祇薦祥事於考某官封諡尚饗主人哭再拜内外應拜者皆再拜哭祝興進跪奠版於靈座興還樽所主人哭拜與祝奠版同時相者引主人就位哭盡哀内外各還次主人杖如式祝闔户與執樽罍者降出少頃祝與進饌者入開户徹饌祝匵主闔户以降其喪主祝奉出埋之於廟門外之左自小祥之後止朝夕之哭哭無時哀至則哭始食菜菓飯素食飲水漿無鹽酪不能食食鹽酪可又周而大祥大祥祭前一日之夕除堊室張帷又備内外受服受服大祥服各於其次主人及諸子俱沐浴櫛爪翦牢饌及器如小祥之禮其日夙興内外各服其衰服並于次哭盡哀除服者著除服訖又哭盡哀止昧爽前祝入燭先升自阼階入於室祝整拂靈筵啟匵出神主置於右几以出掌事者設罍洗篚於西階西南如初篚實爵一巾一加幂設瓦甒二於靈座之左北牖下醴酒在東幂用絺加勺南柄具饌於堂東祝與執樽罍者先入立於樽罍之後内外俱升就位哭掌事者以饌升自東階入設於座前置設訖掌饌者降自西階以出相者引主人降自西階以出詣罍洗主人止哭盥手洗爵相者引主人升自西階詣酒樽酌醴進跪奠於靈前俛伏興少退西靣立祝持祝版進立於靈座之左北面内外皆止哭祝跪讀祝文曰維年月朔日子哀子父喪稱孤子某敢昭告於考某官封諡妣曰妣夫人某氏日月逾邁奄及大祥攀慕永逺無任荒踣謹以潔牲柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊祇薦祥事於考某官封諡尚饗主人哭再拜應拜者再拜哭祝興進跪奠版於座興還樽所相者引主人就位哭盡哀主人以下各還外寢妻妾女子子以下還於寢祝闔户與執樽罍者降出少頃掌饌入開户徹饌祝匵主闔户而出間月而禫自大祥之後外無哭者食有醢醬禫祭前一日掌事者預備内外禫服各陳於别所主人及諸子俱沐浴櫛爪翦仍宿於外寢牢饌及器如大祥之禮其日夙興祝入燭先升拂几筵啟匵出神主置於座掌事者設罍洗篚於東階東南如常篚實爵一巾一加羃設瓦甒二於座之左北牖下醴酒在東羃用絺加勺南柄具饌於堂東祝與執樽罍篚者先入立於樽罍篚之後主人及諸子妻妾女子子仍祥服為長子三年者亦祥服内外俱升就位哭盡哀降釋祥服應禫服者著禫服相者引主人以下俱升就位哭掌饌者以饌升設於座前訖執饌者出相者引主人降自東階詣罍洗盥手洗爵相者引主人升自東階詣酒罍所酌醴進跪奠於座前俛伏興少退西面立祝持版進於座之右北面内外皆止哭祝跪讀祝文曰維年月朔日子孤子某敢昭告於考某官封諡妣云妣夫人某氏禫制有期追逺無及謹以潔牲柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊祇薦禫事於考某官封諡尚饗主人哭再拜應拜者再拜内外皆哭祝興進跪奠版於座還樽所相者引主人以下降自東階還寢内相者引妻妾女子子以下降自西側階還於寢祝闔户與執樽罍者降出少頃掌饌者入開户徹饌以出祝匵主闔户以降祔廟如别儀自禫之後内無哭者始飲醴酒食乾肉祔廟將祔掌事者預於始祖廟室内西壁為埳室筮日如常儀前三日主人及亞獻終獻及諸執事者俱散齋二日致齋一日前一日掌事者清掃廟之内外其朝應逓遷者皆出神主置於座主人以酒脯告遷訖遂移牀幄以次遷神主置於幄座又奠酒脯醢以安神少頃掌饌者徹饌以出掌廟者以次匵神主納於埳室訖又設考之祔座於曽祖室内東壁下西向右几妣則祔於曽祖姑設座亦如之言曽祖及曽祖姑皆據孝子之言於亡者祖及祖姑也祔於曽祖則曽祖妣配者事於尊以及卑者也設主人位於東階東南西向設子孫位於南門内道東北面西上設亞獻終獻位於主人東南設掌事以下於終獻東南俱西面北上亞獻終獻以國官僚佐若親賓充之設贊唱者位於主人西南西面設酒樽於堂上室户之東南北向西上設洗於阼階東南北向東西當東霤南北以堂深罍水在洗東篚在洗西南肆篚實爵三巾二加幂其爵數每廟三祔日内外夙興掌饌者預具少牢之饌二座各俎三簠二簋二鈃二酒樽二其二樽一實𤣥酒為上一實清酒次之上樽加𤣥酒者重古其籩豆一品者各十二二品三品者各八主人及行事者各服祭服掌事者具腰輿掌廟者閽寺者入立於廟庭北面再拜升自東階入開埳室出曽祖曽祖妣神主置於座曽祖妣神主並而處右若已祔妣則出曽祖妣神主而降出執樽罍篚者入就位内外俱就靈室所祝進座前西面告曰以今吉辰奉遷神主於廟執輿者以輿升入進輿於座前祝納神主於匵置於輿祝仍扶於左若祔妣則閽寺之屬扶於右降自西階子孫内外從至廟門諸婦人停於門外周以行帷俟祭訖而還神主入自南門升自西階入於室諸子孫從升立於室户西重行東面以北為上行事者從入各就位輿詣室前迴輿西向祝啟匵出神主置於座輿降立於西階下東向相者引主人以下降自東階各就位祝立定賛唱者曰再拜在位者皆再拜掌饌引饌入升自東階入於室各於神座前施設訖掌饌以下降出相者引主人詣罍洗盥手洗爵升自東階詣酒尊所執尊者舉羃主人酌酒相者引主人入室進北面跪奠爵於曽祖神座前俛伏興相者引主人出詣酒樽所取爵酌酒入室進東面跪奠神座前俛伏興出戸北面立羣祖及考皆如之祝持版進於室户外之右東向跪讀祝文曰維年月朔日子孝曽孫某官封某敢昭告於曽祖某官封諡若祔母但云曽祖妣夫人某氏不告曽祖祖某官封諡若祔母云祖妣某氏以下無官封者但云考妣之靈考某官封諡若祔母云妣某氏如父在不可遽遷祖母先宜於廟東北常别立一室藏其主待考同祔某罪積不滅嵗及免喪先王制禮練主人祔宗廟上遷昭穆繼序是用適於皇考封諡以遷王考封諡隮祔孫某封諡無官封者但云以適遷於祖隮祔某孫若同祔但云適遷於祖妣夫人某氏以隮祔孫婦夫人某氏各隨其氏各隨其稱無官封者但以適遷於祖姑某氏以隮祔孫婦某氏夫人謹以潔牲剛鬛嘉薦普淖明齊溲酒祇薦於曽祖某官封諡曽祖妣某氏配祖某官封諡祖妣某氏配考某官封諡若祔母則云曽祖妣某氏祖母某氏尚饗祝興主人再拜祝進入奠版於曽祖神座興還樽所相者引主人入室立于西壁下東面再拜相者引主人出降還本位初主人獻将畢相者引亞獻詣罍洗盥手洗爵升詣酒樽所酌酒入進北面跪奠於曽祖座前俛伏興相者引亞獻詣酒樽所取爵酌酒入進東面跪奠於祖神座考亦如之俛伏興出户北面再拜訖又入室立於西壁下東面再拜相者引出降復位亞獻將畢相者引終獻詣罍洗盥手升酌終獻如亞獻之儀訖相者引終獻降復位祝入徹豆還樽所賛唱曰再拜在位者皆再拜相者引主人出又相者引在位子孫以下出掌饌者入徹饌以出掌廟者與祝閽寺納曽祖神主於塪室出又以腰輿升詣考神座前祝納主於匵置於輿詣考廟出神主置於座進酒脯之奠於前少頃徹之祝納神主於埳室齊衰三年其虞卒哭祥禫變除之節與斬衰同父在為母為妻當二祥及禫日月之期雖異其儀節則同周服以下變除依其月算各以其日之晨備衰服升就位哭盡哀降詣别室釋衰服著素服又就位哭盡哀出就别室終日異門者至夕各還其家大唐開元禮卷一百四十
