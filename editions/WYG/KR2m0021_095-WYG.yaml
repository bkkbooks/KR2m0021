body:
  text: 大唐開元禮卷九十五唐蕭嵩等撰嘉禮皇帝元正冬至受皇太子朝賀皇后元正冬至受皇太子朝賀皇帝元正冬至受皇太子朝賀前二日本司宣攝内外各供其職前一日尚舍奉御設御幄於太極殿北壁南向守宫設皇太子次於承天門外東朝堂之北西向又於東宫朝堂設宫臣次如常式太樂令展宫懸於殿庭設麾於殿上西階之西東向一位於樂懸東南西向皷吹令設十二案乘黄令陳車輅尚輦奉御陳輿輦並如常儀設皇太子位于横街南道東北面設典儀位於懸之東北賛者二人在南差退俱西面奉禮設宫臣版位於東宫朝堂如常其日依時刻宫官俱集於次各服其服諸衞率各勒所部陳設如常左庶子版奏請中嚴典謁引宫臣各就位侍衞之官各服其器服左庶子負寳如式俱詣閤奉迎僕進金輅於西閤外南向内率一人執刀立於輅前北向中允一人在侍臣之前賛者二人又在中允之前左庶子版奏外辦僕奮衣而升正立執轡皇太子具服逺逰冠若未冠則雙童髻絳紗袍升輿以出左右侍衞如常儀内率前執轡皇太子升輅僕立授綏左庶子以下夾侍如常儀中允進當輅前跪奏稱中允臣某言請發引俛伏興退復位凡中允奏請皆進當輅前跪奏稱具官臣某言訖俛伏興輅動中允與賛者夾引以出内率夾輅而趨出重明門至侍臣上馬所中允奏稱請輅權停令侍臣上馬左庶子前承令退稱令曰諾中允退稱侍臣上馬賛者承傳文武侍臣皆上馬左庶子以下夾侍於輅前賛者在供奉官人内侍臣上馬畢中允奏稱請令車右升左庶子前承令退稱令曰諾中允退復位内率升訖中允奏稱請發引退復位皇太子輅動三師乘車訓導王少乗車訓從鳴鐃而行文武宫臣皆乗馬以從至長樂門鐃吹止至次前迴輅西向内率降立於輅右左庶子進當輅前跪奏稱左庶子臣某言請降輅俛伏興還侍位皇太子降輅舍人引皇太子就次坐侍衞如常儀其日依時刻將士填街諸衞勒所部列黄麾大仗屯門及陳于殿庭如常儀皇太子既就次侍中版奏請中嚴近仗就陳於門外太樂令帥工人入就位協律郎入就舉麾位侍衛之官各服其器服符寳郎奉寳俱詣閤奉迎典儀帥賛者先入就位通事舍人引群官屬以下次入就位皇太子出次舎人引皇太子三師三少導從如式入立於太極殿門外之東西面諸衞率左右庶子舎人及近侍者量人從入侍中版奏外辦皇帝服衮冕之服乘輿以出曲直華盖警蹕侍衞如常儀皇帝將出仗動太樂令令撞黄鐘之鐘右五鐘皆應協律郎跪俛㐲舉麾鼔柷奏太和之樂皷吹振作皇帝出自西房即御坐南向坐符寳郎奉寳置御坐如常協律郎偃麾戛敔樂止凢樂皆協律郎舉麾工鼔柷而後作偃麾戛敔而後止也舍人引皇太子就位諸衛率左右庶立子以下従入者于皇太子東南西面北上皇太子初入門舒和之樂作至位樂止立定典儀曰再拜賛者承傳皇太子再拜舍人引皇太子詣西階皇太子初行樂作至階樂止舍人引皇太子升進當御坐前北面跪賀稱元正首祚景福惟新伏惟陛下與天同體冬至賀云天正長至伏惟陛下如日之升俛伏興舍人引降樂作復位樂止皇太子再拜侍中前承制降詣皇太子東面西向稱有制皇太子再拜宣制訖皇太子又再拜典儀唱再拜皇太子又再拜舍人引皇太子出初行樂作出門樂止皇太子既出公主入朝朝賀如别禮皇后元正冬至受皇太子朝賀前一日守宫設皇太子次于崇義門内隨地之宜其日司賛設皇太子版位于皇后正殿之庭懸南北面皇太子朝皇帝訖舍人引皇太子從納義門詣崇義門内次權停外命婦朝賀將訖舍人引皇太子出立於肅章門外命婦出訖内謁者監引皇太子至肅章門司賔承引皇太子入就位立定司賛唱再拜皇太子再拜訖司賔引皇太子詣西階升當御坐前北面跪賀賀稱元正首祚景福惟新伏惟殿下與時同休冬至賀云天正長至伏惟殿下如日之升俛伏興降復位皇太子再拜尚儀前承令降詣皇太子西北東面稱令㫖皇太子再拜宣令訖又再拜司賛唱再拜皇太子又再拜司賔引皇太子至閤内謁者監承引以出舍人引皇太子乘車還宫如來儀大唐開元禮卷九十五
