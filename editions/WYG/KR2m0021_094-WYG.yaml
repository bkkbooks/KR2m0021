body:
  text: 大唐開元禮卷九十四唐蕭嵩等撰嘉禮納后下命使奉迎同牢皇后謝表朝太后皇后受羣臣賀㑹羣臣外命婦朝㑹羣臣上禮皇后廟見車駕出宫命使奉迎其日晡後侍中量時刻版奏請中嚴晡後三刻皇帝服衮冕出升所御殿宫人侍衛如常儀文武之官五品以上立於東西朝堂如常儀奉迎前一日守宫設使者次於大門之外道右設使副及内侍次於使者次西俱南向尚舍設宫人次於閤外道西奉禮設使者位於大門外之西東向使副位於使者之南持案及執雁者又在南差退持節者在使者之北少退俱東向奉禮位於使副西南賛者二人在南差退俱東面又設内侍位於大門外道左西面其日司賛又設宫人以下位於堂前使主副朝服發朝堂乘輅持節偹儀仗至大門外使者降輅掌次者延入次宫人等各之次奉迎文武官至宿衛及列鹵簿如常奏請皇后中嚴量時刻姆傅導皇后尚宫前引出升堂宫人等侍衛如常儀皇后將出主婦出於房外之西南向文武奉迎者皆陪立於大門之外文官在東武官在西皆以北為上立定訖謁者引使者詣大門外位立使副内侍等各就位主人立於内門外堂前東階下西向儐者受命出請事使者曰某奉制今以吉辰率職奉迎儐者入告主人曰臣謹奉典制儐者出告入引主人出門南北面再拜使者不答拜謁者引使者入門而左持節者前導使副及持案執雁者次之主人入門而右至内門外堂西階間使者先升立於兩楹間南面使副在使者西南持案及執雁者在使副西南俱東面主人升東階詣使者前北面立持案者以案進使副前使副取制書持案者退復位使者曰有制主人再拜使者宣制畢主人降詣階間北面再拜稽首訖升進北面受制書退以授左右訖主人再拜仍北面立使副取雁授使者訖主人再拜進受雁退授左右仍北面立儐者引二人對舉答表案進立於主人後少西儐者取表以授主人主人受以授使者訖退復位再拜謁者引使副降自西階以出復門外位立定奉禮曰再拜賛者承傳使主副俱再拜使者曰令月吉日臣某等承制率職奉迎内侍受以入傳於司言司言受以奏聞尚儀奏請皇后再拜皇后再拜訖主人入升自東階進西面誡之曰戒之敬之夙夜無違命主人退立於東階上西面母誡於西階上施衿結帨曰勉之敬之夙夜無違命訖腰輿進皇后升輿以降尚宫前導六尚以下侍衛如常皇后升重翟以几姆加憬内宫侍從及内侍導引應乘車從者如鹵簿常儀迎使及百官當引從者退隨便立皇后車出大門外以次乘車馬引從如常制文皇帝曰咨某官姓嵗吉令月吉日惟某率由典禮今遣使持節太尉封某宗正卿封某以禮迎答文皇帝嘉命使者某重宣中詔令月吉辰偹禮以迎螻蟻之族猥承大禮憂懼戰悸欽承舊章肅奉典制某官臣某稽首頓首再拜承制詔同牢其日内侍之屬設皇后大次於皇帝所御殿門外之東南向鋪坐如常将夕尚寝設皇帝御幄於所御之殿室内之奥東向鋪地席重茵施屏障初昏尚食設洗於東階東西當東靈南北以堂深罍水在洗東篚在洗西南肆篚實以巾二爵二設訖后洗於東房近北罍水在洗西篚在洗東北肆皆加勺羃饌於東房西牖下設豆各二十四簠簋各二豋各三皆加巾盖俎三樽於室内北牖下𤣥酒在西加羃勺南柄羃夏用絺冬用組又樽於房户外之東廡𤣥酒坫在南加四爵合􅈟其器皆烏漆唯登以陶􅈟以匏皇后重翟入門鳴鐘皷其鐘皷所司預陳設鳴鐘皷者所以聲告内外鹵簿止於外近侍應從者如常皇后從永巷至大次前迴車南向施步障畢尚儀進當車前跪奏稱請降車興退復位皇后降車御輿司輿率繖扇等司燈率執燭者俱布列前後皇后入就大次嚴整訖尚宫引皇后詣所御殿門外之東西向立尚儀跪奏外辦請降坐禮迎皇帝降坐尚宫前引詣門内之西東面揖后以入尚食徹樽羃酌𤣥酒三注於樽尚寢設席於室内之西東向莞筵紛純加藻席繢純次席黼純對席亦准此皇帝導后升自西階入室即席東向立皇后入立於樽西南面皇帝盥於南洗后盥於北洗尚食帥其屬以饌入設醤於席前葅醢在其北俎三入設于豆東豕俎特於俎北豆東葅醢之東尚食設黍於醬稷稻粱又在東設湇於醤東南饌要方設對醬於東對醬后醤也設之當俎特葅醢在其南北上設黍於豕俎北其西稷稻粱設湇於醬北尚食啟㑹却于簠簋之南對簠簋于北啟發也豆盖徹於房内各加匕箸尚寢設對席於饌東尚食西面跪奏饌具興皇帝揖皇后對席西面皆坐尚食跪取韭葅擩醢授皇帝又尚食跪取韭葅擩醢授皇后皇帝及皇后俱受祭於豆間尚食又取黍實於左手遍取稷稻粱反於右手授皇帝又尚食取黍實於左手遍取稷稲粱反於右手授皇后皇帝及皇后俱受祭於豆間又各取胏皆絶末授皇帝及皇后皇帝及皇后俱受又祭於豆間訖尚食各以胏加於俎司飾二人以巾授皇帝及皇后俱帨手訖尚食各跪品嘗饌訖各移黍置於席上以次授肺脊皇帝及皇后皆食三飯卒食尚食二人俱盥手洗爵於房入室詣酒樽所酌酒進授皇帝及皇后俱受爵祭酒尚食各以肝從皆奠爵振祭嚌之尚食皆受實於俎豆各取爵皆飲訖尚儀俱進授虚爵奠於坫再酳如初三酳用􅈟如再酳尚食俱降東階洗爵升酌於户外樽進北面俱奠爵興再拜跪取爵祭酒遂飲卒爵奠爵遂拜執爵興奠於篚還侍位尚儀北面跪奏稱禮畢興皇帝皇后俱興尚宫引皇帝入東房釋冕服御常服又尚宫引皇后入幄脱服尚宫引皇帝入尚食帥其屬徹饌設於東房如初皇后從者餕皇帝之饌皇帝侍者餕皇后之饌皇后謝表皇后至宫之明日服展衣出司言引尚宫尚宫前導及左右侍從如常升正殿兩楹間北面立又尚儀以謝表授皇后尚儀以案俟於前皇后置表案上尚宫賛拜皇后再拜訖尚儀以表降殿授内侍内侍因中書以聞初内侍出門皇后降殿還寢如常朝皇太后其日大昕所司設皇太后御坐地席於所御之殿南向尚食帥司膳設側樽甒醴於東房内東壁下加勺羃籩一豆一實以脯醢設於樽北又設洗於樽西近北罍水在洗西篚在洗東北肆篚實以巾幂角觯一角柶一其日皇后夙興沐浴尚儀版􅪮請皇后中嚴質明六尚及諸侍衛官人俱詣寢殿奉迎尚儀版奏外辦皇后服褘衣加首飾御輿尚宫前導降自西階以出侍衛如常至太后閤外皇后降輿障扇侍從如常立於西廂東面皇后將至尚儀奏請皇太后中嚴皇后既至閤外尚儀奏皇太后外辦皇太后服褘衣加首飾司言引尚宫尚宫引皇太后出即御坐南向坐侍從如常皇后執笲棗栗腵脩司言引尚宫尚宫引皇后入升自西階北面再拜進跪奠笲於皇太后坐前皇太后撫之尚食進徹以東司言引尚宫尚宫引皇后退北面又再拜司設設皇后席於牖户之間近北南向司言引尚宫尚宫引皇后立於席西南向尚食入東房盥手洗觶酌醴加柶面柄出進詣皇后席前北面立皇后進北面再拜受醴尚食薦脯醢於席前皇后升席坐左執觶右取脯擩於醢祭于籩豆之間以柶祭醴三始扱一祭又扱再祭加柶于觶面葉興降席北面跪啐醴建柶興北面再拜進升席跪奠􅀈於薦東興降席司言引尚宫尚宫引皇后降自西階以出御輿而還侍從如來儀皇后出閤尚儀跪奏稱禮畢俛伏興還侍位皇太后降坐入室如常皇后受羣臣賀右如正冬賀儀唯賀辭云具官臣某等言伏惟殿下徽猷昭備至徳應期凡厥黔黎不勝慶躍皇帝㑹羣臣右如正冬㑹儀唯樂偹而不作上夀辭云具官某等言皇后坤儀配天徳昭厚載克崇萬葉顯嗣徽音凢厥兆庶載懐鳬藻臣等不勝慶忭謹上千萬嵗夀外命婦朝㑹右如正冬朝㑹之儀唯賀辭云某位妾姓等言伏惟殿下坤象配天徳昭厚載率土含識不勝忭舞㑹辭唯加謹上千萬嵗夀羣臣上禮右如加元服上禮之儀皇后廟見前一日皇后清齋於别殿内官應從入廟者俱齋一日於廟所諸衛令其屬晡後一刻各以其方器服守衛廟門與太樂工人俱清齋一宿前二日舎尚直長設皇后大次於太廟北門内之西東向周以行帷尚舎奉御鋪御坐尚舎直長又量設内官以下次於大次之後守宫設外命婦妃主以下次於廟北門外之西道南北向東上周以行帷又設行事太尉以下次於齋坊之内太樂令設宫懸之樂於廟庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹路皷於北懸之内道之左右植建皷於四隅置柷敔於懸内柷在左敔在右設歌鐘歌磬於廟堂之上前楹之間北向磬簴在西鐘簴在東其匏竹者立於階間重行北面相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上前一日右校清掃内外内謁者監設皇后版位於樂懸之北道西北向設外命婦位於其次前北面東上奉禮設太尉以下及御史等位於内外並如常儀設酒樽之位扵廟堂上前楹間各於室户之左北向每室彞二樽二春秋用雞彛鳥彛犧尊秋冬用斚彛黄彛著尊山罍二皆加勺羃皆西上各有坫焉以置瓉爵設洗於東階東南北向罍水在洗東篚在洗西南肆篚實以珪瓉巾爵執樽罍篚羃者各位於樽篚之後太廟令整拂神幄又帥府史齋郎以樽坫罍洗篚羃入設扵位其日未明十五刻太官令帥宰人以鸞刀割牲於厨謁日未明三刻太尉以下各服其服太廟令良醖令各帥其屬入實樽罍如式太官令帥進饌者實諸籩豆簠簋等未明二刻奉禮帥賛者先入就位賛引引御史以下行掃除如常儀訖引還齋所奉禮以下次還齋所未明一刻奉禮帥賛者先入就位賛引引太廟令太祝宫闈令入自東門當階間重行北面以西為上立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳太廟令以下皆再拜升自東階入開埳室奉出獻祖以下神主各置於坐如常儀訖引還齋所質明謁者引太廟令以下俱就門外位奉禮帥贊者先入就位贊引引御史以下入就位太樂令帥工人次入就位其升堂内者皆脱履於階下降納如式謁者引太尉贊引引執事者次入就位立定奉禮曰再拜太尉以下皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位協律郎跪俛伏舉麾興凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼔柷奏永和之樂乃以黄鐘為宫大吕為角太蔟為徴應鐘為羽樂九成黄鐘三奏大吕太蔟應鐘各再奏偃麾戛敔樂止凡樂皆協律郎舉麾工鼔柷而後作偃麾戛敔而后止也奉禮曰再拜太尉以下皆再拜謁者引太尉詣罍洗太尉盥手洗瓚升自阼階詣獻祖樽彛所執樽者舉羃太尉酌爵鬯登歌作肅和之樂乃以圜鐘之均自後登歌皆作圜鐘謁者引太尉入詣獻祖坐前北面跪以鬯祼地奠之俛伏興謁者引太尉出户北向再拜訖謁者引太尉詣懿祖樽彛所執樽者舉羃太尉取瓚於坫酌欝鬯謁者引太尉入詣懿祖神坐前北面跪以鬯祼地奠之俛伏興謁者引太尉出户北面再拜訖謁者引太尉次祼太祖次祼代祖次祼髙祖次祼太宗次祼髙宗次祼中宗次祼睿宗皆如上儀訖登歌止謁者引太尉還齋所初太尉既升祼太官令帥進饌者奉饌陳於東門之外謁者引司徒出詣饌所司徒奉獻祖之俎太官令引饌入自正門俎初入門雍和之樂作自後酌獻皆歌雍和以無射之均自後接神之樂堂下皆奏無射饌至階樂止饌升諸太祝迎引於階上各設於神座前籩豆葢羃徹之如式設訖謁者引司徒以下還齋所諸祝各還樽所謁者引太尉詣罍洗盥手洗爵訖升自阼階詣獻祖樽彛所執樽者舉羃太尉酌醴齊訖樂作謁者引太尉入詣獻祖神座前北面跪奠爵俯伏興出户北向立樂止太祝持版進於室户外之右東向跪讀祝文曰維某年歲次月朔日子孝曽孫開元神武皇帝某太祖以下稱臣某謹遣太尉封臣名敢昭告於皇祖某諡皇后某氏太祖以下廟則稱妾某氏將伸祗見謹以一元大武明粢薌合薌萁嘉蔬嘉薦醴齊敬薦尚饗訖興太尉再拜初讀祝文訖樂作太祝進跪奠版於神座前俛伏興還樽所太尉拜訖樂止謁者引太尉以次獻皆如獻祖之儀惟不盥洗遍獻訖謁者引太尉詣東序西向立諸祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之左北向太尉再拜受爵跪祭酒啐酒奠爵興諸祝各帥齋郎進俎跪減神前胙肉加於俎上又以籩取稷黍飯興以俎肉共置一俎以飯共置一籩先以飯授太尉太尉受以授齋郎又以胙肉授太尉太尉受以授齋郎太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉興再拜訖謁者引太尉還齋所贊引引御史太祝及執樽罍篚羃者俱還齋所以俟皇后既謁廟出門謁者引太尉以下諸執事及工人等各入復位登歌作雍和之樂諸祝各進入室徹豆出還樽所徹者籩豆各一少移於故處登歌止奉禮曰賜胙贊者唱再拜在位者皆再拜太尉不拜樂作奉禮又曰再拜在位者皆再拜樂一成止謁者進太尉之左白禮畢遂引太尉出贊引引執事者以次出御史太尉以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人以次出其祝版燔於齋坊太廟令太祝宫闈令納神主如常儀車駕出宫前出宫三日本司宣攝内外各共其職其日晝漏上水四刻車駕出宫發引前七刻搥一鼔為一嚴三嚴時節前一日内侍奏裁發引前五刻搥二鼔為再嚴尚儀版奏請中嚴司贊設内命婦版位於皇后所御殿閤外道東重行西向北上内命婦各服其服所司陳小駕鹵簿發引前二刻搥三鼔為三嚴司賓引内命婦各服其服就位六尚以下各服其服俱詣室奉迎尚服負璽如式内僕進重翟於閤外尚儀版奏外辦馭者執轡皇后首飾褘衣乗輿以出警蹕侍衛如常儀皇后升車仗衛如常六尚等乗車陪從如式司賓引内命婦退隨近以俟諸翊駕之官皆乗馬駕動稱警蹕如常不鳴鼓角諸衛前後督攝如常外命婦三品以上及公主縣主皆先至各就次俱服其器服車駕將出内侍之屬守廟四門内謁者贊引命婦妃主等出次内典引引就位立駕過引還次初駕將至内侍之屬守廟四門駕至廟北門迴車北向尚儀進當車駕前跪奏稱尚儀妾姓言請降車興還侍位皇后降車升輿入大次繖扇華葢侍衛如常儀鹵簿停於廟外皇后停大次半刻頃司言引尚宫立於大次門外當西向尚儀版奏外辦皇后出次侍衛如常尚服負璽陪從如式司言引尚宫尚宫引皇后凡尚宫前導皆司言先引至版位北向立尚宫與司言退立於左皇后定立尚宫前奏稱請再拜皇后再拜少頃尚宫又奏稱再拜皇后又再拜訖司言引尚宫尚宫引皇后還大次内侍版奏請解嚴將士不得輒離部伍皇后停大次一刻頃搥一鼓為一嚴轉仗衛於還􅂗如來儀三刻頃搥二鼓為再嚴尚儀版奏請中嚴皇后改著鈿􅁫禮衣五刻頃搥三鼔為三嚴六尚以下詣大次奉迎内僕進重翟於廟北門之外尚儀版奏外辦馭者執轡皇后乗輿出次華葢侍衛如常皇后升車鼓吹振作而還六尚等升車陪從如來儀皇后將出門内謁者贊引外命婦等出次内典引引就位駕至位所内侍奏請駕權停外命婦還外命婦再拜訖内侍承令令外命婦又再拜車駕過内典引引外命婦退各還第駕至所御殿閤外廽車南向尚儀進當車駕前跪奏稱尚儀妾姓言請降車興還侍位皇后降車乗輿以入侍衛如常於車駕將至司賔引内命婦俱就位皇后既入司賔引内命婦退内侍版奏請解嚴将士各還其所大唐開元禮卷九十四
