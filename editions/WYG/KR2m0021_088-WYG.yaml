body:
  text: 大唐開元禮卷八十八唐蕭嵩等撰軍禮制遣大將出征有司告于太廟制遣大將出征有司告于齊太公廟制遣大將出征有司告于太廟將告有司卜日如别儀前一日諸告官致齋于廟所衛尉設告官以下次各于常所右校清掃内外奉禮設告官版位于内外並如常儀設諸將位于廟庭横階之南道東每等異位重行北向以西為上又設諸将門外位于南門之外道東重行西向以北為上太廟令整拂神幄又帥其屬以尊坫罍洗篚羃入設于神坐如常儀執樽罍篚羃者各位于樽罍篚羃之後告日未明十刻太官預具牢饌其饌每室用特牲一未明三刻諸告官以下各服其服太廟令良醖令入實樽罍及幣每室犧尊二一實𤣥酒為上一實醴齊次之未明二刻奉禮帥齋郎先入就位賛引引御史太祝以下再拜入行掃除皆如常儀賛引引太廟令太祝宫闈令自東階入開塪室奉出獻祖以下神主各置于坐皆如常儀訖各引就位又賛引引告官次入就位立定奉禮曰再拜告官以下皆再拜其先拜者不拜太官令出帥進饌者奉饌陳于東門外初告官等入謁者引諸將以下入就位立定奉禮曰再拜諸將以下皆再拜謁者近告官之左白有司謹具請行事還本位諸祝俱取幣于篚各立于樽所謁者引告官升自東階詣獻祖廟室户前北靣立太祝以幣東向授告官告官受幣進入室北靣跪奠于神坐俛伏興出户北向再拜訖謁者引告官以次進奠幣于懿祖以下如上儀訖謁者引還本位諸祝各還樽所太官令引饌入自正門升自泰階諸祝迎引于階上各設于神坐前籩豆盖羃徹之如式設訖太官令以下降復位諸祝各還樽所謁者引告官詣罍洗盥手洗爵執升東階詣獻祖酒樽所執樽者舉羃告官酌醴齊訖謁者引告官入詣獻祖神坐前北向跪奠爵俛伏興出户北向立太祝持版進于室户外之右東向跪讀祝文祝文臨時撰訖興告官再拜訖又再拜太祝進跪奠版于神坐俛伏興還樽所謁者引告官以次獻懿祖太祖代祖高祖太宗高宗中宗睿宗皆如上儀遍獻訖謁者引告官詣東序西向立諸祝各以爵酌福酒合置一爵太祝持爵進告官之左北靣立告官再拜受爵跪祭酒啐酒奠爵俛伏興諸祝各帥齋郎進爼减神前胙肉共置一爼太祝持俎以授告官告官受以授齋郎告官跪取爵遂飲卒爵太祝進受爵復于坫告官俛伏興再拜訖謁者引告官降復位告官飲福將訖謁者引諸將升自東階進當皇考睿宗大聖真皇帝廟室少户前北靣西上初諸將升諸祝帥齋郎以爵酌福酒詣諸將之東西靣北上諸將皆再拜受爵跪祭酒啐酒奠爵俛伏興諸祝帥齋郎進爼减神前胙肉以次授諸将諸将受以授齋郎諸將俱跪取爵遂飲卒爵太祝帥齋郎受爵復于坫諸將俛伏興再拜訖謁者引諸將降復位奉禮曰再拜諸將以下皆再拜謁者引出諸祝各進神坐前跪徹豆俛伏興還樽所奉禮曰賜胙賛者唱再拜在位者俱再拜已飲福受胙者不拜奉禮曰再拜告官以下皆再拜訖謁者進告官之左白請就望瘞位謁者引告官就望瘞位西向立于告官將拜諸祝俱執篚進神坐前跪取幣齋郎以爼載牲體稷黍飯爵酒興降自東階詣瘞塪以幣饌物置于塪訖奉禮曰可瘞塪東西靣各二人寘土半塪謁者進告官之左白禮畢謁者引告官賛引引執事者以次出賛引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出太廟令宫闈令納神主如常儀祝版燔于齋宫若凱旋惟陳俘馘及軍實于南門之外北靣西上其告禮如常儀大將出征告齊太公廟將告有司卜日如别儀前一日諸告官致齋于廟所衞尉設次各于常所右校清掃内外奉禮設告官位于内外並如常儀諸將位于廟庭道東北向西上設諸将位于南門之外道東西向北上廟令整拂神坐又帥其屬以樽坫罍洗篚羃入設皆如常儀執樽罍篚羃者各位于樽罍篚羃之後告日未明十刻太官預具酒脯醢如常未明三刻諸告官以下各服其服廟令良醖令之屬入實樽罍及幣犠尊二一實以𤣥酒一實以醴齊未明二刻奉禮帥賛者先入就位賛引引廟令太祝等入當階間北面西上立定奉禮曰再拜廟令以下皆再拜升自東階入就位立定奉禮曰再拜告官以下皆再拜太官令出帥進饌者奉饌陳于東門外謁者引諸将以下入就位立定奉禮曰再拜諸將以下皆再拜謁者進告官之左白有司謹具請行事還本位諸祝俱取幣于篚各立于樽所謁者引告官升自東階詣太公神坐前北向立太祝以幣東向授告官告官受幣進北靣跪奠于太公坐俛伏興少退北向再拜訖謁者引告官當留侯坐前東向立又太祝以幣北向授告官告官受幣謁者引告官東向跪奠于留侯坐興少退東向再拜訖謁者引告官詣罍洗盥手洗爵訖謁者引告官升自東階詣太公酒樽所執樽者舉羃告官酌醴齊謁者引告官入詣太公神坐前北向跪奠爵俛伏興少退北向立太祝持版進于太公神坐之右東向跪讀祝文祝文臨時撰訖興告官再拜太祝進跪奠祝版于神坐俛伏興還樽所告官拜訖謁者引告官詣留侯酒樽所取爵于坫執樽者舉羃告官酌醴齊訖謁者引告官進留侯神坐前東向跪奠爵興少退東向立太祝持版進于留侯神坐之左北向跪讀祝文興告官再拜太祝跪奠版于留侯神坐興還樽所奉禮曰再拜告官以下皆再拜謁者進告官之左白請就望瘞位太祝跪取幣興詣瘞塪以幣置于塪訖奉禮曰可瘞塪東西廂各二人寘土半塪謁者進告官之左白禮畢奉禮帥賛者告官皆復位立定奉禮曰再拜告官以下皆再拜訖以次出其祝版燔于齋坊大唐開元禮卷八十八
