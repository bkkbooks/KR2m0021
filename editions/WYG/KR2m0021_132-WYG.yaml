body:
  text: 大唐開元禮卷一百三十二唐蕭嵩等撰凶禮五服制度斬衰三年齊衰三年杖周不杖周五月三月大功長殤九月中殤七月成人九月小功五月殤成人緦麻三月殤成人斬衰三年正服子為父女子子在室為父女子子重稱子者别於男子言在室則闗許嫁女子子嫁反在父之室為父遭喪後而出者始服齊衰周出而虞則受以三年之服既虞而出則小祥亦如之既除喪而出則已加服嫡孫為祖謂承重者為曾祖髙祖後亦如之父為長子重其當先祖之正體又將代已為宗廟主故庶子不得為長子三年不繼祖與禰也於庶子之嫡孫乃為其嫡子三年義服為人後者為所後父受重故三年為所後祖亦如之凡為人後者不以嫡子妻為夫夫尊而親妾為君妾謂夫為君國官為國君布帶繩屨既𦵏除之衰冠右正服加服衰裳三升義服三升半冠同六升右縫通屈一條繩為武垂下為纓冠外縪凡服上曰衰下曰裳布八十縷為升外繹者冠前後屈而出於武外厭縫之也婦人之衰連裳以六升布為總總束髮也童子亦連裳絰帶苴麻絰帶首絰大九寸左本在下繩纓五分首絰去一以為腰絰大七寸二分絞垂兩結相去四寸婦人絰如男子男子又有絞帶苴惡色也首絰象緇冠之頍腰絰象大帶絞帶象革帶五分腰絰去一為之齊衰以下用布屨菅屨外納外納納其餘於外婦人屨亦如男子杖右苴竹杖其大如腰絰長齊其心本在下主婦亦杖諸婦則不杖童子不杖其當室者則絻而杖童子及婦人不杖者以其不能病也然而童子當室杖者尊為喪主絻右狀象冠廣一寸無辟積童子當室亦服之總論節制三公以下皆三月而𦵏而虞三虞而卒哭十三月小祥除首絰練八升布為冠纓武亦如之婦人練總除腰絰至二十五月大祥除靈座自後有祭設几席除衰裳去絰杖十五升布深衣布純縞冠素紕纓革帶素履婦人除衰裳去絰縞總衣履如男子二十七月禫祭𤣥冠皂纓仍布深衣革帶吉履婦人緇總衣屨如男子踰月復平常齊衰三年正服子為母舊禮父卒為母周今改與父在同為祖後者祖卒則為祖母為曽祖髙祖後者為曽髙祖母亦如之母為長子加服繼母如母繼母之配父與親母同慈母如母妾之無子者妾子之無母者父命為子生則養之如母死則喪之如母義服繼母為長子妾為君之長子與嫡妻同不敢輕服夫之正統衰冠右正服加服衰裳四升義服五升其縷四升半成布四升冠七升合縫布纓武冠内縪前後縫於武内厭縫之絰帶牡麻絰帶首絰大七寸二分左本在上繩纓五分首絰去一以為腰絰大五寸七分半布帶代絞帶屨屨内納杖桐杖其大如腰絰通圎之長齊其心其本在下總論節制十三月小祥除首絰練九升為冠纓武亦如之其他祥禫變除與斬衰同踰月復平常齊衰杖周正服父卒母嫁及出妻之子為母皆報父卒為父後者為嫁母無服母猶服之不為出母黨服則為繼母之黨服為祖後者祖在為祖母為曾祖髙祖後者亦如之義服父卒繼母嫁從為之服報若繼母出則不服若繼母出嫁子從而繼育則服不育則不服夫為妻齊衰不杖周正服為祖父母父所生庶母亦同唯為祖後者乃不服為伯叔父為兄弟為衆子衆子者長子之弟及妾子凡父母于子舅姑于婦并傳重于嫡所傳重非嫡及養子為後者服之皆如衆子婦服為兄弟之子女在室報之亦然為嫡孫有嫡子無嫡孫凡為後承嫡者雖曽孫𤣥孫與孫同為姑姊妹女子子在室及適人無主者姑姊妹報無主無祭主謂無夫與子人之所哀不忍降之女子子為祖父母雖出嫁猶不敢降其祖妾為其子加服女子子適人者為兄弟之為父後者出嫁猶不降為父後者婦人有歸宗之義故不自絶其族類降服妾為其父母凡妾為私親如衆人為人後者為其父母報凡為人後者本親降一等其妻又降夫一等女子子適人者為其父母義服為伯叔母服與伯叔同為繼父同居者子無大功之親與之適人所適者亦無大功之親是謂繼父同居繼父之子不從服為繼父不報妾為嫡妻嫡妻不為妾服妾為君之庶子婦為舅姑其夫為祖曽祖髙祖後者其妻從服亦如舅姑為夫兄弟之子男女同報舅姑為嫡婦其夫應三年者然後為其婦齊哀周齊衰五月正服為曽祖父母本三月以其降殺太多故新議改從五月女子子在室者及嫁者為曽祖父母齊衰三月正服為髙祖父母重其衰麻尊尊也減其日月為恩殺也女子子在室者及嫁者為髙祖父母不敢降其祖也義服為繼父不同居先同今異繼父有子及有大功之親雖同居亦為異居元不同者不服右降服亦衰裳四升冠七升正服五升冠八升義服六升冠九升右縫布纓武冠内縪前後縫於武内厭縫之婦人則布總精麄如男子之冠其絰帶與三年同其杖三年及杖周皆桐杖各大如腰絰通圓之長齊其心本在下麤屨内納不杖周則麻屨五月三月則繩屨其三年者與斬衰同杖周十一月小祥十三月大祥十五月禫逾月除復常祥禫變節皆與斬衰同其父卒母嫁出妻之子為母及為祖後祖在為祖母雖周除仍心䘮三年義服齊衰三月者衰裳六升冠九升絰帶與周同而繩屨大功長殤九月中殤七月正服為子女子子之長殤中殤殤者未成人而死可哀傷者男子已娶女子許嫁皆不為殤年十九至十六為長殤十五至十二為中殤十一至八嵗為下殤八嵗以下為無服之殤以日易月本服周者哭之十三日大功九日小功五日緦麻三日為叔父之長殤中殤為姑姊妹之長殤中殤為兄弟之長殤中殤為嫡孫之長殤中殤嫡曽孫嫡𤣥孫亦司為兄弟之子女子子之長殤中殤義服為夫之兄弟之子女子子之長殤中殤成人九月正服為從父兄弟今之同堂兄弟姊妹之在室者為庶孫女在室亦然降服為女子子適人者出降者兩女各出不再降若兩男各為人後者亦如之為姑姊妹適人者報出母為女子子適人者女報同為兄弟之女適人者報為人後者為其兄弟為人後者為其姑姊妹在室者報右成人服衰裳八升冠十升餘皆與長殤同義服為夫之祖父母為夫之伯叔父母報報者旁尊不足以尊降為夫之兄弟女適人者報夫為人後者其妻為本生舅姑為衆子婦右降服衰裳七升正服八升冠十升義服衰裳九升冠十一升婦人則布􅄣精麄如男子之冠牡麻絰首大五寸七分半長殤及成人皆九月纓以繩中殤皆七月絰無纓俱五分首絰去一以為腰絰大四寸六分布帶繩纓小功五月殤正服為子女子子之下殤為叔父之下殤為姑姊妹之下殤為嫡孫之下殤為兄弟之下殤為兄弟之子女子子之下殤為從父兄弟姊妹之長殤為庶孫丈夫婦人之長殤降服為人後者為其兄弟之長殤為姪丈夫婦人之長殤出嫁姑為之服為人後者為其姑姊妹之長殤義服為夫之兄弟之子女子子之下殤為夫之伯叔父之長殤右降正服冠縗同十升義十一升澡麻絰帶澡謂去其莩垢不絶其本冠左縫不厭婦人布總精麄如男子首絰大四寸六分五分首絰去一以為腰絰大三寸七分布帶吉屨無絇婦人衰絰精麄如男子降服不澡成人五月正服為從祖祖父報祖之兄弟也兄弟之孫女在室亦如之為從祖父報父之同堂兄弟同堂兄弟之女在室亦如之為從姑姊妹在室者報父之同堂姊妹及已再従姊妹為從祖祖姑在室者報祖之姊妹為外祖父母為舅及從母丈夫婦人報母之兄弟姊妹降服為從父姊妹適人者報周堂姊妹為孫女適人者為人後者為其姑姊妹適人者報義服為從祖祖母報祖之兄弟妻為從祖祖母報父之同堂兄弟妻為夫之姑姊妹在室及適人者報為娣姒婦報為同母異父兄弟姊妹報為嫡母之父母兄弟從母謂妾子為嫡母之父母及兄弟姊妹嫡母卒則不服為庶母慈已者謂庶母之乳養已者為嫡孫之婦有嫡婦則無嫡孫之婦曽孫𤣥孫為後者服其婦如嫡孫之婦母出為繼母之父母兄弟從母母卒則為其母之黨服不為繼母之黨服嫂叔報兄嫂弟妻同右降服衰裳十升正服衰裳十一升冠同十一升義服衰裳十二升冠與衰同其絰如小功五月唯麻斷本緦麻三月殤正服為從父兄弟姊妹之中殤下殤為庶孫丈夫婦人之中殤下殤為從祖叔父之長殤為從祖兄弟之長殤為舅及從母之長殤為從父兄弟之子之長殤為兄弟之孫之長殤為從祖姑姊妹之長殤降服為人後者為其兄弟之中殤下殤為姪丈夫婦人之中殤下殤出嫁姑為之服為人後者為其姑姊妹之中殤下殤義服為人後者為從父兄弟之長殤為夫之叔父之中殤下殤為夫之姑姊妹之長殤成人正服為族兄弟三從兄弟三從姊妹出嫁者則無服為族曽祖父報曽祖之兄弟曽孫女出嫁則無服為族祖父報祖之同堂兄弟孫女出嫁則無服為族父報父之再從兄弟再從兄弟之女出嫁則無服為曽孫𤣥孫為外孫女子子之男女為從母兄弟姊妹今為兩姨兄弟姊妹為姑之子外兄弟姊妹為舅之子内兄弟姊妹為族曽祖姑在室者報曽祖之姊妹為族祖姑在室者報祖之同堂姊妹為族姑在室者報父之再従姊妹降服女子子適人者為從祖父報謂堂伯叔為從祖姑姊妹適人者報父之同堂姊妹及已之再從姊妹庶子為父後者為其母若無嫡母及嫡母卒則申妾子不服外祖父母舅從母為從祖祖姑適人者報祖之姊妹為人後者為外祖父母本生外祖父母為兄弟之孫女適人者報義服為族曽祖母報曽祖兄弟之妻為族祖母報祖之同堂兄弟之妻為族母報父之再從兄弟之妻為庶孫之婦女子子適人者為從祖伯叔母同堂伯叔母為庶母父妾有子者為乳母為壻女子子之夫報為妻之父母從妻服之為夫之曽祖髙祖父母為夫之從祖祖父母報夫之祖兄弟及其妻為夫之從祖父母報夫之父同堂兄弟及其妻為夫之外祖父母報為夫之從祖兄弟之子夫之再從兄弟之子為夫之從父兄弟之妻為夫之從父姊妹在室及適人者為夫之舅及從母報改葬緦子為父母妻妾為夫既葬除之右降正義服冠衰同十五升去其半有事其縷無事其布右縫不厭婦人則布總精麄如男子之冠澡麻斷本以為絰首絰大三寸七分五分首絰去一以為腰絰大二寸九分布帶吉屨無絇皇家所絶旁親服者皇弟子為之皆降一等凡童子不緦當室則緦衰裳制度凡衰外削幅裳内削幅三絇削猶殺也絇謂辟兩側空中央也凡衰前幅三絇後四絇若齊裳内衰外齊緝也凡五服之衰一斬四緝緝裳者内展之緝衰者外展之負廣出于適寸負在背者適辟領也負出于辟領旁一寸適博四寸出于衰博廣也辟領廣四寸則與闊中八寸也兩之為尺六寸出于衰者旁出衰外衰長六寸博四寸廣長當心衣帶下尺衣帶下尺者腰也廣尺足以掩裳上際衽二尺有五寸衽所以掩裳際也上正一尺燕尾二尺五寸凡用布三尺五寸也袂屬幅屬猶連也連幅謂不削衣二尺有二寸此謂袂中也衣自領至腰二尺二寸倍之四尺四寸加辟領八寸又倍之凡衣用布一丈四寸袪尺二寸袪袖口也大唐開元禮卷一百三十二
