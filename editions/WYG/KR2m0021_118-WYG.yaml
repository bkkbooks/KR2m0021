  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0021_WYG_118-1a, image: WYG0646/WYG0646-0699a.png}
body:
  text: 大唐開元禮卷一百十八唐蕭嵩等撰嘉禮三品以上庶子冠將冠筮日筮賔如嫡子之儀前二日主人戒賔及贊冠者前一日掌事者設次於大門外之右南向其日夙興贊者設洗於正寢阼階東南東西當東霤六品以下當東榮南北以堂深罍水在洗東加勺羃篚在洗西南肆實巾一於篚加羃席於東房内西牖下無房者張帷為之陳服於席東領北上冕服青衣纁裳一品衮服九章五章在衣山龍華蟲火宗彞四章在裳藻粉米黼黻二品鷩冕服七章三章在衣華蟲藻火四章在裳宗彞粉米黼黻三品毳冕服五章三章在衣宗彞藻粉米二章在裳黼黻四品綉冕服三章一章在衣粉米二章在裳黼黻五品𤣥冕衣無章裳刺黼一章六品以下爵弁服青衣纁裳白紗中單黼領青褾襈裾革帶鈎䚢大帯一品二品大𢃄皆紕其外上以朱下以綠三品大帯四品五品素帯皆紕其垂外以𤣥内以黄紉約皆用青組六品以下練帯紕其垂内外以緇約用青組中單青領黼隨裳色山火二章四品綉裳山一章五品𤣥冕無章六品爵鞸劍飾以金玉飾四品五品以金雙珮一品山𤣥玉五品以上水蒼玉雙綬一品緑綟綬四綵緑紫黄赤純緑質長一丈八尺二百四十首廣九寸二品三品紫綬三綵紫黄赤純紫質長一丈六尺一百八十首廣八寸皆有小雙綬長二尺六寸色同大綬而首半之一品施二玉環四品青綬三綵青白紅純青質長一丈四尺一百三十首廣七寸五品墨綬二綵青紺純紺質長一丈二尺一百首廣六寸皆有小雙綬長二尺六寸色同大綬而首半之六品以下無劍珮綬朱韈赤舄五品以上同六品以下白韈赤履庶人黑介幘服絳公服方心革帯鈎䚢假帯韈履進賢冠服絳紗單衣白紗中單皂領褾襈裾白裙襦赤裙衫革𢃄鈎䚢假帯曲領方心絳紗蔽膝白韈黑舄八品以下去中單曲領蔽膝黑履庶人黑介幘服白裾襦青領革帯韈履劍雙珮雙綬六品以下無劍綬緇布冠服青衣素裳素鞸中單革𢃄大帯劍珮綬與冕服同韈舄與進賢冠服同六品以下中單革帯與爵弁服同韈履與進賢冠服同庶人帯韈履與介幘服同去鞸緇纚櫛簮同箱在服南纚今用皂巾方六寸屬帯於前兩隅莞筵三紛純加藻席三緇純在南樽於房户外之西兩甒𤣥酒在西加勺羃設坫於樽東置二爵於坫加羃饌陳於服北四品五品蒲筵三緇布純加萑席三𤣥帛純六品以下蒲筵三緇布純不加萑席四品五品設篚無坫柶以角為之狀如匕饌用少牢及腊三俎一品二品十籩十豆三品八籩八豆四品五品六籩六豆凡牲體節折加離肺籩實脯棗之屬豆實醢醬之類六品以下特牲一俎二籩二豆籩實脯棗豆實葅醢質明賔贊至主人大門外掌次者引之次賔贊公服諸行事者各服其服六品以下無公服者服其常服執樽罍篚者皆就位衮冕垂青珠九旒以組為纓色如其綬青纊充耳角簮導鷩冕七旒毳冕五旒餘皆同衮冕四品五品綉冕垂青珠四旒以組為纓色如其綬青纊充耳角簮導𤣥冕三旒餘同綉冕六品以下用爵弁𤣥纓庶人用黑介幘進賢冠三梁纓青緌犀導四品五品兩梁六品以下一梁庶人則黑介幘緇布冠青組纓冠冕各一箱各一人執之待於西階之西東面西北上設主人之席於阼階上西面賔席於西階上東面冠者席於房户外之西南面房外謂尊束主人公服立於阼階下當東序西面諸親公服非公服者常服立於罍洗東南西面北上尊者停别室儐者公服立於門内道東北面將冠者雙童髻空頂幘雙玉導金寳飾綵袴褶錦紳烏皮履立於房内南面主人贊冠者公服立於房内户東西面賔及贊冠者出次立於門西贊冠者少退俱東面北上儐者進於主人之左北面受命出立於門東西面曰敢請事賔曰某子有嘉禮命某執事儐者入告主人迎賔於大門外之東西面再拜賔答拜凡賔主拜揖入出皆贊禮相導主人揖贊冠者贊冠者報揖主人又揖賔賔報揖主人入賔及贊冠者次入及門内主人揖賔賔報揖主人與賔入贊冠者從之至内霤將曲揖賔報揖至階主人立於阼階東西面賔立於階西東面主人曰請吾子升賔曰某備將事敢辭主人曰固請吾子升賔曰某敢固辭主人曰終請吾子升賔曰某敢終辭主人升自阼階立於席東西向賔升自西階立於席西東向贊冠者及庭盥於洗升自西階入於東房立於主人贊冠者之南俱西面主人贊冠者引將冠者出立於房户外之西南面賔之贊冠者取纚櫛簮箱跪奠於冠者筵東興席東少北南面立賔揖將冠者賔主俱即席坐將冠者進升席面南坐賔之贊冠者進筵前北面跪脫雙童髻置於箱櫛畢設纚興復位賔主俱興賔降盥主人從降賔東面辭曰請吾子不降主人曰吾子降辱敢不從賔降至罍洗盥手訖詣西階賔主一揖一讓升主人立於席後西面賔立於西階上東面執緇布冠者升賔降一等受之右執頂左執前進將冠者筵前北向跪冠興復西階上席後東面立賔之賛冠者進筵前北面跪結纚興復位冠者興賔揖冠者適房賔主俱坐冠者著青衣素裳之服出房立於户西南賔主俱興賔揖冠者進立於席後南面賔降盥主人從降辭對如初賔盥手跪取爵於篚興洗訖詣西階賔主一揖一讓升主人立於席後西面賔詣酒尊所酌酒進冠者筵前北面立祝曰㫖酒既清嘉薦亶時始加元服兄弟具來孝友時格永乃保之冠者筵西拜受爵賔復西階上東面答拜執饌者薦籩豆於冠者筵前冠者升筵坐左執爵右取脯擩於醢祭於籩豆之間祭酒興筵末坐啐酒執爵興降筵西跪奠爵再拜執爵興賔答拜冠者升筵跪奠爵於薦東興立於筵西執饌者徹薦爵賔揖冠者冠者進升筵南向坐賔之贊冠者跪脫緇布冠置於箱櫛畢設纚興復位賔降二等受進賢冠庶人則黒介幘右執頂左執前進冠者筵前北面跪冠興復位賔之賛冠者坐設簮纓興復位冠者興賔揖冠者冠者適房賔主俱坐冠者著絳紗服庶人則白裙襦服出房立於户西南面賔主俱興賔揖冠者進立於席後南面賔詣酒尊所取爵酌酒進冠者筵前北面立祝曰㫖酒既湑嘉薦伊脯乃申爾服禮儀有序祭此嘉爵承天之祜冠者筵西拜受爵賔復西階上東面答拜執饌者薦籩豆冠者升筵坐左執爵右祭脯醢祭酒興筵末坐啐酒執爵興降筵西跪奠爵再拜執爵興賔答拜冠者升筵坐奠爵於薦東興立於筵西南面執饌者徹薦爵賔揖冠者冠者進升席南面坐賔之贊冠者跪脱進賢冠庻人脱黑介幘置於箱櫛畢設纓興復位賔降三等受冕六品以下受爵弁庻人則黒介幘右執頂左執前進冠者筵前北向跪冠興復位賔之賛冠者坐設簮結纓興復位冠者興賔揖冠者適房賔主俱坐主人賛冠者徹櫛箱入於房冠者著冕服六品以下爵弁服庻人絳公服出房立於户西南面賔主俱興賔揖冠者冠者進立於席後南面賔詣酒尊所取爵酌酒進冠者筵前北向立祝曰㫖酒既芳籩豆有楚咸加爾服肴升折爼承天之慶受福無疆冠者筵西拜受爵賔復位東面答拜執饌者薦籩豆設爼於籩豆之南冠者升筵坐左執爵右祭脯醢賛冠者取脯一以授冠者冠者奠爵於薦西興受㕁左手執本坐右絶末以祭上左手嚌之興加於爼冠者坐帨手執爵祭酒興筵末坐啐酒興降筵西南面坐奠爵再拜執爵賔答拜冠者升筵坐奠爵於薦東興降席北面跪取脯降自西階入見母進奠脯於席前退再拜以出冠者母不在則使人受脯於西階下初冠者入見母賔主俱興賔降當西序東面立主人降當東序西面立冠者既見母出立於西序之東南上賔少進字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜錫之於嘏永受保之曰孟某甫仲叔季惟其所當冠者曰某雖不敏夙夜袛奉賔出主人送於内門外主人西面請賔曰吾子辱執事請禮從者賔曰某既得將事敢辭主人曰敢固以請賔曰某辭不得命敢不從賔就次主人入初賔出冠者東面見諸親諸親拜之冠者答拜冠者西南面拜賔之贊冠者賔之贊冠者答拜謁諸尊於别室賔主既釋服改席訖賔與衆賔俱出次立於門西東面主人出門東西面主人揖賔報揖主人先入賔及衆賔從之至階一讓各升就坐後立定升坐㑹訖賔主俱興賔立於西階上賛冠者在北少退俱東面主人立於東階上西面衆賔降立於西階下東面掌事者以幣篚升授主人於序端主人執篚少進西面立又掌事者奉幣篚升立於主人之後於幣篚升牽馬者牽兩馬入陳於門内三分庭一在南北首西上賔還西階上北面賛冠者於賔左少退賔賛者俱再拜主人進立於楹間南面賔賛進立於主人之右俱南面主人授幣篚賔受之退復東面位於主人授篚掌事者又以幣篚授賛冠者退復位主人還阼階上北面拜送賔降自西階從者迓受幣賔當庭實東面揖東出牽馬者從出從者迓受馬於門外於賔降主人降送賔於大門之東西面再拜賔退主人入孤子則諸父諸兄戒賔冠之日主人髻而迎賔拜揖讓如冠主冠醮禮賔拜送皆如上儀明日見廟冠者朝服無廟者見祖禰於正寢冠者公服庻人則常服質明賛禮者引入廟南門道西中庭北面賛再拜訖引出無廟者設几筵於正寢賛禮者引入至庭北面再拜訖引出五品已上孫九品以上子冠假用出身品服其三品以上大功以上親五品以上周以上親冠同八品九品服大唐開元禮卷一百十八
