body:
  text: 大唐開元禮卷一百三十三唐蕭嵩等撰凶禮訃奏為外祖父母舉哀為皇后父母舉哀為諸王妃主舉哀為内命婦舉哀為宗戚舉哀為貴臣舉哀為蕃國主舉哀臨䘮臨諸王妃主䘮臨外祖父母䘮臨皇后父母臨宗戚䘮臨貴臣䘮除䘮除外祖父母䘮除皇后父母䘮訃奏為外祖父母舉哀皇帝為外祖父母舉哀本司散下其禮所司隨職供辦尚舍奉御先扵别殿設素褥牀席為舉哀成服位南向尚衣奉御先製小功五月之服守宫先扵舉哀殿外門之外隨便設百官文武次如常其日舉哀前三刻諸衛屯門列仗如常諸應陪慰者並赴集次所典儀扵舉哀殿門外布百官位亦如常又扵殿前設諸王三品已上哭位文東武西重行北面相對為首諸親位扵文武官五品之下皇宗親在東異姓親在西又扵階下當御位北向設太尉奉慰位文武百官到入次改服素服侍中版奏請中嚴亦在三刻之前尚衣奉御以篋奉衰服升立於殿東間北面典謁引諸王百官一品以下九品以上俱就門外位文武侍衛之官詣閤奉迎舉哀前一刻侍中版奏外辦皇帝服素服御輿出升别殿降輿即哭位南向坐侍衛如常儀至其時侍中跪奏請為故某官若某郡君舉哀俛伏興皇帝哭十五舉聲侍中跪奏請哭止成服俛伏興皇帝止哭尚衣奉御以筵奉衰服進跪授興仍贊變服焉於變服則權設步障已而去之成服已侍中又跪奏請哭俛伏興皇帝哭通事舍人引諸王文武百官三品以上入就殿庭位舍人贊拜羣官在位者皆再拜舍人贊哭羣官在位者皆哭十五舉聲舍人賛止羣官在位者皆止舍人引諸王為首者一人進詣奉慰位跪奉慰俛伏興舍人引退還本位又舍人次引百官文武行首一人進詣奉慰位跪奉慰俛伏興舍人引退還本位舍人賛拜在位者皆再拜舍人引三品已上退出其四品以下位於門外者典謁贊哭贊止引退如殿庭之儀侍中跪奏請哭止還俛伏興皇帝御輿降還侍衛從至閤如初所司宣仗散其日晡哭則晡前二刻奏嚴一刻奏辦皇帝服衰服出即位次哭如初百官不集自後朝晡凡三日而止為皇后父母舉哀右與為外祖父母禮同其異者製緦麻三月之服朝晡再哭而止為諸王妃主舉哀本司散下其禮所司隨職供辦尚舍奉御於肅章門外道東設大次南向周以行帷鋪御坐設素牀褥席守宫隨便於永安門外設文武官五品已上便次其日舉哀前三刻侍中版奏請中嚴前二刻諸衛列仗如常典儀於大次前量逺近設一品以下應陪集者哭位文東武西重行北上相對為首百官皆集次改服素服就位又於大次門前設奉慰位前一刻文武侍衛之官詣閤奉迎如常侍中版奏外辦皇帝素服御輿複道以出從幃宫後門入之大次其無複道者百官於外門外為位立降即哭位南向坐侍衛如常至時侍中跪奏請為故臣某官若主若妃舉哀俛伏興皇帝哭通事舍人贊羣官拜羣官在位者皆再拜若百官為門外位者候入大次通事舍人引三品以上入次前位四品以下仍門外位舍人贊哭羣官在位者皆哭十五舉聲舍人贊止羣官在位者皆止舍人引文武官行首一人詣奉慰位跪奉慰俛伏興引退還本位舍人贊拜羣官在位者皆再拜訖有門外位者典謁贊拜贊哭贊止侍中跪奏請哭止俛伏興又奏請還宫退本位立皇帝哭止御輿降還其侍衛從至閤如常所司宣仗散其日晡哭則晡前二刻奏嚴一刻奏辦皇帝仍初服出即位次哭如初侍衛如初百官不集自後本服周者凡三朝哭而止本服大功者其日晡哭而止本服小功已下一舉哀而止若皇太子陪舉哀則素服左庶子啟引從帷宫南門入至大次前啟再拜訖引升東間之南北面哭於百官哭止皇太子哭止進御坐前跪俛伏興再拜於百官退引降拜還如初其宫官等應陪拜慰者則隨班於上臺自下皆然為内命婦舉哀右與為諸王妃主禮同其三夫人以上其日仍晡哭而止其九嬪以下一舉哀而止亦隨恩賜之為宗戚舉哀右與為諸王妃主禮同爲貴臣舉哀右與為諸王禮同其異者一舉哀而止貴臣謂職事二品以上散官一品其餘官亦隨恩賜之淺深為蕃國主舉哀右與為貴臣禮同其異者城外張帷幔為次向其國而哭之至三聲而止臨喪皇帝臨諸王妃主喪本司散下其禮所司隨職供辦尚舍直長先設行宫大次於主人第大門外之西南向守宫於主人大門外隨便設諸從駕文武之官便次其所臨者五屬之親於乗輿未到之前並先集列於主人之第其執事預於其寢北設障幔為主人五屬婦女拜哭次其日未出宫前四刻侍中版奏請中嚴出宫前三刻搥一皷為一嚴三嚴時節前一日侍中奏裁所司整設小駕鹵簿於所出宫門外如常儀出宫前三刻又搥二鼔為再嚴奉禮於所出宫門外設陪從之官位如常尚舍奉御先於主人第大門外便次内設皇帝座南向又於主人堂上中間設素褥牀席為哭位亦南向典儀又於主人庭中設陪從之官位文東武西重行北面相對爲首又於御座前階下設奉慰位主人執事於堂下設五屬之親位於東階之東重行西面北上以服精麄為序而尊者差前又設五屬婦女位於堂北幔下主女位於東廂西面南上妻妾位於西廂東面南上衆婦人位於北廂重行南面諸親在東相對為首以服精麄為屬序外而並尊陪者臨差扵前此其所五内諸陪從之官各常服赴集其位有司整列皇帝四望車以下及仗衛之屬應列鹵簿者於内外如常儀出宫前一刻又搥三皷為三嚴侍衛之官詣閤奉迎如常侍中版奏外辦皇帝服常服御輿以出繖扇華葢侍衛警蹕如常儀皇帝降輿升車黄門侍郎當車前跪奏稱黄門侍郎臣某言請乗輿發退復位凡黄門侍郎奏請皆進跪奏稱具官臣某言訖俯㐲興駕動警蹕如常黄門侍郎與贊者夾輅以出至侍臣上馬所黄門侍郎進跪奏稱請駕權停勅侍臣上馬俛㐲興侍中前承詔退稱制曰可黄門侍郎退唱侍臣上馬贊者承傳文武侍臣上馬畢黄門侍郎奏稱請乗輿發退復位鑾駕動稱警蹕皷吹不作文武羣官應陪從者乗馬以從駕行至行宫門外侍中進跪奏請降車俛伏興退復位皇帝降車御輿就大次其輿輦以下鈒㦸仗衛之屬陳列於大次前之左右皇帝變服素服其陪從之官各舍於便次變服素服其侍臣及武官不變服主人相引主人内外五屬之親各服衰服就堂下外内位次哭典儀一人立於堂下東階東南贊者二人立於其南差退俱西面皇帝變服訖御輿出侍衛如常主人免絰去杖司儀令引出大門外望見承輿止哭再拜迎仍引主人先入門右西面立不哭其未殯則通拜迎拜送於大門内相者贊衆主人以下皆止哭皇帝至堂侍中跪奏請降輿升俯伏興於所臨喪者非尊秋則御輿升堂皇帝降輿升自東階即哭位坐巫祝各一人先升巫執桃立於東南祝執茢立於西南相向千牛四人執戈隨升二人先二人後侍臣夾升列於户内外及階下左右其仗衛鹵簿止列於門外内如常同儀令引主人入中庭北面典儀稱拜主人内外皆再拜勅引主人升司儀令引主人升立於户内之東西面侍中跪奏請哭俯伏興皇帝哭典儀稱哭贊者承傳唱可哭凡典儀有詞贊者皆承傳主人以下在位者皆哭典謁引諸位官應陪臨者入即班位立定典儀稱拜從官在位者皆再拜典儀稱哭從官在位者皆哭十五舉聲典儀稱止從官在位者皆止典謁引諸王爲首者一人進舍人接引詣奉慰位跪奉慰俯伏興舍人引退典謁接引還本位又典謁次引諸從官文武行首一人進舍人接引詣奉慰位跪奉慰俯伏興舍人引退典謁接引還本位典儀稱拜在位者皆再拜訖典謁引從官在位者出又典謁次引諸王等以次出侍中跪奏請哭止俯伏興皇帝止典儀稱哭止主人已下皆止司儀令引主人降立於庭中之東北面典儀稱拜主人已下皆再拜侍中跪奏請還俛伏興皇帝降御輿出侍衛警蹕如初司儀令引主人先出俟於大門外拜送皇帝至大次降輿即御座變服司儀令引主人哭還廬次皇帝停大次未發前三刻侍中版奏請中嚴所司預奏三嚴每嚴槌皷如初整列仗衛鹵簿於還途如來儀奉禮於行宫南門外道左向重行設陪從之官位文左武右陪從之官於便次變服常服赴集位所典謁引即班位三嚴已侍中版奏外辦皇帝御輿出侍衛警蹕並如初皇帝降輿升車黄門侍郎奏請及羣官陪從皷吹不作並如來儀乗輿至殿前若閤外迴車侍中跪奏請降入俯伏興皇帝降車御輿入侍臣從至閤如初侍中版奏解嚴將士各還其所百官退臨外祖父母喪臨皇后父母喪臨宗戚喪臨貴臣喪右四條與臨諸王妃主喪禮同其臨諸王妃主喪及凡内喪則並幸其前寢次也其尊親應就喪殯寢者則臨殯寢所凡臨諸王妃主尊親者及師保傅與三老五更二王後喪則敬同外祖其所臨幸者若第鄰宫闕率爾往還則容不備鹵簿與嚴皷皆稟當時别儀注其内外文武陪從之官准駕備畧備爲官從具畧謂減省之車駕若經太廟則侍中跪奏式過乃服常除服除外祖父母喪服本司散下其禮所司隨職供辦守宫先於别殿門外隨便設百官文武便次如初於除服前之夕尚舍奉御於别殿設素下牀席焉至日平曉而除服外祖父母則五月先下旬之吉也其從朝制公除則外祖父母五日也除服前三刻侍中版奏請中嚴諸衛勒所部屯門列仗如常典儀於别殿前設諸王百官三品以上位如初又設奉慰位如初又設一品以下九品以上位於别殿門外如初百官文武應陪臨者並赴集大門便次各改素服典謁引就别殿門外位尚衣奉御以篋奉素服吉履升殿立於殿東間北面立腰輿進於寢庭侍衛之官詣閤奉迎如常式除服前一刻侍中版奏外辦皇帝仍服衰服御輿出左右直衛鈒㦸警蹕如初皇帝升别殿降輿即哭位侍衛如初侍中跪奏請哭俛伏興皇帝哭十五舉聲侍中跪奏請哭止從禮制除服俛伏興皇帝止尚衣奉御以篋奉衣履進跪授興仍贊變除於變除則權設歩幔已而去之也變除已侍中又跪奏請哭俛伏興還本位皇帝哭通事舍人引諸王百官三品以上入各就班立定舍人贊羣官拜羣官在位者皆再拜舍人贊哭羣官在位者皆哭十五舉聲舍人贊止羣官在位者皆止舍人引諸王為首一人進詣奉慰位跪奉慰俛伏興舍人引退還本位又舍人次引百官文武行首一人進詣奉慰位跪奉慰俛伏興舍人引退還本位舍人贊拜在位者皆再拜舍人引三品以上出其四品以下位於門外者典謁贊拜贊哭贊止引退如三品以上之儀侍中跪奏請哭止還俛伏興皇帝止皇帝御輿降還其夾御之官從至閤如初所司奏宣解嚴如常儀除后父母喪服右與除外祖父母喪服禮同其異者后父母則三月先下旬之吉除也公除則三日而除之大唐開元禮卷一百三十三
