body:
  text: 大唐開元禮卷五十二唐蕭嵩等撰吉禮皇帝視學視學前一日所司灑掃學堂之内外尚舍設大次於學堂之後守宫設皇太子次于大次之東皆隨地之宜並如常儀尚舍設御坐于學堂上北壁下當中南向監司設講榻於御坐之西南向設執讀坐于前楹間當講榻北向尚舍又設皇太子坐於御坐東南西向設文官三品以上坐於皇太子之南少退重行西面北上設武官三品以上坐於講榻西南當文官重行東面北上設侍講坐於執讀西北武官之前東面北上其執如意者一人立于侍講之南東面設論議坐於講榻之前北面三館學官坐於武官之後設脱履席於西階下典儀設版位皇太子於東階東南西面執經於西階西南東面文官三品以上于皇太子東南重行西面北上武官三品以上於執經西南侍講執讀執如意等于執經之後皆重行東面北上學生分位于文武官之後皆重行北上設典儀位於東階之西贊者二人在南差退俱西向出宫前出宫三日本司宣攝内外各供其職其日應從駕文武官依時刻俱集朝堂諸衛陳設仗衛侍中版奏外辦皇帝乗馬文武侍從並如常行幸之儀駕將至祭酒帥監官學官學生等奉迎於路左學生青衿服駕至大次門外降入如常視學皇帝既入大次執經侍講執讀執如意等及學官各服公服典儀帥贊者先入就位謁者贊引引文武三品以上及執經以下學官等入就堂下位皇太子立於學堂門外之東西向侍衛如常侍中版奏外辦皇帝出大次升自北階即御坐南向坐侍臣及近侍量人從升典儀一人升就東階上西面立舍人引皇太子就位立諸衛率庶子等量人從入立于皇太子東南西面北上奉禮曰再拜贊者承傳皇太子以下在位者皆再拜侍中跪奏稱請勅皇太子及王公等升坐又侍中稱制曰可侍中詣東階上西面稱勑皇太子及公王等升殿上典儀承傳階下贊者又承傳皇太子以下應坐者皆再拜訖通事舍人引皇太子及羣官應坐者各升坐訖其公服者脱履于階下及降納皆如常儀執讀讀所講經執經釋義訖遂行如意侍講者執如意就論議坐以次論難訖侍中跪奏禮畢群官皆起通事舍人各降堂下位若有勅賜㑹則侍中前承制降詣堂下宣勅及太官下食案等並如常儀皇帝降坐還大次侍衛如常儀羣官以下㑹訖皆出執經以下改服常服學生仍青衿服車駕還宫皇帝既還大次侍中量時刻版奏外辦皇帝出次文武官陪從還宫如來儀初駕出國子祭酒帥監官學官學生等奉辭于路左如常式大唐開元禮卷五十二
