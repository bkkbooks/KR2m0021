body:
  text: 大唐開元禮卷九唐蕭嵩等撰吉禮孟夏雩祀圜丘有司攝事齋戒陳設省牲器薦玉帛進熟齋戒將祀有司卜日如前儀前祀七日平明太尉誓百官于尚書省曰某月某日雩祀昊天上帝于圜丘各揚其職不供其事國有常刑凡預祀之官散齋三日致齋三日散齋皆于正寝致齋二日于本司一日于祀所其無本司者則于郊社署散齋理事如舊唯不吊喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯祀事得行其餘悉斷其祀官已齋而闕者通攝行事諸祀官致齋之日給酒食及明衣各習禮於齋所光禄卿監取明水火太官令取水于隂鍳取火于陽燧火以供㸑水以實尊前祀二日太尉告太宗文武聖皇帝廟如常告之儀告以配神作主之意前祀一日諸衛令其屬未後一刻各以其方器服守衛壝之門毎門二人每隅一人與太樂工人俱清齋一宿陳設前祀三日守宫設祀官公卿以下次于東壝之外道南北向西上設陳饌慢于内壝東門之外道南北向前祀二日太樂令設宫懸之樂于壇南内壝之内東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于編懸之間各依辰位樹雷鼓于北懸之内道之左右植建鼔于四隅置柷敔于懸内柷在左敔在右設歌鐘歌磬於壇上近南北向磬簴在西鐘簴在東其匏竹者立于壇下重行北向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以北為上南方北方以西為上右校掃除壇之内外郊社令積柴于燎壇其壇于樂懸之南外壝之内方一丈髙一丈二尺開上南出户方六尺前祀一日奉祀設祀官公卿位于内壝東門之内道北執事位于道南每等異位俱重行西面北上設望燎位于柴壇之北南向設御史位于壇下一位于東南西向一位于西南東向令史陪其後設奉禮位于樂懸東北賛者二人在南差退俱西向設協律郎位于壇上南陛之西東向設太樂令位于北懸之間北向設祀官公卿以下門外位皆于東壝之外道南每等異位重行北面西上設牲牓于東壝之外當門西向蒼牲一居前青牲一少退又青牲二赤牲二黄牲二白牲二黝牲二皆南上又設廩犧令位于牲西南史陪其後俱北向設諸太祝位于牲東各當牲後俱西向設太常卿省牲位于牲前近北又設御史位于太常卿之西俱南向設酒樽之位于壇之上下天帝太尊二著尊二犧尊二山罍二在壇上東南隅北向象尊二壺尊二山罍二在壇下南陛之東北向俱西上設配帝著樽二犧尊二象尊二山罍二在壇上於天帝酒尊之東北向西上五方帝各太樽二犧尊二山罍一在第一等五帝各犧尊二在第二等五官各象樽二在壇下皆設于神坐之左而右向尊皆加勺羃五帝已上之尊皆有坫以置爵五官之尊藉以席設爵于尊下也設洗于壇午陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵設五官罍洗篚羃于酒尊之西俱北向執尊罍篚羃者于尊罍篚羃之後各設玉幣之篚于壇之上下尊坫之所祀日未明五刻太史令郊社令升設昊天上帝神坐于壇之中央南向席以藁秸設太宗文武聖皇帝神坐于東方西向席以莞設五方帝之坐于第一等青帝于東陛之北赤帝于南陛之東黄帝于南陛之西白帝于西陛之南黒帝于北陛之西皆席以藁秸又設五帝之坐于第二等如五方帝之陛位又設五官之坐于壇下之東南西向北上皆席以莞設神位于坐首省牲器省牲之日午後十刻去壇二百步所諸衛之屬禁斷行人晡後二刻郊社令帥府史二人及齋郎以尊坫罍洗篚羃入設于位升壇者自東陛晡後三刻諸太祝與廩犧令以牲就牓位謁者引太尉常卿賛引引御史入詣壇東陛升視滌濯凡導引者毎曲一逡巡於視濯執尊者皆舉幕告潔訖引降就省牲位南向立廩犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西面舉手曰充還本位諸太祝與廪犧令以次牽牲詣厨授太官謁者引光禄卿詣厨省鼎鑊申視濯溉賛引引御史詣厨省饌具太常以下毎事訖各還齊所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置于饌所遂烹牲薦玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各帥其屬入實尊罍及玉幣凡六尊之次太尊為上實以汎齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝著尊為上實以汎齊犧尊次之實以醴齊象尊次之實以盎齊山罍為下實以清酒五方帝之太尊實以汎齊犧尊次之實以醴齊山罍次之實以盎齊五帝之犧尊實以醴齊五官之象尊實以醍齊元酒各實于五齊之上尊禮神之玉昊天上帝以蒼璧青帝以青珪赤帝以赤璋黄帝以黄琮白帝以騶虞黑帝以元璜天帝配帝之幣皆以蒼五方帝五帝各從方色凡幣皆一丈有八尺太祝以玉帛置于篚太官令帥進饌者實諸籩豆簠簋等各設饌于幔内未明五刻奉禮帥賛者先入就位賛引引御史博士諸太祝及令史與執尊罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳御史以下皆再拜執尊罍篚羃者各就位賛引引御史諸太祝詣壇東陛升行掃除于上令史祝史行掃除于下訖皆就位未明一刻謁者賛引各引祀官俱就門外位太樂令帥工人二舞次入就位文舞入陳于懸内武舞立于懸南道西其升壇者皆脫履于下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜謁者引司空詣壇東陛升行掃除于上降行樂懸于下訖引復位奉禮曰再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位協律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興興鼔柷奏豫和之樂乃以圜鐘為宫黄鐘為角太簇為徴姑洗為羽作文舞之舞樂舞六成圜鍾三奏黄鍾太蔟姑洗各一奏偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官在位者皆再拜太祝取玉于篚立於尊所謁者引太尉詣南陛升壇北向立太祝加玉於幣東向授太尉太尉受玉幣登歌作肅和之樂以大吕之均謁者引太尉進北面跪奠於天帝神坐前俛伏興謁者引太尉立於南方北面再拜訖太祝以幣東向授太尉太尉受幣謁者引太尉東向跪奠於太宗神坐俛伏興謁者引太尉立於西方東面再拜初太尉將奠配帝之幣五方帝五帝之太祝各奠玉幣於神坐前相次而畢五官之獻官亦奠幣於神坐訖各還本位及太尉再拜訖登歌止謁者引太尉降自南陛還本位初衆官拜訖祝史各奉毛血之豆立於門外於登歌止祝史奉毛血入各由其陛升諸太祝迎取於壇上俱進奠於神坐前太祝與祝史退立於尊所進熟太尉既升奠玉幣太官令出帥進饌者奉饌陳於内壝門外謁者引司徒出詣饌所司徒奉天帝之俎諸太祝既奠毛血太官令引饌入俎初入門奏雍和之樂自後酌獻皆奏雍和之樂以黄鐘之均自後壇下之樂皆奏黄鐘饌各至陛樂止祝史俱進徹毛血之豆降自東陛以出天帝之饌升自午陛配帝之饌升自夘陛五方帝之饌各由其陛諸太祝迎引于壇上各設于神座前籩豆盖羃先徹乃升簠簋既奠却其葢于下設訖謁者引司徒太官令帥進饌者俱降自東陛以出司徒復位諸太祝各還尊所又進設五官之饌相次而畢初壇上設饌訖謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉升自南陛詣天帝酒尊所執尊者舉羃太尉酌汎齊訖樂作謁者引太尉進天帝神坐前北向跪奠爵興謁者引太尉立于南方北面太祝持版進于神座之右東面跪讀祝文曰維某年歳次月朔日子嗣天子臣某謹遣太尉封臣名敢昭告于昊天上帝爰兹孟夏龍見紀辰方資長育式遵常禮敬以玉帛粢盛庻品恭致燔祀表其寅肅以太宗文武聖皇帝侑神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進跪奠版於天帝神座興還罇所太尉拜訖樂止謁者引太尉詣配帝坐酒尊所取爵于坫執尊者舉羃太尉酌汎齊訖樂作謁者引太尉進詣太宗神座前東向跪奠爵興謁者引太尉少退東向立五方帝之太祝亦各酌汎齊俱進于神坐前訖還尊所配帝之太祝持版進于神座之左北面跪讀祝文曰維某年歳次月朔日子孝曽孫開元神武皇帝臣某謹遣太尉臣某敢昭告于皇曽祖考太宗文武聖皇帝時惟正陽式遵恒典用致祀于昊天上帝伏惟道叶乾元徳施品物永言配命對越昭升謹以制幣犧齊粢盛庻品式陳明薦侑神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進跪奠版于神坐興還罇所太尉拜訖樂止謁者引太尉進昊天上帝神坐前北面立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒啐酒奠爵興太祝各帥齋郎進俎太祝減神前胙肉皆取前脚第二骨加于俎以胙肉共置一俎上太祝持俎西向授太尉太尉受以授齋郎太尉跪取爵遂飲卒爵太祝進受爵復于坫太尉興再拜謁者引太尉降復位文舞之舞出鼓柷舒和之樂作出訖戛敔樂止武舞入鼔柷舒和之樂作立定戛敔樂止初太尉獻將畢謁者引太常卿詣罍洗盥手洗匏爵訖謁者引太常卿自東陛升壇詣天帝酒罇所執尊者舉羃太常卿酌醴齊訖武舞作謁者引太常卿進天帝神坐前北向跪奠爵興再拜訖謁者引太常卿詣配帝酒尊所取爵于坫執尊者舉羃太常卿酌醴齊訖謁者引太常卿進太宗神坐前東向跪奠爵興再拜謁者引太常卿立于南方北向五方帝之太祝亦各酌醴齊俱進于神坐前訖還尊所諸太祝各以爵酌罍福酒各置一爵一太祝持爵進太常卿之右西向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復于坫太常卿興再拜謁者引太常卿降復位初太常卿獻將畢謁者引光禄卿詣罍洗盥手洗匏爵酌盎齊獻正坐配坐及五方帝之座終獻如亞獻之儀訖謁者引光禄卿降復位初太常卿將升獻賛引引五帝之獻官各詣罍洗盥手洗爵酌醴齊進奠於太昊氏神坐前餘坐各齋郎助奠訖還本位五帝獻將畢五官之獻官詣罍洗酌醍齊進奠於勾芒氏神坐前餘坐皆祝史助奠訖獻官還本位舞六成樂止舞獻俱畢上下諸祝各進跪徹豆興還尊所徹者籩豆各一少移於故處奉禮曰賜胙賛者唱衆官再拜衆官在位者皆再拜已飲福者不拜預和之樂作奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之左白請就望燎位别太尉就望燎位南向立於衆官將拜諸祝各執篚進神坐取玉帛祝版齋郎以俎載牲體稷黍飯爵酒各由其陛降壇南行經懸内當柴壇南東行自南陛登柴壇以玉幣祝版饌物置於柴上户内諸祝又以五官之禮幣俱從燎奉禮曰可燎東西面各六人以炬燎半柴謁者進太尉之左白禮畢謁者引太尉出謁者贊引各引祀官以出賛引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出工人二舞以次出大唐開元禮卷九
