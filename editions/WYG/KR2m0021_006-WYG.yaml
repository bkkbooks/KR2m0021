body:
  text: 大唐開元禮卷六唐蕭嵩等撰吉禮皇帝正月上辛祈榖于圜丘齋戒陳設省牲器鑾駕出宫薦玉帛進熟鑾駕還宫齋戒前祀七日平明太尉誓衆官于尚書省曰正月某日祀昊天上帝于圜丘各揚其職不供其事國有常刑皇帝散齋四日于别殿致齋三日二日于太極殿一日于行宫前致齋一日尚舍奉御設御幄於太極殿西序及室内俱東向尚舍直長張帷于前楹下致齋之日質明諸衛勒所部屯門列仗晝漏上水一刻侍中版奏請中嚴諸衛之屬各督其隊入陳于殿庭如常儀通事舍人引文武五品已上袴褶陪位如式諸侍衛之官各服其器服諸侍衛臣並結珮俱詣閣奉迎上水二刻侍中版奏外辦上水三刻皇帝服通天冠絳紗袍結珮乗輿出自西房曲直華盖警蹕侍衛如常儀皇帝即御座東面坐侍臣夾侍如常一刻頃侍中前跪奏稱侍中臣某言請降就齋室俛伏興還侍位皇帝降座入室文武侍臣各還省直衛者如常通事舍人引陪位者以次出凡預祀之官散齋四日致齋三日散齋皆于正寝致齋二日于本司一日于祀所其無本司者則二日于郊社署近侍之官應從升者及從祀羣官諸方客使各于祀所清齋一宿無本司者各于正寝散齋理事如舊唯不吊喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯祀事得行其餘悉禁其祀官已齋而闕者通攝行事諸祀官致齋之日給酒食及明衣各習禮于齋所光禄卿監取明水火太官令取水于隂鑒取火于陽燧火以供爨水以實尊前祀二日太尉告髙祖神堯皇帝廟如常告之儀告以配神作主前祀一日諸衛令其屬未後一刻各以其方器服守衛壝門每門二人每隅一人與太樂工人俱清齋一宿陳設前祀三日尚舍直長施大次于外壝東門之内道北南向尚舍奉御鋪御座守宫設文武侍臣次于大次之前文官在左武官在右俱南向設諸從祀官次于東壝之外道南從祀文官九品已上於祀官之東東方南方朝集使于文官之東東方南方蕃客又于其東俱重行每等異位北向西上酅公介公于西壝之外道南武官九品已上于酅公介公之西西方北方朝集使于武官之西西方北方蕃客又于其西俱重行每等異位北向東上其褒聖侯若在于文官三品之下諸州使人分方各于朝集使之後陳設饌幔于内壝東門之外道南北向前祀二日太樂令設宫懸之樂于壇塲南内壝之内東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于編懸之間各依辰位樹雷鼓于北懸之内道之左右植建鼓于四隅置柷敔于懸内柷在左敔在右設歌鐘歌磬于壇上近南北向磬􅒶在西鐘􅒶在東其匏竹者立於壇下重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北爲上南方北方以西爲上右校掃除壇之内外郊社令積柴於燎壇其壇於樂懸之南外壝之内方一丈髙一丈二尺開上南出户方六尺前祀一日奉禮設御位於壇下之東南西向設望燎位於柴壇之北南向設祀官公卿位於内壝東門之内道南執事者位於其後每等異位重行西向北上設御史位於壇下一位於東南西向一位於西南東向設奉禮位於樂懸之東北賛者二人在南差退俱西向又設奉禮賛者位於燎壇東北西向皆北上設協律郎位於壇上南陛之西東向設太樂令位於北懸之間當壇北向設從祀之官位文官九品已上於執事之南東方南方朝集使於文官之南東方南方蕃客又於其南俱每等異位重行西面北上酅公介公位於内壝西門之内道南武官九品以上於酅公介公之南西方北方朝集使於武官之南西方北方蕃客又於其南俱每等異位重行東面北上其褒聖侯於文官三品之下諸州使人分方各位於朝集使之後又設祀官及從祀羣官等門外位於東西壝門之外道南皆如設次之式設牲牓於東壝之外當門西向蒼牲一居前南上又青牲一赤牲一黄牲一白牲一𤣥牲一又蒼牲一皆少退設廩犧令位於牲西南祝史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北又設御史位於太常卿之西俱南向設酒尊之位上帝太尊二著尊二犧尊二山罍二在壇上東南隅北向象尊二壺尊二山罍四在壇下南陛之東北向俱西上設配帝著尊二犧尊二象尊二山罍二在壇上在上帝酒尊之東北向西上五方帝各太尊二著尊二犧尊二山罍二在第一等神坐之左而右向尊皆加勺羃有坫以置爵設御洗於午陛東南亞獻終獻之洗於夘陛之南俱北向罍水在洗東篚在洗西南肆篚實以巾爵執尊罍篚羃者各位於尊罍篚羃之後設玉幣篚於壇上尊坫之所祀日未明午刻太史令郊社令各服其服升設昊天上帝神坐於壇上北方南向席以藁秸設髙祖神堯皇帝神坐於東方西向席以莞設青帝於東陛之北赤帝於南陛之東黄帝於南陛之西白帝於西陛之南黒帝於北陛之西席皆以藁秸設神位各於坐首省牲器省牲之日午後十刻去壇二百歩所諸衛之屬禁斷行人晡後二刻郊社令帥府史二人及齋郎以尊坫罍洗篚入設於位升壇者自東陛晡後三刻謁者賛引各引祀官公卿以下俱就東壝門外位諸太祝與廩犧令以牲就牓位謁者弓太常卿賛引引御史入詣壇東陛升視滌濯凡引導者每曲一逡廵視濯執尊者皆舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西面舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官謁者引光禄卿詣厨省鼎鑊申視濯溉賛引引御史就省饌具太常卿以下每事訖各還齋所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲鑾駕出宫前出宫三日本司宣攝内外各供其職尚舍設行宫於壇東南向隨地之宜守宫設從祀官五品以上次於承天門外東西朝堂如常儀前二日太樂令設宫懸之樂於殿庭如常儀駕出懸而不作其日晝漏上水五刻鑾駕發引發引前七刻搥一鼔為一嚴三嚴時節前一日侍中奏裁侍中奏開宫殿門及城門未明五刻槌二鼔為再嚴侍中版奏請中嚴奉禮郎設從祀羣官五品以上位文官於東朝堂之前西向武官於西朝堂之前東向俱重行北上從祀羣官五以上依時刻俱集朝堂次各服其服其六品以下介公酅公褒聖侯朝集使諸方客使等並駕出之日便赴祀所所司陳大駕鹵簿前二刻槌三鼔爲三嚴諸衛之屬各督其隊與鈒戟以次入陳於殿庭謁者引從祀羣官各就朝堂前位諸侍衛之官各服其器服侍中中書令以下俱詣西階奉迎侍中負寳如式乗黄令進玉輅於太極殿西階之前南向千牛衛將軍一人執長刀立於前北向黄門侍郎一人在侍臣之前賛者二人又在黄門侍郎之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝齋服乗輿以出降自西陛稱警蹕如常儀千牛將軍前執轡皇帝升輅太僕卿立授綏侍中中書令以下夾侍如常黄門侍郎進當鑾駕前跪奏稱黄門侍郎臣某言請鑾駕進發俛伏興退復位凡黄門侍郎奏請進鑾駕前跪奏稱某官臣某言訖俛伏興鑾駕動又稱警蹕黄門侍郎與賛者夾引以出千牛將軍夾輅而趨駕出承天門至侍臣上馬所黄門侍郎奏稱請鑾駕權停勅侍臣上馬侍中前承制退稱制曰可黄門侍郎退稱侍臣上馬賛者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黄麾内符寳郎奉六寳與殿中監後部從在黄鉞内侍中中書令以下夾侍於輅前賛者在供奉官人内侍臣上馬畢黄門侍郎奏稱請勅車右升侍中前承制退稱制曰可黄門侍郎退復位千牛將軍升訖黄門侍郎奏稱請鑾駕進發復位鑾駕動稱警蹕皷傳音如常不鳴鼔吹不得諠譁其從祀之官在𤣥武隊後如常儀駕將至諸祀官俱朝服結珮謁者引立於次前重行北面西上駕至行宫南門外迴輅南向將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅乗輿入行宫繖扇華葢侍衛警蹕如常儀宿衛如式通事舍人各引從祀文武羣官五品以上集行宫朝堂前文左武右通事舍人承㫖勅羣官等各還次薦玉帛祀日未明三刻諸祀官及從祀之官各服其服郊社令良醖令各帥其屬入實罇罍及玉帛凡六罇之次太罇為上實以汎齊著罇次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝著尊為上實以汎齊犧尊次之實以醴齊象尊次之實以盎齊五方帝太尊為上實以汎齊著尊次之實以醴齊犧罇次之實以盎齊山罍爲下實以清酒五齊之上尊皆實以清酒禮神之王昊天上帝以四圭有邸青帝以青珪赤帝以赤璋黄帝以黄琮白帝以騶虞黒帝以𤣥璜上帝配帝之幣各以蒼五方帝之幣並效其方色各長一丈八尺太祝以玉幣置於篚太官令帥進饌者實諸籩豆簋簠等皆設於饌幔内未明二刻奉禮帥賛者先入就位賛引引御史博士郊社令諸太祝及令史祝史與執罇罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜賛者承傳凡奉禮有司贊者皆承傳御史以下皆再拜訖執罇罍篚羃者各就位賛引引御史諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖各引復位未明一刻謁者贊引各引祀官及從祀羣官客使等俱就門外位太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西其升壇者皆脱履於下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行掃除於上降行樂懸於下訖引各引祀官通事舍人分引從祀羣官客使等次入就位初未明三刻諸衛列大駕仗衛陳設如式侍中版奏請中嚴乗黄令進玉輅於行宫南門外迴路南向若行宫去壇稍逺嚴警如式未明一刻侍中版奏外辦質明皇帝服衮冕乗輿以出繖扇華葢侍衛如常儀侍中負寳陪從如式皇帝升輅如初黄門侍郎奏請鑾駕進發還侍位鑾駕動稱警蹕如常千牛將軍夾輅而趨若行宫去壇逺奏升輅如式駕至大次門外迴輅南向侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅乗輿之大次繖扇華葢侍衛如常儀郊社令以祝版進御署訖近臣奉出郊社令受各奠於坫皇帝停大次半刻頃通事舍人各引從祀文武羣官介公酅公諸方客使皆先入就位太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝出次華葢侍衛如常儀博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至内壝門外殿中監進大珪尚衣奉御又以鎮圭授殿中監殿中監受進皇帝搢大珪執鎮珪華葢仗衛停於門外禮部尚書近侍者從入如常皇帝至版位西向立每立定太常卿與博士退立於左太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俛伏興舉凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興也鼔柷奏豫和之樂乃以圜鐘為宫黄鐘為角太簇為徴姑洗為羽作文舞之樂舞六成圜鐘三奏黄鐘太簇姑洗各一奏偃麾戛敔樂止凡樂皆協律郎舉麾工鼔柷而後作偃麾戛敔而後止太常卿前奏請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜諸太祝取玉幣於篚各立於尊所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣壇升自南陛侍中中書令以下及左右侍衛量人從升以下皆如之皇帝升壇北向立樂止太祝以玉幣授侍中侍中奉玉幣東向進皇帝搢鎮圭受玉幣凡受物皆搢鎮圭奠訖執鎮圭俛伏興登歌作肅和之樂以大吕之均太常卿引皇帝進北面跪奠於昊天上帝神坐俛伏興太常卿引皇帝少退北向再拜訖太常卿引立於西方東向配坐太祝以幣授侍中侍中奉幣北向進皇帝受幣太常卿引皇帝進東向跪奠於髙祖神堯皇帝神坐前訖俛伏興太常卿引皇帝少退東向再拜訖登歌樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止初皇帝將奠配帝之幣謁者五人各引分獻官奉玉幣跪奠於五方上帝之坐訖還復位初衆官拜訖祝史各奉毛血之豆立於門外於登歌止祝史奉毛血入各由其陛升諸太祝迎取於壇上俱進奠於神坐前諸太祝與祝史退立於罇所進熟皇帝既升奠玉幣太官令出帥進饌者奉饌陳于内壝門外謁者引司徒出詣饌所司徒奉昊天上帝之俎初皇帝既至位樂止太官令各引饌入俎初入門奏雍和之樂以黄鐘之均自後接神之樂皆奏黄鐘饌至陛樂止祝史俱進徹毛血之豆降自東陛以出上帝之饌升自午陛配帝之饌升自夘陛青帝之饌升自寅陛赤帝之饌升自已陛黄帝之饌升自未陛白帝之饌升自酉陛黒帝之饌升自子陛諸太祝迎引饌于壇上各設于神坐前籩豆盖羃先徹乃升之簋簠既奠却其盖于下設訖謁者引司徒太官令帥進饌者俱降自東陛以出司徒復位諸太祝各還尊所初壇上設饌訖太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取􅓢興沃水又侍中跪取盤興承水皇帝盥手黄門侍郎跪取巾于篚興進皇帝帨手訖黄門侍郎受巾跪奠于篚黄門侍郎又取匏爵于篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黄門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤􅓢黄門侍郎受巾奠于篚皆如常太常卿引皇帝樂作皇帝詣壇升自南陛訖樂止謁者引司徒升自東陛立于尊所齋郎奉俎從升立于司徒之後太常卿引皇帝詣上帝酒尊所執尊者舉羃侍中賛酌汎齋訖夀和之樂作皇帝每酌獻及飲福皆作夀和之樂太常卿引皇帝進天帝神坐前北向跪奠爵俛伏興太常卿引皇帝少退北向立樂止太祝持版進于神坐之右東向跪讀祝文曰維某年歳次月朔日子嗣天子臣某敢昭告于昊天上帝惟神化育羣生財成庻品雲雨作施普博無私爰因啟蟄式祈農事敬以玉帛犧齊粢盛庻品祗事禋祀髙祖神堯皇帝配神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版于神坐興還尊所皇帝拜訖樂止太常卿引皇帝詣配帝酒罇所執尊者舉羃侍中取爵于坫進皇帝受爵侍中賛酌汎齊訖樂作太常卿引皇帝進髙祖神堯皇帝神坐前東向跪奠爵俛伏興太常卿引皇帝少退東向立樂止謁者五人各引五方上帝太祝皆取匏爵于坫酌泛齊各進奠于其神座前訖還尊所配帝太祝持版進於神座之左北面跪讀祝文曰維某年歳次月朔日子孝曾孫開元神武皇帝臣某敢昭告于髙祖神堯皇帝時惟孟春敬祈嘉榖用致禋祀于昊天上帝惟髙祖叡哲徇齊欽明昭格登配之禮肅奉舊章謹以制幣犧齊粢盛庻品吉蠲明薦侑神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版于神座興還尊所皇帝再拜訖樂止太常卿引皇帝進天帝神座前北向立樂作太祝各以爵酌上尊福酒合置一爵一太祝持爵授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興太祝各帥齋郎進俎太祝减神前胙肉皆取前脚第二骨加于俎以胙肉共置一俎上太祝持俎以授司徒司徒奉俎西向進皇帝受以授左右謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受虚爵以授太祝太祝受爵復於坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止文舞出鼓柷舒和之樂作出訖戛敔樂止武舞入鼓柷舒和之樂作立定戛敔樂止初皇帝將復位謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉自東陛升壇詣天帝著尊所執尊者舉羃太尉酌醴齊武舞作謁者引太尉進天帝神坐前北向跪奠爵興謁者引太尉少退北向再拜訖謁者引太尉詣配帝犧尊所取爵于坫執尊者舉羃太尉酌醴齊謁者引太尉進髙祖神座前東向跪奠爵興謁者引太尉少退東向再拜五方上帝之祝亦各取爵于坫酌醴齊訖俱進奠于其神坐前訖還尊所謁者引太尉進天帝神座前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受虚爵復于坫太尉興再拜訖謁者引太尉降復位初太尉獻將畢謁者引光禄卿詣罍洗盥手洗匏爵升酌盎齊獻正坐配坐五帝之祝亦各酌獻終獻如亞獻之儀訖謁者引光禄卿降復位武舞止諸太祝各進跪徹豆興還尊所徹者籩豆各一少移于故處奉禮曰賜胙賛者唱衆官再拜衆官在位者皆再拜已飲福者不拜豫和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作皇帝就望燎位南向立樂止于羣官將拜上下諸祝各執篚進神坐前取玉幣祝版齋郎以俎載牲體稷黍飯及爵酒各由其陛壇南行經柴壇西過壇東行自南陛登柴壇以玉幣祝版饌物置于柴上户内奉禮曰可燎東西面各六人以炬燎火半柴太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出内壝門殿中監前受鎮珪以授尚衣奉御殿中監又前受大珪華葢侍衛如常儀皇帝入次樂止謁者賛引各引祀官通事舍人分引從祀羣官諸方客使以次出賛引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出工人二舞以次出鑾駕還宫皇帝既還大次侍中版奏請解嚴將士不得輙離部位皇帝停大次一刻頃搥一鼓為一嚴轉仗衛於還塗如來儀三刻頃搥二鼓為再嚴將士布隊仗侍中版奏請中嚴皇帝服通天冠絳紗袍諸祀官服朝服五刻頃搥三鼓為三嚴謁者賛引各引羣官客使序立于大次之前近南文武侍臣詣大次奉迎乗黄令進金輅于大次門外南向千牛將軍立于輅右侍中版奏外辦太僕卿升執轡皇帝乗輿出次繖扇侍衛警蹕如常儀皇帝升輅太僕卿立授綏黄門侍郎奏稱請鑾駕進發退復位鑾駕動稱警蹕如常儀黄門侍郎賛者夾引千牛將軍夾輅而趨至侍臣上馬所黄門侍郎奏稱請鑾駕權停勅侍臣上馬侍中前承制退稱制曰可黄門侍郎退稱侍臣上馬賛者承傳文武侍臣皆上馬畢黄門侍郎奏稱請勅車右升侍中稱制曰可黄門侍郎退復位千牛衛将軍升訖黄門侍郎奏稱請鑾駕進發復位鼓傳音鑾駕動鼓吹振作而還文武羣官皆從如來儀諸方客使便還館駕至承天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立于輅右訖鑾駕動千牛將軍夾輅而趍駕入嘉徳門太樂令令撞㽔賔之鐘左右五鐘皆應鼓柷奏采茨之樂至太極門戛敔樂止入太極門鼓祝奏太和之樂駕至横街北當東上閣逥輅南向侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅乗輿以入繖扇侍衛警蹕如常儀侍臣從至閣戛敔樂止初文武羣官至東朝堂通事舍人承㫖勅羣官並還皇帝既入侍中版奏請解嚴叩鉦將士各還其所大唐開元禮卷六
