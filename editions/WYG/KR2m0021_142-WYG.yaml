body:
  text: 大唐開元禮卷一百四十二唐蕭嵩等撰凶禮四品五品喪之一初終復設牀奠沐浴襲唅赴闕勅使弔銘重陳小斂衣奠小斂斂髪奠陳大斂衣奠大斂奠廬次成服朝夕哭奠賓弔親故哭州縣官長弔刺史遣使弔親故遣使致賻殷奠卜宅兆卜葬日啟殯贈諡親賔致奠初終有疾者丈夫婦人各齋於正寢北墉下東首墉牆也東首生氣也養者皆齋親飲藥子先嘗之疾困去故衣加新衣謂人來穢惡也徹樂清掃内外爲賓客來問也分禱所祀盡孝子之情所祀中霤門戸竈行侍者四人坐持手足爲不能自屈伸内喪則婦人持之也遺言則書之屬纊以候氣纊新綿置於口鼻也氣絶廢床寢於地人始生在地庶其生氣反主人啼餘皆哭哀有淺深男子易以白布衣披髪徒跣婦人青縑衣披髪不徒跣女子子亦然父爲長子及爲人後者爲本生父母皆素冠不徒䟲女子子嫁者髽齊衰以下丈夫素冠婦人去首飾謂齊衰婦人内外皆素服素服謂有服者白布十五升無服者不服列綵服常服素衣主人坐於床東啼踊無數衆主人在主人之後兄弟之子以下又在其後俱西向南上哭妻坐於床西妾及女子子在妻之後哭踊無數兄弟之女以下又在其後俱東面南上藉藁坐哭内外之際隔以行帷帷堂内門西南北隔之祖父以下於帷東北壁下南向西上祖母以下於帷西北壁下南面東上皆舒席坐一哭外姻丈夫於户外之東北面西上婦人於主婦西南北面東上皆舒席坐哭若舍窄則宗親丈夫在外户之東北面西上外姻丈夫在户外之西北面東上諸内喪則尊行丈夫及外親丈夫席坐位於前堂若户外之左右俱南面宗親户東西上外親户西東上凡喪皆以服精麤爲序國官位於門内之東重行北面以西爲上俱袤巾帕頭舒藁薦坐哭叅佐位於門内之西重行北面以東為上俱素服舒席坐哭斬衰三日不食齊衰二日不食大功一日不食小功緦麻再不食復始死則復復於正寢復者二人皆常服復謂招魂復魄以死者之上服左荷之升自前東霤當屋履危北面西上危棟也左執領右執腰招以左每招長聲呼某復男子女子稱字及伯仲婦人稱姓其復者人數依其夫三呼而止以衣投於前承之以篋升自阼階入以覆尸若得魂魄返然復者徹舍因徹西北扉若云此室凶不可居然自是行死事取徹扉之薪以充煑沐浴也復衣不以襲斂浴則去之乃設牀設牀設牀於室户之西去脚舒簟設枕施幄去裙遷尸於牀南首覆用斂衾去死衣斂衾大斂所用之衾黄表素裏也死衣病時所加新衣楔齒用角柶為將含也綴足以燕几校在南綴拘也校几脛也尸南首几脛在南以拘足則不使辟戾也侍者坐持之其内外哭位如始死之儀乃奠奠奠以脯醢酒用吉器無巾柶升自阼階奠於尸東當腢鬼神無象故設奠以憑依之也内喪内贊者受於户外而設之凡内喪皆内贊者行事既奠贊者降出帷堂初氣絶室内隨事設帷至此事小訖故設帷堂乃赴於闕赴禮在此下章含禮後為與勅使弔章宜相附近故也沐浴自沐浴下至於設重其事皆可同時而興掌事者掘埳於階間近西南順廣尺長二尺深三尺髙其壤為塊竈於西牆下東向以俟煑沐新盆盤瓶四䰛皆濯之陳於西階下新此器者重死事盆以盛水盤以盛濡濯瓶以汲也䰛瓦罌受二升有葢濯謂滌溉沐巾一浴巾二用絺若綌實於笲巾所以拭也浴巾二者上體下體異絺細葛也綌麤葛也櫛實於箱若簟浴衣實於篋浴衣已浴所衣之衣其制今之眠帕皆具西序下南上水淅稷米取潘煑之又汲為湯以俟浴以盆盛潘及沐盤升自西階授沐者執潘及盤入内外皆出户外象平生沐浴子孫不在旁主人出而袒簀謂牀簣去席主人以下於内尸東北面西上主婦以下於户西北面東上俱立哭其尊行者丈夫於主人之東北面西上婦人於主婦之西北面東上俱坐哭婦人權障以帷主人以下既出乃沐櫛櫛梳束髪用組挋用巾挋晞也清也浴則四人抗衾二人浴拭用巾挋用浴衣設床於尸東祍下莞上簟祍臥席浴者舉尸易牀設枕翦鬚斷爪如平常鬚髪爪盛以小囊大斂内於棺浴巾皆埋於埳寘之著明衣裳以方巾覆面仍以大斂之衾覆之訖内外入就位哭乃襲襲是時陳襲事於房内襲衣三稱西領南上朝服一稱常服二稱凡陳衣者實之箱篋承以席明衣裳今用生絹裩衫舄一帛巾一方尺八寸充耳用白纊面衣用𤣥方尺纁裏組繫握手用𤣥纁裏長尺二寸廣五寸削約於内旁寸著以綿組繫握手手所握者面衣及握皆通用餘色庻襚繼陳不用庶衆也不用不龍也多陳之為榮少納之為貴將襲具牀蓆於西階西内外皆出哭於尸外其位如沐時襲者以牀升入設於尸東布枕席如初執服者陳襲衣於席祝去巾加面衣設充耳著握手納舄若履凡衣死者左衽不紐將襲辟奠既襲則設也既襲乃覆以大斂之衾内外俱入復位坐哭諸尊者於卑幼之喪及嫂叔兄姑弟婦相哭朝晡之間非有事則休於别室也乃含含含贊者奉盤水及笲笲竹器飯用稷含用璧升堂含者盥手於户外贊者沃盥含者洗稷璧實於笲執以入祝從入北面徹枕楔受笲奠於尸東含者坐於牀東西面鑿巾巾先覆面将含當口鑿之納稷璧於尸口既含主人復位楔齒之柶與浴巾同埋於坎乃奠赴闕若遣使赴於闕使者進立于西階東面南上主人詣使者前北面曰臣某之父某官臣某死若母若妻各隨其稱謹遣某官臣姓某奏聞訖再拜使者出主人哭入復位勅使弔勅使弔使者公服入於寢門外之西東面相者入告主人迎於寢門外見賓不哭先入立於門右北面内外皆止哭開帷開帷堂之帷事畢則下之使者立升入西階上東面進主人立於階下北面使者稱有勅主人再拜使者宣勅云某封喪逝無封者稱姓位情以惻然如何不淑主人哭拜稽顙内外皆哭使者出主人拜送於大門外親故為使弔者既出易服入向尸立哭十數聲止降出主人候勅使出升降自西階主人升降自西階者親始死末忍當主位銘銘明旌也為銘帛以絳廣終幅長八尺龍首韜杠杠銘旌竿杠之長準其絳也書曰某官封之柩在棺曰柩無封者云某姓官之柩婦人其夫有官封者云某官封夫人姓之柩郡縣鄉君各隨其稱稱之也置於宇西階上重重木刋鑿之長七尺横者半之置於庭三分庭一在南刋鑿之為懸䰛孔也以沐之米為粥實於䰛既實以疎布葢其口繫以竹䈼懸於重木覆用葦席北向屈兩端交於後西端在上綴以䈼祝取銘置於重殯堂前楹下夾以葦蓆簾門以布又設葦帳於庭陳小斂衣小斂之禮喪之明日各陳其斂衣一十九稱無者各隨所辦朝服一稱其餘皆常服陳於東房西領北上笏一凡斂非正色不入絺綌不入乃奠奠饌於東堂下凡奠尊器皆素瓦甒二實醴及脯酒觶二角柶一少牢及腊三俎籩豆各六籩實鹽脯棗栗之屬豆實醢醤韲葅之類設盆盥於饌東布巾為奠者設盥䘮事畧故無洗贊者辟脯醢之奠於尸牀西南乃斂小斂將小斂具牀席於堂西又設盆盥於西階之西如東方為舉尸者盥斂者設盥訖與執服者以斂衣入主人以下少退西面主人婦以下少退東面内外俱哭斂者斂訖覆以夷衾設牀於堂上楹間祍尸卧之席下莞上簟有枕卒斂開帷主人以下西面憑哭凡憑哭父母先妻子後主婦以下面東憑哭俱南上訖退乃斂髪斂髪男子斂髪而袤巾帕頭女人斂髪而髽主人以下立哭於尸東西面南上主婦以下立哭於尸西東面南上祖父母以下仍哭於位各如初外姻丈夫婦人哭於位各如初斂者舉尸男女從奉之遷於堂仍覆以夷衾棺衣哭位皆如室内乃奠奠奠賛者盥手奉饌至階豆去盖籩俎去巾羃升奠于尸東醴酒奠于饌南西上訖其俎祝受巾巾之奠者徹襲奠自西階降出下帷内外俱坐有國官僚佐者以官代哭無者以親賓為之夜則燎於庭厥明㓕燎乃大斂陳大斂衣大斂之禮以小斂之明日其日夙興陳衣於序東三十稱無者各隨所辦各具上服一稱西領南上其餘皆常服冕具導簪纓在北内喪花釵衾一衾以黄為表素為裏也乃奠奠奠於堂東階下兩甒醴及酒醴在南各加勺篚在東南肆實角觶二木柶一豆在甒北籩次之牢饌如小斂籩豆俎皆羃以功布有簟席素几功布巾在饌北殯於西階之上喪從外來者殯於兩楹之間乃斂大斂將大斂棺入内外皆止哭升棺於殯所棺之中具灰炭枕席之類皆預設於棺内置棺定内外皆哭熬糓六筐黍稷粱各二皆加魚腊熬榖所以惑蚍蜉令不至棺旁燭俟於饌東設盆盥於東階東南祝盥訖升自阼階徹巾授執巾者執巾者降待於阼階下祝與贊者徹小斂之饌降自西階設於序西南當西霤如設於堂上堂上設尸東凡尊設於序西者畢事而去之乃適於東階下新饌所帷堂内外皆少退立哭御者斂丈夫加冕婦人加花釵覆以衾斂訖開帷主人以下西面憑哭主婦以下東面憑哭凡憑尸父母先妻子後退復位次諸親憑哭訖斂者四人舉棺男女從奉之奉尸斂於棺乃加葢覆以夷衾内外皆復位如初設熬糓首足各一筐傍各二筐以木覆棺上仍塗之施帟於殯上帟柩上承塵也祝取銘置於殯所乃奠奠將奠執巾几席者升自阼階入設于室之西南隅東面右几加以巾賛者以饌升入室西面設于席前祝受巾巾俎奠者降自西階以出下帷内外皆就位哭如初既殯設靈座于下室西間東向施牀几案屏帳服飾以時上膳羞及湯沐皆如平常殷奠之日不饋于下室下室謂燕寢無下室者則設靈座于殯東朝夕進常食之具於靈前如平常也廬次將成服掌事者預為廬於殯堂東廊下近南北户設苫凷於廬内諸子各一廬凡之廬五品以上營齊衰於廬南累墼為堊室俱北户翦蒲為席不縁父兄不次於殯所各在其正寢之東為廬堊室祖為嫡孫居堊室寢有牀皆南面西出户父不為衆子次於外於庶子畧自若居寢大功於堊室之南張帷席以蒲小功緦麻於大功之南設牀席以蒲婦人次於西房若殯後施下牀殯堂無房者次於後若别室成服三日成服皆除去死日數内外各哭盡哀内外俱降就次著衰服無服者仍素服相者引主人以下俱杖三日而後食杖而後能起衆子皆杖以病故也童子婦人不能病故不杖亦不居廬不著菲屨若嫡子雖童亦杖㓜不能自杖人代執之所謂當室杖者也自此以後唯嫡子及有爵之庶子皆杖在位其庶子之無爵者杖于他所不杖在位矣凡正寢戸内曰室户外曰堂虞杖不入室祔杖不升堂以今言之即靈堂户之内外也周人祔在卒哭今之百日也哀衰敬生故其杖不升靈寢之堂前其衰服及杖皆致之于盧内應杖者朝夕哭則杖之若孝子出無異適惟向殯及墳墓而已逺則乘車近則使人代執杖升立哭于殯東西面南上齊衰以下就位婦人升詣殯西位若殯逼西壁婦人皆位于殯北則南面東上尊行者坐内外皆哭盡哀諸子孫就祖父及諸父前跪哭皆撫哭盡哀就祖母及諸母前哭亦如之女子子對祖母及諸母哭遂就祖父前哭如男子之儀唯諸父不撫之耳訖各復位伯叔母以下就主婦哭亦如之始遭親喪孝子荒迷三日而食服及成矣是以尊卑内外聚哭展哀也諸尊者降出還次主人以下降立於阼階下外姻在南少退俱西面北上哭盡哀各還次闔户小功以下各歸其家自成服之後諸尊者及婦人於諸親男子之喪有事則哭於殯所無事有時須哭者或在正寢則於北壁下舒席南面坐哭父母喪食粥朝米四合暮米四合不能食粥則以米為飯婦人皆以米為飯朝夕哭奠朝奠日出夕奠逮日每日預具朝奠於東階下瓦甒二實以醴及酒觶杓疏布羃角觶一木柶一籩一豆一實以脯醢也内外夙興各衰服凡言衰服應杖者皆杖以下准此男子就東階下位若升哭於殯東其位如始成服之式婦人升詣殯西位内外皆哭凡朝夕哭皆開帷質明掌事者皆升自阼階入徹奠出置於序西南如殯東之儀又以朝奠入至阼階豆去葢籩甒去巾羃升阼階入設於室如初執饌者出降自西階日出後少頃内外皆止哭各還次朝夕之間主人及諸子妻妾女子子哭於其次無時至夕内外俱就位哭徹朝奠進夕奠如初儀日入後内外俱止哭各還次哭者出闔户自是以後至於啟殯每朝夕如上儀既殯大功以下異門者歸於家賓弔親故同賓至掌次者引之次賓著素服相者入告内外衰服相者引主人以下立哭於阼階下婦人哭於殯所相者引賔入立於庭北面西上為首者一人進當主人東面立云如何不淑主人哭再拜稽顙為首者復北面位弔者俱哭十餘聲相者引出少頃相者引主人以下各還次親故哭若有親故哭殯者内外俱升就殯堂位尊者坐若賓敵體以上賔初入則起賔坐則坐賔起亦起内外俱哭相者引賔入升堂立於殯東西面南上尊者坐俱哭盡哀尊者起相者引入卑者再拜訖乃就主人前稍南東北面執慰相者引以次出恩滐者賔拜訖又哭盡哀或就孝子撫哭盡哀而出也少頃相者引主人以下降還次州縣官長弔若刺史哭其所部縣令同主人設席於柩東西面刺史素服將到相者引主人去杖立於門内之右北面刺史降入升自西階即坐西面坐哭盡哀將起主人降復階下位刺史降出主人拜送於大門外杖哭而入刺史遣使弔刺史遣使弔使者至掌次者引就次内外俱衰服主人以下就階下位婦人就堂上位内外俱哭使者素服執書相者引入門而左立於階間東面使者致辭主人拜稽顙相者引主人進詣使者前西面受書退復位左右進受書主人拜送於位相者引使者出若自入弔哭如上弔儀客出少頃内外止哭各就位親故遣使致賻親故遣使致賻使者立於大門外之西東面從者以篚奉𤣥纁束帛立於使者西南俱東面凡賻通以貨財使者隨執其物不限以𤣥纁相者入告遂引主人立哭相者進主人前東面受命出詣使者前西面曰敢請事使者從者以篚進詣使者前西面以授使者退復位使者曰某封若某官無官封者稱某字使某賻相者入告出曰孤某須矣相者引使者入立於内門外之西東面主人止哭使者少進東面曰某封若某官使某賻主人哭再拜使者少進坐委之興復位掌事者進坐舉之興以東東藏也相者引使者出主人拜送使者致物若不以器掌事者迓受之不委於地其餘賻物従使者執之立于使者東南北面西上掌事者受之以東殷奠每朔朢具殷奠饌於東堂下瓦甒二實以醴及酒角觶二角柶一少牢及腊三俎二簠二簋二鈃六籩六豆設盆盥於饌東布巾為奠者盥其日内外夙興衰服升就位哭質明執饌者徹宿奠遂以饌入至阼階去巾葢升入室設於席前酌奠訖冪俎以巾執饌者降自西階以出少頃内外各還次既出闔户及夕執饌者徹殷奠進夕奠如常禮若有薦新如朔奠薦五糓若時物新出者薦之其日不饋於下室不饋於下室者為殷奠有黍稷卜宅兆既度宅兆掘四隅外其壤掘中南其壤宅𦵏居也兆塋域也南其壤者為𦵏北其首故也既朝哭主人遂哭出乘堊車詣宅兆所出國門止哭掌事者預設主人以下次於宅兆東南將到主人又哭至宅兆所主人停於次止哭莅卜者一人國官若諸僚佐之長莅之無者親賓代為之也緇布冠不緌布深衣因喪屨莅卜者非國官則吉冠素服也祝及卜師凡行事者皆吉冠素服掌事者布卜席於兆南北向西上相者引莅卜者及祝立於卜席西南東面南上卜師立於祝南東面北上相者引主人詣卜席南十五步許當内壤北向相者立於主人之左少南俱北向親賓及從者立於筮席東南重行西面諸親北上諸賓南上立定相者少進東面稱事其退復位主人免首絰左擁之莅卜者進立於主人東北西面卜師抱龜筮師開韇韇藏䇿器執韇以擊䇿擊之以動其神進立於莅卜前東面南上莅卜者命曰孤子姓名為其父某官封某甫今儀祖父稱孤子孤孫母祖母稱哀子哀孫下皆准此度兹幽宅無有後艱某甫父字也無封者去封宅居也度謀也言為其父卜𦵏居今謀此以為幽冥居域之處得無其後有艱難乎謂有非常崩壊若内䘮云為某母夫人某氏也卜師曰諾遂述命右旋就席北面坐命龜曰假爾太龜有常指中封遂卜訖興以龜東面稱占曰從還本位主人絰哭從者哭盡哀止相者進主人之左東面稱禮畢相者遂引主人退立於東南隅西面又相者引卜者立於主人之後掌事者徹卜席當安墓處立一標又於四隅各立一標當南門兩廂各立一標祝帥掌事者入鋪后土氏神席於墓左南向設酒樽於神座東南加勺羃設洗於酒樽東南罍水在洗東篚在洗西南肆篚實以巾爵加羃相者引告者及祝與執樽罍篚羃者俱立於罍洗東南重行西面以北為上國官若僚佐之長告無僚佐者親賓及主人告之主人告俱去絰杖立定俱再拜祝與執樽罍篚者先立於樽罍篚之後執饌者以脯醢跪設於神座前興還本位相者引告者詣罍洗盥手洗爵詣酒樽所酌酒進跪奠於神座前興少退北向立祝持版進於神座之右東面跪讀祝文曰維年月朔日子某官姓名若主人自告父稱孤子母稱哀子姓名敢昭告於后土之神今為某官姓名若主人自告云為父某官封某甫母太夫人某君某氏隨官稱之也營建宅兆神其保佑俾無後艱謹以清酌脯醢祗薦於后土之神尚饗訖興告者再拜相者引告者還本位西向再拜相者引出掌事者以下俱復位再拜遂徹饌席樽罍以出主人哭還去墓三里許止哭及國門又哭内外升哭於位主人入升詣殯前北面哭盡哀止西面再拜降就次有國官僚佐從主人入就門内哭主人拜俱再拜主人降就次各就次若不從又卜擇地如初儀卜𦵏日既朝哭主人及諸子以下出立於殯門之外東壁下西面北上國官若僚佐之長莅卜無國官僚佐者親賓為之行事者俱吉服於門西東面南上卜師抱龜在其南東面闔門東扇主婦立於其内設卜席於閾外闑西相者詣主人前東面告事具遂引主人立於門内北面相者立於主人之左少退俱北面主人免首絰左擁之莅卜者進立於主人東北西面卜師少進莅卜前東面受命莅卜命曰哀子某來日謀卜𦵏其父某官封某甫母云為某母太夫人某氏卜也父稱孤子考降無有近悔考登也降下也言卜此日𦵏惟神上下得無近於咎悔也卜師曰諾遂述命訖左旋進就席西面坐命龜曰假爾太龜有常乃作龜訖興以龜退東面稱占曰從主人絰與諸子以下哭盡哀相者告於主婦哭入遂使人告於親賓諸親僚友卜日不來者卜師以龜退掌事者徹卜席相者進告禮畢主人與諸子以下入升詣殯前北面立哭内外俱哭盡哀内外各還次若不從又卜擇如初儀啟殯葬有期前一日之夕掌事者除葦障備啟奠具饌如大斂設賓次於大門外右南向内外夕哭如常儀啟之日内外夙興衰服主人及諸子皆去冠以衺巾帕頭國官亦以衺巾帕頭内外升階就位哭尊行者坐國官及僚佐就下位哭祝衰服執功布功布長五尺升自東階詣殯南北向内外止哭祝三聲噫嘻乃曰謹以吉辰啟殯既告内外皆哭盡哀内外各還次祝降與執饌者升徹宿奠如常祝取銘置於重掌事者升徹殯塗訖設席於柩東升柩於席上又設席於柩東祝執功布升以拂柩覆用夷衾降出周設帷東西開户相者引主人以下升哭於帷東西向妻妾女子子以下哭於帷西東向俱南上諸祖父以下哭於帷東北壁下南面西上諸祖母以下哭於帷西北壁下南面東上尊者坐内外俱哭祝與進饌者各以奠升設於柩東席上祝酌醴奠之内外俱哭於位如未成服之禮親賓致奠如别儀有國官僚佐者以官代哭無者以親疎為之晝夜不絶聲贈諡告贈諡於柩無贈者設啟奠訖即告諡其日主人入升立於饌東西面祝持贈諡文升自東階進立於柩東南北向内外皆止哭祝少進跪讀祝文訖興主人哭拜稽顙内外應拜者皆再拜祝進跪奠贈諡文於柩東興退復位内外皆就位坐哭親賓致奠啟之日親賓致奠於主人設啟奠後諸奠者入立於寢門之外東面謂卑幼者其有故則遣使祭具陳於奠者東南北向西上相者入告内外卑者皆興立哭於位又相者引奠者入升當柩東西面奠者哭祭具從升陳於柩東奠者之西西向南上設饌訖執饌者降出奠者止哭詣酒樽所取爵酌酒跪奠於柩東興少退西面立内外皆止哭奠者曰某封若某位伯叔各隨官爵稱之將歸幽宅謹奉奠若異姓各従其稱若使者云某封若某姓位聞某封若某官將歸幽宅使某奉辭奠畢應拜者皆再拜内外皆哭主人哭拜稽顙奠者哭盡哀止相者引出執事者以次徹饌而去大唐開元禮卷一百四十二
