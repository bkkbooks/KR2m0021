body:
  text: 大唐開元禮卷一百五十唐蕭嵩等撰凶禮王公以下喪通儀聞哀舉哀奔喪三殤殤喪諸居喪節制初喪聚主食飲節哭節居常節不及期葬外喪諱名追服喪冠嫁娶樂禁主諸喪婚遇喪室次節居重聞輕聞哀舉哀聞諸喪舉哀者於聞喪所哭盡哀問故又哭盡哀改著素服子妻妾女子子俱披髪周親以下婦人去首飾子於堂上東壁下西面以南為上周親以下北壁下南面以西為上妻妾女子子於西壁下東面以南為上周親以下婦人於北壁下南面以東為上内外之際障以帷若婦人在别室堂舉哀則周親以下婦人在北壁下南面西上周親以下舉哀哭位亦然三日成服廬堊室則苫凷薦席變除之節皆如在家之禮唯不設奠祭以其精神不在於此若除喪而後歸則之墓諸子以下素服待於墓東西面婦人待於墓西東向俱北上奔喪者素服至於􅎬南北面哭盡哀再拜又哭盡哀再拜於家不哭奔喪奔喪之禮始聞親喪以哭答使者盡哀問故又哭盡哀服布深衣素冠遂行日行百里不以夜行唯父母之喪見星而行見星而舍若未得奔則成服而後行過州至境則哭盡哀而止哭避市朝望其州境哭此父母之喪至於家内外哭待於堂上奔喪者入門而左升自西階殯東西面憑殯哭盡哀少退再拜退於序東披髪復殯東西面坐哭又盡哀尊卑撫哭如常訖内外各還次奔喪者乃還次厥明坐於殯東如初未成服者三日成服若至在小斂前則與主人俱成服若小斂以後至者自用其日數凡奔喪齊哀望鄉而哭大功望門而哭小功至門而哭緦麻即位而哭齊哀以下奔喪者升殯東西面哭主人以下哭待於堂上如常奔喪者哭盡哀再拜又哭盡哀尊卑撫哭亦如之訖内外還次三日成服有賓弔者拜賓如常奔喪者非主人則主人爲之拜賓婦人奔喪入自闈門側門曰闈升自西階側側階傍階殯西東面妻妾女子子則憑殯哭盡哀少退再拜退於西房若西室妻妾女子子披髪出嫁女髽復位坐哭又盡哀尊卑撫哭如常内外俱還次奔喪者乃還次周喪以下婦人奔喪者升哭拜又坐盡哀尊卑撫哭及還次皆如之奔喪者不及殯先之墓北面近隧哭主人以下哭待於墓左西面主婦以下哭待於墓右東面皆北上主人以下初至下先拜而後哭於相者告禮畢則再拜辭奔䘮者哭盡哀再拜又於隧東披髪復位坐哭盡哀相者告禮畢奔喪者又再拜遂冠而歸入門而左升自西階靈東西面憑靈哭主人以下升哭於堂上如常奔喪者哭盡哀再拜若經宿主人以下哭盡哀皆再拜哭降堂相者告就次主人以下各就次三日成服齊衰周以下不及殯先之墓西面哭盡哀再拜又哭盡哀相者告禮畢奔喪者再拜遂冠而歸哭就次如上儀奔喪者若妻妾女子子皆披髪於隧西哭盡哀髽如常餘如男子齊衰周以下婦人奔喪哭於􅎬西餘如丈夫之禮三殤殤喪三殤之喪始死浴襲及大小斂與成人同其長殤有棺及大棺中殤下殤有棺靈筵祭奠進食𦵏送哭泣之位與成人同其苞牲及明器長殤三分減一中殤三分減二唯不復魂無含事辦而葬不立神王既虞而除靈座其虞祝辭云維年月朔日父云告子某若兄云告弟某若弟云弟某昭告某兄日月易往奄及反虞悲念相續心焉如燬兄云悲慟猥至情無可處弟云哀痛無已至情如割也今以弟祭兄云謹以潔牲嘉薦普淖明齊溲酒薦虞事於子某弟某兄某魂其饗之弟祭兄則云尚饗嫡殤者時享皆祔食於祖無祝文亦不拜設祔食之坐於祖之左西向一獻而已不祝不拜者以其從食其祖祝詞末云孫某祔食也庶子不祔食庶子之嫡祔如嫡殤禮凡無服四嵗以上畧與下殤同又無靈筵唯大斂小斂奠而已三嵗以下斂以瓦棺葬於園又不奠諸居喪節制初喪聚主凡遭喪廟有主者則取諸廟之主藏於祖廟卒哭而後主各歸其廟藏於祖廟象有凶事聚也食飲節父母之喪食粥朝一溢米二十兩曰溢一溢為米一升二十四分升之一不能食粥則以為飯菜羮婦人皆以為飯諸衰絰之喪蔬食飲水不食菜菓三月既𦵏食肉不飲酒九月之喪猶周之喪哭節凡哭斬衰若往而不及齊衰若往而反大功三曲而偯小功緦麻哀容可居常節父母之喪居倚廬寢苫枕凷寢不脱絰帶頭有瘡則沐身若有瘍則浴有疾則飲酒食肉疾止復初不勝喪乃比於不慈不孝毁瘠不形視聼不衰謂其廢事形為骨見升降不由阼階出入不當門隧常若親在隧道也五十不至毁六十不毁七十唯衰麻在身飲酒食肉處於内所以養衰老人年五十始衰喪食雖惡必充虚虚而廢事非禮也飽而忘哀亦非禮也視不明聴不聰行不正不知哀君子病之斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂故喪事不言樂非其時父母之喪不避泣涕而見人言重喪不行求見人人來求見已可以見之不避涕泣言至哀無飾也非喪事不言言而不語對而不問言者言已事爲人説爲語言而後事行者杖而起身自執事而後行者面垢而已杖而起謂有官爵者面垢而已謂庶人凡廬堊室之内不與人坐在堊室之内非時見於母則不入居喪未葬讀喪禮既葬讀祭禮兄弟各處異方而父母喪各依聞哀日月而除之三年之喪凡見人皆不去絰父母之喪賓客已弔而重來者主人哭而見其去也又哭之其未葬必備衰服而後見居父母之喪逺行而還必告返父有艱未除則子不衣文綵三年之喪雖功衰不弔功衰謂既練之後服布如大功謂之功衰凡三年周喪不數閏禫則數之以閏月亡者祥及忌日皆以閏所祔之月爲正庶子不爲長子斬不繼祖與禰也不及期葬速葬者速虞三月而後卒哭謂不及期而葬既葬而即虞安神也卒哭之祭待哀殺也父母之喪周而葬者則以葬之後月小祥其大祥則依再周之禮禫亦如之若再周而後葬者則以葬之後月練又後月為大祥祥而即吉無服禫矣其未再周葬者則以二十五月練二十六月祥二十七月禫必練祥禫者明深哀不可頓除故為之漸以安孝子之心禫一月者以終二十七日之數也久而未葬者皆變服唯主喪者不除其餘各終月數而除之皆無受服至葬乃反其服虞則除之若亡失尸柩則變除如常禮外喪凡死於外者小斂而反則子素服袤巾帕頭徒跣而從大斂而反亦如之凡死於外大斂而反者毁門西牆而入諱名卒哭而諱名凡父之所諱子亦諱之母之所諱不言於内妻之所諱不言於其側追服小功以下日月過制而聞喪則不追服猶為舉哀降而在緦麻小功者追服之生不及祖父母諸父母兄弟而父追服已則否謂子生於外者父以他故居異邦而生己巳不及此親存時歸見之今其死於喪服年月已過乃聞之父為之服已則否者不責非時之思於人所不能當其時則服之喪冠嫁娶因喪冠者雖三年之喪可也既冠入於次哭盡哀乃出言雖者明齊衰以下皆可以喪冠也始遭喪以其冠月日喪服則冠矣非其冠月待變除卒哭而冠也次廬也大功之末可以冠子嫁子父小功之末可以冠子可以嫁子可以娶婦已雖小功既卒哭可冠聚妻下殤之小功則不可此皆謂可用吉禮之時也父大功卒哭而可冠子嫁子小功卒哭而可娶婦也已大功卒哭可以冠小功卒哭而可以娶妻必皆祭乃行也不傷小功齊衰之親除喪而後婚凡冠者其時當冠則因喪而冠也三年之喪如遺之酒肉則受之必三辭主人衰絰而受之受之必正服味明不茍於滋如君命則不敢辭受之而薦薦之於宗廟貴君之禮也父母之喪不遺人居重喪者志不在施惠也人遺之雖酒肉受也三年之喪既𦵏尊者遺之食則食不避粱肉若酒醴則辭見於顔色者則不可也樂禁父有服子不與於樂母有服聲聞焉不舉樂妻有服不舉樂於其側大功至辟琴瑟小功至不絶樂主諸喪凡主兄弟之喪雖疎必虞此謂兄弟或在他方或無後嗣而為之主婚遇喪娶妻有吉日而壻之父母喪則壻之伯叔父使人致命於女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏受命而不敢嫁壻既免喪女父母使人請之壻弗取然後嫁之禮也女之父母喪亦如之親迎女在塗而壻之父母死則女素服縞總以赴喪其衰服與婦之禮同也壻除喪之後束帶相見不行初婚之禮女在途而女之父母死則女反壻親迎未至而有周大功之喪則夫改服於外次婦改服於内次即位而哭既虞卒哭壻入束帶相見而已不行初婚之禮娶婦有吉日而婦死壻齊衰而往弔既𦵏除之夫死亦如之妻服斬衰室次節為人後者為其父母居堊室舅姑服嫡婦不為次為昆弟之女適人者不為次次謂堊室之屬也居重聞輕諸先遭重喪後遭輕喪皆為制服往哭則服之反則服其重服其除之也亦服其服而除在殯聞逺兄弟之喪哭之他室明所哭者異哭之為位凡言兄弟小功緦麻之親皆是無他室哭於門内之右近南者為之變位也入奠卒奠出改服即位如始即位之儀謂後日之哭也朝入奠於其殯既乃更即位就他室哭如始至之時大唐開元禮卷一百五十
