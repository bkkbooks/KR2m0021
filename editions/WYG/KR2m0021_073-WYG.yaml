body:
  text: 大唐開元禮卷七十三唐蕭嵩等撰吉禮諸縣祈社稷諸縣祈諸神諸縣禜城門諸縣祈社稷前二日本司埽除壇之内外又為瘞塪于壇北如常儀設縣丞以下次于社壇西門之外道北隨地之宜前一日諸祈官皆于祭所清齋一日掌事者饌酒脯醢設縣丞位于稷壇西北掌事以下位于西門之内道北俱重行東向以南為上設賛唱者位于縣丞東北東靣南上設望瘞位于塪北南向設縣丞以下門外位于西門之外道南俱重行北靣以東為上其日夙興本司帥其屬守社壇四門去壝七十歩所禁斷行人掌事入設神席樽坫罍洗篚羃如常祭之儀每坐各籩一豆一篚實巾二爵二配坐皆爵一置于坫質明縣丞以下各服其服本司帥掌事者入實樽罍祝以祝版各置于坫又以幣各置于篚設于饌所其幣各長一丈八尺賛禮者引縣丞以下俱就門外位賛唱者先入就位祝與執樽罍篚者入當社壇北重行南向以東為上立定賛唱者曰冄拜祝以下皆冄拜執樽者各升自西陛立于樽所執罍篚者各就位諸祝詣社壇升自西陛行埽除降又詣稷壇升行埽除訖諸祝奉幣篚入就瘞塪北位賛禮者引縣丞以下入就位立定賛唱者曰冄拜縣丞以下皆冄拜賛禮者進縣丞之左白請行事還本位祝升詣酒樽所立賛唱者曰冄拜縣丞以下皆冄拜初白請行事掌饌者帥執饌者奉饌陳于西門之外祝以幣北向授祈官祈官奉幣自北陛登社壇南向跪奠于社神前訖興少退冄拜訖復位又祝以幣授祈官祈官受幣升稷壇跪奠如社壇之儀訖掌饌者引饌入社稷之饌升自北陛配坐之饌升自西陛諸祝迎引于壇上各設于神坐前訖掌饌者降自西陛復位諸祝各還樽所賛禮者引縣丞詣罍洗盥手洗爵自社壇北陛升詣社神酒樽所執樽者舉羃縣丞酌酒進詣社神坐前南向跪奠爵興少退南向立祝持版進神坐之左西向跪讀祝文曰維某年歳次月朔日子縣令姓名謹遣具位姓名敢昭告于社神久闕時雨黎元惟懼惟神哀此蒼生邀降靈液謹以制幣清酌脯醢明薦于社神以后土勾龍氏配神作主尚饗訖縣丞冄拜祝進跪奠版于神坐興還樽所縣丞拜訖賛禮者引縣丞詣配坐酒樽所取爵于坫執樽者舉羃縣丞酌酒進詣后土氏神坐前西向跪奠爵興少退西向立祝持版進于神坐之左南靣跪讀祝文曰維某年歳次月朔日子縣令姓名謹遣具位姓名敢昭告于后土氏久闕時雨黎元惟懼惟神哀此蒼生邀降靈液謹以制幣清酌脯醢明薦于后土氏尚饗訖興縣丞冄拜祝進跪奠版于神坐興還樽所縣丞拜訖賛禮者引縣丞詣罍洗盥手洗爵詣稷壇北陛升獻如社壇之儀稷神及后稷氏祝文與上同獻訖賛禮者引縣丞降復位諸祝各進神坐前跪徹豆興還樽所賛唱者曰再拜縣丞以下皆再拜贊禮者進縣丞之左白請就望瘞位賛禮者引縣丞就望瘞位南向立祝取幣及血寘于埳東西面各二人寘土半埳贊禮者進縣丞之左白禮畢遂引出諸執事者以次出諸祝與執樽罍篚者降復執事位賛唱者曰冄拜祝以下俱冄拜以出其祝版燔于齋所得雨報祠以羊豕其祭器之數及飲福受胙瘞幣血皆與正祭同祝文曰維某年歳次月朔日子縣令姓名謹遣具位姓名敢昭告于社神往以久闕時雨式陳情禱惟神鍳佑降兹嘉液品物霑洽蒼生咸賴謹以制幣犧齊粢盛庶品明薦于社神以后土勾龍氏配神作主尚饗維某年歳次月朔日子縣令姓名謹遣具位姓名敢昭告于后土氏往以久闕時雨式陳誠禱惟神鍳佑降兹嘉液品物霑洽蒼生咸賴謹以制幣犧齊粢盛庶品明薦于后土氏尚饗稷神后稷祝文同諸縣祈諸神前一日本司設縣丞以下次于祈所隨地之宜又為瘞塪于神坐之南方深取足容物諸祈官皆于祈所清齋一日掌事者饌酒脯醢每坐籩豆各一祈日質明去祈所五十歩禁止行人縣丞以下各服其服祝帥掌事者入設神坐于北廂南向若更有詣坐則以西為上賛禮者帥執樽者設尊于神坐之左北向設洗于酒樽東南北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍篚者各位于樽罍篚之後設縣丞以下位于神坐東南重行西向以北為上設賛唱者位于縣丞西南向設望瘞位于瘞塪之南北向設縣丞以下門外位于東門之外道南北向西上掌事者入實樽罍祝以版置于坫又以幣置于饌所其幣各長一丈八尺賛禮者引縣丞以下俱就門外位賛唱者先入就位祝與執樽罍篚者入當神坐前重行北面西上立定賛唱者曰冄拜祝以下皆冄拜執樽罍篚者各就位祝進神坐前行埽除訖賛禮者引縣丞以下入就位立定賛唱者曰冄拜縣丞以下皆冄拜賛禮者進縣丞之左白請行事還本位祝升詣酒樽所立定賛唱者曰冄拜縣丞以下皆冄拜初白請行事掌饌者帥執饌者奉饌陳于西門之外祝以幣授縣丞縣丞奉幣跪奠于神坐訖興少退冄拜掌饌者引饌入祝迎引于坐首各設于神坐前訖執饌者退復位祝還樽所賛禮者引縣丞詣罍洗盥手洗爵訖詣酒樽所執樽者舉羃縣丞酌酒賛禮者引縣丞詣神坐前北向跪奠爵興少退北向立祝持版進于神坐之右東向跪讀祝文曰維某年歳次月朔日子縣令姓名謹遣具位姓名敢昭告于某神爰以久闕時雨黎元惟懼惟神哀此蒼生敷降靈液謹以制幣清酌脯醢明薦于某神尚饗訖興縣丞冄拜祝進跪奠版于神坐興還樽所若更有諸坐祈官酌獻皆如上儀惟不盥洗其祝文並同賛禮者引縣丞還本位祝進神坐前跪徹豆興還樽所賛唱者曰冄拜縣丞以下皆冄拜賛禮者進縣丞之左白請就望瘞位縣丞就望瘞位祝以幣血寘諸塪東西靣各二人寘土半塪賛禮者進縣丞之左白禮畢遂引縣丞以下出祝與執樽罍篚者俱復執事位賛唱者曰冄拜祝以下皆冄拜以出其祝版燔于齋所若祈海瀆等其幣沉之設奉幣位各向所祈之水沉之儀節一與祠同若祈先代帝王其瘞幣如正祭之禮得雨報祠牢饌飲福受胙若非岳鎮海瀆及先代帝王惟飲福不受胙瘞幣血皆同祭社之禮其瘞塪之位仍依祈禮若海瀆等沉幣又並沉血其奉幣血位及沉之儀節皆准祈沉之禮若報祠先代帝王其幣與祈同餘皆與祈禮同祝文曰維某年歳次月朔日子縣令姓名謹遣具位姓名敢昭告于某神往以久闕時雨式陳誠禱惟神鍳佑降兹嘉液庶品霑洽蒼生咸賴謹以制幣犧齊粢盛庶品明薦于某神尚饗諸縣禜城門報祠禮同若霖雨不止禜祭城門設神坐皆内向設瓢齊之樽各于神坐之左設罍洗及篚于其後皆于酒樽之左俱内向設縣尉位于罍洗之左而右向執事者位于其後皆以近神為上賛禮者賛拜無幣不為瘞塪餘與祈諸神同祝文曰維某年歳次月朔日子縣令姓名謹遣具位姓名敢昭告于城門霖雨淹久害于百榖惟靈降福應時開霽謹以清酌嘉薦明告于城門尚饗若雨止報祠用特牲飲福餘與禜禮同祝文曰維某年歳次月朔日子縣令姓名謹遣具位姓名敢昭告于城門前以霖雨式陳誠禱惟靈降祉應時開霽謹以清酌特牲粢盛庶品明薦于城門尚饗大唐開元禮卷七十三
