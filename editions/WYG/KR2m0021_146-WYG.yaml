body:
  text: 大唐開元禮卷一百四十六唐蕭嵩等撰凶禮六品以下喪之一初終復設牀沐浴襲含奠銘重小斂奠大斂廬次成服朝夕哭奠賓弔哭親故哭州縣弔州縣使弔筮宅兆筮𦵏日啟殯初終有疾者丈夫婦人各齋於正寢北墉下東首順墉牆也東首生氣養者皆齋親飲藥子先嘗之嘗者度其所堪也疾困去故衣加新衣清掃内外為賔客來問分禱所祀盡孝子之情也五祀曰門曰行侍者四人持手足為不能自屈伸内䘮則婦人持之遺言則書之屬纊以候氣纊新綿置於口鼻氣絶廢牀寢於地人始生在地庶其生氣返也男女啼踊無數餘皆哭哀有深淺内外改著素服妻妾皆披髪徒跣女子子不徒跣出嫁者髽出後人者為本生父母素服不徒跣主人主婦衣服無改男子隨事設惟帳齊衰以下丈夫素服婦人去首飾謂齊衰婦人也主人坐於牀東諸子及兄弟子在北少退俱西面妻坐於床西妾在妻後女子子兄弟之女在妻之西北俱東面藉藁坐哭孫及兄弟孫在諸子之後女孫及兄弟女孫在兄弟女子之後各依服精麤為坐先後下准此祖父以下於北壁右南面西上祖母以下於北壁下南面東上皆舒蒲席坐哭為嫡子三年者則草薦外姻丈夫於户内之東北面西上婦人於主婦西南北面東上皆舒席坐哭若舍窄宗親丈夫俱在户外之東北面西上外姻丈夫在户外之西北面東上諸女婦之喪則尊行丈夫及外親丈夫席位於前堂若户外之左右俱南面宗親尸東西上外親户西東上凡喪位皆以服精麤為序斬衰三日不食齊衰二日不食大功一日不食小功緦麻再不食復始死則復復於正寢復者掌復復謂招魂復魄以死者之上服左荷之升屋自前東榮東屋履危北面危棟上榮屋翼也左執領右執腰招以左每招長聲呼某復男子稱名女子稱字及伯仲婦人稱姓也三呼而止以衣投前承之箱升自阼階入以覆尸内若得魂魄反然復者徹舍西北扉降自後西榮不由前降不以虗反自是行死事所徹之扉薪以充煑沐復衣不以襲斂浴則去之設牀設牀於室户内之西去脚舒簟設枕遷尸於牀南首覆用斂衾去死衣斂衾大斂所用之衾黄表素裏也死衣病困所加新衣楔齒用角柶為將含也綴足以燕几校在南綴猶拘也校几脛也戸南首几脛在南以拘之則不使辟戾也侍者坐持之其内外哭位如始死之儀乃奠沐浴自沐浴至設重凡六事皆同時興作掌事掘埳於階間近西南其廣尺長二尺深三尺南其壤爲塊竈於西牆下東向以俟煑沐新盆盤瓶二䰛皆濯之陳於西階下新此器者重死事盆以盛水盤以盛濡濯瓶以汲也䰛瓦罌受二升有葢濯謂滌溉之也浴巾二皆用布布巾所以拭汙也用二者上體下體異也櫛及浴衣各實於箱浴衣已浴所衣之衣其制如今之眠帕皆具於西序下南上取米潘煑之又汲爲湯以俟浴以盤盛潘及浴盤升自西階授沐者執潘及盤入内外皆出户外象平生沐浴子孫不在旁主人出而袒簀謂牀簀去席居牀簀也主人以下於户東北面西上主婦以下於户西北面東上俱立哭其尊行者丈夫於主人東北面西上婦人於主婦西北面東上俱坐哭婦人權障以帷主人以下既出乃沐櫛櫛掠也浴則二人抗衾二人浴拭用巾挋用浴衣設牀於尸東衽下莞上簟衽卧席浴者舉尸易牀設枕翦鬚㫁爪如平常爪鬚盛以小囊大斂内於棺浴巾皆以埋於坎著明衣裳以方巾覆面仍以大歛之衾覆之訖主人以下入就位坐哭乃襲襲陳襲事於房中襲衣一稱西領南上藉以席也明衣裳明衣裳謂親身衣也今用絹裩衫也履一帛巾一方尺八寸充耳用白纊面衣用𤣥方尺纁裏纁繫手衣一具執服者陳襲衣於席襲者去巾加面衣設充耳著手衣納履凡衣左衽不紐將襲辟奠既襲則設之既襲覆以衾始死時所覆衾内外入復位哭諸尊者於卑幼之喪及嫂叔兄姑弟婦俱哭朝晡之間無事則休於别室乃含含贊者奉盤水笲實以飯含笲竹器飯用粱含用貝升堂主人出盥手於户外洗粱貝實於笲執以入北面徹枕去楔主人坐床上西面發巾粱納貝於尸口既含主人復位楔齒之柶與浴巾同埋於坎乃奠奠奠以脯醢酒用吉器無巾柶升自阼階奠尸東當腢鬼神無象故設奠以憑依之也内喪内贊者設之凡内喪皆内贊者行事既奠贊者降出設帷堂至此事少訖故設帷堂也銘銘明旌也為銘帛以絳廣終幅長六尺韜杠書曰某姓官之柩婦人云某氏姓之柩置於宇西階上重重木刋鑿之長六尺横者半之置於庭三分庭一在南木也懸物焉曰重刋㔁埋之鑿之為懸䰛孔以沐之米為粥實於二䰛既實粥蓋其口以疎布羃之繫以竹䈼懸於重覆用葦席北面屈兩端交於後西端在上綴以竹䈼銘置於重殯堂前楹下夾以葦席簾門以生布又設葦障於庭小斂小斂之禮以喪之明日陳其服一稱於東房西領下則裙衫設饌於東堂下器皆以素籩無漆以下至虞祭其器同之瓦甒一實酒觶一特牲一俎籩豆之數各二凡籩實鹽脯棗栗之屬豆實醢醬虀葅之類以下准此設盆盥於饌東布巾為奠者設盥喪事略故無洗也贊者辟脯醢之奠於尸牀西南具牀席於室西又設盆盥於西階之西如東方為舉尸者設盥斂者盥訖與執服者以斂衣入主人以下少退俱哭斂者斂訖覆以夷衾設床於堂上楹間祍下筦上簟有枕卒斂開帷主人以下西面主婦以下東面皆憑哭俱南上凡憑尸父母先妻子後訖男子退以衺巾束髪女子子髽主人以下立哭於尸東尊行者坐其位如襲位斂者舉尸男女從奉之遷於堂乃覆以夷衾今世謂之棺衣哭位如室内尊行者坐乃奠奠奠贊者盥手以饌升奠於尸東訖斂者受巾巾之奠者遂徹襲奠自西階降出下帷内外俱坐哭以親疎為之代哭夜則為燎於庭厥明滅燎乃大斂大斂大斂之禮以死後二日其日夙興陳衣於序東上服三稱西領南上朝服公服常服俱各為一稱制用隨所有衾一衾以黄為表素為𠂻衾則始死所用之斂衾饌於東堂下甒酒置於席篚在東南肆實觶一勺一豆在甒北籩次之牢饌如小斂其簟席素几功布巾在饌北掘殯塪於西階之上棺入内外止哭升棺於殯所凡棺裏之具炭灰枕席之類皆預設於棺内置棺訖内外皆哭熬穀二筐皆加魚腊熬穀所惑蚍蜉令不至於棺旁也燭俟於饌東設盆盥於饌西掌事者盥於門外升自阼階徹巾授執巾者執巾者降侍於阼階下掌事者與贊者徹小斂之饌降自西階設於西序南當西榮如設於堂上堂上謂尸東凡奠設於序西者事畢而去之乃適於東陛下新饌所帷堂内外皆少退立哭御者斂覆以衾斂訖開帷主人以下西面憑哭主婦以下東面憑哭凡憑尸父母先妻子後退復位次諸親憑哭訖斂者四人舉牀男女從奉之奉尸斂於棺乃加葢覆以夷衾内外皆復位如初設熬糓首足各一筐以木覆棺上乃塗之既殯設靈座於殯東執巾几席者升自阼階設於座右加以巾贊者以饌升西面設於靈座前席上殯於外者施葢訖設大斂之奠於殯東掌事者受巾巾之奠者降自西階以出下帷内外皆就位坐哭如初以時膳羞及湯沐皆如平常廬次將成服掌事者預為倚廬於殯堂東墉下近南北向户設苫凷於廬内諸子各一廬齊縗於廬南累塹為堊室俱北尸翦蒲為席不縁父兄不次殯所各在其正寢之東廬堊室祖為嫡孫居堊室有牀皆南面西出户也父不為衆子次於外於庶子畧自若居寢大功於堊室之南張帷席以蒲若藺婦人次於西房若殯堂無房者次後若别室成服三日成服并死日為三日也内外皆哭盡哀内外俱降就次著縗服無服者仍素服相者引主人以下俱杖三日而後食杖而後能起衆子皆杖以病故也童子婦人不能病故不杖亦不居廬不著菲屨若嫡子雖童亦杖幼不能自杖人代執之所謂當室杖者也自此以後則嫡子及有爵之庶子皆得杖在位其庶子之無爵者杖於他所不杖在位矣凡正寢戸内曰室户外曰堂也虞杖不入室祔杖不升堂以今言之即靈堂户之内外也周人祔在卒哭今之百日也哀衰敬生故其杖不升靈寢之堂前其衰服及杖皆致之於廬内應杖者朝夕哭則杖之若孝子出無異適唯向殯及向墳墓而已逺則乗車近則使人代執杖也升立於殯東西向南上齊衰以下升就位婦人升詣殯西位若殯逼西壁婦人皆位於殯北南面東上尊行者坐内外皆哭盡哀諸子孫就祖父諸父前跪哭皆撫哭盡哀就祖母及諸母前哭亦如之女子子對諸祖母及諸母哭就祖父及諸父前哭如男子之儀唯諸父不撫之耳訖各復位伯叔母以下就主婦哭亦如之始遭親喪孝子荒迷三日而食服及成矣是以尊卑内外聚哭盡哀也諸尊者降出還次主人以下降立於阼階下外姻在南少退俱西面北上哭盡哀各還次闔户小功以下各歸其家自成服之後諸尊者及婦人於諸親男女之喪有事則哭於殯所若無事有時須哭者或在正寢則於北壁下舒席南面坐哭父母喪食粥朝米四合暮米四合不能食粥則以米為飰婦人皆以米為飰朝夕哭奠朝奠日出夕奠逮日每日預具朝奠於東堂瓦甒一實以酒素勺疏醢布冪籩一豆一實以脯内外夙興各衰服凡言縗服㦄杖者皆杖以下准此男子就東階下位若升於殯東其位如始成服之式也婦人升詣殯西位内外皆哭凡朝夕哭皆開帷質明掌事者升自阼階入徹奠出又以朝奠入升阼階入設於靈座前席上執饌者出降自西階日出後皆止哭各還次朝夕之間主人及諸子妻妾女子子哭於其次無時至夕内外俱就位哭徹朝奠進夕奠如初儀日入後止哭各還次哭者出闔尸自是以後至於啟殯每朝夕如上儀七日之朝大功以下異門者歸於家賓弔親故同賓素服相者入告内外縗服哭於阼階下婦人哭於殯所如常儀相者引賓入立於庭北面西上為首者一人進當主人東面立云如何不淑主人哭再拜稽顙為首者復北面位弔者俱哭十餘聲相者引出少頃相者引主人以下各還次親故哭若有親故哭殯者内外俱升就位尊者坐内外俱哭相者引賓入升堂立於殯東西面南上尊者坐俱哭盡哀止尊者起相者引出卑者再拜訖次出凡賔與主人敵體以上賔初入主人皆起賓就席主人與賔俱坐賔起主人皆撫起賓出户俱坐恩深者賓拜訖又哭盡哀或就孝子哭盡哀而止俱出少頃相者引主人以下各還次州縣弔若刺史哭其吏人縣令同主人設席於柩東西向刺史素服將到相者引主人去杖立於門内之右北面刺史降入升自西階即座西面坐主人升就位哭刺史哭盡哀將起主人降復東階下位刺史降出主人拜送於大門外杖哭而入州縣使弔若守令遣使弔其吏人使者至内外俱縗服主人以下就階下位婦人就堂上位内外俱哭使者素服執書相者引入門内外俱哭使者素服而左立於階間東面使者致辭主人再拜稽顙相者引主人進詣使者前西面受書退復位左右進受書主人拜送於位相者引使者出使人若自入弔如上儀客出少頃内外止哭各就次筮宅兆既度宅兆掘四隅外其壤掘内南其壤宅𦵏居也兆域也南其壤者為𦵏將北首故也既朝哭主人還哭出乘堊車詣宅兆所出郭門止哭將到主人又哭至宅兆所祝及筮師凡行事者皆素服掌事布筮席於宅兆南西上相者引祝立於席西南東面南上筮師立於祝南東面北上相者引主人詣席南十五步許當内壤北向立相者立於主人之左少南俱北向諸親賓立從者立於筮席東南重行西向親北上諸賓南上立定相者少進東面稱事具退復位主人免首絰左擁之相者進立於主人東北西面筮師開韇出筮兼執之韇藏筮器進立於相者前東面相者命曰哀子姓名今儀父祖父稱孤子孤孫母祖母稱哀子哀孫以下准此為某甫度兹幽宅無有後艱某甫父字也為其父筮𦵏今謀此地以為幽冥之居得無有後艱難乎若内喪云為某母某氏也筮師曰諾右旋就席北面右執韇以擊筮述命曰假爾太巫有常坐指内卦遂筮訖興以卦東面稱占曰從還本位立主人絰哭從者哭盡哀止相者進主人之左東面稱禮畢相者遂引主人退立於東南隅西面又相者引親賓及筮者立於主人之後重行西向俱北上掌事者即徹筮席當安墓處立一標又四隅當兩廂各立一標祝史帥掌事者入鋪后土氏神席於墓左南向設酒樽於神座東南加勺羃設洗於酒樽東南罍水在洗東篚在洗西南肆篚實以巾爵加幂相者引告者及祝與執尊􅧂篚羃者俱立於􅧂洗東南重行北面以北爲上親賓及主人告之主人告去絰杖立定俱再拜祝與執樽􅧂篚者先立於樽􅧂篚之後執饌者以脯醢跪設於神座前興還本位相者引告者詣􅧂洗盥手洗爵詣尊所酌酒進跪奠於神座前興少退北面立祝持版進於神座之右東面跪讀祝文曰維年月朔日子某姓名有官稱官若主人自告父稱孤子母稱哀子姓名敢昭告於后土之神今為姓某甫父母云父某母某祖母云某氏營建宅兆神其保佑俾無後艱謹以清酌脯醢祗薦於后土之神尚饗祝興告者再拜相者引告者還本位西面再拜相者引出掌事以下俱復位再拜遂徹饌席樽罍以出主人哭還一里許哭止及郭外又哭内外升哭於位主人升詣殯前北面哭盡哀止哭西面再拜降就次若不従筮擇地如初儀筮𦵏日既朝哭主人及諸子出立於殯門之外東壁下西面北上親賓之長莅筮行事者俱吉服於門西東面南上筮人執韇韇藏筮器在其南東面主婦闔門東扇立於其内掌事者設筮席於閾外闑西莅筮者詣主人前東面告事具遂引主人立於門南北面免首絰左擁之莅筮者進立於主人東北西面筮人開韇出筮兼執之少退莅筮位前東面受命莅筮命曰孤子某母云哀子來日卜𦵏其父某官某甫母云為某母某氏也考降無有近悔考登也降下也言卜此日𦵏惟神上下得無近於咎悔也筮人曰諾右旋進就席西面坐右執韇擊筮述命曰假爾太筮有常遂筮訖興以卦東面稱占曰從從順占也主人絰哭皆哭盡哀止遂使人告於親賓其筮日不來者筮人以韇退掌事徹筮席莅筮稱禮畢主人興諸子以下入升殯前北面立哭内外俱盡哀訖各還次若不從筮擇如初儀啟殯𦵏有期前一日之夕掌事者除葦帳備啟奠具饌如大斂内外哭如常儀啟之日内外夙興縗服主人及諸子皆去冠絰以袤巾帕頭内外皆升就位哭尊行者坐祝素服執功布長三尺升自東階詣殯南北向内外皆止哭祝三聲噫嘻乃曰謹以吉辰啟殯既告皆哭盡哀各還次祝降與執饌者升徹宿奠如式祝移銘旌重北建之掌事者升徹殯塗訖設席於塪南升柩於席上又設席於柩東祝執功布升以拂柩覆用夷衾降出周設帷東面開户若不為坎以殯者則徹殯塗訖席柩東相者引主人以下升哭於帷東西向妻妾女子子以下哭於帷東北壁下南向西上諸祖母以下哭於帷西北壁下南面東上外姻丈夫帷東北面西上婦人帷西北面東上内外俱哭祝與進饌者以啟奠升設於柩東席上祝酌酒奠之内外俱坐哭於位如未成服禮親賓致奠如别儀代哭者以親疎為之晝夜不絶聲大唐開元禮卷一百四十六
