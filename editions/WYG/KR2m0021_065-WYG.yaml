body:
  text: 大唐開元禮卷六十五唐蕭嵩等撰吉禮時旱祈於太廟時旱祈於太社時旱祈於太廟將祈有司卜日如别儀前二日守宫設祈官以下次各於常所右校掃除内外為瘞塪於北門之内道西方深取足容物前一日諸告官清齋於廟所諸衛令其屬晡後一刻各以其方器服守衛廟門奉禮設版位於内外並如常儀設望瘞位於堂之東北當瘞塪西向設奉禮位於瘞塪東北南向贊者二人在西少退太廟令拂拭神幄又帥其屬以樽坫罍洗篚羃制幣篚入設皆如常儀執樽罍篚羃者各位於樽罍篚羃之後太官令預饌酒脯醢告日未明三刻諸告官以下各服其服太廟令良醖令之属入實樽罍及幣每室春夏用兩犧尊秋冬用兩著尊一實以明水為上一實以醴齊次之山罍二一實以𤣥酒為上一實以清酒次之幣以帛各長一丈八尺未明二刻奉禮帥贊者先入就位贊引引御史博士太廟令宫闈令太祝以下入當階北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖升行掃除於上太廟令已下升自東階入開塪室奉出獻祖以下九室神主各置於坐如常儀訖各引就位質明謁者引祈官以下俱就門外位謁者引祈官贊引引執事者次入就位立定奉禮曰再拜祈官以下皆再拜謁者進祈官之左白有司謹具請行事退復位太官令出帥進饌者奉饌陳於東門之外初太官令出諸太祝俱取幣於篚各立於樽所謁者引祈官升自東階詣獻祖廟室户前北向立太祝以幣東向授祈官祈官受幣進北向跪奠於獻祖神座俛伏興出户北向再拜訖謁者引祈官次進幣於懿祖以下九室皆如上儀訖謁者引還本位各太祝各還樽所太官令引饌入升自太階諸太祝各引迎於階上各設於神座前訖太官令以下降復位諸太祝各還於樽所謁者引祈官詣罍洗盥手洗爵訖升自東階詣獻祖酒樽所執樽者舉羃祈官酌醴齊訖謁者引祈官入詣獻祖神座前北向跪奠爵俛伏興出户北向立太祝持版進於户外之右東向跪讀祝文其文為水旱癘疫各蝗蟲及征伐四夷臨時制之訖興祈官再拜太祝進跪奠版於神座俛伏興還樽所謁者引祈官次詣懿祖太祖代祖髙祖太宗髙宗中宗睿宗神座酌獻讀祝皆如獻祖之儀唯不盥洗訖謁者引祈官詣東序西向立諸太祝各以爵酌罍福酒合置一爵一太祝持爵進祈官之左北向立祈官再拜受爵跪祭酒遂飲卒爵太祝受爵復於坫祈官俛伏興再拜訖謁者引祈官降復位諸太祝各入室跪徹豆興還樽所徹者籩豆各一少移於故處奉禮曰再拜在位者皆再拜已飲福者不拜奉禮曰再拜祈官以下皆再拜訖謁者進祈官之左白請就望瘞位奉禮贊者轉就瘞位東北謁者引祈官就望瘞位西向立於祈官將拜諸太祝各持篚進神座前跪取幣興降自太階詣瘞塪以制幣置於塪訖奉禮曰可瘞東西各四人寘土半坎謁者進祈官之左白禮畢奉禮贊者還本位御史太祝以下俱復執事位奉禮曰再拜御史以下俱再拜贊引引出太廟太祝宫闈令納神主如常儀其祝版燔於齋坊若得所祈報祠用太牢受胙與時享同餘與告禮同祭文臨時制時旱祈扵太社將祈有司卜日如别儀其行事進止與巡狩告社稷禮並同太社祝文曰惟某年歲次月朔日子嗣天子某謹遣具位姓名敢昭告於太社爰以農要乆闕時雨惟神哀此蒼生敷降靈液謹以玉帛清酌脯醢明薦於太社以后土勾龍氏配神作主尚饗太稷文同后土氏祝文曰維某年歲次月朔日子嗣皇帝某謹遣具位姓名敢昭告於后土氏爰以農要乆闕時雨惟神哀此蒼生敷降靈液謹以清酌脯醢明薦於后土氏尚饗后稷文同得雨報祠用太牢瘞幣血飲福受胙與正祭同餘與告禮同太社祝文曰維某年歲次月朔日子嗣天子某謹遣具位姓名敢昭告於太社徃以乆闕時雨敢陳誠情惟神昭祐降兹嘉液率土霑洽蒼生咸頼謹以玉帛犧齊粢盛庶品明薦於太社以后土勾龍氏配神作主尚饗太稷祝文同后土氏祝文曰維某年歲次月朔日子嗣皇帝某謹遣具位姓名敢昭告於后土氏徃以乆闕時雨敢陳誠情惟神昭祐降兹嘉液率土霑洽蒼生咸頼謹以犧齊粢盛庶品明薦於后土氏尚饗后稷祝文同大唐開元禮卷六十五
