body:
  text: 大唐開元禮卷一百三十五唐蕭嵩等撰凶禮中宫太皇太后皇太后皇后舉哀為父母祖父母為外祖父母為諸王妃主為内命婦為宗戚成服為父母祖父母為外祖父母奔喪奔父母祖父母喪臨喪臨外祖父母喪臨内命婦喪除服除父母祖父母喪服除外祖父母喪服遣使弔弔外祖父母喪弔諸王妃主喪弔宗戚喪舉哀為父母祖父母舉哀中宫為父母祖父母舉哀本司散下其禮所司隨職供辦訖舉哀前三刻尚寢於後别殿東壁下設薦為舉哀位西向為祖父母則北壁下南向前二刻内謁監於别殿前幔下設六宫哭位重行北向西上其六宫並集列於閤外次司贊一人升立於殿上東楹之南掌贊二人立於階下並西面前一刻尚儀版奏外辦至時引后出升殿侍衛如常内侍版奏訃尚儀傳奏稱某官若某夫人以某月日辰薨后啼若哭父母啼祖父母哭六宫從哭盡一哀后問故又哭盡哀乃變素服六宫皆素服哭不絶聲又盡哀司賓引六宫入各就班位司贊稱再拜掌贊承傳凡司贊有詞掌贊皆承傳六官在位者皆再拜司贊稱哭六宫在位者皆哭十五舉聲司贊稱止六宫在位者皆止司賛稱哭再拜六宫在位者皆再拜司贊稱下司賔引六宫退尚儀跪奏請哭止后止從臨者皆止后退舍别次六宫以下侍衛如初於閤哭臨如常禮其日晡臨晡前二刻奏嚴六宫赴集一刻奏辦至時引后就哭位餘如常尚儀跪奏請哭后哭六宫從臨者皆哭十五舉聲司贊稱哭止六宫在位者皆止但無復拜其他贊引如初自後奔赴如别禮若有疾故未及奔喪則自後朝晡赴集奏引即位哭及於閤臨皆如初以至成服而後奔喪后為父母之舉哀也其有在宫公主為外祖父母小功者亦服素服引升即位於户内之東北面與后俱哭臨於六宫等退也贊止引退其有曾祖髙祖父母薨舉哀與為祖父母同為外祖父母舉哀右與為祖父母舉哀禮同其異者扵别宫次其日晡後臨凡三朝哭臨而止為諸王妃主舉哀右與為外祖父母舉哀禮同其本服大功者其日晡哭而止其本服小功以下者一舉哀而止為内命婦舉哀右與為諸王妃主舉哀禮同其九嬪以下一舉哀而止為宗戚舉哀右與為諸王妃主舉哀禮同成服為父母祖父母成服后聞喪有奔喪之禮故成服篇在舉哀之後三日成服本司散下其禮所司隨職供辦尚寢先於后舉哀别殿東壁設素褥牀席為后成服位西向為祖父母則北壁下南向尚服先製后齊衰周之服又製六宫之服亦如之其日成服前三刻尚儀版奏請中嚴其别殿上女侍臨者代哭如初成服前二刻司贊於别殿前幰下整設六宫哭位如初又扵殿上后位前設席為奉慰位六宫並如初服集列扵閤外次女侍者各以篋奉其衰服進授仍賛變服變服已掌賛一人升立扵殿上東楹之南掌賛二人立於階下俱西面尚服以篋奉衰服升東階北面立成服前一刻尚儀版奏外辦至時后仍初服即位六尚以下侍衞如初尚儀跪奏請哭后哭從臨者皆哭十五舉聲尚儀跪奏請哭止成服后止尚服以篋奉衰服進跪授興仍贊變服焉於變服則權設步障已而去之變服已尚儀跪奏請哭后哭司賓引六宫入即班位立定司贊稱拜六宫在位者皆再拜司贊稱哭六宫在位者皆哭十五舉聲司贊稱止六宫在位者皆止司賓引六宫行首一人升詣后前跪奉慰興司賔引降還本位司贊稱拜六宫在位者皆再拜訖司賓引六宫退尚儀跪奏請止哭后止從臨者皆止后退舍别殿六尚以下侍衛如初扵閤哭臨如初其日晡臨晡前二刻奏嚴六宫赴集一刻奏辦引即位哭如初其有公主應従成服者則製小功五月之服引即哭位如初與后俱哭成服臨哭先拜慰如六宫之儀於六宫退贊止引退自後朝晡哭臨如初以至卒哭若公除如别禮其為曽祖髙祖父母則與六宫成齊衰三月之服如常禮為外祖父母成服右與為祖父母成服禮同其異者六宫俱成小功五月之服其日内外應交慰者赴集奏引即上下位次哭臨撫尉心及拜哭奉慰如常禮自後皆然外命婦及百官三品以下並無服諸親等亦赴集奉慰如常自後皆然其諸王妃主以下喪則舉哀之日奉慰奔䘮后奔父母祖父母喪本司散下其禮所司隨職供辦尚舍先設行宫便殿於主人大門外之右南向又於便殿之後及左右廂量設六宫以下陪從者便次又於喪寢前設障幰為六宫以下拜哭次主人五屬之親於車駕未至之前並集列於主人第其日出宫前四刻尚儀版奏請中嚴出宫前三刻諸衛等備列常行仗衛鹵簿於所出宫門外内如常儀出宫前二刻内謁者監於主人第喪寢尸西若殯西設薦席為后哭位東向其奔祖父母喪則户内之西南廂北面又於喪庭寢幰下北面重行設六宫以下拜哭位次北向西上以下從者各素服鴻臚於喪寢北張幃幕為主人五屬婦人哭位其六宫以下從者各素服集列以候陪從如常式已成服則服衰服内僕進堊車其仗衛之屬應充鹵簿者並以次整列於所出宫門内外如常儀未出宫前一刻其六尚以下應陪從者並以次進迎如常式小輿進於中庭時至尚儀版奏外辦后仍舉哀之服升輿出已成服則服衰服三面周以白布行幃至閤外后降輿升堊車内僕執御其内侍以下前導夾引與六尚以下乘車陪從如常儀六宫等應從者乘車以次序從如常仗衛夾引后哭從臨者隨哭不絶聲於后未至之前司儀贊主人内外五屬之親各出就前堂哭位五属婦人出就後幕下位俱如喪寢之儀内謁者監一人升立於䘮寢東楹之東南内給使二人扵階下並西面后至主人第降車所尚儀跪奏請降車入后降車仍哭入自闈門三面周以行幃従臨者仍哭従不絶聲六尚以下哭從如初侍者夾扶主人降詣東階之南仍立哭其奔祖喪則主人仍立哭以待衆主人並降立於主人之後西面北上立哭以服精粗為序后至喪寢庭主人哭止再拜仍立哭女侍者扶引后哭升自西側階進尸西跪憑尸撫心哭從臨者皆哭於后之升也内謁者監及司賓引六宫引以下從奔者各權舍於便次其仗衛鹵簿屯列於外内如常式主人以下應升者各即位哭后哭盡一哀仍扶引即位哭從臨者仍哭若已殯則先引進靈前跪憑靈哭盡哀奏引退西面再拜乃即位而哭内謁者監及司賓引六宫以下入即班位内謁者監稱拜給使承傳唱可拜凡内謁者監有詞給使皆氶傳六宫以下皆再拜内謁者監稱哭六宫以下在位者皆哭十五舉聲内謁者監稱止六宫以下在位者皆止若已成服則引行首升拜慰如常禮内謁者監稱拜六宫以下在位者皆再拜内謁者監及司賓引六宫以下退還便次尚儀跪奏請哭止后止從臨者皆止后降即便殿内侍版奏解嚴將士仍不得輒離部伍其成服已則百官應奉慰者皆赴奉慰如常禮自後后依時哭臨如常禮其為父若祖父喪則自後奏引哭於後寢次其未成服而奔則至成服日即與主人俱成服其奔父母之喪則成服而還宫其有别勅令還宫則隨㫖期其未即還宫也則鹵簿仗衛及六宫以下應還者先還其六宫已下之留者與后依時哭臨及成服如后之禮於后還宫之朝諸應奉迎之官及仗衛鹵簿等並赴主人第奉迎如式於還宫日車從未發前三刻尚儀版奏請中嚴諸衛整列鹵簿於還途如來儀至時尚儀版奏外辦后哭拜訖六尚夾引后降出常侍從者夾引左右如初主人拜送如常儀后出内門奏止哭升車從臨者皆止三面周以行幃六宫以下各乘其車序從如初至閤外尚儀跪奏請降入后降車升輿入内侍以下陪從至閤如初内侍版奏解嚴諸列鹵簿者各還其所自後赴𦵏及練祥則出入如初禮皇太后皇后於父母若祖父母之喪比𦵏以還而不赴𦵏則於啟日之朝與六宫以下服衰服奏引各即上下位次哭臨拜慰如初若父在祖父在為母若祖母之䘮十一月而小祥則與六宫以下扵位次行變除之禮易以練總除腰絰哭臨受慰如常禮其禀㫖行公除之禮則十三日而除其行除禮如别條臨䘮臨外祖父母喪右與奔祖父母喪禮同其異者乘犢車其仗衛羽儀之屬則如平常而位於喪寢中間之西北壁下南面即位乃哭其主人内外五屬之親並哭於前堂婦人哭於後庭應升者待令乃升皇太后皇后毎出臨若須嚴皷並須准所臨逺近及鹵簿備畧禀㫖在於當時臨内命婦喪后臨内命婦喪本司散下其禮所司隨職供辦降臨前二刻尚儀版奏請中嚴尚寢先於命婦以下喪寢中間北廂設素褥牀席為后哭位南向小輿進於内庭降臨前一刻尚儀版奏外辦后服素服升輿出常侍從者侍衛如常式至内命婦以下喪寢降輿即位哭侍衛如常式於后之將至也女侍者啟引亡者所生皇子降東階之東南西面再拜已成服則去杖又女侍者啟引亡者所生皇女出北户降寢北面南再拜引並升復位哭如初尚儀跪奏請哭后哭從臨者皆哭十五舉聲尚儀跪奏請哭止撫慰皇子等后止女侍者引皇子就后前跪哭后撫慰皇子興再拜仍立哭又引皇女進后撫慰如撫慰皇子之禮尚儀跪奏請還后升輿引降還侍衛如初於后之降也侍者啟引皇子降拜引升復位哭女侍者啟引皇女降拜引升復位哭並如初除服除父母祖父母喪服后除父母祖父母喪服本司散下其禮所司隨職供辦尚服先製后及六宫以下素服内謁者監先於别殿閣外整設六宫以下便次如初又於别殿前整設障幔為六宫以下拜哭次如初以十三日而除服於除服前之夕后晡臨已有司除其故位次而設新下牀席焉其日平明後而除服於除服前三刻尚儀版奏請中嚴六宫以下各其本司啟嚴女侍臨者升列於别殿上哭臨如初除服前二刻司贊於别殿前幔下整設六宫以下位次如初又於堂上后位前設席為跪奉慰位如初六宫以下仍衰服集列於閣外便次女侍者以篋奉素服進授仍贊變除焉司贊一人升立於堂上東楹之南掌贊二人升立於堂下並西面尚服以篋奉素服升東間北面立前一刻尚儀版奏外辦后仍服衰服出升即位次侍衛如初后哭従臨者皆哭十五舉聲尚儀跪奏請哭止從禮制除服后止尚服以篋奉素服進跪授興仍贊變除焉於變服則權設步障已而去之其従臨者亦從變除變除已尚儀又跪奏請哭后哭司賓引六宫以下入即班位司贊稱拜掌贊唱可拜凡司贊有詞掌贊皆承傳六宫以下在位者皆再拜司贊稱哭六宫以下在位者皆哭十五舉聲司贊稱止六宫以下在位者皆止司賓引六宫行首一人升進后前席位跪奉慰興司賓引降還本位司贊稱拜六宫以下在位者皆再拜司賓引六宫以下出各還宫寢如常尚儀跪奏請哭止還后哭止從臨者皆止后降還内寢侍衛如初除外祖父母喪右與除祖父母喪服禮同其異者行公除之禮則五日而除遣使弔弔外祖父母喪弔外祖父母喪本司散下其禮所司隨職供辦内給事二人為使者守宫先於主人第大門外之右設使者次南向其日使至掌次者延入次内外衰服司儀引主人以下俱立哭於東階下婦人立哭於殯所如常儀使者素服出次内典引引使者立於大門之西東面内給使二人以案奉令書立於使者之南差退俱東面司儀入告主人去杖免絰司儀引出門止哭迎於大門外見賓先入立扵門右北面内典引引使者以下入内外止哭使者入門而左立扵階間南面持案者立於使者之西南東面司儀引主人進當使者前北面内給使以案進詣使者前使者取弔書持案者退復位使者稱有令稱弔主人哭拜稽顙内外皆哭司儀引主人進受弔書退立於東階下西面哭内典引引使者以下出復門外位主人以弔書授左右司儀引主人出中門止哭拜送於大門外使者還主人杖哭而入取弔書於階下升奠於柩東其使者須私弔則通名引入弔如常禮引出弔諸王妃主喪弔宗戚喪右皆與遣使弔外祖父母喪禮同凡葬及練祥使弔之禮並同大唐開元禮卷一百三十五
