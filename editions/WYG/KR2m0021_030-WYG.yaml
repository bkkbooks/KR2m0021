body:
  text: 大唐開元禮卷三十唐蕭嵩等撰吉禮夏至祭方丘有司攝事齋戒陳設省牲器奠玉帛進熟齋戒前祭七日平明太尉誓百官于尚書省曰某月某日祭皇地祗于方丘各揚其職不供其事國有常刑凡預祭之官散齋四日致齋三日散齋皆于正寢致齋二日于本司一日于祭所其無本司者皆于祭所散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祭事得行其餘悉斷其祭官已齋而闕者通攝行事諸祀官致齋之日給酒食及明衣各習禮于齋所光祿卿監取明水火太官令取火于陽燧取水于隂鑒火以供爨水以實尊前祭二日太尉告高祖神堯皇帝廟如常告之儀告以配神乍主之意前祭一日諸衛令其屬未後一刻各以其方器服守衛壝門毎門二人每隅一人與太樂工人俱清齋一宿陳設前祭三日衛尉設祭官公卿以下之次于東壝之外道南北面西上設陳饌幔于内壝東門之外道北南向壇上及神州東方南方之饌陳于東門外西向西方北方之饌陳于西門外東向神州無西門之饌前祭二日太樂令設宫懸之樂于壇南内壝之外東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二镈鐘于編懸之間各依辰位𣗳雷鼓于北懸之内道之左右植建鼓于西隅置柷敔于懸內柷在左敔在右設歌鐘歌磬于壇上近南北向磬簴在西鐘簴在東其匏竹者立于壇下重行北向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以北為上南方北方以西為上右校埽除壇之内外又為瘞塪于壇之壬地內壝之外方深取足容物南出陛前祭一日奉禮設祭官公卿位于內壝東門之外道南分獻之官于公卿之南執事者位于其後每等異位俱重行西向北上設望瘞位當瘞埳之南北向設御史位于壇上正位于東南隅西向副位于西南隅東向令史各陪其後于壇下設奉禮位于樂懸東北贊者二人在南差退俱西向北上又設奉禮贊者位于瘞埳西南東向南上設恊律郎位于壇上南陛之西東向設太樂令史位于北懸之間當壇北向又設祭官公卿以下門外位于東壝之外道南每等異位重行北向西上設牲牓于東壝之外當門西向黄牲一居前又黄牲一在北少退𤣥牲一在南少退設廩犧令位于牲西南祝史陪其後俱北向設諸太祝位于牲東各當牲後祝史陪其後俱西向設太常卿省牲位于牲前近北南向設皇地祗酒樽于壇之上下太樽二著樽二犧樽二山罍二在壇上東南隅北向象樽二壺樽二山罍一在壇下南陛東北向西上設配帝著樽二犧樽二象樽二山罍二在壇上于皇地祗酒樽之東北向西上神州太樽二在第一等毎方岳瀆海鎮俱山樽二山川林澤各蜃樽二丘陵墳衍原隰各散樽二凡樽各設于神坐之左而右向神州以上之樽置于坫岳鎮以下之尊俱藉以席皆加勺羃設爵于尊下設洗于壇南陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵設罍洗篚羃各于其方陛道之左俱内向執樽罍篚羃者各于樽罍篚羃之後置玉幣之篚于壇之上下樽坫之所祭日未明五刻太史令郊社令升設皇地祗神坐于壇上北方南向席以藁秸設高祖神堯皇帝坐于東方西向席以莞設神州地祗神坐于第一等東南方席以藁秸又設岳鎮以下之坐于内壝之内各于其方嵩岳以下之坐于壇之西南俱内向席以莞設神位各于座首省牲器省牲之日午後十刻去壇二百歩所諸衛禁斷行人晡後一刻郊社令帥府史三人及齋郎以樽坫罍洗篚羃入設于位晡後二刻諸太祝與廩犧令以牲就牓位謁者引太常卿贊引引御史詣壇東陛升視滌濯于上于視滌濯執尊者皆舉羃告㓗太常卿就省牲位南向立廪犧令少前白請省牲退復位太常卿省牲廪犧令又前北向舉手曰腯還本位諸太祝各循牲一匝西向舉手曰充俱還本位諸太祝與廪犧令以次牽牲詣厨授太官謁者引光祿卿詣厨省鼎鑊申視濯溉謁者贊引各引祭官就厨省饌具訖俱還齋所祭日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置于饌所遂烹牲奠玉帛祭日未明三刻諸祭官各服其服郊社令各帥其屬入實樽罍玉幣凡六尊之次太尊為上實以汎齋著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝齊著尊為上實以汎齊犧尊次之實以醴齊象尊次之實以盎山罍為下實以清酒神州太尊實以汎齊五方岳鎮海瀆之山尊實以醍齊山林川澤之蜃尊實以沈齊丘陵以下之散尊實以清酒𤣥酒各實于諸坐之上尊禮神之玉帛地祗以黄琮其幣以黄配帝之幣亦如之神州之玉以兩珪有邸其幣以𤣥五方岳鎮以下幣各従方色太官令帥進饌者實諸籩豆簋簠各設于内壝之外饌幔内未明二刻奉禮帥贊者先入就位贊引引御史博士諸太祝令史與執樽罍篚羃者入自東門當壇南重行北靣西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽罍篚羃者各就位贊引引御史諸太祝詣壇東陛御史一人太祝二人升行埽除于上御史一人太祝七人行埽除于下訖引降就位未明一刻太樂令帥工人二舞次入就位文舞入陳于懸内武舞立于懸南道西謁者引司空入行埽除如常儀初司空入謁者引祭官贊引引執事者就壝外位司空行埽除謁者贊引各引祭官次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位恊律郎跪俯伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼓柷奏順和之樂乃以林鐘為宫太簇為角姑洗為徴南吕為羽林鐘太簇姑洗南吕各再奏作文舞之舞樂舞八成偃麾戛敔樂止凡樂皆恊律郎舉麾工鼔柷而後作偃麾戞敔而後止奉禮曰衆官再拜衆官在位者皆再拜上下諸祝俱取玉幣于篚立于樽所謁者引太尉詣南陛升壇北向立太祝加玉于幣東向授太尉受玉幣登歌作肅和之樂以應鐘之均謁者引太尉北向進跪奠于皇地祗神坐興謁者引太尉少退北向再拜訖謁者引太尉立于東方西向又太祝奉幣北向授太尉太尉受幣謁者引太尉進東向跪奠于高祖神堯皇帝神坐興謁者引太尉少退東向再拜訖登歌止謁者引太尉降自南陛還本位初太尉奠配帝之幣神州以下諸太祝各奉玉幣進奠于神坐還樽所初衆官拜訖祝史各奉毛血之豆立于門外于登歌止祝史奉毛血入正坐升自南陛配坐升自東陛神州升自已陛諸太祝迎取于壇上各奠于神坐前諸太祝與祝史退立于樽所進熟太尉既升奠玉幣太官令出帥進饌者奉饌各陳于内壝門外謁者引司徒出詣饌所司徒奉皇地祗之俎諸太祝既奠毛血太官令各引饌入爼初入門雍和之樂作以太簇之均自後接神之樂皆以太簇為均饌至陛樂止祝史俱進徹毛血之豆降自東陛以出皇地祗之饌升自南陛配帝之饌升自東陛神州之饌升自已陛諸太祝迎引于壇上各設于神坐前籩豆蓋冪先徹乃升簋簠既奠却其蓋于下設訖謁者引司徒太官令帥進饌者降自東陛以出司徒復位諸太祝還樽所又進設岳鎮以下之饌相次而畢初壇上設饌訖謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉升自南陛詣皇地祗酒樽所執樽者舉羃太尉酌汎齊訖樂作謁者引太尉進皇地祗神坐前北向跪奠興謁者引太尉少退北向立樂止太祝持版進于神坐之右東向跪讀祝文曰維某年歲次月朔日子嗣天子臣某謹遣太尉臣名敢昭告于皇地祗乾道運行日躔北至景風應序離氣效時嘉承至和肅若舊典敬以玉帛犧牲粢盛庶品備兹祗瘞式表誠慤高祖神堯皇帝配神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版于神坐還樽所太尉拜訖樂止謁者引太尉詣配帝酒樽所取爵于坫執樽者舉冪太尉酌汎齊訖樂作謁者引太尉進高祖神堯皇帝神坐前東向跪奠爵興謁者引太尉少退東向立樂止太祝持版進于神坐之左北向跪讀祝文曰維某年歲次月朔日子孝曽孫開元神武皇帝臣某謹遣太尉某官臣某敢昭告于高祖神堯皇帝時維夏至肅恭訓典用致祗祭于皇地祗伏惟高祖徳恊二儀道兼三統禮應光配敢率舊章謹以制幣犧齊粢盛庶品肅雍明薦作主侑神尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版于神坐還樽所太尉拜訖樂止謁者引太尉進皇地祗神坐前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒啐酒奠爵興太祝各率齋郎進俎太祝減神前胙肉加于俎以胙肉共置一俎太祝持俎西向授太尉太尉受以授齋郎太尉跪取爵遂飲卒爵太祝進受爵復于坫太尉興再拜謁者引太尉降復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止初太尉獻將畢謁者引太常卿詣罍洗盥手洗匏爵訖謁者引太常卿自東陛升壇詣皇地祗著樽所執樽者舉羃太常卿酌醴齊武舞作謁者引太常卿進皇地祗神坐前北向跪奠爵興謁者引太常卿少退北向再拜訖謁者引太常卿詣配帝犧樽所取爵于坫執樽者舉冪太常卿酌醴齊謁者引太常卿進高祖神堯皇帝神坐前東向跪奠爵興謁者引太常卿少退東向再拜訖謁者引太常卿進皇地祗神坐前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太常卿之右西向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復于坫太常卿再拜謁者引太常卿降復位初太常卿獻將畢謁者引光禄卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光祿卿降復位初太常卿將升獻謁者引獻官詣罍洗盥手洗匏爵訖升自已陛詣酒樽所執樽者舉羃酌汎齊進奠于神州坐前引還本位謁者五人次引獻官各詣罍洗盥洗訖各詣酒樽所俱酌醍齊訖引獻官各進奠爵于諸方岳鎮海瀆首坐餘坐皆祝史助奠相次而畢引還本位又賛者五人各引獻官詣罍洗盥洗詣酒樽所酌沈齊獻山川林澤如岳鎮之儀訖又引獻官詣罍洗盥洗詣酒樽所俱酌清酒獻丘陵以下及齋郎助奠如上儀訖各引還本位武舞六成樂止舞獻將畢上下諸祝各進徹豆還樽所徹者籩豆各一少移于故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜順和之樂作奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之左白請就望瘞位謁者引太尉就望瘞位北向立于羣官將拜上下諸祝各執篚進神坐前取玉幣齋郎以俎載神州以上牲體稷黍飯爵酒各由其陛降壇北行當瘞埳西行諸太祝以玉幣饌物置于埳諸祝史以岳鎮以下之禮幣及牲體皆從瘞奉禮曰可瘞塪東西靣各六人寘土半塪謁者進太尉之左白禮畢謁者引太尉出又謁者贊引各引祭官以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出其祝版燔于齋所大唐開元禮卷三十
