body:
  text: 大唐開元禮卷一百十七唐蕭嵩等撰嘉禮三品以上嫡子冠將冠筮於廟門之外無廟者筮於正寢之堂主人謂將冠者之父兄也公服立於門東西面無廟者於堂上楹間近東西面掌事者各服其服立於門西東面北上無廟者立於楹間近西東面北上布筮席於闑西閾外西面無廟者於主人之西西面筮者開匵出䇿兼執之東面受命於主人主人曰為嫡子某某日加冠庶幾從之筮者曰諾進就筮席西面以韇撃䇿遂述曰假爾泰筮有常某為嫡子某某日加冠庶幾從之乃釋韇坐筮訖興降席東面稱占曰從筮者退若不吉則筮逺日如初儀贊禮者進主人之左告禮畢掌事者徹筮席前三日筮賔如求日之儀賔謂可使冠子者前二日主人戒賔及贊冠者主人至賔大門外掌次者引之次主人公服出次立於大門外之西東面賔公服立於阼階下西面儐者公服進於賔之左北面受命立出於門東西面曰敢請事主人曰某之子某將加冠請某子教之相稱各隨官爵儐者入告賔出立於門東西面再拜主人答拜主人曰某之子某將冠願吾子教之賔曰某不敏恐不能供事以辱於吾子敢辭主人曰某猶願吾子教之賔曰吾子重有命某敢不從主人再拜賔答拜主人還賔拜送主人戒贊冠者亦如之亦通使子弟戒之前一日掌事者設次於大門外之右南向其日夙興贊者設洗於正寢阼階東南東面當東霤六品以下當東榮南北以堂深罍水在洗東加勺羃篚在洗西南肆實巾一於篚加羃席於東房西牖下無房者張帷陳服於席東領北上冕服青衣纁裳一品衮冕服九章五章在衣山龍華蟲火宗彞四章在裳藻粉黼黻二品鷩冕服七章三章在衣華蟲藻火四章在裳宗彞粉米黼黻三品毳冕服五章三章在衣宗彞藻粉米二章在裳黼黻四品綉冕服三章一章在衣粉米二章在裳黼黻五品𤣥冕衣無章裳刺黻一章六品以下爵弁服青衣纁裳白紗中單黼領青褾襈裾革帯鈎䚢大𢃄一品二品大帯皆紕其外上以朱下以緑三品大𢃄四品五品素帯皆紕其垂外以𤣥内以黄紉約皆用青組六品以下綀帯紕其垂内外以緇紉約用青組黻隨衣色山火二章四品繡冕山一章五品𤣥冕無章六品爵韠劍飾以金玉四品五品飾以金雙佩一品山𤣥玉五品以上水蒼玉雙綬一品緑綟綬四綵綠紫黄赤純緑質長一丈八尺二百四十首廣九寸二品三品紫綬三綵紫黄赤純紫質長一丈六尺一百八十首廣八寸皆有小雙綬長二尺六寸色同大綬而首半之一品施二玉環四品青綬三綵青白紅純青質長一丈四尺一百三十首廣七寸五品黑綬二綵青紺純紺質長一丈二尺一百首廣六寸皆有小雙綬長二尺六寸色同大綬而首半之六品已下無劍佩綬而已朱韈赤舄五品以上同六品以下白韈赤履庶人黑介幘服絳公服方心革帯􅀈䚢假帯韈履進賢冠服絳紗單衣白紗中單皂領褾襈裾白裾襦赤裙衫革帯􅀈䚢假𢃄曲領方心絳紗蔽膝白韈黑舄八品以下去中單曲領蔽膝黑履庶人黑介幘服白裙襦青領革帯韈履劍雙佩雙綬六品以下無劍綬緇布冠服青衣素裳素韠中單革大帯劍珮綬與冕服同韈舄與進賢冠服同六品以下中單革帯繡帯與爵弁服同韈履與進賢冠同庶人𢃄韈履與介幘服同去韠緇纚櫛簮同箱在服於南纚今用皂巾方六寸屬帯於前兩隅莞筵四紛純加藻席四繢純又側樽甒醴在服北加勺羃設坫在樽北實角觶角柶各一加羃饌陳於坫北四品五品蒲筵四緇布純加萑席四𤣥帛純六品以下蒲筵四緇布純不加萑席四品以下設篚無坫柶以角為之狀如匕饌用少牢及腊三俎一品二品十籩十豆三品八籩八豆四品五品六籩六豆凡牲體節折加離肺籩實脯棗栗之屬豆實醢醬韲葅之類六品以下用特牲一俎二籩二豆籩實脯棗豆實葅醢設洗於東房近北罍水在洗西篚在洗東北肆實以巾質明賔贊至主人大門外掌禮者引之次賔贊公服諸行事者各服其服六品以下無公服者服常服執樽罍篚者皆就位衮冕垂青珠九旒以組為纓色如其綬青纊充耳角簮導鷩冕七旒毳冕五旒餘皆同衮旒四品五品綉冕垂青珠四旒以組為纓色如其綬青纊充耳角簮導𤣥冕三旒餘同綉冕六品以下爵弁𤣥纓角簮導庶人則黑介幘進賢冠三梁纓青緌犀導四品五品兩梁六品以下一梁庶人則黑介幘緇布冠青組纓冠冕各一箱各一人執之待於西階之西東面北上設主人之席於阼階上西面賔席於西階上東面冠者席於主人東北面主人公服立於阼階下當東序西面諸親公服非公服者常服立於罍洗東南西面北上尊者停别室儐者公服立於門内道東北面將冠者雙童髻空頂幘雙玉導金寳飾綵袴褶錦紳烏皮履四品五品導飾以金六品以下無金飾立於房内南面主人贊冠者公服立於房内户東西面賔及贊冠者出次立於門之西贊冠者少退俱東面北上儐者進於主人之左北面受命出立於門東西面曰敢請事賔曰某子有嘉禮命某執事儐者入告主人迎賔於大門外之東西面再拜賔答拜凡主賔拜揖出入皆賛禮者導之主人揖賛冠者贊冠者報揖主人又揖賔賔報揖主人入賔及賛冠者次入及内門主人揖賔賔報揖主人與賔入賛冠者從之至内霤將曲揖賔報揖及階主人立於階東西面賔立於階西東面主人曰請吾子升賔曰某將事敢辭主人曰固請吾子升賔曰某敢固辭主人曰終請吾子升賔曰某敢終辭主人升自阼階立於席東西向賔升自西階立於席西東向賛冠者及庭盥於洗升自阼階入於東方立於主人賛冠者之南俱西面主人賛冠者引將冠者出立於房户外賔之賛冠者取纚櫛簮箱跪奠於冠者筵南端興席北少東西面立賔揖將冠者賔主俱即座坐將冠者進升席西面坐賔之賛冠者進筵前東面跪脫䨇童髻置於櫛箱畢設纚興復位立賔主俱興賔降盥主從降賔東面辭曰請吾子不降主人曰吾子降辱敢不從賔降至罍洗盥手訖詣西階賔主一揖一讓升主人立於席後西面賔立於西階上東面執緇布冠者升賔降一等受之右執頂左執前進將冠者筵前東向立祝曰令月吉日始加元服弃爾幼志順爾成徳壽考維祺永介景福乃跪奠冠興復西階上席後東面立賔之賛冠者進冠前東面跪結纓興復位冠者興賔揖冠者冠者適房賔主俱坐冠者著青衣紫裳之服出房户西南面立賔主俱興賔揖冠者冠者進升席西向坐賔之賛冠者跪脫緇布冠置於箱櫛畢設纚興復位賔降二等受進賢冠庻人則黑介幘右執頂左執前進冠者筵前東向立祝曰吉月令辰乃申爾服敬爾威儀淑慎爾德眉壽萬年永受胡福乃跪冠興復位賔之賛冠者跪設簮纓興賔揖冠者冠者適房賔主俱坐冠者著綘紗服庻人則白裙襦服出房户西南面立賔主俱興賔揖冠者進升席西向坐賔之贊冠者跪脱進賢冠庶人脱黑介幘置於箱櫛畢設纚興復位賔降三等受冕六品受爵弁庶人黑介幘右執頂左執前進冠者筵前東向立祝曰以嵗之正以月之令咸加爾服兄弟具在以成厥德黄耉無疆受天之慶乃跪冠興復位賔之賛冠者跪設簮結纓興復位冠興者賔揖冠者適房賔主俱坐主人贊冠者徹纚櫛簮箱及筵入於房又筵於室户西南向冠者著冕服六品以下著爵弁之服庶人則絳公服出房户西南立賔主俱興主人贊冠者盥手洗觶於房酌醴加柶覆之面葉出户南面立賔揖冠者冠者就筵西面立賔進受醴於室户東加柶面柄進冠者筵前北面立祝曰甘醴維厚嘉薦令芳拜受祭之以定爾祥承天之休壽考不㤀冠者筵西拜受觶賔復西階上東面答拜執饌者奉饌薦於冠者筵前冠者升筵坐左執觶右取脯擩於醢祭於豆籩之間贊冠者取肺一以授冠者冠者奠觶於薦西興受㕁左手執本坐右絶末以祭上左手嚌之興以授贊冠者加於俎冠者坐帨手取觶以柶祭醴加柶於觶西葉興筵末坐啐醴建柶興䧏筵西南面跪奠觶再拜執觶興賔答拜賔主俱坐冠者升筵跪奠觶於薦東興進北面跪取脯降自西階入見母進奠脯於席前退再拜以出冠者母不在則使人受脯於西階下初冠者入見母賔主俱興賔降當西序東面立主人降當東序西面立冠者既見母出立於西階之東南面賔少進字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜錫之於嘏永受保之曰伯某甫冠者曰某雖不敏夙夜祇奉賔出主人送於内門外主人西面請賔曰吾子辱執事請禮從者賔曰某既得將事敢辭主人曰敢固以請賔曰某辭不得命敢不從賔就次主人入初賔出冠者東面見諸親諸親拜之冠者答拜冠者西面拜賔之贊冠者贊冠者答拜訖見諸尊於别室賔主既釋服改設席訖賔與衆賔俱出次立於門西東面主人出立於門東西面主人揖賔賔報揖主人先入賔及衆賔從之至階一讓升各就坐後立定俱升坐㑹訖賔主俱興賔立於西階上賛冠者在北少退俱東面立人立於東階上西面衆賔降立於西階下東面掌事者以幣篚升授主人於序端主人執篚少進西面立又掌事者奉幣篚升牽馬者牽兩馬入陳於門内三分庭一在南北首西上賔還西階上北面贊冠者立於賔左少退賔贊俱再拜主人進立於楹間南面賔贊進立於主人之右俱南面主人授幣篚賔受之退復東面位於主人授幣掌事者又以幣篚授贊冠者退復位主人還阼階上北面拜送賔降自西階從者迓受幣賔當庭賔東面揖出牽馬者從出從者迓受馬於賔降主人降送賔於大門外之東西面再拜賔退主人入孤子則諸父諸兄戒賔冠之日主人髻而迎賔拜揖讓如冠主冠於阼醴之及禮賔拜送皆如上儀明日見廟冠者朝服質明賛禮者引入廟南門中庭道西北面賛再拜訖引出大唐開元禮卷一百十七
