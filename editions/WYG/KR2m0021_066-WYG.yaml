body:
  text: 大唐開元禮卷六十六唐蕭嵩等撰吉禮時旱祈岳鎮於郊報祠禮同將祈有司筮日如别儀前二日守宫設祈官以下次於東壝之外道南北向以西為上設陳饌幔於内壝東門之外道北南向右校掃除壇之内外又為瘞塪於壇之壬地方深取足容物南出陛前一日諸祈官清齋於祈所諸衛令其屬晡後一刻各以其方器服守衛壝門俱清齋一宿奉禮設祈官位於内壝東門之内道北執事位於道南每等異位俱重行西向以北為上設御史位於壇下西南東向令史陪其後設奉禮位於祈官西南贊者二人次之少退俱西向又設祈官門外位於東壝之外道南每等異位重行北向以西為上郊社令以酒樽入設岳鎮海瀆各山樽二山川各蜃樽二每方皆扵神座之左皆右向俱有坫以置爵設罍洗篚羃各於其方陛道之左俱内向執樽罍篚羃者各於其樽罍篚羃之後祭日未明二刻太史令郊社令各服其服設岳鎮海瀆及諸山川神坐各依其方俱内向席皆以莞設神位各於坐首未明一刻諸祈官以下各服其服郊社令與良醖令之屬入實樽罍山罍實以醴齊蜃樽實以沈齊明水各實於上尊太祝以幣置於篚設扵饌所岳鎮海瀆皆有幣各依其方色各長一丈八尺太史令帥進饌者實籩豆入設於内壝東門之外饌幔内奉禮帥贊者先入就位贊引引御史太祝以下與執樽罍篚羃者入詣南方山川之西南當門重行北面以西為上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜執樽罍篚羃者各就位贊引引御史以下行掃除如常儀訖出還齋所奉禮以下次還齋所質明謁者引獻官以下俱就門外位奉禮帥贊者先入就位贊引引御史以下入就位謁者引獻官贊引引執事者次入就位立定奉禮曰再拜獻官以下皆再拜謁者進獻官之左白有司謹具請行事退復位奉禮曰再拜在位者皆再拜太祝各取幣於篚以授獻官獻官受幣詣東岳座諸太祝各奠幣扵諸岳鎮海瀆之座謁者引獻官再拜訖降還本位扵獻官初受幣太官令帥進饌者奉饌陳於東門之外獻官奠幣再拜訖太官令引饌入諸太祝迎引於坐首各奠於神座前太官令以下還本位諸太祝各還樽所謁者引獻官詣罍洗盥手洗爵詣東岳酒樽所執樽者舉羃獻官酌醴齊謁者引獻官進於東岳神座前東向跪奠爵興少退東向立初獻官進奠祝史以爵酌酒助奠東鎮以下還樽所太祝持版進於神座之右西面跪讀祝文曰維某年歲次月朔日子嗣天子某謹遣具官姓名敢昭告於東方岳鎮海瀆乆闕時雨黎元惟懼惟神哀救蒼生敷降嘉液謹以制幣清酌脯醢明薦於東方岳鎮海瀆尚饗太祝興獻官再拜太祝進跪奠版於神座興還樽所獻官拜訖謁者引獻官以次獻諸方岳鎮海瀆如東方之儀諸方祝文並同訖謁者引獻官還本位初獻東岳贊引次引獻官詣罍洗盥手洗爵訖詣東方山川酒樽所執樽者舉羃獻官酌酒訖贊引引獻官進詣東方山川首座前跪奠爵興少退東向立初獻官奠酒齋郎酌酒助奠訖還樽所太祝持版進於神座之右南面跪讀祝文曰維某年歲次月朔日子嗣天子某謹遣具官姓名敢昭告於東方山川乆闕時雨黎元惟懼惟神哀救蒼生敷降嘉液謹以清酌脯醢明薦於東方山川尚饗祝興獻官再拜祝跪奠版於神座興還樽所獻官拜訖贊引引獻官以次獻諸方山川如東方之儀諸方祝文皆同訖贊引引獻官還本位諸祝各進跪徹豆興還尊所徹者少移於故處奉禮曰再拜獻官以下皆再拜謁者進獻官之左白請就望瘞位謁者引獻官就望瘞位西向立於在位者將拜諸太祝各進神座前跪取幣置於埳奉禮曰可瘞東西廂各二人置土半坎謁者進初獻官之左白禮畢遂引獻官出贊引引執事者以次出御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出祝版燔於齋所報祠用牲幣飲福受胙於東方岳鎮山川首坐之前其山川惟飲福不受胙埋幣血與正祭同餘與祈禮同其祝文曰維某年歲次月朔日子嗣天子某謹遣具位姓名敢昭告於東方岳鎮海瀆徃以乆闕時雨敢陳誠禱惟神昭祐降兹嘉液九土霑洽蒼生咸頼謹以制幣犧齊粢盛庶品明薦於東方岳鎮海瀆尚饗諸方祝文同山川祝文曰維某年歲次月朔日子嗣天子某謹遣具位姓名敢昭告於東方山川徃以久闕時雨式陳誠禱惟神昭祐降兹嘉液九土霑洽蒼生咸頼謹以犧齊粢盛庶品明薦於東方山川尚饗諸方祝文皆同大唐開元禮卷六十六
