body:
  text: 大唐開元禮巻七十二唐蕭嵩等撰吉禮諸縣釋奠於孔宣父縣學生束修諸縣釋奠於孔宣父前享三日縣令散齋于别寢二日致齋于㕔事一日亞獻以下與祭之官散齋二日各于正寢致齋一日于享所丞為亞獻主簿及尉通為終獻若縣令以下有故並以次差攝縣官不足以州官判佐以下及比縣官充散齋理事如舊惟不弔䘮問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟享事得行其餘悉斷其享官已齋而闕者通攝行事學官及諸學生皆清齋于學館一宿前享二日本司埽除内外又為瘞塪于院内堂之壬地方深取足容物南出陛本司設縣令以下次于門外隨地之宜前享一日晡後本司帥其屬守門本司設三獻位于東階東南每等異位俱西向設掌事者位于三獻東南西向北上設望瘞位于堂之東北當瘞埳西南設學官位于西階西南當掌事位學生位于學官之後俱東向北上設賛禮者位于三獻西南西向北上又設賛唱者位于瘞塪東北南向東上設三獻門外位于道東每等異位俱西向掌事位于終獻之後北上祭器之數每坐樽二籩八豆八簋二簠二俎三羊豕及腊各一俎掌事者以樽坫升設于堂上前楹間北向先聖之樽在西先師之樽在東俱西上皆加勺羃先聖爵一配坐爵四各置于坫設幣篚于樽所設洗置東榮南北以堂深罍水在洗東加勺羃篚在洗西南肆實爵三巾二于篚加羃執樽罍洗篚者各于樽罍洗篚之後享日未明烹牲于厨祝以豆二取毛血夙興掌饌者實祭器牲體羊豕皆載右胖前脚肩臂臑節一叚皆載之後脚三節節一叚去下一節載上肫胳二節又取正脊脡脊横脊短脅正脅代脅各二骨以並餘皆不設簋實黍稷簠實稻粱籩實石塩乾魚棗栗榛菱芡鹿脯豆實虀葅醯醢菁葅鹿醢芹葅兎醢笋葅魚醢若土無者各以其類充之本司帥掌事者設先聖神席于西楹間東向設先師神席于先聖神坐東北南向席皆以莞質明諸享官各服祭服學官儒服學生青衿服本司帥掌事者入實樽罍及幣每坐尊二一實𤣥酒為上一實醴齊次之禮神之幣用白各長一丈八尺祝版各置于坫賛唱者先入就位祝二人與執樽罍篚者入立于庭以西為上立定賛唱者賛冄拜祝以下皆冄拜執樽罍篚者各就位祝升自東階行埽除訖降自東陛以出還齋所縣令將至賛禮者引享官以下俱就門外位學官學生並入就門内位縣令至賛禮者引之次賛唱者先入就位祝升自東階各立于樽後縣令停于次少頃服祭服出次賛禮者引縣令入就位西向立賛禮退立于左賛唱者引享官以下次入就位凡引導者每曲一逡廵立定賛唱者曰冄拜縣令以下皆冄拜賛禮者少進縣令之左白請行事退復位祝俱跪取幣于篚興各立于樽所凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興本司帥執饌者奉饌陳于門外賛禮者引縣令升自東階進先聖神坐前西向立祝以幣北向授縣令受幣賛禮者引縣令西向跪奠于先聖神坐興少退西向冄拜訖賛禮者引縣令當先師神坐前北向立祝又以幣西向授縣令受幣賛禮者引縣令北向跪奠于先師神坐興少退北向冄拜賛禮者引縣令降復位本司引饌入升自東階祝迎引于階上各設于神坐前籩豆盖羃先徹乃升簋簠既奠却其盖于下籩右豆左簋簠居其間羊豕二俎横而重于右腊特于左設訖本司與執饌者降出祝還樽所賛禮者引縣令詣罍洗執罍者酌水執洗者跪取盤興承水縣令盥手執篚者跪取巾于篚興進縣令帨手訖執篚者受巾跪奠于篚遂取爵興以進縣令受爵執罍者酌水縣令洗爵執篚者跪取巾于篚興進縣令拭爵訖受巾跪奠于篚奉盤者跪奠盤興賛禮者引縣令升自東階詣先聖酒樽所執樽者舉羃縣令酌醴齊賛禮者引縣令詣先聖神坐前西向跪奠爵興少退西向立祝持版進于神坐之右北靣跪讀祝文曰維某年歳次月朔日子縣令具官姓名敢昭告于先聖孔宣父惟夫子固天攸縱誕降生知經緯禮樂闡揚文教餘烈遺風千載是仰俾兹末學依仁游藝謹以制幣犧齊粢盛庶品祗奉舊章式陳明薦以先師顔子配尚饗祝興縣令冄拜祝進跪奠版于神坐還樽所縣令拜訖賛禮者引縣令詣先師酒樽所取爵于坫執樽者舉羃縣令酌醴齊賛禮者引縣令詣先師神坐前北靣跪奠爵興少退北向立祝持版進于神坐之右西向跪讀祝文曰維某年歳次月朔日子縣令具官姓名敢昭告于先師顔子爰以仲春仲秋率遵故實敬修釋典于先聖孔宣父惟夫子庶幾具體徳冠四科服道聖門實臻壼奥謹以制幣犧齊粢盛庶品式陳明獻従祀配神尚饗祝興縣令冄拜祝進跪奠版于神坐興還樽所縣令拜訖賛禮者引縣令詣東序西向立祝各以爵酌福酒合置一爵一祝持爵進縣令之左北向立縣令冄拜受爵跪奠酒啐酒奠爵俛伏興祝各帥執饌者進俎跪减先聖神前胙肉各取前脚第二骨共置一俎上又以籩取稷黍飯共置一籩祝先以飯進縣令受以授執饌者又以俎進縣令受以授執饌者縣令跪取爵遂飲卒爵祝進受爵復于坫縣令興冄拜賛禮者引縣令降復位初縣令獻將畢賛禮者引亞獻詣罍洗盥手洗爵升獻飲福如縣令之儀惟不讀祝版不受胙訖降復位初亞獻將畢賛禮者引終獻詣罍洗盥手洗爵升獻飲福如亞獻之儀訖降復位祝各進神坐前跪徹豆還尊所徹者籩豆各一少移于故處賛唱者曰賜胙冄拜非飲福受胙者皆冄拜賛唱者又曰冄拜縣令以下皆冄拜賛禮者少進白請就望瘞位賛禮者引縣令就望瘞位西向立賛唱者轉就瘞塪東北位初在位者將拜祝各以篚進神坐前跪取幣降自西階詣瘞塪以幣置于塪訖賛唱者曰可瘞塪東西廂各二人寘土半塪瘞訖寘土者以篚出贊禮者進縣令之左北面白禮畢遂引縣令出贊禮者各引享官以次出初白禮畢賛唱者還本位祝與執樽罍洗篚者俱復掌事位立定賛唱者曰冄拜祝以下俱冄拜以出其祝版燔于齋所縣學生行束修禮束帛一篚一疋酒一壺二斗脯一案五脡其日平明學生青衿服至學門博士公服若儒服立于學堂東階上西靣賛禮者引學生立于門東西靣不自同于賓客陳束帛篚酒壺脯案于學生西南當門北向重行西上將命者出立于門西東靣曰敢請事學生少進曰某方受業于先生敢請見將命者入告博士曰某也不徳請子無辱將命者出告學生曰某不敢為儀敢固以請將命者入告博士曰請子就位某敢見將命者出告學生曰某不敢以視賓客請終賜見將命者入告博士曰某辭不得命敢不從將命者出告執篚者以篚東面授學生博士降俟于東階下西靣賛禮者引學生執酒脯者從之學生入門而左立于西階之南東靣執脯者立于學生西南東靣北上學生跪奠篚冄拜博士荅拜學生還辟遂跪取篚賛禮者引學生進博士前東靣授幣賛禮者取酒脯幣以東執酒脯者出賛禮者引學生立于階間近南北靣冄拜訖引出大唐開元禮卷七十二
