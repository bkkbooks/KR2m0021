body:
  text: 大唐開元禮卷五十七唐蕭嵩等撰吉禮巡狩告圜丘有司攝事將告有司卜日如别儀前二日守宫設告官以下次各依常所設陳饌幔於内壝東門之外道北南向右校掃除壇之内外郊社令積柴於燎壇前一日諸告官清齋於告所諸衛令其屬晡後一刻各以其方噐服守衛壝門奉禮設版位内外並如常儀郊社令帥其屬以樽坫罍洗篚羃入設皆如常儀執樽罍篚羃者各位於樽罍篚羃之後太官令預饌酒脯醢告日未明四刻太史令郊社令各服其服升設神位席如常未明三刻諸告官各服其服郊社令良醖令之屬入實樽罍及玉幣天帝太尊二著尊二一實以明水為上一實以醴齊次之山罍各二一實以𤣥酒為上一實清酒次之玉以蒼璧幣以蒼太祝以玉帛置於篚設於饌所未明二刻奉禮帥贊者先入就位贊引引御史太祝以下入行掃除如常儀訖各就位未明一刻謁者引告官以下俱就門外位立定又謁者引告官贊引引執事者次入就位立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳告官以下皆再拜謁者進告官之左白有司謹具請行事奉禮曰再拜在位者皆再拜初謁者白請行事太官令出帥饌者奉饌陳於東門之外初太官令出太祝跪取玉於篚興立於樽所謁者引告官升自午陛北向立太祝以玉東向授告官受玉進北面跪奠於天帝神座俛伏興少退北向再拜謁者降還本位太祝還樽所太官令引饌入自午陛太祝迎引於壇上設於神坐前籩豆盖羃徹之如式設訖太官令以下降自東陛復位諸太祝各還樽所謁者引告官詣罍洗盥手洗爵訖升自南陛詣天帝酒樽所執樽者舉冪告官酌醴齊謁者引告官詣天帝神坐前北向跪奠爵俛伏興少退北向立太祝持版進於神坐之右東向跪讀祝文祝文臨時撰訖興告官再拜太祝進跪奠版於神坐興還樽所告官拜訖謁者引告官進天帝神坐前北向立太祝以爵酌罍福酒合置一爵一太祝持爵進告官之右西向立告官再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫告官俛伏興再拜訖謁者引告官降復位太祝各進跪徹豆俛伏興還樽所奉禮曰再拜告官及再位者皆再拜謁者進告官之左白請就望燎位謁者引告官就望燎位南向立初衆官將拜太祝取玊幣及祝版置於柴上户内柴東西各四人以炬燎火半柴謁者進告官之左白禮畢謁者引告官贊引引執事者以次出御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出大唐開元禮卷五十七
