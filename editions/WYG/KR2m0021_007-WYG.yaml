body:
  text: 大唐開元禮卷七唐蕭嵩等撰吉禮正月祈榖于圜丘有司攝事齋戒陳設省牲器薦玉帛進熟齋戒前祀七日平明太尉誓百官于尚書省曰正月某日祈榖祀昊天上帝于圜丘各揚其職不供其事國有常刑凡預祀之官散齋四日致齋三日散齋皆于正寝致齋二日于本司一日于祀所其無本司者則二日于郊社署散齋理事如舊唯不吊喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯祀事得行其餘悉禁其祀官已齋而闕者通攝行事諸祀官致齋之日給酒食及明衣各習禮于齋所光禄卿監取明水火大官令取水于隂鑒取火于陽燧火以供爨水以實尊前祀二日太尉告髙祖神堯皇帝廟如常告之儀告以配神作主前祀一日諸衛令其屬未後一刻各以其方器服守衛壝門每門二人每隅一人與太樂工人俱清齋一宿陳設前祀三日守宫設祀官公卿以下次于東壝之外道南北向以西為上設陳饌幔于内壝東門之外道南北向前祀二日太樂令設宫懸之樂于壇南内壝之内東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于編懸之間各依辰位樹雷鼓于北懸之内道之左右植建鼓于四隅置柷敔于懸内柷在左敔在右設歌鐘歌磬于壇上近南北向磬簴在西鐘簴在東其匏竹者立于壇下重行北向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以北為上南方北方以西為上右校掃除壇之内外郊社令積柴于燎壇其壇于樂懸之南方外壝之内方一丈髙一丈二尺開上南出户方六尺前祀一日奉禮郎設祀官公卿位于内壝東門之内道北執事位於道南每等異位俱重行西面北上設御史位於壇下一位於東南西向一位於西南東向設奉禮位於樂懸東北賛者二人在南差退俱西向又設奉禮賛者位於燎壇東北西向皆北上設協律郎位於壇上南陛之西東向設太樂令位於北懸當壇之間北向設祀官公卿以下門外位皆於東壝之外道南每等異位重行北面西上設牲牓位於東壝之外當門西向蒼牲一居前又青牲一赤牲一黄牲一白牲一元牲一居後又蒼牲一在北少退設廩犧令位於牲西南祝史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北又設御史位於太常卿之西俱南向設酒尊之位上帝太尊二著尊二犧尊二壺尊二山罍二在壇上東南隅北向象尊二山罍二在壇下南陛之東北向俱西上設配帝著尊二犧尊二象樽二山罍二在壇上於上帝酒尊之東北向西上五方上帝各太尊二著尊二犧尊二山罍二在第一等神坐之左而右向尊皆加勺羃有坫以置爵設洗於壇東南北向罍水在洗東篚在洗西南肆篚實以巾爵執尊罍篚羃者各於尊罍篚羃之後設玉幣篚於壇上下尊坫之所祀日未明五刻太史令郊社令設昊天上帝神坐於壇上北方南向席以藳秸設髙祖神堯皇帝神坐於東方西向席以莞設青帝神坐於東陛之北赤帝於南陛之東黄帝於南陛之西白帝於西陛之南黒帝於北陛之西席皆以稾秸設神位各於坐首省牲器省牲之日午後十刻去壇二百歩所諸衛之屬禁斷行人晡後二刻郊社令帥府史二人及齋郎以尊坫罍洗篚羃入設於位升壇者自東陛晡後三刻諸太祝與廩犧令以牲就牓位謁者引太常卿贊引引御史入詣壇東陛升視滌凡導引者每曲一逡巡於視濯執尊者皆舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西向舉手曰充俱還本位諸太祝引廩犧令以次牽牲詣厨授太官謁者引光禄卿詣厨省鼎鑊申視溉濯贊引引御史詣厨省饌具太常卿以下每事訖各還齋所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲薦玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各帥其屬入實尊罍及玉幣凡六尊之次太尊為上實以汎齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝著尊為上實以汎齊犧尊次之實以醴齊象尊次之實以盎齊山罍為下實以清酒五方上帝太尊為上實以汎齊著尊次之實以醴齊犧尊次之實以盎齊山罍為下實以清酒齊皆加明水酒皆加𤣥酒各實于上尊禮神之玉昊天上帝以四圭有邸青帝以青珪赤帝以赤璋黄帝以黄琮白帝以騶虞黒帝以元璜天帝配帝之幣各以蒼五方上帝之幣各效其方色凡幣一丈有八尺太祝以玉幣置於篚太官令帥進饌者實諸籩豆簋簠皆設於饌幔内未明二刻奉禮帥賛者先入就位贊引引御史博士諸太祝史令史祝及與執尊罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳御史以下皆再拜訖執尊罍篚羃者各就位賛引引御史諸太祝詣壇東陛升行掃除於下訖引降就位未明一刻謁者賛引各引祀官俱就門外位太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西其升壇者皆脱履於下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行掃除于上降行樂懸于下訖引復位初司空行樂懸謁者賛引各引祀官次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位協律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興也鼓柷奏豫和之樂乃以圜鐘為宫黄鐘為角太簇爲徴姑洗爲羽作文舞之舞樂舞六成圜鐘三奏黄鐘太簇姑洗各一奏偃麾戛敔樂止凡樂皆協律郎舉麾工鼔柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官在位者皆再拜太祝取玉帛於篚立於尊所謁者引太尉詣南陛升壇北向立太祝以玉東向授太尉太尉受玉登歌作肅和之樂以大吕之均謁者引太尉進北面跪奠於天帝神坐興謁者引太尉少退北面再拜謁者引太尉西面立太祝以幣授太尉太尉奉幣東向跪奠于配帝神坐前俛伏興再拜訖登歌止初太尉將奠幣謁者五人分引五方上帝之太祝各奉玉幣奠于其神坐前訖還復位謁者引太尉降自南陛還本位初衆官拜訖祝史奉毛血之豆立于門外于登歌止祝史奉毛血入各由其陛升諸太祝迎取于壇上俱進奠于神坐前諸太祝與祝史退立於罇所進熟太尉既升奠玉幣太官令帥進饌者奉饌陳于内壝門外謁者引司徒出詣饌所司徒奉天帝之爼諸太祝既奠毛血太祝官令引饌入俎初入門奏雍和之樂自後酌獻皆奏雍和之樂以黄鐘之均自後壇下之樂皆奏黄鐘饌各至陛樂止祝史俱進跪徹毛血之豆降自東陛以出上帝之饌升自午陛配帝之饌升自夘陛五方上帝之饌各由其陛諸太祝迎引于壇上各設于神坐前籩豆盖羃先徹乃升簋簠既奠却其葢于下設訖謁者引司徒太官令帥進饌者俱降自東陛以出司徒復位諸太祝各還尊所謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉升自南陛詣天帝酒尊所執尊者舉羃太尉酌汎齊訖樂作謁者引太尉進天帝神坐前北面跪奠爵興謁者引太尉少退北面立樂止太祝持版進于神坐之右東面跪讀祝文曰維某年歳月朔日子嗣天子臣某謹遣太尉臣名敢昭告于昊天上帝惟神化育羣生財成庻品雲雨作施普博無私爰因啟蟄式祈農事敬以玉帛犧齊粢盛庻品備兹禋祀祗薦潔誠髙祖神堯皇帝配神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進跪奠版于神座興還尊所太尉再拜訖樂止謁者引太尉詣配帝酒尊所取爵于坫執尊者舉羃太尉酌汎齊訖樂作謁者引太尉進髙祖神堯皇帝神坐前東向跪奠興謁者引太尉少退東向立樂止謁者五人各引五方上帝太祝就罍洗盥手取匏爵于坫酌汎齊各進奠于其神坐前訖還尊所配帝太祝持版進于神坐之左北面跪讀祝文曰維某年歳次月朔日子孝曽孫開元神武皇帝臣某謹遣太尉封臣名敢昭告于髙祖神堯皇帝時惟孟春敬祈嘉榖用致禋祀于昊天上帝惟髙祖叡哲徇齊欽明昭格登配之禮肅奉舊章謹以制幣犧齊粢盛庶品吉蠲明薦侑神作主尚饗興太尉再拜初讀祝文訖樂作太祝進跪奠版于神坐興還尊所太尉拜訖樂止謁者引太尉進天帝神坐前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受受跪祭酒啐酒奠爵俛伏興太祝各帥齋郎進俎太祝減神前胙肉皆取前脚第二骨加于俎以胙肉共置一俎上太祝持俎西向授太尉太尉受以授齋郎太尉跪取爵遂卒爵太祝進受虚爵復于坫太尉俛伏興再拜謁者引太尉降復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止初太尉将復位謁者引太常卿詣罍洗盥手洗匏爵訖謁者引太常卿自東陛升壇詣天帝著尊所執尊者舉羃太常卿酌醴齊武舞作謁者引太常卿進天帝神坐前北面跪奠爵興謁者引太常卿少退北面再拜訖謁者引太常卿詣配帝犧尊所取爵于坫執爵者舉羃太常卿酌醴齊謁者引太常卿進髙祖神堯皇帝神坐前東向跪奠興謁者引太常卿少退東向再拜訖謁者五人引五方上帝之太祝各詣酒尊所酌醴齊訖俱進奠于神坐訖還尊所謁者引太常卿進天帝神座前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太常卿之右西向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受虚爵復于坫太常卿興再拜謁者引太常卿降復位初太常卿獻将畢謁者引光禄卿詣罍洗盥手洗匏爵升酌盎齊獻正坐配坐及五方上帝終獻如亞獻之儀訖謁者引光禄卿降復位武舞六成樂止諸太祝各進跪徹豆興還尊所徹者籩豆各一少移于故處奉禮曰賜胙賛者唱曰衆官再拜衆官在位者皆再拜已飲福受胙者不拜豫和之樂作奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之左白請就望燎位謁者引太尉就望燎位南向立于衆官將拜諸祝史各執篚進神坐取玉幣祝版齋郎以俎載牲體黍稷飯爵酒各由其陛降壇南行經懸内當柴壇南東行自南陛登柴壇以玉幣祝版饌物置于柴上户内奉禮曰可燎東西面各六人以炬燎火半柴謁者進太尉之左白禮畢謁者引太尉出又謁者賛引各引祀官以次出賛引引御史太祝以下復就執事位立定奉禮曰再拜御史以下俱再拜賛引引出工人二舞以次出大唐開元禮卷七
