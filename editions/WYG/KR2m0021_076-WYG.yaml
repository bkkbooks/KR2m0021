body:
  text: 大唐開元禮卷七十六唐蕭嵩等撰吉禮三品以上祫享其廟三品以下禘享其廟三品以上祫享其廟前享五日筮于廟門之外齋及設位牲牓祭器省牲皆如時享之儀掌事者以樽坫入設于廟堂之上皆于神坐之左昭坐之樽在前楹北向始祖及穆坐之尊在户外南向俱以近神為上皆加勺羃若始祖在曾祖以下則設尊依親廟之式其坐首爵一餘皆爵四各置于坫設祭器于東序西向每坐簋在前簠次之登次之鉶次之籩次之豆次之爼在後每坐異之皆以南為上屈陳而下設洗於東階東南東西當東霤南北以堂深罍水在洗東加勺羃篚在洗西南肆實爵三巾二于篚加羃凡器皆濯而陳之執尊罍篚羃者各位于尊罍篚羃之後享日未明烹牲于厨夙興掌饌者實祭器牲體皆載右胖前三節節一叚肩臂臑皆載之後三節節一段下去一節載上肫胳二節又取正脊脡脊横脊短脅正脅代脅各二骨以並餘皆不設簋實稷黍簠實類稻粱籩實石鹽乾脯棗栗之屬豆實醢醬虀葅之掌廟者設祫坐于廟堂之上自西序以東始祖坐于西序東向昭坐于始祖東北南向穆坐于東南北向俱西上若始封者仍在曽祖之下則空東靣之坐依昭穆南北設之毎坐皆有屏几禮席設趺匵如式主人以下各服其服掌事者入實尊罍每室四尊一實醴齊為上一實盎齊次之𤣥酒各實于上尊𤣥酒者重古陳而不酌祝版各置于坫諸祝與奄者入立于庭北靣西上掌事者持􅆎輿従入立于東階下西靣北上立定祝與奄者皆再拜訖帥腰輿升自東階詣始祖廟入開塪室出神主置于輿出詣坐以主置于座以次出神主如上儀夫人之主奄人奉出俱並而處右質明賛禮者引亞獻以下及子孫俱就門外位賛唱者先入就位諸祝與執尊罍者入就于庭北靣西上立定賛唱者曰冄拜祝以下皆冄拜各就位掌事者帥執饌者奉饌陳于門外賛禮者引主人入就位又賛者引亞獻以下及子孫以次入就位立定賛唱者曰冄拜主人以下皆冄拜賛禮者進主人之左白請行事退復位掌饌者引饌入升自東階祝迎引于階上各設于神坐前籩居右豆居左鈃登簋簠居其間羊豕二俎横陳重于右腊俎于左執爐炭蕭稷黍膟膋者従其俎特并設于神坐之左少後其蕭稷各置于爐炭下于施設訖掌饌以下降出諸祝各取蕭稷擩于脂燔于爐炭還樽所賛禮者引主人詣罍洗執罍者酌水執洗者跪取盤興承水主人盥手執篚者跪取巾于篚興進主人拭手執篚者受巾跪奠于篚遂取爵興以進主人受爵執罍者酌水主人洗爵執篚者又跪取巾于篚興進主人拭爵訖受巾跪奠于篚奉盤者跪奠盤興凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興賛禮者引主人自東階升堂詣始祖酒樽所執樽者舉羃主人酌醴齊賛禮者引主人進詣始祖神坐前西向跪奠爵興少退西向立祝持版進于神坐之右北靣跪讀祝文曰維某年歳次月朔日子孝曽孫封某官敢昭告于祖考某諡封歳序推移伏増逺念謹以柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊敬薦祫事于始祖考某謚封始祖妣夫人某氏配尚饗祖考及子孫依尊卑稱號其祝文同訖興主人冄拜祝進跪奠版于神坐興還尊所賛禮者引主人依昭穆酌獻如上儀唯不盥洗訖賛禮者引主人詣東序西向立諸祝各以爵酌福酒合置一爵一祝持爵進主人之左北向立主人冄拜受爵祭酒啐酒奠爵興諸祝各帥執饌者以爼進减神前胙肉各置一爼上又以籩遍取稷黍飯共置一籩祝先以飯籩進主人受以授左右祝又以俎以次進主人每受以授左右訖主人跪取爵遂飲卒爵祝進受爵復于坫主人興冄拜賛禮者引主人降自東階還本位西向立主人獻將畢賛禮者引亞獻詣罍洗盥手洗爵升自東階詣始祖酒尊所執尊者舉羃亞獻酌盎齊賛禮者引亞獻進詣始祖神坐前西靣跪奠爵少退西向冄拜賛禮者引亞獻以次酌獻如上儀訖賛禮者引亞獻詣東序西向立諸祝各以爵酌福酒合置一爵一祝持爵進亞獻之左北向立亞獻冄拜受爵跪祭酒遂引卒爵祝進受爵復于坫亞獻興冄拜賛禮者引亞獻降復位又賛禮引終獻詣罍洗盥洗升獻如亞獻之儀訖降復位諸祝皆進神坐前跪徹豆興還樽所徹者籩豆各一少移于故處賛唱者曰冄拜非飲福受胙者皆冄拜賛唱者又曰冄拜主人以下皆冄拜賛禮者進主人之左白禮畢遂引主人出賛禮者引亞獻以下及子孫以次出諸祝與執樽罍篚者俱復執事位立定賛唱者曰冄拜諸祝以下皆冄拜執尊罍篚者出諸祝與奄者匵神主置于輿納于塪室如常儀三品以下禘享其廟前享五日筮于廟門之外齋及設位牲牓祭器皆如時享之儀掌事者以樽坫入設于廟堂皆于神坐之左昭坐之尊在前楹間北向始祖及穆坐之尊在戸外南向俱以近神為上未毁廟之尊坫于前楹下各于室内之東北向西上皆加勺羃其首坐爵一餘坐皆爵四各置于坫設祭器于東序西向每坐簋在前簠次之登次之鉶次之籩次之豆次之俎在後每坐異之皆以南為上屈陳而下設洗于東階東南東西當東霤南北以堂深罍水在洗東加勺羃篚在洗西南肆實爵三巾二篚加羃凡器皆濯面陳之執尊罍篚羃者各位于樽罍篚羃之後享日未明烹牲于厨夙興掌饌者實祭器牲體皆載右胖前脚三節節一叚肩臂臑皆載之後脚三節節一叚去下一節載上肫胳二節又取正脊脡脊横脊短脅正脅代脅各二骨以並餘皆不設簋實黍稷簠實稻粱籩實塩脯棗栗之屬豆實醢醤韲菹之類掌廟者設神坐于廟堂之上自西序以東始祖坐于西序東向昭坐于始祖東北南向穆坐于始祖東南北向俱西上其未毁廟之主各于其室如時享若始封者仍在即各于其室如時享主人以下各服其服掌事者入實尊罍毎室四尊一實醴齊為上一實盎齊次之𤣥酒各實于上尊設𤣥酒者重古設而不酌者也祝版各置于坫諸祝與奄者入立于庭北靣西上掌事者持􅆎輿従入立于東階下西靣立定祝與奄者皆冄拜訖帥􅆎輿升自東階詣始祖廟入開塪室出神主置于輿出詣坐前以主置于坐以次出毁廟神主如常儀未毁廟主出置于室内之坐如時享夫人之主奄人奉出俱並而處右訖出還齋所質明賛禮者引亞獻以下及子孫俱就門外位賛唱者先入就位諸祝與執樽罍者入立于庭北靣西上立定賛唱者曰冄拜祝以下皆冄拜各就位掌饌者奉饌陳于門外賛禮者引主人就位又賛禮者引亞獻以下及子孫以次入就位立定賛唱者曰冄拜主人以下皆冄拜賛禮者進主人之左白請行事退復位掌饌者引饌入升自東階諸祝迎引于階上各設于神坐前籩居左豆居右簋簠登鉶居其間羊豕二爼横陳重于右腊俎特于左執爐炭蕭稷黍膟膋者従其爼升設于神坐之左少後其蕭稷各置于爐炭下施設訖掌饌以下降出諸祝各取蕭稷擩于脂燔于爐炭還樽所賛禮者引主人詣罍洗執罍者酌水執洗者跪取盤興承水主人盥手執篚者跪取巾于篚興進主人拭手執篚者受巾跪奠于篚遂取爵興以進主人受爵執罍者酌水主人洗爵執篚者又跪取巾于篚興進主人拭爵訖受巾跪奠于篚奉盤者跪奠盤興凡取物者跪俛伏而取以興奠物則奠訖俛伏而後興賛禮者引主人自東階升堂詣始祖酒尊所執尊者舉羃主人酌醴齊賛禮者引主人詣始祖神坐前西向跪奠爵興少退西向立祝持版進于神坐之右北靣跪讀祝文曰維某年歳次月朔日子孝曽孫某官封敢昭告于始祖考某謚祖妣夫人某氏歳序推移伏増逺感謹以柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊祗薦禘享于始祖考某謚尚享祖考及子孫各依尊卑稱號祝文同訖興主人冄拜祝進跪奠版于神坐興還樽所賛禮者引主人依昭穆入室酌獻如上儀惟不盥洗賛禮者引主人詣東序西向立諸祝各以爵酌福酒合置一爵一祝持爵進主人之左北向立主人冄拜受爵跪祭酒啐酒奠爵興諸祝各帥執饌者以俎進减神前胙肉各共置一俎上又以籩遍取稷黍飯共置一籩祝先以飯籩進主人受以授左右祝又以俎以次進主人每受以授左右訖主人跪取爵遂飲卒爵祝進受爵復于坫主人興冄拜賛禮者引主人降自東階還本位西向立初主人獻將畢賛禮者引亞獻詣罍洗爵升自東階詣始祖酒尊所執尊者舉羃亞獻酌盎齊賛禮者引亞獻進詣始祖神坐前西向跪奠爵興少退西向冄拜賛禮者引亞獻以次酌獻如上儀訖賛禮者引亞獻詣東序西向立諸祝各以爵酌福酒合置一爵一祝持爵進亞獻之左北向立亞獻冄拜受爵跪祭酒遂飲卒爵祝進受爵復于坫亞獻興冄拜賛禮者引亞獻降復位又賛禮者引終獻詣罍洗盥洗升獻如亞獻之儀訖降復位諸祝皆進神坐前跪徹豆興還尊所徹者籩豆各一少移于故處賛唱者曰冄拜非飲福受胙者皆冄拜賛唱者又曰冄拜主人以下皆冄拜賛禮者進主人之左白禮畢遂引主人出賛禮者引亞獻以下及子孫以次出諸祝與執樽罍篚者俱復執事位立定賛唱者曰冄拜諸祝以下皆冄拜執樽罍篚者出諸祝與奄者匵神主置于輿納于塪室如常儀大唐開元禮卷七十六
