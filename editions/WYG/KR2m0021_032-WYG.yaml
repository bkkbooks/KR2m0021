body:
  text: 大唐開元禮卷三十二唐蕭嵩等撰吉禮孟冬祭神州於北郊有司攝事齋戒陳設省牲器奠玉幣進熟齋戒將祭有司卜日如别儀前祭七日平明太尉誓百官於尚書省曰某月某日祭神州地祗於北郊各揚其職不供其事國有常刑凡預祭之官散齋四日致齋三日散齋皆于正寢致齋二日于本司一日于祭所其無本司者皆于祭所散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯祭事得行其餘悉㫁其祭官已齋而闕者通攝行事諸祀官致齋之日給酒食明衣各習禮於齋所光禄卿監取明水火太官令取水於隂鍳取火于陽燧火以供爨水以實尊前祭二日太尉告太宗文武聖皇帝廟如常告之儀告以配神作主前祭一日諸衛令其屬未後一刻各以其方器服守衛壝門毎門二人毎隅一人與太樂工人俱清齋一宿陳設前祭三日衛尉設祭官公卿以下次於東壝之外道南北向前祭二日太樂令設宫懸之樂於壇南内壝之内設歌鐘歌磬右校掃除壇之内外又為瘞埳於壇之壬地内壝之外方深取足容物南出陛前祭一日奉禮設望瘞位及祭官公卿位於内壝之外如方丘之儀設牲牓於東壝之外當門西向𤣥牲一居前配帝𤣥牲一少退南上設廩犧令位於牲西南祝史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後設太常卿省牲位於牲前近北南向設神州地祗酒樽於壇之上下太樽二著樽二犧樽二山罍二在壇上於東南隅北向象樽二山罍二在壇下皆於南陛之東北向西上設配帝著樽二犧樽二象樽二山罍二在壇上於神州酒樽之東北向西上設洗於壇南陛東在洗東篚在洗西南肆篚實以巾爵執樽罍篚羃者各於樽罍篚羃之後各設玉幣之篚於壇之上下樽坫之所祭日未明五刻太史令郊社令升設神州地祗神坐於壇上北方南向席以槀秸設太宗文武聖皇帝神坐於東方西向席以莞設神位各於坐首省牲器省牲之日午後十刻去壇二百步所諸衛之屬禁㫁行人晡後一刻諸行事之官各服其服郊社令帥府史二人及齋郎以樽坫罍洗篚羃入設於位晡後二刻太祝廩犧令以牲就牓位賛引引御史謁者引太常卿詣壇東陛升視滌濯於上于視濯執尊者舉羃告潔訖引太常卿降復位謁者進太尉之左白請就門外位謁者賛引各引祭官以下就門外位謁者引太常卿就省牲位南向立廩犧令少前白請省牲退復位太常卿省牲廩犧令前北面舉手曰腯還本位諸太祝各循牲一匝西面舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官謁者引光禄卿詣厨省鼎鑊申視濯溉謁者各引祭官就厨省饌具訖俱還齋所祭日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲奠玉帛祭日未明二刻諸祭官各服其服郊社令良醖令各帥其屬入實樽罍玉幣凡六尊之次太尊為上實以汎齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝著尊為上實以汎齊犧尊次之實以醴齊象尊次之實以盎齊山罍為下實以清酒𤣥酒各實於五齊之上尊禮神之玉以兩珪有邸幣以𤣥太官令帥進饌者實諸籩豆簠簋入各設於内壝之外饌幔内未明二刻奉禮郎帥賛者先入就位賛引引御史博士諸太祝及令史祝史與執樽罍篚羃者入自東壝門當壇南重行北面西上立定奉禮曰再拜御史以下皆再拜訖執樽罍篚冪者各就位賛引引御史及諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖各就位未明一刻太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西謁者引司空入就位立定奉禮曰再拜司空再拜謁者引司空詣卯陛升行掃除於上降行樂懸於下訖引復位謁者賛引各引祀官次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進大尉之左白有司謹具請行事退復位恊律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後立鼓柷奏順和之樂乃以函鐘之均作文舞之舞樂舞八成偃麾戛敔樂止凡樂皆恊律郎舉麾工鼓柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官皆再拜上下諸祝俱取玉幣各立於樽所謁者引太尉詣南陛升壇北向立太祝加玉於幣東向授太尉太尉受玉幣登歌作肅和之樂以應鐘之均謁者引太尉進北向跪奠於神州地祗神坐俛伏興謁者引太尉少退北向再拜訖謁者引太尉立於西方東向又太祝奉幣北向授太尉太尉受幣謁者引太尉進東向跪奠於太宗文武聖皇帝神坐俛伏興謁者引太尉少退東向再拜訖登歌止謁者引太尉降自南陛還本位初衆官拜訖祝史各奉毛血之豆立於門外於登歌止祝史奉毛血入正坐升自南陛配坐升自東陛諸太祝迎取於壇上各進奠於神坐前太祝與祝史退立於樽所進熟太尉既升奠玉幣太官令出帥進饌者奉饌各陳於内壝門外謁者引司徒出詣饌所司徒奉神州地祗之俎諸太祝既奠毛血太官令各引饌入俎初入門雍和之樂作以太蔟之均饌至陛樂止祝史俱進徹毛血之豆降自東陛以出神州之饌升自南陛配帝之饌升自東陛諸太祝迎引於壇上各設於神坐前籩豆盖羃先徹乃升簠簋既奠却其盖於下設訖謁者引司徒太官令帥進饌者降自東陛以出司徒復位諸太祝各還樽所謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉升自南陛詣神州酒樽所執樽者舉羃太尉酌汎齊訖樂作謁者引太尉進神州地祗神坐前北向立跪奠爵興謁者引太尉少退北向立樂止太祝持版進於神坐之右東向跪讀祝文曰維某年嵗次月朔日子嗣天子臣某謹遣太尉封臣名敢昭告於神州地祗惟祗包函區夏載植羣生溥被域巾頼兹厚徳式遵彛典揀此元辰敬以玉帛犧齊粢盛庶品明獻厥誠備兹禋瘞皇曾祖考太宗文武聖皇帝配神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版於神坐還樽所太尉再拜訖樂止謁者引太尉詣配帝酒樽所取爵於坫執樽者舉羃太尉酌汎齊訖樂作謁者引太尉進太宗文武聖皇帝神坐前東向跪奠爵興謁者引太尉少退東向立樂止太祝持版進於神坐之左北向跪讀祝文曰維某年嵗次月朔日子孝曾孫開元神武皇帝臣某謹遣太尉臣名敢昭告於皇曾祖考太宗文武聖皇帝令月嘉時祇依恒禮用致瘞祭於神州地祗惟皇曽祖叶彼乾坤格於上下昭配之義欽率典常謹以制幣犧齊粢盛庶品䖍恭明薦作主侑神尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版於神坐還樽所太尉再拜訖樂止謁者引太尉進神州地祗神坐前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒啐酒奠爵興太祝各帥齋郎進爼太祝減神前胙肉加於俎以胙肉共置一俎太祝持俎西向授太尉受以授齋郎太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位文舞出鼔柷作舒和之樂出訖戛敔樂止武舞入鼔柷作舒和之樂立定戛敔樂止初太尉獻將畢謁者引太常卿詣罍洗盥手洗匏樽訖謁者引太常卿自東陛升壇詣神州地祗著樽所執尊者舉冪太常卿酌醴齊訖武舞作謁者引太常卿進神州地祗神座前北向跪奠爵興謁者引太常卿少退北向再拜訖謁者引太常卿詣配帝犧樽所取爵於坫執爵者舉羃太常卿酌醴齊謁者引太常卿詣太宗文武聖皇帝神座前東向跪奠爵興謁者引太常卿少退東向再拜訖謁者引太常卿進神州地祇神座前北向立太祝各以爵酌纍福酒合置一爵一太祝持爵進太常卿之右西向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太常卿再拜謁者引太常卿降復位初太常卿獻將畢謁者引光禄卿詣纍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光禄卿降復位武舞六成樂止舞獻俱畢諸太祝各進徹豆還尊所徹者籩豆各一少移於故處奉禮曰賜胙賛者喝衆官再拜衆官在位者皆再拜已飲福受胙者不拜順和之樂作奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之右白請就望瘞位謁者引太尉就望瘞位北向立於羣官將上下諸祝各執篚進神座前取玉幣齋郎以俎載牲體黍稷餕爵酒各自其陛降壇北行當瘞埳西行以玉帛饌物置於埳訖奉禮曰可瘞埳東西廂各六人寘土半埳謁者進太尉之左白禮畢謁者引太尉出又賛引各引祭官以次出賛引引御史以下俱復執事位奉禮曰再拜御史以下皆再拜賛引引出工人二舞以次出其祝版燔於齋所大唐開元禮卷三十二
