body:
  text: 大唐開元禮卷一百四十九唐蕭嵩等撰凶禮六品以下喪之四改𦵏卜宅啟請開墳舉柩奠升柩車斂奠設靈筵進引告遷哭柩車位設遣奠轜車發宿止到墓虞祭改葬卜宅將改𦵏者吉服筮宅兆其餘如𦵏筮宅兆之儀啟請預於􅎬所隨地之宜張白布帷羃南向開户其日内外諸親應集者皆至墓所各就便次主人衆主人妻妾女子子俱緦服餘周親以下皆素服丈夫於墓東西向婦人於墓西東向北上婦人障以行帷俱立哭盡哀卑者再拜開墳祝立於羨道南北向内外皆哭止祝三聲噫嘻啟以改葬之故其意叙葬之故不可預定内外又哭盡哀權就别所舉柩掌事者開墳訖内外又就位哭如初掌事者設席於幕下舉柩出置於席上内外俱從柩哭於幕所主人以下柩東西面主婦以下柩西東面俱南上丈夫周親以下於主人東北南面西上婦人周親以下於主婦西北南面東上外姻丈夫於主人東南北面西上婦人於主婦西南北面東上尊者坐奠祝以功布拭棺改加新楮設洗於幕西南隅罍水在洗西加勺羃篚在洗東南肆實巾二爵一於篚加羃設席於柩東設啟奠於席上設醴酒之樽於饌南主人詣􅧂洗盥手洗爵進酌酒於席前興少退西面再拜内外卑者俱再拜少頃徹奠升柩車既奠進柩車於帷門外南向掌事者升柩於柩車遂詣施設所内外俱哭從掌事者預設牀於羃下有枕席周設帷柩車至帷門外丈夫於柩東婦人於柩西俱立哭掌事者舉柩入設於牀東若於墓所即斂初奠訖不進柩車設牀於柩東而加枕席遂舉尸以斂之舉尸出設置於牀南首柩初入定内外就位哭如墓所之儀斂陳斂衣於羃之東帷内明衣裳及上服各一稱西領南上弁若冠各具導簮纓在北内喪則花釵衾一衾以黄為表素為裏具饌於幕東兩甒醴酒柩初至幕下舉尸於牀主人衆主人稍退仍西向妻妾女子子稍退仍東向遂斂丈夫加弁若冠婦人以花釵又覆以衾主人衆主人妻妾女子子憑哭斂將訖掌事者以棺入設於西廂藉以席初棺入内外皆止哭置棺定乃哭舉者四人入舉牀男女從奉之舉尸斂於棺乃加葢覆以衾設帷於棺東内外就位哭如初奠既斂祝執几席入設於柩東右几加以巾掌事者設罍洗於幕西南隅如初祝以饌升設於席前施設訖執饌者降出相者引主人盥手酌酒進奠於席前興少退西面再拜内外卑者皆再拜訖主人以下各退就位俱坐哭設靈筵既斂設靈筵於吉帷内羃下西廂東向施床帷屏几服飾以時上膳羞及湯沐皆如平常進引前一日之夕掌事者進柩車於凶帷之外當門南向其下帷明器及苞牲等俱陳於柩車前少西東向其日發引前量時刻陳靈車儀仗如常在陳車篇少頃侍靈車者俱詣靈所腰輿威儀入陳如常進靈車於帷外南向少頃掌事者入徹饌以出内外皆興立哭於位掌事者徹帷持翣者以翣障柩執鐸者各入夾於柩前東西相向執銘旌者立於柩前近南北面諸執披紼鐸旌者皆布深衣介幘告遷祝帥腰輿入詣靈座前西面告曰以今吉辰奉即宅兆少頃輿出詣靈車後少頃退若内喪女祝迎將舉柩執鐸者皆振鐸毎振鐸先揺之揺訖三振之其持翣者恒以翣障柩及柩動執鐸者夾左右毎曲及進止皆振鐸内外俱從柩出到柩車後執紼者如常設帷幛於柩之後掌事者升柩哭柩車位丈夫俱立哭於柩車東重行西面婦人哭於柩車西重行東面俱南上外姻丈夫哭於柩車東南重行北面以西為上婦人哭於柩車西南重行北面以東為上立定設遣奠設遣奠之饌於柩車東置設訖相者引主人酌酒進奠於席前興少退西面哭再拜内外皆哭卑者再拜若食頃徹之以蒲葦苞牲體下節二苞載於輿以之墓轜車發既徹奠吉凶威儀依式進引主人衆主人以下皆以次步從哭於柩車後妻妾女子子以下皆步從哭於丈夫之後障以行帷柩車去停所三百步親賓有還者弔哭如别儀辭訖進引尊者乘車馬從柩者更哭不絶聲宿止掌事者預於宿所張吉凶帷幕吉帷在左凶帷在右將至宿所尊者俱下車馬步哭靈車到帷門外迴南向祝帥腰輿詣車之後少頃輿入詣坐前少頃輿出進常食於靈座若食頃徹之柩至於凶帷内外哭於柩車所其位如初掌饌者進酒脯之奠於靈柩東席上既設奠内外各還次更哭不絶聲及墓内外俱就位哭進夕奠如初訖内外皆還次迭哭終夜及明内外又就位哭進朝奠於柩東進常食於靈座若食頃徹之迎靈發引尊者乗車馬哭従如上儀到墓到墓尊者俱下車馬靈車到帷門外迴南向祝帥腰輿詣車後少頃輿入詣靈座前少頃輿退設酒脯之奠柩車至壙前迴南向内外哭位如遣奠之儀掌事者張帷布席於柩車後下柩於席上主人以下妻妾女子子各前撫柩哭盡哀退復位周親以下又前撫哭盡哀退復位俱再拜辭掌事者下柩於壙柩既入壙親賓先還者弔哭如别儀掌事者奉𤣥纁束帛授主人主人受以授祝主人稽顙再拜祝奉以入奠於柩東持翣者入倚翣於壙内兩廂執事者以下帳明器苞牲酒米等物入置於壙内皆藉以版施銘旌誌石於壙户内置設訖掌事者掩壙户加關鑰覆土既覆土内外俱就靈所哭墓左祭后土如始𦵏之儀虞祭初下柩於墓掌事者具虞祭之饌設洗罍篚於靈羃西南如常内外既就靈所哭掌饌者進虞祭之饌於靈座相者引主人盥洗酌酒進奠於席前興少退西面立内外皆止哭祝持版進立於靈座之右北面跪讀祝文曰維年月朔日子孝子某敢昭告於考某官封諡妣云某氏改遷幽宅禮極終虞攀號永逺無所逮及謹以潔牲剛鬛嘉薦普淖明齊溲酒薦虞事於考某官封諡尚饗主人哭再拜内外皆哭卑者再拜盡哀相者引主人以下出就别所釋衰服著素服而還掌饌者徹饌掌事者徹靈座大唐開元禮卷一百四十九
