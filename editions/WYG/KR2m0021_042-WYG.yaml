body:
  text: 大唐開元禮卷四十二唐蕭嵩等撰吉禮禘享於太廟有司攝事齋戒陳設省牲器晨祼饋食祭七祀齋戒宗廟五年一禘以孟夏將享有司􅁲日如别儀享前七日平明太尉誓百官於尚書省曰某月某日禘於太廟各揚其職不供其事國有常刑凡預享之官散齋四日致齋三日散齋皆於正寢致齋二日於本司一日於享所其無本司者於享所散齋理事如故唯不弔䘮問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯享事得行其餘悉斷其享官已齋而闕者通攝行事致齋之日官給酒食及明衣各習禮於齋所光禄卿監取明水火太官令取水於陰鑒取火於陽燧火以供㸑水以實樽前享一日諸衛令其屬未後一刻各以其方器服守衛廟門毎門二人每隅一人與太樂工人俱清齋一宿陳設前享三日守宫設享官公卿以下次於齋坊之内前享二日太樂令設宫懸之樂於廟庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹路鼔於北懸之内道之左右植建鼓於四隅置柷敔於懸内柷在左敔在右設歌鐘歌磬於廟堂之上前楹間北向磬簴在西鐘簴在東其匏竹者立於階間重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上右校清掃内外前享一日奉禮設享官公卿位於東門之内道北執事位於道南每等異位俱重行西面以北為上設御史位於廟堂之下一在東南西向一在西南東向令史各陪其後設奉禮位於樂懸東北贊者二人在南差退俱西面設恊律郎位於廟堂之上前楹近西東向設太樂令位於北懸之間北向設門外位享官公卿以下皆於東門之外道南毎等異位重行北面西上設牲牓於東門之外當門西向以南為上設廪犧令位於牲西南史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北又設御史位於太常卿之西俱南向設樽彛之位於廟堂之上下每座鷄彛一烏彛一犧樽二著樽二壺樽二在堂上皆於神座之左各有坫馬以置瓚爵其太樽二山罍四皆在堂下階間北面西上設簋簠鈃登籩豆之位於廟堂之上俱東側階之北每座四簋居前四簠次之次以六登次以六鈃籩豆為後每座異之皆以南為上屈陳而下設洗於東南北向罍水在洗東篚在洗西南肆篚實以珪瓚巾爵執樽罍篚羃者各位在樽罍篚羃之後享日未明五刻太廟令服其服布昭穆之座於户外自西序以東獻祖太祖髙祖髙宗座皆北廂南向懿祖代祖太宗中宗睿宗座皆南廂北向每座皆黼扆莞席紛純藻席畫純次席黼純左右几省牲器省牲之日午後十刻廟所諸衛之屬禁斷行人晡後二刻太廟令丞帥府史三人及齋郎以樽坫罍洗篚羃及籩豆簋簠鈃登入設於位加以巾盖諸器物皆濯而陳之其升者自東階晡後三刻諸太祝與廩犧令以牲就牓位謁者引太常卿贊引引御史入詣東階升遍視滌濯於上凡導引者每曲一逡巡於視濯執樽者舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各巡牲一匝西面舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官謁者引光禄卿省鼎鑊申視濯溉贊引引御史就厨省饌具太常卿以下每事訖各還齋所進饌者入徹籩豆簋簠鈃登以出享日未明十五刻太官令帥宰人以鸞刀割牲祝史各取毛血每座共實一豆遂烹牲祝史洗肝於鬱鬯又取膟膋每座共實一豆俱置於饌所膟膋腸間脂晨祼享日未明四刻諸享官各服其服太廟令良醖令各帥其屬入實樽罍雞彜及諸齊之上尊皆實以眀水山罍之上尊實以𤣥酒鳥尊實以鬰鬯犧尊實以汎齊象尊實以醴齊著樽實以盎齊壺樽實以醍齊太尊實以沈齊山罍實以清酒大官令帥進饌者實諸籩豆簋簠未明三刻奉禮帥贊引者先入就位贊引引御史太祝愽士宫闈令及令史祝史與執樽罍篚羃者入自東門當階間重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽罍篚羃者各就位贊引引御史諸太祝詣東陛升堂行掃除於上令史祝史行掃除於下訖引降復位太廟令帥其屬陳瑞物於廟庭泰階之西上瑞為前列次瑞次之下瑞為後列又陳伐國所得寳器上次先後亦如之皆北向西上俱藉以席所司各守之未眀二刻陳腰輿於東陛之東每室各二皆西向北上立定贊引引太廟令太祝宫闈令師内外執事者以腰輿自東陛升堂詣獻祖室入開埳室太祝宫闈令奉出神主置於輿詣座前奉神主置於座訖引太廟令以下次奉出懿祖次奉出太祖次奉出代祖次奉出髙祖次奉出太宗次奉出中宗次奉出睿宗神主置於座皆如獻祖之儀以下皇祖妣神主皆宫闈令奉出俱並䖏俱在右訖引太廟令以下降復位未明一刻謁者贊引各引享官俱就東門外位太樂令率工人二舞次入就位文舞入陳於懸内武舞立於懸南道西其升堂座者皆脫屨於下降納如掌儀謁者引司空入就位立定奉禮曰再拜司空再拜謁者引司空詣東陛升堂行掃除於上降行樂懸於下訖引復位初司空行樂懸謁者贊引各引獻享官以下次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位恊律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏永和之樂乃以黄鐘為宫大吕為角太蔟為徴應鐘為羽作文舞之舞樂舞九成黄鐘三奏大吕太蔟應鐘各再奏偃麾戛敔樂止凡樂皆恊律郎舉麾工鼓柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官在位者皆再拜謁者引太尉詣罍洗盥手洗瓚訖謁者引太尉升自東陛詣獻祖樽彛所執樽者舉羃太尉酌鬱酒訖登歌作肅和之樂以圜鐘之均自後登歌皆歌圜鐘謁者引太尉詣獻祖神座前北向跪以鬯祼地奠之興謁者引太尉北向再拜訖謁者引太尉詣懿祖樽彛所取瓚於坫執樽者舉羃太尉酌鬱酒訖謁者引太尉詣懿祖神座前南向跪以鬯祼地奠之興謁者引太尉南向再拜訖謁者引太尉次祼太祖次祼代祖次祼髙祖次祼太宗次祼髙宗次祼中宗次祼睿宗並如上儀訖登歌止謁者引太尉降復位初衆官拜訖祝史各奉毛血及肝膋之豆立於東門外齋郎奉爐炭蕭稷泰各立於肝膋之後於登歌止祝史奉毛血肝膋與奉爐炭蕭稷黍者以次入自正門升自泰階諸太祝各迎取毛血肝膋於階上俱入奠於神座前祝史退立於樽所齋郎奉爐炭皆置於室户外之左其蕭稷黍各置於爐炭下降自阼階以出諸太祝俱取肝膋出户燔於爐炭還樽所饋食太尉既升祼太官令出帥進饌者奉饌陳於東門之外重行西向以南為上謁者引司徒出詣饌所奉獻祖之俎初太尉既至位太官令引饌入自正門俎初入門雍和之樂作以無射之均自後接神之樂堂下皆奏無射饌至泰階樂止祝史俱進徹毛血之豆降自阼階以出饌升諸太祝迎引於陛上各設於神座籩豆盖羃先徹乃升簋簠既奠却其盖於下設訖謁者引司徒以下降自阼階復位諸太祝各取蕭稷黍擩於脂燔於爐炭還樽所謁者引太尉詣罍洗盥手洗爵訖謁者引太尉升自阼階詣獻祖樽彛所執樽者舉羃太尉酌汎齊訖光大之舞作謁者引太尉詣獻祖神座前北向跪奠爵少東興謁者又引太尉取爵於坫酌汎齊訖北向跪奠爵少西興謁者引太尉少退北向立樂止太祝持版進於座右東面跪讀祝文曰維某年嵗次月朔日子孝曾孫開元神武皇帝某謹遣太尉某官封臣某敢昭告於獻祖宣皇帝祖妣宣莊皇后張氏晷運環周嵗序云及永懷追慕伏增逺感謹以一元大武柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊肅雍明獻祗薦禘事尚饗餘室祝文准此太祖以下稱臣訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座還樽所太尉拜訖樂止謁者引太尉詣懿祖樽彛所取爵於坫執樽者舉冪太尉酌汎齊訖長發之舞作謁者引太尉詣懿祖神座前南向跪奠爵少西興謁者又引太尉取爵於坫酌汎齊訖南向跪奠爵少東興謁者又引太尉少退南向立樂止太祝持版進於座右西向跪讀祝文訖興太尉再拜又再拜初讀祝文訖樂作太祝進奠版於神座還樽所太尉拜訖樂止謁者引太尉詣太祖樽彛所取爵於坫執樽者舉羃太尉酌汎齊訖大政之舞作謁者引太尉詣太祖神座前北向跪奠爵少東興謁者又引太尉取爵於坫酌汎齊訖北向跪奠爵少西興謁者又引太尉少退北向立樂止太祝持版進於座右東向跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝進奠版於神座還樽所太尉拜訖樂止謁者引太尉詣代祖樽彛所取爵於坫執樽者舉羃太尉酌汎齊訖大成之舞作謁者引太尉詣代祖神座前南向跪奠爵少西興謁者引太尉取爵於坫酌汎齊訖南向跪奠爵少東興謁者引太尉少退南向立樂止太祝持版進於座右西向跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝進奠版於神座還樽所太尉拜訖樂止謁者引太尉詣髙祖樽彛所取爵於坫執樽者舉羃太尉酌汎齊訖大明之舞作謁者引太尉詣髙祖神座前北向跪奠爵少東興謁者又引太尉取爵於坫酌汎齊訖北向跪奠爵少西興謁者引太尉少退北向立樂止太祝持版進於座右東向跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝進奠版於神座還樽所太尉拜訖樂止謁者引太尉詣太宗樽彛所取爵於坫執樽者舉羃太尉酌汎齊訖崇徳之舞作謁者引太尉詣太宗神座前南向跪奠爵少西興謁者又引太尉取爵於坫酌汎齊訖南向跪奠爵少東興謁者引太尉少退南向立樂止太祝持版進於座右西向跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座還樽所太尉拜訖樂止謁者引太尉詣髙宗樽彛所取爵於坫執樽者舉羃太尉酌汎齊訖鈞天之舞作謁者引太尉進髙宗神座前北向跪奠爵少東興謁者又引太尉取爵於坫酌汎齊訖北向跪奠爵少西興謁者引太尉少退北向立樂止太祝持版進於座右東向跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝進奠版於神座前還樽所太尉拜訖樂止謁者引太尉詣中宗樽彛所取爵於坫執樽者舉羃太尉酌汎齊訖文和之舞作謁者引太尉進中宗神座前南向跪奠爵少西興謁者又引太尉取爵於坫酌汎齊訖南向跪奠爵少東訖興謁者引太尉少退南向立樂止太祝持版進於座右西向跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝進奠版於神座還樽所太尉拜訖樂止謁者引太尉詣睿宗樽彛所取爵於坫執樽者舉羃太尉酌汎齊訖景雲之舞作謁者引太尉進睿宗神座前南向跪奠爵少西興謁者又引太尉取爵於坫酌汎齊訖南向跪奠爵少東訖興謁者引太尉少退南向立樂終八節止太祝持版進於座右西向跪讀祝文訖興太尉再拜訖又再拜初讀祝文訖樂作太祝進奠版於神座還樽所太尉拜訖曲終樂止謁者引太尉進詣東序西向立諸太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之左北向立太尉再拜受爵跪祭酒啐酒奠爵興諸太祝各帥齋郎進俎太祝減神座前三牲胙肉皆取前脚第三骨加於俎又以籩取稷黍飯興還樽所以胙肉共置一俎上以飯共置一籩以飯授太尉太尉受以授齋郎又以三牲胙肉授太尉太尉每受以授齋郎太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位文舞出鼔柷作舒和之樂出訖戛敔樂止武舞入鼔柷作舒和之樂立定戛敔樂止初太尉將復位謁者引太常卿詣罍洗盥手洗爵訖謁者引太常卿升自阼階詣獻祖樽彛所執樽者舉羃太常卿酌汎齊訖謁者引太常卿詣獻祖神座前北面跪奠爵少東太常卿再拜訖興謁者引太常卿取爵於坫酌汎齊訖詣神座前北面跪奠爵少西興又再拜謁者引太常卿詣懿祖樽彛所執樽者舉羃太常卿酌醴齊訖謁者引大常卿詣懿祖神座前南面跪奠爵少西訖興太常卿再拜訖興謁者又引太常卿取爵於坫酌醴齊訖謁者引太常卿詣神坐前南面跪奠爵少東訖興又再拜謁者引太常卿次獻太祖次獻代祖次獻髙祖次獻太宗次獻髙宗次獻中宗次獻睿宗並如上儀訖謁者引太常卿詣東序西向立諸太祝各以爵酌罍福酒合置一爵一太祝持爵進太常卿之左北向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太常卿興再拜訖謁者引太常卿降復位初太常卿獻將畢謁者引光禄卿詣罍洗盥手洗爵酌盎齊終獻如亞獻之儀訖引光禄卿降復位武舞止登歌作諸太祝各進徹豆還樽所徹者籩豆各一少移於故處登歌止奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜永和之樂作奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之左白禮畢謁者贊引各引享官以次出贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出太廟令與太祝宫闈令帥腰輿升納神主如常儀其祝版燔於齋坊祭七祀其日總祭如臘享功臣配享依祫享儀大唐開元禮卷四十二
