body:
  text: 大唐開元禮卷十唐蕭嵩等撰吉禮皇帝大享于明堂齋戒陳設省牲器鑾駕出宫薦玉帛進熟鑾駕還宫齋戒將祀有司卜日如别儀前祀七日平明太尉誓百官於尚書省曰某月某日祀昊天上帝於明堂各揚其職不供其事國有常刑皇帝散齋四日于别殿致齋三日二日于太極殿一日于行宫前致齋一日尚舍奉御設御幄于太極殿西序及室内俱東向尚舍直長張帷于前楹下致齋之日質明諸衛勒所部屯門列仗晝漏上水一刻侍中版奏請中嚴諸衛之屬各帥其隊入陳于殿前如常儀通事舍人引文武五品已上袴褶陪位如式諸侍衛之官各服其服諸侍臣並結珮俱詣閤奉迎侍中版奏外辦上水三刻皇帝服通天冠絳紗袍結珮乗輿出自西房曲直華葢警蹕侍衛如常儀即御坐東向坐侍臣夾侍如常一刻頃侍中前跪奏稱侍中臣某言請降就齋室俛伏興還侍位皇帝降坐入室文武侍臣各還省直衛者如常儀通事舍人引陪位者以次出凡預祀之官散齋四日致齋三日散齋皆于正寝致齊二日于本司一日于祀所其無本司者即二日于郊社署近侍之官應從升者及從祀羣官諸方客使各于祀所清齋一宿散齋理事如舊唯不吊喪問疾不作樂不判刑殺文書不行刑罰不預穢惡致齋唯祀事得行其餘悉斷其祀官已齋而闕者通攝行事諸祀官致齋之日給酒食及明衣各習禮于齋所光禄卿監取明水火太官令取水于隂鍳取火于陽燧火以供爨水以實尊前祀二日太尉告睿宗大聖真皇帝廟如常告之儀告以配神作主之意前祀一日諸衛令其屬未後一刻各以其方服守衛明堂四門每門二人每隅一人與太樂工人俱清齋一宿陳設前祀三日尚舍直長施大次于明堂東門之外道北尚舍奉御鋪御坐守宫設文武侍臣次于大次之後文官在左武官在右俱南向設諸從祀官于璧水東門之外道南從祀事文官九品以上于祀官之東東方南方蕃客又于其東俱重行每等異位北向西上酅公介公于璧水西門之外道南武官九品已上于酅公介公之西西方北方蕃客又于其西俱重行每等異位北向東上其褒聖侯于文官三品之下若有諸州使人分方位各于文武官之後設陳饌幔于璧水東門之内道北南向前祀二日太樂令設宫懸之樂于明堂前庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于編懸之間各依辰位樹雷鼓于北懸之間道之左右植建鼓于四隅置柷敔于懸南柷在左敔在右設歌鐘歌磬于堂上近南北向磬簴在西鐘簴在東其匏竹者立于階間重行北向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以北為上南方北方以西為上右校清掃明堂内外郊社令積柴于燎壇其壇于樂懸之南方一丈髙一丈二尺開上南陛出户方六尺前祀一日奉禮設御座于堂之東南西向設祀官公卿位于東門之内道南執事者位于公卿之後近南每等異位俱重行西面北上設御史位于堂下一位在東南西向一位在西南東向令史各陪其後設奉禮位于樂懸東北賛者二人在南差退俱西向設協律郎位于堂上午陛之西東向設太樂令位于北懸之間設太祝奉玉帛位于柴壇之南皆北向設從祀官位文官九品已上于執事之南東方南方蕃客又于其南俱每等異位重行西面北上酅公介公位于西門之内道南武官九品以上于酅公介公之後西方北方蕃客于武官之南俱毎等異位重行東面北上其褒聖侯于文武官三品之下若有諸州使人分方位各于文武官之後又設祀官及從祀羣官等門外位于東西門外道南皆如設次之式設牲牓于東門之外當門西向南上蒼牲一居前又蒼牲一少退又青牲二赤牲二黄牲二白牲二元牲二牲牓少退又設廩犧令位于牲西南史陪其後俱北向設諸太祝位于牲東各當牲後祝史陪其後俱西向設太常卿省牲位于牲前近北又設御史位于太常卿之西俱南向設酒尊之位于明堂之上下昊天上帝太尊二著尊二犧尊二山罍二在室内神坐之左象尊二壺尊二山罍二在堂下東南西向配帝著尊二犧尊二象尊二山罍二在堂上神坐之左五方帝各太尊二著尊二犧尊二山罍二各于室内神座之左内向五帝各著尊二在堂上各于神坐之左俱内向五官各象尊二在階下皆于神坐之左俱右向堂上之尊皆置于坫階下之尊皆藉以席俱加勺羃設爵于尊下設御洗于東階東南亞獻之洗又于東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設五官罍洗篚羃各于酒尊之左俱右向其執尊罍篚羃者各位于其後各設玉幣之篚于堂之上下尊坫之閒祀日未明五刻太史令郊社令升設昊天上帝神座於明堂太室之内中央南向席以藁秸設睿宗大聖真皇帝神座于上帝之東南西向席以莞設青帝於木室西向赤帝於火室北向黄帝於太室南户之西北向白帝于金室東向黒帝于水室南向席皆以藁秸設太昊炎帝軒轅少昊顓頊之坐各于五方帝之左俱内向差退設五官坐于明堂之庭各依其方俱内向席皆以莞設神座各于坐首省牲器省牲之日午後十刻去明堂二百步取諸衛之屬禁斷行人晡後二刻郊社令帥府史二人及齋郎以尊坫罍洗篚羃入設于位升堂者自夘階晡後三刻諸太祝與廩犧令以牲就牓位謁者引太常卿賛引引御史詣東階升堂視滌濯凡導引者每曲一逡巡于視濯執尊者皆舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西向舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官令謁者引光禄卿詣厨省鼎鑊申視濯溉賛引引御史詣厨省饌太常卿以下每事訖各還尊所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置于饌所遂烹牲鑾駕出宫如圜丘之儀奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各帥其屬入實罇罍玉帛凡六尊之次太尊為上實以汎齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝著尊為上實以汎齊犧尊次之實以醴齊象尊次之實以盎齊山罍為下實以清酒五方帝太尊為上實以汎齊著尊次之實以醴齊犧尊次之實以盎齊山罍為下實以清酒五人帝之著尊實以醴齊五官之象尊實以醍齊𤣥酒各實于五帝之上尊禮神之玉昊天上帝以四珪有邸青帝以青珪赤帝以赤圭黄帝以黄琮白帝以騶虞黒帝以𤣥璜天帝配帝之幣皆以蒼五方帝五帝五官各從方色凡幣帛一丈八尺太官令帥進饌者實諸籩豆簋簠入設于東門之外饌幔内未明五刻奉禮帥賛者先入就位賛引引御史博士諸太祝及令史祝史與執尊罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳御史以下皆再拜訖執尊罍篚羃者各就位賛引引御史諸太祝詣壇東階升行掃除于上令史祝史行掃除于下訖各引就位駕將至謁者賛引各引祀官通事舍人分引從祀羣官諸方客使先至者俱就門外位駕至大次門外迴輅南向將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降路之大次通事舍人引文武五品以上從祀之官皆就壝外位太樂令帥工人二舞次入文舞陳于懸内武舞立于懸南道西謁者引司空入行掃除訖復侍位如常儀皇帝停大次半刻頃通事舍人分引從祀文武羣官酅公介公諸方客使及四方蕃客使皆先入就位太常博士引太常卿立于大次門外當門北向侍中版奏外辦皇帝服大裘而冕出次華葢侍衛如常儀侍衛負寳陪從如式博士引太常卿太常卿引皇帝凡太常前引皆博士前導至内門外殿中監進大珪尚衣奉御又以鎮珪授殿中監受進皇帝搢大珪執鎮珪華盖仗衛停于大次門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常皇帝至版位西向立毎立定太常卿與博士退立于左謁者賛引各引祀官次入就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠物俛伏而後興鼓柷奏豫和之樂乃以圜鐘之均林鐘為徴太簇為商南吕為羽姑洗為角作文舞樂舞六成偃麾戛敔樂止太常卿前奏稱再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜謁者引諸獻官俱詣東陛升堂立於尊所太祝與諸獻官皆跪取玉幣于篚立于東南隅西向北上配帝太祝立于西南隅東向北上五方帝五帝五官諸太祝及獻官又取幣于篚立于尊所太常卿引皇帝太和之樂作皇帝毎行皆作太和之樂皇帝升自南陛侍中中書令以下及左右侍衛量人従升以下如之皆皇帝升堂北向立樂止太祝加玉於幣以授侍中侍中奉玉幣西向進皇帝搢鎮珪受玉帛凡受物皆搢鎮珪奠訖執珪俛伏興登歌作肅和之樂以大吕之均太常卿引皇帝進北面跪奠于昊天上帝神坐俛伏興太常卿引皇帝立於南方北面五方帝之太祝奉玉帛各奠於其神坐還尊所皇帝再拜訖太祝又以配帝之幣授侍中侍中奉幣北向進皇帝受幣太常卿引皇帝進東向跪奠于睿宗大聖真皇帝神坐前俛伏興太常卿引皇帝立于西方東向五帝之獻官各奠幣于神坐五官之祝次奠幣于神坐各還尊所皇帝再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止初羣官拜訖祝史皆奉毛血之豆立于堂下于登歌止祝史奉毛血各由其陛升諸太祝迎取于堂上俱進奠于神坐前太祝與祝史退立于罇所進熟皇帝既升奠玉帛太官令帥進饌者奉饌陳于内壝門外謁者引司徒出詣饌所司徒奉天帝之俎皇帝既至位樂止太官令引饌入俎初入門雍和之樂作以黄鐘之均饌至陛樂止祝史俱進徹毛血之豆降自東陛以出天帝之饌升自午陛配帝之饌升自夘陛五方帝五帝之饌各由其陛諸太祝迎引于堂上各設于神坐前籩豆盖羃先徹乃升簠簋既奠却其盖于下設訖謁者司徒太官令帥進饌者降自東陛以出司徒復位諸太祝各還尊所又進設五官之饌相次而畢初壇上設饌訖太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤興承水皇帝盥手黄門侍郎跪取巾于篚興進皇帝帨手訖黄門侍郎受巾跪奠于篚黄門侍郎又取匏爵於篚興進於皇帝皇帝受爵侍中酌罍水又侍中奉盤承水皇帝洗爵黄門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤匜黄門侍郎受巾奠于篚皆如初太常卿引皇帝樂作皇帝自南陛升堂樂止太常卿引皇帝詣天帝酒尊所執尊者舉羃侍中賛酌汎齊訖夀和之樂作皇帝毎酌獻飲福皆作夀和之樂太常卿引皇帝進昊天上帝神坐前北向跪奠爵俛伏興太常卿引皇帝立于南方北向太祝一人持版進于皇帝之右西向跪讀祝文曰維某年歳次某月朔日子嗣天子臣某敢昭告于昊天上帝惟神覆燾羣生甄陶庶類不言而信普博無私謹擇元辰祗率恒禮敬以玉帛犧齊粢盛庻品肅恭禋祀式展誠敬皇考睿宗大聖真皇帝配神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進奠版于天帝神坐前還尊所皇帝拜訖樂止太常卿引皇帝詣配帝酒尊所執尊者舉羃侍中取爵于坫進皇帝受爵侍中賛酌汎齊訖樂作太常卿引皇帝進睿宗大聖真皇帝神坐前東向跪奠爵俛伏興太常卿引皇帝立于西方東向謁者五人引五方帝之太祝詣罍洗盥手俱取匏爵于坫酌汎齊各進奠于其神坐前還尊所樂止配帝太祝一人持版進于皇帝之右北面跪讀祝文曰維某年歳次月朔日子孝子開元神武皇帝臣某敢昭告于皇考睿宗大聖真皇帝祗率舊章肅若恒禮敬致禋祀于昊天上帝惟皇考徳光宇宙道叶乾元申錫無疆實膺嚴配謹以制幣犧齊粢盛庻品肅恭明薦侑神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進奠版于神坐還尊所皇帝拜訖樂止太常卿引皇帝南方北向立樂作諸太祝各以爵酌上尊福酒合置一爵一太祝持爵授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興太祝各帥齋郎進俎太祝減神前胙肉加于俎以胙肉共置一俎上一太祝持俎以授司徒司徒奉俎西向進皇帝受以授左右謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復于坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止皇帝獻將畢謁者引太尉詣罍洗盥手洗匏爵訖太尉自夘陛升堂詣天帝著尊所執尊者舉羃太尉酌醴齊武舞作謁者引太尉進天帝神坐前北向跪奠爵興再拜訖謁者引太尉詣配帝酒尊所取爵于坫執尊者舉羃太尉酌醴齊謁者引太尉進睿宗大聖真皇帝神坐前西向跪奠爵興再拜訖謁者引五方帝之太祝各取爵于坫酌醴齊俱進奠于其神坐謁者引太尉立于南方北向再拜訖諸太祝各以爵酌罍福酒合置一爵一太祝持進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復于坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光禄卿詣罍洗匏爵升酌盎齊獻正坐配坐五方帝之祝亦各酌盎齊奠神坐終獻如亞獻之儀謁者引光禄卿及諸獻官降復位初太尉將升獻謁者引五帝之獻官詣罍洗盥手洗匏爵各由其陛升俱酌醴齊跪奠于帝太昊氏神坐前餘坐齋郎助奠相次畢各還本位五帝獻將畢謁者引五官之獻官各詣罍洗盥手洗匏爵訖各進酌醍齊跪奠于勾芒氏神坐前餘坐齋郎助奠相次畢各還本位及終獻畢武舞六成樂止舞獻俱畢上下諸祝各進跪徹豆興還尊所徹者籩豆各一少移于故處奉禮曰賜胙賛者唱衆官再拜衆官在位者皆再拜已飲福者不拜豫和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作皇帝就望燎位南向立樂止于羣官將拜諸祝各執篚神坐前取玉帛祝版齋郎以俎載牲體稷黍飯酒各由其陛降壇南行經懸内當柴壇南東行自南陛登柴壇以玉帛祝版饌物置于柴壇上戸内奉禮曰可燎東西面各六人以炬燎火半柴太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出門殿中監前受鎮珪以授尚衣奉御殿中監又前受大珪華盖侍衛如常儀皇帝入次樂止謁者賛引各引祀官通事舍人分别引從祀羣官諸方客使及蕃客以次出御史太祝協律郎以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引出工人二舞以次出鑾駕還宫如圜丘之儀大唐開元禮卷十
