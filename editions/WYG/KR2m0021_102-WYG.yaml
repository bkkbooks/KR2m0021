body:
  text: 大唐開元禮巻一百二唐蕭嵩等撰嘉禮皇帝於明堂讀孟冬令皇帝於明堂讀仲冬令皇帝於明堂讀季冬令皇帝於明堂讀孟冬令陳設禮部尚書先讀令三日奏讀月令承以宣告前三日尚舍直長施大次於𤣥武門外道西東向尚舍奉御設御坐守宫設文武侍臣於大次之後文官在左武官在右俱東向設羣官次於壁水北門之外文官在東武官在西俱南上前一日尚舍奉御設御幄坐於𤣥堂左个近南北向守宫設三品以上及諸司長官坐於堂上文官於御坐西北東向武官於御坐東北西向俱重行南上無長官者次官一人升判官不合設刑部郎中讀令坐於御坐東北西向有案設文官解劔席於戍陛之左設武官解劔席於子陛之右皆内向太樂令展宫懸於𤣥堂左个之庭設舉麾位於堂上亥陛之東西向一位於樂懸西北東向典儀設三品以上應升坐者位於懸北文左武右俱重行南向相對為首設非升坐者位文官四品五品位於懸西六品以下於其北絶位俱東向武官四品五品於懸東六品以下於其北當文官俱西向皆重行南上設典儀位於懸之西南賛者二人在北差退俱東向奉禮設門外位各於次前俱每等異位重行相向南上鑾駕出宫前出宫三日本司宣攝内外各供其職守宫設從駕之官五品以上次於承天門外東西朝堂如常前二日太樂令設宫懸之樂於殿庭如常儀其日未明七刻搥一鼔為一嚴三嚴時節前一日侍中奏裁侍中奏開宫殿門及城門未明五刻搥二鼔為再嚴侍中版奏請中嚴奉禮設從駕羣官五品以上位文官於東朝堂之前西向武官於西朝堂之前東向俱重行北上從駕羣官五品以上俱集朝堂次各服其服其六品以下並駕發之前預赴明堂所俱就次各服其服也所司陳小駕鹵簿未明二刻搥三皷為三嚴諸衞之屬各督其隊與鈒㦸以次入陳于殿庭謁者引從駕群官各就朝堂位諸侍衞之官各服其器服侍中中書令以下俱詣西閤奉迎侍中負寳如式乘黄令進金輅于西閤外南向千牛將軍一人執長刀立于輅前北向黄門侍郎一人在侍臣之前賛者二人又在黄門之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝服通天冠黒紗袍佩𤣥玉御輿以出曲直華盖警蹕侍衞如常儀皇帝將出仗動太樂令令撞黄鐘之鐘右五鐘皆應協律郎跪俛伏舉麾鼔柷奏太和之樂千牛將軍前執轡皇帝升輅太僕卿立授綏侍中中書令以下夾侍如常儀黄門侍郎進當鑾駕前跪奏稱黄門侍郎臣某言請鑾駕發引俛伏興退復位凡黄門侍郎奏請皆進當鑾駕前跪奏稱具官臣某言訖俛伏興鑾駕動又稱警蹕黄門侍郎與賛者夾引以出千牛將軍夾輅而趍駕至太極門偃麾戛敔樂止出太極門鼓柷奏采茨之樂出嘉徳門戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止至承天門外侍臣上馬所黄門侍郎奏稱請鑾駕權停勅侍臣上馬侍中前承制退稱制曰可黄門侍郎退稱侍臣上馬賛者承傳文武侍臣皆上馬諸侍衞之官各督其屬左右翊駕在黄麾内符寳郎奉六寳與殿中監後部從侍中中書令以下夾侍于輅前賛者在供奉官人内侍臣上馬畢黄門侍郎奏稱請勅車右升侍中前承制退稱制曰可黄門侍郎退復位千牛將軍升訖黄門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕皷傳音如常皷吹振作而行其從駕之官在𤣥武隊後如常儀讀令其日依時刻諸衞勒所部屯門列仗及𤣥堂左个之庭如常先至羣官俱集次各服其服駕將至通事舎人各引先至羣官俱就門外位駕至大次門外廻輅東向千牛將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降路御輿之大次繖扇華盖侍衞警蹕如常儀通事舍人引文武五品以上從駕之官皆就門外位太樂令帥工人入就位協律郎入就舉麾位典儀帥賛者先入就位通事舍人引羣官非升坐者入就位刑部郎中以月令置于案覆以帕令史二人俱絳公服對舉案立于武官五品東北郎中立于案後西面侍中版奏外辦皇帝御輿出次直曲華盖侍衞警蹕如常儀入自𤣥武門皇帝初入門太樂令令撞􅅋賔之鐘左五鐘皆應鼓柷奏太和之樂皇帝升自亥陛入即御坐北向坐符寳郎奉寳置于御坐侍臣夾侍如常儀戛敔樂止典儀一人升立于左个西向東面通事舍人引公王以下入就南面位公初入門舒和之樂作凡公行皆作舒和之樂公至位樂止羣官立定典儀曰再拜賛者承傳凡典儀有詞賛者皆承傳在位者皆再拜侍中前跪奏稱侍中臣某言請延公王等升俛伏興又侍中稱制曰可侍中詣左个西北東面稱制延公王等升堂上典儀承傳堂下賛者又承傳在位者皆再拜通事舍人以次引南面位者各詣其陛公初行樂作至觧劔席樂止公以下俱升席跪觧劔俛伏興脱舄通事舍人各引升立于坐後刑部郎中引案進立於子陛下侍中跪奏請讀月令俛伏興又侍中稱制曰可侍中退復位刑部郎中再拜就觧劔席跪觧劔俛伏興脱舄取令持案者仍立于下通事舍人引刑部郎中奉令升自子陛詣席東西向跪置令于案俛伏興立于席後堂上典儀唱就坐公王以下及刑部郎中並就坐俛伏興坐刑部郎中讀令每句一絶使言聲可了讀令訖堂上典儀唱可起公王以下皆起通事舍人引公王以下及刑部郎中俱降刑部郎中以令置于案與羣官俱跪佩劔俛伏興納舄通事舍人引各還本位公初行樂作至位樂止立定典儀曰再拜在位者皆再拜通事舍人引南面位者出公初行樂作出門樂止侍中跪奏稱侍中某臣言禮畢俛伏興還侍位皇帝興太樂令令撞黄鐘之鐘右五鐘皆應太和之樂作皇帝降坐御輿以出之便次警蹕侍衛如來儀出門樂止通事舍人引東西面位者以次出孟冬令孟冬之月日在尾昏危中旦七星中其日壬癸其帝顓頊其神𤣥冥其蟲介其音羽律中應鍾其數六其味鹹其臭朽其祀行水始氷地始凍雉入大水為蜃虹藏不見食黍與彘其器閎以奄是月也以立冬先立冬七日禮部奏曰某日立冬盛徳在水皇帝乃齋立冬之日皇帝親帥百官迎冬于北郊還賞死事恤孤寡是月也察阿黨則罪無有掩蔽天氣上騰地氣下降天地不通閉塞而成冬命百官謹盖藏命有司循行積聚毋有不斂坯城郭戒門閭修鍵閉慎管籥固封疆備邊境完要塞謹闗梁塞蹊徑飭䘮紀辯衣裳審棺槨之厚薄塋丘壟之大小高卑薄厚之度貴賤之等級是月也命工師效功陳祭器案度程毋或作為􅁋巧以蕩上心物勒工名以考其誠功有不當必行其罪以窮其情是月也乃命虞司收水泉池澤之賦毋或敢侵削衆庶其有若此者行罪毋赦孟冬行春令則凍閉不宻地氣上洩人多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則霜雪不時小兵時起土地侵削鑾駕還宫皇帝既還大次侍中版奏請觧嚴將士不得輒離部伍皇帝停大次一刻頃搥一皷為一嚴轉仗衞於還􅂗如來儀三刻頃搥二皷為再嚴將士布隊仗侍中版奏請中嚴五刻頃搥三皷為三嚴謁者賛引各引群官序立於次前文武侍臣詣大次奉迎乘黄令進金輅于大次門外東向千牛將軍立于輅右侍中版奏外辦太僕卿升執轡皇帝御輿出次繖扇侍衞警蹕如常儀皇帝升輅太僕卿立授綏黄門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕如常儀黄門侍郎賛者夾引千牛將軍夾輅而趍至侍臣上馬所黄門侍郎奏稱請鑾駕權停勅侍臣上馬侍中前承詔退稱制曰可黄門侍郎退稱侍臣上馬賛者承傳文武侍臣皆上馬畢黄門侍郎奏稱請勅車右升侍中稱制曰可黄門侍郎退復位千牛將軍升訖黄門侍郎奏稱請鑾駕發引退復位鼔傳音鑾駕動鼓吹振作而還文武羣官皆從如來儀駕至承天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立於路右訖鑾駕動千牛將軍夾輅而趨駕入嘉德門太樂令令撞㽔賓之鐘左五鐘皆應鼓柷奏采茨之樂至太極門戛敔樂止入太極門鼓柷奏太和之樂駕至横街北當東上閤廻輅南向侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅御輿以入繖扇侍衛警蹕如常儀侍臣從至閤戛敔樂止初文武羣官至東朝堂通事舍人承㫖勅羣官並還皇帝既入侍中版奏請解嚴叩鉦將士各還其所皇帝於明堂讀仲冬令陳設尚舍奉御設御幄坐於𤣥堂太廟設文官解劔席於亥陛之左武官解劔席於丑陛之右太樂令展宫懸於𤣥堂太廟之庭設舉麾位於𤣥堂上子陛之東餘並如孟冬陳設之儀鑾駕出宫右並如孟冬出宫之儀讀令其日諸衛列仗於𤣥堂太廟之庭皇帝升自子陛典儀一人升立於𤣥堂太廟西北侍中詣𤣥堂太廟西北稱制刑部郎中升自丑陛餘並如孟冬讀令之儀仲冬令仲冬之月日在斗昏東壁中旦軫中其日壬癸其帝顓頊其神𤣥冥其蟲介其音羽律中黄鐘其數六其味鹹其臭朽其祀行氷益壯地始坼鶡旦不鳴食黍與彘其器閎以奄飭死事命有司土事毋作毋發室屋及起大衆以固而閉地氣沮洩是謂發天地之房諸蟄則死人必疾疫是月也命内侍申宫令審門閭謹房室必重閉省婦事毋得淫巧雖有貴賤近習無有不禁乃命良醖秫稻必齊麴蘖必時湛熾必潔水泉必香淘器必良火齊必得兼用六物毋有差貸是月也日短至隂陽争諸生蕩君子齋戒處必掩身身欲寧去聲色禁嗜慾安形性事欲静以待隂陽之所定芸始生荔挺出蚯蚓結麋角解水泉動日短至則伐木取竹箭是月也可以罷官之無事去器之無用者塗闕庭門閭築囹圄以助天地之閉藏是月也皇帝親講武以習五戎仲冬行夏令則其國乃旱氛霧冥冥雷乃發聲行秋令則天時雨汁𤓰瓠不成國有大兵行春令則蝗蟲為敗水泉咸竭人多疥癘鑾駕還宫右並如孟冬還宫之儀皇帝於明堂讀季冬令陳設尚舍奉御設御幄坐於𤣥堂右个設文官解劔席於子陛之左設武官解劔席於寅陛之右太樂令展宫懸於𤣥堂右个之庭設舉麾位於堂上丑陛之東餘並如仲冬陳設之儀鑾駕出宫右並如孟冬出宫之儀讀令其日諸衛列仗於懸堂右个之庭皇帝升自丑陛典儀一人升立於𤣥堂右个西北侍中詣𤣥堂右个西北稱制刑部郎中升自寅陛餘並如仲冬讀令之儀季冬令季冬之月日在婺女昏婁中旦氐中其日壬癸其帝顓頊其神𤣥冥其蟲介其音羽律中大吕其數六其味鹹其臭朽其祀行雁北鄉鵲始巢雉呴雞乳食黍與彘其器閎以奄命有司大儺征鳥厲疾是月也命漁師始漁皇帝乃嘗魚先薦宗廟氷方盛水澤腹堅命取氷命衆庶出五種計耦事修耒耜具田器命太常大合吹習衆樂命有司收秩薪柴以供郊廟及百祀之薪燎是月也日窮於次月窮於紀星迴於天數將幾終嵗且更始專而農人毋有所使皇帝乃與有司共飭國典論時令以待來歲之宜季冬行秋令則白露早降介蟲為妖四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降氷凍消釋鑾駕還宫右並如孟冬還宫之儀大唐開元禮卷一百二
