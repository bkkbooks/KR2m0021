body:
  text: 大唐開元禮卷八十二唐蕭嵩等撰軍禮皇帝親征冝于太社齋戒陳設鑾駕出宫薦玉帛進熟鑾駕還宫齋戒將告有司卜日如前儀前一日皇帝清齋于太極殿凡預告之官清齋于廟所近侍之官應從升者及羣官各使等各于本司及公館諸軍將各于正寢清齋一宿若在營者齋于軍幕諸衞令其屬晡後一刻各以其方器服守衞社宫門與太樂工人俱清齋一宿陳設前告三日尚舍直長施大次于社宫西門之外道北南向尚舍奉御鋪御坐守宫設文武侍臣次于大次之後文官在左武官在右俱南向設告官及從駕羣官次各如常儀設軍將次于社宫北門之外道西東向以北為上前二日太樂令設宫懸之樂于壇北又設登歌及舉麾位于壇上並如常儀右校清掃内外又為瘞埳二于樂懸之北如常前一日奉禮設御位北門之内當社壇南向設太祝等奉幣血位于埳北如常設告官及從駕羣官版位于内外如常儀郊社令帥府史一人及齋郎以樽坫罍洗篚羃入設皆如常儀執樽罍篚羃者各位于樽罍篚羃之後告日未明十五刻太官令帥宰人烹牲于厨牲用黑牛二齋郎以豆取牲血如常未明四刻太史令郊社令各服其服升設神席位如常鑾駕出宫皇帝服武弁乗革輅陳大駕鹵簿其嚴鼓時刻奏請進發内外器服皆如常儀前後備六軍奠玉幣其日未明二刻諸告官各服其服郊社令良醖令各率其屬入實樽罍及玉太樽實以醴齊配坐之象尊實亦如之其明水各實于上尊玉俱以兩珪有邸太祝各以幣置于篚幣隨牲色各長一丈八尺太官令帥進饌者實諸籩豆簠簋等皆設于神厨未明三刻奉禮帥賛者先入就位賛引引御史博士太祝諸執事者入行掃除如常儀訖各就位鑾駕将至謁者賛引各引從駕羣官就門下位太樂令帥工人次入就位其升壇者皆脱履于下降納如常謁者賛引告官及從告羣官客使入就位皇帝停大次半刻頃太常博士引太常卿立于大次門外當門北向侍中版奏外辦皇帝出次華盖侍衛如常儀博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引社宫北門外殿中監進鎮珪華盖仗衛停于門外近侍者従入如常皇帝至版位南面立每立太常卿博士退立于左太常卿前奏請再拜退復位皇帝再拜奉禮曰衆官再拜賛者承傳凡奉禮有詞賛者皆承傳衆官在位者皆再拜太常卿前奏有司謹具請行事退復位協律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠訖則俛伏興鼓柷奏順和之樂以函鐘之均樂舞八成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止太常卿前奏請再拜退復位皇帝再拜奉禮曰衆官再拜衆官皆再拜諸祝俱取玉幣于篚各立于樽所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣太社壇升自北陛近侍者従升如常儀皇帝升壇南向立樂止太祝加玉于幣以授侍中侍中奉玉幣西向進皇帝受玉幣登歌作肅和之樂以應鐘之均太常卿引皇帝進南面跪奠于太社神坐俛伏興太常卿引皇帝少退南面再拜太常卿引皇帝立于東方西向又太祝以幣授侍中侍中奉幣南面進皇帝受幣太常卿引皇帝進西向跪奠于后土氏神坐前俛伏興太常卿引皇帝少退西向再拜訖登歌止太常卿引皇帝降自北陛樂作太常卿引皇帝詣太稷壇升奠玉幣于太稷氏后稷氏升降皆如太社壇儀太常卿引皇帝降自北陛樂止皇帝還版位南向立樂止進熟皇帝既升奠玉幣太官令出帥進饌者奉饌入陳于西門之外司徒奉太社之俎初皇帝既至位樂止太官令引饌入太社太稷之饌入自正門后土后稷之饌入自左闥俎初入門雍和之樂作饌至陛樂止太社太稷之饌升自北陛后土后稷之饌升自西陛諸祝迎引于壇上各設于神坐前設訖謁者引司徒以下降復位諸祝各還樽所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取􅓢興沃水又侍中跪取盤興承水皇帝盥手黄門侍郎跪取巾於篚興進帨手訖黄門侍郎受巾跪奠于篚黄門侍郎又取爵于篚興進皇帝皇帝受爵侍中酌罍水又侍中奉盤承水皇帝洗爵黄門侍郎又授巾如初皇帝拭爵訖侍中奠盤匜黄門侍郎受巾奠于篚皆如常太常卿引皇帝樂作皇帝詣太社壇升自北陛樂止近侍官從升如常謁者引司徒升自西陛立于樽所齋郎奉俎從升立于司徒之後太常卿引皇帝詣太社酒樽所執樽者舉羃侍中賛酌醴齊訖夀和之樂作皇帝毎酌獻及飲福酒皆作夀和之樂太常卿引皇帝進太社神坐前南面跪奠爵俛伏興太常卿引皇帝少退南向立樂止太祝持版進于神坐之右西向跪讀祝文其祝文臨時撰告以親征意訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版于神坐前興還樽所皇帝拜訖樂止太常卿引皇帝詣后土氏酒樽所執尊者舉羃侍中取爵于坫進皇帝受爵侍中賛酌醴齊訖樂作太常卿引皇帝進后土氏神坐前西向跪奠爵俛伏興太常卿引皇帝少退西向立樂止太祝持版進于神坐之左南向跪讀祝文訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版于神坐興還樽所皇帝拜訖樂止太常卿引皇帝進太社神坐前南向立樂作太祝各以爵酌福酒合置一爵一太祝持爵以授侍中侍中受爵東向以進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興諸祝各帥齋郎進爼太祝减太社神前胙肉太祝以爼授司徒司徒奉爼東向進皇帝受以授左右皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復于坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自北陛詣罍洗樂止謁者引司徒従降皇帝至罍洗盥手洗爵侍中黄門侍郎賛洗如常訖太常卿引皇帝樂作皇帝詣太稷壇升自北陛樂止皇帝酌獻太稷后稷皆如太社后土之儀太常卿引皇帝降自北陛樂作皇帝還版位南面立樂止謁者引司徒降復位皇帝既降謁者引諸軍将升自西陛進立于太社神坐前南面西上初軍将升諸太祝各帥齋郎以爵酌罍福酒進立于軍将之東西面南上軍将俱再拜受爵跪祭酒啐酒奠爵興諸太祝各帥齋郎進俎減神前胙肉以次授軍将受以授齋郎軍将俱跪取爵遂飲卒爵太祝帥齋郎受爵復于坫軍将興俱再拜謁者引軍将降復位登歌作諸祝俱進徹豆還樽所登歌止徹者豆籩各一少移于故處奉禮曰賜胙賛者唱衆官再拜衆官皆再拜已飲福受胙者則不拜樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官皆再拜樂一成止太常卿前奏請就望瘞位太常卿引皇帝樂作皇帝至望瘞位南向立樂止于羣官将拜諸祝各執篚進神坐前取玉幣齋郎以爼載牲體稷黍飯爵酒各由其陛降壇南行當瘞埳西行諸祝以玉幣饌物置于埳訖奉禮曰可瘞埳東西面各四人寘土半埳太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出社宫門殿中監前受鎮珪華盖侍衛如常儀皇帝入次樂止謁者賛引各引告官及從駕羣官以次出賛引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出工人以次出其祝版燔於齋所鑾駕還宫如常儀大唐開元禮卷八十二
