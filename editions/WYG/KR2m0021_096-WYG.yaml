body:
  text: 大唐開元禮卷九十六唐蕭嵩等撰嘉禮皇帝元正冬至受皇太子妃朝賀皇后元正冬至受皇太子妃朝賀皇帝元正冬至受皇太子妃朝賀其日依時刻諸衞率各勒所部陳布妃儀仗如常内廏尉進車於閤外司測量時刻啟外辦妃服首飾褕衣乘車以出侍衞如常入至下車所妃降車侍從如常内侍所司引詣閤外皇帝即御坐南向近侍如常司嬪引妃升自西階進當御坐前北面跪賀稱元正首祚景福惟新伏惟開元神武皇帝陛下與天同休冬至賀云天正長至伏惟陛下如日之升賀訖起司嬪引降復位妃再拜訖尚儀前承勅降詣妃西北東面稱有勅妃再拜宣勅訖又再拜司嬪引妃還宫皇后元正冬至受皇太子妃朝賀皇太子妃朝皇帝訖詣皇后所御之殿立於閤外六尚以下各服其服俱詣皇后内閤奉迎如常皇后出即御坐南向坐近侍如常司嬪引妃入立於庭北面立定再拜司嬪引妃升自西階進當御坐前北面跪賀稱元正首祚景福惟新伏惟皇后殿下與時同休冬至賀云伏惟殿下如日之升賀訖起司嬪引降復位妃再拜訖尚儀前承令降詣妃西北東面稱令㫖妃再拜宣令訖又再拜司嬪引妃出乘車還宫如來儀若諸王妃奉勅同朝則各服其服預至皇太子妃下車所侍隨入位在皇太子妃南北面西上唯不升於階外與皇太子妃同若别朝亦准皇太子妃式大唐開元禮卷九十六
