body:
  text: 大唐開元禮卷一百三十八唐蕭嵩等撰凶禮三品以上喪之一初終復設床奠沐浴襲唅赴闕勅使弔奠銘重陳小斂衣奠小斂斂髪奠陳大斂衣奠大斂奠廬次成服朝夕哭奠賔弔親故同親故哭州縣官長弔刺史遣使弔親故遣使致賻殷奠卜宅兆卜𦵏日啟殯贈諡親賓致奠初終有疾丈夫婦人各齋於正寢北墉下東首墉牆也東首順生氣也飬者男子婦人皆朝服齋親飲藥子先甞之疾困去故衣加新衣為人来穢惡也徹樂清掃内外為賓客来問分禱所祀盡孝子之情也五祀及所封境内名山大川之類侍者四人坐持手足為不能自屈伸内䘮則婦人持之遺言則書之属纊以候氣纊新綿置于口鼻也氣絶廢牀寢於地人始生在地庶其生氣反也主人啼餘皆哭男子易以白布衣被髪徒跣婦人青縑衣被髮不徒跣女子子亦然父為長子為人後者為其本生父母皆素冠不徒跣女子子嫁者髽齊衰以下丈夫素冠婦人去首飾謂齊衰婦人内外皆素服素服謂有服者白布十五升無服者不服列綵服常服素衣主人坐于牀東啼踊無數衆主人在主人之後兄弟之子以下又在其後俱西面南上哭妻坐於牀西妾及女子子在妻之後哭踊無數兄弟之女以下又在其後俱東面南上籍藁坐哭内外之際隔以行帷祖父以下於帷東北壁下南面西上祖母以下於帷西北壁下南面東上皆舒席坐哭外姻丈夫於户外之東北面西上婦人於主婦西南北面東上皆舒席坐哭若舍窄則宗親丈夫在户外之東北面西上外姻丈夫在户外之西北面東上諸内喪則尊行大夫及外親丈夫席位於前堂若户外之左右俱南面宗親尸東西上外親户西東上凡喪皆以服精粗為序國官位於門内之東重行北面以西為上俱袤巾帕頭舒席坐叅佐位於門内之西重行北面以東為上俱素服舒席坐哭斬衰三日不食齊衰二日不食大功一日不食小功緦麻再不食復始死則復復於正寢復者三人皆常服復為招魂復魄以死者之上服左荷之升自前東霤當屋履危北面西上危棟也左執領右執腰招以左每招長聲呼某復男子女子稱字及伯仲婦人稱姓婦人依其夫三呼而止以衣投於前承之以篋升自阼階入以覆尸若得魂魄返然復者徹舍西北扉降自後西霤不自前降不以扉虚返因徹西北若云此室凶不可居然自是行死事取徹扉之薪以充煮沐復衣不以襲斂浴則去之乃設牀設牀設床於室户内之西去脚舒簟設枕施幄去裙遷尸於床南首覆用斂衾去死衣斂衾大斂所用之衾黄表素裏也死衣病時所加新衣也楔齒用角柶為將含也綴足以燕几校在南綴猶拘也校几脛也尸南首几脛在南以拘足則不使辟戾也侍者坐持之其内外哭位如始死之儀乃奠奠奠以脯醢酒用吉器無巾柶升自阼階奠於尸東當腢鬼神無象故設奠以憑依之内喪内贊者皆受於户外而設之凡内喪皆内賛者行事也既奠賛者降出設帷堂初氣絶室内隨事設帷帷至此事小訖故設堂乃赴於闕若有赴者遣赴赴禮合在此下含篇後為與勒使弔篇宜相近故列在後也沐浴自沐浴下至設重其事皆可同時而興掌事者掘塪於階間近西南其廣尺長二尺深三尺南其壤為塊竈於西牆下東向以俟煮沐新盆槃瓶六䰛皆濯之陳於西階下新此器者重死事塊竈累土為竈盆以盛水槃以盛濡濯瓶以汲也䰛瓦罌受二升有蓋濯謂滌溉沐巾一浴巾二用絺若􅗽實於笲巾所以拭也浴巾二者上體下體異絺細葛也􅗽粗葛也笲竹器也櫛實於箱若簞浴衣實于篋浴衣已浴所衣之衣其制如今之眠帕皆具于西序下南上水淅稷米取潘煮之又汲為湯以俟浴以盆盛潘及沐盤升自西階授沐者執潘及槃入主人皆出户外象平生沐浴子孫不在旁主人出也而袒簀謂去席居牀簀主人以下户東北面西上主婦以下皆于户西北面東上俱立哭其尊行者丈夫於主人之東北面西上婦人於主婦之西北面東上俱坐哭婦人權障以帷主人以下既出乃沐櫛櫛梳束髪用組挋用巾挋晞也浴則四人抗衾二人浴拭用巾挋用浴衣設牀於尸東袵下莞上簟袵卧席也浴者舉尸易牀設枕翦鬚斷爪如平常鬚髮爪盛以小囊大斂内於棺浴巾皆埋於塪寘之著明衣裳以方巾覆面仍以大斂之衾覆之訖内外入就位哭乃襲襲是時陳襲事扵房内襲衣三稱西領南上朝服一稱常服二稱凡陳衣者實之以箱篋承以席明衣裳今用生絹裩衫舄一帛巾一方尺八寸充耳用白纊面衣用𤣥方尺纁裏組繋握手用𤣥纁裏長尺二寸廣五寸削約扵内旁寸著以綿組繋握手手所握者面衣及手衣皆通用餘色庶襚繼陳不用庶衆也不用不襲也多陳之為榮少納之為貴将襲具牀席扵西階西内外皆出哭扵户外其位如沐時襲者以牀席升入設扵尸東布枕席如初執服者陳襲衣扵席祝去巾加面衣設充耳著握手納舄若履凡衣死者左袵不紐将襲辟奠既襲則設之既襲乃覆以大斂之衾内外俱入復位坐哭諸尊者扵卑幼之䘮及嫂叔兄弟娣姪相哭朝晡之間非有事則休于别室乃含含含賛者奉盤水及笲笲竹器飯用粱含用璧升堂含者盥手扵户外賛者沃盥含者洗粱璧實扵笲執以入祝従入北面徹枕去楔受笲奠於尸東含者坐於床東西面鑿巾巾先覆面將含當口鑿之納飯含於尸口既含主人復位楔齒之柶與浴巾同埋於坎赴闕遣使赴於闕使者進立於西階東面南上主人詣使者前北面曰某之父某官臣某薨若母若妻各隨其稱謹遣某官臣姓某奏聞再拜使者出主人哭入復位勅使弔勅使弔使者公服入立于寢門外之西東面相者入告主人入素冠降自西階迎于寢門外見賔不哭先入立于門右北面内外皆止哭開帷帷堂之帷事畢下之使入立西階東面進主人于階下北面使者稱有勅主人再拜使者宣勅云某封位薨無封者稱姓情以惻然如何不淑主人哭拜稽顙内外皆哭使者出主人拜送于大門外親故為使弔者既出易服入向尸立哭十數聲止降出主人候勅使出升降自西階主人升降自西階者親始死未忍當主位銘銘明旌也銘帛以絳充廣幅長九尺韜杠杠明旌竿也杠之長准其絳也公以上杠為龍首也書曰某官封之柩在棺曰柩婦人之夫有官封云某官封夫人姓之柩子有官封者云太夫人之柩郡縣君各隨其稱置於宇西階上重重木刋鑿之長八尺横者半之置于庭三分庭一在南刋鑿之為懸䰛孔也以沐之米為粥實于䰛既實以踈布蓋其口繫以竹䈼懸於重木覆用葦席北向屈兩端交於後西端在上綴以竹䈼祝取銘置於重殯堂前楹下夾以葦席簾門以布又設葦障於庭陳小斂衣小斂之禮以䘮之明日各陳其斂衣一十九稱若無各隨所辦朝服一稱其餘皆常服陳於東序西領北上笏一凡斂非正色不入絺􅗽不入乃奠將小斂又奠奠饌於東堂下凡奠器皆素也瓦甒二實醴及酒觶二角柶一少牢及腊三俎籩豆各八籩實鹽脯棗粟之屬也豆實醢醬韮葅之類設盆盥於饌東布巾為奠者設盥䘮事畧故無洗贊者辟脯醢之奠於尸牀西南乃斂小斂將小斂具牀席於堂西又設盆盥於西階之西如東方為舉尸者設盥斂者盥訖興執服者以斂衣入主人以下少退西面主婦以下少退東面内外俱哭斂者斂訖覆以夷衾設牀于堂上兩楹間衽下莞上簟有枕衽尸卧之席卒斂開帷主人以下西面憑哭主婦以下東面憑哭俱南上凡憑尸父母先妻子後訖退乃斂髪斂髪男子斂髪袤巾帕頭女子子斂髪而髽主人以下立哭於尸東西面南上主婦以下坐哭於尸西東面南上祖父母以下仍哭於位各如初外姻丈夫婦人哭於位各如初斂者舉尸男女從奉之遷於堂仍覆以夷衾棺衣哭位皆如室内乃奠奠賛者盥手奉饌至階豆去盖籩俎去巾羃升奠於尸東醴酒於饌南西上訖其俎祝受巾巾之奠者徹襲奠自西階降出下帷内外俱坐有國官僚佐者以官代哭無者以親疎為之夜則為燎於庭厥明滅燎乃大斂陳大斂衣大斂之禮以小斂之明日夙興陳衣於序東三十稱無者各隨所辦各具上服一稱西領南上其餘皆常服冕具導簪纓在北内喪花釵衾一衾以黄為表素為裏乃奠奠奠於堂東階下兩甒醴及酒醴在南各加勺篚在東南肆實角觶二木柶一豆在甒北籩次之牢饌如小斂籩豆俎皆羃以功布有簟素几功布巾在饌北掘殯塪於西階之上喪從外來者殯於兩楹之間乃斂大斂將大斂棺入内外皆止哭升棺於殯所棺中之具灰炭枕席之類皆先設於棺内置棺訖内外皆哭熬穀八筐黍稷稻粱各二皆加魚腊熬穀所以惑蚍蜉令不至于棺傍燭俟於饌東設盆盥於東階東南祝盥訖升自阼階徹巾授執巾者執巾者降待於阼階下祝與賛者徹小斂之饌降自西階設於序西南當西階霤如設於堂上堂上謂尸東凡奠設於序西者事畢而去之乃適於東階下新饌所帷堂内外皆少退立哭御者斂丈夫加冠婦人加花釵覆以衾斂訖開帷主人以下西面憑哭主婦以下東面憑哭退復位次諸親憑哭訖斂者四人舉牀男女從奉之奉尸斂於棺乃加蓋覆以夷衾内外皆復位如初設熬穀首足各一筐旁各二筐以木覆棺上乃塗之設帟於殯上帟柩上承塵祝取銘置於殯乃奠奠將奠執巾几席者升自阼階入設於室之西南隅東面右几加以巾贊者以饌升入室西面設於席前祝受巾巾俎奠者降自西階以出下帷内外皆就位哭如初既殯設靈座於下室西間東向施床几案屏帳服飾以時上饍羞及湯沐皆如平生當殷奠之日不饋於下室下室謂燕寢無下室者則設靈座於殯東朝夕進常食之具於靈前如平常也廬次將成服掌事者預為廬於殯堂東廊下近南北户設苫凷於廬内諸子各一廬凡廬五品以上營之齊衰於廬南累塹為堊室俱北户翦蒲為席不縁父兄不次於殯所各在其正寢之東為廬次堊室祖為嫡孫居堊室寢有牀皆南面西出户父不為衆子次於外于庶子畧自若居寢大功於堊室之南張帷席以蒲小功緦麻於大功之南設床席以蒲婦人次於西房若殯後施下牀殯堂無房者次於後若别室成服三日成服皆除去死日數内外皆哭盡哀内外俱降就次著衰服無服者仍素服相者引主人以下俱杖三日而後食杖而後能起衆子皆杖以病故也童子婦人不能病故不杖亦不居廬不著菲屨若嫡子雖童亦杖幼不能自杖人代執之所謂當室杖者也自此以後唯嫡子及有爵之庶子皆得杖在位若其庶子之無爵者杖於他所不杖在位矣凡正寢戸内曰室户外曰堂虞杖不入室祔杖不升堂以今言之即靈堂戸之内外也周人祔在卒哭今之百日也哀衰敬生故其杖不升靈寢當堂之前其衰服及杖皆致之於廬内應杖者朝夕哭則杖之若孝子出無異適惟向殯及墳墓而已逺則乘車近則使人代執杖也升立哭於殯東西面南上齊衰以下亦升就位婦人升詣殯西位若殯逼西壁婦人皆位于殯北則南面東上尊行者坐内外皆哭盡哀諸子孫就祖父及諸父前跪哭祖父撫哭盡哀就祖母前哭亦如之女子子對祖母及諸母哭遂就祖父前哭如男子之儀唯諸父不撫之各復位伯叔母以下就主哭婦亦如之始遭親喪孝子荒迷三日不食服及成矣是以尊卑内外聚哭盡哀諸尊者降出還次主人以下降出立於階下外姻在南少退俱西面北上哭盡哀各還次闔門小功以下各歸其家自成服之後諸尊者及婦人於諸親男女之喪有事則哭於殯所無事有時須哭者或在正寢則於北壁下舒席南面坐哭父母喪食粥朝米四合暮米四合不能食粥則以米為飯婦人皆以米為飯朝夕哭奠凡朝奠日出夕奠逮日也毎日預具朝奠於東階下瓦甒二實以醴及酒觶杓疏一實以脯布羃角觶一木柶一籩一豆醢内外夙興各衰服凡言衰服應杖者皆杖以下准此男子就東階下位若升哭於殯東也其位如成服之式婦人升詣殯西位内外皆哭凡朝夕哭皆開帷質明掌事者升自阼階入徹奠出置於序西南如殯東之儀又以朝奠入至阼階豆去巾盖籩甒去羃升自阼階入設於室如初執饌者出降自西階日出後少頃内外皆止哭各還次朝夕之間主人及諸子妻妾女子子哭於其次無時至夕内外俱就位哭徹朝奠進夕奠如初儀日入内外俱止哭各還次哭者出闔門自是以後至於啟殯每朝夕如上儀既殯自大功以下異門者歸於家賓弔親故同賓至掌次者引之次賓著素服相者入告内外衰服相者引主人以下立哭於阼階下婦人升哭於殯西相者引賓入立於庭北面西上為首者一人進當主人東面立云如何不淑主人哭再拜為首者復北面位弔者俱哭十餘聲相者引出少頃相者引主人以下各還次親故哭若親故哭殯者内外俱升就殯堂位尊者坐若賓敵體以上賓初入則起賔坐亦坐賔起亦起内外俱哭相者引賓入升堂立於殯東西面南上尊者坐俱哭盡哀止卑者再拜訖乃引主人前稍南東北面執慰相者引以次出恩深者賓拜訖又哭盡哀或就孝子撫哭盡哀而止少頃相者引主人以下降還次州縣長官弔若刺史哭其所部縣令同主人設席於柩東西向刺史素服將到相者引主人去杖立於門内之右北面刺史降入升自東階即坐西向哭主人升就位哭刺史哭盡哀將起主人降復階下位刺史降出主人拜送於大門外杖哭而入刺史遣使弔若刺史遣使弔使者至掌次者引就次内外俱衰服主人以下就階下位婦人入就堂上位内外俱哭使者素服執書相者引入門而左立于階間東面使者致辭主人拜稽顙相者引主人進詣使者前西面受書退復位左右進受書主人拜送於位相者引使者出若自入弔哭如常儀客出少頃内外止哭各就次親故遣使致賻使者立於大門外之西東面従者以篚奉𤣥纁束帛立使者西南俱東面凡賻通以貨財使者隨執其物不限以𤣥纁相者入告主人立哭相者進主人前東面受命出詣使者前西面曰敢請事使之從者以篚進詣使者前西面以授使者退復位使者曰某封某官無官封者稱某字使某賻相者入告出曰孤某須矣相者引入立於内門外之西東面主人止哭使者少進東面曰某封若某官使某賻主人哭再拜使者少進坐委之興復位掌事者進坐舉之興以東相者引使者出主人拜送若使者致物不以器掌事者迓受之不委於地其餘賻物從者執之立於使者東南北面西上掌事者受之以東殷奠毎朔朢具殷奠饌於東堂下瓦甒二實以醴及酒角觶二角柶一少牢及腊三俎二簋二簠二鈃六籩六豆設盆盥於饌東布巾為奠者盥其日内外夙興衰服升就哭位質明執饌者徹宿奠遂以饌入至阼階去盖升入室設於席前酌奠訖羃俎以巾執饌者降自西階以出少頃内外各還次既出闔門及夕執饌者徹殷奠進夕奠如常禮若有薦新如朔奠薦六穀若時物新出者其日不饋於下室不饋於下室者為殷有黍稷卜宅兆既度宅兆掘四隅外其壤掘中南其壤宅𦵏居也兆塋域也南其壤者為𦵏將北首故也壤土也既朝哭主人遂哭出乘堊車詣宅兆所出國門止哭掌事者預設主人以下次於宅兆東南將到主人又哭至宅兆所主人停於次止哭莅卜者一人國官若僚佐之長莅之無者親屬為之緇布冠不緌布深衣因喪屨莅卜者非國官則吉冠素服也祝及卜師凡行事者皆吉冠素服掌事者布卜筮席於兆南北向西上相者引莅卜筮者及祝立於卜筮席西南東面南上卜師筮師立於祝南東面北上相者引主人詣卜筮席南十五步許當内壤北向相者立於主人之左少南俱北向諸賓及從者立於筮席東南重行西面諸親北上諸賓南上立定相者少進東面稱事具退復位主人免首絰左擁之莅卜者進立於主人東北西面卜師抱龜筮師開韇出䇿兼執之韇蔵䇿器執韇以擊䇿擊之以動其神進立於莅卜前東面南上莅卜者命曰孤子姓名為父某官封某甫度兹幽宅無有後艱某甫父字無封者去封宅居也度謀也言為父卜𦵏居今謀此以為幽㝠處得無有後之艱難乎謂有非常崩壊若内喪云為某母夫人某氏卜師筮師俱曰諾遂述命訖右旋就席北面坐命龜筮曰假爾泰龜有常假爾泰筮有常指中封遂卜筮訖興各以龜筮東面稱占曰從還本位主人絰哭從者哭盡哀止相者進主人之左東面稱禮畢相者引主人退立於東南隅西面又相者引卜者立於主人之後重行西面俱北上掌事者徹卜席當安墓處立一標又於四隅各立一標當南門兩廂各立一標祝師掌事者入鋪后土氏神席於墓左南向設酒樽於神座東南加勺羃設洗於酒樽東向罍水在洗東篚在洗西南肆篚實以巾爵加羃相者引告者及祝與執樽罍篚者俱立於罍洗東南重行西面以北為上國官若僚佐之長告若無國官僚佐者親賓及主人告之主人告者俱去絰杖立定俱再拜祝與執樽罍篚者先立于樽罍篚之後執饌者以脯醢跪設於神座前興還本位相者引告者詣罍洗盥手洗爵詣酒樽所酌酒進跪奠於神座前興少退北向立祝持版進於神座之右東面跪讀祝文曰維年月日朔子某官姓名若主人自告父稱孤子母稱哀子姓名敢昭告於后土氏之神今為某官姓名若主人自告云為父母官封某甫母云太夫人若郡君某氏各隨官稱之營建宅兆神其保祐俾無後艱謹以清酌脯醢祇薦於后土之神尚饗訖興告者再拜相者引告者還本位西面再拜引出掌事以下俱復位再拜遂徹饌席樽罍以出主人哭還去墓三里許止哭及國門又哭内外升哭於位主人入升詣殯前北面哭盡哀止哭西面再拜降就次有國官僚佐從主人入就門内哭主人拜俱再拜主人降就次各就次若不從又卜筮擇地如初儀卜𦵏日既朝哭主人及諸子以下出立於殯門外之東壁下西面北上國官僚佐之長莅卜無國官僚佐者親賓為之行事者俱吉服立於門西東面南上卜師抱龜在其南東面闔門東扇主婦立於其内掌事者設卜席於閾外闑西相者詣主人前東面告事具遂引主人立於門南北面相者立於主人之左少退俱北面主人免首絰左擁之莅卜者進立於主人東北西面卜師少進莅卜前東面受命莅卜命曰孤子某來日謀卜𦵏其父某官封某甫母云為其母太夫人某氏考降無有近悔考登也降下也言卜此日𦵏惟神上下得無近於咎悔也卜師曰諾遂述命訖右旋進就席西面坐命龜曰假爾泰龜有常乃作訖興以龜退東面稱占曰從主人絰興諸子以下哭盡哀相者告於主婦哭入遂使人告於親賓諸親及僚友卜日不來者卜師以龜退掌事者徹卜席相者進告禮畢主人興諸子以下入升詣殯前北面立哭内外俱哭盡哀内外各還次若不從又卜擇如初儀啟殯𦵏有期前一日之夕掌事者除帷障備啟奠具饌如大斂為次於大門外之右南向内外夕哭如常儀啟殯之日内外夙興衺服主人及諸子皆去冠絰以衰巾帕頭國官亦以衺巾帕頭内外升階就位哭尊行者坐國官及僚佐就下位哭祝衰服執功布功布長五尺升自東階詣殯南北向内外皆止哭祝三聲噫嘻乃曰謹以吉辰啟殯既告内外皆哭盡哀内外各還次祝降與執饌者升徹宿奠如常祝取銘置於重掌事者升徹殯塗訖設席於柩東升柩於席上又設席於柩東祝執功布升以拂柩覆用夷衾降出周設帷東面開户相者引主人以下升哭於帷東西向妻妾女子子以下哭於帷西東向俱南上諸祖父以下南面東上外姻丈夫帷東北面西上婦人帷西北面東上尊者坐内外皆哭祝與進饌者各以奠升設於柩東席上祝酌醴奠之内外俱哭於位如未成服之禮親賓致奠如别儀有國官僚佐者以官代哭無者以親疎為之晝夜不絶聲贈諡告贈諡于柩無贈者設啟奠訖即告諡其日主人升立于饌東西面祝持贈諡文升自東階進立於柩東南北向内外皆止哭祝少進跪讀文訖興主人哭拜稽顙内外應拜者皆再拜祝進跪奠贈諡文于柩東興退復位内外皆就位坐哭親賓致奠啟之日親賓致奠於主人設啟奠後諸奠者入立於寢門之外東向謂卑幼者其有故則遣使祭具陳於奠者東南北向西上相者入告内外卑者皆興立哭於位又相者引奠者入升當柩東西面奠者哭祭具從升陳於柩東奠者之西西向南上設饌訖執饌者降出奠者止哭詣酒樽所取爵酌酒跪奠於柩東興少退西面立内外皆止哭奠曰某封若某位伯叔各隨官爵稱之將歸幽宅奉奠若異姓各從其稱若使者云某封若某姓位聞某封若某官將歸幽宅使某奉辭奠畢應拜者再拜内外皆哭主人再拜稽顙奠者哭盡哀止相者引出執事者以次徹饌而出大唐開元禮卷一百三十八
