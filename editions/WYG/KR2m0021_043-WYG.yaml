body:
  text: 大唐開元禮卷四十三唐蕭嵩等撰吉禮肅明皇后廟時享有司攝事齋戒陳設省牲器晨祼饋食齋戒將享有司􅁲日如别儀前享七日平明太尉誓百官於尚書省曰某月某日時享於肅明皇后廟各揚其職不供其事國有常刑凡預享之官散齋四日致齋三日散齋皆于正寝致齋二日于本司一日于齋坊無本司者皆于齋坊散齋理事如舊唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯享事得行其餘悉斷其享官已齋而闕者通攝行事諸享官致齋之日給酒食及明衣各習禮於齋所光禄卿監取明水火太官令取水于陰鑒取火于陽燧火以供爨水以實樽前享一日諸衛令其屬未後一刻各以其方器服守衛廟門每門二人每隅一人與太樂工人俱清齋一宿陳設前享三日右校清掃内外守宫設享官公卿以下次於齋坊之内前享二日太樂令設官懸之樂於廟庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹路鼓於北懸之内道之左右植建鼓於四隅置柷敔於懸内柷在左敔在右設歌鐘歌磬於廟堂之上前楹間北向磬簴在西鐘簴在東其匏竹者立於階間重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上前享一日奉禮設享官公卿位於東門之内道北執事位在道南每等異位俱重行西向以北為上設御史位於廟堂之下一位於東南西向一位於西南東向令史各於其後設奉禮位於樂懸東北贊者二人在南差退俱西面設恊律郎位於廟堂之上前楹間近西東向設太樂令位於北懸之間北向設門外位享官公卿以下皆於東門之外道南每等異位重行北面西上設牲牓於東門之外當門西向以南為上設廩犧令位在牲西南史陪其後俱北向設太祝位於牲東當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北又設御史位在太常卿之西俱南向設樽彜之位於廟堂之上前楹間於室户之左北向春夏雞彜一鳥彜一犧樽二象樽二山罍二秋冬斚彜一黄彜一著樽二壺樽二山罍二皆加勺羃羃皆以黼皆西上各有坫以置瓚爵設簠簋鈃登籩豆之位於堂上俱東側階之北四簋居前四簠次之次以六登次以六鈃籩豆為後皆以南為上屈陳而下設洗於東階東南北向罍水在洗東篚在洗西南肆篚實以珪瓚巾爵執樽罍者位在樽罍之後省牲器省牲之日午後十刻廟所諸衛之屬禁斷行人太廟令整拂神幄座晡後二刻太廟令帥府史二人及齋郎以樽坫罍洗篚羃及籩豆鈃登入設於位加以巾蓋凡物噐皆濯而陳之晡後三刻太祝與廪犧令以牲就牓位謁者引太常卿贊引引御史入詣東陛升遍視滌濯於上凡導引者每曲一逡巡于視滌濯執樽者皆舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位太祝巡牲一匝西面舉手曰充還本位太祝與廩犧令以次牽牲詣厨授太官謁者引光禄卿詣厨省鼎鑊申視濯溉贊引引御史就厨省饌具太常卿每事訖各還齋所進饌者入徹籩豆簋簠鈃登以出享日未明十五刻太官令帥宰人以鸞刀割牲祝史取毛血共實一豆遂烹牲祝史洗肝於鬱鬯又取膟膋共實一豆置於饌所晨祼享日未明四刻諸享官各服其服太廟令良醖令各率其屬入實樽罍雞彜斚彜及犧樽象樽著樽壺樽之上樽皆實以明水山罍之上樽實以𤣥酒鳥彛黄彛實以鬱鬯犧樽實以醴齊壺樽實以盎齊山罍實以清酒太官令帥進饌者實諸籩豆簋簠未明三刻奉禮帥贊者先入就位贊引引御史博士太祝宫闈令及令史祝史與執樽罍篚羃者各就位贊引引御史太祝詣東陛升堂行掃除於上令史祝史行掃除於下訖引降復位未明二刻贊引引太廟令太祝宫闈令詣東陛升堂太祝宫闈令入室開埳奉出神主置於座引太廟令以下降復位未明一刻謁者贊引各引享官俱就東門外位太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西其升堂者皆脱屨於下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣東陛升堂行掃除於上降行樂懸於下訖引復位初司空行樂懸訖贊引引享官以下次入就位立定奉禮曰衆官再拜衆官在位者皆再拜訖謁者進太尉之左白有司謹具請行事退復位恊律郎跪俯伏舉麾凡取物者皆俯伏而取以興奠物則奠訖而後興鼓柷奏永和之樂乃以黄鐘之均作文舞之舞樂舞九成黄鐘三奏大吕太蔟應鐘各再奏偃麾戛敔樂止凡樂舉麾而作戞敔而止奉禮曰衆官再拜衆官在位者皆再拜謁者引太尉詣罍洗盥手洗瓚訖謁者引太尉升自東階詣樽彛所執樽者舉羃太尉酌鬱酒訖登歌作肅和之樂以圜鐘之宫謁者引太尉入詣神座前北面跪以鬯祼地奠之興謁者引太尉出北向再拜訖登歌止謁者引太尉降復位初衆官拜訖祝史奉毛血及肝膋之豆立於東門外齋郎奉爐炭蕭稷黍立於肝膋之後於登歌止祝史奉毛血肝膋與奉爐炭蕭稷黍者以次入自正門升自泰階太祝迎毛血肝膋於階上奠於神座前祝史退立於樽所齋郎以蕭黍各置於爐炭下降自阼階以出太祝取肝膋出户燔於爐炭還樽所饋食太尉既升祼太官令出帥進饌者奉饌陳於東門之外重行西向以南為上謁者引司徒出詣饌所司徒奉饌初太尉既至位太官令引饌入自正門俎初入門雍和之樂作以無射之均饌至階樂止祝史進徹毛血之豆降自阼階以出饌升太祝迎引於階上設於神座前謁者引司徒以下降自阼階復位太祝取蕭稷黍擩於脂燔於爐炭還樽所贊者引太尉詣罍洗盥手洗爵訖升自阼階詣樽彛所執樽者舉羃太尉酌醴齊訖坤貞之舞作謁者引太尉入詣神座前北向跪奠爵出户北向立樂止太祝持版進於室戸外之右東面跪讀祝文曰維某年嵗次月朔日子孝子開元神武皇帝某謹遣攝太尉某官臣某敢昭告於皇妣肅明皇后劉氏氣序流邁時惟孟春永懷罔極伏增逺感謹以一元大武柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊敬修時享以申追慕尚饗讀訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座出還樽所太尉拜訖樂止太祝以爵酌罍福酒合置一爵一太祝持進太尉之左東向立太尉再拜受爵跪祭酒啐酒奠爵興太祝減神前三牲胙肉皆取前脚第二骨加於俎又以籩取稷黍飯興還樽所以胙肉置一俎上以飯置籩豆以飯授太尉太尉以授齋郎又以俎肉次授太尉太尉每授即以授齋郎訖太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戞敔樂止初太尉將復位謁者引太常卿詣罍洗盥手洗爵訖升自阼階詣樽彛所執樽者舉羃太常卿酌盎齊武舞作謁者引太常卿入詣神座前北面跪奠爵謁者引太常卿出户北向再拜訖太祝以爵酌罍福酒一爵持進太常卿之左北向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太常卿再拜訖降復位太常卿獻將畢謁者引光禄卿詣罍洗盥手洗爵酌盎齊之禮一如亞獻之儀訖光禄卿降復位武舞止登歌作雍和之樂太祝入室徹豆還樽所徹者籩豆各一少移於故處登歌止奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜永和之樂作奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之左白禮畢謁者贊引各引享官以次出贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出宫闈令納神主如常儀其祝版焚於齋坊大唐開元禮卷四十三
