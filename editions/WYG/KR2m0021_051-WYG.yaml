body:
  text: 大唐開元禮卷五十一唐蕭嵩等撰吉禮薦新于太廟季夏祭中霤于太廟孟冬祭司寒納冰開冰附興慶宫祭五龍壇薦新于太廟薦新之日太廟令帥齋郎灑掃于廟之内外太官預饌所薦之物于神厨若有酒者廟司設尊坫罍洗如常式謁者引太常卿入立于門東之内道北面南謁者贊引稱再拜太常卿再拜進饌者奉饌入自正門升自太階各設於神坐前籩豆盖羃徹之如式訖降自東階以出謁者引太常卿升自東階詣獻祖室户前盥洗酌獻訖再拜又再拜若無酒即俱再拜訖謁者引太常卿復位謁者贊拜太常卿再拜訖謁者引出冬魚蕨笋蒲白韭堇眢豆小豆蘘荷菱人子薑菱索春酒桑落酒竹根梁米黄米粳米糯米稷米茄子甘子甘蔗藕芋子鷄頭人苜蓿蔓菁胡𤓰冬𤓰瓠子春魚水蘇枸杞茨子藕油麻櫻桃麥子椿頭蓮子粟米榛李杏林檎橘椹菴羅果棗脾麞鹿野鷄薦新物皆以品物時新堪供進者所司先送太常令尚食相與簡擇仍以滋味與新物相冝者配之以薦皆如上儀祭中霤季夏土王日祭中霤于太廟之庭前祭三日諸享官散齋二日于正寢致齋一日於廟所散齋理事如舊唯不弔䘮問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祭事得行其餘悉㫁其祭官已齋而闕者通攝行事前祭一日衛尉陳設如常祭日未明十刻太官丞具特牲之饌未明一刻太廟令帥其屬入布神坐於廟庭西四門之内道南東向席以莞設神位于坐首設酒樽于神坐東南設洗又於酒樽東南俱北向罍水在洗東篚在西南肆篚寔以巾爵奉禮設太廟令位於神坐東南執事者位於其後俱北向西上設門外位皆於東門之外道南重行北向以西為上質明諸行事之官各服其服良醖之屬入實樽罍太官丞監寔籩豆簠簋贊引引太廟令又贊引引執事者俱就門外位太祝與執樽罍篚羃者先入詣神坐前西向再拜訖各就位立定贊引引太廟令又贊引引執事者入就位贊引贊拜太廟令以下皆再拜太官令丞出詣饌所贊引進太廟令之左白有司謹具請行事退復位太官丞引饌入太祝迎引于坐首設于神坐前訖太官丞以下還本位太祝還樽所贊引引太廟令詣罍洗盥手洗爵詣酒樽所執樽者舉羃太廟令酌酒贊引引太廟令進神坐前西向跪奠爵俛伏興少退西向立太祝持版進於神坐之右北向跪讀祝文曰維某年嵗次月朔日子嗣開元神武皇帝謹遣具位姓名敢昭告于中霤頼兹保飬甿庶以安式荷神功祗率恒禮爰以特牲薌合薌萁嘉蔬嘉薦醴酒明祀于神尚饗訖興太廟令再拜太祝進跪奠版於神坐俛伏興還樽所太祝以爵酌福酒進太廟令之左北面立太廟令再拜受爵跪祭酒遂飲卒爵太祝進受爵還尊所太廟令俛伏興再拜贊引引還本位太祝進跪徹豆俛伏興還樽所徹者少移于故處太祝與執樽罍篚羃者俱復位立定贊引贊拜太廟令以下皆再拜贊引進太廟令之左白禮畢遂引太廟令以下出其祝版燔于齋坊祭司寒納冰納冰開冰禮附前三日諸祭官散齋二日於家正寢致齋一日於祭所右校掃除祭所衛尉陳設如常祭日未明十刻太官丞具特牲之饌未明一刻郊社丞入布神坐於廟北南向設神位於坐首又帥其屬設酒樽於神坐東南設洗於酒樽東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍篚者各位於樽罍篚之後上林令設桃弧棘矢於冰室户内之右祭訖遂留之奉禮設上林令位於神坐東南執事者陪其後俱重行西向以北為上質明上林令以下各服其服郊社丞良醖令之屬入實樽罍太官丞監實籩豆簠簋贊引引上林令又贊引引執事者俱就門外位立定太祝與執樽罍篚者先入立於神前北向俱再拜訖各就位贊引引上林令又贊引引執事者俱入就位立定贊引贊拜上林令以下皆再拜太官丞出詣饌所贊引進上林令之左白有司謹具請行事退復位太官丞引饌入太祝迎于坐首設於神座前訖太官丞以下還本位太祝還樽所贊引引上林令盥手洗爵詣酒樽所執樽者舉羃上林令酌酒贊引引上林令進神坐北向跪奠爵俛伏興少退北向立太祝持版進于神坐之右東面跪讀祝文曰維某年歳次十月朔日開元神武皇帝謹遣某官姓名昭告於𤣥㝠之神順兹時令増冰堅厚式遵常典將納凌隂謹以𤣥牡秬黍嘉薦清酌明祀于神尚饗訖興上林令再拜太祝進跪奠版于神坐俛伏興還樽所太祝以爵酌福酒進上林令之右西向立上林令再拜受爵跪祭酒遂飲卒爵太祝進受爵復于樽所上林令跪俛伏興再拜贊引引還本位太祝進跪徹豆俛伏興還樽所徹者少移于故處太祝與執樽罍篚者俱復位立定贊引贊拜上林令以下皆再拜贊引進上林令之左白禮畢贊引引上林令以下出其祝版燔於齋坊興慶宫祭五龍壇將祭有司筮日如别儀前祀三日諸預祭之官散齋二日致齋一日散齋於寢致齋於祀所散齋理事如舊惟不弔䘮問疾不作樂不行刑罰不判署刑殺文書不預穢惡致齋惟祭事得行其餘悉㫁其祭官已齋而闕者通攝行事前祭二日守宫設祭官次於東壝之外道南北向以西為上設陳饌幔於内壝東門之外道南北向太樂令設判懸之樂於壇南右校掃除壇之内外前祀一日晡後一刻諸衛令其屬各以其方器服守衛壝門清齋一宿奉禮設獻官位於南壝東南西向執事位於獻官東南俱西向北上設奉禮位於獻官西南贊者二人在南差退設祭官以下門外位於東壝之外道南每等異位重行北向以西為上郊社令帥齋郎設散樽五龍各二於壇上東南隅北向西上尊皆加勺羃有坫以置爵設洗於壇東南北向罍水在洗東篚在洗西南肆篚實巾爵執樽罍篚羃者各位於樽罍篚羃之後祀日未明十五刻太官令帥宰人以鸞刀烹牲於厨牲以少牢未明二刻郊社令帥齋郎各服其服升設五龍坐于壇上近北南向東上席以莞設神位各於坐首未明一刻祭官以上各服其服郊社令與良醖之屬入實樽罍太祝以幣置于篚太官令帥進饌者實諸籩豆簋簠等設于饌幔内質明謁者引獻官以下就門外位奉禮帥贊者先入就位執樽罍篚羃者入當壇南重行北向以西為上立定奉禮曰再拜賛者承傳執樽罍篚羃者皆再拜訖執樽罍篚羃者自東陛升立于樽所各就位太樂令帥工人入就位謁者進獻官之左白有司謹具請行事退復位協律郎跪俛伏舉麾鼓祝乃以姑洗之均樂舞三成偃麾戞敔樂止奉禮曰衆官再拜在位者皆再拜訖復位太祝取幣於篚立于樽所太官令帥進饌者奉饌陳於東門外謁者引獻官詣南陛升北向立太祝以幣授獻官獻官受幣登歌作以南吕之均謁者引獻官進北面跪奠於青龍之坐前諸坐皆太祝助奠俱畢獻官再拜訖登歌止謁者引獻官降自南陛還本位太官令引饌入升自南階太祝迎引于壇上設饌於神坐訖降復位謁者引獻官詣罍洗盥手洗爵訖引升南陛詣罍所執樽者舉羃獻官酌酒謁者引進神坐前北向跪奠爵于青龍之坐太祝等助奠諸生俱畢少退向北立太祝持版進于青龍坐之右東向跪讀祝文訖祝文臨時製撰獻官再拜太祝進跪奠版于神坐俛伏興還樽所太祝以爵酌罍福酒進獻官之右西向立獻官再拜受爵跪祭酒奠爵興太祝帥齋郎進俎太祝跪減神前胙肉興以授獻官獻官受以授齋郎獻官跪取爵遂飲卒爵太祝進受爵復于坫獻官再拜謁者引降復位太祝跪徹豆俛伏興還樽所奉禮曰賜胙贊者唱衆官再拜在位者皆再拜獻官不拜奉禮又曰再拜在位者俱再拜謁者進獻官之左白禮畢遂引獻官以下出太祝以下復執事位立定奉禮曰再拜太祝再拜訖其祝版燔於齋所如沈玉於川臨時别取進止大唐開元禮卷五十一
