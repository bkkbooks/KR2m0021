body:
  text: 大唐開元禮卷一百二十七唐蕭嵩等撰嘉禮鄉飲酒鄉飲酒之禮刺史為主人此為貢人之中有明經進士身兼徳行孝弟灼然顯著旌表門閭及秀才者皆刺史為主人若無此色皆判司攝行事先召鄉之致仕有徳者謀之賢者為賔其次為介又其次為衆賔與之行禮而賔舉之介以下無其人則闕主人戒賔立於賔大門外之西東面賔立於東階下西面將命者立於賔之左北面受命出於門外之東西面曰敢請事主人曰某日行鄉飲酒之禮請某子臨之將命者入告賔出立於門東西面北向拜辱以白造緇曰辱主人答拜主人曰吾子學優行髙應兹觀國某日展禮請吾子臨之賔曰某固陋恐辱命敢辭主人曰謀於父師少師莫若吾子賢敢固以請賔曰夫子申命之某敢不敬須主人再拜賔答拜主人退賔拜送主人戒介亦如之介辭曰某日行鄉飲酒之禮請吾子貳之其日質明設賔席於楹間近北南向設主人席於阼階上西向設介席於西階上東向設衆賔席於三賔席之西各南向皆不屬焉又設堂下衆賔席於西階西南東面北上設兩壺於賔席東少北𤣥酒在西加勺羃置篚於壺南東肆實以爵觶設賛者位於東階東西面北上賔介及衆賔至立於㕔事大門外之右東向北上執事者俱就位主人迎賔於門外之左西面拜賔賔答拜又西南向拜介介答拜又西南揖衆賔衆賔揖主人又揖賔賔報揖主人先入門而右西面賔入門而左東面介及衆賔序入立於賔西南東面北上衆賔非三賔者皆北面東上凡賔主拜揖周旋皆有賛相也主人將進揖當階揖賔皆報揖至階主人曰請吾子升賔曰某敢辭主人曰固請吾子升賔曰某敢固辭主人曰終請吾子升賔曰某敢終辭主人升自阼階賔升自西階當榻北面立執樽者徹羃主人適篚跪取爵興適樽實之進賔席前西北面獻賔賔西階上北面拜主人少退賔進席前受爵退復西階上北面立主人退於阼階上北面拜送爵賔少退賛者薦脯醢於賔席前賔自西方升席南面立賛者設折俎賔跪左執爵右取脯擩於醢祭於籩豆之間遂祭酒啐酒啐嘗也興降席東適西階北面跪卒爵執爵興適樽實之進主人席前東南面酢主人主人於阼階上北面拜賔少退主人進席前受爵退復阼階上北面立賔退復西階上北面拜送爵賛者薦脯醢於主人席前主人由席東自北方升賛者設折俎主人跪左執爵右祭脯醢遂祭酒啐酒興自南方降席復阼階上北面跪卒爵執爵興跪奠爵於東序端興退適篚跪取觶實之以酬賔復阼階上北面跪奠觶遂拜執觶興賔西階上答拜主人跪祭遂飲卒觶執觶興適樽實之進賔席前北面賔西階上拜主人少退賔既拜主人跪奠觶於薦西興復阼階上位賔遂進席前北面跪取觶興復西階上位主人北面拜送賔進席前北面跪奠觶於薦東興復西階上位酬酒不舉者君子不盡人之歡以全交也主人北面揖遂降立於阼階下西面賔降立於西階西當西席東面主人將與介為禮故賔不居堂上位主人進延介主人揖介介報揖至階一讓主人升阼階介升西階當榻賔北面主人詣東序端跪取爵興適樽實之進於介席前西南面獻介介西階上北面拜主人少退介進席前北面受爵退復位主人於介右北面拜送爵介少退主人立於西階之東賛者薦脯醢於介席前介由席西自北方升席賛者設折俎介跪左執爵右祭脯醢遂祭酒執爵興自南方降席復西階上北面跪卒爵執爵興介授主人爵主人適樽實之以酢於西階上立於介右北面跪奠爵遂拜執爵興介答拜主人跪祭遂飲卒爵執爵興退跪奠爵於西楹南還阼階上揖降介降立於賔南主人於阼階前西南面揖衆賔賔揖遂升主人適西楹南跪取爵興適樽實之於西階上南面獻衆賔之長升西階上北面拜受爵主人於衆賔長之右北面拜送賛者薦脯醢於其席前衆賔之長升席跪左執爵右祭脯醢祭酒執爵興退於西階上立飲訖授主人爵降復位主人又適樽實之進於西階上南面獻衆賔之次者如獻衆賔長之禮又次一人升飲亦如之主人適樽實之進於西階上南面獻堂下衆賔衆賔每一人升受爵跪祭立飲賛者遍薦脯醢於其位訖主人受爵奠於篚主人降與賔一揖一讓升賔介衆賔序升即席設工人席於堂亷西階之東北面東上工四人入先二瑟後二歌工持瑟升自西階就位坐工歌鹿鳴卒歌笙入立於堂下北面奏南陔訖乃間歌南有嘉魚笙崇丘間代也謂一歌則一吹也乃合樂周南關雎召南鵲巢合謂歌與樂衆聲俱作也樂無工人則闕無得作淫聲不雅之曲樂正告賔曰正歌備告訖司正升自西階司正謂主人之賛禮者禮樂之正既成將留賔為有懈惰立司正以監之跪取觶於篚興適樽實之降自西階詣階間右還北面跪奠觶興拱手少立跪取觶揚觶訖遂飲卒觶跪奠觶興拜退復西階西賔降席跪取觶於篚適樽實之詣阼階上北面酬主人主人降席進立於賔東初起旅酬也凡旅酬者少長以齒也賔跪奠觶遂拜執觶興主人答拜賔立飲卒觶賔適樽實之進阼階上東南面授主人主人再拜賔少退主人受觶賔於主人之西北面拜送旅酬同階禮殺賔揖復席主人進西階上北面酬介介降席自南方進立於主人之西北面主人跪奠觶遂拜執觶興介荅拜主人立飲卒觶適樽實之退西階上西南面立介拜主人少進介受觶主人立於介東北面拜送主人揖復席司正升自西階近西北面立相旅曰某子受酬受酬者降席自西方進北面立於介右旅序也於是介酬衆賔又以次序相酬也某者衆賔姓也同姓則以伯仲别之又同則以其字别之受酬者由介東尊介使不失故位也司正退立於西序端東面避受酬者又便其賛上賛下也介跪奠觶遂拜執觶興某子答拜介立飲執觶適樽實之進西階上西南面授某子某子受觶介立於某子之左北面揖復席司正曰某子受酬受酬者降席自西方立於某子之左北面某子跪奠觶遂拜執觶興受酬者拜某子答拜某子立飲卒觶適樽實之進西階上西南面授之受酬者受觶某子立受酬者之右揖復席次一人及堂下衆賔受酬亦如之卒受酬者以觶跪奠於篚興復階下位司正適阼階上東面受命於主人主人曰請坐於賔司正逥北面告於賔曰請賔坐賔曰唯命賔主之辭皆司正傳請也賔主各就席坐若賔主俱公服者則皆降脱履主人先左賔先右禮畢降納如常司正降復位乃羞羞進也所進肉胾醢之類是也無算爵算數也賔主燕飲爵行無數醉而止三賔以上賛者二人行爵以下取足主人之賛者皆與焉燕訖賔主俱興賔以下降自西階主人降自東階賔以下出立於門外之西東面北上主人送於門外之東西面再拜賓介逡巡而退大唐開元禮卷一百二十七
