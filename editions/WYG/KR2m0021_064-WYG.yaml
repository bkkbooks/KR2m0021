body:
  text: 大唐開元禮卷六十四唐蕭嵩等撰吉禮皇帝禪於社首山齋戒制度陳設省牲器鑾駕出宫薦玉帛進熟封檢鑾駕還宫朝覲羣臣考制度齋戒前祭七日太尉誓百官於行從尚書省曰某月某日皇帝禪於社首山各揚其職不供其事邦有常刑皇帝散齋四日致齋三日諸應齋者皆如封太山之儀光禄卿監取明水火太官令取水於隂監取火於陽燧火以供爨水以寔尊也制度將祭将作預於社首山禪所為禪祭壇如方丘之制八角三成每等髙四尺上濶十六歩設八陛上等陛廣八尺中等陛廣一丈下等陛廣一丈二尺為三重壝量地之宜四面開門玉冊石䃭玉匱金匱金泥檢距圓封立碑等並如封祀之儀陳設前祭三日尚舍直長施大次於外壝東門之内道北尚舍奉御鋪御座守宫設文武侍臣次於大次前各分左右相向設諸祭官次於東壝之外道南從祭文官九品以上於祭官之東皇親諸親又於其東東方南方蕃客又於其東重行每等異位北面西上介公酅公扵西壝之西道南武官九品以上扵介公酅公之西西方北方蕃客又扵其西俱重行每等異位北向東上其褒聖侯於文官三品以下若有諸州使人分方各於文武官之後設陳饌幔於内壝東西門之外道北南向壇上及東方之饌陳於東門外南方西方北方之饌陳於西門外前祭二日太樂令設宫懸之樂於壇南内壝之外東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹靈鼓於北懸之内道之左右植建鼓於四隅置柷敔於懸内柷在左敔在右設歌鐘歌磬於壇上近南北向磬簴在西鐘簴在東其匏竹者立於壇下重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上右校掃除壇之内外又為瘞埳於壇之壬地外壝之内方深取足容物南出陛前祭一日奉禮設御座於壇之東南西向設祭官公卿位於内壝東門之外道南分獻之官於公卿之南執事者位於其後每等異位俱重行西面北上設御史位於壇下一位於東南西向一位於西南東向令史各陪其後設奉禮位於樂懸東北贊者二人在南差退俱西向設協律郎位於壇上南陛之西東向設太樂令位於北懸之間北向又設望瘞位於壇之東北西向設從祀之官位文官九品以上於執事之南皇親諸親又於其南東方諸州刺史縣令又於其南俱每等異位重行西面北上酅公介公位於内壝西門之外道南武官九品以上於酅公介公之後當文官西方北方蕃客於武官之南每等異位重行東面北上其褒聖俟於文官三品以下若有諸州使人分方各於文武官之後設祭官從祭羣官門外位於東西壝門之外道南皆如設次之式設牲牓於東壝之外當門西向南上黄牲一居前正坐又黄牲一在北少退配坐黝牲一在南少退神州設廩犧令位於牲之西南祝史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北又設御史位於太常卿之西俱南向設酒樽之位皇地祇太樽二著樽二犧樽二山罍二在壇上東南隅北向象樽二壺樽二山罍四在壇下南陛之東北隅俱西向設配帝著樽二犧樽二象樽二山罍二在壇上皇地祇酒樽之東北向西上神州太樽二在第一等每方岳鎮海瀆俱山樽二山林川澤各蜃樽二丘陵以下各散樽二皆於壇下凡樽各設於神坐之左而右向尊皆加勺羃配帝以上有坫置爵設御洗於壇南陛東南亞獻之洗於東陛之南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設分獻罍洗篚羃各扵其方陛道之左俱内向執樽罍篚羃者各扵樽罍篚羃之後設玉幣之篚於壇上樽坫之所祭日未明五刻太史令郊社令各服其服升設皇地祇神坐於壇上北方南向席以藁秸設睿宗大聖真皇帝坐於東方西面席以莞設神州地祇坐於第一等東南方席以藁秸又設岳鎮以下之坐於内壝之内各於其方嵩岳以下之坐於壇之西南俱内向席皆以莞設神位各於坐首省牲器省牲之日午後十刻去壇二百歩所諸衛之屬禁㫁行人晡後二刻郊社令帥府史二人齋郎以樽坫罍洗篚羃入設於位升壇者自東陛晡後三刻諸太祝與廩犧令以牲就牓位謁者引太常卿贊引引御史入詣壇東陛升視滌濯凡導引者每曲一逡廵於視滌濯執樽者皆舉羃告潔引降就省牲位南向立廩犧令少前白請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西向舉手曰充俱還本位諸太祝與廪犧令以次牽牲詣厨授太官岳鎮以下羊豕依令預偹如常儀謁者引光禄卿詣厨省鼎鑊申視濯溉贊引引御史詣厨省饌具太常卿以下毎事訖各還齋所祭日未明十五刻太官令帥宰人以鸞刀割牲齋郎以豆取黄牲之毛血祝史以豆取毛血各置於饌所遂烹牲鑾駕出行宫如封太山之儀薦玉帛祭日未明三刻諸祭官及從祭之官各服其服郊社令良醖令各帥其屬入寔樽罍及玉幣凡六尊之次大尊為上實以汎齊著尊次之實以醍齊犧尊次之實以盎齊象尊次之實以醴齊壺尊次之寔以沈齊山罍為下寔以清酒配帝著尊為上實以汎齊犧尊次之寔以盎齊山罍為下實以清酒神州太尊寔以汎齊岳鎮海瀆之山尊寔以醍齊山川林澤之蜃尊寔以沈齊丘陵以下之散尊寔以醴齊齊皆加明水𤣥酒各寔於上尊禮神之玉皇地祇以黄琮幣以黄配帝之幣如之神州之玉以兩珪有邸幣以𤣥五岳四瀆海鎮之幣各從方色並各長一丈八尺與册等各設奠於尊坫之所太官令帥進饌者寔諸籩豆簋簠等皆設於饌幔内未明二刻奉禮帥賛者先入就位賛引引御史諸太祝及令史祝史與執樽罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽罍篚冪者各就位贊引引御史諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖各引就位駕將至謁者贊引各引祭官通事舍人分引從祭羣官諸方客使俱就門外位駕至大次門外迴輅南向千牛將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅乗輿之大次繖扇華盖侍衛如常儀郊社令以祝版進御署訖近臣奉出郊社令受各奠於坫謁者引文武五品以上從祭之官皆就壝外位太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西其升壇者脫履扵下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛行掃除於上降行樂懸於下訖謁者贊引各引祭官及從祭羣官客使等次入就位皇帝停大次半刻頃太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝出次華盖侍衛如常儀侍中負寳陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至中壝門外殿中監進大珪尚衣奉御又以鎮珪授殿中監殿中監受進皇帝搢大珪執鎮珪華盖仗衛停於門外近侍者從入如常皇帝至版位西向立毎立定太常卿與博士退立於左太常卿前奏請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼓柷奏順和之樂乃以林鐘之均文舞作樂舞八成休鐘太蔟姑洗南吕各再奏偃麾戛敔樂止凡樂皆協律郎舉麾工鼔柷而後作偃麾戞敔而後止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太祝取玉於篚立於樽所太常卿引皇帝太和之樂作皇帝毎行皆作太和之樂皇帝詣壇升自南陛侍中中書令以下及左右侍衛量人從升以下皆如之皇帝升壇北向立樂止太祝以玉授侍中侍中奉玉東向進皇帝搢鎮珪受玉幣凡受物皆搢鎮珪奠訖執鎮珪俛伏而後興登歌作肅和之樂以應鐘之均太常卿引皇帝進北向跪奠於皇地祇神坐俛伏興太常卿引皇帝少退北向再拜訖太常卿引皇帝立於東方西向又太祝以幣授侍中侍中受幣北向進皇帝受幣太常卿引皇帝東向跪奠於睿宗大聖真皇帝神坐俛伏興太常卿引皇帝少退東向再拜訖登歌止太常卿引皇帝樂作皇帝自南陛降還版位西向立樂止皇帝將奠配帝之幣諸太祝奉玉幣等各進奠於神坐訖還樽所初羣官拜訖祝史各奉毛血之豆立於門外于登歌止祝史奉毛血入正坐升自南陛配坐升自東陛神州之坐升自己陛諸太祝迎取於壇上各進奠於神坐前諸太祝與祝史退立於樽所進熟皇帝既升奠玉幣太官令帥進饌者奉饌陳扵内壝門外謁者引司徒出詣饌所司徒奉皇地祇之俎初皇帝復位樂止太官令各引饌入俎初入門奏雍和之樂以太蔟之均自後接神之樂皆奏太簇饌至陛樂止祝史各進徹毛血之豆降自西陛正坐之饌升自南陛配帝之饌升自東陛神州之饌升自己陛其岳鎮海瀆之坐所由師長各陳布于坐諸太祝迎饌於壇上各設於神坐前籩豆盖羃徹之如式設訖謁者引司徒太官令帥進饌者降自東陛以出司徒復位諸太祝還樽所又進設岳鎮以下之饌相次而畢太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取􅂒興沃水又侍中跪取盤興承水皇帝盥手黄門侍郎跪取巾於篚興進皇帝帨手黄門侍郎又取匏爵於篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黄門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤􅓢黄門侍郎受巾奠於篚皆如初太常卿引皇帝詣壇升自東陛樂止謁者引司徒升自東陛立扵樽所齋郎奉俎従升立扵司徒之後太常卿引皇帝詣皇地祇酒樽所執樽者舉羃侍中賛酌汎齊訖夀和之樂作皇帝每酌獻及飲福皆作夀和之樂太常卿引皇帝進皇地祇神座前北面跪奠爵俛伏興太常卿引皇帝少退北向立樂止太祝二人持玉册進於神坐之右東向跪又太祝一人跪讀册文訖俛伏興冊文並中書門下進少府監刻皇帝再拜初讀冊文訖太祝進奠冊於神坐還樽所皇帝拜訖樂止太常卿引皇帝詣配帝酒樽所執樽者舉冪侍中取爵於坫進皇帝受爵侍中贊酌汎齊訖樂作太常卿引皇帝進睿宗大聖真皇帝神坐前東向跪奠爵俛伏興太常卿引皇帝少退東向立樂止太祝二人持玉冊進於神坐之左北向跪又太祝一人跪讀祝文訖俛伏興皇帝再拜初讀祝文訖樂作太祝進奠冊於神坐還樽所皇帝拜訖樂止太常卿引皇帝進皇地祇神坐前北向立樂作太祝各以爵酌上樽福酒合置一爵一太祝持爵授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興太祝各帥齋郎進俎太祝減神前胙肉皆取前脚第二骨加於俎以胙肉共置一俎上太祝持俎以授司徒司徒奉俎西向進皇帝受以授左右謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中受爵授太祝太祝受爵復於坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止文舞出鼔柷作舒和之樂出訖戛敔樂止武舞入鼔柷作舒和之樂立定戛敔樂止初皇帝将復位謁者引太尉詣罍洗盥手洗爵訖謁者引太尉自東陛升壇詣皇地祇著樽所執樽者舉羃太尉酌醴齊武舞作謁者引太尉進皇地祇神坐前北向跪奠爵興謁者引太尉少退北面再拜訖謁者引太尉詣配帝犧尊所取爵於坫執樽者舉羃太尉酌醴齊謁者引太尉進睿宗大聖真皇帝神坐前東向跪奠爵興謁者引太尉少退東向再拜訖謁者引太尉進皇地祇神坐前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光禄卿詣罍洗盥手洗匏爵終獻如亞獻之儀訖謁者引光禄卿降復位武舞止初太尉既升獻謁者一人引神州獻官詣罍洗盥手洗爵訖升自己陛詣酒樽所執樽者舉羃酌汎齊進奠於神州坐前引降還本位謁者五人引獻官各詣罍洗訖引獻官各詣樽所俱酌醍齊進奠爵於諸方岳鎮海瀆首坐餘坐皆祝史助奠相次而畢引還本位又贊引五人各引獻官詣罍洗盥洗詣酒樽所酌沈齊獻山川林澤如岳鎮之儀訖各引獻官還本位又贊引五人各引獻官詣罍洗盥洗詣酒樽所酌清酒獻丘陵以下及齋郎助奠如上儀訖各還本位上下諸祝各進徹豆還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福者不拜順和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望瘞位太常卿引皇帝樂作皇帝就望瘞位西向立樂止於羣官将拜上下諸祝各執篚進神坐前取玉帛齋郎以俎載神州以上牲體稷黍飯爵酒各由其陛降壇北行當瘞塪西行諸太祝以玉幣饌物祝史以毛血置於塪諸祝又以岳鎮以下之牲體皆從瘞奉禮曰可瘞塪東西廂各六人寘土半塪太常卿引皇帝還版位封玉冊皇帝既就望瘞位侍中前跪奏稱具官臣某言請封玉冊太常卿引皇帝自南陛升壇北面立近侍者陪從如式謁者引太尉進於皇地祇神座前跪取玉冊置於案進皇帝受玉冊跪叠之内於玉匱中纒以金繩封以金泥侍中取受命寳跪以進皇帝取寳以印玉匱訖興侍中受寳以授符寳郎通事舍人引太尉進皇帝跪奉玉匱授太尉太尉跪受皇帝興太尉退復位側身奉玉匱太常卿前奏請再拜皇帝再拜訖入次如常儀太尉奉玉匱之案於石䃭南北向立執事者發石盖太尉奉玉匱跪藏於石䃭内執事者覆石盖檢以石檢纒以金繩封以石泥訖太尉以玉寳遍印訖復位將作帥執事者以石跪封固以五色土圜封如太山之儀太尉又進睿宗大聖真皇帝神坐前跪取玉冊内金匱皆如封玉匱之儀訖太尉奉金匱從降俱復位封禪還太尉以金匱藏於睿宗大聖真皇帝廟如封祀之儀太常卿前奏禮畢若有祥瑞太史監跪奏侍臣奉賀皆如封祀壇之儀太常卿引皇帝還大次樂作皇帝出中壝門殿中監前跪受鎮珪以授尚衣奉御殿中監又前受大珪華盖侍衛如常儀皇帝入次樂止謁者贊引各引祭官通事舍人分引從祭羣官諸方客使以次出贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出祭訖以竒禽異獸合瑞典者皆縱之于神祀所其祀版燔於齋所鑾駕還行宫如封太山之儀皇帝朝覲羣官禪之明日朝羣官及岳牧以下於朝覲壇皆如巡狩朝覲之儀皇帝服衮冕乗輿以出曲直華蓋警蹕侍衛入自北壝門由北陛升壇即御座符寳郎奉寳置於御座扇開樂止通事舍人引三品以上及岳牧以下入就位如常儀通事舍人引上公一人舒和之樂作公至西陛就觧劒席樂止脱舄跪解劍置於席興相禮者與通事舍人引進當御坐前北向跪賀稱具官臣名等言天封肇建景福惟新伏惟開元神武皇帝陛下萬夀無疆俛伏興通事舍人引上公降壇詣解劒席納舄樂作通事舍人引復位立定樂止典儀曰再拜贊者承傳上公以下皆再拜侍中前承制降詣上公之東北向稱有制上公及羣官皆再拜宣云封禅之慶與公等同之公及羣官又再拜舞蹈三稱萬歲又再拜引退考制度並如巡狩之儀大唐開元禮卷六十四
