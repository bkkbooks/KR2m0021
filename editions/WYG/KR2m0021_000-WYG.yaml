body:
  text: 大唐開元禮原序三代以下言治者莫盛於唐故其議禮有足稽者始太宗文皇帝以濬哲之姿躬致上治顧視隋禮不足盡用乃詔房𤣥齡魏徵與禮官學士等増脩五禮成書百卷總一百三十篇所謂貞觀禮是也髙宗纂成之復詔長孫無忌杜正倫李義府以三十卷益之然義府輩務為傅㑹至雜以今式議者非焉所謂顯慶禮是也二書不同葢嘗並用春官充位莫之或正開元皇帝綏萬邦撫重熙於是學士張説奏言儀注矛盾盍有以折衷之乃詔徐堅李鋭施敬本載加撰述繼以蕭嵩王仲丘等歴數年乃就號曰大唐開元禮吉凶軍賔嘉至是備矣書必有序序所以為作者之意禮書一代之典也其可闕耶謹為序曰夫為國必以禮禮以時為大商之去夏未久也其損益已可知矣况乎自秦迄漢典籍殘缺所可見者二戴之記周官之書其綱則備其紀則畧二戴之記雜出於漢儒或繁密難遵或牴牾莫辨此冺冺棼棼所以毋敢輕議也雖然大輅設而椎輪不可以復用宫室備而茅茨不可以復拘若明堂以致嚴父之孝孝致矣則汶上之圖不必盡命於黄帝圓丘以竭事天之誠誠竭矣則澤中之祀不必盡合於成周葢古今之不同質文之遞變雖先王未之有者可以義起奈何區區殘編斷簡泥古而窒今使前朝盛典不傳於後世耶唐受命奄有方夏吉禮以祀神祇賔禮以親邦國嘉禮以親萬民不得已而施之軍禮凶禮者甚衆也朝廷之所用有司之所守非一定之論則内外無所適從非不刋之書則子孫無所取法今自貞觀而至顯慶閲嵗未久二禮之不同固未害損益之義也然既出義府傅㑹則非所謂一定之論猥雜有司令式則非所謂不刋之書惟開元皇帝勵精政治有意太平故能遴擇儒臣釐正鉅典惟堅等辨博通貫體上之意故能不泥不肆克輯成書因時肇興朝廷有大疑不必聚諸儒之訟稽是書而可定國家有盛舉不必綿野外之儀即是書而可行世世守之毋敢失墜不其休哉書凡百五十卷各以類從讀者如按圖而知四方此不具載姑叙作書之㫖云周必大謹序大唐開元禮考略開元十年以國子司業韋縚為禮儀使以掌五禮十四年通事舍人王嵒上疏請刪去禮記舊文而益以今事詔付集賢院議學士張説以為禮記不刋之書去聖乆逺不可改易而唐貞觀顯慶禮儀注前後不同宜加折衷以為唐禮乃詔集賢院學士右散騎常侍徐堅左拾遺李鋭及太常博士施敬本撰述厯年未就而鋭卒蕭嵩代鋭為學士奏起居舍人王仲丘撰定為一百五十卷是為大唐開元禮由是唐之五禮之文始備而後世用之雖時小有損益不能過也新唐書禮樂志開元禮一百五十卷張説請修貞觀永徽五禮命賈登張烜施敬本李鋭王仲丘陸善經洪孝昌撰輯蕭嵩總之唐書藝文志開元禮序例三卷吉禮七十五卷賔禮二卷嘉禮四十卷軍禮十卷㓙禮二十卷集賢注記開元禮一百五十卷唐集賢院學士蕭嵩王仲丘等撰唐初有貞觀顯慶禮儀注不同而顯慶又出於許敬宗希㫖附㑹不足施用開元十四年通事舍人王嵒請刪禮記舊文而益以今事張説以為禮記不可改易宜折衷貞觀顯慶以為唐禮乃詔徐堅李鋭施敬本撰述蕭嵩王仲丘繼之書成唐之五禮之文始備於是遂以設科取士新史禮樂志大畧采摭著於篇然唐初已降凶禮於五禮之末至顯慶遂削去國恤一篇則敬宗謟諛諱惡鄙陋亡稽卒不正也書録解題開元二十六年六月二十七日渤海求冩唐禮許之唐㑹要貞元二年六月十一日勅舉人有習開元禮者同一經例選人不限選數許集通大義百條䇿三道者超資與官大義通七十䇿通二者不在放限九年五月二日勅通大義百條策三道者為上大義通八十策通二者為次元和八年四月吏部奏習開元禮者先授太常官以備講討從之同上唐志取士科目有開元禮凡開元禮通大義百條䇿三道者超資與官義通七十䇿通二者及第試散官義通者依正員明經有三禮辛秘登開元禮科授愽士玉海貞元五年始有開元禮一人同上後周廣順三年八月開元禮三史各對義三百道五代㑹要開寳六年上親閲進士得二十六人開元禮七人自兹殿試以為常式太平治績通類是嵗新修開寳通禮成詔鄉貢開元禮宜改稱鄉貢通禮本科並以新書試問文獻通考欽定四庫全書史部十三大唐開元禮目録政書類二儀制之屬卷一序例上擇日神位俎豆卷二序例中大駕鹵簿皇后鹵簿皇太子鹵簿皇太子妃鹵簿親王鹵簿王公已下鹵簿内命婦鹵簿外命婦鹵簿卷三序例下衣服齋戒祈禱雜制卷四吉禮皇帝冬至祀圜丘卷五吉禮冬至祀圜丘有司攝事卷六吉禮皇帝正月上辛祈穀于圜丘卷七吉禮正月祈穀于圜丘有司攝事卷八吉禮皇帝孟夏雩祀于圜丘卷九吉禮孟夏雩祀圜丘有司攝事卷十吉禮皇帝季秋大享于明堂卷十一吉禮季秋大享于明堂有司攝事卷十二吉禮皇帝立春祀青帝于東郊卷十三吉禮立春祀青帝于東郊有司攝事卷十四吉禮皇帝立夏祀赤帝于南郊卷十五吉禮立夏祀赤帝于南郊有司攝事卷十六吉禮皇帝季夏土王日祀黄帝于南郊卷十七吉禮季夏土王日祀黄帝于南郊有司攝事卷十八吉禮皇帝立秋祀白帝于西郊卷十九吉禮立秋祀白帝于西郊有司攝事卷二十吉禮皇帝立冬祀黒帝于北郊卷二十一吉禮立冬祀黒帝于北郊有司攝事卷二十二吉禮皇帝臘日蜡百神于南郊卷二十三吉禮臘日蜡百神于南郊有司攝事卷二十四吉禮皇帝春分朝日于東郊卷二十五吉禮春分朝日于東郊有司攝事卷二十六吉禮皇帝秋分夕月于西郊卷二十七吉禮秋分夕月于西郊有司攝事卷二十八吉禮祀風師祀雨師祀靈星祀司中司命司人司禄卷二十九吉禮皇帝夏至祭方丘卷三十吉禮夏至祭方丘有司攝事卷三十一吉禮皇帝孟冬祭神州于北郊卷三十二吉禮孟冬祭神州于北郊有司攝事卷三十三吉禮皇帝仲春仲秋上戊祭太社卷三十四吉禮仲春仲秋上戊祭太社有司攝事蜡禮同卷三十五吉禮祭五嶽四鎮卷三十六吉禮祭四海四瀆卷三十七吉禮皇帝時享于太廟卷三十八吉禮時享于太廟有司攝事卷三十九吉禮皇帝祫享于太廟卷四十吉禮祫享于太廟有司攝事卷四十一吉禮皇帝禘享于太廟卷四十二吉禮禘享于太廟有司攝事卷四十三吉禮肅明皇后廟時享有司攝事卷四十四吉禮孝敬皇帝廟時享有司攝事卷四十五吉禮皇帝拜五陵皇后拜五陵太常卿行諸陵卷四十六吉禮皇帝孟春吉亥享先農耕籍卷四十七吉禮孟春吉亥享先農于籍田有司攝事卷四十八吉禮皇后季春吉已享先蠶親桑卷四十九吉禮季春吉已享先蠶于公桑有司攝事卷五十吉禮有司享先代帝王卷五十一吉禮薦新于太廟季夏祭中霤于太廟孟冬祭司寒納氷開氷附興慶宫祭五龍壇卷五十二吉禮皇帝視學卷五十三吉禮皇太子釋奠于孔宣父卷五十四吉禮國子釋奠于孔宣父皇子束脩國學生束脩卷五十五吉禮仲春仲秋釋奠于齊太公卷五十六吉禮皇帝巡狩告于圜丘卷五十七吉禮巡狩告于圜丘有司攝事卷五十八吉禮皇帝巡狩告于太社卷五十九吉禮巡狩告于太社有司攝事卷六十吉禮皇帝巡狩告于太廟卷六十一吉禮巡狩告于太廟有司攝事卷六十二吉禮皇帝廵狩卷六十三吉禮皇帝封祀于太山卷六十四吉禮皇帝禪于社首山卷六十五吉禮時旱祈于太廟時旱祈于太社卷六十六吉禮時旱祈岳鎮于郊報祀禮同卷六十七吉禮時旱就祈岳鎮海瀆乆雨禜國門卷六十八吉禮諸州祭社稷卷六十九吉禮諸州釋奠于孔宣父州學生束脩卷七十吉禮諸州祈社稷諸州祈禱諸神諸州禜城門卷七十一吉禮諸縣祭社稷諸里祭社稷卷七十二吉禮諸縣釋奠于孔宣父縣學生束脩卷七十三吉禮諸縣祈社稷諸縣祈諸神諸縣禜城門卷七十四吉禮諸太子廟時享卷七十五吉禮三品以上時享其廟卷七十六吉禮三品以上祫享其廟三品以上禘享其廟卷七十七吉禮四品五品時享其廟卷七十八吉禮六品以下時祀王公以下拜掃寒食拜掃附卷七十九賔禮蕃國主來朝以束帛迎勞遣使戒蕃主見日蕃主奉見受蕃國使表及幣卷八十賓禮皇帝燕蕃國主皇帝燕蕃國使卷八十一軍禮皇帝親征類于上帝卷八十二軍禮皇帝親征宜于太社卷八十三軍禮皇帝親征告于太廟卷八十四軍禮皇帝親征禡於所至之地親征及巡狩郊祀有司軷于國門親征及巡狩登所過山川平蕩賊冦宣露布遣使勞將軍卷八十五軍禮皇帝講武皇帝田狩卷八十六軍禮皇帝射于射宫皇帝觀射于射宫卷八十七軍禮制遣大將出征有司宜于太社卷八十八軍禮制遣大將出征有司告于太廟制遣大將出征有司告于齊太公廟卷八十九軍禮祀馬祖享先牧祭馬社祭馬歩卷九十軍禮合朔伐鼓合朔諸州伐鼓大儺諸州縣儺卷九十一嘉禮皇帝加元服上卷九十二嘉禮皇帝加元服下卷九十三嘉禮納后上卷九十四嘉禮納后下卷九十五嘉禮皇帝元正冬至受皇太子朝賀皇后元正冬至受皇太子朝賀卷九十六嘉禮皇帝元正冬至受皇太子妃朝賀皇后元正冬至受皇太子妃朝賀卷九十七嘉禮皇帝元正冬至受羣臣朝賀皇帝千秋節受羣臣朝賀卷九十八嘉禮皇后元正冬至受羣臣朝賀皇后元正冬至受外命婦朝賀卷九十九嘉禮皇帝于明堂讀孟春令皇帝于明堂讀仲春令皇帝于明堂讀季春令卷一百嘉禮皇帝于明堂讀孟夏令皇帝于明堂讀仲夏令皇帝于明堂讀季夏令卷一百一嘉禮皇帝于明堂讀孟秋令皇帝于明堂讀仲秋令皇帝于明堂讀季秋令卷一百二嘉禮皇帝于明堂讀孟冬令皇帝于明堂讀仲冬令皇帝于明堂讀季冬令卷一百三嘉禮皇帝于明堂及太極殿讀五時令卷一百四嘉禮皇帝養老於太學卷一百五嘉禮臨軒冊命皇后卷一百六嘉禮臨軒冊命皇太子卷一百七嘉禮内册皇太子卷一百八嘉禮臨軒册命諸王大臣朝堂册命諸大臣册内命婦二品以上卷一百九嘉禮遣使册授官爵朔日受朝朝集使朝見幷辭卷一百十嘉禮皇太子加元服卷一百十一嘉禮皇太子納妃卷一百十二嘉禮皇太子元正冬至受羣官賀卷一百十三嘉禮皇太子元正冬至受宫臣朝賀皇太子與師傅保相見皇太子受朝集使叅辭卷一百十四嘉禮親王冠卷一百十五嘉禮親王納妃卷一百十六嘉禮公主降嫁卷一百十七嘉禮三品以上嫡子冠卷一百十八嘉禮三品以上庻子冠卷一百十九嘉禮四品五品嫡子冠卷一百二十嘉禮四品五品庻子冠卷一百二十一嘉禮六品以下嫡子冠卷一百二十二嘉禮六品以下庻子冠卷一百二十三嘉禮三品以上㛰卷一百二十四嘉禮四品五品婚卷一百二十五嘉禮六品以下婚卷一百二十六嘉禮朝集使於尚書省禮見幷辭任官初上相見諸州上佐同京兆河南牧初上諸州刺史都督同萬年長安河南洛陽令初上諸縣令同卷一百二十七嘉禮鄉飲酒卷一百二十八嘉禮正齒位卷一百二十九嘉禮宣赦書羣臣詣闕上表羣臣奉叅起居遣使詣蕃宣勞卷一百三十嘉禮皇帝遣使巡撫諸州皇帝遣使諸州宣制勞㑹皇帝遣使諸州宣赦書諸州上表卷一百三十一㓙禮凶年賑撫勞問疾苦卷一百三十二凶禮五服制度卷一百三十三凶禮訃奏臨喪除喪卷一百三十四凶禮勅使弔㑹喪册贈㑹𦵏致奠卷一百三十五凶禮中宫太皇太后皇太后皇后服卷一百三十六凶禮東宫服卷一百三十七凶禮東宫妃服卷一百三十八凶禮三品以上喪之一卷一百三十九凶禮三品以上喪之二卷一百四十凶禮三品以上喪之三卷一百四十一凶禮三品以上喪之四卷一百四十二凶禮四品五品喪之一卷一百四十三凶禮四品五品喪之二卷一百四十四凶禮四品五品喪之三卷一百四十五凶禮四品五品喪之四卷一百四十六凶禮六品以下喪之一卷一百四十七凶禮六品以下喪之二卷一百四十八凶禮六品以下喪之三卷一百四十九凶禮六品以下喪之四卷一百五十凶禮王公以下喪通儀臣等謹案大唐開元禮一百五十卷唐太子太師同中書門下三品兼中書令蕭嵩等奉勅撰杜佑通典及新舊唐書禮志稱唐初禮司無定制遇有大事輒制一儀臨時更定開元中通事舍人王嵓上疏請刪削禮記舊文益以今事集賢學士張説奏禮記不刋之書難以改易請取貞觀顯慶禮書折衷異同以為唐禮乃詔右散騎常侍徐堅左拾遺李鋭太常博士施敬本撰述厯年未就至蕭嵩為學士復奏起居舍人王仲邱等撰次成書由是唐之五禮始備即此本也其書卷一至卷三為序例卷四至七十八為吉禮卷七十九八十為賔禮卷八十一至九十為軍禮卷九十一至一百三十為嘉禮卷一百三十一至一百五十為凶禮凶禮古居第二而退居第五者用貞觀顯慶舊制也貞元中詔以其書設科取士習者先授太常官以備講討則唐時已列之學官矣新舊唐書禮志皆取材是書而所存僅十之三四杜佑撰通典别載開元禮纂三十五卷比唐志差詳而節目亦多未備其討論古今斟酌損益首末完具粲然勒一代典制者終不及原書之賅洽故周必大序稱朝廷有大疑稽是書而可定國家有盛舉即是書而可行誠考禮者之圭臬也新唐書藝文志載修開元禮者尚有張烜陸善經洪孝昌諸人名而通典纂類中所載五嶽四瀆名號及衣服一門間有與此書相牴牾者盖傳寫異文不能畫一既未詳其孰是今亦並仍原本錄之不復竄改庶㡬不失闕疑之義焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
