body:
  text: 大唐開元禮卷十一唐蕭嵩等撰吉禮季冬大享於明堂有司攝事齋戒陳設省牲器薦玉帛進熟齋戒將祀有司卜日如别儀前祀七日平明太尉誓百官於尚書省曰某月某日祀昊天上帝於明堂各揚其職不供其事國有常刑凡預祀之官散齋四日致齋三日散齋皆於正寢致齋二日於本司一日於祀所其無本司者則皆於祀所散齋理事如舊唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯祀事得行其餘悉斷其祀官已齋而闕者通攝行事諸祀官致齋之日給酒食及明衣各習禮於齋所光禄卿監取明水火太官令取水於隂鑒取火於陽燧火以供爨水以實罇前祀二日太尉告睿宗大聖真皇帝廟如常祀一日諸衛令其屬未後一刻各以其方器服守衛明堂四門毎門二人毎隅一人與太樂工人俱清齋一宿陳設前祀三日守宮設祀官公卿以下次于璧水東門之外道南北向以西為上設陳饌幔于璧水東門之内道北南向前祀二日太樂令設宫懸之樂於明堂前庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于編懸之間各依辰位樹雷鼔于北懸之内道之左右植建鼓于四隅置柷敔于懸内柷在左敔在右設歌鐘歌磬于堂上前楹下北向磬簴在西鐘簴在東其匏竹者立于堂下重行北向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以北為上南方北方以西為上右校清掃明堂内外郊社令積柴于燎壇其壇于樂懸之間方一丈二尺開上南出户方六尺前祀一日奉禮設祀官公卿位于堂之東南執事者位又于公卿東南每等異位俱重行西面北上設御史位于堂下一位于東南西向一位于西南東向令史各陪其後設奉禮位于樂懸東北賛者二人在南差退俱西向又設協律郎位于堂上午陛之西東向設太樂令位於北懸之間設望燎位于柴壇之北南向設祀官公卿以下門外位皆于東門之外道南每等異位重行北面西上設牲牓于東門之外當門西向南上蒼牲一居前又蒼牲一少退又青牲二黄牲二白牲二元牲二皆在北少退設廩犧令位于牲西南史陪其後俱北向設諸太祝位于牲東各當牲後祝史陪其後設太常卿省牲位于牲前近北又設御史位于太常卿之西俱南向設酒樽之位于堂之上下昊天上帝太樽二著樽二山罍二在室内神坐之左象樽二壺罇二山罍二在堂下東南西向配帝著尊二犧尊二象尊二山罍二在堂上于神坐之左五方帝各太樽二著尊二犧尊二山罍二各于神坐之左内向五帝著尊二亦于神坐之左俱内向五官各象樽二在階下並于神坐之左俱右向堂上之尊皆置于坫階下之樽皆藉以席俱加羃勺設爵于尊下設洗于東階東南亞獻之洗又于東南北向罍水在洗東篚在洗西南肆篚實以巾爵設五官罍洗篚羃各于酒樽之左俱右向其執尊罍篚羃者各位于其後各設玉幣之篚于堂上下樽坫之間祀日未明五刻太史令郊社令升設昊天上帝神坐于明堂太室之内中央南向席以藁秸設睿宗大聖真皇帝神坐于上帝之左西向設青帝于木室西向赤帝于火室北向黄帝于太室南户之西北向白帝于金室東向黒帝于水室南向席皆以藁秸設太昊炎帝軒轅少昊顓頊之坐各于五方帝之左俱内向差退若非明堂五室亦如雩祀圜丘設座之禮設五官神坐于明堂之庭各依其方内向席皆以莞設神坐各于坐首省牲器省牲之日午後十刻去明堂三百步所諸衛之屬禁斷行人晡後三刻郊社令帥府史二人及齋郎以樽坫罍洗篚羃入設于位升堂者即夘陛晡後三刻諸太祝與廩犧令以牲就牓位謁者引太常卿賛引引御史入詣夘陛升堂視滌濯凡導引者毎曲一逡巡于視濯執樽者皆舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西面舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官謁者引光禄寺詣厨省鼎鑊申視濯溉賛引引御史詣厨省饌具太常卿以下毎事訖各還齋所祀日未明十五刻太官令帥宰人以鑾刀割牲祝史以豆取毛血各置于饌所遂烹牲薦玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各帥其屬入實樽罍及玉幣凡六尊之次太尊為上實以汎齊著尊次之實以醴齊犧樽次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒五方帝太樽為上實以汎齊著尊次之實以醍齊犧尊次之實以盎齊山罍為下實以清酒配帝著尊為上實以汎齊犧尊次之實以醴齊象尊次之實以盎齊五帝之著尊實以醴齊玉官之象尊實以醍齊𤣥酒各實于五齊之上尊禮神之玉昊天上帝以四圭有邸青帝以青圭赤帝以赤璋黄帝以黄琮白帝以騶虞黒帝以元璜天帝配帝之幣皆以蒼五方帝五帝各従本方色禮幣皆長一丈有八尺諸太祝以玉帛置于篚太官令帥進饌者實諸籩豆等皆設于饌幔内未明二刻奉禮帥賛者先入就位賛引引御史博士諸太祝及令史祝史與執尊罍篚羃者入自東門當午陛之南重行北面西上立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳御史以下皆再拜訖執樽罍篚羃者各就位賛引引御史諸太祝詣堂夘陛升行掃除于上令史祝史行掃除于下訖引降就位未明一刻謁者賛引各引祀官俱就門外位太樂令帥工人二舞次入就位文舞入陳于懸内武舞立于懸南道西其升堂者皆脱履于下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜謁者引司空詣堂夘陛升行掃除于上降行樂懸于下訖引復位謁者賛引各引祀官次入就位立定奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位協律郎跪伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼓柷奏豫和之樂乃以圜鐘之均作文舞之舞樂舞六成林鍾三奏黄鍾太蔟姑洗各一奏偃麾戛敔樂止凡樂皆協律郎舉麾工鼔柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官在位者皆再拜謁者引諸助奠者俱詣東陛升堂立于罇所太祝與諸助奠者皆跪取玉幣于篚立于東南隅西向北上配帝太祝立于西南隅東向北上五方上帝五帝太祝又取幣于篚立于尊所訖謁者引太尉詣南陛升北向立太祝加玉于幣東向授太尉太尉受玉幣凡受物皆搢笏跪奠訖執笏俛伏興登歌作肅和之樂以大吕之均謁者引太尉進北向跪奠于昊天上帝神坐前訖俛伏興謁者引太尉少退北向立謁者五人引五方帝之太祝各奉玉幣奠於神坐訖還樽所太尉再拜訖配帝之太祝又以幣授太尉太尉受幣謁者引太尉進東向跪奠于睿宗大聖真皇帝神坐前俛伏興謁者引太尉少退東向立又謁者引五帝之獻官亦各以幣奠于其神坐前五官之祝亦各以幣奠神坐訖太尉再拜訖謁者引太尉降就位登歌止初衆官再拜訖諸祝史各奉毛血之豆立于堂下于登歌止祝史奉毛血入各由其陛升諸太祝迎取于壇上俱進奠于神坐諸太祝與祝史退立于樽所進熟太尉既升奠玉幣大官令出帥進饌者各奉饌陳于門外謁者引司徒出詣饌所司徒奉天帝之俎諸太祝既奠毛血太官令引饌入俎初入門奏雍和之樂自後酌獻皆奏雍和之樂皆以黄鐘之均自後堂下之樂皆奏黄鐘饌各至階樂止祝史俱進徹毛血之豆降自東陛以出天帝之饌升自午陛配帝之饌升自夘陛五方上帝五帝之饌各由其陛諸太祝迎引于堂上各設于神坐前籩豆盖羃先徹乃升簋簠既奠却其盖于下設訖謁者司徒太官令帥進饌者降自東陛以出司徒復位諸太祝各還樽所又進設五官之饌相次而畢初壇上設饌訖謁者引太尉升自午陛詣天帝酒尊所執樽者舉羃太尉酌汎齊訖樂作謁者引太尉入詣天帝神坐前北面跪奠爵興謁者引太尉少退北向立五方帝諸太祝取匏爵于坫酌汎齊各進奠于神坐前訖還尊所樂止太祝一人持版進于神坐之右東面跪讀祝文曰維某年歲次月朔日子嗣天子臣某謹遣太尉封臣名敢昭告于昊天上帝惟神覆燾羣生陶甄庶類不言而信普博無私謹擇元辰祗率恒禮敬以玉帛犧齊粢盛庻品肅恭禋祀式展誠敬皇考睿宗大聖真皇帝配神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進版于天帝神坐還樽所太尉再拜訖樂止謁者引太尉詣配帝酒樽所取爵於坫執樽者舉羃太尉酌汎齊訖樂作謁者引太尉進睿宗大聖真皇帝坐前東向跪奠爵俛伏興太尉少退東向立謁者五人引五方帝之太祝俱取爵于坫酌汎齊各進奠于其神坐前訖還樽所樂止太祝一人持版進于神坐之右北面跪讀祝文曰維某年歳次月朔日子孝子開元神武皇帝臣某謹遣太尉封臣名敢昭告于皇考睿宗大聖真皇帝祗率舊章肅若恒禮致敬禋祀昊天上帝惟皇考徳光宇宙道叶乾元申錫無疆實膺嚴配謹以制幣犧齊粢盛庻品肅恭明薦侑神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版于神坐訖還樽所立太尉再拜訖樂止謁者引太尉少退北向立樂作諸太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒啐酒奠爵興諸太祝各帥齋郎進俎太祝減神前胙肉皆取前脚第二骨加于俎以胙肉共置一俎上太祝持俎西向授太尉太尉受以授齋郎太尉跪取爵遂飲卒酌太祝進受爵復于坫太尉興再拜謁者引太尉降復位文舞出鼔柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止初太尉將復位謁者引太常卿詣罍洗盥手洗匏爵訖謁者引太常卿自夘陛升堂詣天帝著樽所執尊者舉羃太常卿酌醴齊舞作謁者引太常卿進昊天上帝神坐前北向跪奠爵興謁者引太常卿立于南方北向再拜訖謁者引太常卿詣配帝酒樽所取爵于坫執樽者舉羃太常卿酌醴齊謁者引太常卿進睿宗大聖真皇帝神坐前東向跪奠爵興五方帝之太祝亦各取爵于坫酌醴齊俱進奠于其神坐訖謁者引太常卿立于南方北向再拜訖諸太祝各以爵酌罍福酒合置一爵一太祝持爵進於太常卿之右西向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復于坫太常卿再拜興謁者引太常卿降復位初太常卿獻將畢謁者引光禄卿詣罍洗匏爵升酌盎齊獻正坐配坐五方帝之祝亦各酌盎齊獻神座訖終獻皆如亞獻之儀謁者引光禄卿降復位初太常卿將升獻謁者五人分引五帝之獻官詣罍洗盥洗匏爵各由其陛俱酌醴齊各跪奠于帝太昊氏神坐餘坐齋郎助奠訖各還本位五帝獻將畢謁者引獻官詣罍洗盥手洗爵訖各進酌醍齊跪奠于勾芒氏神坐前餘坐齋郎助奠訖各還本位及終獻畢武舞六成樂止諸祝各進跪徹豆興還樽所徹者籩豆各一少移故處奉禮曰賜胙賛者唱衆官再拜已飲福受胙者不拜豫和之樂作奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之左白請就望燎位謁者引太尉就望燎位南向立于衆官将拜諸祝史執篚進神前取玉帛祝版齋郎以俎載牲體稷黍飯各由其陛降壇南行經懸内當柴壇南東行自南陛登柴壇以玉帛祝版饌物置于柴上户内奉禮曰可燎東西面各六人以炬燎火半柴謁者曰禮畢遂引太尉出謁者賛引各引祀官以次出賛引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出工人二舞以次出大唐開元禮卷十一
