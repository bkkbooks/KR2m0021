body:
  text: 大唐開元禮卷一百五唐蕭嵩等撰嘉禮臨軒冊命皇后卜日告圜丘告方澤告太廟臨軒命使皇后受冊皇后受羣臣賀皇后表謝朝皇太后皇帝㑹羣臣羣臣上禮皇后㑹外命婦皇后廟見卜日冊皇后有司預卜日如别儀告圜丘告方澤告太廟右並有司行事如常告之儀臨軒命使將行冊禮所司奏請太尉為使司徒為副前一日尚舎奉御設御幄于太極殿北壁下南向鋪御坐如常守宫設羣官次于東西朝堂太樂令展宫懸于殿庭設舉麾位于殿上西階之西東向一位於樂懸東南西向鼔吹令展十二案於建皷之外乘黄令陳車輅尚輦奉御陳輿輦並如常儀典儀設羣官版位文官一品以下五品以上于懸東六品以下于横街之南俱重行西面北上武官一品以下五品以上于懸西六品以下于横街之南當文官俱東面北上諸親于五品以上之南皇宗親在東異姓親在西蕃客分方于六品以下之南皆以北為上並如常儀若有朝集使分方于文武官當品之下諸州使人分方于朝集使九品之後設典儀位于懸之東北賛者二人在南少退俱西向設冊使主副受命位於大横街南道東俱北面西上奉禮設門外位皆如元日之儀其日諸衞勒所部列黄麾大仗如常儀羣官等依時刻集朝堂俱就次各服朝服通事舍人各引就朝堂前位侍中量時刻版奏請中嚴鈒㦸近仗入陳于殿庭太樂令皷吹令等帥工人入就位協律郎入就舉麾位典儀帥賛者先入就位諸侍衞之官各服其器服符寳郎奉寳俱詣閤奉迎通事舍人引羣官入就位又引冊使入立于太極門外道東西面黄門侍郎主節奉節立于左延明門内道北中書侍郎帥令史奉冊案立于節南俱西面每案令令史二人絳公服對舉仍覆以帕侍中版奏外辦皇帝服衮冕御輿以出曲直華盖警蹕侍衞如常儀皇帝將出仗動太樂令令撞黄鐘之鐘右五鐘皆應協律郎跪俛伏舉麾凡樂皆協律郎舉麾工鼔柷而後作偃麾戛敔而後止鼓柷奏太和之樂鼔吹振作皇帝出自西房即御坐南向坐符寳郎奉寳置于御坐如常樂止通事舍人引冊使主副入就位太尉初入門舒和之樂作至位樂止立定典儀曰再拜賛者承傳羣官在位者皆再拜侍中前承制降詣使者東北西面稱有制冊使俱再拜侍中宣制曰勅某氏為皇后命公等持節展禮宣制訖又俱再拜侍中還侍位黄門侍郎引主節詣冊使所主節以節授黄門侍郎黄門侍郎執節西面授太尉太尉受付節立于使後黄門侍郎退中書侍郎引冊案及琮璽綬案立于冊使東北西面中書侍郎取持案者退自使後立于太尉之左西面授太尉太尉受冊置于案退立于使後中書侍郎又取琮璽綬以授太尉太尉受置于案皆如受冊之儀中書侍郎退典儀曰再拜賛者承傳羣官在位者皆再拜通事舍人引冊使出持節者前導持案者次之太尉初行樂作出門樂止侍中前跪奏稱侍中臣某言禮畢俛伏興還侍位皇帝興太樂令令撞㽔賔之鐘左五鐘皆應鼔柷奏太和之樂皇帝降坐侍衛警蹕如來儀入自東房樂止通事舍人引群官在位者以次出蕃客先出皇后受冊前一日守宫于肅章門外道西近南隨便設太尉司徒等次東向北上又于命婦朝堂設外命婦次如常尚寝率其屬于皇后正殿設御幄鋪坐南向又設皇后受冊位于殿庭階間北向又設命婦等脱舄席于西階前近西東向司樂展宫懸之樂於殿庭設麾於殿上西階之西東向並如常内僕進重翟以下於肅章門之外道東西向以北為上其日依時刻諸衞勒所部屯門列仗及陳布于皇后正殿南門之外如常儀典儀設冊使位于肅章門外之西東向北上設内侍位于副使之南舉冊案及琮璽綬者位於南差退俱東向又設内給事位于北廂南向又設内謁者監位于其東南西向内謁者設外命婦位于命婦朝堂分左右廂大長公主以下在東太夫人以下在西並毎等異位重行相向以北為上司賛設内命婦及内官非供奉者陪列之位于受冊正殿之庭東廂西向重行北上又設内命婦等朝位于殿庭御道東重行北面西上又設外命婦朝位于殿庭御道左右近南大長公主以下在道東每等異位重行北面以西為上太夫人以下在道西每等異位重行北面以東為上又設司賛位于東階東南典賛二人在南差退俱西向内侍版奏皇后請中嚴外命婦依時刻俱赴集命婦朝堂次各服其服内謁者監預置二案于肅章門外近限太尉司徒既受命出至朝堂俱乘輅偹鹵簿皷吹持節如式其冊琮璽綬各以油絡網犢車載而行内侍之屬與所司守掌之至永安門外降輅謁者引入持節者前導持案者次之掌次者俱引入次内典引引外命婦就朝堂位司樂帥女工人入就位典樂升就舉麾位司賛帥典賛先就殿庭位内典引各引外命婦兩行以次進至肅章門司賔接引進入立于皇后正殿閤外如朝堂之位謁者引太尉以下就肅章門外位持節者立于太尉之北少退東面謁者監引内給事就南面位謁者監退復位内命婦等應陪列者各服其服司賔引就陪位尚儀版奏外辦皇后首飾褘衣司言引尚宫尚宫引皇后出自正殿西房侍衛警蹕如常儀首飾褘衣所司預進典樂舉麾奏正和之樂凡樂皆典樂舉麾工鼔柷而後作偃麾戛敔而後止皇后至兩楹間南向立定樂止初内給事既就南面位太尉進内給事前北向跪稱太尉封臣某司徒封臣某奉制授皇后偹物典冊訖俛伏興退復位謁者監引内給事詣肅章門傳告司言司言入詣皇后前跪奏訖興還侍位初司言入奉冊琮璽綬者以次進當司徒前司徒取冊琮綬以次進授太尉舉案者以次退司徒授訖退復位内侍進太尉前西面以次受冊琮璽綬東面授内謁者監量以内謁者等助舉之退復位内謁者監等持冊琮璽綬等進立于肅章門外跪置冊琮璽綬于案俛伏興初司言奏訖尚儀賛皇后降司言引尚宫尚宫引皇后降就庭中北面位皇后初行樂作立定樂止初皇后將降又尚宫詣門跪取冊尚服詣門跪取琮璽綬興進俱入立于皇后之右少前西向司言司寳各一人進立于皇后之左少前東向尚宫稱有制尚儀賛皇后再拜皇后再拜尚宫宣冊訖尚儀又賛皇后再拜皇后再拜奉冊進授皇后皇后受以授司言尚服又奉琮璽綬次授皇后皇后受以授司寳訖尚儀賛皇后升坐皇后御輿繖扇侍衞如常皇后升初行樂作即御坐南向坐司璽奉琮璽置于御坐樂止司賔引内命婦等陪列者以次進就北面位為首者初行典樂舉麾舒和之樂作至位立樂止司賛曰再拜掌賛承傳内命婦皆再拜司賔引為首者一人詣西階初行樂作至階樂止為首者脱舄升進當御坐前北面跪奏稱某妃妾姓等言伏惟殿下坤象配天德昭厚載凡厥兆庶不勝慶躍訖起司賔引為首者自西階降納舄樂作復位樂止司賛曰再拜掌賛承傳内命婦等皆再拜司言前承令降自西階詣命婦西北東面稱令㫖内命婦等皆再拜宣令訖在位又再拜司賛曰再拜典賛承傳在位者皆再拜司賔以次從隨使出門各還其寢為首者初行樂作至門樂止司賔又引外命婦以次入為首者初入門舒和之樂作至位樂止立定司賛曰再拜掌賛承傳外命婦皆再拜訖司賔引為首者一人進升奉賀復位拜樂作止及宣令拜辭等皆如内命婦之儀訖引出為首者初行樂作出門樂止司言又奏羣官賀訖尚儀前跪奏稱尚儀妾姓等言禮畢興還侍位皇后降坐樂作御輿入自東房侍衞警蹕如常儀樂止女工人退冊命使者乘輅詣朝堂至降車所降輅入至太極殿庭大横街南御道東北面西上立中書令立于太尉東北西面太尉等再拜復命曰奉制授皇后備物典冊禮畢又再拜中書令奏聞太尉等退鹵簿幡節等各還本司皇后受羣臣賀皇后表謝朝皇太后皇帝㑹羣臣羣臣上禮皇后㑹外命婦皇后廟見右並如納后之儀大唐開元禮卷一百五
