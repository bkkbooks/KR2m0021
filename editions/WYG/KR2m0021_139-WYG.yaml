body:
  text: 大唐開元禮卷一百三十九唐蕭嵩等撰凶禮三品以上喪之二將𦵏陳車位陳器用進引引輴輴在庭位祖奠輴出升車遣奠遣車器行序諸孝從柩車序郭門親賓歸諸孝乘車宿止宿處哭位行次奠親賓致賵墓上進止塋次到墓陳明器下柩哭序入墓墓中置器序掩壙祭后土反哭虞祭将葬陳車位啟日之夕納柩車於大門之内當門南向進靈車於柩車之右内外所乘之車陳於大門外丈夫之車門西婦人之車門東俱服重者在上以近門及北方為上女子子妻妻之車以木為之不漆飾無者以蘧蒢衣車以蒲纒轅轂若白土堊之又以布為􅀈㡘周及大功之車以白土堊之或衣蘧蒢皆以布為􅀈㡘其布如服布掌事者預於宿所張吉凶帷幕凶帷在西吉帷在東俱南向設靈座於吉帷下如常式陳器用啟之夕發引前五刻搥一皷為一嚴無鼓者量時行事也陳布吉凶儀仗方相黄金四目為方相誌石大棺車及明器以下陳于柩車之前一品引四披六鐸左右各八黼翣二黻翣二畫翣二二三品引二披四鐸左右各六黻翣二畫翣二引者引輀車索也披者繫于輀車四序在旁執之以僃傾覆鐸者以銅為之所以莭挽者翣者以木為之筐廣二尺髙二尺四寸其形方兩角髙衣以白布柄長五寸黻翣黻翣畫黻黻文于翣之内四縁畫以雲氣畫翣者内及縁皆畫雲氣進引二刻頃搥二皷為二嚴掌饌者徹啟奠以出初徹奠内外俱興立哭於位執紼者皆入掌事者徹帷持翣者升以翣障柩執紼者升執鐸者入夾西階立執纛者入當西階南北面立掌事者取重出倚於門外之東執旌者立執纛南北面諸執披紼鐸旌纛翣者皆布深衣介幘陳布将訖搥三皷為三嚴進靈車於内門外南向祝以腰輿詣靈座前内喪則婦人執腰輿祝於輿左西向跪告曰孤子某母云哀子謹用吉辰奉歸先寢若新卜宅云奉遷幽宅靈車就引神道紆迴惟以荒寥無任哽絶興立少頃腰輿出降自西階羽儀從者如平生詣靈車後少頃輿退引輴將引輴輴即柩車也執鐸者俱振鐸引輴降就階間南向初輴動及進止執鐸者皆振鐸每振先搖之搖訖三振之其持翣者恒以翣障於輴輴降階執纛者却行而引輴止則廽北面立執旌亦漸而南輴止迴北向立主人以下次從輴而降主婦又次其後降輴在庭位輴至庭主人及諸子以下立哭於輴東西向南上祖父以下立哭於輴東北南向西上異姓之丈夫立哭於主人東南西靣北上婦人以次從降妻妾女子子以下立哭於輴西東靣南上祖母以下立哭於輴西北南向東上異姓之婦人立哭於主婦西南東面北上内外之際障以行帷凡帷用如服布國官立哭于執紼者東南北面西上僚佐立哭于執紼者西南北面東上祖奠庭位既定祝帥執饌者設祖奠於輴東如大斂之儀祝酌奠訖進饌南北面跪曰永遷之禮靈神不留謹奉柩車式遵祖道尚饗興退少頃徹之輴出升車執披者執前後披執紼者引輴出輴車動旌先纛次主人以下從哭於輴後婦人次哭于後輴出到輀車執紼者解紼屬於輀車後執披者如常遂升柩内外哭位如在庭之儀遣奠既升柩祝與執饌者設遣奠於柩東如祖奠之禮祝酌奠於饌前少頃徹之遣車既遣奠掌事者以蒲葦苞牲體下節七苞以繩束之盛以盤載於車列於旌前器行序徹遣奠靈車動從者如常皷吹振作而行先靈車後次方相車次誌石車次大棺車次輴車誌石與大棺車若先設者不入陳布之次次明器車次下帳輿次米輿五穀米實以五筲各計二升羃用疏布次酒脯醢輿酒實以壺各五升羃用功布醢實於二瓮各三升羃用疏布次苞牲輿次食輿食輿盤椀具足方相以下駕士馭士舁明器下帳等人皆介幘練衣次銘旌次纛次鐸鐸分為左右次輀車諸孝從柩車序主人及諸子具絰杖衰服秃者衰巾加絰徒跣哭從諸丈夫婦人各依服精粗以次從哭出門内外尊行者皆乘車馬哭不絶聲郭門親賓歸出郭若親賓還者權停柩車内外尊行者皆下馬依服之精粗為序立哭如式相者引親賓以就柩車之左向柩立哭盡哀卑者再拜退婦人亦如之諸孝乘車親賓既還内外乘車馬若墓逺及病不堪步者雖無親賓還主人及諸子亦乘堊車去墓三百步皆下宿止靈車到帷門外迴南向進腰輿于靈車後羽儀從者如常少頃輿入詣靈座前少頃降出隨進常食於靈座若食頃徹之每至停宿之所設靈座於室進食皆如初柩車到入凶帷停於西廂南轅祝設几席於柩車東宿處哭位初至宿處内外皆就柩車所主人及諸子以下於柩車之東西面南上妻妾女子子婦人於柩車之西東面南上祖父以下於柩車東北南靣西上異族有服者於柩車東南西靣北上祖母以下於柩車西北南面東上異姓婦人又於柩車西南東靣北上國官於帷外柩之東北靣西上僚佐於帷外柩之西北靣東上俱立哭行次奠凡停宿進酒脯之奠於柩東如朝奠之儀既設奠内外各還次迭哭不絶聲及夕内外就柩車所哭進夕奠如朝奠之儀訖迭哭如常厥明又就位哭進朝奠亦如之若食頃徹之吉凶儀仗如式發引内外従哭如初儀親賓致賵賓有賵禮在主人設祖奠之時賓立於門外西廂東面從者以篚奉𤣥纁立於賓西南俱東面牽馬者以馬陳於賓東靣北首西上相者入告遂詣主人之左北面受命訖到賓前西面曰敢請事賓曰某敢賵相者入告出曰孤某須矣賓之從者坐奠篚取幣興詣賓前西面以授賓退復位相者引賓入牽馬者先以馬入陳於輴車南北靣西上賓入由馬西當輴車東南北面立内外權止哭賓曰某諡封若某位将歸幽宅敢致賵辭畢而哭内外皆哭主人拜稽顙賓止哭相者引賓進輴東西向奠幣于車上相者引賓又由輴車前以西而出初賓出掌事者由主人右詣輴車東西向舉幣以東東蔵也受馬者由前旋牽馬者由後適其右受之牽者由前以西而出賓将出主人拜稽顙送之墓上進止塋次前一日之夕掌事者預於墓門内道西張帷幕設靈座如初到墓乘車者卑行望墳而下尊行及塋而下序哭靈車至帷門外廻車南向祝以腰輿詣靈車後少頃入詣靈座前少頃以輿降出遂設酒脯之奠如初柩車至墳前迴南向丈夫婦人之位如遣奠之儀陳明器掌事者陳明器於壙東南西向北上下柩哭序進輴車於柩車之後張帷下柩於輴丈夫柩東婦人柩西以次進憑柩哭盡哀各退復位内外卑者俱再拜辭訣相者引主人以下哭於羨道東西面北上妻妾女子子以下婦人皆障以行帷哭於羡道西東面北上入墓施席於壙户内之西執紼者屬紼於輴遂下柩於壙户内席上北首覆以夷衾墓中置器序輴出持翣者倚翣於壙内兩廂遂以下帳張於柩東南面米酒脯陳于下帳東北食盤設于下帳前苞牲置於四隅醢醢陳於食盤之南藉以版明器設於壙内之左右掩壙掌事者以𤣥纁授主人主人授祝奉以入奠於靈座主人拜稽顙施銘旌誌石於壙門之内置設訖掩戸設關鑰遂覆土三主人以下稽顙哭盡哀退俱就靈所哭掌儀者設祭后土於墓左如後儀祭后土預於墓左除地為祭所柩車到祝吉履鋪后土氏神席北方南向設酒樽於神座東南北向設洗於酒樽東南北向罍水在洗東篚在洗西南肆以巾爵加於洗篚既復土告者吉服國官僚佐之長若無以親賓充相者引告者與祝及執樽罍篚者俱立於罍洗東南重行西面以北為上立定俱再拜祝與執樽罍篚者俱就樽罍篚之後相者進告者之左北面白請行事掌饌者以饌入祝迎引設於神座前置設訖掌饌者出相者引告者詣罍洗盥手洗爵相者引告者詣酒樽所執樽者舉羃告者酌酒進跪奠神座前俛伏興少退北向立祝持版進於神座之右東面跪讀祝文曰維年月朔日子某官姓名敢昭告於后土之神某官封諡窆兹幽宅神其保佑俾無後艱謹以犧齊粢盛庶品明薦於后土之神尚饗祝興告者再拜祝進跪奠版於神座興還樽所相者引告者退復位再拜相者引告者出祝以下俱復位再拜徹饌席以出反哭既下柩於壙搥一皷為一嚴無皷者量時陳布掩墓户搥二皷為再嚴内外就靈所搥三皷為三嚴徹酒脯之奠進靈車於帷外陳布儀仗如來儀又進腰輿入詣靈座前少頃出詣靈車後少頃輿退靈車發引内外從哭如初儀出墓門尊行者乘車馬去墓百步許卑者乗馬以哭從靈車到第内外皆下車馬靈車入至西階前迴南向祝以腰輿詣靈車後少頃升入詣靈座前主人以下升立于靈座東西面南上少頃腰輿降出内外俱升諸祖父以下哭於帷東北壁下南面西上妻及女子子以下婦人哭於靈西東面南上諸祖母以下哭於帷西北壁下南面東上外姻哭於南廂丈夫於帷東北面西上婦人於帷西北面東上有親賓弔哭者升堂西面向靈哭如常儀其弔於庭者稱痛當奈何餘如常儀哭盡一哀相者引主人以下降各還次沐浴以俟虞斬衰者沐而不櫛齊衰以下者櫛虞祭柩既入壙國官若僚佐之長與祝先歸修虞事牢饌如殷奠器用烏漆預造虞主以烏漆匵匵之盛於廂烏漆趺一皆置於别所虞主用桑主皆長尺方四寸上頂圓上下四徑一寸八分四廂各剡一寸一分又方通孔徑九分其匵底盖方底自下而上盖俱従上而下與底齊其趺方一尺厚三寸將祭出神主置於座匵置於神主之後具饌於堂東靈車將至掌事者預施靈座於寢堂室内户西東向於靈座之南北設帷東出户若室内窄則設靈座於堂腰輿將入祝奉虞主入置於靈座東向設素几於右掌事者設洗于西階西南北向東西當西霤南北以堂深罍水在洗西篚在洗東南肆篚實爵一巾一加羃設瓦甒二於靈座之左北墉下醴酒在東幂用絺加勺南柄既沐浴主人及諸子妻妾女子子内外升詣靈所主人及諸子倚杖於户外及應拜者哭於靈東西如初内外皆哭祝與執樽罍篚者各就樽罍篚所立執饌者以饌入俱升自東階陳設如殷祭之儀掌饌者降出相者引主人降自西階詣罍洗主人止哭執罍洗者酌水主人盥手執篚者取巾於篚興授主人主人拭手訖受巾奠於篚又取爵興以授主人執罍洗者又酌水主人洗廢爵爵無足者執篚者又授巾主人拭爵訖受巾奠於篚相者引主人升自西階詣酒樽所執樽者舉羃主人酌醴相者引主人詣靈座前西面跪奠爵於饌前俛伏興少退西面立祝以祝文進於神座之右北面内外皆止哭祝跪讀祝文曰維年月朔日子哀子某孫稍哀孫此為母及祖母所稱也父祖則稱孤子孤孫告於考某官封諡妣即云妣夫人某氏孫為䘮主則稱祖妣日月遄速奄及反虞叩地號天五情糜潰謹以潔牲柔毛剛鬛明粢薌合薌萁嘉疏嘉薦醴齊哀薦祫事於考某官封諡尚饗祝興主人哭再拜内外應拜者皆哭再拜祝進跪奠版於靈座興出復位哭盡哀相者引主人以下出杖降自西階各就次妻妾女子子以下各還别室祝闔户與執樽罍者降出少頃祝與掌饌者入開户徹饌祝匵主闔户以出掌事者埋重於門外道左間日再虞後日三虞禮皆與初虞同又間日為卒哭祭其虞祝辭再虞云哀薦虞事三虞云哀薦成事大唐開元禮卷一百三十九
