body:
  text: 大唐開元禮卷十六唐蕭嵩等撰吉禮皇帝季夏土王日祀黄帝於南郊齋戒陳設省牲器鑾駕出宫奠玉帛進熟鑾駕還宫齋戒前祀七日平明太尉誓百官於尚書省曰某月某日祀黄帝於南郊各揚其職不供其事國有常刑皇帝散齋四日致齋三日如圜丘之儀凡預祀之官散齋四日致齋三日散齋皆於正寢致齋二日於本司一日於祀所若無本司皆於祀所近侍之官應從升者及從祀羣官諸方客使各於本司及公館清齋一宿凡散齋理事如舊唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯祀事得行其餘悉斷其祀官已齋而闕者通攝行事諸祀官致齋之日給酒食及明衣各習禮於齋所光禄卿監取明水火太官令取水於隂鍳取火於陽燧火以供爨水以實樽前祀一日諸衛令其屬未後一刻各以其方器守衛壝門與太樂工人俱清齋一宿陳設前祀三日尚舍直長施大次於外壝東門之内道北南向尚舎奉御鋪御坐衛尉陳饌㡢於内壝東門之外道南北向設文武侍臣次又設祀官及從祀羣官諸州使人蕃客等次前祀二日太樂令設宫懸之樂於壇南内壝之内設歌鐘歌磬於壇上各如圜丘之儀右校掃除壇之内外郊社令積柴於燎壇其壇於樂懸之南外壝之内方一丈髙一丈二尺開上南出户六尺前祀一日奉禮設御位於壇之東西向設望燎位於柴壇之北南向設祀官公卿位於内壝東門之外道南分獻之官於公卿之南執事者位於其後毎等異位重行西向北上設御史位於壇下一位在東南西向一位在西南東向令史各陪其後設奉禮位於樂懸東北賛者二人在南差退俱西向設協律郎位於壇上南陛之西東向設太樂令位於北懸之間北向設從祀之官文官九品已上於執事之南東方南方蕃客又於其南俱每等異位重行西向北上酅公介公位於内壝西門之外道南武官九品已上於酅公介公之後西方北方蕃客位於其南俱每等異位重行東向北上其褒聖侯於文官三品之下諸州使人分方各位於其後又設祀官及從祀羣官等門外位於東西壝門之外道南皆如設次之式設牲牓於東壝之外當門西向配帝牲牓少退南上設廩犧令位於牲西南史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北南向設黄帝酒樽於壇之上下太樽二著樽二犧樽二山罍二在壇上於東南隅北向象樽二壺樽二山罍二在壇下皆於南陛之東北向西上設配帝著樽二犧樽二象樽二山罍二在壇上於黄帝之酒樽東北向西上鎮星后土氏俱象樽二各設於神坐之左皆右向黄帝配帝之樽置於坫星辰以下樽藉以席皆加勺幂設爵於樽下設御洗於壇南陛東南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設星辰以下罍洗篚幂各於其方陛道之左俱内向執樽罍篚幂者各位於其後又設玉幣之篚於壇之上下樽罍之所祀日未明五刻太史令郊社令升設黄帝含樞紐神坐於壇上北方南向席以藁秸設帝軒轅氏神坐於東方西向席以莞設鎮星三辰之坐於東北設后土氏之坐於壇之東南西向席皆以莞設神位各於坐首省牲器省牲之日午後十刻去壇二百步所諸衛之屬禁斷行人晡後二刻郊社令帥府史二人及齋郎以樽坫罍洗篚幂入設於位晡後三刻諸太祝與廩犧令以牲就牓位謁者引太常卿賛引引御史詣壇東陛升視滌濯於上於視濯執樽者皆舉羃告潔訖引太常卿降復位謁者進太尉之左白請就門外位謁者賛引各引祀官以下就門外位謁者引太常卿就省牲位南向立廪犧令少前曰請省牲退復位太常卿省牲廪犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西向舉手曰充俱還本位諸太祝與廪犧令以次牽牲詣厨授太官令謁者引光禄卿詣厨省鼎鑊申視濯溉謁者賛引各引祀官御史就厨省饌具訖還齋所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲鑾駕出宫如圜丘之儀奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各率其屬入實樽罍玉幣凡六樽之次太樽為上實以汎齊著樽次之實以醴齊犧樽次之實以盎齊象樽次之實以醍齊壺樽次之實以沈齊山罍為下實以清酒配帝著樽為上實以汎齊犧樽次之實以醴齊象樽次之實以盎齊山罍為下實以清酒其鎮星后土氏之象樽俱實以醍齊𤣥酒各實於五齊之上樽禮神之玉以黄琮其幣各以黄太官令帥進饌者實諸籩豆簠簋入設於内壝東門之外饌幔内未明二刻奉禮帥賛者先入就位賛引引御史博士諸太祝及令史祝史與執樽罍篚幂者入自東門當壇南重行北面西上立定奉禮曰再拜賛者承傳凡奉禮有辭賛者皆承傳御史以下皆再拜訖執樽罍篚幂者各就位賛引引御史諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖各引就位駕將至謁者賛引各引祀官通事舍人分引從祀諸官諸方客使先至者就門外位駕至大次門外迴輅南向將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅之大次通事舍人各引文武五品以上從祀之官皆就壝外位太樂令帥工人二舞次入就位文舞入陳於懸内武舞立於懸南道西謁者引司空入行掃除訖出復位皇帝停大次半刻頃通事舍人賛引各引從祀羣官介公酅公諸方客使先入就位太常博士引太常卿立於大次門當門北向侍中版奏外辦皇帝服大裘而冕出次華盖侍衛如常儀博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至内壝門外殿中監進大珪尚衣奉御又以鎮珪授殿中監殿中監受進皇帝搢大珪執鎮珪華盖仗衛停於門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常皇帝至版位西向立毎立定太常卿博士即退立於左謁者賛引各引祀官次入就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俛伏興舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼓柷奏宫音乃以黄鐘之均文舞之舞樂六成偃麾戞敔樂止太常卿前奏再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜上下諸太祝俱取玉幣於篚各立於樽所太常卿引皇帝太和之樂作皇帝詣壇升自南陛侍中中書令以下左右衛量人從升壇皇帝升壇北向立樂止太祝加玉於幣以授侍中侍中奉玉帛東向進皇帝搢鎮圭受玉帛登歌作肅和之樂以大吕之均太常卿引皇帝進北面跪奠於黄帝􅅤樞紐神坐前俛伏興太常卿引皇帝少退北向再拜訖太常卿引皇帝立於西方東向又太祝以幣授侍中侍中奉幣北面進皇帝受幣太常卿引皇帝進東面跪奠於帝軒轅氏神坐俛伏興太常卿引皇帝少退東向再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止皇帝初奠配帝之幣星辰以下諸祝各以幣進奠於神坐還樽所初羣官拜訖祝史各奉毛血之豆立於門外於登歌止祝史奉毛血入各由其陛升諸太祝迎取於壇上俱進奠於神坐前諸太祝與祝史退立於樽所進熟皇帝既升奠玉帛太官令出帥進饌者奉饌陳於内壝門外謁者引司徒出詣饌所司徒奉黄帝之俎初皇帝既至位樂止太官令引饌入俎初入門雍和之樂作以黄鍾之均饌至階樂止祝史俱進跪徹毛血之豆降自東陛以出黄帝之饌升自南陛配帝之饌升自東陛諸太祝迎引於壇上各設於神坐前籩豆盖羃先徹乃升簠簋既奠却盖於下設訖謁者引司徒太官令帥進饌者俱降自東陛以出司徒復位諸太祝各還樽所又進設星辰以下之饌相次而畢太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤興承水進皇帝盥手黄門侍郎跪取巾於篚興進皇帝帨手訖黄門侍郎受巾跪奠於篚遂取匏爵於篚興皇帝受爵侍中酌罍水侍中奉盤皇帝洗爵黄門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤匜黄門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝詣壇升自南陛樂止謁者引司徒升自東陛立於樽所齋郎奉俎從升立于司徒之後太常卿引皇帝詣黄帝酒樽所執樽者舉羃侍中賛酌汎齊訖夀和之樂作太常卿引皇帝進黄帝含樞紐神坐前北向跪奠爵俛伏興太常卿引皇帝少退北向立樂止太祝持版進於神坐之右東向跪讀祝文曰維某年嵗次月朔日子嗣天子臣某敢昭告於黄帝含樞紐爰兹溽暑實惟土潤戊巳統位黄鐘在宫敬以玉帛犧齊粢盛庶品恭備燔祀式䖍厚徳帝軒轅氏配神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版於神坐前興還樽所皇帝拜訖樂止太常卿引皇帝詣配帝酒樽所執樽者舉羃侍中取爵於坫進皇帝受爵侍中賛酌汎齊訖樂作太常卿引皇帝進帝軒轅氏神坐前東向跪奠爵俛伏興太常卿引皇帝少退東向立樂止太祝持版進神坐之右北面跪讀祝文曰維某年嵗次月朔日子嗣開元神武皇帝臣諱敢昭告於帝軒轅氏時維季夏位膺土徳式奉明禋於黄帝含樞紐惟帝功施厚地道合上𤣥謹以制幣犧齊粢盛庶品肅陳明薦作主配神尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版於神坐興還樽所皇帝拜訖樂止太常卿引皇帝進黄帝神坐前北向立樂作太祝各以爵酌上樽福酒合置一爵一太祝持爵授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興太祝各帥齋郎進俎太祝减神前胙肉加於俎以胙肉共置一俎上太祝持俎以授司徒司徒奉俎面向進皇帝受以授左右謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中受爵以授太祝太祝受爵復於坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓祝作舒和之樂立定戛敔樂止皇帝獻將畢謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉自東陛升壇詣黄帝著樽所執樽者舉羃太尉酌醴武舞作謁者引太尉進黄帝神坐前北向跪奠爵興謁者引太尉少退北向再拜謁者引太尉詣配帝犧樽所取爵於坫執樽者舉羃太尉酌醴齊謁者引太尉進帝軒轅氏神坐前東向跪奠爵興謁者引太尉少退東向再拜謁者引太尉進黄帝神坐前北面立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉復位初太尉獻將畢謁者引光禄卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光禄卿復位初太尉將升獻賛引二人各引獻官以次詣罍洗盥手洗爵一獻鎮星一獻后土氏各詣酒樽所俱酌進跪奠於坐首興餘坐皆祝史助奠相次而畢賛引各引獻官還本位武舞六成樂止舞獻俱畢上下諸祝史各進跪徹豆興還樽所徹者籩豆各一少移於故處奉禮曰賜胙賛者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜豫和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作皇帝就望燎位南向立樂止於羣官將拜上下諸祝各執篚進神坐前跪取玊帛祝版齋郎以爼載牲體黍稷飯及酒爵興各自其陛降壇南行經懸内當柴壇南東行自南陛登柴壇以玊帛祝版饌物置於柴上户内諸祝又以星辰以下之禮幣皆從燎奉禮曰可燎東西面各六人以炬燎火半柴太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出内壝門殿中鹽前受鎮珪以授尚衣奉御殿中鹽前受大珪華盖侍衛如常儀皇帝入次樂止謁者賛引引祀官通事舍人引從祀羣官諸方客使以次出賛引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出工人二舞以次皆出鑾駕還宫如圜丘之儀大唐開元禮卷十六
