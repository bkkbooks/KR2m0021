body:
  text: 大唐開元禮卷二十六唐蕭嵩等撰吉禮皇帝秋分夕月於西郊齋戒陳設鑾駕出宫奠玉帛進熟鑾駕還宫齋戒前祀五日皇帝散齋三日致齋二日凡預祀之官散齋三日致齋二日散齋皆于正寢致齋一日于本司一日于祀所其無本司者皆于祀所近侍之官應從升者及從祀羣官諸方客使各于本司及公館清齋一宿無本司者各于正寢凡散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祀事得行其餘悉斷其祀官已齋而闕者通攝行事光祿卿監取明水火太官令取水于隂鑒取火于陽燧火以供爨水以實尊前祀一日諸衛令其屬未後一刻各以其方器服守衛壝門與太樂工人俱清齋一宿陳設前祀二日尚舎直長施大次于外壝東門之内道北南向尚舎奉御鋪御坐衛尉陳饌幔于内壝東門之外道南北向設文武侍臣次又設祀官及從祀羣官諸州使人蕃客等次太樂令設宫懸之樂于壇南内壝之内設歌鐘歌磬右校掃除壇之内外郊社令積柴于燎壇其壇于神壇之左内壝之外方八尺髙一丈開上南出户方三尺前祀一日奉禮設御位及望燎位祀官從祀羣官諸州使人蕃客等位于内壝之内皆如圜丘之儀設酒樽之位太樽二著樽二山罍一在壇上于東南隅北向尊皆置于坫加勺羃設爵于尊下設御洗于壇南陛東南亞獻之洗又設于東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵執尊罍篚冪者各于尊罍篚冪之後設玉幣之篚于壇上尊坫之所晡後謁者引光祿卿詣厨視濯溉又謁者引諸祀官詣厨省饌具訖還齋所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血置于饌所遂烹牲白牲一未明五刻太史令郊社令升設夜明神坐于壇上北方南向席以藁秸設神位于坐首鑾駕出宫如圜丘之儀奠玉帛祀日未後二刻諸祀官各服其服郊社令良醖令各帥其屬入實樽罍玉幣凡尊之次太尊為上實以醴齊著尊次之實以盎齊罍尊實以清酒其𤣥酒各實于上尊罍尊無𤣥酒禮神之玉以珪璧其幣以白太官令帥進饌者實諸籩豆簠簋入設于内壝東門之外饌幔内未後三刻奉禮帥賛者先入就位賛引引御史太祝及令史祝史與執樽罍篚羃者入自東門當壇南重行北面西上凡引導者毎曲一逡巡立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳御史以下皆再拜訖執樽者升自東陛立于樽所執罍洗篚冪者各就位賛引引御史太祝詣壇東陛升行埽除于上令史祝史行埽除于下訖就位駕将至謁者賛引各引祀官及從祀群官諸國客使先至者俱就門外位駕至大次門外迴輅南向将軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅之大次謁者引文武五品以上從祀之官皆就門外位太樂令帥工人二舞次入就位文舞入陳于懸内武舞立于懸南道西謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行埽除于上降行樂懸于下訖引出就位皇帝停大次半刻頃謁者賛引各引從祀文武羣官介公酅公諸國客使先入就位太常博士引太常卿立于大次門外當門北向侍中版奏外辦皇帝服𤣥冕出次華葢侍衛如常儀侍中負寳陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士前引至内壝門外殿中監進大珪尚衣奉御又以鎮珪授殿中監殿中監受進皇帝搢大珪執鎮珪華盖仗衛停于門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常皇帝至版位西向立每立定太常卿與博士退立于左謁者賛引各引祀官次入就位立定太常前奏請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位恊律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而後興鼓柷奏豫和之樂乃以圜鐘之均文舞之舞樂舞六成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止太常卿前奏請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太祝取玉幣于篚立于樽所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣壇升自南陛侍中中書令以下及左右侍衛量人從升以下皆如之皇帝升壇北向立樂止太祝加玉于幣以授侍中侍中奉玉帛東向進皇帝搢鎮珪受玉帛每受物搢鎮珪奠訖執珪俛伏興登歌作肅和之樂乃以大吕之均太常卿引皇帝進北面跪奠于夜明神坐俛伏興太常卿引皇帝少退北向再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止初羣官拜訖祝史奉毛血之豆立于門外于登歌止祝史奉毛血入升自南陛太祝迎取于壇上進奠于神坐前太祝與祝史退立于樽所進熟皇帝既升奠玉帛太官令出帥進饌者奉饌陳于内壝門外謁者引司徒出詣饌所司徒奉俎初皇帝既至版位樂止太官令引饌入爼初入門雍和之樂作饌至陛樂止祝史進徹毛血之豆降自東陛以出饌升南陛太祝迎引于壇上設于神坐前籩豆盖羃先徹乃升簋簠既奠却其盖于下設訖謁者引司徒以下降自東陛復位太祝還樽所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤興承水皇帝盥手黄門侍郎跪取巾于篚興進皇帝帨手訖黄門侍郎受巾跪奠于篚黄門侍郎又取匏爵于篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黄門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤匜黄門侍郎受巾奠于篚皆如常太常卿引皇帝樂作皇帝詣壇升自南陛樂止謁者引司徒升自東陛立于樽所齋郎奉俎從升立于司徒之後太常卿引皇帝詣酒樽所執樽者舉羃侍中賛酌醴齋訖壽和之樂作皇帝每酌獻及飲福皆作夀和之樂太常卿引皇帝進夜明神坐前北向跪奠爵俛伏興太常卿引皇帝少退北向立樂止太祝持版進于神坐之右東面跪讀祝文曰維某年嵗次月朔日子嗣天子臣某敢昭告于夜明惟神昭著懸象煇燿隂精班歴授時仰觀取則爰兹秋仲用率恒禮謹以玉帛犧齊粢盛庶品恭祀于神尚饗訖興皇帝再拜初讀祝文訖樂作太祝進奠版于神坐還樽所皇帝拜訖樂止太祝以爵酌上樽福酒授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興太祝帥齋郎進爼太祝减神前胙肉加于爼太祝持俎以授司徒司徒奉俎西向進皇帝受以授左右謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復于坫皇帝俛伏興再拜太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止皇帝獻将畢謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉自東陛升壇詣著樽所執樽者舉羃太尉酌盎齊武舞作謁者引太尉進夜明神座前北向跪奠爵興謁者引太尉少退北向再拜訖太祝以爵酌罍福酒進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復于坫太尉興再拜謁者引太尉降復位初太尉獻将畢謁者引光禄卿詣罍洗盥手洗匏爵升酌盎齋終獻如亞獻之儀訖謁者引光祿卿降復位武舞六成樂止舞獻俱畢太祝進徹豆還樽所徹者籩豆各一少移于故䖏奉禮曰賜胙賛者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜豫和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作皇帝就望燎位南向立樂止于羣官将拜太祝執篚進神坐前跪取玉帛祝版齋郎以俎載牲體黍稷飯爵酒興降自南陛行經懸内當柴壇南東行自南陛登柴壇以玉幣祝版饌物置于柴上户内訖奉禮曰可燎東西面各四人以炬燎火半柴太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出内壝門殿中監前受鎮珪以授尚衣奉御殿中監又前受大珪華盖侍衛如常儀皇帝入次樂止謁者賛引各引祀官及從祀羣官諸國客使以次出賛引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜賛引引出工人二舞以次出鑾駕還宫如圜丘之儀大唐開元禮卷二十六
