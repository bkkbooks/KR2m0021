body:
  text: 大唐開元禮卷一百二十六唐蕭嵩等撰嘉禮朝集使於尚書省禮見并辭任官初上相見諸州上佐同京兆河南牧初上諸州刺史都督同萬年長安河南洛陽令初上諸縣令同朝集使於尚書省禮見并辭其日奉禮預布版位於尚書省都堂之前京官九品以上位在東每等異位朝集使位在西亦如之皆以北為上京官及朝集使俱常服謁者絳公服先引京官入就位又謁者引諸方朝集使等入就位奉禮立於朝集使之北差退贊者陪其後京官及朝集使序立訖奉禮曰再拜贊者承傳朝集使等俱再拜京官等逡巡揖避再拜訖京官等俱答拜朝集使等逡巡揖避再拜訖謁者贊稱禮畢羣官等各以次退朝集使亦退其辭禮亦如之任官初上相見諸州上佐同應册命之官受冊訖朝服乘輅備儀鳴鐃吹詣太廟南門至下車所鐃吹止受冊者降輅謁者引入立於廟廷北面西上立定再拜訖又再拜辭謁者引出乘輅鳴鐃而還若先受制書者發第備儀仗謁詣太廟如上儀遂詣本司將至卑官先引俱公服俟於别席所初上者至降輅贊禮者引入停於後堂改著公服儀仗陳於㕔事之前贊禮者引卑官俱位於內門之外西向每等異位重行東面以北為上初卑官就門外位贊禮者引初上者立於㕔事東階東南西面贊禮者引卑官以次入立於西階西南重行東面以北為上立定卑官俱再拜初上者答再拜贊禮者引卑官出贊禮者引初上者就後堂卑官俱更衣訖贊禮者引應坐者入立於㕔事東西階下其應致敬者立於門外東西俱北上贊禮者引初上者出升堂就榻後應坐者俱升詣坐後立定初上者升坐應坐者各依其班而坐其應致敬者入立於東西階下俱以北為上諸流外官入立於庭重行北面西上再拜訖就東階下品官之後本司以印及職掌置於案本司引入升詣坐前本司取印及職掌以次進置於坐上之案訖本司引案降出諸司以次咨判三條事訖俱興立於坐後贊禮者引初上者還後堂以外降出設㑹如常儀官卑不合拜廟者徑詣上所下判官者禮見而已若六品以下初上皆常服若先任者尊及官位等者先任者俟於東階下西面新任者入立於西階下東面再拜先任者答再拜訖新任者還於㕔事立於東階下與卑官相見如上儀諸州長史縣丞以下初上准此京兆河南牧初上諸州刺史都督初上禮附其日州牧備儀仗至州停於後堂兵曹設儀仗於㕔事門庭如常儀本司設牧位於㕔事楹間近北南向設州官長史司馬位於堂下東方西向設録事參軍以下位於司馬之南重行西向皆以北為上設諸縣官位庭中近西諸鄉望位於縣官之東每等異位俱重行北面相對為首州助教縣博士助教依鄉望班長史以下集於州南門之外州官在東縣官在西鄉望在州官東南各有次俱服公服鄉望常服司功整次紙名入咨贊禮者引牧出於㕔事東階東南西向左右侍從如常贊禮者立於牧南少退俱西向贊者引州官入就位次引縣令以下入門而左又引鄉望入門而右俱入就位立定贊禮者引牧升自東階即位南面立又引縣令及鄉望五品以上自西階升堂進當牧前重行北面位如在庭之儀立定上下俱再拜牧答再拜上下在位者皆逡巡避位贊禮者引縣令以下及鄉望俱出贊禮者引牧降入贊禮者引長史以下次出俱更衣本司量設牧坐於堂上訖贊禮者引縣令及鄉望俱就西階下又引長史以下入立於東階下俱北上贊者引牧出升堂就榻後長史以下并縣令及職事五品以上應升坐者合班俱升詣坐後立定牧升坐諸應坐者俱坐州縣佐史以下入庭中重行北面西上州縣學生位於其後俱再拜訖就阼階品官之後立録事以印及職掌置於案録事一人引入升詣坐前録事以印及職掌以次進置於牧案訖録事引案降出諸司以次咨判三條事訖坐者俱興贊禮者贊牧興引還後堂長史以下降出設㑹如常儀諸州刺史初上准此其鄉望文武官七品以上及德行有聞者皆升堂萬年長安令初上河南洛南縣令禮同諸縣令初上禮同其日令停於後堂設令位於㕔事楹間近北南向設鄉望位於南方重行北向以西為上其勳官依出身班博士助教依鄉望班又設丞位於東方西向設主簿及尉位於丞南少退西向北上鄉望以下俱集於縣南門外之西各有次司功整次紙名入咨贊禮者引令出立於㕔事東階東南西向侍從如常儀贊禮者立於令之南少退俱西向贊禮者引丞以下入就位次引鄉望入就位贊禮者引令升自東階即位南向立贊禮者引鄉望文武官五品以上升自西階當進令前重行北面以西為上立定上下在位者俱再拜令答再拜上下在位者皆逡巡避位贊禮者引鄉望降自西階以出鄉望在庭者繼出贊禮者引令降自東階以入又引丞以下以次出本司量設牀坐於堂上訖贊禮者引鄉望入立於㕔事西階下丞以下立於門外道西東面俱北上贊禮者引令出升堂就榻後又贊禮者引丞入及鄉望文武官五品以上俱升詣坐後立又贊禮者引主簿及尉入立於東階下立定令升坐諸應坐者俱坐録事及佐史以下入立於庭中北面西上學生位於其後俱再拜訖就東階下縣尉後立録事以印及職掌置於案録事一人引入升詣坐前録事取印及職掌以次進置於令案訖録事引案降諸司以次咨判三條事訖丞及鄉望俱興贊禮者贊令興引還後堂鄉望降出設㑹如常儀諸縣令初上准此其鄉望文武官七品以上及德行有聞者皆升堂大唐開元禮卷一百二十六
