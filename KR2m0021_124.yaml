body:
  text: 大唐開元禮卷一百二十四唐蕭嵩等撰嘉禮四品五品婚納采問名納吉納徵請期親迎見舅姑盥饋婚㑹婦人禮㑹饗丈夫送者饗婦人送者納采婚禮先使媒氏通書女氏許之乃致納采之禮前一日主人設賔次於大門外道右南向以後納吉納徵請期親迎設次皆如之其日大昕使者至女氏大門外掌次者延入次主人公服受其禮於廟無廟者於正寢掌事者布神席於室户外之西右几使者公服出次立於大門外之西東面主人立於東階下西面儐者立於主人之左北面受命出立於門東西面曰敢請事賔曰吾子有命貺室某也吾子女父某壻名某有先人之禮使某也請納采上某壻父名下某使者稱儐者入告主人曰某之子蠢愚又弗教吾子命之某不敢辭儐者出告掌畜者以鴈授賔退立於後賔左手執之主人迎於大門外之東西面再拜賔不答拜主人揖賔以入賔從入主人入門而右賔入門而左至於次門主人又揖入至內霤將曲揖當階揖至階主人曰請吾子升賔曰某敢辭主人曰固請吾子升賔曰某敢固辭主人曰終請吾子升賔曰某敢終辭主人升東階當阿阿棟也西面賔升西階當阿東面賔曰敢納采主人阼階下北面再拜進立楹間南面賔進立於主人之西俱南面賔授鴈降自西階以出問名納采禮畢賔既降立於內門外之西東面初賔降主人還阼階東左右受鴈於序端主人降立於阼階下西面儐者進受命出請事賔曰某既受命將加諸卜敢請女為誰氏儐者入告主人曰吾子有命且以備數而擇之某不敢辭儐者出告掌畜者以鴈授賔退立於後主人迎於內門外之東西面揖賔以入主人入門而右賔入門而左二揖至階三讓如初主人升阼階當阿西面賔升西階當阿東面曰敢問名主人於阼階上北面再拜進立於楹間南面賔進立於主人之西俱南面賔授鴈還立西階上東面主人還阼階上西面曰某第某女某氏出賔出立於內門外之西東面主人退立於阼階東左右受鴈於序端主人降立於阼階下西面儐者進受命出請事賔曰禮畢儐者入告主人曰吾子為事故至於某之室某有先人之禮請禮從者儐者出告賔曰某既得將事敢辭儐者入告主人曰先人之禮敢固以請儐者出告賔曰某辭不得命敢不從儐者入告主人升立於序端掌事者徹几改筵東上蒲筵緇布純加萑席神𤣥帛純漆几主人設席亦准此設甒醴於東房內西墉下加勺羃篚在樽北實觶一角柶一加羃籩豆在篚北實脯醢設洗於東房近北罍水在洗西篚在洗東北肆設訖主人降迎賔於內門外之東西面主人揖賔賔報揖主人入賔從入二揖至階三讓如初升主人於阼階上北面再拜賔於西階上北面答拜主人受几於序端掌事者內拂几三奉兩端西北向進主人東南向外拂几三振袂內執之進西北向使者迎受於筵前東南向以俟主人還阼階上北面拜送賔以几避北面坐設於坐左興退於西階上北面答拜立於西階東面贊者盥手洗觶酌醴加柶於觶覆之面葉出房南面立主人受醴面柄進筵前北面立賔西階上北面一拜進筵前東南面受醴復西階上位主人還阼階上北面一拜送贊者薦脯醢於筵前賔進升筵坐左執觶右執脯擩於醢祭於籩豆之間以柶祭醴三始扱一祭又極再祭興以柶兼諸觶上躐降筵於西階上北面坐啐醴建柶奠觶遂拜執觶興主人答拜賔進升筵坐奠觶於籩豆之東賔退立於西階上東面掌事者奉篚幣升自東階主人受於序端進西面立賔西階上北面再拜主人進楹間南面立賔進立於主人之西俱南面主人以幣篚授賔賔受退立於西階上東面主人還東階上北面拜送賔降自西階從者迓受幣賔出大門外之西東面立主人降出門東西面拜送賔退主人入立於東階下西面儐者告於主人曰賔不顧矣主人乃還於寢於使者歸主人壻之父公服立於阼階下西面使者入告立於主人之左北面曰某既得將事敢告主人曰聞命使者退主人入以下復命准此納吉其日大昕使者至女氏大門外掌次者延入次掌事者設几筵如初使者出次立於主人大門外之西東面主人立於阼階下西面儐者進受命出請事賔曰吾子有貺命某加諸卜占曰吉使某也敢告某壻父名也使某使者名儐者入告主人曰某之子不教唯恐不堪吾子有吉某預在焉某不敢辭儐者出告掌畜者以鴈授使者退立於後主人迎拜如常主人揖賔以入賔從入主人入門而右賔入門而左至於次門主人揖入二揖至階三讓如初主人升阼階上西面賔升西階上東面曰敢納吉主人北面再拜進立於楹間南面儐者立於主人之西俱南面賔授鴈降自西階出立於次門外之西東面初使者降主人還阼階東左右受鴈於序端主人降立於阼階下西面儐者進受命出請事使者曰禮畢其禮賔如問名之儀納徵其日大昕賔至女氏大門外掌事者延就次賔之掌事者入布羃於主人次門之外𤣥纁束陳於羃上兩馬陳於羃南北首西上主人掌事者設几筵如初其𤣥纁束𤣥三匹纁二匹合束之陳設訖使者出次立於主人大門外之西東面主人立於阼階下西面儐者進受命出請事賔曰吾子有嘉命貺室某也有先人之禮束帛兩馬使某也請納徵儐者入告主人曰吾子順先典貺某以重禮某敢不承命儐者出告主人迎拜如常主人揖賔以入賔從入主人入門而右賔入門而左至次門主人立於門東西面賔立接西孰東面掌事者坐取𤣥纁興以授賔賔執主人揖賔以入執馬者從入陳於庭三分庭一在南北首西上主人二揖至階三讓如初主人升阼階當阿西面賔升西階當阿東面曰敢納徵主人於阼階上北面再拜進立於楹間南面賔進立於主人之西南面授束帛受馬者自右受之以東賔之執馬者自前而出賔初授束帛降出次門外之西東面主人還阼階東左右受束帛於序端主人降立於階下西面儐者進受命出請事賔曰禮畢其禮賔如問名之儀請期其日大昕使者至於女氏大門外掌事者延入次又掌事者設几筵如初使者出次立於主人大門外之西東面主人立於阼階下西面儐者進受命出請事賔曰吾子有賜某既申受命惟是三族之不虞使某也請吉日儐者入告主人曰既前受命矣唯命是聼儐者出告賔曰某聼命於吾子某壻父名儐者入告主人曰某固唯命是聼儐者出告賔曰某使某受命於吾子吾子不許某敢不告期曰某某吉日之甲乙儐者入告主人曰某敢不敬須儐者出告掌畜者以鴈授使者退立於後主人迎拜如常主人揖賔以入賔從入主人入門而右賔入門而左二揖至階三讓如初主人升阼階當阿西面賔升西階當阿東面曰敢告期主人阼階上北面再拜進立於楹間南面賔進立於主人之西俱南面賔授鴈降出立於次門外之西東面主人還阼階東左右受鴈於序端主人立於阼階下西面儐者進受命出請事賔曰禮畢其禮賔如納徵之儀親迎其日大昕壻之父女之父各服其服告於禰廟以酒脯告之一獻無廟者告於正寢將行父醮子於正寢贊者布席於東序西向又設席於户牖之間南向父公服坐於東序西向子服其上服四品繡冕五品𤣥冕升自西階進立於席西南向贊者酌酒進北面以授子子再拜受爵贊者薦脯醢於席前脯醢出自房子升席跪左執爵右取脯擩於醢祭於籩豆之間右祭酒執爵興降席西南面跪卒爵奠爵再拜執爵興贊者受虗爵還樽所子進立於父席前東面父命之曰往迎爾相承我宗事朂率以敬先妣之嗣若則有常庶子但云往迎爾相朂率以敬子再拜曰不敢忘命又再拜降出初昏設洗於阼階東南東西當東霤南北以堂深罍水在洗東加勺羃篚在洗西南肆實爵二巾二加羃設婦洗於東房近北罍水在洗西加勺羃篚在洗東北肆實以巾加羃陳饌於東房內西墉下牲用少牢及臘三俎二簠二簋二登其豆數四品十五品八壻及婦共牢婦之簋簠豆登之數各視其夫牲體皆節折簋實稷黍簠實稻粱登實以羮二豆實醢醬虀葅之類簠簋豆登加蓋爼加羃樽於室中北墉下𤣥酒在西加勺羃南柄又設樽於房外之東加勺羃無𤣥酒篚在南實四爵二巹加羃天婦酌於內樽四爵兩巹几六夫婦各三酳主人乘木輅備儀仗主人謂壻五品非京官職事者乘青通幰犢車從者公服乘車婦車及從車各准其夫至於婦氏大門外掌次者延入次贊者布席於室户外之西西上右几又布席於房户內南向設醴樽於房內東壁下加勺羃篚在北實觶一角柶一於篚加羃籩一豆一又在篚北女各准其夫服花叉翟衣四品花叉六樹翟六等五品花叉五樹翟五等入於房即席南向立姆服禮衣在其右女從者在其後父公服升自東階立於房內之東西面內贊者以觶酌醴加柶覆之面柄進女席前北面女降席西南面再拜受觶內贊者薦脯醢於席前女升席跪左執觶右取脯擩於醢祭於籩豆之間遂以柶祭醴三始扱一祭又極再祭興筵末跪啐醴建柶奠觶於豆東降席西再拜訖升席南面立內贊者徹薦觶主人降立於東階南面賔出次立於門西東面賔壻也儐者進受命出立於門東西面曰敢請事賔曰吾子有命以兹初婚某父使某將請承命儐者入告主人曰某固敬具以須主人迎賔於大門外之東西面再拜賔答拜主人揖賔賔報揖主人入賔執鴈從入至於寢門主人又揖入至內霤將曲揖當階揖至階主人曰請吾子升賔曰某敢辭主人曰固請吾子升賔曰某敢固辭主人曰終請吾子升賔曰某敢終辭主人升自阼階西面立賔升自西階進當房户北面跪奠鴈興再拜降出主人不降送於賔入門母出立於房户之西南面於賔拜訖姆導女於母左父少進西面戒之必有正焉若衣若笲命之曰戒之敬之夙夜無違命母戒於西階上施襟結帨戒之曰勉之敬之夙夜無違帨佩巾庶母及門內施鞶申之以父母之命命之曰敬恭聼宗父母之言夙夜無愆視諸襟鞶鞶鞶囊婦人鞶絲所以盛帨巾之屬女出至車壻授綏姆辭曰未教不足與為禮婦乘以几加幜壻馭輪三周馭者代之主人使其屬送之壻出乘車先婦車從而行至於門外下車以俟婦至降車北面立壻南面揖婦以入及寢門又揖以入贊者徹樽羃酌𤣥酒三注於樽女從者布席於奧東向西南隅謂之奧若室內窄則席於堂上楹間東向設樽於室户東也主人導婦升自西階入室即席東面立婦入立於樽西南面壻盥於南洗女從者沃之婦盥於北洗壻從者沷之贊者以饌入設醬於席前葅醢在其北俎三入設於豆東臘特於俎北贊者設黍於醬東稷稻粱在東設湇於醬南設對醬於東對醬婦醬也設之當特俎葅醢在其南北上設黍於臘北其西稷稻粱設湇於醬北贊啓㑹郤於簠簋南對簠簋於北啓發也皆加匕箸壻從者布對席於饌東贊者西面告饌具主人揖婦婦即對席西面皆坐贊授匕箸各以葅擩於醢皆祭於豆間又皆祭黍贊者各取肺絶末以授皆祭贊者以肺加於俎凡祭與食皆贊者贊之贊者皆移黍置於席上授肺脊皆食以湆醬三飯卒食贊者二人俱洗爵於房酌於內室之樽詣户西北面以酳主人及婦皆興拜受爵贊者北面答拜主人及婦皆坐祭酒贊者以肝從皆奠爵取肝振祭嚌之贊者皆受實於且豆各取爵飲訖執爵興贊者受爵主人及婦皆再拜贊者以爵復於篚又以爵酌酒再酳主人及婦仍立受爵坐飲卒爵皆興贊者受爵復於篚三酳用巹如再酳主人及婦立於席後贊者皆降東階洗爵升酌於户外樽入戶西北面俱奠爵興再拜皆坐取爵遂飲祭卒爵遂拜執爵興夫婦答拜降奠爵於篚主人出脫服於房退立樽西南面位贊者徹饌設於東房如初婦脫服於室袵於奧北趾袵卧席主人入燭出婦從者餕夫之餘夫從者餕婦之餘贊者酌户外樽酳之女從者侍於户外呼則聞見舅姑質明贊者見婦於舅姑立於寢門外贊者布舅席於東序西向布姑席於房户外之西南向舅姑俱即席坐婦執笲棗栗笲竹器𤣥表纁裏自門外入升自西階東面再拜進跪奠於席前舅撫之贊者徹以東婦退復東面位又再拜降自西階受笲腶修腶修婦從者執俟於階下升進北面再拜進跪奠於姑席前姑舉之內贊者受以東婦退復北面位又再拜贊設婦席於室户西南面在姑席之西少北側樽甒醴於房內東壁下加勺羃籩豆各一實以脯醢在樽北設洗於東房近北罍水在洗西篚在洗東北肆篚實以巾觶角柶各一加羃婦立於席西南面內贊者盥手洗觶酌醴加柶面柄出房詣婦席前北面立婦進東面拜受退復位內贊者西階上北面拜送內贊者薦脯醢於席前婦升席坐左執觶右取脯擩於醢祭於籩豆之間以柶祭醴三始扱一祭又極再祭加柶於觶面葉興降席西面坐啐醴建柶興拜內贊者答拜婦進升席跪奠觶於豆東取脯降以出授婦氏從人於寢門外盥饋舅姑入於室婦盥饋贊者布席於室之奧舅姑於席坐俱東面南上贊者設樽於室內北墉下饌於房內西墉下其饌如同牢牲體皆節折左載之於舅俎右載之於姑俎也婦入升自西階入房以醬進設於舅姑席前其他饌從者設之皆加匕箸俱以南為上俎入各設於豆東訖贊者各授箸舅姑各以韭葅擩於醬祭於籩豆之間又祭飯訖乃食三飯卒食婦入於房盥手洗爵入室酌酒酳舅進奠爵於舅席前少東西面再拜舅取爵祭酒飲之婦受爵出户入房奠於篚又盥手洗爵酌酒酳姑如酳舅之禮設婦席於室內北墉下樽東南面婦徹饌設於席前如初西上婦親徹醬設之其他從者設之婦進西面再拜退升席南向坐將餕舅命易醬內贊者易之婦乃餕姑饌婦祭內贊者助之既祭乃食三飯卒食內贊者洗爵酌酒酳婦婦降席西面再拜受爵升席坐祭酒飲訖執爵興降席東南面立內贊者受爵奠於篚婦進西面再拜舅姑先降自西階婦降自阼階凡庶子婦舅姑不降而婦降自西階以出婚㑹其日主人至於賔大門外之西東面立賔立於阼階下西面儐者進於賔之左北面受命出立於大門外之東西面曰敢請事主人曰某有嘉禮請吾子有顧儐者入告遂引賔出大門外之東西面再拜主人答拜主人曰某有嘉禮請吾子有顧賔曰敢辭主人曰敢固請賔曰辭不得命敢不從主人拜賔答拜主人還賔遂與諸親從之贊者預鋪賔席於堂上楹間近北南向設賔之宗室席位於賔席西南賔之異姓席位於宗室之南又於西階下設異姓之席位皆重行東向以北為上設主人席位於阼階上西面設主人宗室席位於主人東北設異姓席位於宗室之北皆重行西面以南為上又設主人異姓席位於東階下重行西向以北為上賔至立於主人大門外之西東面賔之宗室立於賔西南異姓立於宗室之南俱重行東面以北為上儐者引主人出立於大門外之西東面主人諸親立於大門內之東重行西面以南為上立定主人西面再拜賔東面答拜主人揖賔賔報揖儐引主人又儐者引賔以入諸親以次從入至內門主人諸親以次從入如常至階主人揖賔賔報揖賔主及諸親以次升各如常立於席後庭前者亦如之立定賔主及諸親俱坐執爵者酌酒升自東階酒升堂賔主及諸親皆起執爵者以酒授主人賔者引主人進詣賔席前西北面立賔自席西進東南向受爵儐者引主人退復位賔還席後賔主及諸親俱坐執爵者又以酒授主人及賔主諸親賔主俱祭而飲諸親不祭而飲爵行一周食升堂賔主及諸親皆起掌食者以醢醬豆授主人進席設於賔席前賔曰請吾子無辱主人曰不敢忘禮儐者引主人復位執饌者以籩豆簠簋俎鈃設於賔主席前又加以匕箸執饌者以次設食訖賔主皆祭而食諸親不祭而食於賔祭主人辭曰疏食不足祭賔食三飯而止主人曰請吾子食賔更飯食畢遂進庶羞觴行如常㑹畢賔主及諸親俱興儐者各引賔主以下降出賔主及賔之諸親皆復門外位主人諸親復門內位主人再拜送賔退儐者引主人入婦人禮㑹女賔乘車入至下車所內贊者引入主人迎送於閣內相稱之辭各准其夫餘如丈夫之禮饗丈夫送者其日掌事者鋪賔席於堂上楹間近北南面又鋪主人席於阼階上西向又設衆賔之席於賔西南設從者席位於西階下重行東向北上儐者引賔以下立於主人門外之西俱重行東面以北為上立定儐者引主人立於門東西面主人揖賔賔報揖儐者各引賔主以下入至階主人揖賔賔報揖賔主以下俱升立於席後立定賔主以下俱坐遂進酒設食如婚㑹儀㑹畢賔主以下俱興儐者引賔立於西階上東面主人掌事者奉束帛之篚升以授主人主人執篚西面立賔西階上北面再拜主人進立於楹間南面賔進立於主人之西俱南面主人以篚幣授賔賔受退立於西階上東面主人還東階上北面再拜送儐者引賔以下降自西階從者迓受幣在庭者以次出復門外位儐者引主人降自東階出門東西面拜送賔退主人入饗婦人送者內儐者引賔升主人迎送於閣內相稱之辭各准其夫酬以束帛如丈夫之禮大唐開元禮卷一百二十四
