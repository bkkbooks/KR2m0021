body:
  text: 大唐開元禮卷一百二十八唐蕭嵩等撰嘉禮正齒位每年季冬之月縣令為主人鄉之老人年六十以上有徳望者一人為賔次一人為介又其次為三賔又其次為衆賔其日質明設賔席於楹間近北南向設主人席於阼階上西向設介席於西階上東向設三賔席三於賔席之西各南向皆不屬焉又設衆賔席於楹間近南北面東上設兩壺於賔席之東北少退𤣥酒在西加勺羃置篚於壺南東肆實以爵觶設賛者位於階東南西向北上賔介及三賔至立於㕔事大門外之右衆賔立於賔之後俱東向北上執事者俱就於位主人迎賔於大門外之左西面拜賔賔荅拜又西南面拜介介荅拜又西南面揖衆賔衆賔報揖主人又揖賔賔報揖主人先入門而右西面賔入門而左東面介及三賔序入立於賔西南衆賔立於三賔之後俱北面東上凡賔主拜揖周旋皆有賛相主人將進揖當階又揖賓皆報揖至階主人曰請吾子升賔曰某敢辭主人曰固請吾子升賔曰某敢固辭主人曰終請吾子升賔曰某敢終辭主人升自阼階賔升自西階當楣北面立執樽者徹羃主人適篚跪取爵興適樽實之進賔席前西北面獻賔賔西階上北面立主人少退賔進於席前受爵退復西階上北面立主人退於阼階上北面拜送爵賔少退賛者薦葅醢於賔席前賔以下年六十者三豆七十者四豆八十者五豆九十者及主人皆六豆賔自西方升席南面跪左執爵右取葅擩於醢祭於豆間遂祭酒啐酒啐嘗也興降席東適西階北面跪卒爵執爵興適樽實之進主人席前東南面酢主人主人於阼階上北面立賔退復西階上北面拜送爵賛者薦脯醢於主人席主人由席東自北方升席跪左執爵右執脯醢遂祭酒啐酒興自南方降席復阼階上北面跪卒爵執爵興跪奠爵於東序端興適篚跪取觶實之以酬賔復阼階上北面跪奠觶遂拜執爵興賔西階上答拜跪祭飲卒觶興適樽實之進賔前北面賔拜主人少退賔既拜主人跪奠觶於薦西興復阼階上位賔遂進席前北面跪取觶興復西階上位主人北面拜送賔賔進席前北面跪奠觶於薦東興復西階上位酬酒不舉者君子不盡人之歡以全交也主人北面揖遂降立於阼階下西面賔降立於西階當西序東面主人將與介為禮故賔不居堂上位主人進延介主人揖介介報揖至階一讓升主人升阼階介升西階當楣北面立主人詣東序端跪取爵興適樽實之進於介席前西南面獻於介介西階上北面拜主人少退介進北面受爵退復位主人於介之右北面拜送爵介少退主人立於西階之東賛者薦爼醢於介席前介進自北方升席跪左執爵右祭爼醢遂祭酒執爵興自南方降席北面跪卒爵執爵興介授主人爵主人適樽實之以酢於西階上立於介右北面跪奠爵遂拜執爵興介答拜主人跪祭遂飲卒爵執爵興進跪奠爵於西楹南還阼階上揖降介降立於賔南主人於阼階前西南揖衆賔遂升適西楹南跪取爵興適樽實之進於西階南面獻衆賔三賔之長升西階上北面拜受爵主人於三賔長之右北面拜送賛者薦爼醢於其席前三賔之長升席跪左執爵右祭爼醢祭酒執爵興退於西階上立飲訖授主人爵降復位主人又適樽實之進於西階南面獻三賔之次者如獻三賔之禮又次一人升飲亦如之主人適樽實酒進於西階上南面獻衆賔衆賔每一人升受爵跪祭立飲賛者遍薦爼醢於其位訖主人受爵奠於篚主人興賔一揖一讓升賔介衆賔序升即席設工席於堂亷西階之東北面東上側邊曰亷工四人入先二瑟後二歌工持瑟升自西階就位坐工歌鹿鳴卒歌笙入立於堂下北面奏南陔訖乃間歌南有嘉魚笙崇丘間代也謂一歌則一吹也乃合樂周南闗雎召南鵲巢合謂歌與衆聲俱作也樂無工人則闕毋得作淫聲不雅之曲樂正告賔曰正歌備告訖司正升自西階司正謂主人之賛禮者禮樂之正既成将留賔為有懈惰立司正以監之跪取觶於篚興適樽實之降自西階詣階間右還北面跪奠觶拱手少立跪取觶遂飲卒觶奠觶再拜賔降席跪取觶於篚適樽實之詣阼階上北面酬主人主人降席進於賔東初起旅酬也凡旅酬者少長以齒賔跪奠觶遂拜執觶興主人答拜賔立飲卒觶適樽實之進阼階上東南面授主人主人再拜賔少退主人受觶賔於主人之西北面拜送旅酬同階禮殺賔揖復席主人進西階上北面酬介介降席自南方進立於主人之西北面主人跪奠觶遂拜執觶興介答拜主人立飲卒觶適樽實之進西階上西南面立介拜主人少退介受觶主人於介東北面拜送主人揖復席司正升自西階近西北面立相旅曰某子受酬受酬者降席自西方進北面立於介右旅序也於是介酬衆賔衆賔又以次序相酬也某者衆賔姓也同姓則以伯仲别之又同則以其字别之受酬者由介東尊介使不失故位也司正退立於序端東面避受酬者又便其賛上賛下介跪奠觶遂升執觶興某子答拜介立飲卒觶適樽實之進西階上西南面授某子某子受觶介立於某子之左北面揖復席司正曰某子受酬受酬者降席自西方立於某子之左北面某子跪奠觶遂拜執觶興受酬者答拜某子立飲卒觶適樽實之進西階上南面授之受酬者受觶某子立於受酬者之右揖復席次一人及衆賔受酬亦如之卒受酬者以觶跪奠於篚興復位司正適阼階上東面受命於主人曰請坐於賔司正逥北面告於賔曰請賔坐賔曰唯命賔主之辭皆司正傳請賔主各就席坐若賔主俱公服者則皆降脫履階下主人先左賔先右禮畢降納如常司正適篚跪取觶興進立於楹間北面乃揚觶而言曰朝廷率由舊章敦行禮教凡我長㓜各相勸朂忠於國孝於親内睦於閨門外比於鄉黨無或愆惰以忝所生賔主以下皆再拜司正跪奠觶再拜跪取觶飲卒觶興賔主以下皆坐司正適篚跪奠觶興降復位無筭爵筭數也賔主燕飲爵行無數醉而止三賔以上賛者二人行爵以下取足而已也無筭樂燕樂亦無數或間或合盡歡而止也主人之賛者皆與焉燕訖賔主俱興賔以下降自西階主人降自東階賔以下出立於門外之西東北上主人送於門外之東西面再拜賔介逡巡而退大唐開元禮卷一百二十八
