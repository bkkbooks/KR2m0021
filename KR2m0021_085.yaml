body:
  text: 大唐開元禮卷八十五唐蕭嵩等撰軍禮皇帝講武皇帝田狩皇帝講武仲冬之月講武於都外前期十有一日所司奏請講武兵部承詔遂命將帥簡軍士有司先芟萊除地為場方一千二百步四出為和門又於其內墠地為步騎六軍營域處所左右廂各為三軍皆上軍在北中軍次之下軍在南東西相向中間相去三百步五十步立表一行凡立五行表表間前後各相去五十步為三軍進止之節又别墠地於北廂南向為車駕停觀之處前三日尚舍奉御設大次及御座於其中如常儀前一日講武將帥及士卒集於墠所禁喧譁依方色建旗為和門於都墠之中及四角皆建五綵牙旌旗鼓甲仗威儀悉備於墠所大將以下各有統帥如常式步軍大將甲胄乘馬教騎大將亦乘馬教習士衆為戰陳之法凡教為陳少者在前長者在後其還則長者在前少者在後長者持弓矢短者持戈矛力者持旌旗勇者持鉦鼓刀楯為前行持矟者次之弓箭者為後行將帥先教士衆使習見旌旗指麾之蹤旗卧則跪旗舉則起金鼓動止之節聲鼓則進聲金則止知刑罰之苦賞賜之利持五兵之便戰鬪之備習串跪起及行列險隘之路講武日未眀十刻軍士皆嚴備五刻將士皆貫甲步軍各為直陳以相俟將軍依儀各依格備物大將軍各依格處分軍中立旗鼓之下凡六軍各鼓十二鉦一大角四並止于其軍後表之下鑾駕出宫如常式講日未明七刻捶一鼓為一嚴三嚴時節前一日侍中奏裁出宫以剛日侍中奏開宫殿門及城門未眀五刻捶二鼓為再嚴侍中版奏請中嚴文武官應從者俱先至文武官皆公服所司為小駕依圗陳設未眀二刻捶三鼓為三嚴諸衛各督其隊與鈒戟以次入陳於殿庭諸侍衛之官各服其器服諸侍臣俱詣西階下奉迎侍中負璽如式乘黃令進革輅于太極殿西階之前南向千牛將軍一人執長刀立于輅前北向黃門侍郎一人在侍臣之前贊者二人又在黃門之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝升輅太僕卿立授綏升訖侍中中書令以下夾侍如常黃門侍郎進當鑾駕前跪奏稱黃門侍郎臣某言請鑾駕發引俯伏興退復位凡黃門侍郎奏請皆進鑾駕前跪奏稱具官臣某言訖俯伏興鑾駕動稱警蹕黃門侍郎贊者夾引以出千牛將軍夾輅而趨駕出承天門至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黃麾內贊者在供奉官人內侍臣上馬畢黃門侍郎奏稱詣敕車右升侍中前承制退稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕如常鑾駕至墠所兵部尚書介胄乘馬奉引至講武所入自都墠之北和門至兩步軍之北當空南向黃門侍郎奏稱請降輅還侍位皇帝降輅入大次而觀兵部尚書停于東廂西向立三仗小退以通觀路領軍減小駕騎士立于都墠之四周侍臣依左右廂立于大次之前東西靣北上文武九品以上皆公服文東武西在侍臣之外十步所重行北上諸州使人及蕃客先集于都墠北和門外東方南方立于道東西方北方立於道西皆向輅而立以北為上駕至和門奉禮曰再拜在位者皆再拜皇帝入次謁者引諸州使人鴻臚引蕃客東方南方立于大次東北南向以西為上西方北方立于大次西北南向以東為上若有觀者立于都墠騎士仗外四周任意然後講武諸州使人及蕃客立定吹大角三通中軍將各以鞞令鼓二軍俱擊鼓三鼓有司偃旗步士皆跪二軍諸師果毅以上各進于中軍大將旗鼓之下左廂中軍大將立于旗鼓之東西靣諸軍將立于旗鼓之南北靣東上右廂中軍大將立于旗鼓之西東靣諸軍將立于旗鼓之南北靣西上以聽誓大將誓曰今行講武以教人戰進退左右一如軍法用命有常賞不用命有常刑可不勉之誓訖左右三軍各長史二人振鐸分循以警衆諸果毅各以誓詞遍告其所部遂聲鼓有司舉旗士衆皆起騎徒皆行及表擊鉦騎徒乃止又擊三鼓有司偃旗士衆皆跪又擊鼓有司舉旗士衆皆起騎驟徒趨及表乃止整列立定東軍一鼓舉青旗為直陳西軍亦鼓而舉白旗為方陳以應之次南軍鼓而舉赤旗為鋭陳北軍亦鼓而舉黑旗為曲陳以應之次東軍一鼓而舉黃旗為圓陳西軍亦鼓而舉青旗為直陳以應之次西軍鼓而舉白旗為方陳東軍亦鼓而舉赤旗為鋭陳以應之次東軍鼓而舉黑旗為曲陳西軍亦鼓而舉黃旗為圓陳以應之凡陳迭為客主先舉者為客後舉者為主從五行相勝之法為陳應之每變陳二軍各選刀楯之士五十人挑戰于兩軍之前第一第二挑戰迭為勇怯之狀第三挑戰為敵均之勢第四第五挑戰為勝敗之形每將變陳先鼓而為直陳然後變從餘陳之法五陳畢兩軍俱為直陳又擊三鼓有司偃旗士衆皆跪又聲鼓舉旗士衆皆起騎馳徒走左右軍俱至中表相擬擊而還每退至一行表跪起如前遂復本列侍中跪奏請觀騎軍又侍中稱制曰可侍中俯伏興二軍吹角擊鼓誓衆俱進及表而止皆如步軍惟無跪起騎軍東西迭為主客為五變之陳皆如步軍之法每陳各八騎挑戰於兩陳之間如步軍法五陳畢俱大擊鼓而前盤馬相擬擊而罷遂振旅而還凡步騎二軍之士備則滿數省則半之損益隨時惟不得減將帥凡相擬擊皆不得以刃相及凡步士逐退限過中表二十步而止不得過也騎士不在此例若因田狩則令講武軍士之外先期為圍觀訖乘馬鼓行親禽如别禮狩訖乘輅振旅而還如常儀講武罷侍中跪奏稱侍中臣某言講武禮畢請還俯伏興皇帝降御輿侍衛如常儀皇帝升輅太僕卿立授綏升訖敕車右升千牛將軍升輅陪乘黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕如儀黃門侍郎贊者夾引至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬畢黃門侍郎奏稱請鑾駕發引退復位鑾駕動鼓吹振作文武羣官皆從如來儀諸客使便還館駕到承天門外至侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立于輅右訖鑾駕動千牛將軍夾路而趨駕入太極門至橫街北當東上閣廽輅南向侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅御輿以入侍臣從至閣初文武羣官至承天門外舍人承制敕羣官還皇帝既入侍中版奏請解嚴叩鉦將士各還其所明日羣官奉參起居如别禮皇帝狩田仲冬狩田之禮前期十日兵部徵衆庶修田法虞部量地廣狹表所田之野前狩二日本司建旗于所田之後隨地之宜前一日未明諸將各帥士徒集于旗下不得喧譁質明麾旗後至者罰之兵部分申田令遂圍田其兩翼之將皆建旗及夜布圍訖若圍廣或先期二日三日圍闕其南靣且據南靣及狩隨地所向駕出以剛日其發引次舍如常將至田所皇帝鼓行入圍鼓吹令以鼓六十陳於皇帝東南西向六十陳於皇帝西南東向皆乘馬各備蕭角諸將皆鼓行赴圍乃設驅逆之騎百有二十既設驅逆皇帝乘馬南向有司斂大綏以從諸公王以下皆乘馬帶弓矢陳于駕前後所司之屬又斂小綏以從乃驅獸出皇帝之前初一驅過有司整飭弓矢以前再驅過本司奉進弓矢三驅過皇帝乃從禽左而射之每驅必三跪以上皇帝發亢大綏皇帝既發然後公王發公王發亢小綏諸公既發以次射之訖驅逆之騎止然後百姓獵凡射獸自左而射之達於左腢為上射達左耳本為中射達右耳本為次射左髀達於右䯚為下射羣獸相從不盡殺已被射者不重射其靣不剪其毛其出表者不逐之田將止虞部建旗于田內乃雷擊駕鼓及諸將之鼓士徒譟呼諸得禽者獻於旗下致其左耳大獸公之小獸私之其上著者以供宗廟次者以供賔客下者以充庖厨乃命有司饁獸于四郊以獸告至于廟社其因講武以狩則先設圍亦如之大唐開元禮卷八十五
