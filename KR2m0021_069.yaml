body:
  text: 大唐開元禮卷六十九唐蕭嵩等撰吉禮諸州釋奠於孔宣父州學生束修諸州釋奠於孔宣父前享三日刺史散齊於别寢二日致齊於㕔事一日亞獻以下與享之官散齊二日各於正寢致齊一日於享所上佐為亞獻博士為終獻刺史上佐有故並以次差攝博士有故次取參軍事以上攝散齊理事如舊唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊惟享事得行其餘悉斷其享官已齊而闕者通攝行事助教及諸學生皆清齊於學館一宿前享二日本司掃除內外又為瘞塪于院內堂之壬地方深取足容物南出陛本司設刺史以下次于門外隨地之宜前享一日晡後本司帥其屬守門本司設三獻位于東階東南每等異位俱西向設掌事位于三獻東南西向北上設望瘞位于堂之東北當瘞塪西向設助教位于西階西當掌事位學生位于助教之後俱東靣北上設贊唱者位于瘞塪東北南向東上設三獻門外位于道東每等異位西向掌事位于終獻之後北上祭器之數每坐樽二籩豆各八簋二簠二爼三羊豕及臘各一且掌事者以樽坫升設于堂上前楹間北向先聖之樽在西先師之樽在東俱西上皆加勺羃先聖爵一配坐爵四各置于坫設幣篚于樽所設洗置東禜南北以堂深罍水在洗東加勺羃篚在洗西南肆實爵三巾二于篚加羃執樽罍洗篚者各就位于樽罍洗篚之後享日未明烹牲于厨祝以豆二取毛血夙興掌饌者實祭器牲體羊豕皆載右胙前腳肩臂臑節一假皆載之後腳三節節一假去下一節載上肫胳二節又取正脊脡脊橫脊短脅正脅代脅各二骨以並餘皆不設簠實黍稷簋實稻粱籩實石鹽乾魚棗栗榛菱芡鹿脯豆實虀葅醯醢菁葅鹿醢芹葅兔醢笋葅魚醢若土無者以其類充之本司率掌事者設先聖神席于堂上西楹間東向設先師神席于先聖神席東北南向席皆以莞質明諸享官各服祭服助教儒服學生青襟服本司帥掌事者實樽罍及幣各坐尊二一實𤣥酒為上一實醴齊次之禮神之幣用白各長一丈八尺祝版各置于坫贊唱者先入就位祝二人與執樽罍篚者入立于庭重行北靣西上立定贊唱曰冉拜祝以下皆冉拜執樽罍篚者各就位祝升自東階行掃除訖降自東階各就位刺史將至贊禮者引享官以下俱就門外位助教學生並入就門內位刺史至參軍引之次贊唱者先入就位祝升自東階各立于樽後刺史停于次少頃服祭服出次參軍事引刺史入就位西向立參軍事退立于左贊禮者引享官以下次入就位凡導引者每曲一逡巡立定贊唱者曰冉拜刺史以下皆冉拜參軍事少退刺史之左北靣白請行事退復位祝俱跪取幣于篚興各立于樽所凡取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興本司帥執饌者奉饌陳于門外參軍事引刺史升自東階進先聖神坐前西向立祝以幣北靣授刺史參軍事引刺史進西向跪奠于先聖神坐興少退西向冉拜訖參軍事引刺史當先聖神坐前北靣立又祝以幣西向授刺史參軍事引刺史進北向跪奠于先師神坐興少退北向冉拜參軍事引刺史降復位本司引饌入升自東階祝迎引于階上各設于神坐前籩豆蓋羃先徹乃升簋簠既奠却其蓋于下籩居左豆居右簋簠居其間羊豕二俎橫而重于右臘特于左設訖本司引執饌者降出祝還樽所參軍事引刺史詣罍洗執罍者酌水執洗者跪取盤興承水刺史盥手執篚者跪取巾于篚興進刺史帨手訖執篚者受巾跪奠于篚遂取爵興以進刺史受爵執罍者酌水刺史洗爵執篚者又跪取巾于篚興進刺史拭爵訖執篚者受巾跪奠于篚奉盤者跪奠盤興參軍事引刺史升自東階詣先聖酒樽所執樽者舉羃刺史酌醴齊參軍事引刺史詣先聖神坐前西向跪奠爵興少退西向立祝持版進于神坐之右北向跪讀祝文曰維某年歲次月朔日子具位姓名敢昭告于先聖孔宣父惟夫子固天攸縱誕降生知經緯禮樂闡揚文教餘烈遺風千載是仰俾兹末學依仁遊藝謹以制幣犧齊粢盛庶品祗奉舊章式陳明薦以先師顔子配神尚饗祝興刺史冉拜祝進跪奠版于神坐興還樽所刺史拜訖參軍事引刺史詣先師酒樽所取爵于坫執樽者舉羃刺史酌醴齊參軍事引刺史詣先師神坐前北向跪奠爵興少退北向立祝持版進于神坐之左西向跪讀祝文曰維某年歲次月朔日子刺史具官姓名敢昭告于先師顔子爰以仲春仲秋率遵故實敬修釋奠于先聖孔宣父惟子庶幾具體德冠四科服道聖門實臻閫奧謹以制幣犧齊粢盛庶品式陳明獻從祀配神尚饗祝興刺史冉拜祝進跪奠版于神坐興還樽所刺史拜訖參軍事引刺史詣東序西向立祝各以爵酌罍福酒合置一爵一祝持爵進刺史之左北向立刺史再拜受爵跪祭酒啐酒奠爵俯伏興祝各帥進饌者進俎跪減先聖神前胙肉各取前腳第二骨共置一俎上又以籩取黍稷飯共置一籩興祝先以飯進刺史受以授執饌者又以俎進刺史受以授執饌者刺史跪取爵遂飲卒爵祝進受爵復于坫刺史興冉拜參軍事引刺史降復位初刺史獻將畢贊禮者引亞獻詣罍洗盥手洗爵升獻飲福皆如刺史之儀唯不讀祝不受胙訖降復位亞獻將畢贊禮者引終獻詣罍洗盥洗升獻如亞獻之儀訖降復位祝各進神坐前跪徹豆興還樽所徹者籩豆各一少移于故處贊唱者曰賜胙再拜非飲福受胙者皆再拜贊唱者又曰再拜刺史以下皆再拜參軍事少進北面白請就望瘞位參軍事引刺史就望瘞位西向立贊唱者轉就瘞坎東北位初在位者將拜祝各以篚進神坐前跪取幣降自西階詣埋坎以幣置于坎訖贊唱者曰可瘞坎東西廂各二人置土半坎埋訖置土者以篚出參軍事少進刺史之左北靣白禮畢遂引刺史出贊禮者各引享官以下以次出初禮畢贊唱者還本位祝與執樽罍篚者俱復掌事位立定贊唱者曰冉拜祝以下俱冉拜以次出其祝版燔于齊所州學生行束修禮束帛一篚三匹酒一壺五斗脯一案十五脡其日平明各生青襟服至學門博士公服若儒服立于學堂東階上西面贊禮者引學生立于門東西靣不自同于賔客陳束帛篚酒脯案于學生西南當門北向重行西上將命者出立于門西東靣曰敢請事學生少進曰某方受業于先生敢請見將命者入告博士曰某也不德請子無辱將命者出告學生曰某不敢為儀敢固以請將命者入告博士曰子就位某敢見將命者出告學生曰某不敢以視賔客請終賜見將命者入告博士曰某辭不得敢不從命將命者出告執篚者以篚東靣授學生博士降俟于東階下西靣贊禮者引學生執酒脯者從學生入門而左立于西階之南東靣執酒脯者立于學生西南東靣北上學生跪奠篚冉拜博士答拜學生還避遂進跪取篚贊禮者引學生進博士前東靣授執酒脯者從奠于博士前博士受幣贊禮者取酒脯幣以東執酒脯者出贊禮者引學生立于階間近南北靣冉拜訖引出大唐開元禮卷六十九
