body:
  text: 大唐開元禮卷一百十五唐蕭嵩等撰嘉禮親王納妃納采問名納吉納徴請期册妃親迎同牢妃朝見婚會饗丈夫送者饗婦人送者納采前一日主人設使者次於大門之外道右南向其日大昕使者公服乘犢車備儀仗至於妃氏大門外掌次者延入次凡賔主及行事者公服主人受其禮於廟無廟者受于正寢掌事者布神席於室戶外之西莞筵紛純加藻席畫純南向右雕几使者出次謁者引之立於大門外之西東面主人立於東階下西面儐者立於主人之左北面受命出於大門外之東西靣曰敢請事使者曰某公貺室某王謂皇帝弟皇帝子也某王率由先典使某也請納采某王主婚者也某也使者名儐者入告主人曰某之子蠢愚又弗教某王命之某不敢辭某王亦謂主婚者也儐者出告掌畜者以鴈授使者退立於後使者左手執之儐者引主人迎於大門外之東西靣再拜使者不答拜主人揖入使者從入主人入門而右使者入門而左至於廟門主人又揖入每曲揖至內霤將曲揖當階揖使者皆不答主人曰請吾子升使者曰某敢辭主人曰固請吾子升使者曰某敢固辭主人曰終請吾子升使者曰某敢終辭主人升自東階當阿阿棟也西靣使者升西階當阿東靣使者曰敢納采主人阼階上北靣再拜進立於楹間南靣使者進立於主人之西俱南靣使者授鴈降自西階以出問名使者既出立於廟門外之西東靣主人還阼階東左右受鴈於序端主人降立於阼階下西靣儐者進受命出請事使者曰某既受命將加諸卜敢請女為誰氏儐者入告主人曰某王有命再以備數而擇之某不敢辭儐者出告掌畜者以鴈授使者退立於後儐者引主人迎於廟門外之東西靣揖使者以入主人入門而右使者入門而左二揖至階三讓如初主人升阼階當阿西靣使者升西階當阿東靣使者曰敢問名主人阼階上北靣再拜進立於楹間南靣使者進入於主人之西俱南靣使者授鴈還立於西階上東靣主人還阼階上西靣立曰某第某女某氏出使者降出立於大門外之西東靣主人還阼階東左右受鴈於序端主人降立於阼階下西南儐者進受命出請事使者曰禮畢儐者入告主人曰吾子為事乃至於某室某有先人之禮請禮從者儐者出告使者曰某既得將事敢辭儐者入告主人曰先人之禮敢固以請儐者出告使者曰某辭不得命敢不從儐者入告遂引主人升立於序端掌事者徹几改筵東上管筵紛純加藻席繢純雕几設樽甒醴於東房西墉下加勺羃坫在樽北實觶一角柶一加羃籩豆在坫北實以脯醴設洗於東房近北罍水在洗西篚在洗東北肆篚實以巾加勺羃施設訖儐者引主人降迎使者於廟門外之東西靣主人揖使者使者報揖主人入使者從入至階一讓升主人於阼階上北靣再拜旋立於階東西靣賔於西階上北靣答拜旋立於階西東靣主人受几於序端掌事者內拂几三奉兩端西北向進主人東南向外拂几三振袂內執進之北向使者迎受於筵前東南向以俟主人還阼階上北靣再拜送西靣立使者以几避進北靣坐設於坐左興退於西階上北靣答拜旋立於階東西靣贊者盥手洗觶酌醴加柶於觶覆之靣葉出房南靣立主人受醴靣柄進筵前北靣立使者西階上北靣一拜進筵前東南靣受醴復西階上位主人復阼階上北靣一拜送贊者薦脯醢於筵前使者進升筵坐左執觶右取脯擩於醢祭於籩豆之間以柶祭醴三始扱一祭又扱再祭興以柶兼諸觶上獵筵於西階上北靣坐啐醴建柶奠觶遂拜執觶興主人答拜使者進升筵坐奠觶於薦東降筵立於西階上東靣掌事者牽兩馬入於陳門內三分庭一在南北首西上又掌事者奉篚幣升自東階主人受於序端進西靣立使者西階上北靣再拜主人進楹間南靣立使者立於主人之西俱南靣主人以篚幣授使者使者退立於西階上東靣主人還阼階上北靣拜送使者降自西階從者迓受幣使者揖馬以出牽馬者從之使者出大門之西東靣立從者迓受馬主人出門東西靣拜送使者退主人入立於阼阼下西靣儐者告於主人曰賔不顧矣主人乃還於寢納吉前一日主人設使者次如常其日大昕使者至妃氏大門外贊禮者延入次掌事者設几筵如初使者出次謁者引立於主人大門外西東靣主人立於阼階下西靣儐者進受命出請事使者曰某公有貺命加諸卜占曰吉某王使某也敢告某王主婚者儐者入告主人曰某之子弗教唯恐弗堪某王有吉某與在焉某不敢辭儐者出告掌畜者以鴈授使者退立於後儐者引主人迎於大門外之東西靣再拜使者不答拜主人揖入使者從入主人入門而右使者入門而左至於內門主人揖入二揖至階三讓如初主人升於阼階當阿西靣使者升自西階當阿東靣使者曰敢納吉主人阼階上北靣再拜進立於楹間南靣使者進立於主人之西俱南靣使者授鴈降自西階以出立於廟門外之西東靣主人還阼階東左右受鴈於序端主人降立於阼階下西靣儐者進受命出請事使者曰禮畢其禮賔如問名之儀納徴前一日主人設使者次如常其日大昕使者至妃氏大門外掌次者延入次掌事者入布羃於廟門之外玄纁束陳於羃上乘馬在羃南北靣西上掌事者奉璋以櫝俟於羃東西靣主人掌事者設几筵如初使者出次謁者引立於大門外之西東面主人立於東階下西靣儐者進受命出請事使者曰某公有嘉命貺室某王率由先典使某也以玉帛乘馬請納徴儐者入告主人曰某王順先典貺某以重禮某敢不承命儐者出告又儐者引主人出迎立於大門外之東西靣再拜使者不答拜主人揖入使者從入主人入門而右使者入門而左至於內門主人立於門東西面使者立於門西東面掌事者坐啓匱取璋加於玄纁上興以授使者退復位使者奉玉帛主人揖與使者俱入牽乘馬者從入陳於庭三分庭一在南北首西上主人揖入二揖至階三讓如初主人升阼階當阿西面使者升西階當阿東面使者曰敢納徵主人阼階上北面再拜進立於楹間南面使者進立於主人之西俱南面使者授玉帛降自西階出立於內門外之西東面主人還阼階東左右受玉帛於序端主人降立於阼階下西面主人受玉帛受馬者自左受之以東牽馬者既授馬自門西而出儐者進受命出請事使者曰禮畢其禮賔如問名之儀請期前一日主人設使者次如常其日大昕使者至妃氏大門外贊禮者延入次掌事者設几筵如初使者出次謁者引立於大門外之西東面主人立於東階下西面儐者進受命出請事使者曰某公有賜既申受命矣某王使某也請吉日儐者入告主人曰既前受命矣惟命是聽儐者出告使者曰某王命聽命於某公儐者入告主人曰某惟命是聽儐者出告使者曰某王使某受命於某公公不許某敢不告期曰某日儐者入告主人曰某敢不敬須儐者出告掌畜者以鴈授使者退立於後儐者引主人迎於門外之東西面再拜使者不答拜主人揖入使者從入主人入門而右使者入門而左至於內門主人又揖入二揖至階三讓如初主人升阼階當阿西面使者升西階當阿東面使者曰敢告期主人阼階上北面再拜進立於楹間南面使者進立於主人之西俱南面使者授鴈降自西階出立內門外之西東面主人還阼階東左右受鴈於序端主人降立於阼階下西靣儐者進受命出請事使者曰禮畢其禮賔如納徵之儀册妃前一日主人設使者次如常其日大昕妃氏親屬咸集使者公服乘輅備儀仗至妃氏大門之外贊禮者延入次使主副以下俱公服使者出次典謁引使者持節者前導立於門西東面持節者立於使者之北少退使副立於使者西南史二人對舉册案立於使副之南少退俱東靣主人公服以出贊禮者引立於東階東南諸宗人立於主人東南俱西面外姻立於西方東面皆北上妃嚴於别室以俟姆服禮衣立於其右保傅各一人女相者綵禮衣帥女贊者二人綵禮衣立於內寢東階東南西面北上贊禮者公服引主人出門東西面再拜使者不答典謁引使者持節者前導入門而左使副以下從之主人立於閣外之東西面典謁引使者入閣立於內寢階間南面持節者立於使者之東少南西面使副立於使者西南持册案者又立於使副之南少退俱東面女相者引妃出障以行帷其侍從提潔如式姆左右以相進當使者南北面立持節者脫節衣又女相者引宗人外姻之婦人序位於東西廂俱北上宗人在東外姻在西立定史舉案詣使副前使副受册史以案退復位使副奉册進授使者退復位使者稱有制女相者曰再拜女贊者承傳妃再拜使者讀册訖女相者再拜女贊者承傳妃再拜訖女相者引妃少前傅姆進受册以退其羽儀依式俱進持節者加節衣典謁引使者持節者前導以出俱復門外位主人拜送於門外使者還主人入初使者出女相者引妃入親迎前一日主人設賔次如常其日大昕妃父服其服告於禰廟以酒脯告之一獻無廟者告於寢初昏王著衮冕之服乘輅備儀仗從者乘車後部從詣妃第王將至主人布席於室戶外之西西上右几又席於戶內南向設樽甒醴於東房東北隅加勺羃篚在樽南實觶一角柶一脯醢在篚南王至妃氏大門外降輅贊禮者引王停次妃著花叉䄖衣纁􅀈入於房即席南向立姆禮衣立於右從者陪於後主人升自阼階立於房户外之東西內贊者詣醴尊所以觶勺醴加柶覆之面柄進妃筵前北靣妃降席西南靣再拜受觶內贊者薦脯醢於席前妃升席跪左執觶右取脯擩於醢祭於籩豆之間遂以柶祭醴三始扱一祭又扱再祭興筵末跪啐祭醴建柶奠觶於薦東降筵西南靣再拜就席坐內贊者徹薦觶主人降立於東階東南西面贊禮者贊王出次立於門西東面左右羽儀及執燭者如常儐者進受命出於門東西面曰敢請事王曰以兹初昏使某將請承命儐者入告主人曰某固敬具以須儐者出告又儐者引主人迎於大門外之東西面拜王答拜主人逡巡主人揖王報揖主人入掌畜者以鴈進王受鴈左手執之以入及內門主人曰請王入王曰某弗敢以先主人又曰固請王入王曰某固弗敢以先主人揖王報揖王與主人俱入左右從者如常主人揖入及內霤將曲揖當階揖王皆報至階主人曰請王升王曰某敢辭主人曰固請王升王曰某敢固辭主人曰終請王升王曰某敢終辭主人升阼階西面立王升西階進當房户前北面跪奠鴈興再拜降出主人不降送初王入門母出立於房户外之西南面於王拜訖姆導妃出於母左父少進西面戒之必有正焉若衣若筓命之曰戒之敬之夙夜無違命母戒於西階上施襟結帨戒之曰勉之敬之夙夜無違命庶母及門內施鞶申之以父母之命命之曰敬恭聽父母之言夙夜無愆視諸襟鞶鞶囊也婦人鞶絲所以盛帨巾之屬妃出至車後王授綏姆辭不受曰未教不足與為禮妃乘以几從者二人坐相對持之姆加幜王乃馭輪三周馭者代之王出大門乘輅還第如來儀妃鹵簿次從而行同牢初昏掌事者設洗於東階東南東西當東霤南北以堂深罍水在洗東篚在洗西南肆篚實二巾二爵設妃洗於東房近北罍水在洗西篚在洗東北肆皆加巾勺羃設饌於東房西墉下障以帷籩豆各十六簠簋各二登各二皆加勺蓋爼三羊豕及臘羊豕皆節折尊坫於室內北墉下玄酒在西加羃勺皆面柄羃夏用絺冬用組又設尊於房户外之東加勺羃無玄酒坫在南實四爵合巹加羃王至降輅車以俟妃至降車北面立王南面揖妃以入及寢門又揖以入贊者徹尊羃酌玄酒三注於尊妃從者設席於奧東向王導妃升自西階入於室即席東靣立妃入立於尊西南面王盥於南洗妃從者沃之妃盥於北洗王從者沃之盥訖王及妃俱復位立贊者以饌入設於席前贊者設醬於席前葅醢在其北俎三入設於豆東臘特於俎北豆東葅醢之東設黍於醬東稷稻粱在東設湇於醬南設對醬於東對醬婦醬也設之當特俎葅醢在其南北上設黍於臘北其西稷稻粱設湇於醬北司饌啓會却於簠簋之南對簠簋之北啓發也皆加匕箸王從者布隊對席於饌東贊者西面告饌具王揖妃妃即對席西面皆坐贊者皆授箸各以葅擩於醢皆祭於豆間又皆祭黍贊者各取肺皆絶末以授皆祭贊者以肺加於俎凡祭與食皆贊者贊之贊者各移黍置於席上授肺脊皆食以湇醬三飯卒食贊者二人俱洗爵於房酌於室內之樽詣饌南北面以酳王及妃皆興再拜受爵贊者北面答拜王及妃皆坐祭酒贊者以肝從皆奠爵取肝振祭嚌之贊者皆受實於俎豆各取爵皆飲訖執爵興贊者受爵王及妃皆再拜贊者以爵復於坫王及妃俱坐贊者又以爵酌再酳王及妃受爵不祭而飲卒爵贊者受爵復於坫三酳用巹如再酳贊者皆降東階洗爵升酌於户外尊入詣饌南北面俱跪奠爵興再拜皆坐取爵祭酒遂飲卒爵遂拜執爵興降奠爵於篚王出妃退立於尊西南面贊者徹饌設於東房內如初又徹室內酒尊以出王脫冕服於房妃從者受之妃脫服於室王從者受之姆授巾王從者衽於奧妃從者衽良席在東皆有枕北趾王入燭出妃從者餕王之餘王從者餕妃之餘贊者酌户外樽酳之王從者皆婦人妃從者侍於户外呼則聞妃朝見其日依時刻諸衛勒所部屯門列仗妃夙興沐浴著花叉服䄖衣乘厭翟車以出侍從如常入至降車所妃下車司賔引妃立於閣外近臣入奏皇帝即御座南向坐近侍如常妃奉笲棗栗司賔引妃入立於庭北面妃再拜司嬪引妃升自西階進北面跪奠於皇帝前興皇帝撫之尚食進徹以東司賔引妃降復位又再拜尚儀前承敕降詣妃西北東面稱敕旨妃再拜宣敕訖妃又再拜司賔引妃妃出遂詣皇后所御之殿立於閣外妃奉笲腶修六尚以下各服其服俱詣閣奉迎尚儀入奏皇后即御座南向坐近侍如常司賔引妃入立於庭北面再拜司賔引妃升自西階進北面跪奠於皇后前興皇后撫之尚食進徹以東司賔引妃降復位又再拜尚儀前承令降詣妃西北東面稱令旨妃再拜宣令旨訖妃又再拜司賔引妃出閣侍從如常妃乘車還第如來儀婚會主人及賔俱公服饌以籩豆簠簋俎鉶尊爵巾坫其日主人至於賔大門外之西東靣立賔立於東階下西面儐者進於賔左北面受命出立於門外之東西面曰敢請事主人曰某有嘉禮請公有顧王者稱王以下準此儐者入告遂引賔出大門外之東西面再拜主人答拜主人曰某有嘉禮請公有顧賔曰敢辭主人曰敢固請賔曰辭不得命敢不敬從主人拜賔答拜主人還賔遂與諸親從之掌事者預鋪賔席於堂上楹間近北南面設賔之宗室席位於賔席西南賔之異姓席位於宗室之南又於西廊下設異姓席位皆重行東向以北為上設主人席位於東階上西向設主人宗室席位於主人東北設異姓席位於宗室之北皆重行西向以南為上又設主人異姓席位於東廊下重行西向以南為上賔至主人大門外之西東面賔之宗室立於賔西南異姓立於宗室之南俱重行東北以北為上儐者引主人出立於大門外之東西面主人諸親立於大門內之東重行西面以南為上立定主人西面再拜賔東面答拜主人揖賔賔報揖儐者引主人以入又儐者引賔以入賔之諸親以次從入至門內主人諸親從入如常至階主人揖賔報揖賔主及諸親以次升各立於席後其在庭者亦如之立定賔主及諸親俱坐執觴者酌酒升自東階酒升堂賔主及諸親皆起執觴者以酒授主人儐者引主人進詣賔席前西北向立賔自席西進東向南受酒儐者引主人退復位賔還席後賔主及諸親俱坐執觴者又以酒授主人及諸親賔主俱祭而飲諸親不祭而飲觴行一周食升堂賔主及諸親皆起掌食者以醢醬豆授主人儐者引主人進設於賔席前賔曰請公無辱主人曰不敢忘禮儐者引主人復位執饌者以饌進設於賔主席前加以匕箸執饌者又以饌設於衆賔以下置設訖賔主及諸親皆坐賔主皆祭而食諸親不祭而食於賔祭主人辭曰疏食不足祭賔主俱食三飯而止主人曰請公食賔更飯食畢進庶羞觴行如常會畢賔主及諸親興儐者各引賔主以下降出賔主及賔之諸親皆復門外位主人諸親復門內位主人再拜送賔退儐者引主人入婦人禮會賔乘車入至下車所內儐者引入主人送迎於閣內相稱之辭各準其夫餘如丈夫之禮饗丈夫送者其日掌事者鋪賔席於堂上楹間近北南向又鋪主人席於阼階上西向又設衆賔之席於賔席西南設從者席於西廊下俱重行東向以北為上儐者引賔以下立於主人門東西面主人揖賔賔報揖儐者各引賔主以下入至階主人揖賔賔報揖賔主以下俱升立於席後立定賔主以下俱坐遂進酒設食如婚會之儀會畢賔主以下俱興儐者引賔立於西階上東面主人掌事者牽乘馬入陳於門內三分庭一在南北首西上又掌事者奉束帛之篚升授主人主人執篚西面立賔西階上北面再拜主人進立於楹間南面賔進立於主人之右俱南面主授篚賔受之退立於西階上東面主人還阼階上北面再拜送儐者引賔以下降自西階從者迓受篚賔及庭東面揖左馬以出牽馬者從之在庭者以次出俱復門外位從者迓受馬初賔降儐者引主人降自東階出門東西面拜送賔退主人入饗婦人送者其日女贊者鋪賔席於堂上楹間近北南向又鋪主人席於阼階上西向又設衆賔之席於賔西南設從者席位於西廊下俱重行東向以北為上女相者引賔以下立於主人門外之西重行東面以北為上立定女相者引主人出立於門內之東西面女相者引賔入衆賔以下從入賔入門西東面立定賔主以次進至階升各立席後上下立定俱坐遂進酒設食如婚會之儀會畢賔主上下俱興女相者引賔立於西階上東面女相贊者奉束錦之篚升以授主人主人執篚進於楹間南面立女相者引賔進立於主人之右俱南面主人授幣訖女相者引賔降出從者迓受篚衆賔以下從出初賔降女相者引主人降送於門內賔出女相者引主人入大唐開元禮卷一百十五
