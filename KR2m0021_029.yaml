body:
  text: 大唐開元禮卷二十九唐蕭嵩等撰吉禮皇帝夏至日祭方丘祭后土禮同齊戒陳設省牲器鑾駕出宫奠玉帛進熟鑾駕還宮齊戒前祭七日平明太尉誓百官于尚書省曰某月某日祭皇地祗于方丘各官各揚其職不供其事國有常刑皇帝散齊四日于别殿致齊三日二日于太極殿一日于行宫前致齊一日尚舍奉御設御幄于太極殿西序及室內俱東向尚舍直長惟于前楹下致齊晝漏上水一刻侍中版奏請中嚴諸衛之屬各督其隊入陳于殿庭如常儀通事舍人引文武官五品以上陪位如式諸侍衛之官各服其服諸侍臣並結珮俱詣閣奉迎凡齊者則結珮皇帝服衮冕結珮出自西房曲直華蓋警蹕侍衛如常儀皇帝即御座東向坐侍臣夾御衛侍如常一刻頃侍中前跪奏稱侍中臣某言請降就齊室俯伏興還侍位皇帝降座入室文武侍臣各還本司直衛如常凡預祭之官散齊四日致齊三日散齊皆于正寢致齊二日于本司一日于祭所其無本司者皆于郊社及祭所近侍之官應從升者及從祭羣官諸方客使各于本司及公館清齊一宿散齊理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊惟祭事得行其餘悉斷其祭官已齊而闕者通攝行事凡祭官致齊之日給酒食明衣各習禮于齊所光祿卿監取明水火太官令取水于隂鑒取火于陽燧火以供爨水以實尊前祭二日太尉告髙祖神堯皇帝廟如常告之儀告以配神作主前祭一日諸衛令其屬未後一刻各以其方器服守衛壝門每壝門二人每隅一人與太樂工人俱清齊一宿陳設前祭三日尚舍直長施大次于外壝東門之內道北南向尚舍奉御鋪座衛尉設文武大臣次于大次之後文官在左武官在右俱南向設諸祭官次于東壝之外道南北向西上三師于南壝之外道東諸王於三師之南俱西向北上文官九品以上于祭官之東北向西上介公酅公于南壝之外道西東向諸州使人東方南方于王東南西向西方北方于介公酅公西南東向皆北上諸國之客東方南方于諸州使人之南西向西方北方于諸州使人之南東向皆北上武官三品以下七品以上于西壝之外道南北向東上其褒聖侯若在朝于文官三品以下設陳饌幔于內壝東門西門之外道北南向壇上及諸神東方南方之饌陳于東門外西向西方北方之饌陳于西門外東向神州無西門之饌前祭二日太樂令設宫懸之樂于壇南內壝之外東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于懸編之間各依辰位𣗳雷鼓于北懸之內道之左右植建鼓于西隅置柷敔于懸內柷在左敔在右設歌鐘歌磬于壇上近南北向磬簴在東鐘簴在西其匏竹者立于壇下重行北向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以北為上南方北方以西為上右校掃除壇之內外又為瘞坎于壇之壬地內壝之外方深取足容物南出陛前祭一日奉禮設御位于壇之東南西向設望燎位于壇之西南當瘞坎北向設祭官公卿位于內壝東門之外道南分獻之官于公卿之南執事者位于其後每等異位俱重行西向北上設御史位于東南隅西向副位于西南隅東向設奉禮位于樂懸東北贊者二人在南差退俱西向北上設奉禮贊者位于瘞坎西南東向南上設協律郎位于壇上南陛之西東向設太樂令位于北懸之間當壇北向設從祭之官位三師位于懸南道東諸王位于三師之東俱北向西上介公酅公位于道西北向東上文官從一品以下九品以上位于執事之南每等異位重行西向武官三品以下九品以上位于西方當文官每等異位重行東向皆北上諸州使人位東方南方于諸王東南重行北面西上西方北方于介公酅公西南重行北面東上設諸國客使位于內壝南門之外東方南方于諸州使人之東每國異位重行北面西上西方北方于諸州使人之西每國異位重行北靣東上設門外位祭官公卿以下于東壝之外道南每等異位重行北靣西上三師位于南壝之外道東諸王于三師之南俱西向介公酅公位於道西東向皆北上文官從一品以下九品以上位在東壝之外祭官之南每等異位重行北靣西上武官三品以下九品以上位于西壝之外道南每等異位重行北靣東上諸州使人位東方南方于諸王東南重行西面西方北方于介公酅公西南重行東面俱北上設諸國客使位東方南方于諸州使人之南每國異位重行西靣西方北方于諸州使人之南每國異位重行東靣皆北上牲榜于東壝之外當門西向黃牲一居前又黃牲一在北少退𤣥牲一在南少退設廩犧令位于牲西南祝史陪其後俱北向設諸太祝位于牲東各當牲後祝史陪其後俱西向設太常卿省牲位于牲前近北南向設皇地祗酒樽于壇之上下太樽二著樽二犧樽二山罍一在壇上東南隅北向象樽二壺樽二山罍四在壇下皆于南陛之東北向俱西上設配帝著樽二犧樽二象樽二山罍二在壇上皆于皇地祗酒樽之東北向西上神州太樽二在第一等每方嶽鎮海瀆俱山樽二山川林澤俱蜃樽二丘陵墳衍原隰井泉俱概樽二凡樽各設于神座之左而右向神州以上之尊置于坫以下之尊俱藉以席皆加勺羃設爵于尊下設御洗于壇南陛東南亞獻之洗又于東南俱北向罍水在洗東篚在洗西南肆設罍洗篚羃各于其方陛道之左俱內向執樽罍篚冪者各于樽罍篚冪之後各設玉幣之篚于壇之上下樽坫之所祭日未明五刻太史令郊社令各服其服帥其屬升設皇地祗神坐于壇上北方南向設席以藁秸設高祖神堯皇帝座于東方西向席以莞設神州地祗神坐第一等東南方席以藁秸又設嶽鎮海瀆以下之坐于內壝之內各依其方皆有原隰丘陵墳衍之坐又設中嶽以下之坐于壇之西南俱內向自神州以下六十八位席皆以莞席神位各于坐首省牲器省牲之日午後十刻去壇二百步所諸衛之屬禁斷行人晡後一刻諸行事之官郊社令令史及府史齊郎以樽坫罍洗篚羃入設于位晡後二刻謁者贊引各引祭官御史以下就位立定太祝與廩犧令以牲就榜位謁者引御史太常卿升壇視滌濯行掃除于上降行樂懸于下御史太常卿降復位謁者進太尉之左白請就門外位謁者贊引各引祭官以下就門外位謁者引太常卿就省牲位南向立廪犧令少前白請省牲退復位太常卿省牲廩犧令又前北向舉手曰腯還本位諸太祝各循牲一匝西向舉手曰充俱還本位諸太祝與廪犧令以次牽牲詣厨授太官謁者引光祿卿詣厨省鼎鑊由視濯溉謁者贊引各引祭官詣厨省饌具訖俱還齊所祭日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置于饌所遂烹牲鑾駕出宫前三日本司宣攝內外各供其職尚舍設行宫于壇東南向隨地之宜衛尉設從祭官次于朝堂前二日太常令設宫懸之樂于殿庭如常儀駕出懸而不作祭日從祭羣官六品以下諸州使人諸方客使俱先至並就次各服其服祭日未明七刻槌一鼓為一嚴三嚴時節前一日侍中奏裁侍中奏開宫殿門及城門未明五刻槌二鼓為再嚴侍中版奏請中嚴奉禮引從祭羣官五品以上文官位于東朝堂前西向武官位于西朝堂前東向俱重行北上從祭羣官俱集朝堂就次各服其服所司陳大駕鹵簿未明二刻槌三鼓為三嚴諸衛之屬各督其隊與鈒戟以次入陳于殿庭通事舍人引從祭羣官各就朝堂前位諸侍衛之官各服其服侍中中書令以下俱詣西階奉迎侍中負寶如式乘黃令進玉輅于太極殿西階之前南面千牛將軍一人執長刀立于輅前北向黃門侍郎一人在侍臣之前贊者二人又在黃門之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝服衮冕乘輿以出降自西階稱警蹕如常儀千牛將軍前執轡皇帝升輅太僕卿立授綏侍中中書令以下夾侍如常黃門侍郎當鑾駕前跪奏稱黃門侍郎臣某言請鑾駕進發俯伏興退復位凡黃門侍郎奏請皆進鑾駕前跪奏稱某官臣某言訖俯伏興也鑾駕動又稱警蹕黃門侍郎與贊者夾引以出千牛將軍夾輅而趨駕出承天門至侍臣上馬所黃門侍郎奏稱請鑾駕權停勑侍臣上馬侍中稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翼駕在黃麾內符寶郎奉六寶與殿中監後部從在黃鉞內侍中中書令以下夾侍于輅前贊者在供奉官人內侍臣上馬畢黃門侍郎奏稱請勑車右升侍中稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發退復位鑾駕動稱警蹕如常不鳴鼓吹不得喧譁其從祀之官在𤣥武隊如常儀若須先署則聽臨時節度奠玉帛祭日未明三刻諸祭官各服其服郊社令良醖令各帥其屬入實樽罍玉幣凡六尊之次太尊為上實以泛齊著尊次之實以醴齊犧尊次之實以盎齊象樽次之實以醍齊壺樽次之實以沈齊山罍為下實以清酒配帝著尊為上實以泛齊犧尊次之實以醴齊象尊次之實以盎齊山罍為下實以清酒神州太尊實以泛齊五方嶽鎮海瀆之山尊實以醍齊山川林澤之蜃尊實以沈齊丘陵以下之散尊實以清酒𤣥酒各實于五齊之上尊禮神之玉皇地祗以黃琮其幣以黃配帝之幣亦如之神州之玉以兩圭有邸其幣以𤣥五方嶽鎮以下之幣各從方色太官令帥進饌者實諸簋簠各設于饌幔內未明二刻奉禮帥贊者先入就位贊引引御史博士諸太祝及令史與執樽罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽罍篚羃者各就位贊引引御史諸太祝詣東陛升行掃除于上令史祝史行掃除于下訖引降就位駕至大次門外回輅南向將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位五品以上從祭之官皆就壝外位太樂令帥工人二舞次入就位文舞入陳于懸內武舞立于懸南道西謁者引司空入行掃除訖出復位皇帝停大次半刻頃謁者贊引各引祀官通事舍人分引從祀羣官介公酅公諸方客使皆先入就位太常博士引太常卿立于大次門外當門北向侍中版奏外辦皇帝服衮冕出次華蓋侍衛如常儀侍中負寶陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先導至中壝門外殿中監進大圭尚衣奉御又以鎮圭授殿中監受進皇帝搢大圭執鎮圭華蓋仗衛停于門外近侍者從入謁者引禮部尚書太常少卿陪從如常儀皇帝至版位西向立每立定太常卿與博士退立于左太常卿前奏稱請冉拜退復位皇帝冉拜奉禮曰衆官再拜衆官在位者皆冉拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏舉麾凡取物皆跪俯伏而取以興奠物皆奠訖俯伏而後興鼓柷奏順和之樂乃以林鐘為宫太蔟為角姑洗為徴南吕為羽作文舞之舞樂舞八成林鍾太蔟姑洗南吕皆再成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止太常卿前奏稱請冉拜退復位皇帝再拜奉禮曰衆官冉拜衆官在位者皆再拜上下諸祝俱取玉幣于篚各立于樽所太常卿引皇帝太和之樂作皇帝每行皆奏太和之樂皇帝詣壇升自南陛侍中中書令以下及左右侍衛量人從升以下皆如之皇帝升壇北向立樂止太祝取玉于幣以授侍中侍中奉玉幣東向進皇帝搢鎮圭受玉幣凡受皆搢鎮圭跪奠訖俯伏興登歌作肅和之樂以應鐘之均太常卿引皇帝進北向跪奠于皇地祗神坐俯伏興太常卿引皇帝少退北向再拜訖太常卿引皇帝立于東方西面又太祝以幣授侍中侍中北向進皇帝受幣太常卿引皇帝進東向跪奠于高祖神堯皇帝神坐俯伏興太常卿引皇帝少退東向再拜訖登歌止太常卿引皇