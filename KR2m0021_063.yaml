body:
  text: 大唐開元禮卷六十三唐蕭嵩等撰吉禮皇帝封祀於泰山鑾駕進發齋戒制度陳設省牲器鑾駕上山薦玉帛進熟封玉册燔燎鑾駕還宫鑾駕進發皇帝將有事於泰山有司卜日如别儀告昊天上帝太廟太社皆如巡狩之禮告太廟髙祖祝文加封祀配神作主之意告睿宗祝文加禪祭配神作主之意皇帝出宫備大駕鹵簿軷於國門祭所過山川古先帝名臣烈士皆如巡狩之禮通事舍人承制門百年所經州縣刺史縣令先待於境至泰山下柴告昊天上帝於圜丘壇如巡狩告至之禮有司攝事前祀所司以太牢祭于泰山神如常式齋戒前祀七日平明太尉誓百官於尚書省曰某月某日皇帝有事於泰山各揚其職不供其事國有常刑皇帝散齋於行宫後殿四日致齋於前殿三日前致齋一日尚舍奉御設御幄於前後西序及室內俱東向尚舍直長張帳於前楹下致齋之日質明諸衛勒所部屯門列仗晝漏上水一刻侍中版奏請中嚴諸衛之屬各督其隊入陳於殿庭如常儀通事舍人分引五品以上陪如式文官朝服武官袴褶諸侍衛之官各服其器服諸侍臣並結珮俱詣閣奉迎上水二刻侍中版奏外辦皇帝服衮冕結珮出自西房曲直華蓋警蹕侍衛如常儀皇帝即御坐東向坐侍臣夾侍如式一刻頃侍中前跪奏稱侍中臣某言請降就齋室俯伏興還侍位侍臣等各退出皇帝降坐入室文武侍臣各還省直衛者如常凡預祭之官散齋四日致齋三日散齋皆於正寢致齋二日於本司一日於杞所其無本司者皆於祀所近侍之官應從升者及從祀羣官諸方客使各於本司及公館清齋一宿散齋理事如舊唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯祀事得行其餘悉斷其祀官已齋而闕者通攝行事凡祀官致齋之日給酒食給明衣各習禮於齋所光祿卿監取明水火太官令取水於隂鑒取火於陽燧火以供爨水以實尊前祀一日諸衛令其屬未後一刻各以其方器服守衛壝門每門二人每隅一人與太樂工人清齋一宿制度將作大匠預領徒於泰山上立圓臺廣五丈髙九尺土色各依方色又於圓臺上起方壇廣一丈二尺髙九尺其臺壇四面各為一陛玉牒長一尺三寸廣五寸厚五分刻牒為字以金填之用金匱盛其玉牒文中書門下奏取進止其文請內鎸其石檢等並如後制郊社令積柴為燎壇於山上圓臺之東南量地之宜柴髙一丈二尺方一丈開上南出户方六尺又為圓壇於山下三成十二陛如圜丘之制隨地之宜壇上飾以玄四面依方色壇外為三壝郊社令又積柴於壇南燎如山上之儀又為玉册皆以金繩連編玉牒為之每牒長一尺二寸廣一寸二分厚三分刻玉填金為字少府監量文多少為字又為玉匱一長一尺三寸並檢方五寸當纒繩篆刻為五道當封寶篆刻深二分方取容受命寶印以藏正坐玉册制度如玉匱又為黃金繩以纒玉匱金匱各五周為金泥以封玉匱金匱又為石䃭以藏玉匱用方石再纍各方五尺厚一尺從鑿石中廣深令容玉匱䃭旁施檢篆皆刻深三寸三分濶一尺南北各二東西各三去隅皆七寸纒繩篆皆刻深三分濶一寸五分為石檢十枚以檢石䃭皆長三尺濶一尺厚七寸皆刻為三道廣一寸五分深四寸當封篆大小取容寶印深二寸七分皆有小石蓋制與封刻篆相應以檢楫封印其檢立於䃭旁當刻篆又為金繩三以纒石䃭各五周徑三分為石泥以封石撼以石末和方色土為之其封玉匱金匱石撼用受命寶并所司量時預奏請出為距石一十二枚皆濶二尺厚一尺長一丈斜刻其首令與䃭隅相應分距撼四隅皆再纍為五色土圓封以封石䃭上徑一丈二尺下徑三丈九尺陳設前祀三日衛尉設文武侍臣次於山下封祀壇外壝東門之內道北階間文官在左武官在右俱南向設諸祀官次於東壝之外道南北向西上三師南壝之外道東諸王於三帥之南俱西向北上文官從一品以下九品以上於祀官之東皇親五等以上諸親三等以上於文官之東東方諸州刺史縣令又於文官之東俱北向西上介公酅公于南壝之外道西東向諸州使人于介公酅公之西東向諸方之客東方南方于諸王東南西向西方北方于介公酅公西南東向皆以北為上武官三品以下九品以上於西壝之外道南北向東上設陳饌幔於內壝東門西門之外道北南向北門之外道東西向壇上及東方之饌陳于東門外南方及西方之饌外陳於西門外北方之饌陳於北門前祀二日太樂令設宫懸之樂於山下封祀壇之南內壝之外東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹雷鼓於北懸之內道之左右植建鼓於四隅置柷敔於懸內柷在左敔在右設歌鐘歌磬於壇上近南北向磬簴在西鐘簴在東其匏竹者立於壇下重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上右校掃除壇之內外前祀一日奉禮郎設祀官公卿位于山下封祀壇內壝東門之外道南分獻之官於公卿之南執事者位於其後每等異位重行西面北上設御史位於東陛之東南向設奉禮位于樂懸東北贊者二人在南差退俱西向設協律郎位於壇上南陛之西東向設太樂令位於北懸之間當壇北向設從祀之官位三帥位於懸南道東諸王位於三師之東俱北面西上介公酅公位於道西北面東上文官從一品以下九品以上位於執事之南東方諸州刺之縣令又於文官之南每等異位重行西向俱以北為上武官三品以下九品以上位於西方值文官皇親五等以上諸親三等以下於武官之南每等異位重行東向諸州使人位於內壝南門之外道西重行東面皆以北為上設諸國客使位於內壝南門之外東方南方于諸王東南每國異位重行北面以西為上西方北方于介公酅公西南每國異位重行北面以東為上其褒聖侯位於文官三品以下設牲榜於山下封祀壇之外當門西向蒼牲一居前正座又蒼牲一配座青牲一在北少退南上次赤牲一次黃牲一次白牲一次玄牲一以上五方帝座又青牲一大明又白牲一夜明設廪犧令位於牲西南令史陪其後俱北向設太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北又設御史位於太常卿之西俱南向設昊天上帝酒樽位於圓臺壇之上下太樽二著樽二犧樽二山罍二在壇上於東南隅北向象樽二壺樽二山罍四在壇下皆於南陛之東北向西上設配帝著樽二犧樽二象樽二山罍二在壇上皆於昊天酒樽之東北向西上其山下封祀壇設五帝日月俱太尊二在神座之左其內官每陛間各象樽二在第二等中官每陛間各壺樽二在第三等外官每陛間各概樽二於內壝之內衆星每道間各散樽二於內壝之外凡樽各設於神坐之左而右向五帝日月以上之尊置於坫內官以下之尊俱藉以席皆加勺羃設爵于尊下設罍洗各於壇南陛東南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設分獻罍洗篚羃各於其方陛道之左俱內向執樽罍篚羃者各於樽罍篚羃之後各設玉幣之篚於壇之上下樽坫之所祀日未明五刻太史令郊社令各服其服升設昊天上帝神坐於山上圓臺之上北方南向以三脊茅為神藉設髙祖神堯皇帝神坐於東方西向席以莞設神坐皆於坐首又太史令郊社令設五方帝日月神坐於山下封祀壇之上青帝於東陛之北赤帝於南陛之東黃帝於南陛之西白帝於西陛之南黑帝於北陛之西大明於東陛之南夜明於西陛之北皆以藳秸設五星十二辰河漢及內官之坐於第二等十有二陛之間各依方面几席皆內向其內官中有北斗北辰位於南陛之內差在行位前設二十八宿及中官之座於第三等亦如之布外官席位於內壝之內衆星席位於內壝之外各依方次席皆以莞設神坐各於坐首所司陳異寶及嘉瑞等於樂懸之北東西廂省牲器省牲之日午後十刻去壇二百步所諸衛之屬禁斷行人晡後二刻郊社令丞帥府史三人及齋郎以樽坫罍洗篚羃入設於位凡升壇者各由其陛贊引引御史諸太祝詣壇東陛御史二人升行掃除於上太祝七人與祝史行掃除於下訖引降還齋所奉禮以下還齋所晡後三刻諸太祝與廩犧令以牲就版位贊者引太常卿贊引引御史入詣壇東陛升視滌濯及玉凡導引者每曲一逡巡於視滌濯執尊者舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲犧牲令又前北面舉手曰腯還本位諸太祝各循牲一匝西面舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官其五星以下羊豕所司各依令預備如常儀謁者引光祿詣厨省鼎鑊申視濯溉謁者贊引各引御史祀官就厨省饌及五齊三酒訖俱還齋所祀日未明十五刻太官令帥宰人以鸞刀割牲祀史以豆取毛血各置於饌所遂烹牲鸞駕上山前祀三日本司宣攝內外各供其職衛尉設祀官羣官五品以上便次於行宫朝堂如常儀前祀二日尚舍直長施大次於圓臺東門外道北又於山中道設止息大次俱南向尚舍奉御鋪御坐衛尉設從駕文武羣官及諸方使應從升者次於圓臺南門之外文東武西並如常儀郊社令設御洗圓臺南陛之東北向罍水在洗東篚在洗西南肆設布羃其日奉禮設御位於圓臺南當壇北向設群官五品以上版位於御位之南文東武西重行北向相對為首設東方諸州刺史縣令位於文官之東諸州使人位於武官之西設蕃客位東方南方於文官東南每國異位北面西上西方北方於武官西南每國異位北面東上設御史位於圓臺東西如祀禮設奉禮贊者位於群官東北西面設執事位於東門之內道南西面皆北上前祀一日未明七刻捶一鼓為一嚴三嚴時節祀前一日節侍中奏裁未明二刻捶二鼓為再嚴侍中版奏請中嚴從祀官五品以上俱就次各服其服所司陳大駕鹵簿未明二刻捶三鼓為三嚴諸衛之屬各督其隊與鈒戟以次陳於行宫門外謁者贊引各引祀官通事舍人分引從祀羣官諸侍臣結珮俱詣行宫門外奉迎侍中負寶如式乘黃令進輦於行宫門外侍中版奏請登山皇帝服衮冕乘輦以出警蹕如常儀黃門侍郎進當駕前跪奏稱黃門侍郎臣某言請鑾駕進發俯伏興退復位鑾駕動又稱警蹕黃門侍郎侍中中書令以下夾引以出千牛將軍夾輦而趨駕至侍臣上馬所黃門侍郎奏請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黃麾內符寶郎奉六寶與殿中監後部從在黃鉞內侍臣上馬畢黃門侍郎奏稱鑾駕進發退復位鑾駕動稱警蹕如常鼓吹不鳴不得喧譁從祀官在玄武隊後如常若須先置則聽臨時節度車輅鼓吹待于山下御史大夫刺史縣令前導如式至中道止息大次前廽輦南向侍中奏請降輦如常皇帝降輦之大次羣官皆隨便而舍停大次三刻頃侍中奏請皇帝出次升輦進發如初駕至臺東門外大次前廽輦南向侍中進當駕前跪奏稱侍中臣某言請降輦俯伏興還侍位皇帝降輦之大次如常儀通事舍人承旨敕從祀羣官退就門外位奠玉幣祀日未明三刻諸祀官各服其服郊社令帥其屬以玉幣及玉册置於山上圓臺壇上坫所禮神之玉以蒼幣以蒼幣配坐之幣亦如之又以玉匱金匱金繩金泥盛於篚置於石䃭之側良醖令帥其屬各入實樽􅧂玉幣凡六尊之次太尊為上實以泛齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝著尊為上實以泛齊犧尊次之實以醴齊象尊次之實以盎齊山􅧂為下實以清酒其玄酒各實於五齊之上