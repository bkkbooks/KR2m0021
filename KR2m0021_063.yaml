天上帝神坐前北向跪奠爵興謁者引太尉少退北面再拜謁者引太尉詣髙祖神堯皇帝神坐犧樽所取尊於坫執樽者舉羃太尉酌醴齊謁者引太尉進髙祖神堯皇帝神座前東向跪奠爵興謁者引太尉少退東向再拜謁者引太尉進昊天上帝神座前北向立太祝以爵酌罍福酒合置一爵一太祝特爵進太尉之右西向立太尉再拜訖受爵跪祭酒遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光禄卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光禄卿降復位初皇帝將升獻太官令引饌入其山下封祀壇五帝日月以下之饌亦相次而入俎初入門雍和之樂作以黄鐘之均饌至陛樂止祝史俱進跪徹毛血之豆降自東陛以出木帝之饌升自寅陛火帝之饌升自己陛土帝之饌升自未陛金帝之饌升自酉陛水帝之饌升自子陛太明之饌升自辰陛夜明之饌升自戌陛其内官中官衆星之饌所由師長皆先陳布設訖謁者引司徒太官令帥進饌者俱降自東陛以出司徒復位諸太祝各還樽所於山上太尉之亞獻也封祀壇謁者七人分引五方帝及大明夜明等獻官詣罍洗盥手洗匏爵訖各由其陛升詣第一等俱酌汎齊訖各跪奠於神座前興各引降還本位初第一等獻官將獻謁者五人次引獻官各詣罍洗盥洗訖各由其陛升詣第二等内官酒樽所俱酌醴齊各進跪奠爵於内官首座興餘坐皆祝史齋郎助奠相次而畢謁者各引獻官還本位初第二等獻官將獻謁者四人次引獻官俱詣罍洗盥洗各由其陛升壇詣第三等中官酒樽所俱酌盎齊以獻贊引四人次引獻官詣罍洗盥洗訖詣外官酒樽所俱酌醴齊以獻贊引四人次引獻官詣罍洗詣衆星酒樽所俱酌沈齊以獻其祝史齋郎酌酒助奠皆如内官之儀訖謁者贊引各引獻官還本位武舞六成樂止舞獻俱畢上下諸祝各進跪徹豆興還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜樂作一成止燔燎終獻將畢侍中前跪奏曰請就望燎位太常卿引皇帝就望燎位太祝奉玉幣等就柴壇置於柴上户内訖奉禮曰可燎東西面各六人以炬燎火半柴侍中跪奏禮畢太常卿引皇帝出贊引引祀官以下皆出其山下封祀壇獻官獻畢奉禮曰請就望燎位諸獻官俱就望燎位諸太祝各取玉幣等就柴壇自南陛升於柴上户内訖奉禮曰可燎東西面各六人以炬燎火半柴訖奉禮曰禮畢獻官以下皆出封玉冊燔燎畢侍中前跪奏稱具官臣某言請封玉冊太常卿引皇帝自南陛升壇北向立近侍者從升如式少府監具金繩金泥等并所用物立於御側符寳郎奉側受命寳立扵侍中之謁者引太尉進昊天上帝神坐前跪取玉冊置於案進皇帝受玉冊跪疊之納扵玉匱中纒以金繩封以金泥侍中取受命寳跪以進皇帝取寳以印玉匱訖興侍中受寳以授符寳郎通事舍人引太尉進皇帝跪捧玉匱授太尉太尉跪受皇帝興太尉退復位側身奉玉匱太常卿前奏請再拜皇帝再拜訖入次如常儀太尉奉玉匱之案於石䃭南北向立執事者發石盖太尉奉玉匱跪藏於石䃭内執事者覆石盖檢以石檢纒以金繩封以石泥訖太尉以玉寳遍印訖引降復位將作帥執事者以石距封固又以五色土圜封後續令畢功其配座玉牒封於金匱皆如封玉匱之儀訖太尉奉金匱從降俱復位封禅還以金匱内太廟藏於髙祖神堯皇帝之右室如别儀太常卿前奏禮畢若有祥瑞則太史監跪奏訖侍臣奉賀再拜三稱萬嵗内外皆稱萬嵅訖又再拜太常卿引皇帝還大次樂作皇帝還大次出東門殿中監前受鎮珪以授尚衣奉御殿中監又受大珪華盖侍衛如常皇帝入次樂止謁者贊引各引祀官通事舍人分引從祀羣官以次出復位立定奉禮曰再拜衆官在位者皆再拜訖贊引引出工人二舞以次出鑾駕還宫皇帝既還大次侍中版奏請解嚴將士不得輙離部位轉仗衛於還途如来儀二刻頃侍中版奏請中嚴皇帝冠通天冠絳紗袍諸祀官服朝服三刻頃謁者贊引各引祀官通事舍人分引從祀羣官侍臣詣大次奉迎乗黄令進輦於大次門外南向領左右千牛将軍立扵輦右侍中版奏外辦皇帝出次升輦降山千牛将軍夹輦而趨警蹕導從如常皇帝下至圓䑓所權停乗黄令進玉輅太僕升執轡侍中進當駕前跪奏稱侍中臣某言請降輦升輅俛伏興還侍位皇帝降輦升輅太僕立授綏文武侍臣皆上馬皇帝勅車右升領左右將軍升輅陪乗侍臣上馬畢黄門侍郎跪奏請鑾駕進發退復位鑾駕動侍衛警蹕如常駕至行宫門外逥輅南向領左右將軍降立於輅右侍臣下馬訖侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅入侍臣從至閣通事舍人承㫖勅羣官并還皇帝既入侍中版奏請解嚴叩鉦將士各還其所大唐開元禮卷六十三
