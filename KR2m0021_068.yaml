body:
  text: 大唐開元禮卷六十八唐蕭嵩等撰吉禮諸州祭社稷前三日刺史散齋於别寢二日致齋於㕔事一日亞獻以下與祭之官散齋二日各於正寢致齋一日於壇所上佐為亞獻録事叅軍及判司通為終獻若刺史及上佐有事故並以次差攝散齋理事如舊唯不弔䘮問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祭事得行其餘悉斷諸從祭之官各清齋於公館一日従祭官刺史未出之前䂊赴祠所前二日本司豫修除壇之内外其壇方二丈五尺髙三尺四陛三等為瘞埳二於壇西門之外道北南向設刺史次於社壇西門之外道北南向設祭官以下次於刺史次西北俱南向以東為上前一日晡後本司帥其屬守社壇四門去壝九十歩所禁止行人本司設刺史位於北門之内道西南向若刺史有故攝祭初獻位於亞獻之前東向設亞獻終獻位於稷壇西北設掌事者位於西門之内道北俱每等異位東向南上設賛唱者位於終獻東北南向西上設州官位於祭官掌事之北東靣府官位於東方當州官西靣俱重行南上設望瘞位於塪北南向東上設門外位祭官以下於西門之外道南州官於祭官之南俱重行北靣以東為上府官於東門之外道南重行北靣以西為上祭器之數每座樽二籩八豆八簋二簠二俎三羊豕脾腊各一俎掌事者以樽坫升自西階各設於壇上西北隅配座之樽在西俱南向東上皆加勺羃社稷皆爵一配座皆爵四置於坫設洗於社壇北陛之西去壇三歩所南向罍水在洗西加勺羃篚在洗東北肆實爵六巾二於篚加羃執樽罍洗篚者各於樽罍洗篚之後祭日未明烹牲於厨祝以豆二取牲血夙興掌饌者實祭器牲體羊豕皆載右胖前脚三節肩膊臑節一段皆載之後脚三節一段去下一節載上肫胳二節又取正脊脡脊横脊短脅正脅代脅共各二骨以並餘皆不設簋實黍稷簠實稻粱邊實石鹽乾魚棗栗榛菱芡鹿脯豆實虀葅醢醢菁葅鹿醢芹葅兎醢笋葅魚醢若土無者以其類充之本司帥掌事者以席入自西門詣壇西階升設社稷神座各於壇上近南北向又設后土氏神座於社神之左后稷氏神座於稷神之左俱東向席皆以莞質明諸祭官及從祭之官各服其服祭官服祭服從祭之官應公服者公服非公服者常服本司帥掌事者入實樽罍每坐二尊一實𤣥酒為上一實醴齊次之祝版各置於坫祝以幣各置於篚與血豆俱設於饌所社稷之幣皆用黒各長一丈八尺賛唱者先入就位諸祝與執樽罍篚者入自西門當社壇北重行南向以東為上立定賛唱者曰冄拜祝以下皆冄拜執樽者各升自西階立於樽所執罍篚者各就位祝詣社壇升自西階行埽除訖降詣稷壇升行埽除如社壇之儀行埽除於下訖皆就位刺史將至賛禮者引祭官及従祭之官與掌事者俱就門外位刺史至叅軍事引之次賛唱者先入就位刺史停於次少頃服祭服出次叅軍事引刺史入自西門就位南向立叅軍事立於刺史之東少退南向賛禮者引祭官以下及従祭之官以次入就位凡導引者每曲一逡廵立定賛唱者曰冄拜刺史以下皆冄拜叅軍事少退刺史之左西靣白請行事退復位本司帥執饌者奉饌陳於西門之外祝以幣授刺史叅軍引刺史自北階升社壇南向跪奠幣于社神座前訖興少退冄拜祝又以幣授刺史叅軍引刺史升稷壇南向跪奠幣於稷神座如社壇之儀訖叅軍引刺史降復位本司引饌入社稷之饌升自北階配坐之饌升自西階諸祝迎引於壇上設於神座前籩豆盖羃先徹乃升簋簠既奠却其盖於下籩居左豆居右簋簠居其間羊豕二俎横而重於右腊俎特于左本司與執饌者降自西階復位諸祝史各還樽所叅軍事引刺史詣罍洗執罍者酌水執洗者跪取盤興承水刺史盥手執篚者跪取巾於篚興進刺史帨手訖執篚者受巾跪奠於篚遂取爵興進刺史受爵執罍者酌水刺史洗爵執篚者又跪取巾於篚興進刺史拭爵訖授巾奠於篚奉盤者跪奠盤興叅軍引刺史自社壇北階升詣社神酒樽所執樽者舉羃刺史酌醴齊叅軍引刺史詣社神座前南向跪奠爵興少退南向立祝持版進於神座之右西向跪讀祝文曰維某年歳次月朔日子具位姓名敢昭告於社神惟神徳兼愽厚道著直方載生品物含飬庶類謹因仲春仲秋祗率常禮敬以制幣犧齊粢盛庶品備兹明薦用申報本以后土勾龍氏配神作主尚饗祝興刺史冄拜祝進跪奠版於神座還樽所刺史拜訖叅軍事引刺史詣配座酒樽所執樽者舉羃刺史酌醴齊訖叅軍事引刺史詣后土氏神座前西向跪奠爵興少退西向立祝持版進於神座之左南靣跪讀祝文曰維某年歳次月朔日子具位姓名敢昭告於后土氏爰以仲春仲秋厥日惟戊敬修恒事薦於社神惟神功著水土平易九州昭配之義實通祠典謹以犧齊粢盛庶品式陳明薦作主侑神尚饗訖興刺史冄拜祝進跪奠版於神座興還樽所刺史拜訖叅軍事引刺史進當社神座南向立祝史各以爵酌罍福酒合置一爵一祝持爵進於刺史之右東向立刺史冄拜受爵跪祭酒啐酒奠爵祝帥執饌者以俎進減社神前胙肉各取前脚第二骨共置一俎上興祝持俎東向進刺史受以授左右刺史跪取爵遂飲卒爵祝進受爵復於坫刺史興冄拜叅軍事引刺史降自北階詣罍洗爵自稷壇北階升詣稷神酒樽所執樽者舉羃刺史酌醴齊叅軍事引刺史詣稷神座前南向跪奠爵少退南向立祝持版進於神座之右西靣跪讀祝文曰維某年歳次月朔日子具位姓名敢昭告於稷神惟神播生百榖首兹八政用而不匱功濟甿黎敬以制幣犧齊粢盛庶品祗奉舊章備兹瘞禮以后稷弃配神作主尚饗祝興刺史冄拜祝進跪奠版於神座前興還樽所刺史拜訖叅軍事引刺史詣配座酒樽所刺史取爵於坫執樽者舉羃刺史酌醴齊叅軍事引刺史詣后稷氏神座前西向跪奠爵興少退西向立祝持版進於神座之左南靣跪讀祝文曰維某年歳次月朔日子具位姓名敢昭告於后稷氏爰以仲春仲秋敬修恒禮薦於稷神惟神功叶稼穡闡修農政允兹從祀用率舊章謹以犧齊粢盛庶品式陳明薦作主配神尚饗祝興刺史冄拜祝進跪奠版於神座興還樽所刺史拜訖叅軍事引刺史詣稷神座前南向立飲福受胙如社壇之儀訖叅軍事引刺史降自北階還本位初刺史獻將畢賛禮者引亞獻詣罍洗盥手洗爵訖賛禮者引亞獻自社壇西階升詣社神座前南向跪奠爵興少退南向冄拜賛禮者引亞獻詣后土氏酒樽所取爵於坫執樽者舉羃亞獻酌醴齊賛禮者引亞獻詣后土氏神座西靣跪奠爵興少退西向冄拜賛禮者引亞獻進當社神座前南靣立祝各以爵酌福酒合置一爵祝持爵進於亞獻之右東向立亞獻冄拜受爵跪祭酒遂飲卒爵祝受爵復於坫亞獻興冄拜賛者引亞獻降自西階詣罍洗盥手洗爵詣稷壇升獻飲福如社壇之儀訖降復位初亞獻將畢賛禮者引終獻詣罍洗盥洗升酌終獻如亞獻之儀訖降復位諸祝各進神座跪徹豆興還樽所徹者籩豆各一少移于故處贊唱曰賜胙再拜非飲福受胙者皆再拜贊唱者又曰再拜刺史以下皆再拜參軍事少進刺史之左白請就望瘞位參軍事引刺史就望瘞位南向立祝於神前取幣及血寘於埳贊唱曰可瘞埳東西面各二人寘土半坎參軍事少進刺史之左西面白禮畢遂引刺史還次贊禮者引祭官以下以次出諸祝及執樽罍篚者降復掌事位贊唱者曰再拜祝以下皆再拜以次出其祝版燔於齋所大唐開元禮卷六十八
