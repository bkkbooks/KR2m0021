body:
  text: 大唐開元禮卷六十一唐蕭嵩等撰吉禮巡狩告於太廟有司攝事前二日守宫設告官以下次各於常所右校清掃內外又為瘞塪於北門之內道西方深取足容物前一日諸告官清齋於廟所諸衛令其屬晡後一刻各以其方器服守衛廟門奉禮設版位於內外並如常儀設望瘞位於堂之東北當瘞塪西向又設奉禮位於瘞坎東北向贊者二人在西少退太廟令拂拭神幄又帥其屬以樽坫罍洗篚羃制幣之篚入設皆如常儀執樽罍篚羃者各立於樽罍篚羃之後太官令預饌酒脯醢告日未明三刻諸官以下各服其服太廟令良醖令之屬入實樽罍及玉幣每室春夏用兩犧尊秋冬用兩著尊一實明為水為上一實以醴齊次之山罍二一實玄酒上一實清酒次之幣以白各長一丈八尺未明二刻奉禮帥贊者先入就位贊引引御史太祝以下再拜入行掃除如常儀訖各就位未明一刻贊引引太廟令太祝宫闈令入當階間北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳太廟令以下皆再拜升自東階入開塪室奉禮出獻祖以下九室神主各置於坐如常儀訖各就位謁者引告官以下俱就門外位質明謁者引告官以下贊引引執事者次入就位立定奉禮曰再拜告官以下皆再拜其先拜者不拜謁者進告官之左白有司謹具請行事退復位奉禮曰再拜在位皆再拜初白請行事太官令帥進饌者奉饌陳於東門之外初太官令出諸太祝俱取幣於篚各立於樽所謁者引告官升自東階詣獻祖廟室户前北面立太祝以幣東向授告官受幣進北面跪奠於獻祖神坐俯伏興出户北面再拜訖謁者引告官次進幣於懿祖以下皆如上儀訖謁者引還本位諸太祝各還樽所太官令引饌入自正門各由其陛升諸太祝迎引於階上各設於神坐前訖太官令以下降復位諸太祝各還樽所謁者引告官詣罍洗盥手洗爵訖升自東階詣獻祖酒樽所執樽者舉羃告官酌醴齊謁者引告官入詣獻祖神坐前北向跪奠爵俯伏興出户北向立太祝持版進於室户外之右東面跪讀祝文祝文臨時撰訖興告官再拜太祝進跪奠版於神坐俯伏興還樽所告官拜訖謁者引告官以次獻皆如獻祖之儀唯不盥洗訖謁者引告官詣東序西向立諸太祝各以爵酌罍福酒合置一爵一太祝持爵進告官之左北向立告官再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫告官俯伏興再拜訖謁者引告官降復位諸太祝各入室跪徹豆興還樽所徹者籩豆各一少移於故處奉禮曰再拜在位者皆再拜已飲福者不拜奉禮曰再拜告官以下皆再拜訖謁者進告官之左請就望瘞位奉禮贊者轉就瘞坎東北位謁者引告官就望瘞位西向立於告官將拜諸太祝各執篚進神坐前跪取幣興降自階詣瘞坎以制幣置於坎訖奉禮曰可瘞坎東西面各四人置土半坎謁者進告官之左白禮畢謁者引告官贊引引執事者以次出初白禮畢奉禮贊者還本位御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出太廟令太祝宫闈令納神主如常儀其祝版燔於齋坊歸與此禮同大唐開元禮卷六十一
