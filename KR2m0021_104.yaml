body:
  text: 大唐開元禮卷一百四唐蕭嵩等撰嘉禮皇帝養老於太學陳設鑾駕出宫養老鑾駕還宫陳設前三日尚舍直長設大次於學堂之後隨地之宜設三老五更次於學堂南門外之西羣老次於其後俱東向設羣官次文官于門外之東重行西向武官于羣老之西重行東向皆北上前一日尚舍奉御設御坐于堂上東序西向莞筵紛純加藻席畫純次席黼純設三老坐於西楹之東近北南向設五更坐於西階上東向設國老三人坐於三老坐西階不屬焉皆莞筵紛純加藻席畫純設衆國老坐于堂下西階之西東面北上皆蒲筵緇布純加莞席𤣥帛純若三品以上則莞筵紛純加藻席畫純凡五品以上致仕者為國老設庶老坐於國老之後皆蒲筵緇布純六品以下致仕者為庶老太樂令展宫懸於學堂之庭設登歌於堂上及舉麾位等並准元㑹之儀典儀設文官五品以上位於懸東六品以下在其南俱重行西向北上武官五品以上位於懸西六品以下在其南當文官俱重行東向北上藩客分方位於文官武官六品之南若有諸州使人分方位于文武官九品之後學生分位於文武官之後奉禮設門外位如設次之式尚舍奉御設樽于東楹之西北向左𤣥酒有坫以置爵鑾駕出宫前出宫三日本司宣攝內外各供其職守宫設從駕之官五品以上次於順天門外東西朝堂如常前二日太樂令設宫懸之樂於殿庭如常儀其日未明七刻捶一鼓為一嚴三嚴時節前一日侍中裁奏侍中奏開宫殿門及城門未明五刻捶二鼓為再嚴侍中版奏請中嚴奉禮設從駕羣官五品以上位文官于東朝堂之前西向武官于西朝堂之前東向俱重行北上從駕羣官五品以上俱集朝堂次各服其服其六品以下及諸客使等並駕發之前預赴太學俱就次各服其服所司陳小駕鹵簿未明二刻捶三鼓為三嚴諸衛之屬各督其隊與鈒㦸以次入陳于殿庭謁者引從駕羣官各就朝堂前位諸侍衛之官各服其器服侍中中書令以下俱詣西閣上奉迎侍中奉寶如式乘黃令進金輅于西閣外南向千牛將軍一人執長刀立于輅前北向黃門侍郎一人在侍臣之前贊者二人又在黃門之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝服通天冠絳紗袍乘輿以出曲直華蓋警蹕如常儀皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應協律郎跪俯伏舉麾鼓柷奏太和之樂千牛將軍前執轡皇帝升輅太僕卿立授綏侍中中書令以下夾侍如常儀黃門侍郎進當鑾駕前跪奏稱黃門侍郎臣某言請鑾駕發引俯伏興退復位凡黃門侍郎奏請皆進當鑾駕前跪奏稱具官臣某言訖俯伏興鑾駕動又稱警蹕黃門侍郎與贊者夾引以出千牛將軍夾輅而趨駕至太極門偃麾戛敔樂止出太極門鼓柷奏采茨之樂出嘉德門戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止至順天門外侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黃麾內符寶郎奉六寶與殿中監後部從在黃鉞內侍中中書令以下夾侍于輅前贊者在供奉官人內侍臣上馬畢黃門侍郎奏稱請敕車右升侍中前承制退稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕鼓傳音如常鼓吹振作而行其從駕之官在𤣥武隊後如常儀養老仲秋之月擇吉辰皇帝親養三老五更於太學所司先奏定三師三公致仕者用其德行及年高者一人為三老次一人為五更尚食預具牢饌鑾駕將至通事舍人引先至之官皆就門外位學生俱青襟服入就位鑾駕至太學門回輅南向侍中跪奏請降輅俯伏興皇帝降輅乘輿入大次繖扇侍衛如常通事舍人引文武五品以上從駕之官皆就門外位太樂令帥工人二舞入就位如正㑹之禮通事舍人引羣官客使入就位初鑾駕出宫量時刻遣使迎三老五更於其第三老五更俱服進賢冠乘安車前後導從如常禮其國老庶老則有司預戒之鑾駕既至三老五更及羣老等俱赴集其次羣老各服其服太常少卿贊三老五更俱出次引立于學堂南門外之西東面北上奉禮贊羣老出次引立于三老五更之後太常博士引太常卿升立于學堂北户之內當户北向侍中版奏外辦皇帝出户侍衛如常侍中負寶陪從如式殿中監進大圭皇帝執大圭博士引太常卿太常卿引皇帝每太常卿前導皆博士先引協律郎跪俯伏舉麾太和之樂作皇帝降迎三老于門內之東西面立侍臣從立于皇帝之後太常卿與博士退立於左皇帝立定樂止三老五更皆杖各二人夾扶左右太常少卿引導敦史執筆以從三老入門舒和之樂作三老五更立于門西東面北上奉禮引羣老隨入立於其後初三老立定樂止太常卿前奏請再拜退復位皇帝再拜三老五更去杖攝齊以答再拜畢皇帝揖進三老在前五更從仍杖夾扶入初至階皇帝揖升俱就坐後揖立樂止侍衛之官量人從升皇帝西面再拜三老三老南面答再拜皇帝西向肅拜五更五更答再拜休和之樂作三老五更俱就坐三公授几九卿正履訖殿中監尚食奉御進珍羞及黍稷等皇帝省之遂設于三老前樂止太常卿引皇帝詣三老座前執醬而饋訖太常卿引皇帝詣酒樽所取爵侍中贊酌酒訖太常卿引皇帝進執爵而酳尚食奉御以次進珍羞酒食于五更前國老庶老等皆坐又設酒食于國老庶老前國老庶老等皆食皇帝即坐太樂令引工升奏昭和之樂三終三老乃論五孝六順典訓大綱格言宣于上惠音被于下皇帝乃虛躬請受敦史執筆録善言行事終二舞坐于懸中訖禮畢三老以下降筵太常少卿及奉禮引導皆如初太常卿引皇帝從以降階太和之樂作皇帝逡巡立于階前樂止三老五更出舒和之樂作太常卿引皇帝升立于階上三老五更出門樂止侍中前奏禮畢退復位太常卿引皇帝降還大次三老五更升安車導從而還通事舍人引群官及學生等以次出明日三老詣闕表謝鑾駕還宫皇帝既還大次侍中版奏請解嚴將士不得輒離部伍皇帝停大次一刻頃捶一鼓為一嚴轉仗衛于還塗如來儀三刻頃捶二鼓為再嚴將士布隊仗侍中版奏請中嚴皇帝服通天冠絳紗袍百官仍服朝服五刻頃捶三鼓為三嚴文武侍臣奉迎如式乘黃令進金輅於太學門外南向千牛將軍立于輅右侍中版奏外辦太僕卿升執轡皇帝乘輿以出繖扇侍衛警蹕如常儀皇帝升輅太僕卿立授綏黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕如常儀黃門侍郎贊者夾引千牛將軍夾輅而趨至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承詔退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬畢黃門侍郎奏稱請敕車右升侍中稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引退復位鼓傳音鑾駕動鼓吹振作而還文武羣臣皆從如來儀諸方客使還館駕至順天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立于輅右訖鑾駕動千牛將軍夾輅而趨駕入嘉德門太樂令令撞㽔賔之鐘左五鐘皆應鼓柷奏采茨之樂至太極門戛敔樂止入太極門鼓柷奏太和之樂駕至橫街北當東上閣回輅南向侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅乘輿以入繖扇侍衛警蹕如常儀侍臣從至閣戛敔樂止初文武羣臣至東朝堂通事舍人承㫖敕羣官並還皇帝既入侍中版奏請解嚴叩鉦將士各還其所大唐開元禮卷一百四
