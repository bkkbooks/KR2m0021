body:
  text: 大唐開元禮卷一百十九唐蕭嵩等撰嘉禮四品五品嫡子冠將冠筮於廟門之外主人謂將冠者之父兄公服立於門東西面掌事者各服其服立於門西東面北上布筮席於闑西閾外西面筮者開匵出䇿兼執之東面受命於主人主人曰為嫡子某某日加冠庶乎從之筮者曰諾進就筮席西面以韇撃䇿遂述曰假爾泰筮有常某為嫡子某某日加冠庶乎從之乃釋韇坐筮訖興降席東面稱占曰從筮者退若不吉則筮逺日如初儀贊禮者進主人之左告禮畢掌事徹筮席前三日筮賔如求日之儀筮賔筮其可使冠子者前三日主人戒賔及贊冠者主人至賔大門外掌次者引之次主人公服出次立於門外之西東面賔公服立於阼階下西面儐者公服進於賔之左北面受命出立於門東西南曰敢請事主人曰某之子某將加冠請某子教之相稱各隨官爵儐者入告賔出立於門東西面再拜主人答拜主人曰某之子某將加冠願吾子教之賔曰某不敏恐不能供事以辱吾子敢辭主人曰某猶願吾子教之賔曰吾子重有命某敢不從主人再拜賔答拜主人還賔送主人戒賛冠者亦如之亦通使子弟戒之前一日掌事者設次於大門外之右南向其日夙興賛者設洗於正寢阼階東南東西當東霤南北以堂深罍水在洗東加羃篚在洗西南肆實巾一於篚加羃席於東房内西牖下無房者張帷為之陳服於席東領北上冕服青衣纁裳四品繡冕服三章一章在衣粉米二章在裳黼黻五品𤣥冕衣無章裳刺黼一章白紗中單青領褾襈裾革帶鈎䚢大帶素帶紕其垂外以𤣥組内以黄紉約皆用青黻綉冕山一章𤣥冕無章劍飾以金雙珮水蒼玉雙綬四品青綬三綵青白紅純青質長一丈四尺一百三十首廣七寸五品黑綬二綵青紺純紺質長一丈三尺一百首廣六寸皆有小雙綬長二尺六寸色同大綬而首半之朱韈赤舄進賢冠服綘紗單衣白紗中單皂領褾襈裾白裙襦赤裙衫革帶鈎䚢假帶曲領方心綘紗蔽膝白韈黒舄劍珮雙綬緇布冠服青衣素裳素鞸中單革帶劍珮綬與冕服同韈屬與進賢冠同緇纚櫛簮同箱在服南纚今用皂巾六寸属帶於前兩隅蒲筵四緇布純加萑席四𤣥帛純又在南側樽甒醴在北加勺羃設篚在樽側北實角觶角柶各一加羃饌陳於篚北柶以角為之狀如匕饌用少牢及腊三俎籩六豆六牲體節折加離肺籩實棗栗豆實葅醢之屬設洗於東房近北罍水在洗西篚在洗東北肆實以巾質明賔贊至於主人大門外掌次者引之次賔贊公服諸行事者各服其服執樽罍篚者皆就位綉冕垂青珠四旒以組為纓色如其綬青纊充耳角導𤣥冕三旒餘皆同綉冕進賢冠兩梁纓青緌犀導繢布冠青組纓冠冕各一箱各一人執之待於西階之西東面北上設主人之席於阼階上西面賔席於西階上東面冠者席於主人東北西面主人公服立於阼階下當東序西面諸親公服非公服者常服立於罍洗東南西面北上尊者停别室儐者公服立於門内道東北面將冠者䨇童髻䨇玉導金飾綵袴褶錦紳烏皮履立於房内南面主人之賛冠者公服立於房内户東西面賔及賛冠者出次立於門西賛冠者少退俱東面北上儐者進於主人之左北面受命出立於門東西面曰敢請事賔曰某子有嘉禮命某執事儐者入告主人迎賔於大門外之東西面再拜賔答拜凡賔主拜揖出入皆賛禮者相導主人揖賛冠者賛冠者報揖主人又揖賔賔報揖主人揖入賔及賛冠者次入及内門主人揖賔賔報揖主人與賔入贊冠者從之至内霤將曲揖賔報揖至階主人立於階東西面賔立於階西東面主人曰請吾子升賔曰某備將事敢辭主人曰固請吾子升賔曰某固固辭主人曰終請吾子升賔曰某敢終辭主人升自阼階立於席東西向賔升自西階立於席西東向賛冠者及庭盥於洗升自西階入於東房立於主人賛冠者之南俱西面主人賛冠者引將冠者出立於房户外之西南面賔之賛冠者取纚櫛簮箱跪奠於冠者筵南端興席北少東西面立賔揖將冠者賔主俱即席坐將冠者進升席西面坐賔之賛冠者進筵前東面跪脫䨇童髻置於箱櫛畢設纚興復位立賔降盥主人從降賔東面辭曰願吾子不降主人曰吾子降辱敢不從賔降至罍洗盥手訖詣西階賔主一揖一讓升主人立於席後西面賔立於西階上東面執緇布冠者升賔降一等受之右執頂左執前進將冠者筵前東向立祝曰令月吉日始加元服弃爾幼志順爾成德壽考維祺介爾景福乃跪冠興復西階上席後東面立賔之賛冠者進筵前東面跪結纓興復位冠者興賔揖冠者冠者適房賔主俱坐冠者著青衣素裳之服出房户西南面賔主俱興賔揖冠者冠者進升席西向坐賔之賛冠者跪脫緇布冠置於箱櫛畢設纚興復位賔降二等受進賢冠右執頂左執前進冠者筵前東向立祝曰吉月令日乃申爾服敬爾威儀淑慎爾德眉壽萬年永受胡福乃跪冠興復位賔之賛冠者坐設簮結纓興復位冠者興賔揖冠者冠者適房賔主俱坐冠者著綘紗服出房户西南面立賔主俱興賔揖冠者冠者進升席西向坐賔之贊冠者跪脱進賢冠置於箱櫛畢設纚興復位賔降三等受冕右執頂左執前進冠者筵前東向立祝曰以嵗之正以月之令咸加爾服兄弟具在以成厥德黄耉無疆受天之慶乃跪冠興復位賔之賛冠者跪設簮結纓興復位冠者興賔揖冠者冠者適房賔主俱坐主人賛冠者徹纚櫛簮箱及筵入於房又筵於室户西向冠者著冕服出房户西南面立賔主俱興主人賛冠者盥手洗觶於房酌醴加柶覆之面葉出房南面立賔揖冠者冠者就筵西南面立賔進受醴於室户東加柶面柄進冠者筵前北面立祝曰甘醴惟厚嘉薦令芳拜受祭之以定爾祥承天之休壽考不㤀冠者筵西拜受觶賔復西階上東面答拜執饌者奉饌薦於冠者筵前冠者升筵坐左執觶右取脯擩於醢祭於籩豆之間賛冠者取肺一以授冠者冠者奠觶於薦西興受㕁左手執本坐右絶末以祭上左手嚌之興以授賛冠者加於俎冠者坐帨手取觶以柶祭醴加柶於觶面葉興筵末跪啐醴建柶興降筵西南面跪奠觶再拜執觶興賔答拜賔主俱坐冠者升筵跪奠觶於薦東興進北面跪取脯降自西階入見母進奠脯於席前退再拜以出冠者母不在則使人受脯於西階下初冠者入見母賔主俱興賔降當西序東面立主人降當東序西面立冠者既見母出立於西階之東南面賔少進字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於嘏永受保之曰伯某甫冠者曰某雖不敏夙夜祗奉之賔出主人送於内門外主人西面謂賔曰吾子辱執事請禮從者賔曰某既得將事敢辭主人曰敢固以請賔曰某辭不得命敢不從賔就次主人入初賔出冠者東面見諸親諸親拜之冠者答拜冠者西面拜賔之賛冠者賔之贊冠者答拜見諸尊於别室賔主既釋服改席訖興衆賔俱出次立於門西東面主人出門東西面主人揖賔賔報揖主人先入賔及衆賔從之至階一揖升各就坐後立定俱升坐㑹訖賔主俱興賔立於西階上東面主人立於東階上西面衆賔降立於西階下東面掌事者以幣篚升授主人於序端賔北面再拜主人進立於楹間南面賔進立於主人之右俱南面賔受幣退復東面位主人還阼階上北面拜送賔降自西階從者迓受幣賔出主人送賔於大門外之東西面再拜賔退主人入孤子則諸父諸兄戒賔冠之日主人髻而迎賔拜揖讓如冠主冠於阼醴之及禮賔拜送如上儀明日見廟冠者朝服質明賛禮者引入廟南門中庭道西北面賛再拜訖引出大唐開元禮卷一百十九
