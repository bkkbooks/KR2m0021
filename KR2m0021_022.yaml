body:
  text: 大唐開元禮卷二十二唐蕭嵩等撰吉禮皇帝臘日蠟百神於南郊齊戒陳設鑾駕出宫奠玉帛進熟鑾駕還宫齊戒先期五日皇帝散齊三日致齊二日如圜丘之儀凡預祀之官散齊三日致齊二日散齊皆於正寢致齊一日於本司一日於祀所其無本司者皆於祀所近侍之官應從升者及從祀羣官諸方客使各於本司及公館俱清齊一宿無本司者各於正寢凡散齊理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊惟祀事得行其餘悉斷其祀官已齊而闕者通攝行事光祿卿監取明水火太官令取水於隂鑑取火於陽燧火以供爨水以實樽前蠟一日諸衛令其屬未後一刻各以其方器服守衛壝門與太樂工人俱清齊一宿陳設前蠟三日尚舍直長施大次於外壝東門之內道北南向尚舍奉御鋪御座衛尉設陳饌幔於內壝東門之外道東西向東方南方之饌陳於東門外西南方及北西方之饌陳於西門外北方之饌陳於門之外設文武侍臣次又設祀官及從祀羣官諸州使人蕃客等次前蠟二日太樂令設歌鐘歌磬皆如圜丘之儀右校掃除壇之內外郊社令積柴於燎壇其壇於神壇之左內壝之外方八尺髙一丈開上南出户方三尺右校又為瘞坎於壇之壬地內壝之外方深足容物南出陛前蠟一日奉禮設御位及望燎位祀官從祀羣官諸州使人蕃客等位於壝門外皆如圜丘之儀設日月酒樽之位大明太樽二著樽二山罍一在壇上於東南隅北向夜明太樽二著樽二山罍一在壇上西南隅北向神農氏伊耆氏各著樽二各於其壇上五星五官后稷各象樽二七宿田畯龍麟朱鳥騶虞𤣥武各壺樽二鱗羽裸毛介等散樽二俱設於神座之左而右向五方嶽鎮海瀆俱山樽二山川林澤俱蜃樽二丘陵墳衍原隰井泉墉坊郵表畷於菟猫等俱散樽二各設於神座之右而左向伊耆氏以上之樽置於坫星辰以下之樽俱藉以席皆加勺羃設爵於樽下設御洗於壇南陛東南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設方獻罍洗篚羃各於其方陛道之左右俱內向執樽罍篚羃者各於樽罍篚羃之後各設玉幣之篚於壇上下樽坫之所晡後謁者引光祿卿詣厨視濯溉又謁者引諸祀官詣厨省饌具訖還齊所蠟日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血置於饌所遂烹牲日青牲一月白牲一其餘方各少牢一未明五刻太史令郊社令升設日月神座於壇上大明於北方少東夜明於大明之西俱南向席皆以藁鞂神農氏伊耆氏神座各於其壇上俱內向設后稷神座於壇東西向設五官田畯之座各於其方設五星十二次二十八宿五嶽四鎮四海四瀆五方山川林澤丘陵墳衍原隰井泉神座各於其方之壇其五方神獸鱗羽裸毛介水墉坊郵表畷於菟猫等之座各於其方壇之後俱內向相對為首自神農氏伊耆氏以下一百九十坐席皆以莞設神位各於坐首鑾駕出宫如圜丘之儀奠玉帛蠟日未明三刻諸祀官各服其服郊社令良醖令各帥其屬入實樽罍玉幣凡尊之次太尊為上實以醴齊著尊次之實以盎齊神農伊耆氏之著尊實以盎齊五星三辰五官后稷之象樽實以醍齊七宿田畯之壺尊實以沈齊五方嶽鎮海瀆之山尊實以醍齊山川林澤之􅜹尊實以沈齊丘陵以下之散尊實以清酒𤣥酒各實於諸坐之上尊禮神之玉大明夜明俱以圭璧大明之幣以青夜明之幣以白神農氏幣以赤伊耆氏幣以𤣥五星以下之幣各從方色太官令帥進饌者實諸籩豆簠簋各設於內壝之外饌幔內未明二刻奉禮帥贊者先入就位贊引引御史諸太祝及令史祝史與執樽罍篚羃者入自東門當壇南重行北面西上凡引導者每曲一逡巡立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執樽者升自東陛立於樽所壇下執樽罍篚羃者各就位贊引引御史諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖降就位駕將至謁者贊引各祀官通事舍人分引從祀羣官諸方客使先至者俱就門外位駕至大次門外回輅南向千牛將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次繖扇華蓋侍衛如常儀太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸南道西謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行掃除於上降行樂懸於下訖引復位皇帝停大次半刻頃謁者贊引各祀官通事舍人分引從祀羣官介公酅公諸方客使先入就本位太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝服𤣥冕出次華蓋侍衛如常儀侍中負寶陪從如式博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至內壝門外殿中監進大圭尚衣奉御以鎮圭授殿中監殿中監受進皇帝搢大圭執鎮圭華蓋仗衛停於門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常皇帝至版位西向立每立定太常卿與博士退立於左謁者贊引各引祀官以次入就位立定太常卿奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆俯伏而取以興奠物則奠訖俯伏而後興也鼓柷樂作無射夷則奏永和㽔賔姑洗太簇奏順和黃鍾奏豫和凡六均均一成俱以文舞之舞偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戞敔而後止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜上下諸太祝俱取玉幣於篚各立於樽所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣壇升自南陛侍中中書令以下及左右侍衛量人從升以下皆如之皇帝升壇北向立樂止太祝以玉幣授侍中侍中奉玉幣東向進皇帝搢鎮圭受玉幣凡受物皆搢鎮圭奠訖執圭俯伏興登歌作肅和之樂乃以大吕之均太常卿引皇帝進北面跪奠於大明神座俯伏興太常卿引皇帝少退北向再拜訖太常卿引皇帝少西北向立又太祝以玉幣授侍中侍中奉幣東向進皇帝受幣太常卿引皇帝跪奠於夜明神座俯伏興太常卿引皇帝少退北向再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止皇帝初奠夜明幣諸祝各奉其幣進跪奠於神座還樽所初羣官拜訖祝史各奉毛血之豆立於門外於登歌止祝史奉毛血入俱由南陛升諸太祝迎取於壇上俱進奠於神座前諸太祝與祝史退立於樽所進熟皇帝既升奠玉幣太官令出帥進饌者奉饌陳於內壝門外謁者引司徒出詣饌所司徒奉大明之俎初皇帝既至版位樂止太官令引饌入俎初入門雍和之樂作饌至陛樂止祝史皆進跪徹毛血之豆降自東陛以出饌升諸太祝迎引於壇上各設於神座前籩豆蓋羃先徹乃升簠簋既奠却其蓋於下設訖謁者引司徒以下降自東陛復位太祝各還樽所又進設神農氏以下之饌相次而畢初壇上設饌訖太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤興承水皇帝盥手黃門侍郎跪取巾於篚興進皇帝帨手黃門侍郎受巾跪奠於篚黃門侍郎又取匏爵於篚興進皇帝受爵侍中酌罍水又侍中奉盤興承水皇帝洗爵黃門侍郎又授巾皆如常儀皇帝拭爵訖侍中奠盤匜黃門侍郎受巾奠於篚皆如常儀太常卿引皇帝樂作皇帝詣壇中升自南陛樂止謁者引司徒升自東陛立於樽所齊郎奉俎從升立於司徒之後太常卿引皇帝大明酒樽所執樽者舉羃侍中贊酌醴齊訖夀和之樂作皇帝每酌獻及飲福皆作夀和之樂太常卿引皇帝進大明神座前北向跪奠爵俯伏興太常卿引皇帝少退北向立樂止太祝持版進於神座之左西面跪讀祝文曰維某年嵗次月朔日子嗣天子臣某敢昭告於大明惟神晷耀千里精烜萬物覺寤黎蒸化成品彚今璇璣齊運玉燭和平六府孔循百禮斯洽謹以玉帛犧齊粢盛庶品致其燔燎尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版於神座興還樽所皇帝拜訖樂止太常卿引皇帝夜明酒樽所執樽者舉羃侍中取匏爵於坫進皇帝受爵侍中贊酌醴齊訖樂作太常卿引皇帝進夜明神座前北面跪奠爵俯伏興太常卿引皇帝少退北向立樂止太祝持版進於神座之右東面跪讀祝文曰維某年嵗次月朔日子嗣天子臣某敢昭告於夜明惟神貞此光華恆茲盈减表斯寒暑節以運行對時育物登成是賴豐年之報式備恆禮謹以制幣犧齊粢盛庶品致其燔燎尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版於神座興還樽所皇帝拜訖樂止太常卿引皇帝少東當兩坐間北向立樂作太祝各以爵酌上罍福酒合置一爵一太祝持授侍中侍中受爵西向進皇帝再拜受爵訖跪祭酒啐酒奠爵俯伏興太祝帥齊郎進俎太祝减神前胙肉加於俎以胙肉共置一俎上太祝持俎以授司徒司徒奉俎西向進皇帝受以授左右謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫皇帝俯伏興再拜樂止太常卿引皇帝太和之樂作皇帝降自南陛還版位西向立樂止文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止皇帝獻將畢謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉自東陛升壇詣大明著樽所執樽者舉羃太尉酌盎齊武舞作謁者引太尉進大明神座前北向跪奠爵興謁者引太尉少退再拜謁者引太尉詣夜明酒樽所取匏爵於坫執樽者舉羃太尉酌盎齊謁者引太尉進夜明神座前北向跪奠爵興謁者引太尉少退再拜謁者引太尉少東當兩坐間北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光祿卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖初亞獻升壇謁者二人引獻官詣罍洗盥手洗爵酌酒一獻帝伊耆氏一獻神農氏跪奠爵神坐前俯伏興向神座立太祝持版進於神座之右跪讀祝文訖興獻官再拜訖謁者引降還本位初伊耆氏獻官將升訖謁者五人各引獻官詣方獻罍洗盥手洗爵詣酒樽所酌酒一獻嵗星一獻熒惑一獻鎮星一獻太白一獻辰星各奠於神座少退向神座立於獻官奠訖七宿皆祝史助奠相次俱畢太祝各持版進於神座之右跪讀祝文訖興凡讀祝文每一番獻酒從東方祝文神為始讀訖次南方次西方次北方餘亦同獻官再拜諸太祝各進奠版於神座還樽所謁者遂引五方獻官各詣罍洗盥手洗爵各詣酒樽所酌酒一獻東嶽一獻南嶽一獻中嶽一獻西嶽一獻北嶽俱奠於神座少退向神座立嶽鎮海瀆山林川澤丘陵墳衍原隰井泉皆祝史助奠相次俱畢太祝持版進神座之右跪讀祝文訖興獻官再拜訖太祝奠版於神座還樽所謁者各引獻官還本位初嶽鎮奠酒贊引五人各引獻官詣罍洗盥洗各詣酒樽所酌酒一獻勾芒氏一獻祝融氏一獻后土氏一獻蓐收氏一獻𤣥冥氏后稷田畯等各祝史助奠訖祝史持版進神座之右跪讀祝文訖興餘與東方同惟無后稷獻官拜訖祝史奠版於神座贊引遂引五官獻官等詣罍洗盥洗詣酒樽所酌酒分獻五靈其鱗羽毛裸介貓於菟坊水墉昆蟲等皆齊郎助奠相次而畢祝史持版跪讀祝文訖興獻官拜訖奠版各還本位武舞六成樂止舞獻俱畢上下諸祝各進徹豆還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜豫和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望燎位太