body:
  text: 大唐開元禮卷七十七唐蕭嵩等撰吉禮四品五品時享其廟前享五日筮于廟門之外主人公服立于門東西面掌事者各服其服立于門西東面北上設筮席于闑西閾外西面筮者開韇出䇿兼執之東面受命于主人主人曰孝曽孫某來日丁亥祗享于廟尚饗非必丁亥也直舉一日以言之己亥辛亥茍有亥焉可也筮者曰諾進就筮席西面以韇擊筮遂述曰假爾太筮有常孝曽孫某來日丁亥祗享于廟尚饗乃釋韇坐筮訖興降席東面稱占曰從筮者退若不吉則筮逺日如初儀贊禮者進主人之左告禮畢掌事者徹筮席先享三日主人及亞獻終獻並執事者各散齊二日于正寢致齊一日于廟所同官僚佐之長為亞獻其次為終獻無則親賓為之子孫及凡入廟者各于家清齊一宿散齊不弔喪問疾不作樂不行刑罰不預穢惡致齊惟祭事得行其餘悉斷其享官已齊而闕者通攝行事前一日之夕清掃內外掌廟者整拂神幄贊禮者設主人之位於東階東南西向亞獻終獻位于主人東南掌事者位于終獻東南俱重行西向北上設子孫之位于庭重行北面西上設贊唱者位于終獻西南西向設亞獻以下門外位于門外之東執事者在南差退俱西向設牲榜于南門北向以西為上掌牲者位于牲西北東向諸祝位于牲後俱北向設亞獻省牲位于牲前近東西向祭器之數每室尊二簋二簠二登二鉶二爼二籩六豆六掌事者以尊入設于前楹下各于室户之東北向西上皆加勺羃首坐爵一餘坐爵四置于尊下設祭器于東序西向每坐簋在前簠次之登次之鉶次之籩次之豆次之爼在後每坐異之皆以南為上屈陳而下設洗於東階東南東西當東霤南北以堂深罍水在洗東篚在洗西南肆實爵三巾二于篚加羃凡器皆濯而陳之執樽罍洗篚者各位于樽罍洗篚之後掌事者以牲就榜位贊禮者引亞獻入詣東階升堂遍視滌濯于視濯執尊者皆舉羃告潔訖引降就省牲位亞獻省牲掌牲者前東面舉手曰腯還本位諸祝各循牲一匝北向舉手曰充還本位諸祝與掌牲者以次牽牲付厨贊禮引終獻詣厨省鼎鑊視濯溉亞獻以下每事訖各還齊所執饌者入徹簋簠籩豆豆鉶以出享日未明烹牲于厨夙興掌饌者實祭器牲體皆載右胖前腳三節節一假肩臂臑皆載之後腳三節節一假去下一節載上肫胳二節又取正脊脡脊橫脊短脅正脅代脅各二骨以並餘皆不設簋實黍稷簠實稻粱籩實鹽脯棗栗之屬豆實醢醬虀菹之類主人以下各服其服掌事者入實尊罍每尊二一實𤣥酒為上一實醴齊次之祝版各置于尊所諸祝入立于庭北面西上立定皆再拜訖升自東階整拂几筵訖出還齊所質明贊禮者引亞獻以下及子孫俱就門外位贊禮者先入就位諸祝與執尊者入立于庭北面西上立定贊唱者曰再拜祝以下皆再拜各就位掌饌者奉饌陳于門外贊禮者引主人入就位又贊禮者引亞獻以下及子孫以次入就位立定贊唱者曰再拜主人以下皆再拜贊禮者進主人之左白請行事退復位掌饌者引饌入升自東階諸祝迎引于階上各設于神坐前籩居左豆居右簋簠登鉶居其間羊豕二爼橫陳重于右臘爼特于左執爐炭蕭稷膟膋者各從其爼升置于堂户外之左其蕭稷各置于爐炭下施設訖掌饌以下降出諸祝各取蕭稷擩于脂燔于爐炭還尊所贊禮者引主人詣罍洗執罍者酌水執洗者跪取盤興承水主人盥手執篚者跪取巾于篚興進主人拭手執篚者受巾跪奠于篚遂取爵興以進主人受爵執罍者酌水主人洗爵執篚者又跪取巾于篚興進主人拭爵訖受巾跪奠于篚奉盤者跪奠盤興凡取物者跪俯伏而取以興奠物則奠訖俯伏而後興贊禮者引主人自東階升堂詣某祖酒尊所執尊者舉羃主人酌酒贊禮者引主人進詣某祖神坐前北面跪奠爵興出戶北向立祝持版進户外之右東面跪讀祝文曰維某年歲次月朔日子孝曽孫某封官無封者但稱官敢昭告于某祖考某諡封時惟仲春夏云仲夏秋云仲秋冬云仲冬伏增逺感謹以柔毛剛鬛嘉薦普淖醴齊敬薦祠其礿嘗蒸各隨時言于某祖考某諡封某祖妣夫人某氏配尚饗祖考及子孫各依尊卑稱號祝文同訖興主人再拜祝進跪奠版於神坐興還尊所贊禮者引主人以次酌獻如上儀惟不盥洗訖贊禮者引主人詣東序西向立諸祝各以爵酌福酒合置一爵一祝持爵進主人之左北向立主人再拜受爵跪祭酒啐酒奠爵興諸祝各帥執饌者以爼入减神前胙肉各共置一爼上又以籩遍取稷黍飯共置一籩祝先以飯籩進主人受以授左右又以爼授主人每受以授左右訖主人跪取爵遂飲卒爵祝進受爵復尊所主人興再拜贊禮者引主人降自東階還本位西向立初主人獻將畢贊禮者引亞獻詣罍洗盥手洗爵升自東階詣某祖酒尊所執尊者舉羃亞獻酌酒贊禮者引亞獻進某祖神坐前北向跪奠爵興出戶北向再拜贊禮者引亞獻以次酌獻如上儀訖贊禮者引亞獻詣東序西向立諸祝各以爵酌福酒合置一爵一祝持爵進亞獻之左北向立亞獻再拜受爵跪祭酒遂飲卒爵祝進受爵復于尊所亞獻興再拜贊禮者引亞獻降復位又贊禮者引終獻詣罍洗盥手升獻如亞獻之儀訖降復位諸祝皆進神坐前跪徹豆興還尊所徹者籩豆各一少移于故處贊唱者曰再拜非飲福受胙者皆再拜贊唱者又曰再拜主人以下皆再拜贊禮者進主人之左白禮畢遂引主人出贊禮者引亞獻以下及子孫以次出諸祝與執尊罍篚者俱復執事位立定贊唱者曰再拜諸祝以下皆再拜與執尊罍篚者出大唐開元禮卷七十七
