body:
  text: 大唐開元禮卷三十一唐蕭嵩等撰吉禮皇帝孟冬祭神州於北郊齋戒陳設省牲器鑾駕出宫奠玉帛進熟鑾駕還宫齋戒將祭有司卜日如别儀前祭七日平明太尉誓百官於尚書省曰某月某日祭神州北祇於北郊各揚其職不供其事國有常刑皇帝散齋四日致齋三日如方丘之儀凡預祭之官散齋四日致齋三日散齋俱於正寢致齋二日於本司一日於祭所其無本司者皆於祭所近侍之官應從升者及從祭羣官諸方客使各於本司及公館清齋一日無本司者各於正寢散齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祭事得行其餘悉㫁其祭官已齋而闕者通攝行事諸祀官致齋之日給酒食及明衣各習禮於齋所光禄卿監取明水火太官令取水於隂鑒取火於陽燧火以供爨水以實尊前二日太尉告太宗文武聖皇帝廟如常告之儀告以配神作主前一日諸衞令其屬未後一刻各以其方器服守衛壝門與太樂工人俱清齋一宿陳設前祭三日尚舎直長施大次於外壝東門之内道北南向尚舎奉御於道南北向設御座衛尉設陳饌幔於内壝東門之外道北南向設文武侍臣次又設祭官及從祭羣官諸州使人蕃客等次如方丘之儀前祭二日太樂令設官懸之樂於壇南内壝之内設歌鐘歌磬右校掃除壇之内外又為瘞埳於壇之壬地内壝之外方深取足容物南出陛前祭一日奉禮郎設御位及望瘞位及祭官位從祭羣官諸州府使人蕃客等位於内壝之内皆如方丘之儀設牲牓於東壝之外當門西向𤣥牲一居前配帝𤣥牲一少退南上設廩犧令位於牲西南祝史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北南向設神州地祗酒樽於壇之上下太樽二著樽二犧樽二山罍二在壇上於東南隅北向象樽二壺樽二山罍四在壇下皆於南陛之東北向西上設配帝著樽二犧樽二象樽二山罍二在壇上於神州酒樽之東陛東南亞獻之洗又於東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍篚羃者各於樽罍篚羃之後各設玉幣之篚於壇之上下樽坫之所祭日未明五刻太史令郊社令升設神州地祗神坐於壇上北方南向席以槀秸設太宗文武聖皇帝神坐於東方西向席以莞設神位各於坐首省牲器省牲之日午後十刻去壇二百歩所諸衛之屬禁㫁行人晡後二刻諸行事之官各服其服郊社令帥府史二人及齋郎以樽坫罍洗篚羃入設於位太祝廩犧令以牲就牓位贊引引御史謁者引太常卿詣壇東陛升視滌濯於上於視濯執尊者皆舉羃告潔訖引太常卿降復位謁者進太尉之左白請就門外位謁者賛引各引祭官以下就門外位謁者引太常卿就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西向舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官謁者引光禄卿詣厨省鼎鑊申視濯溉謁者賛引各引祭官就厨省饌具訖俱還齋所祭日未明十刻太官令帥宰夫以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲鑾駕出宫如方丘之儀奠玉帛祭日未明三刻諸祭官各服其服郊社令良醖令各帥其屬入實樽罍玉幣凡六尊之次太尊為上實以汎齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝著尊為上實以汎齊犧尊次之實以醴齊象尊次之實以盎齊山罍為下實以清酒𤣥酒各實於五齊之上尊禮神之玉以兩珪有邸幣以𤣥太官令帥進饌者實諸籩豆簠簋入各設内壝之外饌幔内未明三刻奉禮帥賛者先入就位賛引引御史博士諸太祝及令史祝史與執樽罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜賛者承傳凡奉禮有詞賛者皆承傳御史以下皆再拜訖執樽罍篚羃者各就位賛引引御史諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖各引就位駕將至謁者賛引各引祭官及從祭羣官諸方客使先至者俱就門外位駕至大次門外迴輅南向將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅之大次謁者引文武五品以上從祭之官皆就壝外位太樂令帥工人二舞以次入就位文舞入陳於懸内武舞立於懸南道西謁者引司空入行掃除訖出復位如常儀訖引就壝外位皇帝停大次半刻頃謁者賛引各引從祭羣官介公酅公諸方客使皆先入就位太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝服大裘而冕出次華葢侍衛如常儀侍中負寳陪從如式博士引太常卿太常卿引皇帝凡太常前導皆博士先引至内壝門外殿中監進大珪尚衣奉御又以鎮珪授殿中監殿中監受進皇帝搢大珪執鎮珪華蓋侍衛停於門外近侍者從入如常謁者引禮部尚書太常少卿陪従如常皇帝至版位西向立每立定太常與博士退立於左謁者賛引各引祭官次入就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位恊律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則奠訖俛伏而授興鼓柷奏順和之樂乃以林鐘之均作文舞之舞樂舞八成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官皆再拜諸太祝俱取玉幣於篚各立於樽所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣壇升自南陛侍中中書令以下及左右侍衛量人從升以下皆如之皇帝升壇北面立樂止太祝加玉於幣以授侍中侍中奉玉帛東向進皇帝搢鎮珪受玉帛凡受物皆搢鎮珪奠訖執珪俛伏興登歌作肅和之樂乃以應鍾之均太常卿引皇帝進北面跪奠於神州地祗神坐俛伏興太常卿引皇帝少退北面再拜訖太常卿引皇帝立於西方東向又太祝以幣授侍中侍中奉幣北向進皇帝受幣太常卿引皇帝進東面跪奠於太宗文武皇帝神坐俛伏興太常卿引皇帝少退東向再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止初羣臣再拜訖祝史各奉毛血之豆立於門外登歌止祝史奉毛血入升正坐升自南陛配坐升自東陛諸太祝迎取於壇上俱進奠於神坐前諸太祝與祝史退立於樽所進熟皇帝既升奠玉帛太官令出帥進饌者奉饌陳於内壝門外謁者引司徒出詣饌所司徒奉神州之俎初皇帝既至位樂止太官令引饌入俎初入門雍和之樂作饌至陛樂止祝史俱進徹毛血之豆降自東陛以出神州之饌升自南陛配帝之饌升自東陛諸太祝迎引於壇上各設於神坐前籩豆盖羃先徹乃升簠簋既奠却其盖於下設訖謁者引司徒太官令帥進饌者降自東陛以出司徒復位諸太祝還樽所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取􅓢興沃水又侍中跪取盤興承水皇帝盥手黄門侍郎跪取巾於篚興進皇帝帨手訖黄門侍郎受巾跪奠於篚黄門侍郎又取匏爵於篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黄門侍郎又受巾皆如初皇帝拭爵訖侍中奠盤􅓢黄門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝詣壇升自南陛樂止謁者引司徒升自東陛立於樽所齋郎奉俎從升立於司徒之後太常卿引皇帝詣神州酒樽所執罇者舉羃侍中賛酌汎齊訖夀和之樂作皇帝每獻酌及飲福皆作夀和之樂皇帝進神州地祗神坐前北向跪奠爵俛伏興太常卿引皇帝少退北向立樂止太祝持版進於神坐之右東面跪讀祝文曰維某年歳次月朔日子嗣天子臣某敢昭告於神州皇地祗惟祗包函區夏載植羣生溥被域中頼兹厚徳式遵彛典揀此元辰敬以玉帛犧齊粢盛庶品明獻厥誠備兹禋瘞皇曾祖太宗文武聖皇帝配神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神坐還樽所皇帝拜訖樂止太常卿引皇帝詣配帝酒樽所執樽者舉羃侍中取爵於坫皇帝受爵侍中賛酌汎齊訖樂作太常卿引皇帝進太宗文武聖皇帝神坐前東向跪奠爵俛伏興太常卿引皇帝少退東向立樂止太祝持版進於神坐之左北面跪讀祝文曰維某年嵗次月朔日子孝曾孫開元神武皇帝臣某敢昭告于皇曾祖太宗文武聖皇帝令月嘉時祗依恒禮用致瘞祭於神州皇地祗惟皇曾祖叶彼乾坤格于上下昭配之義欽率典常謹以制幣犧齊粢盛庶品䖍恭明薦作主侑神尚饗訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神坐還樽所皇帝拜訖樂止太常卿引皇帝進神州地祗神坐前北向立樂作太祝各以爵酌上樽福酒合置一爵一太祝持爵授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俛伏興太祝各帥齋郎進爼太祝減神前胙肉加於俎共致一爼上太祝持俎以授司徒司徒奉俎西向進皇帝受以授左右謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止皇帝獻將畢謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉自東陛升壇詣神州著樽所執樽者舉羃太尉酌醴齊武舞作謁者引太尉進神州地祗神坐前北向立跪奠爵興謁者引太尉少退北向再拜訖謁者引太尉詣配帝犧樽所取爵於坫執樽者舉冪太尉酌醴齊謁者引太尉進太宗文武聖皇帝神坐前東向跪奠爵興謁者引太尉少退東向再拜謁者引太尉進神州地祗神坐前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光禄卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光禄卿降復位武舞六成樂止舞獻俱畢諸太祝各進徹豆還樽所徹者籩豆各一少移於故處奉禮曰賜胙賛者唱衆官再拜衆官皆再拜已飲福受胙者不拜順和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官皆再拜樂一成止太常卿前奏請就望瘞位太常卿引皇帝樂作皇帝就望瘞位西向立樂止於羣官將拜諸太祝各執篚進神坐前取玉帛齋郎以俎載牲體稷黍飯爵酒各自其陛降壇北行當瘞塪西行以玉帛饌物置於塪訖奉禮曰可瘞塪東西廂各六人寘土半塪太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出内壝門殿中監前受鎮珪以授尚衣奉御殿中監又前受大珪華盖侍衛如常儀皇帝入次樂止謁者賛引各引祭官及從祭羣官諸方客使以次出賛引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出其祝版燔于齋所鑾駕還宫如方丘之儀大唐開元禮卷三十一
