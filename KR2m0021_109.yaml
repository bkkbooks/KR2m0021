body:
  text: 大唐開元禮卷一百九唐蕭嵩等撰嘉禮遣使册受官爵朔日受朝朝集使朝見并辭遣使册受官爵前一日受册之家設使者次於大門外道西南向其日使者至掌次者引就次以制書置於案使者以下皆公服受册者著朝服非朝服者皆公服出立於正寢東階東南西面使者出次贊禮者引使者持節者前導立于大門外之西持節者立于使者之北少退令史二人對舉册案立于使者之西南俱東面立定贊禮者引受册者迎于大門外之東西面又贊禮者引使者持節者前導持册案者次之入門而左使者詣階間南面立持節者立于使者之東少南西面持案者立于使者西南東面贊禮者引受册者入立于使者之南北面立定持節者脫節衣持册案者進使者前使者取册持案者退復位使者稱有制受册者再拜宣册訖受册者又再拜贊禮者引受册者進使者前北面受册退立于東階東南西面持節者加節衣贊禮者引使者持節者導以出持案者從之俱復門外位贊禮者引受册者出門東西面再拜送贊禮引使者還于次又贊禮者引受册者入朔日受朝其朔日讀時令則不行此禮前一日尚舍奉御設御幄于太極殿北壁南向守宫設羣官次于朝堂如常儀太樂令展宫懸於殿庭設舉麾位于殿上西階之西東向一位于樂懸東南西向並如常儀其日典儀設文官三品以上位于橫街之南道東設武官三品以上位于道西俱每等異位重行北面相對為首設文官四品五品位于懸東六品以下于橫街之南每等異位重行西面北上武官四品五品位于懸西六品以下于橫街之南當文官每等異位重行東面北上設典儀位于懸之東北贊者二人在南少退俱西向奉禮設門外位文官于朝東堂每等異位重行西面武官于西朝堂每等異位重行東面皆北上其日依時刻諸衛勒所部列仗屯門及陳于殿庭如常儀羣官集朝堂俱就次各服公服吏部兵部贊羣官俱出次通事舍人各引就朝堂前位侍中版奏請中嚴鈒戟近仗入陳于殿庭太樂令帥工人入就位協律郎入就舉麾位諸侍衛之官各服其器服符寶郎奉寶俱詣閣奉迎典儀帥贊者入就位通事舍人引四品以下先入就位侍中版奏外辦有司承旨索扇皇帝辨服絳紗衣御輿以出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鍾之鐘右五鐘皆應協律郎跪俯伏舉麾鼓柷奏太和之樂皇帝出自西房即御坐南向坐符寶郎奉寶置于御坐如常儀協律郎偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止通事舍人引三品以上次入就位公初入門舒和之樂作凡公行皆作舒和之樂公至位樂止立定典儀曰再拜贊者承傳羣官在位者俱再拜訖典儀又曰再拜贊者承傳羣官在位者又再拜舍人引羣官北面位者以次出公初行樂作公出門樂止侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位有司承旨索扇皇帝興太僕令令撞㽔賔之鐘左五鐘皆應奏太和之樂皇帝降坐御輿入自東房侍衛警蹕如來儀侍臣從至閣樂止舍人引東西面位者以次出皇帝若御翼善冠則羣臣皆服袴褶不設樂懸去警蹕朝集使引見奉辭儀同前一日尚舍奉御預奏于所御殿設御坐如常儀其日依時刻所司量加隊仗陳列如式典儀于殿庭橫街之南北設版位如常儀其日朝集使夙興並集朝堂各服朝服京官文武九品以上並服袴褶諸侍奉官及京官文武官四品以下就位如式通事舍人引京官文武三品以上及朝集使俱就所御殿前門外序立以俟侍中進奏外辦皇帝常服即御坐南向侍衛如常儀通事舍人分引京官文武三品以上詣橫街南相對北面位立定典儀曰再拜羣官在位者皆再拜訖通事舍人各引就街北東西班序立又通事舍人分引朝集使入就北面位東方南方在東北方西方在西立定典儀曰再拜朝集使等俱再拜通事舍人承旨詣朝集使東北面立稱有制朝集使等皆再拜舍人宣敕訖又再拜答制預定行首一人跪奏舍人為奏聽進止若承恩慰問即舞蹈訖又再拜舍人宣敕訖侍中奏禮畢皇帝還宫如來儀侍臣退羣臣等以次退其朝集使奉辭皆準奉參之儀其京官但常參官列版位其朝集使三品以上引升殿賜食四品以下於廊下賜食並臨時奏聽進止大唐開元禮卷一百九
