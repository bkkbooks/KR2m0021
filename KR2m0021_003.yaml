body:
  text: 大唐開元禮卷三唐蕭嵩等撰序例下衣服齋戒祈禱雜制衣服凡大裘以黒羔皮為之冕無旒金飾玉簮導以組為纓色如其綬白紗中單革帶玉鈎䚢大帶鹿盧玉具劔火珠鏢首白玉雙佩𤣥組雙大綬六采朱韈赤舄祀天地神祇則服之衮冕垂白珠十二旒黈纊充耳玉簮導元衣纁裳十二章白紗中單革帶大帶劍玉佩綬韈與上同舄加金飾享廟謁廟及朝遣上將征還飲至踐阼加元服納后若元日受朝及臨軒册拜王公則服之鷩冕服七章餘同衮冕有事逺至則服之毳冕服五章餘同鷩冕祭海岳則服之絺冕服三章餘同毳冕祭社稷先農則服之𤣥冕服三章餘同絺冕蜡祭百神朝日夕月則服之通天冕加金博山附蟬十二首施珠翠黒介幘組纓翠緌玉犀簮導綘紗袍白紗中單白裙襦綘紗蔽膝白假帶方心曲領其革帶劍珮綬與上同白韈黒舄諸祭還及冬至受朝元旦朝㑹則服之武弁金附蟬平巾幘餘同前服講武出征四時蒐狩大射禡類宜社賞祖罰社纂嚴則服之弁服十有二􅋒玉簮導絳紗衣素裳革帶白玉雙珮鞶龍小綬白韈烏皮履朔日受朝則服之黒介幘白紗單衣白裙襦革帶素韈烏皮履拜陵則服之白紗㡌白裙襦白韈烏皮履視朝聽訟及宴見賔客則服之平巾幘金寳飾導簮冠支皆以玉紫褶白袴玉具装真珠寳鈿帶靴乗馬則服之翼善冠其常服及白練裙襦通著之若服袴褶則與平巾幘通著之皇后服首飾花十二樹小花如大花之數并兩博鬢褘衣素紗中單蔽膝大帶青衣革帶青襪舄白玉雙珮元組雙大綬受册助祭朝㑹諸大事則服之鞠衣黄羅為表其蔽膝大帶及衣革帶舄並隨衣色餘與褘衣同唯無翟親蠶則服之鈿釵禮衣十二鈿服通用雜色制與上同加以雙珮小綬去舄加履宴見賔客則服之皇太子衮冕垂珠通典亦作垂白珠九旒青纊充耳犀簮導元衣纁裳九章白紗中單革帶金鈎䚢大帶玉具劍瑜玉雙珮朱組雙大綬朱韈赤舄侍從祭祀及謁廟加元服納妃則服之具服逺遊三梁冠加金附蟬九首施珠翠黒介幘髮纓翠緌犀簮導綘紗袍白紗中單白裙襦白假帶方心曲領綘紗蔽膝其革帶劍珮與上同白韈黒舄未冠則雙童髻空頂黒介幘雙玉導加寳飾謁廟還宫元日冬至朔日入朝釋奠則服之其朔日入朝通服袴褶五日常朝亦准此公服逺遊冠簮導以上並同前綘紗單衣白裙襦革帶金鈎䚢假帶瑜玉雙珮方心紛鞶囊白韈烏皮履五日常朝元日冬至受朝則服之烏紗㡌白裙襦白韈烏皮履視事及宴見賔客則服之弁服犀簮導組纓玉􅋒九綘紗衣素裳革帶鞶囊小綬雙珮白韈烏皮履朔日及視事則兼服之平巾幘金飾犀簮導紫褶白袴玉梁珠鈿帶靴乗馬則服之進徳冠九􅋒加金飾其常服及白練裙襦通著之若服袴褶則與平巾幘通著之皇太子妃首飾花九樹小花如大花之數并兩博鬢䄖翟素紗中單蔽膝大帶青衣革帶青韈舄瑜玉雙珮純朱雙大綬受册助祭朝㑹諸大事則服之鞠衣黄羅為表其蔽膝大帶革帶並隨衣色餘與䄖衣同唯無翟從蠶則服之鈿釵禮衣九鈿服通用雜色制與上同加雙珮小綬去舄加履宴見賔客則服之羣官服衮冕垂青珠九旒以組為纓青纊充耳角簮導青衣纁裳服九章白紗中單革帶鈎䚢大帶金玉飾劍山𤣥玉珮緑綟綬朱韈赤舄第一品服之親王朱綬鷩冕八旒服七章水蒼玉珮紫綬金飾劍餘同衮冕第二品服之毳冕七旒服五章水蒼玉珮紫綬金飾劍餘同衮冕第三品服之絺冕六旒服三章水蒼玉珮青綬金飾劍餘同衮冕第四品服之元冕五旒衣無章裳刺黻一章水蒼玉珮黒綬金飾劍餘同衮冕第五品服之爵弁色同爵無旒無章元纓簮導青衣纁裳白紗中單革帶鈎䚢大帶爵韠韈赤履九品以上服之凡冕服及爵弁服助祭及親迎則服之若私家祭祀三品已上及褒聖侯祭孔宣父服𤣥冕五品已上服爵弁六品已下服進賢冠逺遊冠三梁黒幘青緌几文官皆青緌諸王服之親王即加金附蟬進賢冠三品已上三梁五品已上兩梁九品已上一梁三公太子三師三少五等爵尚書省秘書省諸寺監太子詹事府三寺及散官親王傅友文學若諸州縣關津岳瀆等流内九品已上服之武弁平巾幘武官及中書門下省殿中省内侍省諸衛及太子諸坊諸率府及鎮戌流内九品已上服之若侍中中書令左右散騎常侍則加貂蟬侍左者左珥侍右者右珥法冠一名獬豸冠一角為獬豸之形御史大夫已下監察御史已上服之髙山冠内侍省内謁者監内謁者服之却非冠亭長門僕服之凡應冠而未冠者並雙童髻空頂幘五品已上雙玉導金飾三品已上加寳飾六品已下無飾朝服亦名具服冠幘纓簮導絳紗單衣白紗中單白裙襦革帶鈎䚢假帶曲領方心絳紗蔽膝韈舄劍雙綬一品已下五品已上陪祭朝享拜表大事則服之六品已下去劍珮綬餘並同公服亦名從省服冠幘纓簮導絳紗單衣白裙襦赤裙衫革帶鈎䚢假帶方心韈履紛鞶囊雙珮一品已下五品已上朔望朝謁見東宫則服之其六品已下去紛鞶囊雙珮餘並同若致仕官以理去官被召謁見皆服前冠從省服弁服弁以鹿皮為之通用烏紗牙簮導五品以上通用犀纓玉􅋒朱衣素裳革帶鞶囊小綬雙珮白韈烏皮復一品九􅋒二品八􅋒三品七􅋒四品六􅋒五品五􅋒六品以下去􅋒及鞶囊綬珮文官職事九品已上㝷常公事服之泥雨則通著常服平巾幘簮導五品已上通用犀六品已下通用角冠支皆金飾五品已上通用玉紫褶五品已上緋褶七品已上緑褶九品已上碧褶並白大口袴起梁帶三品已上玉梁寳鈿五品已上金梁寳鈿六品已上金飾隠起烏皮靴武官及衛官尋常公事服之文官乗馬又通服之武官陪位大仗加騰蛇裲襠進德冠五品以上附山雲􅋒數准弁以金飾梁及花靴三品以上加金絡内外百官文武九品已上十月以後二月已前常服及白練裙襦通著之五品已上行六品已下冠去􅋒珠若服袴褶非陪位大仗則與平巾幘者通着袴褶五品已上通用細綾及羅六品已下服小綾凡典謁武弁綘公服學生黑介幘青襟服齋郎介幘綘褠服自外品子等皆平巾幘緋衫大口袴朝集從事則服之若外官拜表受制皆朝服凡職事官三品已上有公爵者嫡子婚聽假以四品冕服若五品以下子孫九品以上子及五等爵皆聽假以爵弁服若庻人婚聽假以綘公服若刻漏生漏童服青袴褶總角之服内外命婦花釵施兩博鬢寳鈿飾一品九樹二品八樹三品七樹四品六樹五品五樹寳鈿准花樹翟衣青質羅為之繡為翟編次於衣及裳一品翟九等二品八等三品七等四品六等五品五等並素紗中單蔽膝大帶以青衣革帶青韈舄珮綬内命婦受册從蠶朝㑹則服之其外命婦嫁及受册從蠶大朝㑹亦准此鈿釵一品九鈿二品八鈿三品七鈿四品六鈿五品五鈿禮衣通用雜色制與上同加雙珮小綬内命婦尋常叅見外命婦朝叅辭見及禮㑹則服之六尚寳林御女采女及女官等服禮衣通用雜色制與上同唯無首飾珮綬七品已上有大事則服之㝷常供奉則公服公服去中單蔽膝大帶九品已上大事及㝷常供奉並公服東宫准此女史則半袖裙襦凡公主王妃珮綬同諸郡縣主内命婦各准品服外命婦各從夫及子而加邑號者亦准此品花釵覆笄而已并兩博鬢装以金銀雜寳飾大袖連裳青質素紗中單蔽膝大帶以青革帶韈履六品已下九品已上妻及九品已上女嫁則服之花釵以金銀塗瑠璃等飾連裳青質以青衣革帶韈履庻人女嫁則服之凡百官女嫁聽服母服廟見本生䕃髙者准兄弟凡王公已下及婦人服飾等級上得兼下下不得僭上齋戒凡大祀齋官皆祀前七日平明集尚書省受誓戒其致齋日三公於都省安置所司鋪舍其餘官皇城内有本司者致齋於本司無本司者於太常郊社太廟齋坊安置皆日出前到齋所至祀前一日各從齋所晝漏上水三刻向祀所仍令平明清所行之路道次不得見諸凶穢縗絰過訖任行其哭泣之聲聞於祭所者權斷訖事凡大祀散齋四日致齋三日中祀散齋三日致齋二日小祀散齋二日致齋一日若散齋之日晝理事如舊夜宿止于家正寝不得弔喪問疾不判署刑殺文書不决罰罪人不作樂不預穢惡之事致齋唯祀事得行其餘悉斷非應散齋致齋者唯清齋一宿於本司及祠所凡散齋有大功已上喪致齋有周以上喪並聽赴即居緦麻已上喪者不得預宗廟之事其在齋坊病者聴還若死于齋所同房不得行事凡大祀中祀接神齋官前一日皆沐浴九品以上皆官給明衣齋郎升壇行事亦權給潔服凡齋官皆須行禮臨時闕者通攝行事致齋之日先不食公糧及無本司者太官准品給食其於本司致齋祀前一日赴祀所及祈告一日清齋者設食如之祈禱凡京都孟夏已後旱則祈岳鎮海瀆及諸山川能興雲雨者於北郊望而告之又祈社稷又祈宗廟每七日一祈不雨還從岳瀆如初旱甚則修雩秋分已後不雩初祈後一旬不雨即徙市禁屠殺斷繖扇造土龍雨足則報祀祈用酒脯醢報用常祀皆有司行事已齋未祈而雨及所經者皆報祀凡州縣旱則祈雨先社稷又祈界内山川能興雲雨者餘准京都例若岳鎮海瀆州則刺史上佐行事其餘山川判司行事縣則令丞行事祈用酒脯醢報以少牢凡霖雨不已禜京城諸門門别三日每日一禜不止乃祈山川岳鎮海瀆三日不止祈社稷宗廟若州縣禜城門祀界内山川及社稷三禜一祈皆准京都例並用酒脯醢國城門報用少牢州縣城門用特牲雜制皇帝天子夷夏通稱陛下對揚咫尺上表通稱之至尊臣下内外通稱之乗輿服御所稱車駕行幸所稱赴車駕所曰赴行在所皇太子以下率土之内於皇帝皆稱臣皇后以下率土之内於皇帝太皇太后皆稱妾六宫以下率土婦人於皇后同稱妾百官上疏於太皇太后皇太后皇后稱殿下自稱皆曰臣百官及東宫官對皇太子皆曰殿下百官自稱名宫官自稱臣凡京文武官一品以下九品以上朔望日朝五品以上及供奉官員外郎監察御史每日叅昭文崇文國子生及諸縣令每季叅若雨霑服失容及泥濘並停凡車駕巡幸每月朔兩京文武官職事五品以上表叅起居州界去行所在三百里内者刺史遣使起居若車駕從比州及州境過刺史朝見巡幸還去京三百里内刺史遣使起居皇太子欲行未發前一日在京文武官職事五品以上詣宫奉辭還日明朝詣宫奉叅凡京文武職事五品已上假使者去皆奉辭還皆奉見六品以下奉勅差使亦如之凡踐祚加元服册皇后皇太子及元日并巡狩親征封禪拜郊及諸大禮諸州刺史都督及京官五品以上在外者並奉表疏賀禮部為奏每年二時遣三公分行諸陵太常卿為副太陽虧有司預奏其日置五鼓五兵于太社皇帝不視事凡百官各守本司不理務過時乃罷月蝕則擊鼓于所司救之五岳四瀆崩竭皇帝本服大功已上親及外祖父母皇后父母百官一品喪皇帝皆不視事三日國忌日皇帝本服小功緦麻親百官五品以上喪皇帝皆不視事一日祥瑞依圖書合大瑞者隨列表奏百官詣闕上表奉賀告廟攽下自外諸瑞並申所司元日以聞凡版位皇帝位方一尺二寸厚三寸題云皇帝位皇太子方九寸厚二寸題云皇太子位百官一品已下方七寸厚一寸半題云某品位凡藉田所收九榖納於神倉以擬粢盛及五齊三酒有餘藳秸供飼犧牲凡大祀養牲在滌九旬中祀三旬小祀一旬其牲方色難備者任以純色代之大小依禮告祈之牲不養凡祭祀犧牲不得捶扑損傷死則埋之有瘡病者與替凡祭器祭服有破敝不任滌理者與替訖器則埋之服則燒之凡祭天神皆焚柴祭地祇皆瘞埋祭山皆庋懸祭川皆沉浮皆以祀祭訖乃焚埋之若埋訖皆令所在官司差人守當六十日止若埋幣者以火稍焚破者則不守凡祭事訖均胙肉則貴者不重賤者不虚謂貴者取貴骨賤者取賤骨前貴于後上貴于下凡天地郊祀及太廟祝版欲至享祭日所司准程預進版取署令人送徃若臨時卒急並令附驛其版仍令預支一年所用數若署版以後祭官有故即削除題所替行事人凡五陵皆朔望上食歳冬至寒食日各設一日祭如節祭共朔望日忌日相逢依節祭料若橋陵除此日外每日進半口羊食凡圜丘五郊諸壇等差側近人等守當凡王公已下郊廟合祭若臨時遇雨霑服失容即以常服從事若已行事遇雨即不脱祭服凡立春前兩京及諸州縣門外並造土牛耕人各隨方色凡季冬晦行儺大内六隊東宫二隊凡文武官三品已下拜正一品東宫官拜三師四品已下拜三少自餘内外屬官於本司四品拜二品五品拜三品六品拜四品七品拜五品八品拜六品九品拜七品衛判曹拜長史局署丞拜令助教拜博士諸州别駕長史鎮將縣令拜刺史縣丞拜縣令其准品應致敬而非相統屬則不拜凡致敬者若非連屬應敬之官相見或貴賤懸隔或有長㓜親戚者任隨私禮凡文武官二品已上祠四廟五品已上祠三廟三品已上不須兼爵四廟外有始封祖者通祠五廟牲皆用少牢六品已下逹於庻人祭祖禰于正寝用特牲縱祖父官有髙下皆用子孫牲凡行路巷街賤避貴少避老輕避重去避來凡百官身亡者三品已上稱薨五品已上稱卒六品以下逹于庻人稱死凡百官𦵏墓田一品方九十步墳髙一丈八尺二品方八十歩墳髙一丈六尺三品方七十步墳髙一丈四尺四品方六十步墳髙一丈二尺五品方五十步墳髙一丈六品已下方二十步墳不得過八尺其域及四隅四品已上築闕五品已上立土堠餘皆封塋而已凡立碑五品已上螭首龜趺髙不得過九尺七品已上立碣圭首方趺上髙四尺其石獸等三品已上六事五品已上四事凡四品已上用方相七品已上用魌頭五品已上纛竿九尺六品已下長五尺凡明器三品已上不得過九十事五品已上六十事九品已上四十事四神駞馬及人不得過一尺餘音樂鹵簿等不過七寸三品已上帳髙六尺方五尺女子等不過三十人長八寸園宅方五尺奴婢等不過二十人長四寸五品已上帳髙五尺五寸方四尺五寸音樂僕從二十五人長七寸五分園宅方四尺奴婢等十六人長三寸六品已下帳髙五尺方四尺音樂僕從二十人長七寸園宅方三尺奴婢十二人長二寸若三品已上優厚料則有三果帳蚊幬帳婦人洗梳帳並准此凡斬衰三年齊衰三年者並解官齊衰杖周及為人後者為其父母若庶子為其母亦解官申其心喪皆為生已者若嫡繼慈改嫁或歸宗三年已上斷絶者及父為長子夫為妻並不解官假同齊衰周凡齊衰周給假三十日𦵏五日除服三日齊衰三月五月大功九月並給二十日𦵏三日除服二日小功五月給假十五日𦵏二日除服一日緦麻三月給假七日出降者三日𦵏及除服各一日無服之殤本品周已上給假五日大功三日小功二日緦麻一日若聞喪舉哀其假三分減一師經受業者喪給假三日冠給假三日婚給假九日除程周親婚給假五日大功三日小功一日周已下百里内除程凡私忌日給假一日忌前之夕聽還凡内外官三年一給定省假三十日五年一給拜墓假十五日並除程凡遭喪被起者以服内忌日給假三日大小祥各七日􅎭五日每月朔望各一日祥禫給程凡私家祔廟給五日四時祭給四日大唐開元禮卷三
