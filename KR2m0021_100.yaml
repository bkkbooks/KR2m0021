body:
  text: 大唐開元禮卷一百唐蕭嵩等撰嘉禮皇帝於明堂讀孟夏令皇帝於明堂讀仲夏令皇帝於明堂讀季夏令皇帝於明堂讀孟夏令禮部尚書先讀令三日奏讀月令承以宣告前三日尚舍施大次於朱雀門外道東西向尚舍奉御設御坐守宫設文武侍臣次于大次之後文官在左武官在右俱西向設羣官次於壁水南門之外文官在東武官在西俱北上前一日尚舍奉御設御幄坐於明堂左個近北南向守宫設三品以上及諸司長官坐于堂上文官于御坐東南西向武官于御坐西南東向俱重行北上無長官者次官一人升判官不合設刑部郎中讀令坐于御坐西南東向有案設文官解劔席于辰陛之左設武官解劔席于午陛之右皆內向太樂令展宫懸於明堂左個之庭設舉麾位於堂上已陛之西東向一位於樂懸東南西向典儀設三品以上及應升坐者位於懸南文左武右俱重行北向相對為首設非升坐者位文官四品五品於縣東六品以下於其南絶位俱西向武官四品五品於懸西六品以下於其南當文官俱東向皆重行北上設典儀位於懸之東北贊者二人在南差退俱西向奉禮設門外位各於次前俱每等異位重行相向北上鑾駕出宫出宫前三日夲司宣攝內外各供其職守宫設從駕之官五品以上次於承天門東西朝堂如常前二日太樂令設宫懸之樂於殿庭如常儀其日未明七刻捶一鼓為一嚴三嚴時節前一日侍中奏裁侍中奏開宫殿門及城門未明五刻捶二鼓為再嚴侍中版奏請中嚴奉禮設從駕羣官五品以上位文官於東朝堂之前西向武官於西朝堂之前東向俱重行北上從駕羣官五品以上俱集朝堂次各服其服其六品以下並駕發之前預赴明堂所俱就次各服其服所司陳小駕鹵簿未明二刻捶三鼓為三嚴諸衛之屬各督其隊與鈒㦸以次入陳于殿庭舍人引從駕羣官各就朝堂前位諸侍衛之官各服其器服侍中中書令以下俱詣西上閣奉迎侍中負寶如式乘黃令進金輅於西上閣外南向千牛將軍一人執長刀立于輅前北向黃門侍郎一人在侍臣之前贊者二人又在黃門之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝服通天冠絳紗袍佩赤玉御輿以出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鍾之鍾右五鐘皆應協律郎跪俯伏舉麾鼓柷奏太和之樂千牛將軍前執轡皇帝既升輅太僕卿立授綏侍中中書令以下夾侍如常黃門侍郎進當鑾駕前跪奏稱黃門侍郎臣某言請鑾駕進發俯伏興退復位凡黃門侍郎奏請皆進當鑾駕興前跪奏稱具官臣某言訖俯伏鑾駕動又稱警蹕黃門侍郎與贊者夾引以出千牛將軍夾輅而趍駕至太極門偃麾戛敔樂止出太極門鼓柷奏采茨之樂出嘉德門戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止至承天門外侍臣上馬所黃門侍郎奏請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黃麾內符寶郎奉六寶與殿中監後部從侍中中書令以下夾侍於輅前贊者在供奉官人內侍臣上馬畢黃門侍郎奏稱請敕車右升侍中前承制退稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕鼓傳音如常鼓吹振作而行其從駕之官在𤣥武隊後如常儀讀令其日依時刻諸衛勒所部屯門列仗及明堂左個之庭如常先至羣官俱集次各服其服駕將至通事舍人各引先至羣官俱就門外位駕至大次門外回輅西向千牛將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅御輿之大次繖扇華蓋侍衛警蹕如常儀通事舍人引文武五品以上從駕之官皆就門外位太樂令帥工人入就位協律郎入就舉麾位典儀帥贊者先入就位通事舍人引群官非升坐者入就位刑部郎中以月令置于案覆以帊令史二人俱絳公服對舉案立於武官五品西南郎中立于案後東面侍中版奏外辦皇帝降輿出次曲直華蓋侍衛警蹕如常儀入自朱雀門皇帝初入門太樂令令撞𬎼賔之鐘左五鐘皆應鼓柷奏太和之樂皇帝升自已陛入即御坐南向坐符寶郎奉寶置于御坐侍臣夾侍如常儀戛敔樂止典儀一人升立于左個東南西向通事舍人引公王以下入就北面位上公初入門舒和之樂作凡公行皆作舒和之樂公至位樂止羣官立定典儀曰再拜贊者承傳凡典儀有詞贊者皆承傳在位者皆再拜侍中前跪奏稱侍中臣某言請延公主等升俯伏興又侍中稱制曰可侍中詣左個東南西面稱制延公王等升堂上典儀承傳堂下贊者又承傳在位者皆再拜通事舍人次引北面位者各詣其陛公初行樂作至解劍席樂止公王以下俱升席跪解劍俯伏興脫舄通事舍人各引升立於坐後刑部郎中引案進立于午陛下侍中跪奏請讀月令俯伏興又侍中稱制曰可侍中退復位刑部郎中再拜就解劍席跪解劍俯伏興脫舄取令持案者仍立于下通事舍人引刑部郎中奉令升自午陛詣席西東向跪置令於案俯伏興立於席後堂上典儀唱就坐公王以下及刑部郎中並就坐俯伏興坐刑部郎中讀令每句一絶使言聲可了讀令訖堂上典儀唱可起公王以下皆起通事舍人引公王以下及刑部郎中俱降刑部郎中以令置于案與羣官俱跪佩劔俯伏興納舄通事舍人各引還本位公初行樂作至位樂止立定典儀曰再拜在位者皆再拜通事舍人引北面位者出公初行樂作出門樂止侍中跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞黃鐘之鐘右五鐘皆應太和之樂作皇帝降坐御輿以出之便次警蹕侍衛如來儀出門樂止通事舍人引東西面位者次出孟夏令孟夏之月日在畢昏翼中旦婺女中其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中中吕其數七其味苦其臭焦其祀竈螻蟈鳴蚯蚓出王瓜生苦菜秀食菽與雞其器髙以粗是月也以立夏先立夏七日禮部奏曰某日立夏盛德在火皇帝乃齊立夏之日皇帝親帥百官迎夏於南郊還反行賞命有司贊傑俊遂賢良舉長大行爵出祿必當其位是月也繼長增髙毋有壞隳毋起土功毋發大衆毋伐大樹命有司巡行縣鄙命農勉作毋休于都毋或失時是月也驅獸毋害五穀毋大田獵是月也命太常修鞞鼓均琴瑟管簫執干戚戈羽調竽笙篪簧飭鐘磬柷敔命有司為人所祀山川百源大雩上帝用盛樂以祈穀實農乃登麥皇帝乃以彘嘗麥先薦宗廟是月也聚蓄百藥靡草死麥秋至斷薄刑決小罪出輕繫蠶事畢命婦獻繭於后孟夏行秋令則苦雨數來五穀不滋四鄙入保行冬令則草木蚤枯後乃大水敗其城郭行春令則蝗蟲為災暴風來格秀草不實鑾駕還宫皇帝既還大次侍中版奏請解嚴將士不得輕離部伍皇帝停大次一刻頃捶一鼓為一嚴轉仗衛于還塗如來儀三刻頃捶二鼓為再嚴將士布隊仗侍中版奏請中嚴五刻頃捶三鼓為三嚴謁者贊引各引群官序立于次前文武侍臣詣大次奉迎乘黃令進金輅于大次門外北向千牛將軍立于輅右侍中版奏外辦太僕卿升執轡皇帝御輿出次繖扇侍衛警蹕如常儀皇帝升輅太僕卿立授綏黃門侍郎奏稱請鑾駕進發退復位鑾駕動稱警蹕如常儀黃門侍郎贊者夾引千牛將軍夾輅而趍至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承詔退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬畢黃門侍郎奏稱請敕車右升侍中稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕進發退復位鼓傳音鑾駕動鼓吹振作而還文武群臣皆從如來儀駕至承天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立於輅右訖鑾駕動千牛將軍夾輅而趨駕入嘉定門太樂令令撞㽔賓之鐘左五鐘皆應鼓柷奏采茨之樂至太極門戛敔樂止入太極門鼓柷奏太和之樂駕至橫街北當東上閣回輅南向侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅御輿以入繖扇侍衛警蹕如常儀侍臣從至閣戛敔樂止初文武羣臣至朝堂通事舍人承㫖敕羣臣並還皇帝既入侍中版奏請解嚴叩鉦將士各還其所皇帝於明堂讀仲夏令陳設尚舍奉御設御幄坐於明堂太廟設文官解劔席於已陛之左設武官解劔席於未陛之右太樂令展宫懸於明堂太廟之庭設舉麾位於堂上午陛之西餘並如孟春陳設之儀鑾駕出宫右並如孟夏出宫之儀讀令其日諸衛仗列於明堂太廟之庭皇帝升自午陛典儀一人升立於明堂太廟東南侍中詣明堂太廟東面稱制刑部郎中升自未陛餘並如孟夏讀令之儀仲夏令仲夏之月日在東井昏亢中旦危中其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中𬎼賓其數七其味苦其臭焦其祀竈小暑至螳螂生􅀈始鳴反舌無聲食菽與雞其器髙以粗養壯佼農乃登黍皇帝乃以雛嘗黍羞以含桃先薦宗廟令人毋艾藍以染毋燒灰毋暴布門閭毋閉挺重囚是月也日長至隂陽爭死生分君子齊戒處必掩身無躁止聲色毋或進薄滋味毋致和節嗜欲定心氣百官靜事無刑以定晏隂之所成鹿角解蟬始鳴半夏生木槿榮是月也毋用火南方可以居髙明可以逺眺望可以升山林可以處臺榭仲夏行冬令則電凍傷穀道路不通暴兵來至行春令則五穀晚熟百螣時起其國乃飢行秋令則草木零落果實早成人殃於疫鑾駕還宫右並如孟夏還宫之儀皇帝於明堂讀季夏令讀土令禮附陳設尚舍奉御設御幄坐於明堂右個設文官解劔席於午陛之左設武官解劔席於申陛之右太樂令展宫懸於明堂右個之庭設舉麾位於堂上未陛之西餘並如仲夏陳設之儀鑾駕出宫右並如仲夏出宫之儀讀令其日諸衛列仗於明堂右個之庭皇帝升自未陛典儀一人升立於明堂右個東南侍中詣明堂右個東南稱詔刑部郎中升自申陛餘並如仲夏讀令之儀季夏令季夏之月日在栁昏火中旦奎中其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中林鐘其數七其味苦其臭焦其祀竈溫風至蟋蟀居壁鷹乃學習腐草為螢食菽與雞其器髙以粗命漁師伐蛟取鼉登龜取黿命澤人納材葦是月也命太常合秩芻以養犧牲以供皇天上帝名山大川四方之神以祀宗廟社稷之靈以為人祈福是月也命染工染采黼黻文章必以法故無或差貸黑黃蒼赤莫不質良毋敢詐僞以給郊廟祭祀之服以為旗章以别貴賤等級之度是月也樹木方盛乃命虞人入山行木毋有斬伐不可以興土功不可以合牧守不可以起兵動衆毋舉大事以搖養氣舉大事則有天殃是月也土潤溽暑大雨時行燒剃行水利以殺草如以熱湯可以糞田疇可以美土疆季夏行春令則穀實鮮落國多風咳人乃遷徙行秋令則丘隰水潦禾稼不熟孕多女災行冬令則風寒不時鷹隼早鷙四鄙入保鑾駕還宫右並如仲夏還宫之儀季夏土王之日讀土令皇帝服黃紗袍佩黃玉居太廟太室餘行事皆如仲夏讀令之儀土令中央土其日戊巳其帝黃帝其神后土其蟲倮其音宫律中黃鐘之宫其數五其味甘其臭香其祀中霤食稷與牛其器圜以閎大唐開元禮卷一百
