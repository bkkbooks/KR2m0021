body:
  text: 大唐開元禮卷二十一唐蕭嵩等撰吉禮立冬祀黑帝於北郊有司攝事齋戒陳設省牲器奠玉帛進熟齋戒前祀七日平明太尉誓百官於尚書省曰某月某日祀黑帝於北郊各揚其職不供其事國有常刑凡預祀之官散齋四日致齋三日散齋各於正寢致齋二日於本司一日於祀所其無本司者皆於祀所致齋理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋惟祀事得行其餘悉斷其祀官已齊而闕者通攝行事光祿卿監取明水火太官令取水於隂鑒取火於陽燧火以供爨水以實樽前祀一日諸衛令其屬未後一刻各以其方器服守衛壝門與太樂工人俱清齋一宿陳設前祀三日衛尉設祀官公卿以下次於東壝之外道南北向西上陳設饌㡢於內壝東門之外道南北向前祀二日太樂令設宫懸之樂於壇南內壝之內東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹雷鼓於北懸之間道之左右植建鼓於四隅置柷敔於懸內柷在左敔在右設歌鐘歌磬於壇上近南北向磬簴在西鐘簴在東其匏竹者立於壇下重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上右校掃除壇之內外郊社令積柴於燎壇其壇於神壇之左內壝之外方一丈高一丈二尺開上南出户方六尺前祀一日奉禮設祀官公卿位於內壝東門之內道北執事位於道南每等異位俱重行西向北上設望燎位當柴壇之北南向設御史位於壇上正位於東南隅西向副位於西南隅東向令史各陪其後於壇下設奉禮位於樂懸東北贊者二人在南差退俱西向又設奉禮贊者位於燎壇東北西向皆北上設協律郎位於壇上南陛之西東向設太樂令位於北懸之間當壇北向設祀官公卿以下門外位皆於東壝之外道南每等異位重行北向西上設牲榜於東壝之外當門西向配帝牲榜少退南上設廩犧令位於牲西南史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北南向設黑帝酒樽於壇之上下太尊二著尊二犧尊二山罍二在壇上於東南隅北向象尊二壺尊二山罍二在壇下南陛之東北向俱西上設配帝著尊二犧尊二象尊二山罍二在壇上於黑帝酒樽之東北向西上辰星三辰玄冥俱象尊二各設於神坐之左皆右向七宿壺尊二設於神坐之右而左向黑帝配帝之尊置於坫星辰以下之尊俱藉以席皆加勺羃設爵於尊下設洗於壇南陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵設星辰以下罍洗篚幂各於其方陛道之左俱內向執樽罍篚羃者各於樽罍篚羃之後各設玉幣之篚於壇之上下樽坫之所祀日未明五刻太史令郊社令升設黑帝叶光紀神坐於壇上北方南向席以藳秸設帝顓頊氏神坐於東方西向席以莞設辰星三辰之坐於壇之東北七宿之坐於壇之西北各於其壇下南向相對為首設玄冥氏之坐於壇之東南西向席皆以莞設神位各於其坐首省牲器省牲之日午後十刻去壇二百步所諸衛之屬禁斷行人晡後二刻諸行事之官各服常服郊社令帥府史二人及齋郎以樽坫罍洗篚羃入設於位晡後三刻諸太祝與廩犧令以牲就榜位謁者引太常卿贊引引御史詣壇東陛升視濯溉於上於視濯執樽者皆舉冪告潔訖引太常卿降復位謁者進太尉之左白請就門外位謁者贊引各引祀官以下就門外位謁者引太常卿就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各循牲一匝西面舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官謁者引光祿卿詣厨省鼎鑊申視濯溉謁者贊引各引祀官御史就厨省饌具訖俱還齋所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各帥其屬入實樽罍玉幣凡六尊之次太尊為上實以泛齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝著尊為上實以泛齊犧尊次之實以醴齊象尊次之實以盎齊山罍為下實以清酒其辰星玄冥之尊俱實以醍齊七宿之壺尊實以沈齊玄酒各實於五齊之尊禮神之玉以玄璜幣用玄太官令帥進饌者實諸籩豆簠簋入設於內壝東門之外饌幔內未明二刻奉禮帥贊者先入就位贊引引御史博士諸太祝及令史祝史與執樽罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執尊罍篚幂者各就位贊引引御史諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖各引就位未明一刻太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸南道西謁者引司空入行掃除初司空入謁者引祀官贊引引執事者俱就壝外位司空行掃除訖謁者贊引各引祀官次入就位立定奉禮曰衆官再拜衆官皆再拜其先拜者不拜謁者進太尉之左白有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物既奠訖俯伏而後興鼓柷奏羽音乃以黃鐘之均文舞之舞樂舞六成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止奉禮曰衆官再拜衆官皆再拜上下諸祝俱取玉幣於篚各立於樽所謁者引太尉詣南陛升壇北向立太祝加玉於幣東向授太尉太尉受玉幣登歌作肅和之樂乃以大吕之均謁者引太尉進北面跪奠於黑帝叶光紀神坐前興謁者引太尉少退北向再拜訖謁者引太尉立於西方東向又太祝奉幣北向授太尉太尉受幣謁者引太尉進東面跪奠於帝顓頊氏神坐興謁者引太尉少退東向再拜訖登歌止謁者引太尉降自南陛還本位初太尉奠配帝之幣星辰以下諸祝各以幣進奠於神坐前還樽所初衆官拜訖祝史各奉毛血之豆立於門外登歌止祝史奉毛血入各由其陛升諸太祝迎取於壇上俱進奠於神坐前諸太祝與祝史退立於樽所進熟太尉既升奠玉幣太官令帥進饌者奉饌陳於內壝門外謁者引司徒出詣饌所司徒奉黑帝之俎諸太祝既奠毛血太官令引饌入俎初入門雍和之樂作以黃鐘之均饌至陛樂止祝史俱進徹毛血之豆降自東陛以出黑帝之饌升自南陛配帝之饌升自東陛諸太祝迎引於壇上各設於神坐前籩豆蓋羃先徹乃升簠簋既奠却其蓋於下設訖謁者引司徒太官令帥進饌者俱自東陛以出司徒復位諸太祝各還樽所又進設星辰以下饌相次而畢謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉升自南陛詣黑帝酒尊所執尊者舉羃太尉酌泛齊訖樂作謁者引太尉進黑帝叶光紀神坐前北向跪奠爵興謁者引太尉少退北向立樂止太祝持版進於神坐之右東向跪讀祝文曰維某年嵗次月朔日子嗣天子臣某謹遣太尉封臣名敢昭告於黑帝叶光紀玄英式序庶類安寧資此積藏祇率恆禮敬以玉帛犧齊粢盛庶品肅恭燔祀順茲誠德帝顓頊氏配神作主尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版於神座還尊所太尉拜訖樂止謁者引太尉詣配帝酒尊所取爵於坫執尊者舉羃太尉酌泛齊訖樂作謁者引太尉進帝顓頊氏神坐前東向跪奠爵興謁者引太尉少退東向立樂止太祝持版進於神坐之左北面跪讀祝文曰維某年嵗次月朔日子嗣開元神武皇帝臣某謹遣太尉臣名敢昭告於帝顓頊氏時惟立冬水德在馭用致禋燎於黑帝叶光紀惟帝道合乾元允茲升配謹以制幣犧齊粢盛庶品式陳明薦作主侑神尚饗訖興太尉再拜初讀祝文訖樂作太祝進奠版於神坐還尊所太尉拜訖樂止謁者引太尉進黑帝神坐前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒啐酒奠爵興太祝各帥齋郎進俎太祝減神前胙肉加於俎以胙肉共置一俎上太祝持俎東向授太尉太尉受以授齋郎太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止初太尉獻將畢謁者引太常卿詣罍洗盥手洗匏爵訖謁者引太常卿自東陛升壇詣黑帝著尊所執尊者舉羃太常卿酌醴齊訖武舞作謁者引太常卿進黑帝叶光紀神坐前北向跪奠爵興謁者引太常卿少退北向再拜謁者引太常卿詣配帝犧尊所取爵於坫執尊者舉幂太常卿酌醴齊訖謁者引太常卿進帝顓頊氏神坐前東向跪奠爵興謁者引太常卿少退東向再拜訖謁者引太常卿進黑帝神坐前北向立太祝各以爵酌罍福酒合置一爵一太祝持爵進太常卿之右西向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太常卿興再拜謁者引太常卿降復位初太常卿獻將畢謁者引光祿卿詣罍洗盥手洗匏爵升酌盎齊終獻如亞獻之儀訖謁者引光祿卿降復位初太常卿將升獻贊引三人各引獻官以次詣罍洗盥手洗爵一獻辰星三辰一獻玄冥一獻七宿各詣酒尊所俱酌酒進奠於坐首餘坐皆祝史助奠相次而畢贊引各引獻官還本位武舞六成樂止舞獻俱畢上下諸祝各進徹豆還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官皆再拜已飲福受胙者不拜樂作奉禮曰衆官再拜衆官皆再拜樂一成止謁者進太尉之左白請就望燎位謁者引太尉就望燎位南向立於衆官將拜上下諸祝各執篚進神坐前取玉帛祝版齋郎以俎載牲體黍稷飯及爵酒各自其陛降壇南行經懸內當柴壇南東行自南陛登柴壇以玉帛祝版饌物置於柴上户內諸祝又以星辰以下之禮幣皆從燎奉禮曰可燎東西面各六人以炬燎火半柴謁者進太尉之左白禮畢謁者引太尉出又謁者贊引各引祀官以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出大唐開元禮卷二十一
