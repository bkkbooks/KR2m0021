body:
  text: 大唐開元禮卷八唐蕭嵩等撰吉禮皇帝孟夏雩祀于圜丘齊戒陳設省牲器鑾駕出宫奠玉帛進熟鑾駕還宫齊戒將祀有司卜日如别儀前祀七日平明太尉誓百官于尚書省曰某月某日雩祀昊天上帝于圜丘各揚其職不供其事國有常刑皇帝散齊四日致齊三日如冬至之儀凡預祀之官散齊四日致齊三日散齊正寢致齊二日于本司一日于祀所其無本司者皆于祀所近侍之官應從升者及從祀之羣官諸方各使于本司及公館清齊一宿無本司者各于正寢散齊理事如舊唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊唯祀事得行其餘悉斷其祀官已齊而闕者通攝行事光祿卿監取明水火太官令取水于隂鑒取火于陽燧火以供爨水以注𤣥酒之尊前祀二日太尉告太宗文武聖皇帝廟如常告之儀告以配神作主之意前祀一日諸衛令其屬未後一刻各以其方器服守衛壝門與太樂工人俱清齊一宿陳設前祀三日尚舍直長施大次于外壝東門之內道北南向尚舍奉御鋪御座衛尉陳饌幔于內壝東門之外道南北向設文武侍臣次于大次之後又設祀官及從祀羣官諸州使人蕃客等次如式前祀二日太樂令設宫懸之樂于壇南內壝之內設歌鐘歌磬右校掃除壇之內外郊社令積柴于燎壇其壇于神壇之左內壝之外方一丈髙一丈二尺開上南出户方六尺前祀一日奉禮設御位及望燎位祀官及從祀羣官諸州使人諸蕃客等位並于壝內皆如圜丘之儀設牲榜于東壝之外當門西向蒼牲一居前青牲一少退又青牲二赤牲二黃牲二白牲二𤣥牲二皆南上設廩犧令位于牲西南史陪其後俱北面設諸太祝位于牲東各當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北南向設天帝酒尊于壇之上下天帝太樽二著尊二犧尊二山罍二在壇上於東南隅北向象尊二壺尊二山罍二在壇下南階之東北向俱西上設配帝著尊二犧尊二象尊二山罍二在壇上於天帝酒尊之東北西向上五方帝各太樽二犧尊二山罍一在第一等五帝各犧尊二在第二等五官各象尊二在壇下皆于神坐之左而右向尊皆加勺羃五帝已上之尊皆有坫以置五官之尊俱藉以席置爵于尊下設御洗于壇南陛東南亞獻之洗又于東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設五官罍洗篚羃于酒尊之西俱北向執尊罍篚羃者各于尊罍篚羃之後各設玉幣之篚於壇之上下尊坫之所祀日未明五刻太史令郊社令升設昊天上帝神坐于壇上之中央南向席以藁秸設太宗文武聖皇帝神坐于東方西向席以莞設五方帝之坐于第一等青帝于東陛之北赤帝于南陛之東黃帝于南陛之西白帝于西陛之南黑帝于北陛之西皆莞席以藁秸又設五帝之坐于第二等如五方帝之陛位又設五官之坐於壇下之東南西向北上皆席以莞設神位各於坐首省牲器省牲之日午後十刻去壇二百步所諸衛之屬禁斷行人晡後二刻郊社令丞帥府史三人及齊郎以尊坫罍洗篚羃入設于位晡後三刻諸太祝與廩犧令以牲就榜位謁者引太常卿贊引引御史入詣壇東陛升視滌濯凡導引者每曲一逡巡于視濯執尊者皆舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位諸太祝各巡牲一匝西面舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官令謁者引光祿卿詣厨省鼎鑊申視濯溉贊引引御史詣厨省饌具祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲鑾駕出宫如圜丘之儀奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各帥其屬入實尊罍玉幣凡六尊之次大尊為上實以泛齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝著尊為上實以泛齊犧尊次之實以醴齊象尊次之實以盎齊山罍為下實以清酒五方帝之太尊實以泛齊犧尊實以醴齊山罍實以盎齊五帝之犧尊實以醴齊五官之象尊實以沈齊元酒皆實于五帝之上尊禮神之玉昊天上帝以四圭有邸青帝以青圭赤帝以赤璋黃帝以黃琮白帝以騶虞黑帝以𤣥璜天帝配帝之幣皆以蒼五方帝五帝各於其方色凡幣皆長一丈有八尺太官令帥進饌者實諸籩豆簋簠入設于內壝門東之外饌幔內未明二刻奉禮帥贊者先入就位贊引引御史博士詣太祝及令史祝史與執尊罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執尊罍篚羃者各就位贊引引御史諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖皆就位駕將至謁者贊引各引祀官通事舍人分引從祀羣官諸方客使先至者俱就門外位駕至大次門外回輅南向將軍降立於輅左侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次通事舍人引文武五品以上從祀之官皆就壝外位奉禮郎帥贊者先入就位贊引御史以下入就位太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸南道西謁者引司空入行掃除訖出復位皇帝停大次半刻頃通事舍人各引從祀文武羣官介公酅公諸方客使皆先入就位太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝服衮冕出次華蓋侍衛如常儀侍中負寶陪從如式博士引太常卿太常卿引皇帝凡太常前導皆博士先引至內壝門外殿中鹽進大圭尚衣奉御又以鎮圭授殿中監殿中監受進皇帝搢大圭執鎮圭華蓋仗衛停于門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常皇帝至版位西向立每立定太常卿與博士退立于左謁者贊引各引祀官次入就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者跪俯伏而取以興奠物則奠訖俯伏而後興鼓柷奏豫和之樂乃以黃鐘之均作文舞之舞樂舞六成偃麾戛敔樂止凡樂皆協律郎舉麾鼓柷而後作偃麾戛敔而後止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣壇升自南陛侍中中書令以下及左右侍衛量人從升以下皆如之皇帝升壇北向立樂止太祝加玉於幣以授侍中侍中奉玉帛東向進皇帝搢鎮圭受玉帛凡受物皆搢鎮圭奠訖執圭俯伏興登歌作肅和之樂乃以大吕之均太常卿引皇帝進北面跪奠于昊天上帝神坐俯伏興太常卿引皇帝立于南方北向皇帝再拜訖太祝又以配帝之幣授侍中侍中奉幣北向進皇帝進東向跪奠于太宗神坐前俯伏興太常卿引皇帝立于西方東向再拜訖登歌止初皇帝將奠配帝之幣五方帝之太祝皆取玉幣于篚各進奠于其神坐前五帝之獻官次取幣先奠于太昊氏神坐前餘坐齊郎助奠訖五官之獻官亦取幣先奠于勾芒氏神坐前餘坐祝史助奠訖獻官各復本位于登歌止太常卿引皇帝降自南陛還版位西向立初羣官拜訖祝史皆奉毛血之豆立于門外于登歌止祝史奉毛血之豆各由其陛升諸太祝迎取于壇上俱進奠于神坐前諸太祝與祝史退立于尊所進熟皇帝既升奠玉幣太官令出帥進饌者奉饌陳于內壝門外謁者引司徒出詣饌所司徒奉天帝之俎皇帝既至位樂止太官令引饌入俎初入門雍和之樂作以黃鐘之均饌至陛樂止祝史俱進徹毛血之豆降自東陛以出天帝之饌升自南陛配帝之饌升自東陛五方帝五帝之饌各由其陛升諸太祝迎引於壇上各進奠於神坐前籩豆蓋幕先徹乃升簠簋既奠皆却其蓋於下謁者引司徒太官令帥進饌者降自東陛以出司徒復位諸太祝各還尊所又進設五官之饌相次而畢初壇上設饌訖太常卿引皇帝詣罍洗樂作皇帝至位樂止侍中跪取匜興沃水又侍中跪取盤興承水皇帝盥手黃門侍郎跪取巾於篚興進皇帝帨手訖黃門侍郎受巾跪奠於篚黃門侍郎又取匏爵于篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黃門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤匜黃門侍郎受巾奠于篚皆如常太常卿引皇帝樂作皇帝詣壇升自南陛樂止謁者引司徒升自東陛立於尊前齊郎奉俎從升立于司徒之後太常卿引皇帝詣天帝酒尊所執尊者舉羃侍中贊配泛齊訖壽和之樂作皇帝每酌獻及飲福皆作壽和之樂太常卿引皇帝進昊天上帝神坐前北向跪奠爵俯伏興太常卿引皇帝立於南方北向樂止太祝持版進于神座之右西向跪讀祝文曰維某年歲次月朔日子嗣天子臣某敢昭告于昊天上帝爰兹孟夏龍見紀辰方資長育式遵常禮敬以玉帛犧齊粢盛庶品恭致燔祀表其寅肅皇曽祖考太宗文武聖皇帝配神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版于神座興還尊所皇帝拜訖樂止太常卿引皇帝詣配帝酒尊所執尊者舉羃侍中取爵于坫進皇帝受爵侍中贊酌泛齊訖樂作太常卿引皇帝進太宗神坐前東向跪奠爵俯伏興太常卿引皇帝立於西方東向五方帝之太祝各詣尊酌泛齊俱進奠於其神坐前訖樂止太祝持版進於神座之左北面跪讀祝文曰維某年歲次月朔日子孝曾孫開元神武皇帝臣某敢昭告于曽祖考太宗文武聖皇帝時惟正陽式遵恆典用致禋祀于昊天上帝伏惟道叶乾元德施品物永言配命對越昭升謹以制幣犧齊粢盛庶品致其明薦作主配神尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版於神座興還尊所皇帝拜訖樂止太常卿引皇帝南方北向立樂作諸太祝各以爵酌上尊福酒合置一爵一太祝持爵授侍中侍中受爵西向進皇帝再拜受爵跪祭酒啐酒奠爵俯伏興太祝各帥齊郎進俎太祝减神前胙肉加之於俎以胙肉共置一俎上一太祝持俎以授司徒司徒奉俎西向進皇帝受以授左右謁者引司徒降還位皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫皇帝俯伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止皇帝獻將畢謁者引太尉詣罍洗盥手洗匏爵訖謁者引太尉自東陛升壇詣天帝著尊所執尊者舉羃太尉酌醴齊武舞作謁者引太尉進昊天上帝神坐前北向跪奠爵興謁者引太尉立於南方北向再拜訖謁者引太尉詣配帝酒尊所取爵于坫執尊者舉羃太尉酌醴齊謁者引太尉進太宗神座前東向跪奠爵興謁者引太尉立於西方東向再拜訖五方帝之太祝亦各酌醴齊俱奠於其神坐前訖還尊所謁者引太尉進天帝神座前北向立諸太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位初太尉獻將畢謁者引光祿卿詣罍洗盥手洗匏爵升酌盎齊獻正坐配坐及五方帝之坐終獻如亞獻之儀訖謁者引光祿卿降復位初太尉將升獻贊引引五帝之獻官詣罍盥手洗爵酌醴齊進奠于太昊氏神座前餘坐皆齊郎助奠訖還本位五帝獻將畢五獻官詣罍洗爵酌醴齊進奠于勾芒氏神坐前餘坐皆祝史助奠訖獻官還本位武舞六成樂止舞獻俱畢上下諸祝各進徹豆還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜豫和之樂作太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作皇帝就望燎位南向立樂止於羣官將拜諸祝各執篚進神座前取玉帛祝版齊郎以俎載牲體稷黍飯爵酒各由其陛降壇南行經懸內當柴壇南東行自南陛登柴壇以玉幣祝版饌物置於柴上户內諸祝又以五官之禮幣皆從燎奉禮曰可燎東西面各六人以炬燎火半柴太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出內壝門殿中監前受鎮圭以授尚衣奉御殿中監又前受大圭華蓋侍衛如常儀皇帝入次樂止謁者贊引各引祀官及從祀羣官諸方客使以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出鑾駕還宫如圜丘之儀大唐門元禮卷八
