body:
  text: 大唐開元禮卷九十九唐蕭嵩等撰嘉禮皇帝於明堂讀孟春令皇帝於明堂讀仲春令皇帝於明堂讀季春令皇帝於明堂讀孟春令陳設禮部尚書先讀令三日奏讀月令承以宣告前三日尚舍直長施大次於東門外道北南向尚舍奉御設御座守宫設文武侍臣次於大次之後文官在左武官在右俱南向設羣官次於壁水東門之外文官在北武官在南俱西上前一日尚舍奉御設御幄座於青陽左个近西東向守宫設三品以上及諸司長官坐於青陽堂上文官於御座東北南向武官於御座東南北向俱重行西上無長官者次官一人升判官不合設刑部郎中讀令坐於御座東南北向有案設文官解劔席於丑陛之左設武官解劔席於卯階之右皆内向太樂令展宫懸於青陽左个之庭設舉麾位於堂上寅陛之南北向一位於樂懸東北南向典儀設三品以上及應升坐者位於懸東文左武右俱重行西向相對為首設非升坐者位文官四品五品於懸北六品以下於其東絶位俱南向武官四品五品於懸南六品以下於其東當文官俱北向皆重行西上設典儀位於懸之西北贊者二人在東差退俱南向奉禮設門外位各於次前俱每等異位重行相向西上鑾駕出宫前出宫三日本司宣攝内外各供其職守宫設從駕之官五品以上次於承天門外東西朝堂如常前二日太樂令設宫懸之樂於殿庭如常儀其日未明七刻搥一鼓為一嚴三嚴時節前一日侍中奏裁侍中奏開宫殿門及城門未明五刻搥二鼓為再嚴侍中版奏請中嚴奉禮設從駕羣官五品以上位文官於東朝堂之前西向武官於西朝堂之前東向俱重行北上從駕羣官五品以上俱集朝堂次各服其服其六品以下並駕發之前預赴明堂所俱就次各服其服所司陳小駕鹵簿未明二刻搥三皷為三嚴諸衞之屬各督其隊與鈒㦸以次入陳于殿庭謁者引從駕群官各就朝堂前位諸衞之官各服其器服侍中中書令以下俱詣西閤奉迎侍中負璽如式乘黄令進金輅于西閤外南向千牛將軍一人執長刀立於輅前北向黄門侍郎一人在侍臣之前賛者二人又在黄門之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝服通天冠青紗袍佩蒼玉御輦以出曲直華盖警蹕侍衞如常儀皇帝將出仗動太樂令令撞黄鐘之鐘右五鐘皆應協律郎跪俛伏興舉麾鼓柷奏太和之樂千牛將軍前執轡皇帝升輅太僕卿立授綏侍中中書令以下夾侍如常黄門侍郎進當鑾駕前跪奏稱黄門侍郎臣某言請鑾駕發引俛伏興退復位凡黄門侍郎奏請皆進當鑾駕前跪奏稱具官某言俛伏興鑾駕動又稱警蹕黄門侍郎與賛者夾引以出千牛將軍夾輅而趍駕至太極門偃麾戛敔樂止出太極門鼔柷奏采茨之樂出嘉德門戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止至承天門外侍臣上馬所黄門侍郎奏請鑾駕權停勅侍臣上馬侍中前承詔退稱制曰可黄門侍郎退稱侍臣上馬賛者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黄麾内符寳郎奉六寳與殿中監後部從侍中中書令以下夾侍於輅前賛者在供奉官人内侍臣上馬畢黄門侍郎奏稱請勅車右升侍中前承制退稱制曰可黄門侍郎退復位千牛將軍升訖黄門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕皷傳音如常皷吹振作而行其従駕之官在𤣥武隊後如常儀讀令其日依時刻諸衛勒所部屯門列仗及青陽左个之庭如常先至羣官俱集次各服其服駕将至典謁各引先至羣官俱就門外位駕至大次門外迴輅南向千牛將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興還侍位皇帝降輅御輿之大次繖扇華盖侍衛警蹕如常儀通事舎人引文武五品以上従駕之官皆就門外位太樂令帥工人入就位協律郎入就舉麾位典儀帥賛者先入就位又通事舍人引羣官非升坐者入就位刑部郎中以月令置於案履以帊令史二人俱絳公服對舉案立于武官五品以上東南郎中立于案後北面侍中版奏外辦皇帝御輿出次曲直華盖侍衞警蹕如常儀入自青龍門皇帝初入門太樂令令撞𬎼賔之鐘左五鐘皆應鼔柷奏太和之樂皇帝升自寅陛入即御坐東向坐符寳郎奉寳置於御坐侍中夾侍如常儀戛敔樂止典儀一人升立于左个東北南向通事舍人引王公以下就西面位立上公初入門舒和之樂作凡公行皆作舒和之樂公至位樂止羣官立定典儀曰再拜賛者承傳凡典儀有詞賛者皆承傳在位者皆再拜侍中前跪奏稱侍中臣某言請延公王等升俛伏興又侍中稱制曰可侍中詣左个東北南面稱詔延公王等升堂上典儀承傳堂下賛者又承傳在位者皆再拜通事舍人以次引西面位者各詣其陛公初行樂作至觧劔席樂止公王以下俱升席位觧劔俛伏興脱舄通事舍人各引立於坐後刑部郎中以案進立于夘陛下侍中跪奏請讀月令俛伏興又侍中稱制曰可侍中退復位刑部郎中再拜就解劍席跪解劍俛伏興脫舄取令持案者仍立於下通事舎人引刑部郎中奉令升自夘陛詣席南北向位跪置令于案俛伏興立于席後堂上典儀唱就坐公王以下及刑部郎中並就坐俛伏興坐刑部郎中讀令每句一絶使言聲可了讀令訖堂上典儀唱可起公王以下皆起通事舎人引公王以下及刑部郎中俱降刑部郎中以令置于案興羣臣俱跪佩劍俛伏興納舄通事舎人引還本位公初行樂作至位樂止立定典儀曰再拜在位者皆再拜又通事舎人引西面位者出公初行樂作出門樂止侍中跪奏稱侍中臣某言禮畢俛伏興還侍位皇帝興太樂令令撞黄鍾之鐘右五鐘皆應太和之樂作皇帝降坐御輿以出之便次警蹕侍衛如来儀出門樂止舎人引南北面位者以次出孟春令孟春之月日在營室昏參中旦尾中其日甲乙其帝太皥其神勾芒其蟲鱗其音角律中太蔟其數八其味酸其臭羶其祀户東風解凍蟄蟲始振魚上負氷獺祭魚鴻雁來食麥與羊其器疏以達是月也以立春先立春七日禮部奏曰某日立春盛德在木皇帝乃齋立春之日皇帝親帥百官迎春於東郊還賞百官於朝命有司布徳和令行慶施惠下及黎元慶賜遂行毋有不當乃命太師守典奉法司天日月星辰之行宿離不貸無失經紀以初為常是月也皇帝乃以元日祈穀於上帝乃擇元辰皇帝親載耒耜帥百官躬耕帝籍反乃執爵于太寢命曰勞酒是月也天氣下降地氣上騰天地和同草木萌動命布農事修封疆善相丘陵阪險原隰土地所宜五穀所殖以教導人是月也修祭典禁止伐木毋覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵毋聚大衆毋置城郭掩骼埋胔是月也不可以稱兵稱兵必天殃兵戎不起不可從我始毋變天之道毋絶地之理毋亂人之紀孟春行夏令則風雨不時草木早落國時有恐行秋令則黎元大疫飄風暴雨總至藜莠蓬蒿並興行冬令則水潦為敗雪霜大至首種不入鑾駕還宫皇帝既還大次侍中版奏請解嚴將士不得輒離部位皇帝停大次一刻頃搥一鼓為一嚴轉仗衛於還塗如來儀三刻頃搥二鼔為再嚴將士布隊仗侍中版奏請中嚴五刻頃搥三鼔為三嚴謁者賛引各引羣官序立於次前文武侍臣詣大次奉迎乗黄令進金輅於大次門外南向千牛將軍立於輅右侍中版奏外辦太僕卿執㘘皇帝御輿出次繖扇侍衛警蹕如常儀皇帝升輅太僕卿立授綏黄門侍郎奏稱請鑾駕發引退復位鑾駕動稱警蹕如常儀黄門侍郎贊者夾引千牛將軍夾輅而趨至侍臣上馬所黄門侍郎奏稱請鑾駕權停勅侍臣上馬侍中承制退稱制曰可黄門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬畢黄門侍郎奏稱請勅車右升侍中稱制曰可黄門侍郎退復位千牛將軍升訖黄門侍郎奏請鑾駕發引退復位皷傳音鑾駕動皷吹振作而還文武群官從如來儀駕至承天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立于輅右訖鑾駕動千牛將軍夾輅而趍駕入嘉德門太樂令令撞𬎼賔之鐘左五鐘皆應鼔柷奏采茨之樂至太極門戛敔樂止入太極門鼔柷奏太和之樂駕至横街北當東上閤迴輅南向侍中進當鑾駕前跪奏稱侍中臣某言請降輅跪俛伏興還侍位皇帝降輅御輿以入繖扇侍衞警蹕如常儀侍中臣從至閤戛敔樂止初文武羣官至東朝堂通事舍人承㫖勅羣官並還皇帝既入侍中版奏請觧嚴叩鉦將士各還其所皇帝於明堂讀仲春令陳設尚舍奉御設御幄坐青陽太廟設文官解劍席於寅陛之左設武官解劍席於辰陛之右太樂令展宫懸於青陽太廟之庭設舉麾位于堂上夘陛之南餘並如孟春陳設之儀鑾駕出宫右並如孟春出宫之儀讀令其日諸衛列仗於青陽太廟之庭皇帝升自夘陛典儀一人升立於青陽太廟東北侍中詣青陽太廟東北稱詔刑部郎中升自辰陛餘並如孟春讀令之儀仲春令仲春之月日在奎昏弧中旦建星中其日甲乙其帝太皡其神勾芒其蟲鱗其音角律中夾鐘其數八其味酸其臭羶其祀户始雨水桃始華倉庚鳴鷹化為鳩食麥與羊其器疏以達是月也安萌芽養㓜少存諸孤擇元日命人社令有司省囹圄去桎梏毋肆掠止獄訟是月也日夜分雷乃發聲始電蟄蟲咸動啟户始出先雷三日奮木鐸以令人曰雷將發聲有不戒其容止者生子不備必有㓙災日夜分則同度量鈞衡石角斗甬正權概是月也毋作大事以妨農事毋竭川澤毋漉陂池毋焚山林獻羔開氷先薦宗廟上丁釋奠於先聖先師仲春行秋令則其國大水寒氣總至冦戎來征行冬令則陽氣不勝麥乃不熟民多相掠行夏令則國乃大旱煖氣早來蟲螟為害鑾駕還宫右並如孟春還宫之儀皇帝於明堂讀季春令陳設尚舍奉御設御幄坐於青陽右个設文官解劔席於夘陛之左設武官解劔席於巳陛之右太樂令展宫懸於青陽右个之庭設舉麾位於堂上辰陛之南餘並如仲春陳設之儀鑾駕出宫右並如仲春出宫之儀讀令其日諸衛列仗於青陽右个之庭皇帝升自辰陛典儀一人升立於青陽右个東北侍中詣青陽右个東北稱詔刑部郎中升自己陛餘並如仲春讀令之儀季春令季春之月日在胃昏七星中旦牽牛中其日甲乙其帝太皡其神勾芒其蟲鱗其音角律中姑洗其數八其味酸其臭羶其祀户桐始華田鼠化為鴽虹始見萍始生食麥與羊其器疏以達薦鮪於宗廟是月也生氣方盛陽氣發洩勾者畢出萌者盡達不可以内布徳行恵發倉廩賜貧窮賑乏絶開庫府出幣帛賙天下勉牧守聘名士禮賢者是月也時雨將降下水上騰命有司循行國邑周視原野修利隄防導達溝瀆開道通路無有障塞田獵罝罘羅網罼翳餧獸之藥毋出國門是月也命虞人毋伐桑柘鳴鳩拂其羽戴勝降於桑后妃齋戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以供郊廟之服無有敢惰是月也命工帥令百工審五庫之量金鐡皮革筋角齒羽箭幹脂膠丹漆毋或不良毋悖於時毋或作為淫巧以蕩上心季春行冬令則寒氣時發草木皆肅國有大恐行夏令則人多疾疫時雨不降山林不收行秋令則天多沈隂淫雨早降兵革並起鑾駕還宫右並如仲春還宫之儀大唐開元禮卷九十九
