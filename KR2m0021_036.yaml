body:
  text: 大唐開元禮卷三十六唐蕭嵩等撰吉禮祭四海四瀆凡四海四瀆每年一祭各以五郊迎氣日祭之東海於萊州界東瀆大淮於唐州界南海於廣州界南瀆大江於益州界西海及西瀆大河於同州界北海及北瀆大濟於河南府界祭前五日諸祭官各散齊三日致齊二日散齊皆於正寢致齊皆於祭所散齊理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊惟祭事得行其餘悉斷其祭官已齊而闕者通攝行事其祭官致齊之日給酒食及明衣各習禮於齊所前一日瀆令清掃內外又為瘞坎於壇壬地方深取足容物坎內為壇髙一丈四尺皆為陛贊禮者設初獻位於坎壇東南亞獻終獻位於初獻之南少退俱西面北上設掌事位於終獻東南重行西面以北為上設贊唱者位於終獻西南西面北上設祭官以下門外位於南門之外道東重行西面以北為上祭器之數尊六籩十豆十簋二簠二俎三瀆令帥其屬詣壇東升升設尊於坎壇上東南隅北向西上尊皆加勺羃有坫以置爵設玉篚於尊坫之所設洗於南陛東南北向罍水在洗東篚在洗西南肆篚實巾爵執尊罍洗篚者各位於尊罍洗篚之後祭日未明烹牲於厨其牲各隨方色齊郎以豆預取血毛置於饌所夙興掌饌者實祭器牲體牛羊豕皆載右胖前腳三節一節一段肩臂臑皆載之後腳三節一節一段去下節載上肫胳二節又取正脊脡脊橫脊正脅短脅代脅各二骨以並餘皆不設簠實黍稷簋實稻梁籩十實石鹽乾魚棗栗榛菱芡鹿脯白餅黑餅豆十實韭葅醯醢菁葅鹿醢芹葅兔醢笋葅魚醢脾析葅豚胉若土無者各以其類充之凡祭官各服其服瀆令帥其屬入詣壇東陛升設瀆神座於壇上近北南向席以莞又實尊罍及玉凡尊一實醴齊一實盎齊一實清酒𤣥酒各實於上尊祭神之玉兩圭有邸祝版置於坫瀆令又以幣置於篚齊郎以豆血設於饌所其幣長一丈八尺各隨方色贊唱者先入就位祝與執尊罍篚者入當壇南重行北面以西為上立定贊唱者曰再拜祝以下俱再拜執尊者升自東陛立於尊所執罍篚者各就位祝詣壇東陛升行掃除於上降行掃除於坎外訖各就位質明贊禮引祭官以下俱就門外位一刻頃贊禮引祭官以下入就位立定贊唱者曰再拜在位者皆再拜贊禮者進初獻之左白有司謹具請行事退復位贊唱者曰再拜在位者皆再拜祝跪取玉幣於篚興立尊所几取物者皆跪俯伏而取以興奠物則奠訖俯伏而後興掌饌者帥齊郎奉饌陳於東門之外贊禮者引初獻詣壇升自南陛進神座前北向立祝以玉幣東向進初獻受玉幣祝還尊所贊禮者引初獻者進北向跪奠於神座興少退北向再拜贊禮者引初獻還本位掌饌者引饌入升自南陛祝迎引於壇上設於神座前掌饌者帥齊郎降自東陛復位祝還所贊禮者引初獻詣罍洗盥手洗爵升自南陛詣酒尊所執尊者舉羃初獻酌醴齊贊禮者引初獻進詣神座前北向跪奠爵興少退北向立祝持版進於神座之右東向跪奠讀祝文曰維某年嵗次月朔日子嗣天子開元神武皇帝某謹遣某官某敢昭告於東瀆大淮惟神源流深毖潜潤溥洽阜成百榖疏滌三川青春伊始用遵典秩南瀆大江云維神總括大川朝宗巨海功昭潤化德表靈長敬因夏首修其恆秩西瀆大河云惟神上通雲漢光啓圖書分導九枝旁潤十里素秋届序用率典常北瀆大濟云維神泉源凊潔浸被遐邇播通四氣作紀一方𤣥冬肇節聿修典制謹以玉帛粢盛犧齊庶品明薦於神尚饗訖興再拜祝進奠版於神座還樽所祝以爵酌清酒進初獻之右西向立初獻再拜受爵跪祭酒啐酒奠爵興祝帥齊郎以俎進減神前三牲胙肉各取前腳第三節共置一俎以授初獻初獻受以授齊郎初獻跪取爵遂飲卒爵祝進受爵復於坫初獻興再拜贊禮者引亞獻詣罍洗盥手洗爵升自東陛詣尊所執尊者舉羃亞獻酌盎齊贊禮者引亞獻詣神座前北向跪奠爵興少退北向再拜祝以爵酌清酒進於亞獻之右西向立亞獻再拜受爵跪祭酒遂飲卒爵祝受爵復於坫亞獻興再拜贊禮者引亞獻降復位初亞獻將畢贊禮者引終獻盥洗升獻飲福如亞獻之儀訖贊禮者引終獻降復位祝進神座前徹豆還尊所徹者籩豆各一少移於故處贊唱者曰再拜獻官以下皆再拜瀆令及齊郎以幣血沈於瀆瀆令退就掌事位齊郎還饌所贊禮者進初獻之左白禮畢遂引初獻以下出祝與執尊罍篚羃者俱復執事位立定贊禮曰再拜祝以下皆再拜以出其祝版燔於齊所大唐開元禮卷三十六
