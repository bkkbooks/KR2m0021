body:
  text: 大唐開元禮卷七十九唐蕭嵩等撰賔禮蕃國主來朝以束帛迎勞遣使戒蕃主見日蕃主奉見受蕃國使表及幣蕃主來朝遣使迎勞前一日守宫殿次於候館門之外道右南向其日使者至掌次者引就次蕃主服其國服所司引立于東階下西面凡蕃主進止所司先引制使皆謁者先導使者朝服出次立於門西東面從者執束帛立於使者之南蕃主有司出門東西面曰敢請事使者曰奉制勞某主稱其國名有司入告蕃主迎於館門外之東西面再拜使者與蕃主俱入使者先升立于西階上執束帛者從升立于使者之北俱東面蕃主升立于東階上西面使者執幣稱有制蕃主將下拜使者曰有後制無下拜蕃主旋北靣再拜稽首使者宣制訖蕃主進受幣綵五匹為一束其蕃主答勞使各以土物其多少相准不得過勞幣勞于逺郊其禮同蕃主還贈于逺郊亦如之勞蕃使即無束帛退復位以幣授左右又再拜稽首使者出立于館門外之西東面蕃主送于館門之外西面答使者蕃主揖使者俱入讓升蕃主先升東階上西面使者升西階上東面蕃主以土物儐使者使者再拜受蕃主再拜送物使者降出蕃主從出門外皆如初蕃主再拜送使者還蕃主入鴻臚迎引詣朝堂依方北面立所司奏聞舍人承敕出稱有敕蕃主再拜宣勞訖又再拜所司引就館如常儀皇帝遣使戒蕃主見日前一日守宫設次于館門之外道右南向其日使者至掌次者引就次蕃主服其國服降立于東階下西面蕃主諸官立于蕃主之後西面北上使者朝服出次立于門西東面蕃主有司出門東西面曰敢請事使者曰奉制戒某主見日有司入告蕃主迎于館門外之東西面再拜使者與蕃主俱入使者升自西階東面蕃主升自東階西面使者稱有制蕃主再拜宣制曰某日某主見蕃主又再拜稽首使者降出蕃主送於館門之外西面再拜使者還蕃主入蕃主奉見奉辭禮同前一日尚書奉御整設御幄于太極殿北壁南向守宫設次太樂令展宫懸設舉麾位于上下鼓吹令設十二案乘黃令陳車輅尚輦奉御陳輿輦尚舍奉御鋪蕃主牀坐于御座西南東向並如常儀其日典儀設蕃主位于懸南道西北面又設蕃國諸官之位于蕃主位後各依其班重行北面以西為上設典儀位于懸之東北贊者二人在南差退俱西面諸衛各勒所部列黃麾仗屯門及陳於殿庭太樂令帥工人入就位協律郎入就舉麾位所司迎引蕃主至承天門外通事舍人引就次本司入奏鈒㦸近仗入陳如常典儀帥贊者先入就位侍中版奏請中嚴諸侍衛之官各服其服符寶郎奉寶俱詣閣奉迎蕃主服其國服出次通事舍人引立于閣外西廂東面若更有諸蕃以國大小為叙蕃國諸官各服其服立于蕃主之後俱東面北上侍中版奏外辦皇帝服通天冠絳紗袍乘輿以出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鍾之鐘右五鐘皆應協律郎舉麾鼓柷奏太和之樂以姑洗之均皇帝出自西房即御坐南向坐符寶郎奉寶置于御座侍衛如常偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戞敔而止舍人引蕃主入門舒和之樂作至位樂止典儀曰再拜贊者承傳蕃主再拜稽首侍中承制降詣蕃主西北東面稱有制蕃主再拜稽首宣制訖又蕃主再拜稽首侍中回奏又承制降勞敕令升坐蕃主再拜稽首舍人引蕃主樂作蕃主至階樂止舍人接引升至坐後蕃主就坐俯伏侍中承制勞問蕃主俯伏避席將下拜侍中承制曰無下拜蕃主復位拜對如常侍中回奏又承制勞還館舍人引蕃主降自西階典謁承引樂作復懸南位樂止蕃主再拜稽首訖舍人引蕃主樂作蕃主出門樂止初蕃主升坐舍人引蕃國諸官以次入就位立定典儀曰再拜贊者承傳蕃國諸官俱再拜稽首舍人承敕降自西階詣蕃國諸官西北東面稱敕㫖蕃國諸官皆再拜稽首對訖又再拜稽首舍人回奏又承敕降勞還館蕃國諸官俱再拜稽首于蕃主出舍人引蕃國諸官以次出訖侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞㽔賔之鐘左五鐘皆應鼓柷奏太和之樂皇帝降坐乘輿入自東房侍衛警蹕如常儀侍臣從至閣樂止皇帝受蕃使表及幣其勞及戒見日亦如上儀前一日尚舍奉御整設御幄于所御之殿北壁南向守宫設使者次太樂令展宫懸設舉麾位于上下並如常儀其日典儀設使者位于懸南重行北面以西為上庭實位于客前典儀位于懸東北贊者二人在南差退俱西向諸衛勒所部列黃麾半仗屯門及入陳於殿庭太樂令帥工人入就位協律郎入就舉麾位所司引客至承天門外典謁引就次本司入奏鈒㦸近仗入陳如常典儀帥贊者先入就位侍中版奏請中嚴侍衛之官各服其器服符寶郎奉寶俱詣閣奉迎使者服其國服奉書出次通事舍人引立于閣外西廂東面從者執幣玉庭實立於後俱東面北上侍中版奏外辦皇帝服通天冠乘輿以出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應鼓柷奏太和之樂以姑洗之均皇帝出自西房即御座南向坐符寶郎奉寶置于御座侍衛如常儀樂止中書侍郎一人令史二人持案預俟于西階下東向北上舍人引使者及庭實入就懸南位使者初入門舒和之樂作立定樂止大蕃大使為作樂次蕃大使及大蕃中使以下皆不設樂懸及黃麾仗中書侍郎帥持案者進詣使者前東面侍郎受書置于案回詣西階侍郎取書升奏持案者退初侍郎奏書有司各帥其屬受幣馬于庭典儀曰再拜贊者承傳使者以下皆再拜舍人前承制降詣使者前蕃國主使者再拜對訖又再拜舍人回奏又承敕問其臣下使者再拜對又勞使者以下拜對及舍人回奏並如常儀舍人承制敕勞還館使者再拜舍人引使者以下出樂作止如常侍中前跪奏稱侍中臣言禮畢俯伏興還侍位皇帝興太樂令令撞㽔賓之鐘左五鐘皆應鼓柷奏太和之樂皇帝降坐乘輿入自東房侍衛警蹕如常儀侍臣從至閣樂止大唐開元禮卷七十九
