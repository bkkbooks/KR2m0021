body:
  text: 大唐開元禮卷一百四十四唐蕭嵩等撰凶禮四品五品喪之三卒哭祭小祥祭大祥祭禫祭祔廟卒哭祭前一日之夕掌事者改廬翦屏柱楣塗廬不塗見面塗廬裏不塗外見面也翦蒲為席不緣以木為枕牢饌如虞祭其日夙興祝入燭先升自阼階入于室祝整拂几筵以出掌事者設洗於西階西南北向東西當西霤南北以堂深罍水在洗西篚在洗東南肆篚實爵一巾一加冪設瓦甒二於靈座前之左北墉下醴酒在東冪用絺加勺南柄掌事者具饌于堂東祝與執樽罍篚者先入立於樽罍篚之後內外衰服俱升主人及其諸子倚杖於室户外俱立於靈座東西面南上妻妾女子子立於靈座西東面南上內外就位坐哭應拜者立掌饌者以饌升入設於靈座前相者引主人降自西階詣罍洗主人止哭盥手洗爵相者引主人升自西階入詣酒樽所主人酌醴相者引主人進跪奠於靈座前俯伏興少退西面立應拜者陪於後祝持祝版入立於靈座之南北面內外止哭祝跪讀祝文曰維某年月日辰子哀子今儀父亡稱孤子某敢昭告於考某官封諡妣則郡縣鄉君各從其稱日月不居奄及卒哭追慕永往攀號無逮謹以潔牲柔毛剛鬛嘉薦普淖明齊溲酒哀薦成事於考某官封諡尚饗主人以下哭再拜內外應拜者皆再拜哭祝興進跪奠版於靈座興還樽所祝讀版訖興跪進版與主人哭拜同時相者引主人退復位哭盡哀內外各還次祝闔户與執樽罍者降出少頃祝與執饌者入開尸徹饌祝闔户以降自卒哭之後朝一哭夕一哭蔬食飲水周而小祥小祥祭前一日之夕毁廬為堊室設蒲席周喪堊室者除之設地席陳練冠於次主人及諸子俱沐浴櫛爪翦牢饌及器如卒哭之禮其日夙興祝入燭先升自阼階入於室整拂几筵以出掌事者設罍篚於西階南面如初篚實爵一巾一加冪設瓦甒二於靈座之左北墉下醴酒在東冪用絺加勺南柄具饌於堂東祝與執樽罍篚者先入立於樽罍篚之後內外衰服主人倚杖於階下俱升就位應拜者立哭盡哀相者引降主人杖就次婦人以下各就次主人諸子除首絰著練冠妻妾女子子除腰絰周服者皆除之丈夫素服吉冠履婦人素服吉屨相者引主人及諸子倚杖如初內外俱升就位哭掌饌者以饌升自東階入設於靈座前設訖掌饌者降自西階以出相者引主人降自西階詣罍洗主人止哭盥手洗爵相者引主人升自西階入詣酒樽所酌醴進跪奠於靈座前俯伏興少退西面立祝持版進立於靈座之右北面向內外皆止哭祝跪讀祝文曰維年月朔日哀子某父殁稱孤子某敢昭告於考官封諡妣則郡縣鄉君各從其稱嵗月遄迫奄及小祥攀慕永逺重增屠裂謹以潔牲柔毛剛鬛嘉薦普淖明齊溲酒祗薦祥事於考某官封諡尚饗主人哭再拜內外應拜者再拜哭祝興進跪奠版於靈座興還樽所主人哭拜與祝興奠版同時相者引主人就位哭盡哀內外各還次主人杖如式祝闔户與執樽罍者降出少頃祝與進饌者入開户徹饌闔户以降自小祥之後止朝夕之哭哭無時哀至則哭始食菜果飯蔬食飲氷漿無鹽酪不能食食鹽酪可又周而大祥大祥祭前一日之夕除堊室張帷又備內外受服謂大祥之服各於其次主人及諸子俱沐浴櫛爪翦牢饌及器如小祥之禮其日夙興內外各服其衰服並於次哭盡哀應除服者著除服訖又哭盡哀止昧爽前祝入燭先升自阼階入於室祝整拂几筵以出掌事者設罍洗篚於西階西南如初篚實爵一巾一加冪設瓦甒二於靈座之右北墉下醴酒在東冪用絺加勺南柄又具饌於堂東祝與執樽罍者先入立於樽罍之後內外俱升就位哭掌饌者以饌升自東階入設於座前置設訖掌饌者降自西階以出相者引主人降自西階詣罍洗主人止哭盥手洗爵相者引主人升自西階詣酒樽所酌醴進跪奠於靈前俯伏興少退西面立祝持版進立於靈之右北面內外止哭祝跪讀祝文曰維年月朔日子孤子某敢昭告於考某官封諡妣則郡縣鄉君各隨其稱日月逾邁奄及大祥攀慕永逺無任荒踣謹以潔牲柔毛剛鬛嘉薦普淖明齊溲酒祗薦祥事於考某官封諡尚饗主人哭再拜應拜者再拜哭祝興進跪奠版於靈座興還樽所相者引主人就位哭盡哀主人以下各還外寢妻妾女子子以下還寢祝闔户與執樽罍者降出少頃掌饌者入開户徹饌掌事者除靈座祝闔户以降間月而禫自大祥之後外無哭者食有醢醬禫祭前一日掌事者預備內外禫服各陳於别所主人及諸子俱沐浴櫛爪翦仍宿於外寢牢饌及器如大祥之禮其日夙興祝入燭先升設几席於奠掌事者設罍洗篚於東階東南如常篚實爵一巾一加冪設瓦甒二於座之左北墉下醴酒在東冪用絺加勺南柄具饌於堂東祝與執樽罍篚者入立於樽罍篚之後主人及諸子妻妾女子子仍祥服為長子三年者亦祥服內外俱升就位哭盡哀降釋祥服應禫服者著禫服相者引主人以下俱升就位哭掌饌者以饌入升設於座前訖執饌者出相者引主人降自東階詣罍洗盥手洗爵相者引主人升自東階詣酒樽所酌醴進跪奠於座前俯伏興少退西面立祝持版進立於座之右北面內外皆止哭祝跪讀祝文曰維年月朔日子孤子某敢昭告於考某官封諡妣則郡縣鄉君各隨其稱禫制有期追慕無及謹以潔牲柔毛剛鬛嘉薦普淖明齊溲酒祗薦禫事於考某官封諡尚饗主人哭再拜應拜者皆再拜內外皆哭祝興跪進奠版於座還樽所相者引主人以下還於寢祝闔户與執樽罍者降出少頃掌饌者入開户徹饌以出祝收几筵以出祔廟如别儀自禫之後內無哭者始飲醴酒食乾肉祔廟將祔筮日如常儀前三日主人及亞獻終獻及諸執事者俱散齊二日致齊一日前一日掌事者清掃廟之內外其廟應遞遷者並設座主人以酒脯醢告遷訖遂移床幄又奠酒脯醢以安神少頃掌饌者徹饌以出掌廟者設考之祔座於曽祖室內東壁下西向右几妣則祔于曽祖姑設坐亦如之言曽祖及曽祖姑者皆據孝子于之言于亡者祖及祖姑也祔于曽祖則曽祖妣配者有事尊可及卑者也設主人位於東階東南西向設子孫位於南門內道東北面西上設亞獻終獻位於主人東南設掌饌以下位於終獻東南俱西面北上亞獻終獻以國官僚佐若無以親賔充之設贊唱者位於主人西南西面設酒樽於堂上室户之東南北向西上設洗于阼階東南北向東西當東霤南北以堂滐罍水在洗東篚在洗西南肆篚實爵三巾二加冪其爵每廟三事祔日內外夙興掌饌者預具少牢之奠二坐各俎三簋二簠二鈃二酒樽二其樽皆一實𤣥酒為上一實清酒次之上尊加𤣥酒者重古六籩六豆主人及行事者各服其祭服執樽罍篚者入就位主人以下皆入就位諸婦人停於門外周以行帷俟祭訖而還立定贊者唱曰再拜在位者皆再拜掌饌者引饌入升自東階入于室各于神座前施設訖掌饌以下降出相者引主人詣罍洗盥手洗爵升自東階詣酒樽所執樽者舉冪主人酌酒相者引主人入室進北面跪奠爵於曽祖神座前俯伏興相者引主人出詣酒樽所取爵酌酒入室進東面跪奠於神座前俯伏興出户北面立羣祖及考皆如之祝持祝版進於室户外之右東向跪讀祝文曰維某年月朔日子孝曽孫某官封某敢昭告於曽祖某官封諡若無官封者但云曽祖之靈若祔母但云曽祖妣某氏不告曽祖祖某官封諡若祔母云祖妣母某氏以下無官封者但云考妣之靈考某官封諡若祔母云妣某氏如父在不可遽遷祖妣先宜於廟東北堂别立一室藏其主待考同祔某罪積不滅嵗及免喪宗廟上遷昭穆繼序先王制禮不敢不至是用適於皇考封諡隮祔孫某封諡無官封者但云以適遷於祖隮祔某孫若母同祔則云適遷於祖妣夫人某氏以隮祔孫婦夫人某氏各隨其稱無官封者但云適遷於祖姑某氏以隮祔孫婦某氏謹以潔牲剛鬛嘉薦普淖明齊溲酒祗薦於曽祖某官封諡曽祖妣某氏配祖某官封諡祖妣某氏配考某官封諡若祔母則云曽祖妣某氏祖妣某氏尚饗祝興主人再拜祝進入奠版於曽祖神座興還樽所相者引主人入室立於西壁下東面再拜相者引主人出降還本位主人初獻將畢相者引亞獻詣罍洗盥手洗爵升詣酒樽所酌酒入進北面跪奠於曽祖座前俯伏興相者引亞獻詣酒樽所取爵酌酒入進東面跪奠於祖座前俯伏興出户北面再拜訖考亦如之又入室立於西壁下東面再拜相者引出降復位亞獻將畢相者引終獻詣罍洗盥手升酌終獻如亞獻之儀訖相者引終獻降復位祝入徹豆還樽所贊唱曰再拜在位者皆再拜相者引主人出又相者引在位子孫以下出掌饌者入徹饌以出進酒脯之奠於座前少頃徹之齊衰三年其虞卒哭祥禫變除之節與斬衰同父在為母為妻當二祥及禫日月之期雖異其儀節則同周服以下變除依其月算各以其日之晨備衰服升就位哭盡哀降詣别室釋衰服著素服又就位哭盡哀出就别室終日異門者至夕各還其家大唐開元禮卷一百四十四
