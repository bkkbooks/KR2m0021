body:
  text: 大唐開元禮卷五十六唐蕭嵩等撰吉禮皇帝巡狩告於圜丘齋戒陳設鑾駕出宫親告鑾駕還宫齋戒將告有司卜日如别儀前一日皇帝齋於太極殿如郊祀之儀凡預告之官清齋於告所近侍之官應從升者各於本司清齋一宿諸衛令其屬晡後一刻各以其方器服守衛壝門清齋一宿陳設前告三日尚舍直長設大次於外壝東門之外道北南向尚舍奉御鋪御坐衛尉設文武侍臣次於大次之後文官在左武官在右俱南向又設告官及從駕羣官次各於常所設陳饌幔於內壝東門之內道南北向前二日太樂令設宫懸之樂於壇南設登歌舉麾位於壇上並如常儀前一日右校掃除壇之內外郊社令積柴於燎壇壇方一丈二尺開上南出户髙四尺奉禮設御位於壇之東南西向將告奉禮一人守之在版位西南五步西向設望燎位當柴壇之北南向設告官及從駕羣官版位於內外如常儀郊社令帥府史一人及齋郎以樽坫罍洗篚羃及玉帛之篚入設於位並如常儀執樽罍篚羃者各位於樽罍篚羃之後告日未明五刻太史令郊社令升設昊天上帝坐於壇上北方南向席以藳秸設神位於坐首告日未明十刻太官令帥宰人以鸞刀烹牲於厨鑾駕出宫皇帝服衮冕之服乘玉輅備大駕及嚴鼓時刻奏請進發內外器服皆如常儀親告其日未明三刻諸告官各服其服郊社令良醖令各帥其屬入實樽罍玉幣太尊實以泛齊凡尊皆二其玄酒各實于上尊禮神之玉以蒼璧其幣亦蒼太官令帥進饌者實籩豆簠簋入設於內壝之東門外饌幔內未明二刻奉禮率贊者先入就位贊引引御史太祝以下入行掃除如常儀訖各引就位駕將至謁者贊引各引告官以下及從告羣臣客使先至者俱就門外位駕至大次門外回輅南向千牛將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅之大次協律郎太樂令帥工人各入就位凡升壇者皆脫履於下降納如常皇帝停大次半刻謁者贊引各引從駕羣官入就位太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝服大裘而冕出次華蓋侍衛如常儀侍中負寶陪從如常博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至內壝門外殿中監進鎮圭華蓋仗衛停於大門外近侍者從入如常謁者引禮部尚書太常少卿陪從如常皇帝至版位西向立通事舍人各引從告官及諸王介公酅公諸方客使以次入就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜贊者承傳凡奉禮有詞贊者皆承傳衆官在位者皆再拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏興舉麾鼓柷奏豫和之樂乃以圜鐘之均奏文舞之舞六成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官皆再拜諸太祝俱取玉幣於篚各立於尊所太常卿引皇帝太和之樂作皇帝詣壇升自南陛近侍者從升如常儀皇帝升壇北向立樂止太祝加玉於幣以授侍中侍中奉玉幣東向進皇帝受玉帛登歌作肅和之樂太常卿引皇帝進北向跪奠於天帝神坐俯伏興太常卿引皇帝稍退北向再拜訖登歌止樂作皇帝降自南陛還版位西向立樂止初羣官拜訖謁者引司徒太官令出帥進饌者奉饌陳於內壝東門之外司徒奉天帝之俎皇帝既至位樂止太官令引饌入俎初入門雍和之樂作饌至階樂止饌升於南陛太祝迎引於壇上各設於神坐前設訖謁者引司徒以下降自東陛復位諸太祝各還尊所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤興承水皇帝盥手黃門侍郎取巾於篚興進皇帝帨手訖受巾跪奠於篚遂取匏爵於篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黃門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤匜黃門侍郎受巾奠於篚皆如常太常卿引皇帝樂作皇帝詣壇升自南陛樂止近侍者從升如常謁者引司徒升自東陛立於樽所齋郎奉俎從升立於司徒之後太常卿引皇帝詣天帝酒樽所執樽者舉羃侍中贊酌泛齊訖夀和之樂作皇帝每酌獻及飲福酒皆作夀和之樂皇帝進天帝神坐前北向跪奠爵俯伏興太常卿引皇帝少退北向立樂止太祝持版進於神坐之右東向跪讀祝文祝文臨時撰訖興皇帝再拜初讀祝文訖樂作太祝進奠版於神坐還樽所太常卿引皇帝進天帝座前北向立樂作太祝以爵酌罍福酒合置一爵一太祝持爵以授侍中侍中受爵西向進皇帝再拜受爵跪祭酒奠爵俯伏興諸太祝各帥齋郎進俎太祝減神前胙肉加於俎興以胙肉共置一俎上授司徒司徒奉俎西向進皇帝受以授左右皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復於坫皇帝俯伏興再拜樂止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止謁者引司徒降復位太祝各進徹豆還樽所奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜樂作太常卿前奏稱再拜退復位皇帝再拜奉禮曰衆官再拜衆官皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作皇帝至望燎位南向立樂止於羣官將拜諸太祝各以篚進神坐前取玉帛祝版齋郎以俎載牲體稷黍飯爵酒興各自其陛降壇南行當柴壇南東行自南陛登柴壇以玊幣饌物置於柴上訖奉禮曰可燎東西面各四人炬燎火半柴太常卿前奏禮畢太常卿引皇帝出內壝門殿中監前受鎮圭華蓋侍衛如常儀皇帝入次樂止謁者贊引各引從告官及從駕群官諸方客使以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人以下以次出鑾駕還宫皇帝既還大次侍中版奏請解嚴將士不得輒離部伍皇帝改服通天冠絳紗袍乘金輅鼓吹振作奏請還宫如常儀大唐開元禮卷五十六
