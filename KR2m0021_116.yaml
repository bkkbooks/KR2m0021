body:
  text: 大唐開元禮卷一百十六唐蕭嵩等撰嘉禮公主䧏嫁册公主納采問名納吉納徵請期親迎同牢見舅姑盥饋舅姑婚㑹婦人禮㑹饗丈夫送者饗婦人送者册公主前一日尚舍奉御設御幄於太極殿稍北南向鋪御坐如常儀守宫設羣官次於東西朝堂奉禮設版位並如式太樂令展宫懸於殿庭典儀設舉麾位於殿上之西南如常儀又設羣官版位文官一品以下五品以上於横街北六品以下九品以上於横街南俱重行西向武官一品以下五品以上於横街北六品以下九品以上於横街南俱重行東向諸親於五品之南皇親在東諸親在西設典儀位如常儀贊者二人在南少退俱西向又設册使副使位於懸北西上俱北面副使立於册使東少退以後准此其日諸衛勒所部屯門列仗如常儀册使及羣官等依時刻集朝堂就次改服朝服通事舍人各引就朝堂前位侍中量時刻版奏請中嚴鈒㦸近仗入陳於殿庭太樂令帥工人入就位協律郎入就舉麾位典儀帥贊者先入就位諸侍衛之官各服其器服符寳郎奉寳俱詣閣奉迎通事舍人分引王公羣官入就位又通事舍人引册使及副使並入立於殿門外道東西面以俟黄門侍郎帥主節奉郎及幡立於陛仗南節在南中書侍郎預請册置於案令史絳公服各對舉案立於節南道東西面中書侍郎立於案後侍中版奏外辨所司承㫖索扇扇上皇帝服通天冠絳紗袍御輿以出曲直華盖警蹕侍衛如常儀太樂令令撞黄鍾之鍾右五鍾皆應協律郎舉麾鼓柷樂作皇帝自出西房即御坐南向坐扇開協律郎偃麾戛敔樂止符寳郎奉寳置於御坐如常儀典儀贊拜羣官在位者俱再拜訖通事舎人引册使副使入就位册使等初入門舒和之樂作至位樂止立定典儀曰再拜賛者承傳册使等皆再拜侍中進當御坐前北面跪奏稱侍中臣某言册公主請命使俛伏興又侍中少前稱制曰可退復位侍中承制降詣使者東北西面稱有制册使等俱再拜侍中宣制曰册某公主命公等持節展禮宣制訖使副等又再拜侍中還侍位賛禮者引册使少前黄門侍郎引主節詣册使東北主節以節授黄門侍郎主節者由後立於使左黄門侍郎執節西南授册使跪受興付主節幡隨節立於使左黄門侍郎退賛禮者導中書令詣册使東北西面立又賛禮者導中書侍郎引詣公主册案立於中書令之右中書令於案取公主册舉案者皆由後立於使右以後後此授册使册使跪受興置於案持案者退立於使後以後准此贊禮者引中書令與册使俱北向退復位典儀曰再拜賛者承傳册使等及羣官在位者皆再拜訖通事舎人引册使等右旋而出持節者前導持案者次之册使等初行樂作出門樂止侍中前跪奏稱侍中臣某言禮畢俛伏興還侍位所司承㫖索扇扇上皇帝興太樂令令撞蕤賔之鍾左五鍾皆應鼔柷奏太和之樂皇帝降座御輿入自東房侍衛警蹕如來儀侍臣從至閤扇開樂止通事舎人引羣官在位者以次出舉册者及册使至長樂門外次如後儀公主受册尚儀二人讀册司賛一人引公主掌賛二人知賛拜女史四人對舉册案前一日尚舎守宫計㑹設使者及册案使次於光範門及長樂門外皆道右東向司賛設公主位於長樂門内殿前近南當階北面西上又分設内命婦應陪位者於公主東北及西北嬪御等在東宫官等在西皆重行相對北上又於内命婦之前設尚儀位二皆東向以北為上又於尚儀位南少退設司賛位掌賛二人陪其後其日典儀設册使位於長樂門外之西東向北上又設舉册案者位二在南差退俱東向内謁者監預取公主册案置於長樂門外近限内命婦已下及應在位者並服禮衣先就位公主花釵翟衣司言引就位持節者立於使者之北少退持册案者立於册使副使西南俱東向持節者去節衣持册案者並以案進册使之右北向相次而立内侍二人引使詣門内謁者舉案少前使取公主册跪置册於内案俛伏興通事舎人引册使副使等俱退就次以俟尚儀帥女史詣門舁册案入各就尚儀之前對舉册案皆東向司賛曰再拜凡司賛有辭掌賛皆承傳司言贊公主再拜在位者皆再拜尚儀取公主册於案凡尚儀取册訖持案者以案退少前北面稱有制司言贊公主再拜尚儀執册跪讀訖退復位以册進授公主公主受册以授司言訖司贊曰再拜公主再拜在位者皆再拜司賛少前稱禮畢司言賛公主退在位者以次退掌賛報内謁者監禮畢内謁者監傳報册使等册使等詣太極殿前南横街南北面西上立中書令立於册使等東北西面册使等再拜復命曰奉制册命某公主禮畢又再拜中書令奏聞册使等退幡節各還夲司納采前一日主人設使者次於大門之外道右南向其日大昕使者至於主人大門外賛禮者延入次凡賔主及行事者皆公服使者出次賛禮者引至大門外之西東面主人立於東階下西面儐者立於主人之左北面受命出立於門東西面曰敢請事使者曰朝恩貺室於某公之子某某公有先人之禮使某也請納采某公稱父名某也使者名儐者入告主人曰寡人敢不敬從儐者出告掌畜者以鴈授使者退立於後使者左手執之賛禮者引主人迎於大門外東西面再拜使者不答拜主人揖入使者從入主人入門而右使者入門而左至内門主人又揖入至内霤將曲揖當階揖使者皆不答至階主人曰請吾子升使者曰某敢辭主人曰固請吾子升使者曰某敢固辭主人曰終請吾子升使者曰某敢終辭主人升東階當阿西面使者升西階當阿東面使者曰敢納采主人阼階上北面再拜進立於楹間南面使者進立於主人之西俱南面使者授鴈降自西階以出問名使者既出遂立於内門外之西東面主人還阼階東左右受鴈於序端主人降立於阼階下西面儐者進受命出請事使者曰某既受命將加諸卜敢以禮問名儐者入告主人曰寡人不敢辭儐者出告掌畜者以鴈授使者退立於後賛禮者引主人迎於内門外之東西面揖使者以入使者入再拜揖至階三讓如初主人升阼階當阿西面使者升西階當阿東面使者曰敢問名主人阼階上北面再拜進立於楹間南面使者進立於主人之西俱南面使者授鴈還立於西階上東面主人還阼階上西面曰皇帝第某女某封公主使者降出立於内門外之西東面主人還阼階東左右受鴈於序端主人降立於阼階下西面儐進受命出請事使者曰禮畢儐者入告主人曰吾子為事故至於寡人之室寡人有先皇之禮請禮從者使者曰某既得將事敢辭儐者入告主人曰先皇之禮敢固以請儐者出告使者曰某辭不得命敢不從儐者又告賛禮者引主人立於序端賛禮者於户牖之間鋪莞筵粉純加藻席緇純設甒醴於東房西牖下加勺羃設篚在樽北實觶一角柶一加羃籩豆在篚北實以脯醢設洗於東房近北罍水在洗西篚在洗東北肆篚實以巾加勺羃施設訖賛禮者引主人降迎使於内門外之東西面主人揖使報揖主人與使者俱入至階一讓升主人於阼階上北面再拜賔西階上北面答拜主人受几於序端掌事者内拂几三奉两端西北向進主人東面向外拂几以三振袂内執之進西北向拜使者迎受於筵前東南向以俟主人還東階上北面送西面立使者以几避進北面坐設於坐左興退於西階上北面答拜立於阼階西東面賛者盥手洗觶酌醴加柶覆之面葉出房南面主人受醴面柄進筵前西北面立使者西階上北面一拜送賛者薦脯醢於筵前使者進升筵坐左執觶右取脯擩於醢祭於籩豆之間以柶祭醴三始扱一祭又极再祭興以柶兼諸觶上臘降筵於西階上北面坐啐醴建柶奠觶遂拜執觶興主人答拜使者進升筵坐奠觶於薦東降筵立於西階上東靣掌事者牽两馬入陳於門内三分庭一在南北首西上掌事者奉篚幣升自東階主人受於序端進西面立使者西階上北面再拜主人進楹間南面立使者進立於主人之西俱南靣主人以篚幣授使者使者受退立於西階上東面主人還阼階上北面拜送使者降自西階從者迓受幣使者揖馬以出牽馬者從之使者出大門外之西東靣立從者迓受馬主人出門東西面拜送使者退主人入立於東階下西面儐者告於主人曰賔不顧矣主人乃還於寢納吉前一日主人設使者次如常儀其日大昕使者至主人大門外賛禮者延入次使者出次賛禮者引立於大門外之西東面主人立於阼階下西面儐者進受命出請事使者曰加諸卜占曰吉使其也敢告儐者入告主人曰某公有吉寡人預在焉寡人不敢辭儐者出告掌畜者以鴈授使者退立於後賛禮者引主人迎於大門外之東西面再拜使者不答主人揖入使者從入主人入門而右使者入門而左至内門主人又揖入再揖至階三讓如初主人升阼階當阿西面使者升西階當阿東面使者曰敢納吉主人阼階上北面再拜進北面受㕍使者䧏自西階出立於内門外之西東面立主人還阼階東左右受鴈於序端主人降立於阼階下西面儐者進受命出請事使者曰禮畢其禮賔如問名之儀納徵前一日主人設使者次如常儀其日大昕使者至主人大門外賛禮者延入次掌事者入布幕於内門之外𤣥纁束陳於幕上乘馬在幕南北首西上掌事者奉璋以匵俟於幕東西面使者出次賛禮者引立於大門外之西東面主人立於東階下西面儐者進受命出請事使者曰朝恩貺室於某公之子某某公有先人之禮使某也以束帛乘馬請納徵儐者入告主人曰某公順先典貺以重禮寡人敢不承命儐者出告賛禮者引主人迎於大門外之東西面再拜使者不答拜主人揖入使者從入主人入門而右使者入門而左至内門主人立於門東西面使者立於門西東面掌事者坐啓匵取璋加於𤣥纁上與以授使者退復位使者奉玉帛主人揖興使者俱入牽乘馬者從入三分庭一在南北首西上主人入再揖至階三讓如初主人升阼階當阿西面使者升西階當阿東面使者曰敢納徵主人阼階上北面再拜進立於楹間南面使者進立於主人之西俱南面使者授玉帛降自西階出立於門内外之西東面主人還阼階東左右受玉帛於序端受馬者自左受之以東牽馬者既授馬自門西出儐者進受命出請事使者曰禮畢其禮賔如納吉之儀請期前一日主人設使者次如常儀其日大昕使者至主人大門外賛禮者延入次使者出次賛禮者引立於大門外之西東面主人立於東階下西面儐者進受命出請事使者曰某公有賜既申受命某公使某請吉日儐者入告主人曰寡人既前受命惟命是聽儐者出告使者曰某公命某聽命於王儐者入告主人曰寡人固惟命是聽儐者出告使者曰某公使某受命於王王不許某敢不告期曰某日儐者入告主人曰寡人敢不敬須儐者出告掌畜者以鴈授使者退立於後賛禮者引主人迎於大門外之東西面再拜使者不答拜主人揖入使者從入主人入門而右使者入門而左至内門主人又揖入再揖至階三讓如初主人升阼階當阿西面使者升西階當阿東面使者曰敢告期主人阼階上北面再拜進立於楹間南面使者進立於主人之西俱南面使者授鴈降自西階出立於内門之西東面主人還阼階東左右受鴈於序端主人降立於阼階下西面儐者受命出請事使者曰禮畢其禮賔如納徵之儀親迎前一日主人設賔次如常儀其日大昕壻之父服其服告於襧廟以酒脯告之一獻無廟者告於正寢將行父醮子於正寢贊者布席於東序西向又設席於户牖之間南向父公服坐於東序西向子服其上服升自西階進立於席西南向贊者酌酒進北面以授子再拜受贊者薦脯醢於席前脯醢出自房子升席跪左執爵右取脯擩於醢祭於籩豆之間右祭酒執爵興降席西面跪飲卒爵奠爵再拜執爵興贊者受虚爵還於尊所子進立於父前東面父命之曰徃迎爾相承我宗事勗率以敬先妣之嗣若則有常庶子但云徃迎爾相勗率以敬子再拜曰不敢忘命又再拜䧏出乗輅備威儀詣主人之第賔將至内贊者布席於東房當户西向設樽甒醴於東房東北隅加勺羃篚在樽南實觶一角柶一加羃脯醢在篚南賔至主人大門外降輅贊禮者引停於次公主著花釵服褕翟纁􅀈入於房即席南向立姆服禮衣立於右從者陪其從主人升自阼階立於户外之東西面贊者以觶酌醴加柶覆之面柄進筵前北面公主降席西南面再拜受觶内贊者薦脯醢於筵前公主升席跪左執觶右取脯擩於醢祭於籩豆之間遂以柶祭醴三始扱一祭又扱再祭興筵末坐啐醴建柶執觶興奠觶於薦東降筵西南面再拜就席立内贊者徹薦觶主人降立於東階東南西向面贊禮者引賔出次立於門西東面儐者進受命出門東西面曰敢請事賔曰某王命某之父以兹初昏某將請承命儐者入告主人曰寡人固敬具以須儐者出告賛禮者引主人迎於大門外之東西面再拜賔答拜主人揖賔報揖主人入掌畜者以鴈進賔受鴈左手執之以入及寢門主人曰請賔入賔曰某弗敢以先主人曰固請賔入賔曰某固弗敢以先主人揖賔報揖主人與賔俱入及内霤將曲揖當階揖賔皆報揖至階主人曰請升賔曰某敢辭主人曰固請賔升賔曰某敢固辭主人曰終請賔升曰某敢終辭主人升阼階東西面立賔升西階進當房户北面跪奠雁興再拜降出主人不降送初賔入門主婦出立於房户外之西南面於賔拜訖姆導公主出主人少進西面戒之必有正焉若衣若筓命之曰戒之敬之夙夜無違命主婦戒於西階上施衿結帨戒之曰勉之敬之夙夜無違公主至車後賔揖授綏姆辭不受曰未教不足與為禮公主乘以几從者二人坐相對持之姆加景賔乃馭輪三周馭者代之賔出大門乘輅還第如來儀公主鹵簿次後而行同牢初婚掌事者設洗於東階東南東西當東霤南北以堂深罍水在洗東篚在洗西南肆篚實二巾二爵設公主之洗於東房近北罍水在洗西篚在洗東北肆皆加勺羃設饌於東房西牖下障以帷豆簠簋鈃俎之數各依其品瓦豋一皆加巾盖羊豕節折大羮在於爨樽於室内北牖下𤣥酒在西加羃勺皆南柄羃夏用絺冬用組樽於堂上東無𤣥酒篚在南實四爵合卺加勺羃其器皆烏漆惟豋以陶卺以匏壻至降車以俟公主至降車北面立壻南面揖公主以入及寢門又揖以入公主從者席於奥東向壻導公主升自西階即席東面立公主升立於樽西南面壻盥於南洗公主從者沃之公主盥於北洗壻從者沃之贊者以饌入設於席前贊者設醬於席前葅醢在其北俎三入設於豆東腊俎特於豆北豆東俎醢之東贊者設黍於醬東稷在東設湇於醬南饌要方設對醬於東對醬婦醬也設之當特俎葅醢在其南北上設黍於腊北其西稷稻粱設湇於醬北贊者啓㑹㕁於簠簋南對簠簋於北啓發也皆加匕箸壻從者布對席於饌東贊者西南告饌具壻揖公主公主即對席西面皆坐贊者皆授匕箸各以葅擩於醢皆祭於豆間又皆祭黍贊者各取肺皆絶末以授皆祭贊者以肺加於俎贊者各移黍置於席上授肺脊皆食以湇醬三飯卒食贊者二人俱洗爵於北洗酌於室内之樽詣饌南北面以酳壻及公主皆興再拜受爵贊者北面答再拜壻及公主皆坐祭酒贊者以肝從皆奠爵取肝振祭嚌之賛者皆受實於俎豆各取爵皆飲執爵興賛者受爵壻及公主皆再拜賛者以爵復於篚又以爵酌酒再酳壻及公主仍立受爵坐飲卒爵興贊者受爵復於篚三酳用巹如再酳壻及公主仍立於席後賛者皆降東階洗爵升酌於户外樽至饌南北面俱跪奠爵興再拜賛者坐取爵遂飲卒爵奠爵遂拜執爵興降奠於篚壻出公主退立於樽西南賛者徹饌設於房内徹室内樽以出壻脫冕服於房公主從者受之公主脱服於室壻從者受之姆授巾壻從者袵之於奥公主從者袵良席在東皆有枕北趾壻入燭出從公主者餕壻之餘從壻者餕公主之餘賛者酌户外階東樽酳之見舅姑見之日公主夙興沐浴著花釵服䄖翟至於舅姑寢門之外賛者布舅席於東序西向布姑席於房户外之西南向布公主席於室戸西南向在姑席之西少北側樽甒醴於房内東壁下加勺羃篚在北實觶一角柶一篚加羃籩豆各一又在篚北設洗於東房近北罍水在洗西篚在洗東北肆實以巾爵加勺羃質明舅公服姑著鈿釵禮衣俱即席後立公主執笲棗栗從者執笲服脩以從女相引公主入門升自西階東面再拜進奠棗栗於舅席前興舅姑並撫之内賛者進徹以東公主退復東面位又再拜降自西階受笲腶脩升進北面再拜跪奠於姑席前興姑坐舉之内賛者進徹以東公主退復北面位又再拜女相者引公主立於席西南面内賛者詣罍洗盥水洗觶酌醴加柶面柄出房進詣公主席前北面立公主進東面再拜受醴退復位内賛者西階上北面拜送遂薦脯醢於席前公主升席坐左執觶右取脯擩於鹽祭於籩豆之間以柶祭醴三始扱一祭又扱再祭加柶於觶面葉興降席西東面坐啐醴建柶興拜内贊者答拜公主進升席跪奠觶於豆東降自西階以出盥饋舅姑公主盥饋以少牢舅姑公服鈿釵禮衣公主花釵䄖翟贊者布席於室之奥舅姑共席坐俱東面南上賛者設樽於室内北牖下饌於房内西牖下其饌如同牢牲體皆節折左載之舅且右載之姑且舅姑即席東向坐女相引公主入升自西階入房以醬進設於舅姑席前興少退西向立其他饌從者設之皆加匕箸俱以南為上且入各設於豆東訖賛者各授箸舅姑各以韮葅擩於醬祭豆間又祭飲訖乃食三飯卒食公主入於房盥洗爵入室酌酒酳舅進奠爵於舅席前少東西面再拜舅取爵祭酒飲之公主受爵入房奠於篚又盥洗爵酌酒酳姑如酳舅之禮内贊者設公主席於舅姑東北南向公主徹醬設於席前餘饌從者設之公主進西面再拜退升席南向坐將餕舅饌舅命易醬内贊者易之公主乃餕姑之饌公主祭内賛者賛之既祭乃食三飯卒食内賛者洗爵酌酒酳公主公主降席西面再拜受爵升席坐祭酒飲訖執爵興降席東面立内賛者受爵奠於篚公主進西面再拜舅姑興先降自西階公主降自阼階婚㑹其日主人至於賔大門外之西東面立賔立於東階下西面儐者進於賔左北面受命出於大門外之東西面曰敢請事主人曰某有嘉禮請公有顧王則稱王以下准此儐者入告遂引賔出大門外之東西面拜主人答拜主人曰某有嘉禮請公有顧賔曰敢辭主人曰敢固請賔曰辭不得命敢不從主人拜賔答拜主人還賔遂與諸親從之贊者預鋪賔席於堂上楹間近北南向設賔之宗室席位於賔席西南賔之異姓席位於宗室之南又於西廊下設異姓席位皆重行東向以北為上設主人席位於東階上西向設主人宗室席位於主人東北設異姓席位於宗室之北皆重行西向以南為上又設主人異姓席位於東廊下重行西向以北為上賔至立於主人大門外之西東面賔之宗室立於賔西南異姓立於宗室之南俱重行東面以北為上贊禮者引主人出立於大門外之東西南主人諸親立於大門内之東重行西向以南為上立定主人西面再拜賔東面答拜主人揖賔賔報揖賛禮者引主人又賛禮者引賔以入賔之諸親以次從入至内門主人諸親從入如常至階主人揖賔賔報揖賔主及諸親以次升各立於席後其在庭者亦如之立定賔主及諸親俱坐執爵者酌酒升自東階酒升堂賔主及諸親皆起立執爵者以酒授主人贊禮者引主人進詣賔前北向立自席西進東向受爵賛禮引主人退復位賔還席後賔主及諸親俱坐執爵者又以酒授主人及諸親賔主俱祭而後飲諸親不祭而飲爵行一周食升堂賔主及諸親皆起掌食者以醢醬豆授主人賛禮者引主人進設於賔席前賔曰請公無辱主人曰不敢㤀禮贊禮者引主人退復位執饌者以饌設於賔主席前加以匕箸執饌者又以饌設於衆賔以下置設訖賔主及諸親皆坐賔主皆祭而食諸親不祭而食於賔祭主人辭曰疏食不足祭賔主俱食三飯而止主人曰請公食賔更飯食畢遂進庻饈觴行如常㑹畢賔主及諸親俱興贊禮者各引賔主以下降出賔主及賔之諸親皆復門外位主人諸親復門内位主人再拜送賔退賛禮者引主人入婦人禮㑹女賔乗車入至下車所内儐者引入主人迎送於閤内相稱之辭各准其夫餘如丈夫之禮饗丈夫送者其日掌事者鋪賔席於堂上楹間近北南向又鋪主人席於阼階上西向又設衆賔之席於賔西南設從者席位於西廊下俱重行東向以北為上賛禮者引賔以下立於主人門外之西重行東向以北為上立定賛禮者引主人立於門東西面主人揖賔報揖賛禮者各引賔主以下至階主人揖賔報揖賔主以下俱升立於席後立定賔主以下俱坐遂進酒設食如婚㑹之儀㑹畢賔主以下俱興賛禮者引賔立於西階上東面主人掌事者牽乘馬入陳於門内三分庭一在南北首西上又掌事者奉束帛之篚升以授主人主人執篚西面立賔西階上北面再拜主人進楹間南面賔進立於主人之右俱南面主人授篚賔受之退立於西階上東面主人還阼階上北面再拜送賛禮者引賔以下降自西階從者迓授篚賔及庭東面揖左馬以出牽馬者從之在庭者以次出俱復門外位從者迓受馬初賔出賛禮者引主人降自東階出門東西面拜送賔退主人入饗婦人送者其日女賛者鋪賔席於堂上楹間近北南面又鋪主人席於阼階上西向又設衆賔席於賔西南設從者席位於西廊下俱重行東向以北為上女相者引賔以下立於主人門外之西重行東面以北為上立定女相者引主人出於門内之東西面女相者引賔入衆賔以下從入賔入門西東面立定賔主以次進至階俱升各立席後上下立定俱坐遂進酒設食如婚㑹之儀畢賔主上下俱興女相者引賔立於西階上東面女贊者奉束帛之篚升以授主人主人執篚進於楹間南面立女贊者引賔進入立於主人之右俱南面主人授幣訖女相者引賔降出從者迓受篚衆賔以下從出初賔降女相者引主人降送於門内賔出女相者引主人入大唐開元禮卷一百十六
