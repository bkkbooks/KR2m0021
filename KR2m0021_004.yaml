尉少退東向再拜訖謁者引太尉進昊天上帝神坐前北向立諸太祝各以爵酌罍福酒合置一爵一太祝持爵進太尉之右西向立太尉再拜受爵跪祭酒遂飲卒爵太祝進受虛爵復於坫太尉興再拜訖謁者引太尉降復位初太尉獻將畢謁者引光祿卿詣罍洗盥手洗拭匏爵升酌盎齊獻正座配座終獻如亞獻之儀訖謁者引光祿卿降復位初太尉將升獻謁者七人分引五方帝及大明夜明等獻官詣罍洗盥手洗拭匏爵訖各由其陛升俱酌泛齊訖各進跪奠於神座前興各引降還本位初第一等獻官將升謁者五人次引獻官各詣罍洗盥訖引各由其陛升壇詣第二等內官酒尊所俱酌醍齊各進跪奠爵於內官首座興餘皆祝史齋郎助奠相次而畢謁者各引獻官還本位初第二等獻官將升謁者四人次引獻官俱詣罍洗盥手各由其陛升壇詣第三等中官酒尊所俱酌清酒沈齊以獻贊引四人次引獻官詣罍洗盥洗詣外官酒尊所俱酌清酒以獻贊引四人次引獻官詣罍洗盥洗詣外官酒尊所俱酌清酒以獻贊引四人次引獻官詣罍洗盥洗詣衆星酒尊所酌旨酒以獻其祝史齋郎酌酒助奠皆如內官之儀訖謁者贊引各引獻官還本位諸獻俱畢武舞止上下諸祝各進跪徹豆興還尊所徹者籩豆各一少移於故獻處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福者不拜豫和之樂作太常卿前奏稱再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜樂一成止太常卿前奏請就望燎位太常卿引皇帝樂作皇帝就望燎位南向立樂止於羣官將拜上下諸祝各執篚進神座前取玉幣祝版日月以上齋郎以爼載牲體稷黍飯及爵酒各由其陛降壇南行經柴壇西過壇東行自南陛登柴壇以玉幣祝版饌物置於柴上户內諸祝又以內官已下之禮幣皆從燎奉禮曰可燎東西面各六人以炬燎火半柴太常卿前奏禮畢太常卿引皇帝還大次樂作皇帝出中壝門殿中鹽前受鎮圭以授尚衣奉御殿中監又前受大圭華蓋侍衛如常儀皇帝入次樂止謁者贊引祀官通事舍人分引從祀羣官諸方客使以次出贊引引御史太祀以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出鑾駕還宫皇帝既還大次侍中版奏請解嚴將士不得輒離部伍皇帝停大次一刻頃捶一鼓為一嚴轉仗衛于還途如來儀三刻頃捶二鼓為再嚴將士布隊仗侍中版奏請中嚴皇帝服通天冠綘紗袍諸祀官朝服乘馬者服袴褶五刻頃捶三鼓為三嚴通事舍人分引羣官客使等序立於大次之前近南文武侍臣詣大次奉迎乘黃令進金輅於大次門外南向千牛將軍立于輅右侍中版奏外辦太僕卿升執轡皇帝乘輿出次繖扇侍衛警蹕如常儀皇帝升輅太僕卿立授綏黃門侍郎奏稱請鑾駕進發退復位鑾駕動稱警蹕如常儀黃門侍郎贊者夾引千牛將軍夾輅而趍至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬畢黃門侍郎奏稱請敕車右升侍中前承制退稱制曰可黃門侍郎復位千牛將軍升訖黃門侍郎奏稱請鑾駕進發退復位鼓傳音鑾駕動鼓吹振作而還文武羣官導從如來儀諸方客使便還館駕至承天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立于輅右訖鑾駕動千牛將軍夾輅而趨駕入嘉德門太樂令令撞蕤賔之鐘左五鐘皆應鼓柷奏采茨之樂至太極門戛敔樂止入太極門鼓柷奏太和之樂駕至橫街北當東上閣回輅南向侍中進鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅乘輿以入繖扇侍衛警蹕如常儀侍臣從至閣戛敔樂止初文武羣官至承天門外通事舍人承旨敕羣官並還皇帝既入侍中版奏請解嚴叩鉦將士各還其所大唐開元禮卷四
