body:
  text: 大唐開元禮卷四唐蕭嵩等撰吉禮皇帝冬至祀圜丘齋戒陳設省牲器鑾駕出宫奠玉幣進熟鑾駕還宫齋戒前祀七日平明太尉誓百官於尚書省曰某月某日祀昊天上帝於圜丘各揚其職不供其事國有常刑皇帝散齋四日於别殿致齋三日其二日於太極殿一日於行宫前致齋一日尚舍奉御設御幄於太極殿西序及室內俱東向尚舍直長張幃於前楹下致齋之日質明諸衛勒所部屯門列仗晝漏上水一刻侍中版奏請中嚴諸衛之屬各督其隊入陳於殿庭如常儀通事舍人引文武五品已上袴褶陪位如式諸侍衛之官各服其器服諸侍臣並結珮凡齋者則結珮俱詣閣奉迎上水二刻侍中版奏外辦上水三刻皇帝服衮冕結珮乘輿出自西房曲直華蓋警蹕侍衛如常儀皇帝即御坐東向坐侍臣夾侍如常一刻頃侍中前跪奏稱侍中臣某言請降就齋室俯伏興還侍位皇帝降坐入室文武侍臣各還本司直衛者如常通事舍人分引陪位者以次出凡預祀之官散齋四日致齋三日散齋皆於正寢致齋二日於本司一日於祀所其無本司則皆於祀所近侍之官應從升者及從祀羣官諸方客使各於本司及公館清齋一日無本司者各於正寢散齋理事如舊不弔喪問疾不作樂不判署刑殺文書不行刑不預穢惡致齋唯祀事得行其餘悉斷其祀官已齋而闕者通攝行事諸祀官致齋之日給酒食及明衣各習禮於齋所光祿卿監取明水火太官令取水於隂鑒取火於陽燧火以供爨水以實尊前祀二日太尉告髙祖神堯皇帝廟如常告之儀告以配神坐主前祀一日諸衛令其屬未後一刻各以其方器服守衛壝門每門二人每隅一人與大樂工人俱清齋一宿陳設前祀三日尚舍直長施大次于外壝東門之內道北南向尚舍奉御鋪御座衛尉設文武侍臣次於大次之前文官在左武官在右俱相向設諸祀官次於東壝之外道南從祀文官九品已上於祀官之東東方南方朝集使於文官之東東方南方蕃客又於其東俱重行每等異位北向西上介公酅公於西壝之外道南武官九品已上于介公酅公之西西方北方朝集使于武官之西西方北方蕃客又于其西俱重行每等異位北向東上其褒聖侯若在朝位於文官三品之下陳設饌幔於內壝東門西門之外道北南向南門北門之外道東西向壇上及東方午陛之東饌陳于東門外西方及南方午陛之西饌陳于西門外北方之饌陳于北門外前祀二日太樂令設宫懸之樂於壇南內壝之外東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹雷鼓於北懸之內道之左右植建鼓於四隅置柷敔於懸內柷在左敔在右設歌鐘歌磬于壇上近南北向磬簴在西鐘簴在東其匏竹者立于壇下重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上右校掃除壇之內外郊社令積柴於燎壇其壇于神壇之景地內壝之外景通典作壬案景即丙字唐諱丙丙南方壬北方未知誰屬也方一丈髙一丈二尺開上南出户方六尺前祀一日奉禮設御位於壇之東南西向設望燎位當柴壇之北南向設祀官公卿位於內壝東門之外道南分獻之官于公卿之南執事者位於其後每等異位俱重行西向北上設御史位于壇下一位於東南西向一位於西南東向設奉禮位於樂懸東北贊者二人在南差退俱西向又設奉禮贊者位于燎壇東北西向皆北上設協律郎位于壇上南陛之西東向設太樂令位于北懸之間當壇北向設從祀文官九品已上位於執事之南東方西方朝集使於文官之南東方南方蕃客又於其南俱每等異位重行西向北上介公酅公位中壝西門之內道南武官九品已上位于介公酅公之南西方北方朝集使于武官之南西方北方蕃客又於其南俱每等異位重行東向北上其褒聖侯於文官三品之下諸州使人各分方位于朝集使之後又設祀官及從祀羣官等門外位于東西壝門之外如設次之式設牲榜于東壝之外當門西向蒼牲一居前又蒼牲一又青牲一在北少退南上次赤牲一次黃牲一白牲一元牲一又赤牲一白牲一在南皆少退以北為上又設廩犧令位于牲西南史陪其後俱北向設諸太祝位於牲東各當牲後祝史陪其後俱西向設太常卿位省牲位於牲前近北又設御史位於太常卿之西俱南向設酒樽之位上帝太樽二著樽二犧樽二山罍二在壇上東南隅北向象樽二壺樽二山罍四在壇下南陛之東北向俱西上設配帝著樽二犧樽二象樽二山罍二在壇上於上帝酒樽之東北向西上五帝日月各太樽二在第一等內官每陛間各象樽二在第二等中官每陛間各壺樽二在第三等外官每道間各概樽二於壇下衆星每道間各散樽二於內壝之外凡樽各設于神座之左而右向樽皆如勺羃五帝日月以上皆有坫以置爵設御洗於午陛東南亞獻終獻同洗於卯陛之南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設分獻罍洗篚羃各於其方陛道左俱內向執樽罍篚羃者各于樽罍篚羃之後設玉幣之篚于壇上下樽坫之所祀前一日晡後太史令郊社令各常服帥其屬升設昊天上帝神座于壇上北方南向席以藁秸設髙祖神堯皇帝神座于東方西向席以莞設五方帝日月神座於壇第一等青帝于東陛之北赤帝於南陛之東黃帝于南陛之西白帝于西陛之南黑帝于北陛之西大明于東陛之南夜明于西陛之北席皆以藁秸又設五星十二辰河漢及內官五十五座於第二等十有二陛之間各依方面凡席皆內向其內官有北辰座於東陛之北曜魄寶於北陛之西北斗於南陛之東天乙太乙皆在北斗之東五帝內座於曜魄寶之東並差在行位前又設二十八宿及中官一百五十九座于第三等其二十八宿及帝座七公日星帝席太角攝提太微太子明堂軒轅三台五車諸王月星織女建星天紀等一十七座並差在行位前又設外官一百五座于內壝之內又設衆星官星三百六十座於內壝之外各依方次十有二道之間席皆以莞設神位各于坐首所司陳異寶及嘉瑞等于樂懸之北東西廂昊天上帝及配帝五帝日月之座設訖却收至祀日未明五刻郊社令各服其服升壇重設之其內官中官外官衆星等詣坐一設定不收也省牲器省牲之日午後十刻去壇二百步所諸衛之屬禁斷行人晡後二刻郊社令丞帥府史三人及齋郎以樽坫罍洗篚羃入設于位凡升壇者各由其陛晡後三刻謁者贊引各引祀官公卿已下俱就東壝門外位諸太祝與廩犧令以牲就榜位謁者引司空贊引引御史入詣壇東陛升行掃除於上樂懸于下訖出還本位初司空將升又謁者引太常卿贊引引御史入詣壇東陛升視滌濯於視濯溉執尊者皆舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又北面舉手曰腯還本位諸太祝各循牲一匝西向舉手曰充俱還本位諸太祝廩犧令以次牽牲詣厨授太官謁者引光祿卿詣厨省鼎鑊申視濯溉謁者贊引各引祀官御史詣厨省饌具訖俱還齋所祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲鑾駕出宫前出宫三日本司宣攝內外各供其職尚舍設行宫于壇東南向隨地之宜守宫設從祀官五品以上次於朝堂如常儀前二日太樂令設宫懸之樂於殿庭如常儀駕出懸而不作其日晝漏上水五刻鑾駕發前七刻捶一鼓為一嚴三嚴時節前一日侍中奏裁也侍中奏開宫殿門及城門未明五刻捶二鼓為再嚴侍中版奏請中嚴奉禮郎設從祀羣官五品已上位文官於東朝堂之前西向武官於西朝堂之前東向俱重行北上酅公介公位於武官北東向從祀羣官五品已上依時刻俱集朝堂次各服其服所司陳大駕鹵簿於朝堂發前二刻捶三鼓為三嚴諸衛之屬各督其隊與鈒戟以次入陳於殿庭通事舍人引從祀羣官各就朝堂前位諸侍衛之官各服其器服侍中中書令以下皆詣西階奉迎侍中負寶如式乘黃令進玉輅於太極殿西階之前南向千牛將軍一人執長刀於輅前北向黃門侍郎一人在侍臣之前贊者二人又在黃門之前侍中版奏外辦太僕卿攝衣而升正立執轡皇帝服衮冕乘輿以出降自西階稱警蹕如常儀千牛將軍前執轡皇帝升輅太僕卿立授綏侍中中書令以下夾侍如常黃門侍郎進當鑾駕前跪奏稱黃門侍郎臣某言請鑾駕進發俯伏興退復位凡黃門侍郎奏請皆進鑾駕前跪奏稱某官臣某言訖俯伏興鑾駕動又稱警蹕黃門侍郎與贊者夾引以出千牛將軍夾輅而趍駕出承天門至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黃麾內符寶郎奉六寶與殿中監後部從在黃鉞內侍中中書令以下夾侍於輅前贊者在供奉官人內侍臣上馬畢黃門侍郎奏稱請敕車右升侍中前承制退稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏稱請鑾駕進發退復位鑾駕動稱警蹕鼓傳音如常不鳴鼓吹不得喧譁其從祀官在元武隊後如常儀駕將至諸祀官俱朝服結珮謁者引立於次前重行北向西上駕至行宫南門外回輅南向將軍降立於輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還侍位皇帝降輅乘輿入行宫繖扇華蓋侍衛警蹕如常儀宿衛如式謁者贊引各引祀官通事舍人分引文武羣官集行宫朝堂文左武右舍人承旨敕羣官等各還次奠玉帛祀日未明三刻諸祀官及從祀之官各服其服郊社令良醖令各帥其屬入實樽罍玉幣凡六樽之次太樽為上實以泛齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以清酒配帝著尊為上實以泛齊犧尊次之實以醴齊象尊次之實以盎齊山罍為下實以清酒五帝日月俱以太尊實以泛齊其內官之象尊實以醴齊中官之犧尊實以盎齊外官之概尊實以清酒衆星之散尊實以清酒齊皆加明水酒皆加玄酒各實于上尊玉上帝以蒼璧青帝以青圭赤帝以赤璋白帝以騶虞黑帝以玄璜黃帝以黃琮日月以圭璧昊天上帝及配帝之幣以蒼五天帝日月內官以下各從方色各長一丈八尺太祝以玉幣置於篚太官令帥進饌者實諸籩豆簠簋等各設于饌幔內未明二刻奉禮帥贊者先入就位贊引引御史博士諸太祝及令史祝史與執尊罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執尊罍篚羃者各就位贊引引御史諸太祝詣壇東陛御史一人太祝二人升行掃除於上及第一等御史一人太祝七人升行掃除于下訖各引就位未明一刻謁者贊引各引祀官及從祀羣官客使等俱就門外位太樂令帥工人二舞次入就位文舞入陳于懸內武舞立于懸南道西其升壇坐者皆脫履於下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行掃除於上降行樂懸於下訖引復位謁者贊者各引祀官及從祀羣官客使等次入就位初未明三刻諸衛列大駕仗衛陳設如式侍中版奏請中嚴乘黃令進玉輅于行宫南門外回輅南向若行宫去壇稍逺嚴警如武未明一刻侍中版奏外辦皇帝服衮冕乘輿以出繖扇華蓋侍衛如常儀侍中負寶陪從如式皇帝升輅如初黃門侍郎奏請鑾駕進發還侍位鑾駕動稱警蹕如常千牛將軍夾輅而趍若行宫去壇稍逺奏升輅如式駕至大次外回輅南向若將軍升輅即降立於輅左侍中進當鑾駕前奏侍中臣某言請降輅俯伏興還侍位皇帝降輅乘輿之大次繖扇華蓋侍衛如常儀郊社令