body:
  text: 大唐開元禮卷一唐蕭嵩等撰序例上擇日神位俎豆擇日凡國有大祀中祀小祀昊天上帝五方上帝皇地祇神州宗廟皆為大祀日月星辰社稷先代帝王嶽鎮海瀆帝社先蠶孔宣父齊太公諸太子廟並為中祀司中司命風師雨師靈星山林川澤五龍祠等並為小祀州縣社稷釋奠及諸神祀並同為小祀凡大祀中祀應卜日者及册命大事加元服納后巡狩親征封禪太子納妃出師命將並前七日卜日於太廟南門之外小祀應筮日者及諸王冠婚公主降嫁等並筮日於太廟南門之外若雩祀之典有殊古法傳曰龍見而雩自周以來嵗星差度今之龍見乃在仲夏之初以祈甘雨遂為晚矣今用四月上旬卜日又先蠶之祀合用季春吉日若其年節氣晚即於節氣後卜日前一日右校掃除太廟南門之外守宫設太常卿以下次于門外之東階西向其日平明太卜令卜正占者其占者以太卜官之明卜者為之俱就次各服公服謁者贊引各給公服守宫布卜席于闑西閾外西向謁者告事具謁者引太常卿升立于門東西向贊引引太卜令卜正占者立于門西東面卜正先抱龜奠于席上西首灼龜之具奠于龜北執龜立于席東北面太卜令進受龜詣太常卿前示高太常卿受視訖太卜令受龜少退受命太常卿曰皇帝來日某祗祀于某神尚饗若將有册命大事及國有冠婚之禮則曰來日某有某事庶乎從之太卜令曰諾遂述命還即席西面坐命龜曰假爾太龜有常興授卜正龜負東扉卜正坐作龜訖太卜令進授龜示太常卿卿受視反之太卜令退復位東面與衆占之訖不釋龜進告于太常卿占曰某日從授卜正龜謁者進太常卿之左曰禮畢謁者引太常卿下還次卜者徹龜守宫徹席以退若卜冊命大事太常卿以兆奏聞若上旬不吉即卜中旬中旬不吉即卜下旬皆如初儀若卜吉日及非大事皆太卜令蒞卜正視高命龜作龜筮日前一日右校掃除太廟南門之外守宫設太卜令以下次于門外之東階西向其日平明太卜令卜正占者其占者以太卜官之明筮者為之俱就次各服公服贊引給公服守宫布筮席于闑西閾外西向贊引引太卜令升立于門東西面卜正占者立于門西東面卜正開韇出䇿兼執之東面受命于太卜令太卜令曰皇帝來日某祭某神于某所尚饗若將有冠婚等禮則曰來日某有某事庶乎從之卜正曰諾遂右還西面以韇擊䇿遂述曰假爾太筮有常皇帝來日某祭某神尚饗乃釋韇坐筮訖興執卦以示太卜令太卜令受視反之卜正退東面與衆占之訖進告于太卜令占曰某曰從贊引進太卜令之左曰禮畢贊引引太卜令以下還次卜正徹韇䇿守宫徹席以退若上旬不吉即筮中旬中旬不吉即筮下旬皆如初儀王公以下筮日各附于本卷時享之首神位冬至祀昊天上帝于圜丘壇上以高祖神堯皇帝配坐壇第一等祀東方青帝靈威仰南方赤帝赤熛怒中央黃帝含樞紐西方白帝白招拒北方黑帝叶光紀及大明夜明七座壇第二等祀天皇大帝北辰北斗天一太一紫微五帝座並差在行位前餘內官諸坐及五星十二辰河漢都四十九座齊列俱在第二等十二陛之間壇第三等祀中官市垣帝座七公日星帝席大角攝提太微太子明堂軒轅三台五車諸王月星織女建星天紀等十七座及二十八宿並差在前列中宫餘一百四十二座齊列皆在第三等十二陛間又祀外官一百五坐於內壝之內又設衆星之坐三百六十坐于內壝之外案唐六典曰祀五帝及大明夜月于壇之苐一等祀內官五十五坐于壇之第二等祀中官一百五十九坐于壇之第三等祀外官一百五坐衆星三百六十坐于內壝之內與此處星數祀制略異右按此神位蓋是渾儀制圖聖人觀象羲和所職推步有徴所謂昊天上帝者蓋元氣廣大則稱昊天據逺視之蒼蒼然則稱蒼天人之所尊莫過于帝託之于天故稱上帝故書曰欽若昊天日月星辰以授人時周官曰以禋祀昊天上帝以實柴祀日月星辰即知天以蒼昊為名不及星辰之例鄭康成云昊天上帝即鈎陳中天皇大帝也謹按天皇大帝亦名曜魄寶自是星中之尊者豈是天乎今于圜丘之上祀昊天上帝又于壇第三等祀天皇大帝則尊卑等列確然殊矣又五方上帝自是五行之神居天地五方者故周以青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方又云兆五帝於四郊又曰大裘而冕以祀昊天上帝祀五帝亦如之此則惟有五帝之名初無上帝之號而鄭康成云五帝即太微之五帝又以為上帝都號六天今按郊壇之位五方帝坐在壇之第一等紫微五帝坐在壇之第二等太微五帝坐在壇之第三等則尊卑之列上下不同矣又五帝之坐位此則有二孰為威仰熛怒之位乎或以為太微五帝之坐位耳謹按傳曰萬物之精上為衆星故天有萬一千五百二十星地有萬一千五百二十物即星之與物各有所主若五帝之神别有空位則衆星之位豈有别神者哉雖神道有殊而至理可見今並依郊壇圖為定正月上辛祈穀祀昊天上帝于圜丘以高祖神堯皇帝配坐又祀五方帝于壇之第一等右按大唐前禮祀感生帝於南郊大唐後禮祀昊天上帝於圜丘以祈榖准左傳曰郊祀后稷以祈農事故啓蟄而郊郊而後耕詩曰噫嘻春夏祈穀于上帝禮記亦曰上辛祈穀于上帝則祈穀之文傳之歷代上帝之號元屬昊天而鄭康成云天之五帝遞王四時王者之興必感其一因其所感别祭尊之故夏正之月祭其所生之帝于南郊以其祖配之故周祭靈威仰以后稷配之因以祈穀據所說祀感帝之意本非祈穀先儒此說事恐難憑今祈穀之禮請准禮修之且感帝之祀行之自久記曰有其舉之莫敢廢也請于祈穀之壇遍祭五方帝夫五帝者五行之精五行者九穀之宗也今請二禮並行六神咸祀孟夏雩祀昊天上帝于圜丘以太宗文武聖皇帝配坐又祀五方上帝于壇之第一等又祀五帝太昊炎帝軒轅少昊顓頊於壇之第二等又祀五官勾芒祝融后土蓐收𤣥冥于內壇之外右按大唐前禮雩祀五方帝五帝五官于南郊大唐後禮雩祀昊天上帝于圜丘且雩祀上帝蓋為百穀祈甘雨故月令云命有司大雩帝用盛樂以祈穀實鄭康成云雩于上帝也夫上帝者天之别號元屬昊天祀于圜丘尊天位也且雩祀五帝行之自久記曰有其舉之莫敢廢也請二禮並行以成大雩帝之義也季秋大享明堂祀昊天上帝以睿宗大聖真皇帝配坐又以五方帝五帝五官從祀右按大唐前禮祀五方帝五帝五官于明堂大唐後禮祀昊天上帝于明堂准孝經曰郊祀后稷以配天宗祀文王于明堂以配上帝先儒以為天是感精之帝即太微五帝此即皆是星辰之例謹按上帝之號皆屬昊天鄭康成所引皆云五帝周禮曰王大旅上帝張氊案設皇邸祀五帝張大次小次由此言之上帝之與五帝自有差等豈可混而為一乎案原本此下有何獨孝經云上帝即為五帝矣又天與上帝原是一神等字今據舊唐書起居舍人王仲丘議中無此語又本辨五帝非上帝而反云上帝即為五帝此似于他處溷入録此書者之過也孝經云嚴父莫大于配天其下文即云宗祀文王於明堂以配上帝故明上帝即天矣故鄭氏注云上帝者天之别名神無二主故異其處避后稷也孔安國云帝亦天也且祀五方帝于明堂行之自久記曰有其舉之莫敢廢也請二禮並行以成月令大享帝之義立春祀青帝於東郊以太昊配以勾芒氏嵗星三辰七宿從祀立夏祀赤帝於南郊以炎帝配以祝融氏熒惑三辰七宿從祀季夏祀黃帝於南郊以軒轅配以后土鎮星從祀立秋祀白帝於西郊以少昊配以蓐收太白星三辰七宿從祀立冬祀黑帝於北郊以顓頊配以𤣥冥辰星三辰七宿從祀右樂舊用本音皆以黃鐘之均三成准周禮云圜鐘之均六變天神皆降可得而禮既云天神皆降明五帝日月星辰皆天神也又准周禮樂三變唯致丘陵之祇安能感及天帝今改用六變之樂春分朝日於東郊秋分夕月於西郊右舊用黃鐘之均三成新改用天神之樂圜鐘之均六成立春後丑日祀風師於國城東北立夏後申日祀雨師於國城西南立秋後辰日祀靈星於國城東南立冬後亥日祀司中司命司人司祿於國城西北右舊不用樂夏至日祭皇地祇於方丘壇上以髙祖神堯皇帝配坐祭神州地祇於壇之第一等祭五嶽四鎮四海四瀆五山五川五林五澤五丘五陵五衍五原五隰於內壝之外各依方面右准舊禮為定立冬後祭神州地祇於北郊以太宗文武聖皇帝配坐右舊樂用姑洗之均三成准周禮云函鍾之均八變則地祇皆降可得而禮鄭康成云祭地有二一是大地崑崙為皇地祇則宗伯黃琮所祭者一是帝王封域之內謂之神州則兩圭有邸所祭者大唐後禮則不立神州之祀今依大唐前禮為定既曰地祇其樂合依函鍾之均八變仲春仲秋上戊祭太社以后土氏配祭太稷以后稷氏配右舊樂用姑洗之均三變且社稷之祀於禮為尊豈同嶽瀆只用三變合依地祇用函鍾之均八變祭五嶽四鎮四海四瀆右各用四時迎氣日祭之皆本州縣官祭太廟九室每嵗五享謂四時孟月及臘也又三年一祫以孟冬五年一禘以孟夏祫禘之月則不時享功臣配享髙祖室殷開山劉政㑹淮安王神通河間王孝恭太宗室房𤣥齡魏徵屈突通髙士廉髙宗室李績馬周張行成中宗室桓彥範敬暉崔元暐袁恕己張柬之睿宗室蘇瓌劉幽求每禘祫即祀之時享祭七祀春祀司命及戶夏祀竈季夏祀中霤若别祭季秋祀門及厲冬祀行若臘享及禘祫則遍祀之案原本自太廟九室以下七行文多顛倒條例不明今照唐六典及通典改正又功臣淮安王神通河間王孝恭原本附在太宗室配享內今以淮安王本傳同開山政㑹並配享高祖廟庭之說亦為詮改肅明皇后廟孝敬皇帝廟右二廟新修享儀皆准太廟例孟春吉亥享先農后稷配季春吉已享先蠶右准舊禮為定仲春之月享先代帝王帝嚳氏帝堯氏稷契配帝舜氏臯陶配夏禹伯益配殷湯伊尹配周文王太公配周武王周公召公配漢髙祖蕭何配右新加帝嚳氏餘准舊禮為定仲春仲秋上丁釋奠于太學孔宣父為先聖顔子為先師冉伯牛仲弓宰我子貢冉有子路子遊子夏閔子騫曾參高柴宓不齊公西赤林放樊須有若孔忠琴牢梁鱣叔仲㑹冉孺曾㸃陳元漆雕開商瞿司馬耕子張巫馬施秦非商澤鄭子徒公西蒧公冶長淡臺滅明原憲蘧伯玉公伯寮原亢燕伋秦祖冉季公肩定左人郢公西輿如公孫龍任不齊顔祖南宫縚􅀈單秦商亷梁步叔乘邽巽施常顔之僕狄黑漆雕哆縣成顔路顔噲公良孺公祖勾兹伯䖍榮旗顔高申棖顔辛黨公晳哀后處勾井疆曹恤罕父黑奚容蒧公夏首石作蜀壤駟赤漆雕徒父樂咳等及左丘明公羊高穀梁赤伏勝高堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭𤣥服䖍賈逵何休王肅王弼杜預范寧等從祀右新加七十二弟子之名餘准舊定仲春仲秋上戊釋奠于齊太公以留侯張良配右准敕新撰享禮孟冬祭司寒右准舊禮為定仲春祭五龍壇右准敕新撰享禮樂用姑洗之均三成隱太子廟章懷太子廟懿德太子廟節愍太子廟惠莊太子廟惠文太子廟右並新撰享禮每年四享仲春祀馬祖仲夏祀先牧仲秋祭馬社仲冬祭馬步右並祭於大澤用剛日臘日蠟百神於南郊大明夜明壇上神農后稷伊祁五官五田畯五星二十八宿十二辰五嶽五川五山五林五澤五丘五陵五墳五衍五原五隰五井泉四鎮四海四瀆青龍朱雀麒麟騶虞𤣥武五水墉五坊五於莵五鱗五羽五介五毛五郵表畷五裸五猫五昆蟲右准舊禮為定凡有祭祀皆准前禮例若封禪之禮則依圜丘方澤神位為定若巡狩望祭親征禡類祈禱昭告並各依本位為定俎豆冬至