body:
  text: 大唐開元禮卷一百四十八唐蕭嵩等撰凶禮六品以下喪之三卒哭祭小祥祭大祥祭禫祭祔祭卒哭祭前一日之夕掌事者翦屏柱楣塗廬不塗見面塗廬裏不塗廬外翦蒲為席不縁以木為枕牢饌如虞祭其日夙興祝入燭先升自阼階入於室祝整拂几筵以出掌事者設洗於西階西南北向東西當西榮南北以堂深罍水在洗西篚在洗東南肆篚實爵一巾一加羃設瓦甒二於靈座之左北墉下醴酒在東幕用絺加勺南柄掌事者具饌於堂東祝與執樽􅧂篚者先入立於樽罍篚之後内外衰服俱升主人及諸子倚杖室户外俱立於靈座之東西面南上妻妾女子子立於靈西東面南上内外各就位坐哭應拜者立掌饌者以饌升入設於靈座前相者引主人降自西階詣罍洗主人止哭盥手洗爵相者引主人升自西階入詣酒樽所主人酌醴相者引主人進跪奠於靈座前俛伏興少退西面立應拜者陪於後祝持版入立於靈座之南北面内外止哭祝跪讀祝文曰維年月朔日子哀子今儀為父稱孤子某敢昭告於考某官封諡妣則云妣某氏日月不居奄及卒哭追慕永往攀號無逮謹以潔牲剛鬛嘉薦普淖明齊溲酒哀薦成事於考某官封諡尚饗主人以下哭再拜内外應拜者皆再拜哭祝興進跪奠版於靈座興還樽所讀祝文訖起跪奠版與主人哭拜同時也相者引主人退復位哭盡哀内外各還次祝闔户與執樽罍者降出少頃祝與掌饌者入開户徹饌祝闔户以降自卒哭之後朝一哭夕一哭疏食飲水周而小祥小祥祭前一日之夕毁廬為堊室設蒲葦席周喪堊室者除之設地席陳練冠於次主人及諸子俱沐浴櫛爪翦牢饌及器如卒哭之禮其日夙興祝入燭先升自阼階入於室整拂几筵以出設瓦甒二於靈座之左北墉下醴酒在東羃用絺加勺南柄具饌於堂東祝與執樽罍篚者先入立於樽罍篚之後内外衰服主人倚杖於階東俱升就位應拜者立哭盡哀相者引降主人杖就次主婦以下各就次主人及諸子降首絰著練冠妻妾女子子除腰絰周服者皆除之丈夫素服吉冠履婦人素服吉履相者引主人及諸子倚杖如初内外俱升就位哭掌饌者以饌升自東階入設於靈座前設訖掌饌者降自西階以出相者引主人降自西階詣罍洗主人止哭盥手洗爵相者引主人升自西階入詣酒樽所酌醴進跪奠於靈座前俛伏興少退西面立祝持版進立於靈座之右北面内外皆止哭祝跪讀祝文曰維年月朔日子哀子某敢昭告於考某官封諡妣云妣某氏嵗月警迫奄及小祥攀慕永往重増屠裂謹以潔牲剛鬛嘉薦普淖明齊溲酒祇薦祥事於考某官封諡尚饗主人哭再拜内外應拜者再拜哭祝興進跪奠版於靈座興還樽所主人哭拜與祝興奠版同時也相者引主人就位哭盡哀内外各還次主人杖如式祝闔户與執樽罍者降出少頃祝與進饌者入開户徹饌祝闔户以降自小祥之後止朝夕之哭哭無時哀至則哭始食菜菓飯素食飲水漿無鹽酪不能食食鹽酪可又周而大祥大祥祭前一日之夕除堊室張帷又備内外受服大祥之服各於其次主人及諸子俱沐浴櫛爪翦牢饌及器如小祥之禮其日夙興内外各服其衰服並於次哭盡哀應除服者除服訖又哭盡哀止夙興祝入燭先升自阼階入於室祝整拂几筵以出掌事者設罍洗篚於西階西南如初篚實爵一巾一加羃設瓦甒二於靈座之左北墉下醴酒在東羃用絺加勺南柄具饌於堂東祝與執樽罍者先入立於樽罍之後内外俱升就位哭掌饌者以饌升自東階入設於座前置設訖掌饌者降自西階以出相者引主人降自西階詣罍洗主人止哭盥手洗爵相者引主人升自西階詣酒樽所酌醴進跪奠於靈前俛伏興少退西面立祝持祝版進立於座之右北面内外皆止哭祝跪讀祝文曰維年月朔日子哀子父喪稱孤子某敢昭告於考某官封諡妣云妣某氏日月逾邁奄及大祥攀慕永逺無任荒踣謹以潔牲剛鬛嘉薦普淖明齊溲酒祇薦祥事於考某官封諡尚饗主人哭再拜應拜者再拜哭祝興進跪奠版於座興還樽所相者引主人就位哭盡哀主人以下各還外寢妻妾女子子以下還於寢祝闔户與執樽罍者降出少頃掌饌者入開户徹饌掌事者除靈座祝闔户以降間月而禫自大祥之後外無哭者食有醢醬禫祭前一日掌事者預備内外禫服各陳於别所主人及諸子俱沐浴櫛爪翦仍宿於外寢牢饌及器如大祥之禮其日夙興祝入燭先升設几席於奠掌事者設罍洗篚於東階東南如常篚實爵一巾一加羃又設瓦甒二於座之左北墉下醴酒在東羃用絺加勺南柄具饌於堂東祝與執樽􅧂篚者先入立於樽􅧂篚之後主人及諸子妻妾女子子仍祥服為長子三年者亦祥服内外俱升就位哭盡哀降釋祥服應禫服者著禫服相者引主人以下俱升就位哭掌饌者以饌入升設於座前訖執饌者出相者引主人降自東階詣􅧂洗盥手洗爵相者引主人升自東階詣酒樽所酌醴進跪奠於座前俛伏興少退西面立祝持祝版進立於座之右北面内外皆止哭祝跪讀祝文曰維年月朔日子孤子某敢昭告於考某官封諡妣云妣某氏禫祭有期追逺無及謹以潔牲剛鬛嘉薦普淖明齊溲酒祗薦禫事於考某官封諡尚饗祝興主人哭再拜應拜者皆再拜内外皆哭祝興跪進奠版於座還樽所相者引主人以下出降自東階還寢内相者引妻妾女子子以下降自西階側還於寢祝闔戸與執樽罍者降出少頃掌饌者入開户徹饌祝收几筵以出自禫之後内無哭者始飲醴酒食乾肉祔祭將祔筮日如常儀前三日主人及亞獻終獻及諸執事者俱散齊二日致齊一日前一日掌事者清掃正寢之内外其日未明掌事者設曽祖之座於正寢室内之奥東向又設祖之座於曽祖之座東南北面又設考之座於祖之南北面皆右几妣則設曽祖姑座及祖妣之祔座亦如之言曽祖及曽祖姑者皆據孝子之言於亡者祖及祖姑也祔於曽祖則曽祖妣配有事於尊可以及卑者設主人位於東階東南西向設子孫位於庭北面西上設亞獻終獻位於主人東南俱西面北上亞獻終獻以親賓充之也設贊唱者位於主人西南西面設酒樽於堂上室内之東南北向西上設洗於阼階東南北向東西當東榮南北以堂深罍水在洗東篚在洗西南肆篚實爵三巾二加羃其爵數毎廟二祔日内外夙興掌饌者預具特牲之饌二座各俎一簋二簠二鈃二酒樽二其樽皆一實𤣥酒為上一實清酒次之上樽加𤣥酒者重古四籩四豆主人及行事者各服祭服執樽罍篚者入就位主人以下皆入就位諸婦人位於西階西南障以行惟立定贊唱者曰再拜在位者皆再拜掌饌者引饌入升自東階入於室各設於神座前施設訖掌饌者以下降出相者引主人詣罍洗盥手洗爵升自東階詣酒樽所執樽者舉羃主人酌酒相者引主人入室進西面跪奠爵於曽祖神座前俛伏興相者引主人出詣酒樽所取爵酌酒入室進北面跪奠於祖座前俛伏興相者又引主人出詣酒樽所取爵酌入室南面跪奠於考前俛伏興退當曽祖座前近東西面立祝持版進於曽祖神座之右北向跪讀祝文曰維某年某月朔日子孝曽孫某官封某敢昭告於曽祖某官封諡若無官封者但云曽祖之靈若祔母但云曽祖妣某氏不告曽祖祖某官封諡若祔母云祖妣某氏以下無官封者但云考妣之靈考某官封諡若祔母云妣某氏如父在不可遞遷祖妣宜先於廟東北别立一室藏其主侍考同祔某罪積不滅嵗及免喪宗廟上遷昭穆繼序先王制禮不敢不至是用適於皇考封諡以遷主考封諡隮附孫某封諡無官封者但云以適於祖隮祔孫某若母同祔則云適於祖姑夫人某氏以隮祔孫婦夫人某氏各隨其稱無官封者但云以適於祖姑某氏以隮祔孫婦某氏謹以潔牲剛鬛嘉薦普淖明齊溲酒祗薦於曽祖某官封諡曽祖妣某氏配祖某官封諡祖妣某氏配考某官封諡若祔母則云妣某氏配尚饗祝興主人再拜祝奠版於曽祖神座興還樽所相者引主人當祖座前北面再拜考亦如之相者引主人出降還本位主人初獻將畢相者引亞獻詣罍洗盥手洗爵升詣酒樽所酌酒入進西面跪奠於曽祖座前俛伏興相者引亞獻詣酒樽所取爵酌酒入進北面跪奠於祖神座前俛伏興考亦如之當曽祖座前西面再拜訖又當祖座前北面再拜考座前南面再拜相者引出降復位亞獻將畢相者引終獻詣罍洗盥手升酌終獻如亞獻之儀訖相者引終獻復降位祝入徹豆還樽所贊唱曰再拜在位者皆再拜相者引主人出相者又引在位子孫以下出掌饌者入徹饌掌事者徹几筵以出齊衰三年其虞卒哭祥禫變降之節與斬衰同父在為母為妻當二祥及禫日月之期雖異其儀節則同周服以下變除依其月算各以其日之晨備衰服升就位哭盡哀降詣别室釋衰服著素服又就位哭盡哀出就别室終日異門者至夕各還其家大唐開元禮卷一百四十八
