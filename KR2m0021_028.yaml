body:
  text: 大唐開元禮卷二十八唐蕭嵩等撰吉禮祀風師祀雨師祀靈星祀司中司命司人司祿立春後日祀風師丑日前祀三日諸預祀之官散齊二日致齊一日散齊皆于正寢致齊一日于祀所光祿卿監取眀水火太官令取水于隂鑒取火于陽燧火以供爨水以注𤣥酒之尊散齊理事如舊惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊惟祀事得行其餘悉斷其祀官已齊而闕者通攝行事前祀一日晡後一刻諸衛令其屬各以其方器服守衛壝門俱清齊一宿衛尉設祀官次于東壝之外道南北向以西為上設陳饌幔于內壝東門之外道南北向郊社令積柴于燎壇其壇在神壇之左內壝之外方五尺髙五尺開上南出户祀日未明三刻奉禮郎設祀官位于內壝東門之內道北執事位于道南每等異位俱重行西向皆以北為上設望燎位當柴壇之北南向設御史位於壇上西南隅東向令史陪其後於壇下設奉禮位於祀官西南贊者二人在南差退俱西向又設奉禮贊者位於燎壇東北西面北上設祀官門外位於東壝之外道南每等異位俱重行北向西上郊社令帥齊郎設酒樽於壇上東南隅象樽二置于坫北向西上設幣篚于樽坫之所設洗于壇南陛東南北向罍水在洗東篚在洗西南肆篚實以巾爵執樽罍篚羃者各于樽罍篚冪之後太官令帥宰人以鸞刀割牲烹于㕑祀日未明三刻太史令郊社令升設風師神坐于壇上近北南向席以莞設神位於坐首未明一刻諸祀官各服其服郊社令良醖令各帥其屬入實樽罍及幣實以醍齊其𤣥酒實于上尊太官令帥進饌者實諸籩豆簋簠入設于內壝東門之外饌幔內奉禮帥贊者先入就位贊引引御史太祝及令史與執樽罍篚冪者入當壇南北面以西為上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜執樽者升自東陛立于樽所執樽罍篚羃者各就位贊引引御史太祝詣壇東陛升行掃除于上令史行掃除于下訖各引就位質明謁者引祀官贊引引執事者俱就門外位謁者贊引各引祀官以次入就位立定奉禮曰衆官再拜衆官在位者皆再拜謁者進獻官左白有司謹具請行事退復位太官令出帥進饌者陳于門外初太官令出太祝跪取幣于篚興立于樽所謁者引獻官升自南陛進當神坐前北向立太祝以幣東向進獻官受幣進北面跪奠于神坐俯伏興少退北面再拜訖謁者引獻官降復位太官令引饌入詣南陛升壇太祝迎引于壇上設于神坐前籩豆蓋羃先徹乃升簋簠既奠却其蓋于下設訖太官令以下降復位太祝還樽所謁者引獻官詣罍洗盥手洗爵訖謁者引獻官自南陛升壇詣酒樽所執樽者舉羃獻官酌醍齊訖謁者引獻官進神坐前北向跪奠爵俯伏興少退北向立太祝持版進于神坐之右東面跪讀祝文曰維某年嵗次月朔日子嗣天子謹遣具位臣姓名敢昭告于風師含生開動畢佇振發功施造物實彰祀典謹以制幣犧齊粢盛庶品明薦于神尚饗訖興獻官再拜太祝進跪奠版於神坐還樽所獻官拜訖謁者引獻官立于南方北向太祝以爵酌福酒進獻官之右西向立獻官再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫獻官俯伏興太祝帥齊郎進俎太祝跪減神坐前胙肉加于俎興以俎西向進獻官受以授齊郎謁者引獻官降復位祝史進跪徹籩豆興還樽所徹者籩豆各一少移於故處奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜謁者進獻官之左白請就望燎位遂引獻官就望燎位南向立太祝執篚跪取幣祝版齊郎以俎載牲體禝黍飯爵酒興自南陛降壇南行當柴壇南東行自南陛登柴壇以幣祝版饌物置柴上户內訖奉禮曰可燎東西面各二人以炬燎火半柴謁者進獻官之左白禮畢遂引獻官出贊引引執事者以次出贊引引御史以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出立夏後申日祀雨師有司行事祝文曰百昌萬寶式仰膏潤謹遵典故用備常祀其首尾與風伯文同立秋後辰日祀靈星有司行事祝文曰九榖方成三時不害憑兹多祐介其農穡立冬後亥日祀司中司命司人司祿於國城西北有司行事每坐象樽二於壇上東南隅北向皆有坫以西為上設司中司命司人司祿神坐於壇上近北南以西為上初獻司中祝文曰時屬安寧億兆康祐用率常禮報兹祉福次獻司命祝文曰賴兹正直黎庶康寧資此良辰用申恆禮次獻司人祝文曰星紀已周兆庶康阜備兹蠲吉式薦馨香次獻司祿祝文曰𤣥英紀時嵗事云畢聿遵典故用修恆祀其行事俱如風師之儀大唐開元禮卷二十八
