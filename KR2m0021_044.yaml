body:
  text: 大唐開元禮卷四十四唐蕭嵩等撰吉禮孝敬皇帝廟時享有司攝事齋戒陳設省牲器晨祼饋食齋戒將享有司卜日如别儀前享七日平明太尉誓百官於尚書省曰某月某日時享於孝敬皇帝廟各揚其職不供其事國有常刑凡預祭之官散齋四日致齋三日散齋皆于正寢致齋二日于本司一日于齋坊無本司皆于齋坊散齋理事如舊惟不弔喪問疾不判署刑殺文書不作樂不行刑罰不預穢惡致齋惟享事得行其餘悉斷其享官已齋而闕者通攝行事諸享官致齋之日給酒食及明衣各習禮於齋所光祿卿監取明水火太官令取水于隂鑒取火于陽燧火以供爨水以實樽前享一日諸衛令其屬未後一刻各以其方器服守衛廟門每門二人每隅一人與太樂工人俱清齋一宿陳設前享三日右校清掃內外守宫設享官公卿以下次於齋坊之內前享二日太樂令設宫懸之樂於廟庭東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹路鼓於北懸之內道之左右植建鼓於四隅置柷敔於懸內柷在左敔在右設歌鐘歌磬於廟堂之上前楹間北向磬簴在西鐘簴在東其匏竹者立於階間重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上前享一日奉禮設享官公卿位於東門之內道北執事位在道南每等異位俱重行西面以北為上設御史位於廟堂之上一位於東南西向一位於西南東向令史各於其後設奉禮位於樂懸東北贊者二人在南差退俱西向設協律郎位於廟堂之上前楹間近西東向設太樂令位於北懸之間北向設門外位享官公卿以下皆於東門之外道南每等異位重行北面西上設牲榜於東門之外當門西向以南為上廩犧令位於牲西南史陪其後俱北向設太祝位於牲東當牲後祝史陪其後俱西向設太常卿省牲位於牲前近北又設御史位在太常卿之西俱南向設樽彛之位於堂上前楹間於室户之左北向春夏奠雞彛一鳥彛一犧樽二象樽二山罍二秋冬斚彛一黃彛一著樽二壺樽二山罍二皆加勺羃羃以黼皆西上各有坫以置瓚爵設簋簠鈃登籩豆之位於堂上俱東側階之北四簋居前四簠次之次以六登次以六鈃籩豆為後皆以南為上屈陳而下設洗於東陛東南北向罍水在洗東篚在洗西南肆篚實以圭瓚巾爵執樽罍者位在樽罍之後省牲器省牲之日午後十刻廟所諸衛之屬禁斷行人廟令整拂神幄坐晡後二刻廟令帥府史二人齋郎以樽坫罍洗篚羃及籩豆鈃登入設於位加以巾蓋凡器物皆濯而陳之晡後三刻太祝與廪犧令以牲就榜位謁者引太常卿贊引引御史入詣東陛升遍視滌溉於上凡導引者每曲一逡巡於視濯執樽者皆舉羃告潔訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前北面舉手曰腯還本位太祝循牲一匝西面舉手曰充還本位太祝與廩犧令以次牽牲詣厨授太官謁者引光祿卿詣厨省鼎鑊申視濯溉贊引引御史就厨省饌具太常卿以下每事訖各還齋所進饌者入徹籩豆簋簠鈃登以出享日未明十五刻太官令帥宰人以鸞刀割牲祝史取毛血共實一豆遂烹牲祝史洗肝於鬱鬯又取膟膋共實一豆置於饌所膟膋腸間脂也晨祼享日未明四刻諸享官各服其服太廟令良醖令各帥其屬入實樽罍雞彜斚彜及犧樽象樽著樽壺樽之上樽實以眀水山罍之上樽實以玄酒鳥彜黃彜實以鬱鬯犧樽著樽實以醴齊象樽壺樽實以盎齊山罍實以清酒太官令帥進饌者實諸籩豆簋簠未明三刻奉禮帥贊者先入就位贊引引御史博士太廟令宫闈令太祝及令史祝史與執樽罍篚羃者入自東門當階間重行北面西上立定奉禮曰再拜贊者承傳御史以下皆再拜訖執樽罍篚羃者各就位贊引引御史太祝詣東陛升堂行掃除於上令史祝史行掃除於下訖引降復位未明二刻贊引引太廟令太祝宫闈令詣東階升堂入室開坎太祝宫闈令奉出神主置於座訖皇后神主宫闈令奉出並坐而處右引太廟令以下降復位未明一刻謁者贊引各引享官俱就東門外位太樂令帥工人二舞以次入就位文舞入陳於懸內武舞立於懸南道西其升堂者皆脫屨于下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣東陛升堂行掃除於上降行樂懸於下訖引復位初司空行樂懸謁者贊引引享官次入就位立定奉禮曰衆官再拜衆官再拜訖謁者進太尉之左白有司謹具請行事退復位協律郎跪俯伏舉麾凡取物者皆跪俯伏而取以興奠物則奠訖而後興鼓柷奏永和之樂乃以黃鐘之均作文舞之舞樂舞九成黃鐘三奏大吕太蔟應鐘各再奏偃麾戛敔樂止凡樂協律郎舉麾工鼓柷而後作偃麾戞敔而後止奉禮曰衆官再拜衆官在位者皆再拜謁者引太尉詣罍洗盥洗訖謁者引太尉升自東階詣樽彛所執樽者舉羃太尉酌鬱酒訖登歌作肅和之樂以圜鐘之均謁者引太尉入詣神座前北面跪以鬯祼地奠之興謁者引太尉出户北面再拜訖登歌止謁者引太尉降復位初衆官再拜訖祝史取毛血肝膋之豆立於東門外齋郎奉爐炭蕭稷黍立於肝膋之後於登歌止祝史奉毛血肝膋齋郎奉爐炭蕭稷黍以次入自正門升自泰階太祝迎毛血肝膋於階上入奠於神座前祝史退立於樽所齋郎奉爐加炭皆置於室户外之左其蕭稷黍各置於爐炭下降自阼階以出太祝取肝膋出戶燔於爐炭復還樽彛所饋食太尉既升祼太官令出帥進饌者奉饌陳於東門之外重行西向以南為上謁者引司徒出詣饌所司徒奉饌初太尉既至位太官令引饌入自正門俎初入門雍和之樂作以無射之均饌至泰階樂止祝史進徹毛血之豆降自阼階以出饌升太祝迎引於階上設於神座籩豆蓋羃先徹乃升簋簠既奠却其蓋於下設訖謁者引司徒以下降自阼階復位太祝取蕭於脂燔於爐炭還樽所贊引引太尉詣罍洗盥手洗爵訖謁者引太尉升自阼階詣樽彛所執樽者舉羃太尉酌醴齊訖承光之舞作謁者引太尉入詣神座前北向跪奠爵少東興謁者又引太尉取爵於坫酌醴齊訖謁者引入神座前北向跪奠爵少西謁者引太尉出户北向立樂止太祝持版進於室戶外之右東面跪讀祝文曰維某年嵗次月朔日子孝姪開元神武皇帝某謹遣某官攝太尉臣某敢昭告於皇伯考孝敬皇帝哀皇后裴氏氣序流邁時惟孟春永懷罔極伏增逺感謹以一元大武柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊敬修時享以申追慕尚饗訖興太尉再拜訖又再拜初讀祝文訖樂作太祝入奠版於神座還樽所太尉拜訖樂止太祝以爵酌罍福酒一爵持進太尉之左東向立太尉再拜受爵跪祭酒啐酒奠爵興祝史帥齋郎進俎太祝減神前三牲胙肉皆取前腳第二骨加於俎又以籩取稷黍飯興還樽所以胙肉置一俎以飯置一籩以飯授太尉太尉每受即以授齋郎訖太尉跪取爵遂飲卒爵太祝進受爵復於坫太尉興再拜謁者引太尉降復位文舞出鼓柷作舒和之樂出訖戛敔樂止武舞入鼓柷作舒和之樂立定戛敔樂止初太尉將復位謁者引太常卿詣罍洗盥手洗爵訖謁者引太常卿升自阼階詣樽彛所執樽者舉羃太常卿酌盎齊武舞作謁者引太常卿入詣神座前北面跪奠爵少東訖謁者引太常卿出户北向再拜訖謁者又引太常卿取爵於坫酌盎齊訖謁者引入神座前北向跪奠爵少西訖興謁者引太常卿出户北面又再拜訖太祝以爵酌罍福酒一爵持進太常卿之左東向立太常卿再拜受爵跪祭酒遂飲卒爵太祝進受爵復於坫太常卿再拜訖降復位太常卿獻將畢謁者引光祿卿詣罍洗盥手洗爵酌盎齊之禮一如亞獻之儀訖光祿卿降復位武舞止登歌作雍和之樂太祝入室徹豆還樽所徹者籩豆各一少移於故處登歌止奉禮曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜永和之樂作奉禮曰衆官再拜衆官在位者皆再拜樂一成止謁者進太尉之左白禮畢謁者贊引各引享官以次出贊引引御史太祝以下俱復執事位立定奉禮曰再拜御史以下皆再拜贊引引出工人二舞以次出太廟令與太祝宫闈令納神主如常儀其祝版焚於齋坊大唐開元禮卷四十四
