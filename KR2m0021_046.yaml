body:
  text: 大唐開元禮卷四十六唐蕭嵩等撰吉禮皇帝孟春吉亥享先農耕籍齊戒陳設鑾駕出宫饋享耕籍鑾駕還宫勞酒齊戒前祀五日皇帝散齊三日於别殿致齊二日一日於太極殿一日於行宫前致齊一日尚舍奉御設御幄於太極殿西序及室內俱東向尚舍直長張帷於前楹下致齊之日質明諸衛勒所部屯門列仗晝漏上水一刻侍中版奏請中嚴諸衛之屬各督其隊入陳於殿庭如常儀尚舍引文武五品以上袴褶陪位如常式諸近侍之官各服其器服諸侍臣並結珮俱詣閣奉迎侍中版奏外辦上水三刻皇帝服通天冠絳紗袍結珮乘輿出自西房曲直華蓋警蹕侍衛如常儀皇帝即御坐東向坐侍中夾侍如常一刻頃侍中前跪奏稱侍中臣某言請降就齊室俯伏興還侍位皇帝降坐入室文武侍臣各還省直衛者如常儀舍人引陪位者以次出凡預享之官散齊三日致齊二日散齊皆於正寢致齊一日於本司一日於享所其無本司者則一日於郊社署近侍之官應從升者及從享羣官諸方客使各於享所俱清齊一宿散齊理事如舊唯不弔喪問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齊唯享事得行其餘悉斷其享官已齊而闕者通攝行事諸享官致齊之日給酒食及明衣各習禮於齊所光祿卿監取明水火太官令取水於隂鍳取火於陽燧火以供㸑水以實尊前享一日諸衛令其屬未後一刻各以其方器服守衛壝門每門二人每隅一人與太樂工人俱清齊一宿陳設前享三日尚舍直長施大次於外壝東門之內道北南向尚舍奉御鋪御坐守宫設文武侍臣次於大次之後文官在左武官在右俱南向設諸享官次於東壝之外道南從享文官九品以上於享官之東東方南方朝集使於文官之東東方南方蕃客又於其東俱每等異位北向西上介公酅公於西壝之外道南武官九品已上於介公酅公之西西方北方朝集使於武官之西西方北方蕃客又於其西俱每等異位北向東上其褒聖侯於文官三品之下諸州使人分方位於朝集使之後設饌幔於內壝東門之外道南北向前享二日太樂令設宫懸之樂於壇南內壝之內東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘於編懸之間各依辰位樹路鼓於北懸之內道之左右植建鼓於四隅置柷敔於懸內柷在左敔在右設歌鐘歌磬於壇上近南北向磬簴在西鐘簴在東其匏竹者立於壇下重行北向相對為首凡懸皆展而編之諸工人各位於懸後東方西方以北為上南方北方以西為上右校掃除壇之內外又為瘞坎於壇之壬地外壝之內方深取足容物南出陛前享一日奉禮設御坐於壇之東南西向設望瘞位於壇西南當瘞北向設享官公卿位於內壝東門之內道南執事者位於其後每等異位俱重行西向北上設御史位於壇下一位於東南西向一位於西南東向令史各陪其後設奉禮位於樂懸東北贊者二人在南差退俱西向又設奉禮贊者位於瘞西南東面設協律郎位於壇上南陛之西東向設太樂令位於北懸之間當壇北向設從享之官位文官九品以上於執事之南東方南方朝集使於文官之南東方南方蕃客又於其南俱每等異位重行西面北上酅公介公位於南壝西門之內道南武官九品已上於酅公介公之後西方北方朝集使於武官之南西方北方蕃客又於其南俱每等異位重行東面北上其褒聖侯於文官三品之下諸州使人分方位于朝集使之後又設享官及從享羣官等門外位於東西壝門之外道南皆如設次之式又設御耕籍位於外壝南門之外十步所南向設從耕位三公諸王諸尚書諸卿位於御坐東南重行西向各依推數為列其公王尚書卿等非耕者位於耕者之東重行西向俱北上酅公介公位於御坐西南東向以北為上尚舍設御耒席於三公之北少西南向奉禮又設司農卿位於御耒席東少南西向廩犧令於司農卿之南少退諸執耒耜者位於公卿耕者之後非耕者之前西向御耒耜一具三公耒耜三具諸王尚書卿各正位三人合耒耜九具以下耒太常各令籍田農人執之設酒尊之位於壇上神農氏犧尊二象尊二山罍二在東南隅北向后稷氏犧尊二象尊二山罍二在神農氏酒樽之東俱北向西上尊皆加勺羃有坫以置爵設御洗於壇南陛東南亞獻之洗於東陛之南俱北向執尊罍篚羃者各位於尊罍篚羃之後設幣篚於壇上各於尊坫之所晡後郊社令帥齊郎以尊坫罍洗篚羃入設於位升壇者自東陛謁者引光祿卿詣厨視濯溉凡導引者每曲一逡巡贊引引御史詣厨省饌具光祿卿以下每事訖各還齊所享日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置於饌所遂烹牲未明五刻太史令郊社令各服其服升設神農氏神坐於壇上北方南向設后稷氏神坐於東方西向席皆以莞設神坐於坐首鑾駕出宫前出三日本司宣攝內外各供其職尚舍設行宫於壇南東向隨地之宜守宫設從享官五品以上次於承天門外東西朝堂如常前二日太樂令設宫懸之樂於殿庭如常儀駕出懸而不作其日晝漏上水五刻鑾駕發引發引前七刻捶一鼓為一嚴三嚴時節前一日侍中奏裁前五刻捶二鼓為再嚴侍中版奏請中嚴奉禮設從享群官五品以上位於東朝堂之前西向武官於西朝堂之前東向俱重行北上從享群官五品以上依時刻俱集朝堂次各服其服其六品以下及酅公介公褒聖侯朝集使諸方客使等並依駕出之日赴享所所司陳大駕鹵簿前二刻捶三鼓為三嚴諸衛之屬各督其隊與鈒㦸以次入陳於殿庭謁者引從享群官各就朝堂前位諸侍衛之官各服其器服侍中中書令以下俱就西階奉迎侍中負實如式乘黃令進耕根車於太極殿西階之前南向千牛將軍一人執長刀立於車前北面黃門侍郎一人在侍臣之前贊者二人又在黃門侍郎之前侍中版奏外辦太僕卿奮衣而升正立執轡皇帝齊服乘輿以出降自西階稱警蹕如常儀千牛將軍前執轡皇帝升車太僕卿立授綏侍中中書令以下夾衛如常乘黃令進耒耜太僕卿受之載於御者之間黃門侍郎進當鑾駕前跪奏稱黃門侍郎臣某言請鑾駕發引俯伏興退復位凡黃門侍郎奏請皆進鑾駕前跪奏稱某官臣某言訖俯伏興鑾駕動又稱警蹕黃門侍郎與贊者夾引以出千牛將軍夾車而趨駕出承天門至侍臣上馬所黃門侍郎奏稱請鑾駕權停敕侍臣上馬侍中前承制退稱制曰可黃門侍郎退稱侍臣上馬贊者承傳文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黃麾內符寶郎奉六寶與殿中監後部從在黃鉞內侍中中書令以下夾侍於車前贊者在供奉官人內侍臣上馬畢黃門侍郎奏稱請敕車右升侍中前承制退稱制曰可黃門侍郎退復位千牛將軍升訖黃門侍郎奏鑾駕發引退復位鑾駕動稱警蹕鼓傳音如常不鳴鼓吹不得喧譁其從享之官在𤣥武隊後如常儀駕將至諸享官俱朝服結珮謁者引立於次前重行北面西上駕過引下還齊所駕至行宫南門外回車南向將軍降立於車右侍中進當鑾駕前跪奉稱臣侍中臣某言請降車俯伏興還侍位皇帝降車乘輿入繖扇華蓋侍衛警蹕如常儀宿衛如式乘黃令受耒耜掌之謁者贊引從享官通事舍人分引文武群官五品以上集行宫朝堂前文左武右舍人承㫖敕羣官等各還次饋享享日未明三刻諸享官及從享之官各服其服郊社令良醖令帥其屬入實尊罍及幣犧尊實以醴齊象尊實以盎齊山罍實以清酒齊皆加明水酒皆加𤣥酒各實於上尊祀神幣皆以青色太官令帥進饌者實諸籩豆簠簋等入設饌幔內未明二刻奉禮帥贊者先入就位贊引引御史諸太祝及令史祝史與執尊罍篚羃者入自東門當壇南重行北面西上立定奉禮曰再拜贊者承傳凡奉禮有詞贊者皆承傳御史以下皆再拜訖執尊罍篚羃者各就位贊引引御史諸太祝詣壇東陛升行掃除於上令史祝史行掃除於下訖引降就位未明一刻謁者贊引各引享官及從享羣官客使等俱就門外位太樂令帥工人二舞次入就位文舞入陳於懸內武舞立於懸南道西其升壇者皆脫履于下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空詣壇東陛升行掃除於上降行樂懸於下訖引復位初司空行樂懸謁者贊引各引享官及從享官客使等次入就位初未明三刻諸衛列大駕仗衛陳設如式侍中版奏請中嚴乘黃令進耕根車於行宫南門外回車南向若行宫壇相逺嚴警如式未明一刻侍中版奏外辦質明皇帝服衮冕乘輿以出繖扇華蓋侍衛如常儀侍中負璽陪從如式皇帝升車訖乘黃令進耒耜太僕受載如初黃門侍郎奏請鑾駕發引還侍位鑾駕動稱警蹕如常千牛將軍夾車而趨若行宫去壇逺奏升車如式駕至大次門外回車南向侍中進當鑾駕前跪奏稱侍中臣某言請降車俯伏興還侍位皇帝降車乘輿之大次繖扇華蓋侍衛如常儀郊社令以祝版進御署訖近臣奉出郊社令受各奠於坫初皇帝降車訖乘黃令受耒耜授廩犧令而橫執之左其耜之耕所置於席遂守之凡執耒耜皆橫之授則先其耒後其耜皇帝停大次半刻頃太常博士引太常卿立於大次門外當門北向侍中版奏外辦皇帝出次華蓋侍衛如常儀博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至內壝門外殿中監進大圭尚衣奉御又以鎮圭授殿中監殿中監受進皇帝搢大圭執鎮圭華蓋仗衛停於門外近侍省衛從入如常儀皇帝至版位西向立每立定太常與博士退立于左太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏興舉麾凡取物者皆跪俯伏取以興奠物則奠訖俯伏而後興鼓柷奏永和之樂以姑洗之均自後壇下接神之樂皆奏姑洗作文舞之舞樂舞三成偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戞敔而後止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜太祝俱取幣於篚各立於尊所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂皇帝詣壇升自南陛侍中中書令以下及左右侍衛量人從升以下皆如之皇帝升壇北向立樂止太祝以幣授侍中侍中受幣東向進皇帝搢鎮圭受幣凡受物皆搢鎮圭奠訖執鎮圭俯伏興登歌作肅和之樂以南吕之均太常卿引皇帝進北面跪奠於神農氏神坐俯伏興太常卿引皇帝少退北向再拜訖太常卿引皇帝又立於西方東向又太祝以幣授侍中侍中受幣北向進皇帝受幣太常卿引皇帝進東面跪奠於后稷氏神坐俯伏興太常卿引皇帝少退東面再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止初羣官拜訖祝史奉毛血之豆立於門外登歌止祝史奉毛血入升自南陛配坐升自東陛太祝迎取於壇上進奠於神坐前太祝與祝史退立於尊所皇帝既升奠幣太官令出帥進饌者奉饌陳於內壝門外謁者引司徒出詣饌所司徒奉神農之俎皇帝既至版位樂止太官令引饌入俎初入門雍和之樂作饌至陛樂止祝史進跪徹毛血之豆降自東陛以出神農氏之饌升自南陛配坐之饌升自東陛太祝迎引於壇上各設於神坐前籩豆蓋羃先徹乃升簋簠既奠却其蓋於下設訖謁者引司徒以下降自東陛復位太祝各還樽所太常卿引皇帝詣罍洗樂作皇帝至罍洗樂止侍中跪取􅓢興沃水又侍中跪取盤興承水皇帝盥手黃門侍郎跪取巾於篚興進皇帝帨手訖黃門侍郎受巾跪奠於篚興進爵皇帝受爵倚中酌罍水又侍中奉盤皇帝洗爵黃門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤􅓢黃門侍郎受巾奠於篚皆如初太常卿引皇帝樂