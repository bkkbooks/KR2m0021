body:
  text: 大唐開元禮卷一百十一唐蕭嵩等撰嘉禮皇太子納妃臨軒命使納采問名納徵告期告廟册妃臨軒醮戒親迎同牢妃朝見㑹羣臣臨軒命使將行納采制命使者吏部承以戒之前一日尚舍奉御設御幄於太極殿北壁下南向衛尉設羣官位於東西朝堂太樂令展宫懸於殿庭並如常儀其日典儀設文官一品以下五品以上位於橫街之北西靣北上朝集使五品以上合班六品以下位於橫街南朝集使六品以下合班蕃客又於其南皆西靣北上設武官五品以上位於橫街北朝集使五品以上合班諸親位於其南六品以下位於橫街南朝集使六品以下蕃客等又在南皆東靣北上設典儀位於懸之東北贊者二人在南少退俱西向設舉麾位於殿上西階之西東面設使者受命位於橫街南道東北靣西上奉禮設門外位文官一品以下五品以上位於順天門外道東每等異位俱重行西面武官三品以下位於門西每等異位俱重行以北為上未明二刻諸衛勒所部屯門布黃麾半仗入陳於殿庭如常儀羣官依時刻集朝堂俱就次各服朝服侍中量時刻版奏請中嚴鈒戟近仗就陳於閣外太樂令以下帥工人入就位諸侍衛之官各服其器服侍中中書令以下諸侍臣俱詣閣奉迎典儀帥贊者先入就位吏部兵部贊羣官出次典謁各引就門外位侍中版奏外辦皇帝服衮冕乘輿以出曲直華蓋侍衛警蹕如常儀皇帝出自西房即御坐南向坐符寶郎奉寶置於御坐如常儀通事舍人引羣官以次入就位立定典儀曰再拜贊者承傳羣官在位者皆再拜吏部與禮部侍郎贊使主副出典謁引就受命位侍中前承制降詣使者西北東向稱有制使主副俱再拜侍中宣制訖使主副又再拜侍中還侍位典謁引使者主副出初使者將出典儀曰再拜贊者承傳羣官在位者皆再拜通事舍人引羣官出侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝降坐入自東房侍衛警蹕如來儀侍臣從至閣使主副乘輅備儀仗而行從者乘輿以從納采前一日主人設使者次於大門之外道右南向其日大昕使者公服至於妃氏大門外掌次者延入次凡賔主及行事者皆公服主人受其禮於廟無廟者受於正寢掌事者布神席於室户外之西莞筵粉純加藻席畫純南向右雕几使者出次謁者引立於大門外之西東面主人立於大門內西面儐者立於主人之左北面受命出立於門東西面曰敢請事使者曰奉制作儷儲宫允歸令德率由舊章使某納采儐者入告主人曰臣某之子不教若如人既蒙制訪某不敢辭儐者出告掌畜者以鴈授使副使副進授使者退復位使者左手執之儐者引主人迎於大門外之南北靣再拜使者不答拜謁者引使者入門而左主人入門而右使者升自西階立於楹間俱南靣西上主人升自東階進使者前北靣使者曰某奉制納采主人降詣階間北靣再拜稽首升進北靣受鴈退立於東階上西靣使者降自西階以出問名使者既出立於門外之西東面初使者降左右受鴈於序端主人降立於內門東廂西靣儐者進受命出請事使者曰某將加卜筮奉制問名儐者入告主人曰制以某之子備數於儲宫臣某不敢辭儐者出告掌畜者以鴈授使副使副進授使者退復位儐者引主人迎於內門外之南北靣再拜使者升自西階立於楹間俱南靣西上主人升自東階進使者前北靣使者曰某奉制問名將加諸卜筮主人降詣階間北靣再拜稽首升進北靣受鴈少退仍北靣曰臣某第幾女某氏出使者降自西階出立於門內外之西東面初使者降主人退立於阼階東左右受鴈於序端主人降立於內門東廂西靣儐者進受命出請事使者曰禮畢儐者入告主人曰某公為事故至於某之室某有先人之禮請禮從者儐者入告使者曰某既得將事敢辭儐者入告主人曰先人之禮敢固以請儐者出告使者曰某辭不得命敢不從儐者入告遂引主人升立於序端掌事者徹几設二筵東上各用莞筵繢純加藻席紛純設甒醴於東房西墉下加勺設羃篚在樽南實觶二角柶二各籩一豆一實以脯醢在篚南又設洗於東階東南如常施設訖儐者引主人降迎使者於內門外之東西面揖使者先入使者入門而左主人入門而右三揖使者皆不報至階主人曰請某位升使者曰某敢辭主人又曰固請某位升使者揖主人使者升自西階北面東上主人升自東階北靣再拜使者西階上北面答拜主人受几於序端掌事者內拂几三奉兩端西北向以進主人東南向外拂几三振袂內執之掌事者一人又執几以從主人進西北向使者序進迎受於筵前東南向以俟主人還東階上北面拜送西南立使者以几進北面跪各設於坐差退於西階上北面東上各拜送答再拜立於階西東面南上贊者二人俱升取觶降盥手洗觶升實醴加柶於觶覆之面葉出房南靣主人受醴靣柄進使者筵前西北面主人贊者執觶以從使者西階上北靣各一拜序進筵前東南面主人又以次授醴使者受俱復西階上位主人退復東階上北面一拜送掌事者以次進脯醢於筵前使者各進升延皆坐左執觶右取脯擩於醢祭於籩豆之間各以柶祭醴三始扱一祭又扱再祭興各以柶兼諸觶上臘降延於西階上北面坐俱啐醴建柶各奠觶遂拜執觶興主人答拜使者進升筵坐各奠觶於薦東降筵序立於西階上東面南上掌事者牽乘馬入陳於門內三分庭一在南北首西上又掌事者奉幣篚升自東階以授主人主人受於序端進西位掌事者一人又奉幣篚立於主人之後使者西階上俱再拜主人進詣楹間南面立使者序進立於主人之西俱南面主人以幣授使者使者受退立於西階上東面執幣者又以幣篚授主人主人受以授使副使副受之退立於使者之北俱東面主人還東階上北面拜送使者降自西階從者迓受幣使者當庭實揖馬以出牽馬者從出使者出大門外之西東面立從者迓受馬主人出門東西靣再拜送使者退主人入立於東階下西面儐者告於主人曰賔不顧矣主人反於寢納吉前一日主人設使者次如常其日大昕使者至妃氏大門外掌次者延入次掌事者設几筵如常使者出次謁者引立於大門之西東面主人於大門內西面儐者進受命出請事使者曰加諸卜筮占曰協從制使某也納吉儐者入告主人曰臣某之女弗教唯恐不堪龜筮曰吉臣預在焉臣某謹奉典制儐者出告掌畜者以鴈授使副使副進授使者退復位使者左手執之儐者引主人迎於門外之南北靣再拜使者不答拜謁者引使者入門而左主人入門而右使者升自西階立於楹間南靣西上主人升自東階進使者前北靣使者曰某奉制納吉主人降階北靣再拜稽首升進北靣受鴈使者降自西階以出立於大門外之西東靣初使者降主人還阼階東左右受鴈於序端主人降立於內門內西靣儐者進受命出請事使者曰禮畢其賔使者如問名之儀納徴前一日主人設使者次如常儀其日大昕使者至妃氏大門外掌次者延入次執事者設布羃於內門之外𤣥纁束帛陳於羃上乘馬陳於羃南北首西上執事者奉穀圭以櫝俟於羃東西靣主人掌事者設几筵如常使者出次謁者引立於大門外之西東靣主人立於大門內西靣儐者進受命出請事使者曰制使某以玉帛乘馬納徴儐者入告主人曰奉制賜臣以重禮臣某祗奉典制儐者出告又儐者引主人迎於門外之南北靣再拜使者不答拜謁者引使者入門而左主人入門而右至於內門使者立於門西東面北上主人立於門東西面執事者坐啓櫝取圭加於𤣥纁上興以授使副使副進授使者退復位使者受玉帛謁者引使者入門而左主人入門而右牽乘馬者從入三分庭一在南北首西上使者升自西階立於楹間俱南靣西上主人升自東階進使者前北靣使者曰某奉制納徴主人降詣階間北靣再拜稽首升進北靣受玉帛使者降自西階出立於內門外之西東靣初使者降主人還阼階東左右受玉帛於序端主人降立於內門內西靣於主人受玉帛受馬者自左受之以東牽馬者既授馬自前西靣出儐者進受命出請事使者曰禮畢其賔使者如納吉之儀告期前一日主人設使者次如常其日大昕使者至於妃氏大門外掌次者延入次掌事者設几筵如常使者出次謁者引立於大門外之西東靣主人立於門內西靣儐者進受命出請事使者曰詢於龜筮於某月某日吉制使某告期儐者入告主人曰臣某謹奉制儐者出告掌畜者以鴈授使副使副進授使者退復位使者左手執之儐者引主人迎於門外之南北靣再拜使者不答拜謁者引使者入門而左主人入門而右使者升自西階立於楹間俱南面西上主人升自東階進使者前北面使者曰某奉制告期主人降詣階間北靣再拜稽首升進北靣受鴈退位于東階上西面使者降自西階以出立於內門外之西東面初使者降主人還阼階東左右受鴈於序端主人降立於內門內西面儐者進受命出請事使者曰禮畢其賔使者如納徵之儀告廟有司以特牲告如常禮祝文臨時撰册妃前一日主人設使者次如常設宫人次於使者靣南俱東靣障以行帷其日奉禮設使者位於大門外之西東向使副及內侍位於使者之南舉冊案及璽綬命服者在南差退俱東向設主人位於門南北靣設使者以下及主人位於內門外又如之設典內位於內門外主人南西面設宫人位於門外於使者之後俱重行東向以北為上障以行帷設贊者二人位於東階東南西向典內預設一案於閣外近限使者主副朝服乘輅持節備儀仗鼓吹備而不作至妃氏大門外使者降輅掌次者延入次宫人等各之次掌嚴奉䄖翟衣及首飾內廄尉進厭翟車於大門之外道西東向以北為上諸衛率其屬布妃儀仗如常使者出次典謁引使者以下持節者前導及宫人典內各就位持節者立於使者之北少退俱東向主人朝服出迎於大門外之東西靣立定少頃北靣再拜使者不答拜典謁引使者持節者前導入門而左持案以下從之主人入門而右至內門外各就位立定奉冊寶奉案者進當使副前使副受册寶案者退復位使副以册寶進授使者退復位內侍進使者前西面受册寶東面授典內退復位典內持册寶入立於閣外之西東靣跪置冊寶於案典內俯伏興奉衣服及侍衛者從入皆立於典內之南俱東靣北上傅姆贊妃出引立於庭中北靣掌書進跪取玉寶興進立於妃前南向掌嚴奉首飾及䄖翟與諸宫官侍衛者以次入侍衛如常典內還復位司則前贊妃再拜還侍位妃再拜司則進掌書前北靣受册寶進妃前南向授妃妃受以授司閨司則又前贊妃再拜還侍位妃又再拜訖司則前請妃升坐還侍位司閨引妃升坐南向坐宫官以下俱降立於庭重行北靣以西為上立定贊唱者曰再拜宫官以下皆再拜訖諸應侍衛者各升立於侍位司則前啓禮畢妃降坐司閨引妃入於室主人賔使者如禮賔之儀使者乘輅而還臨軒醮戒前三日本司宣攝內外各供其職前一日衛尉設次於東朝堂之北西向又設宫官次於重明門外如常儀其日前三刻宫官俱集於次各之次皆服其服諸衛各勒其所部依圗陳設左庶子奏請中嚴內僕進金輅於西閣外南向內率一人執刀立於輅前北向前二刻諸衛之官各服其器服以次詣閣奉迎右庶子負璽如式宫官應從者各出次立於門外文東武西重行相向北上左庶子奏外辦太僕奮衣而升執轡皇太子著衮冕之服以出左右侍衛如常儀皇太子乃升僕立授綏車驅左庶子以下夾侍如常出門車權停令車右升輅陪乘宫臣上馬畢皇太子車動鼓吹振作如式文武官皆乘馬以從如常至承天門下車所回輅南向左庶子進當路前跪奏稱左庶子臣某言請降輅俯伏興還侍位皇太子降輅典謁