南對簠簋於北啟發也豆盖徹於房内各加匕箸施設訖司饌北靣跪奏饌具興皇太子及妃俱坐司饌跪取脯擩於醢取韭葅擩醢授皇太子又司饌跪取脯擩於醢取韭葅擩醢授妃皇太子及妃俱受祭於上豆之間司饌興跪取黍實於左手遍取稷反於右手授皇太子又司饌取黍實於左手遍取稷反於右手授妃皇太子及妃各受祭於葅醢之間司饌俱興各立取肺皆絶未跪授皇太子及妃俱受又祭於葅醢之間司饌俱以肺加於俎掌嚴授皇太子巾又掌嚴授妃巾皇太子及妃俱􅍤手以柶扱上鈃遍擩之祭於上豆之間司饌品嘗太子饌又司饌品嘗妃饌司饌各移黍置於席上以次跪授肺脊皇太子及妃皆食以湇醤三飯卒食司饌北靣跪奏稱司饌妾姓言請進酒司則承令曰依奏興司饌二人俱盥手洗爵於房入室詣酒尊所酌酒進北靣立皇太子及妃俱興再拜一人進授爵皇太子一人以爵授妃皇太子及妃俱受爵司饌俱退北靣答再拜皇太子及妃俱坐皇太子及妃俱祭酒舉酒司饌各以肝從司則俱進受虚爵奠於篚司饌又俱洗爵酌酒再酳皇太子及妃受爵俱飲司則進受虚爵奠於篚三酳用巹如禮再拜皇太子及妃立於席後司則俱降東階洗爵升酌於户外尊進北靣俱奠爵興再拜皇太子及妃俱答拜司則俱坐取爵祭飲遂飲卒爵奠遂拜執爵興降奠爵於篚還侍位司饌北靣奏稱司饌妾姓言牢禮畢司則承令曰諾司饌徹饌設於房司則前跪奏稱司則妾姓言請殿下入俛伏興還侍位皇太子入於東房釋冕服著袴褶司則啟妃入幃幄皇太子及妃乃入室媵餕皇太子之饌御餕妃之饌妃朝見其日晝漏上水一刻所司設皇帝御坐於所御殿阼階上西靣其席莞筵紛純加藻席畫純次席黻純左右玉几所司設皇后御坐於室户外之西近北南向尚食帥司饌設酒樽於房内東壁下有坫加勺羃尊用瓦甒實以醴齊籩一豆一實以脯醢設於尊北又設洗於東房近北罍水在洗西篚在洗東北肆篚實以巾羃觶一角柶一其日夙興妃沐浴司則啟請妃内嚴質明諸衛帥其屬陳布儀仗如常儀近仗入陳於寢門外内厩尉進厭翟於正寢西階之前南向司則啟外辦妃服䄖翟加首飾以出降自四階升輅侍衛如常至降車所司則賛妃降輅司言引妃入仗衛停於閤外障扇侍從如常妃至寢門之外立於西廂東面諸衛勒所部屯門布仗近仗入陳於所御殿閤外如常侍中奏内嚴尚儀又奏請皇后内嚴妃既至寢門侍中版奏外辦皇帝服通天冠綘紗袍以出升自阼階即御坐西向坐侍衛如常儀尚儀又奏皇后外辦皇后禕衣首飾司言引尚宫尚宫引皇后出即御坐向南侍從如常妃奉笲棗栗司饌又執奉笲腶脩以從司言引妃入立於庭北靣再拜司賔引妃升自西階進東靣跪奠笲於御坐前皇帝撫之尚食進徹以東司言引妃自西階降復北靣位奉笲腶脩再拜司言引妃升進北靣跪奠笲於皇后坐前皇后撫之尚食進徹以東司言引妃退立於西序東靣又再拜司設設妃席於户牖之間近北南靣司言引妃立於席西南向尚食入東房盥手洗觶酌醴齊加柶面柄出進詣妃席前向北立妃進東靣拜受醴尚食薦脯醢於席前妃升席坐左執觶右取脯擩於醢祭於籩豆之間以柶祭醴三始扱一祭又扱再祭降席進東面跪啐醴建柶奠觶興東靣再拜跪取觶興即席坐奠觶於薦東興降席司賔引妃降自西階出閤外既出閤乘車還宫障扇侍從如來儀㑹羣臣皇帝㑹羣臣於太極殿如正至之儀惟上夀辭云皇太子嘉聘禮成克崇景祚臣某等不勝慶忭謹上千萬嵗夀大唐開元禮卷一百十一
