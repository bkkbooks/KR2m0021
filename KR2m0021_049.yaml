body:
  text: 大唐開元禮卷四十九唐蕭嵩等撰吉禮季春吉已享先蠶於公桑有司攝事齋戒陳設饋享齋戒前享五日諸預享官散齋五日各於其寝致齋二日一日於其寢一日於享所散齋理事如舊惟不弔䘮問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯享事得行其餘悉斷其享官已齋而闕者通攝行事凡預享之官致齋之日給酒食及明衣各習禮於齋所光禄卿監取明水火太官令取水於隂鍳取火於陽燧火以供爨水以實尊前享一日諸衛令其屬未後一刻各以其方器服守衛壝門毎門二人毎隅一人享日未明給使代執與女工人俱清齋一宿陳設前享三日守宫設享官次於東壝之内道南北向以西為上設陳饌幔于内壝東門之外道南北向前享三日太樂令設宫懸之樂於壇南内壝之内東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二大磬於編懸之間各依辰位置柷敔於懸内柷在左敔在右設歌鐘歌磬於壇上近南北向磬簴在西鐘簴在東其匏竹者立於壇下重行北向相對為首凡懸皆展而編之諸女工人各位於懸後東方西方以南為上南方北方以西為上右校掃除壇之内外又為瘞埳於壇之壬地内壝之外方深取足容物南出陛前享一日内謁者設三獻位於内壝東門之内道北執事位于道南毎等異位皆重行西向以北為上又設望瘞位於壇之東北當瘞埳道西向又設典正位于壇下一位於東南西向一位於西南東向女史各陪其後糾察違失設掌贊位於樂懸東北女史二人在南差退俱西向又設掌贊女史位于瘞埳西南東向南上設典樂舉麾位於壇上南陛之西東向設司樂位於北懸之間當壇北向設三獻以下門外位於東壝之外道南向每等異位重行北面西上設酒尊之位於壇上東南隅北向西上犧樽二象尊二山罍二尊皆加勺羃有坫以置爵設洗於壇南陛東南北向罍水在洗東篚在洗西南肆執樽罍篚羃者各位於樽罍篚羃之後設幣篚於壇上樽坫之所晡後内謁者帥其屬以樽罍篚羃入設於位升壇者自東陛享日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血置于饌所其神厨及諸司供事便次守宫與金吾相之量于壇東張設享日未明五刻司設服其服升設先蠶氏神座于壇上北方南向席以莞設神位于坐首饋享享日未明三刻諸享官各服其服女史及司醖各帥其屬入實樽罍及幣犧尊寔以醴齊象尊寔以盎齊山罍寔以清酒齊加明水酒加𤣥酒各寔于上尊其幣以黒太官令寔諸籩豆簠簋俎等内謁者帥其屬詣厨奉饌入設於饌幔内内侍之屬與司膳等守掌之其三牲之肉不上神俎者亦太官付内謁者同時進入以供頒胙自餘享之物並諸司前一日預進質明女相者引享官以下就壝外位女相者皆以尚儀下女史充掌賛帥女史先入就位女相者引典正女祝及女史女祝史女祝以典贊下充女祝史以典正下充之與女執尊罍篚羃者入自東門當壇南北面西上立定掌贊曰再拜女史承傳凡掌贊有詞女史皆承傳典正以下皆再拜典正以下各就位司樂帥女工人入就位女相者各引享官入就位立定掌贊曰再拜在位者皆再拜女相者進尚宫之左白有司謹具請行事退復位典樂跪舉麾凡取物者亦跪而取以典奠物皆跪奠訖而後興鼔柷奏永和之樂以姑洗之均自後壇下之樂皆奏姑洗三成偃麾戛敔樂止凡樂皆典樂舉麾工鼔柷而後作偃麾戛敔而後止掌贊曰再拜在位者皆再拜女祝跪取幣於篚興立于尊所女相者引尚宫詣壇升自南陛北面立女祝奉幣東向進尚宫受幣登歌作肅和之樂以南吕之均女相者引尚宫進北向跪奠於神坐興女相者引尚宫少退北向再拜訖登歌止女相者引尚宫降自南陛還本位初享官以下拜訖女祝史奉毛血之豆立於内壝東門外於登歌止女祝史奉毛血入升自南陛女祝迎引於壇上進跪奠於神坐前興女祝史退立於尊所尚宫既升奠幣司膳出帥女進饌者奉饌陳於内壝東門之外尚宫既降復位司膳引饌入俎初入門雍和之樂作自後酌獻皆奏雍和饌至陛樂止女祝史進跪徹毛血之豆降自東陛以出饌升自南陛女祝迎引於壇上設於神坐前籩豆盖羃先徹乃升簠簋既奠却其盖於下設訖司膳帥女進饌者䧏自東陛復位女祝還尊所女相者引尚宫詣罍洗盥手洗爵訖女相者引尚宫升自南陛詣犧尊所執尊者舉羃尚宫酌醴齊樂作女相者引尚宫進先蠶氏神坐前北向跪奠爵興女相者引尚宫少退北向立樂止女祝持版進于神坐之右東向跪讀祝文曰維某年歳次月朔日子皇后某氏謹遣某官妾姓敢昭告于先蠶氏惟神肇興蠶織功濟黔黎爰擇嘉時式遵令典謹以制幣犧齊粢盛庶品明薦于神尚饗訖興尚宫再拜初讀祝文訖樂作女祝進跪奠版于神坐興還尊所尚宫再拜訖樂止女祝以爵酌罍福酒進於尚宫之右西向立尚宫再拜受爵跪祭酒啐酒奠爵興女史帥女進饌者持籩俎進女祝減神坐前三牲胙肉皆取前脚第二骨各置一俎又以籩取稷黍飯共置一籩女祝先以飯籩西向進尚宫受以授女進饌者女祝又以胙俎以次進尚宫每受以授女進饌者尚宫跪取爵遂飲卒爵女祝進受爵復於坫尚宫興再拜女相者引尚宫降復位初尚宫獻將畢女相者引尚儀詣罍洗盥手洗爵訖升自東陛詣象尊所執尊者舉羃尚儀酌盎齊女相者引進神坐前北面跪奠爵興女相者引尚儀少退北向再拜女祝以爵酌罍福酒持進尚儀之右西向立尚儀再拜受爵跪祭酒遂飲卒爵女祝進受爵復於坫尚儀再拜女祝等引自東陛降復位初尚儀獻將畢又女相引尚食詣罍洗盥手洗爵升酌盎齊終獻皆如亞獻之儀訖女相者引降復位女祝進跪徹豆興還樽所徹者籩豆各一少移于故處掌贊曰賜胙女史唱衆官再拜衆官在位者皆再拜已飲福受胙者不拜永和之樂作掌贊曰再拜在位者皆再拜訖樂一成止女相者進尚宫之左白請就望瘞位女相者引尚宫就望瘞位掌贊女史轉就瘞埳西南位東向立於衆官將拜女史執篚進神座前跪取幣興降西南位東向立於衆官將拜女史執篚進神坐前跪取幣興降自南陛西行詣瘞埳以幣置於埳訖掌贊曰可瘞埳東西各四人寘土半埳女相者進尚宫之左白禮畢女相者引尚宫出又女相者引享官以次出初白禮畢掌贊帥女史還本位典正女史以下俱復執事位立定掌贊曰再拜典正以下皆再拜訖引出女工人以次出其祝版燔于齋所其祝版郊社令預送付内侍享前一日内侍進御署訖皇后北面再拜近侍奉版出授内侍送享所享前之平明女祝以版奠於坫大唐開元禮卷四十九
