body:
  text: 大唐開元禮卷一百二十唐蕭嵩等撰嘉禮四品五品庶子冠將冠筮賔如嫡子之儀前二日主人戒賔及贊冠者先一日掌事者設次於大門外之右南向其日夙興贊者設洗於正寢阼階東南東西當東霤南北以堂深罍水在洗東加勺羃篚在洗西南肆實巾一爵一於篚加羃席於東房內西牖下無房者張帷為之陳服於席東領北上冕服青衣纁裳四品繡冕服三章一章在衣粉米二章在裳黼黻玄冕衣無章裳刺黻一章白紗中單青領褾襈裾革帶鈎䚢大帶素帶紕其垂外以玄內以黃紉約皆用青組黻繡冕山一章玄冕無章劍飾以金雙綬四品青綬三綵青白紅青純質長一丈四尺一百四十首廣七寸五品以黑綬二綵青紺純紺質長一丈二尺一百首廣六寸有小雙綬長二尺六寸色同大綬而首半之朱襪赤舄進賢冠服絳紗單衣白紗中單皂領褾襈裾白裙襦赤裙衫革帶鈎䚢假帶曲領方心絳紗蔽膝白襪黑舄劍雙綬緇布冠服青衣素裳素鞸中單革帶大帶劍佩與冕服同襪舄與進賢冠同緇纚櫛簮同箱在服南纚今用皂巾方約有六寸屬帶於前兩隅蒲筵三緇布純加萑席三玄帛純又在南樽於房户外之西兩甒玄酒在西加勺羃設篚於樽東置二爵加羃饌陳於服北饌用少牢及臘三俎六籩六豆牲體節折加離肺籩實脯棗之屬豆實葅醢之類質明賔贊至於主人大門外掌次者引之次賔贊公服諸行事者各服其服執樽罍篚者皆就位繡冕垂青珠四旒以組為纓色如其綬青纊充耳角導玄冕三旒餘同繡冕服進賢冠兩梁纓青緌犀導緇布冠青組纓冠冕各一箱各一人執之待於西階之西東面北上設主人之席於阼階上西面賔席於西階上東面冠者席於房户外之西南面房外謂尊東主人公服立於阼階下當東序西面諸親公服非公服者常服立於罍洗東南西面北上尊者停别室儐者公服立於門內道東北面將冠者雙童髻玉導金飾綵袴褶錦紳烏皮履立於房內南面主人贊冠者公服立於房內户東西面賔及贊冠者出次立於門西贊冠者少退俱東面北上儐者進於主人之左北面受命出立於門東西面曰敢請事賔曰某子有嘉禮命某執事儐者入告主人迎賔於大門外之東西面再拜賔答拜凡賔主拜揖入出皆贊禮相導主人揖贊冠者贊冠者報揖主人又揖賔賔報揖主人入賔及贊冠者次入及門內主人揖賔賔報揖主人與賔入贊冠者從之至內霤將曲揖賔報揖至階主人立於階東西面賔立於階西東面主人曰請吾子升賔曰某備將事敢辭主人曰固請吾子升賔曰某敢固辭主人曰終請吾子升賔曰某敢終辭主人升自阼階立於席東西向賔升自西階立於席西東向贊冠者及筵盥洗升自阼階入於東房立於主人贊冠者之南俱西面主人贊冠者取纚櫛簮箱跪奠於冠者筵東端興席東少北南面立賔揖將冠者賔主俱即席坐將冠者進升席西面坐賔之贊冠者進筵前北面跪脫雙童髻於箱櫛畢設纚興復位立賔主俱興賔降盥主人從降賔東面辭曰請吾子不降主人曰吾子降辱敢不從降賔至罍洗盥手訖詣西階賔主一揖一讓升主人立於席後西面賔立於西階上東面執緇布冠者升賔降一等受之右執頂左執前進將冠者筵前北向跪冠興復西階上席後東面立賔之贊冠者進冠者北面跪結纓興復位冠者興賔揖冠者適房賔主俱坐冠者著青衣素裳之服出房立於户西南面賔主俱興賔揖冠者冠者進立於席後南面賔降盥主人從降辭對如初賔盥手跪取爵於篚興洗訖詣西階賔主一揖一讓升主人立於席後西面賔詣酒樽所酌酒進冠者筵前北向立祝曰旨酒既清嘉薦亶時始加元服兄弟具來孝友時格永乃保之冠者筵西拜受爵賔復西階上東面答拜執饌者薦籩豆於冠者筵前冠者升筵坐左執爵右取脯擩於醢祭於籩豆之間祭酒興筵末坐啐酒執爵興降筵西跪奠爵再拜執爵興賔答拜冠者升筵跪奠爵於薦東興立於筵西南向坐賔之贊冠者跪脫緇布冠置於箱櫛畢設纚興復位賔降二等受進賢冠右執頂左執前進冠者筵前北向跪冠興復位賔之贊冠者坐設簮結纓興復位冠者興賔揖冠者適房賔主俱坐冠者著綘紗服出房立於户西南面賔主俱興賔揖冠者進立於席後南面賔詣酒樽所取爵酌酒進冠者筵前北向立祝曰旨酒既湑嘉薦伊脯乃申爾服禮儀有敘祭此嘉爵承天之祐冠者筵西拜受爵賔復西階上東面答拜執饌者薦豆冠者升筵坐左執爵右祭脯醢祭酒興筵末坐啐酒執爵興降筵西奠爵再拜執爵興賔答拜冠者升筵坐奠爵於薦東興立於筵西南面執饌者徹薦爵賔揖冠者冠者進升席南面坐賔之贊冠者跪脫進賢冠置於箱櫛畢設纓興復位賔降三等受冕右執頂左執前進冠者筵前北向跪冠興復位賔之贊冠者跪設簮結纓興復位冠者興賔揖冠者冠者適房賔主俱坐主人贊冠者徹櫛箱入於房冠者著冕服出房立於户西南面賔主俱興賔揖冠者冠者進立於席後南面賔詣酒樽所取爵酌酒進冠者筵前北面立祝曰旨酒令芳籩豆有楚咸加爾服肴升折俎承天之慶受福無疆冠者筵西拜受爵賔復位東面答拜執饌者薦籩豆設俎於籩豆之南冠者升筵坐左執爵右祭脯醢贊冠者取肺一以授冠者冠者奠爵於薦西興受却左手執本坐右絶末以祭上左手嚌之興加於爼冠者坐帨手執爵祭酒筵末坐啐酒興降筵西南面坐奠爵再拜執爵興賔答拜冠者升筵坐奠爵於薦東興降席北面跪取脯降自西階入見母進奠脯於席前退再拜出冠者母不在則使人受脯於西階下初冠者入見母賔主俱興賔降當西序東面立主人降當東序西面立冠者既見母出立於西階之東南面賔少進字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於嘏永受保之曰孟某甫仲叔季惟其所當冠者曰某雖不敏夙夜袛奉賔出主人送於內門外主人西面請賔曰吾子辱執事請禮從者賔曰某既得將事敢辭主人曰敢固以請賔曰某辭不得命敢不從賔就次主人入初賔出冠者東面見諸親諸親拜之冠者答拜冠者西南面拜賔之贊冠者贊冠者答拜訖見諸尊於别室賔主既釋服改席訖賔興衆賔俱出次立於門西東面主人出門東西面主人揖賔賔報揖主人先入賔及衆賔從之至階讓升各就位後立定俱興賔坐會訖賔主俱立於西階上東面主人立於東階上西面衆賔降立於西階下東面掌事者以幣篚升授主人於序端賔北面再拜主人進立於楹間南面賔進立於主人之右俱南面賔受篚退復東面位主人還阼階上北面拜送賔降自西階從者迓受幣賔出主人送於大門外之東西面再拜賔退主人入孤子則諸父諸兄戒賔冠之日主人髻而迎賔拜揖讓如冠主冠醮禮賔拜送皆如上儀大唐開元禮卷一百二十
