body:
  text: 大唐開元禮卷一百六唐蕭嵩等撰嘉禮臨軒冊命皇太子卜日告圜丘告方澤告太廟臨軒冊命謁中宫謁太廟皇帝㑹羣臣羣臣上禮皇后受羣臣賀皇后㑹命婦皇太子㑹羣臣宫臣上禮卜日冊皇太子有司卜日如别儀告圜丘告方澤告太廟右並有司行事如常告之儀臨軒冊命前一日尚舍奉御設御幄坐於太極殿北壁下南向守宫設皇太子次于東朝堂之北西向設羣官次於東西朝堂太樂令展宫懸于殿庭又設舉麾位于殿上皷吹令設十二案于建皷之外乘黄令陳車輅尚輦奉御陳輿輦並如常儀典儀設皇太子版位于大横街之南道東北向又設羣臣版位文官一品以下五品以上于懸東六品以下于横街之南俱西面武官一品以下五品以上于懸西六品以下于横街之南俱東面諸親于五品以上之南皇宗親在東異姓親在西蕃客分方于六品以下之南皆以北為上並如常儀若有朝集使分方于文武官當品之下諸州使人分方于朝集使九品之後設典儀位于懸之東北賛者二人在南少退俱西向奉禮設門外位皆如元日之儀其日皇太子日未出前二刻宫官應從者俱服其服諸衞勒所部陳設如常左庶子版奏請中嚴諸侍衞之官各服其服詣閤奉迎僕進金輅于閤外南向左内率一人執刀立于輅前北向賛善一人在侍臣之前賛者二人又在中允之前左庶子版奏外辦僕奮衣而升正立執轡皇太子具服逺遊冠若未冠則雙童髻絳紗袍升輿以出左右侍衞如常左内率前執轡皇太子升輅僕立授綏左庶子以下夾侍賛善進當輅前跪奏稱賛善臣某言請發引俛伏興退復位凡賛善奏請皆進當輅前跪奏稱具官臣某言訖俛伏興輅動賛善與賛者夾引以出左内率夾輅而趨至侍臣上馬所賛善奏稱請輅權停令侍臣上馬左庶子前承令退稱令曰諾賛善退稱侍臣上馬賛者承傳文武侍臣皆上馬左庶子以下夾侍于輅前賛者在供奉官人内侍臣上馬畢賛善奏稱請令車右升左庶子前承令退稱令曰諾賛善退復位左内率升訖賛善奏稱請發引退復位皇太子輅動三師乘車訓導三少乘車訓從鳴鐃而行文武宫臣皆乘馬以從至下車所鐃吹止至次前迴輅西向内率降立于輅右左庶子進當輅前跪奏稱左庶子臣某言請降輅俛伏興還侍位皇太子降輅舍人引皇太子就便坐侍衞如常儀其日依時刻諸衞勒所部列黄麾大仗屯門及陳殿庭如常儀羣官諸親客使等依時刻俱集朝堂次各服其服侍中版奏請中嚴鈒戟近仗入陳于殿庭太樂令帥工人入就位協律郎入就舉麾位諸侍衞之官各服其器服符寳郎奉寳俱詣閤奉迎通事舍人引羣官客使就朝堂前位典儀帥賛者先入施位舍人各引羣官客使次入就位皇太子出次舍人引皇太子三師三少導從如式入立於殿外之東西面諸衞帥左右舍人及近侍量人從入黄門侍郎以冊及寳綬各置于案上令史二人絳公服對舉案立於門内道北西面冊案在北中書侍郎立于案後侍中版奏外辦皇帝服衮冕之服御輿以出曲直華盖警蹕侍衞如常儀皇帝將出仗動太樂令令撞黄鐘之鐘右五鐘皆應協律郎跪俛伏舉麾鼔柷奏太和之樂皷吹振作皇帝出自西房即御坐南向坐符寳郎奉寳置于御坐如常協律郎偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而止舍人引皇太子入就位三師三少以下従入者立於皇太子東南西面北上皇太子初入門舒和之樂作至位樂止典儀曰再拜賛者承傳皇太子再拜典儀曰再拜羣官在位者皆再拜中書令降立于皇太子東北西面中書侍郎一人引冊案又中書侍郎一人引璽綬案進立于中書令之南少退俱西面中書侍郎取冊進授中書令退復位中書令稱有制皇太子再拜讀冊訖皇太子再拜進受冊退授左庶子中書侍郎取璽綬進授中書令皇太子又進受璽綬退授左庶子中書令以下還侍位持案者以案退典儀曰再拜皇太子再拜典儀又曰再拜羣官在位者皆再拜舍人引皇太子出初行樂作出門樂止侍中前跪奏稱侍中臣某言禮畢俛伏興還侍位皇帝興太樂令令撞㽔賔之鐘左五鐘皆應鼔柷奏太和之樂皷吹振作皇帝降坐御輿入自東房侍衞警蹕如常儀侍臣從至閤樂止通事舍人引群官在位者以次出蕃客先出朝皇后前一日所司設皇太子次于永安門外之西東向周以行帷鋪坐如式又設三師三少等便坐于西南東向北上其日諸衞各勒所部屯門列仗及陳布于皇后正殿南門之外皇太子將至尚儀版奏請中嚴皇太子受冊訖舎人引皇太子三師三少導從及餘侍衞皆如常儀詣皇后所御之殿閤外道東西面立六尚以下各服其服俱詣皇后内閤奉迎尚儀版奏外辦皇后首飾褘衣御輿以出即御坐南向坐侍衞如式内謁者監引皇太子至肅章門其侍衞之官並立于肅章門之外司賔承引皇太子入立于庭北面立定皇太子再拜訖司賔引皇太子至閤内謁者監承引以出舍人引之次侍衞如式三師三少以下各之次謁太廟前一日右校掃除廟之内外守宫設皇太子次于廟西南東向又設三師以下及文武侍臣次于皇太子次之後少近西俱東向奉禮設皇太子版位于廟庭道東北向其日皇太子入受冊所司轉鹵簿仗衞于永安門西以俟皇太子朝皇后出訖舍人引之次侍衞如常僕進金輅于次前左庶子版奏外辦皇太子出次乘輅奏請發引及侍臣陪從鐃吹聲作皆如初儀至安上門街當廟西鐃吹止至次前迴輅東向内率降立于輅右左庶子進當輅前跪稱左庶子臣某言請降輅俛伏興還侍位皇太子降輅乘輿入次侍衞如常儀皇太子入次一刻頃率更令立于次門之外左庶子版奏外辦皇太子出次侍衞如常率更令引皇太子入自南門三師三少導從如式庶子二人一人賛左一人賛右舍人二人從近仗量人從入皇太子至位立定率更令奏請殿下再拜皇太子再拜少刻率更令奏殿下辭皇太子再拜辭率更令前奏禮畢率更令引皇太子出自南門入次侍衞如常皇太子既入便次有司轉仗衞于還塗如來儀僕進金輅于次前如常左庶子版奏外辦皇太子乘輿出次升輅侍衞如常侍臣上馬陪從如來儀輅動過廟鳴鐃而行至重明門宫官文武俱下馬皇太子乘輅入三師三少還皇太子至東閤前迴輅南向左庶子跪奏請降輅俛伏興皇太子降輅乘輿以入侍臣從至閤左庶子版奏請將士各還本所皇帝㑹羣臣右皆如元㑹之儀其上夀辭云具官臣某等稽首言皇太子岐嶷夙著令月吉日光踐承華臣等不勝大慶謹上千萬嵗夀羣臣上禮前一日守宫量設次于東西朝堂如常其日應上禮之官依時刻各集于次皆服朝服奉禮先設上禮之官位于東朝堂之前近南文東武西重行北面相對為首又設中書舍人位于文武官為首者之北南向設奉禮位于文官東北賛者二人在南差退俱西向謁者各引上禮之官就位立定令史二人對舉表案禮部郎中引中書舍人前取表授舍人訖引案退奉禮唱再拜賛者承傳在位者皆再拜中書舍人奉表入進謁者引在位者退皇后受羣臣賀右皆如元日奉賀之儀其賀云皇太子岐嶷夙著令月吉日光踐承華臣等不勝大慶謹奉賀以聞内給事宣令答云知皇后㑹命婦右皆如元日之儀其上夀辭云具位妾姓等言皇太子岐嶷夙著令月吉日光踐承華妾等不勝大慶謹上皇太子㑹羣官右皆如元㑹之儀其賀云伏惟殿下固天攸縱德業日新式光震宫普天同慶某等情百恒品不勝欣悦左庶子宣令答云某以不敏夙承禮訓祗奉朝命慙懼惟深皇太子㑹宫臣右皆如元㑹之儀其上夀辭云具官臣某等言伏惟殿下固天攸縱徳業日新式光震宫普天忭躍臣等不勝大慶謹上千萬嵗夀宫臣上禮前一日守宫量設次于東宫朝堂如常其日應上禮之官依時刻各集于次皆服朝服奉禮先設上禮之官位于朝堂前文東武西重行北面相對為首設太子舍人位于文官為首者之北南向設奉禮位于文官東北賛者二人在其南差退俱西向通事舍人各引上禮之官皆就位立定令史二人對舉表案詹事承引就太子舍人前取表授舍人訖引案退奉禮唱再拜賛者承傳在位者皆再拜舍人以表入謁者引在位者退大唐開元禮卷一百六
