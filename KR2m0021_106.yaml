body:
  text: 大唐開元禮卷一百六唐蕭嵩等撰嘉禮臨軒册命皇太子卜日告圜丘告方澤告太廟臨軒册命謁中宫謁太廟皇帝會羣臣羣臣上禮皇后受羣臣賀皇后會命婦皇太子會羣臣宫臣上禮卜日册皇太子有司卜日如别儀告圜丘告方澤告太廟右並有司行事如常告之儀臨軒册命前一日尚舍奉御設御幄坐於太極殿北壁下南向守宫設皇太子次于東朝堂之北西向設羣官次於東西朝堂太樂令展宫懸于殿庭又設舉麾位于殿上鼓吹令設十二案于建鼓之外乘黃令陳車輅尚輦奉御陳輿輦並如常儀典儀設皇太子版位于大橫街之南道東北向又設羣臣版位文官一品以下五品以上于懸東六品以下于橫街之南俱西面武官一品以下五品以上于懸西六品以下于橫街之南俱東面諸親于五品以上之南皇宗親在東異姓親在西蕃客分方于六品以下之南皆以北為上並如常儀若有朝集使分方于文武官當品之下諸州使人分方于朝集使九品之後設典儀位于懸之東北贊者二人在南少退俱西向奉禮設門外位皆如元日之儀其日皇太子日未出前二刻宫官應從者俱服其服諸衛勒所部陳設如常左庶子版奏請中嚴諸侍衛之官各服其服詣閣奉迎僕進金輅于閣外南向左內率一人執刀立于輅前北向贊善一人在侍臣之前贊者二人又在中允之前左庶子版奏外辦僕奮衣而升正立執轡皇太子具服逺遊冠若未冠則雙童髻絳紗袍升輿以出左右侍衛如常左內率前執轡皇太子升輅僕立授綏左庶子以下夾侍贊善進當輅前跪奏稱贊善臣某言請發引俯伏興退復位凡贊善奏請皆進當輅前跪奏稱具官臣某言訖俯伏興輅動贊善與贊者夾引以出左內率夾輅而趨至侍臣上馬所贊善奏稱請輅權停令侍臣上馬左庶子前承令退稱令曰諾贊善退稱侍臣上馬贊者承傳文武侍臣皆上馬左庶子以下夾侍于輅前贊者在供奉官人內侍臣上馬畢贊善奏稱請令車右升左庶子前承令退稱令曰諾贊善退復位左內率升訖贊善奏稱請發引退復位皇太子輅動三師乘車訓導三少乘車訓從鳴鐃而行文武宫臣皆乘馬以從至下車所鐃吹止至次前回輅西向內率降立于輅右左庶子進當輅前跪奏稱左庶子臣某言請降輅俯伏興還侍位皇太子降輅舍人引皇太子就便坐侍衛如常儀其日依時刻諸衛勒所部列黃麾大仗屯門及陳殿庭如常儀羣官諸親客使等依時刻俱集朝堂次各服其服侍中版奏請中嚴鈒戟近仗入陳于殿庭太樂令帥工人入就位協律郎入就舉麾位諸侍衛之官各服其器服符寶郎奉寶俱詣閣奉迎通事舍人引羣官客使就朝堂前位典儀帥贊者先入施位舍人各引羣官客使次入就位皇太子出次舍人引皇太子三師三少導從如式入立於殿外之東西面諸衛帥左右舍人及近侍量人從入黃門侍郎以册及寶綬各置于案上令史二人絳公服對舉案立於門內道北西面册案在北中書侍郎立于案後侍中版奏外辦皇帝服衮冕之服御輿以出曲直華蓋警蹕侍衛如常儀皇帝將出仗動太樂令令撞黃鐘之鐘右五鐘皆應協律郎跪俯伏舉麾鼓柷奏太和之樂鼓吹振作皇帝出自西房即御坐南向坐符寶郎奉寶置于御坐如常協律郎偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而止舍人引皇太子入就位三師三少以下從入者立於皇太子東南西面北上皇太子初入門舒和之樂作至位樂止典儀曰再拜贊者承傳皇太子再拜典儀曰再拜羣官在位者皆再拜中書令降立于皇太子東北西面中書侍郎一人引册案又中書侍郎一人引璽綬案進立于中書令之南少退俱西面中書侍郎取册進授中書令退復位中書令稱有制皇太子再拜讀册訖皇太子再拜進受册退授左庶子中書侍郎取璽綬進授中書令皇太子又進受璽綬退授左庶子中書令以下還侍位持案者以案退典儀曰再拜皇太子再拜典儀又曰再拜羣官在位者皆再拜舍人引皇太子出初行樂作出門樂止侍中前跪奏稱侍中臣某言禮畢俯伏興還侍位皇帝興太樂令令撞㽔賔之鐘左五鐘皆應鼓柷奏太和之樂鼓吹振作皇帝降坐御輿入自東房侍衛警蹕如常儀侍臣從至閣樂止通事舍人引群官在位者以次出蕃客先出朝皇后前一日所司設皇太子次于永安門外之西東向周以行帷鋪坐如式又設三師三少等便坐于西南東向北上其日諸衛各勒所部屯門列仗及陳布于皇后正殿南門之外皇太子將至尚儀版奏請中嚴皇太子受册訖舍人引皇太子三師三少導從及餘侍衛皆如常儀詣皇后所御之殿閣外道東西面立六尚以下各服其服俱詣皇后內閣奉迎尚儀版奏外辦皇后首飾褘衣御輿以出即御坐南向坐侍衛如式內謁者監引皇太子至肅章門其侍衛之官並立于肅章門之外司賔承引皇太子入立于庭北面立定皇太子再拜訖司賔引皇太子至閣內謁者監承引以出舍人引之次侍衛如式三師三少以下各之次謁太廟前一日右校掃除廟之內外守宫設皇太子次于廟西南東向又設三師以下及文武侍臣次于皇太子次之後少近西俱東向奉禮設皇太子版位于廟庭道東北向其日皇太子入受册所司轉鹵簿仗衛于永安門西以俟皇太子朝皇后出訖舍人引之次侍衛如常僕進金輅于次前左庶子版奏外辦皇太子出次乘輅奏請發引及侍臣陪從鐃吹聲作皆如初儀至安上門街當廟西鐃吹止至次前回輅東向內率降立于輅右左庶子進當輅前跪稱左庶子臣某言請降輅俯伏興還侍位皇太子降輅乘輿入次侍衛如常儀皇太子入次一刻頃率更令立于次門之外左庶子版奏外辦皇太子出次侍衛如常率更令引皇太子入自南門三師三少導從如式庶子二人一人贊左一人贊右舍人二人從近仗量人從入皇太子至位立定率更令奏請殿下再拜皇太子再拜少刻率更令奏殿下辭皇太子再拜辭率更令前奏禮畢率更令引皇太子出自南門入次侍衛如常皇太子既入便次有司轉仗衛于還塗如來儀僕進金輅于次前如常左庶子版奏外辦皇太子乘輿出次升輅侍衛如常侍臣上馬陪從如來儀輅動過廟鳴鐃而行至重明門宫官文武俱下馬皇太子乘輅入三師三少還皇太子至東閣前回輅南向左庶子跪奏請降輅俯伏興皇太子降輅乘輿以入侍臣從至閣左庶子版奏請將士各還本所皇帝會羣臣右皆如元會之儀其上夀辭云具官臣某等稽首言皇太子岐嶷夙著令月吉日光踐承華臣等不勝大慶謹上千萬嵗夀羣臣上禮前一日守宫量設次于東西朝堂如常其日應上禮之官依時刻各集于次皆服朝服奉禮先設上禮之官位于東朝堂之前近南文東武西重行北面相對為首又設中書舍人位于文武官為首者之北南向設奉禮位于文官東北贊者二人在南差退俱西向謁者各引上禮之官就位立定令史二人對舉表案禮部郎中引中書舍人前取表授舍人訖引案退奉禮唱再拜贊者承傳在位者皆再拜中書舍人奉表入進謁者引在位者退皇后受羣臣賀右皆如元日奉賀之儀其賀云皇太子岐嶷夙著令月吉日光踐承華臣等不勝大慶謹奉賀以聞內給事宣令答云知皇后會命婦右皆如元日之儀其上夀辭云具位妾姓等言皇太子岐嶷夙著令月吉日光踐承華妾等不勝大慶謹上皇太子會羣官右皆如元會之儀其賀云伏惟殿下固天攸縱德業日新式光震宫普天同慶某等情百恆品不勝欣悅左庶子宣令答云某以不敏夙承禮訓祗奉朝命慙懼惟深皇太子會宫臣右皆如元會之儀其上夀辭云具官臣某等言伏惟殿下固天攸縱德業日新式光震宫普天忭躍臣等不勝大慶謹上千萬嵗夀宫臣上禮前一日守宫量設次于東宫朝堂如常其日應上禮之官依時刻各集于次皆服朝服奉禮先設上禮之官位于朝堂前文東武西重行北面相對為首設太子舍人位于文官為首者之北南向設奉禮位于文官東北贊者二人在其南差退俱西向通事舍人各引上禮之官皆就位立定令史二人對舉表案詹事承引就太子舍人前取表授舍人訖引案退奉禮唱再拜贊者承傳在位者皆再拜舍人以表入謁者引在位者退大唐開元禮卷一百六
